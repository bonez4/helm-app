<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>BEACON — Commercial &amp; Dispatch</title>
<link rel="manifest" href="manifest.webmanifest"/>
<meta name="theme-color" content="#f7f7f5"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="BEACON"/>
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20viewBox%3D%270%200%20180%20180%27%3E%3Crect%20width%3D%27180%27%20height%3D%27180%27%20rx%3D%2740%27%20fill%3D%27%230a0a0f%27%2F%3E%3Cellipse%20cx%3D%2790%27%20cy%3D%2755%27%20rx%3D%2755%27%20ry%3D%2716%27%20fill%3D%27%23f59e0b%27%20opacity%3D%270.45%27%2F%3E%3Cpolygon%20points%3D%2774%2C150%20106%2C150%20100%2C58%2080%2C58%27%20fill%3D%27%23f5f5f4%27%2F%3E%3Crect%20x%3D%2776%27%20y%3D%2750%27%20width%3D%2728%27%20height%3D%2710%27%20fill%3D%27%23dc2626%27%2F%3E%3Ccircle%20cx%3D%2790%27%20cy%3D%2740%27%20r%3D%2710%27%20fill%3D%27%23f59e0b%27%2F%3E%3Crect%20x%3D%2776%27%20y%3D%2780%27%20width%3D%2728%27%20height%3D%276%27%20fill%3D%27%23dc2626%27%2F%3E%3Crect%20x%3D%2776%27%20y%3D%27108%27%20width%3D%2728%27%20height%3D%276%27%20fill%3D%27%23dc2626%27%2F%3E%3Crect%20x%3D%2777%27%20y%3D%27135%27%20width%3D%2726%27%20height%3D%276%27%20fill%3D%27%23dc2626%27%2F%3E%3C%2Fsvg%3E"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── BEACON: clean light theme ──────────────────────────────────────── */
:root{
  --bg:        #f7f7f5;
  --surface:   #ffffff;
  --surface-2: #f5f5f4;
  --surface-3: #e7e5e4;
  --border:    rgba(15,23,42,0.08);
  --border-2:  rgba(15,23,42,0.14);
  --text:      #1c1917;
  --text-mute: #57534e;
  --text-dim:  #a8a29e;
  --amber:     #d97706;
  --amber-dim: #b45309;
  --amber-soft:rgba(217,119,6,0.08);
  --green:     #059669;
  --green-dim: #047857;
  --green-soft:rgba(5,150,105,0.12);
  --red:       #dc2626;
  --red-dim:   #b91c1c;
  --blue:      #2563eb;
  --blue-soft: rgba(37,99,235,0.12);
  --shadow:    0 1px 3px rgba(15,23,42,0.06), 0 1px 2px rgba(15,23,42,0.04);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  background:var(--bg);color:var(--text);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  min-height:100vh;
}
button,input,select,textarea{font-family:inherit;}
a{color:var(--amber);text-decoration:none;}
a:hover{text-decoration:underline;}
.muted{color:var(--text-mute);}
.dim{color:var(--text-dim);}
.mono{font-family:'DM Mono',monospace;}

.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;border:1px solid var(--border-2);border-radius:8px;
  background:var(--surface);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;
}
.btn:hover{background:var(--surface-2);}
.btn-primary{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;border:1px solid var(--amber);border-radius:8px;
  background:var(--amber);color:#fff;font-size:13px;font-weight:700;cursor:pointer;
}
.btn-primary:hover{background:var(--amber-dim);border-color:var(--amber-dim);}
.btn-primary:disabled,.btn:disabled{opacity:.5;cursor:not-allowed;}

/* ── LOGIN GATE ─────────────────────────────────────────────────────── */
#loginGate{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at top, rgba(217,119,6,0.07) 0%, transparent 60%), var(--bg);
  padding:24px;
}
.login-card{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:36px 32px;max-width:380px;width:100%;
  box-shadow:0 12px 40px rgba(15,23,42,0.08), 0 2px 6px rgba(15,23,42,0.04);
}
.login-brand{display:flex;align-items:center;gap:12px;margin-bottom:26px;}
.brand-badge{width:44px;height:44px;border-radius:11px;background:#0a0a0f;display:flex;align-items:center;justify-content:center;flex:none;}
.brand-badge svg{width:30px;height:30px;}
.login-brand-text h1{font-size:22px;font-weight:800;letter-spacing:.04em;color:var(--text);}
.login-brand-text .sub{font-size:11px;color:var(--text-dim);letter-spacing:.06em;text-transform:uppercase;margin-top:2px;}
.login-card label{display:block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-mute);margin-bottom:6px;font-weight:600;}
.login-card input{
  width:100%;padding:11px 14px;background:var(--surface-2);
  border:1px solid var(--border);border-radius:8px;
  color:var(--text);font-size:14px;margin-bottom:14px;
}
.login-card input:focus{border-color:var(--amber);outline:none;}
.login-card .btn-primary{width:100%;justify-content:center;padding:12px;font-size:14px;}
#loginErr{color:var(--red);font-size:12.5px;margin-top:12px;min-height:16px;text-align:center;}

/* ── APP SHELL ──────────────────────────────────────────────────────── */
#app{display:none;flex-direction:column;min-height:100vh;}
.topbar{
  position:sticky;top:0;z-index:30;
  display:flex;align-items:center;gap:16px;
  padding:10px 20px;padding-top:calc(10px + env(safe-area-inset-top));
  background:var(--surface);border-bottom:1px solid var(--border-2);
}
.topbar .brand{display:flex;align-items:center;gap:10px;}
.topbar .brand .brand-badge{width:32px;height:32px;border-radius:8px;}
.topbar .brand .brand-badge svg{width:22px;height:22px;}
.topbar .brand b{font-size:16px;font-weight:800;letter-spacing:.03em;}
.topbar .brand span{font-size:10.5px;color:var(--text-dim);letter-spacing:.05em;text-transform:uppercase;}
.topnav{display:flex;gap:4px;margin-left:8px;}
.topnav a{
  padding:7px 13px;border-radius:8px;font-size:13px;font-weight:600;color:var(--text-mute);
}
.topnav a.active{background:var(--amber-soft);color:var(--amber-dim);}
.topnav a.disabled{color:var(--text-dim);cursor:default;}
.topnav a.disabled:hover{text-decoration:none;}
.topbar .spacer{flex:1;}
.topbar .who{font-size:13px;color:var(--text-mute);font-weight:600;}
.topbar .who b{color:var(--text);}

.wrap{max-width:1280px;width:100%;margin:0 auto;padding:20px;padding-bottom:60px;}

/* ── LIST TOOLBAR ───────────────────────────────────────────────────── */
.list-head{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:14px;}
.list-head h2{font-size:18px;font-weight:800;}
.list-head .count-chip{font-size:12px;color:var(--text-mute);background:var(--surface-2);border:1px solid var(--border);padding:3px 10px;border-radius:20px;font-weight:600;}
.toolbar{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:10px 12px;margin-bottom:12px;box-shadow:var(--shadow);
}
.search-box{position:relative;flex:1;min-width:220px;max-width:420px;}
.search-box svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text-dim);}
.search-box input{
  width:100%;padding:9px 12px 9px 34px;background:var(--surface-2);
  border:1px solid var(--border);border-radius:8px;font-size:13.5px;color:var(--text);
}
.search-box input:focus{border-color:var(--amber);outline:none;background:var(--surface);}
.toolbar .spacer{flex:1;}
.pager{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text-mute);white-space:nowrap;}
.pager button{
  width:30px;height:30px;border:1px solid var(--border-2);border-radius:7px;background:var(--surface);
  color:var(--text);cursor:pointer;font-size:15px;line-height:1;display:inline-flex;align-items:center;justify-content:center;
}
.pager button:disabled{opacity:.4;cursor:default;}

/* ── TABLE ──────────────────────────────────────────────────────────── */
.table-wrap{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  overflow:auto;box-shadow:var(--shadow);
}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{
  position:sticky;top:0;z-index:2;background:var(--surface-2);
  text-align:left;padding:11px 13px;font-weight:700;color:var(--text-mute);
  border-bottom:1px solid var(--border-2);white-space:nowrap;cursor:pointer;user-select:none;
  font-size:11.5px;letter-spacing:.04em;text-transform:uppercase;
}
thead th.nosort{cursor:default;}
thead th .caret{color:var(--amber);margin-left:4px;font-size:10px;}
tbody td{padding:10px 13px;border-bottom:1px solid var(--border);white-space:nowrap;vertical-align:middle;}
tbody tr{cursor:pointer;}
tbody tr:nth-child(even){background:#fbfbfa;}
tbody tr:hover{background:var(--amber-soft);}
td.acct{font-family:'DM Mono',monospace;font-size:12.5px;color:var(--text-mute);}
td.name{font-weight:600;color:var(--text);max-width:280px;overflow:hidden;text-overflow:ellipsis;}
td.addr{color:var(--text-mute);max-width:260px;overflow:hidden;text-overflow:ellipsis;}
.empty{padding:46px 20px;text-align:center;color:var(--text-dim);}

.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.03em;}
.pill.reis{background:var(--green-soft);color:var(--green-dim);}
.pill.santos{background:var(--blue-soft);color:var(--blue);}
.pill.role{background:var(--surface-3);color:var(--text-mute);font-weight:600;}

/* day-code (compact, fixed 7 positions: M T W R F S N) */
.daycode{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:3px;white-space:nowrap;}
.daycode .on{color:var(--amber-dim);font-weight:600;}
.daycode .off{color:var(--text-dim);opacity:.4;}
.daycode.none{letter-spacing:0;color:var(--text-dim);opacity:.6;font-family:'Inter',sans-serif;font-style:italic;}

/* ── DETAIL PAGE ────────────────────────────────────────────────────── */
.detail-back{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--text-mute);margin-bottom:14px;cursor:pointer;}
.detail-back:hover{color:var(--amber-dim);}
.detail-header{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:18px;}
.detail-header h1{font-size:24px;font-weight:800;line-height:1.2;}
.detail-header .acct-sub{font-family:'DM Mono',monospace;font-size:13px;color:var(--text-mute);margin-top:3px;}
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:18px 20px;margin-bottom:16px;box-shadow:var(--shadow);
}
.card h3{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-mute);font-weight:700;margin-bottom:14px;}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px 24px;}
.info-grid .k{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--text-dim);font-weight:600;margin-bottom:3px;}
.info-grid .v{font-size:14px;color:var(--text);}
.rate-strip{display:flex;gap:0;flex-wrap:wrap;margin-top:4px;}
.rate-strip .rc{border:1px solid var(--border);padding:6px 12px;text-align:center;}
.rate-strip .rc:first-child{border-radius:8px 0 0 8px;}
.rate-strip .rc:last-child{border-radius:0 8px 8px 0;}
.rate-strip .rc .rl{font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--text-dim);font-weight:700;}
.rate-strip .rc .rv{font-family:'DM Mono',monospace;font-size:13px;color:var(--text);}

/* schedule editor */
.svc-row{display:flex;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.svc-row:last-child{border-bottom:none;}
.svc-label{width:120px;font-weight:700;font-size:14px;flex:none;display:flex;align-items:center;gap:8px;}
.svc-label .dot{width:9px;height:9px;border-radius:50%;}
.svc-days{display:flex;gap:6px;flex-wrap:wrap;}
.daybtn{
  width:38px;height:38px;border-radius:9px;border:1px solid var(--border-2);
  background:var(--surface);color:var(--text-mute);font-weight:700;font-size:13px;cursor:pointer;
}
.daybtn:hover{border-color:var(--amber);}
.daybtn.active{background:var(--amber);border-color:var(--amber);color:#fff;}
.svc-saved{font-size:11.5px;color:var(--green-dim);font-weight:700;opacity:0;transition:opacity .2s;}
.svc-saved.show{opacity:1;}
.svc-legend{font-size:11.5px;color:var(--text-dim);margin-top:12px;}

textarea.notes{
  width:100%;min-height:72px;padding:11px 13px;background:var(--surface-2);
  border:1px solid var(--border);border-radius:8px;font-size:13.5px;color:var(--text);resize:vertical;
}
textarea.notes:focus{border-color:var(--amber);outline:none;background:var(--surface);}

/* history */
.hist-add-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.hist-composer{border:1px dashed var(--border-2);border-radius:10px;padding:14px;margin-bottom:16px;background:var(--surface-2);}
.hist-composer-actions{display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap;}
.hist-preview{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.hist-preview .thumb{width:64px;height:64px;border-radius:8px;object-fit:cover;border:1px solid var(--border);}
.timeline{display:flex;flex-direction:column;gap:14px;}
.tl-entry{display:flex;gap:12px;}
.tl-rail{flex:none;display:flex;flex-direction:column;align-items:center;}
.tl-rail .dot{width:11px;height:11px;border-radius:50%;background:var(--amber);margin-top:5px;}
.tl-rail .line{flex:1;width:2px;background:var(--border-2);margin-top:4px;}
.tl-body{flex:1;padding-bottom:6px;}
.tl-meta{font-size:12px;color:var(--text-dim);margin-bottom:4px;}
.tl-meta b{color:var(--text-mute);}
.tl-note{font-size:13.5px;color:var(--text);white-space:pre-wrap;margin-bottom:8px;}
.tl-photos{display:flex;gap:8px;flex-wrap:wrap;}
.tl-photos .thumb{
  position:relative;width:96px;height:96px;border-radius:9px;overflow:hidden;border:1px solid var(--border);cursor:pointer;background:var(--surface-2);
}
.tl-photos .thumb img,.tl-photos .thumb video{width:100%;height:100%;object-fit:cover;display:block;}
.tl-photos .thumb .vbadge{position:absolute;left:5px;bottom:5px;background:rgba(0,0,0,.6);color:#fff;border-radius:5px;padding:1px 6px;font-size:11px;font-weight:700;}

/* lightbox */
#lightbox{
  position:fixed;inset:0;z-index:100;background:rgba(10,10,15,.92);
  display:none;align-items:center;justify-content:center;padding:24px;
}
#lightbox.show{display:flex;}
#lightbox img,#lightbox video{max-width:100%;max-height:100%;border-radius:10px;}
#lightbox .lb-close{position:absolute;top:18px;right:22px;color:#fff;font-size:30px;cursor:pointer;line-height:1;}

/* toast */
.toast{
  position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(80px);
  background:var(--text);color:#fff;padding:12px 20px;border-radius:10px;font-size:13.5px;font-weight:600;
  box-shadow:0 8px 30px rgba(0,0,0,.25);opacity:0;transition:all .25s;z-index:200;max-width:90vw;text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{background:var(--green-dim);}
.toast.err{background:var(--red-dim);}

@media (max-width:720px){
  .topbar{gap:10px;padding:10px 14px;}
  .topbar .brand span{display:none;}
  .topnav{display:none;}
  .topbar .who span.label{display:none;}
  .wrap{padding:14px;}
  .svc-label{width:100%;}
}

/* ── dashboard / business overview ──────────────────────────────────── */
.dash{background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden;}
.dash-head{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,var(--surface),var(--surface-2));}
.dash.collapsed .dash-head{border-bottom:none;}
.dash-title{font-size:14px;font-weight:800;letter-spacing:.02em;display:flex;align-items:center;gap:8px;}
.dash-ico{font-size:15px;}
.dash-toggle{width:30px;height:30px;border:1px solid var(--border-2);border-radius:8px;background:var(--surface);cursor:pointer;font-size:13px;color:var(--text-mute);}
.dash-toggle:hover{background:var(--surface-2);}
.dash.collapsed .dash-body{display:none;}
.dash-body{padding:18px;}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px;}
.kpi{border:1px solid var(--border);border-radius:11px;padding:14px 16px 14px 20px;background:var(--surface-2);position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--text-dim);}
.kpi.lost::before{background:var(--red);}
.kpi.new::before{background:var(--green);}
.kpi-num{font-size:26px;font-weight:800;line-height:1;letter-spacing:-.02em;}
.kpi.lost .kpi-num{color:var(--red-dim);}
.kpi.new .kpi-num{color:var(--green-dim);}
.kpi-label{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--text-mute);font-weight:600;margin-top:5px;}
.kpi-sub{font-size:12px;color:var(--text-dim);margin-top:3px;font-family:'DM Mono',monospace;}
.dash-section+.dash-section{margin-top:20px;}
.dash-section-title{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-mute);font-weight:700;margin-bottom:12px;}
.bars{display:flex;flex-direction:column;gap:7px;}
.bar-row{display:flex;align-items:center;gap:12px;}
.bar-label{width:56px;flex:none;font-size:11.5px;color:var(--text-mute);font-family:'DM Mono',monospace;text-align:right;}
.bar-track{flex:1;height:18px;background:var(--surface-2);border-radius:5px;overflow:hidden;}
.bar-fill{height:100%;background:linear-gradient(90deg,#f87171,var(--red));border-radius:5px;transition:width .4s ease;}
.bar-val{width:120px;flex:none;font-size:12px;color:var(--text-mute);font-family:'DM Mono',monospace;}
.recent-losses{display:flex;flex-direction:column;gap:1px;background:var(--border);border-radius:9px;overflow:hidden;border:1px solid var(--border);}
.loss-row{display:grid;grid-template-columns:1.4fr .8fr 2fr;gap:12px;padding:9px 13px;background:var(--surface);cursor:pointer;align-items:center;}
.loss-row:hover{background:var(--amber-soft);}
.loss-name{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.loss-date{font-size:12px;color:var(--text-mute);font-family:'DM Mono',monospace;}
.loss-reason{font-size:12.5px;color:var(--text-mute);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
/* business status */
.pill.lost{background:rgba(220,38,38,.12);color:var(--red-dim);}
.pill.new{background:var(--green-soft);color:var(--green-dim);}
.pill.active{background:var(--surface-3);color:var(--text-mute);}
.pill.lg{font-size:12px;padding:4px 12px;}
.biz-card .biz-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;}
.biz-actions{display:flex;gap:8px;flex-wrap:wrap;}
.btn-danger{border-color:rgba(220,38,38,.4);color:var(--red-dim);}
.btn-danger:hover{background:rgba(220,38,38,.06);}
.biz-banner{margin-top:14px;padding:12px 14px;border-radius:9px;font-size:13.5px;}
.biz-banner.lost{background:rgba(220,38,38,.07);border:1px solid rgba(220,38,38,.18);}
.biz-banner.new{background:var(--green-soft);border:1px solid rgba(5,150,105,.18);}
.biz-reason{margin-top:5px;color:var(--text-mute);font-style:italic;}
.biz-events{margin-top:16px;display:flex;flex-direction:column;}
.biz-ev{display:flex;align-items:center;gap:10px;font-size:12.5px;padding:8px 0;border-top:1px solid var(--border);flex-wrap:wrap;}
.biz-ev-type{font-weight:700;text-transform:uppercase;font-size:10px;letter-spacing:.04em;padding:2px 8px;border-radius:5px;}
.biz-ev.lost .biz-ev-type{background:rgba(220,38,38,.12);color:var(--red-dim);}
.biz-ev.new .biz-ev-type{background:var(--green-soft);color:var(--green-dim);}
.biz-ev-date{color:var(--text-mute);font-family:'DM Mono',monospace;}
.biz-ev-val{color:var(--text);font-family:'DM Mono',monospace;}
.biz-ev-reason{color:var(--text-mute);flex:1;min-width:150px;}
.biz-ev-del{color:var(--text-dim);cursor:pointer;font-size:17px;line-height:1;padding:0 4px;}
.biz-ev-del:hover{color:var(--red);}
/* modal */
.modal-overlay{position:fixed;inset:0;z-index:90;background:rgba(10,10,15,.5);display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.show{display:flex;}
.modal{background:var(--surface);border-radius:14px;padding:24px;max-width:440px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.modal h3{font-size:17px;font-weight:800;margin-bottom:8px;}
.modal label{display:block;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--text-mute);font-weight:600;margin:14px 0 5px;}
.modal label span{text-transform:none;letter-spacing:0;color:var(--text-dim);font-weight:400;}
.modal input,.modal textarea{width:100%;padding:10px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;font-size:14px;color:var(--text);}
.modal textarea{min-height:84px;resize:vertical;}
.modal input:focus,.modal textarea:focus{border-color:var(--amber);outline:none;background:var(--surface);}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}
@media (max-width:720px){ .loss-row{grid-template-columns:1fr;gap:2px;} .bar-val{width:84px;} }

/* ── contacts + contact log ─────────────────────────────────────────── */
.cdot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;vertical-align:middle;}
.cdot.fresh{background:var(--green);}
.cdot.stale{background:var(--amber);}
.cdot.cold{background:var(--red);}
.cdot.never{background:var(--text-dim);}
.contact-chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:4px 11px;border-radius:20px;}
.contact-chip.fresh{background:var(--green-soft);color:var(--green-dim);}
.contact-chip.stale{background:rgba(217,119,6,.13);color:var(--amber-dim);}
.contact-chip.cold{background:rgba(220,38,38,.12);color:var(--red-dim);}
.contact-chip.never{background:var(--surface-3);color:var(--text-mute);}
.contact-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);}
.contact-row:last-child{border-bottom:none;}
.contact-main{min-width:0;}
.contact-name{font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.contact-title{font-weight:400;font-size:12px;color:var(--text-mute);}
.contact-lines{display:flex;gap:16px;flex-wrap:wrap;margin-top:5px;}
.contact-link{font-size:13px;color:var(--text);}
.contact-link:hover{color:var(--amber-dim);text-decoration:none;}
.contact-actions{display:flex;gap:4px;flex:none;}
.icon-btn{width:30px;height:30px;border:1px solid var(--border);border-radius:7px;background:var(--surface);cursor:pointer;color:var(--text-mute);font-size:14px;line-height:1;}
.icon-btn:hover{background:var(--surface-2);color:var(--text);}
.method-chip{display:inline-block;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;padding:2px 8px;border-radius:5px;background:var(--blue-soft);color:var(--blue);}
.mini-label{display:block;font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--text-mute);font-weight:600;margin-bottom:4px;}
.composer-row{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap;}
.composer-row>div{flex:1;min-width:130px;}
.composer-row input,.composer-row select{width:100%;padding:9px 11px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:13.5px;color:var(--text);}
.composer-row input:focus,.composer-row select:focus{border-color:var(--amber);outline:none;}
.checkbox-label{display:flex !important;align-items:center;gap:8px;text-transform:none !important;letter-spacing:0 !important;font-size:13px !important;color:var(--text) !important;margin-top:16px !important;font-weight:600;}
.checkbox-label input{width:auto !important;padding:0 !important;}
</style>
</head>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────
const SUPABASE_URL   = 'https://iiqlhqtyyqctgupalrlc.supabase.co';
const SUPABASE_ANON  = 'sb_publishable_JAASDdg8OERvpDTnEeLd5Q_Re48qR1I';
const ALLOWED_USERS  = ['david','chris','admin','jarrett'];
const ALLOWED_ROLES  = ['admin'];
const BUCKET         = 'helm-files';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON);

const DAYS = [['M','Monday'],['T','Tuesday'],['W','Wednesday'],['R','Thursday'],['F','Friday'],['S','Saturday'],['N','Sunday']];
const DAY_ORDER = 'MTWRFSN';
const SERVICES = [
  ['trash_days','Trash','#57534e'],
  ['cardboard_days','Cardboard','#a16207'],
  ['recycle_days','Recyclables','#2563eb'],
];
const PAGE_SIZE = 50;

// ── STATE ─────────────────────────────────────────────────────────────
let currentUser = null;
let _clients = [];          // merged: client row + .meta (commercial_accounts)
let _metaMap = {};          // client_id -> commercial_accounts row
let _filtered = [];
let _page = 1;
let _sort = {key:'name', dir:1};
let _detailId = null;
let _events = [];
let _eventLatest = {};
let _evtType = 'lost';
let _outreach = [];
let _lastContact = {};
let _detailContacts = [];
let _pendingFiles = [];
let _lbUrls = {};           // path -> signed url (current detail)

// ── HELPERS ───────────────────────────────────────────────────────────
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function who(){ return currentUser ? (currentUser.display_name || currentUser.username) : ''; }
function companyOf(id){ const c=String(id||'')[0]; return c==='2'?'REIS':c==='3'?'SANTOS':''; }
function uuid(){ return (crypto && crypto.randomUUID) ? crypto.randomUUID() : 'x'+Math.random().toString(36).slice(2)+Date.now().toString(36); }
function ymNow(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function normalizeDays(str){
  const set = new Set(String(str||'').toUpperCase().split('').filter(c=>DAY_ORDER.includes(c)));
  return DAY_ORDER.split('').filter(c=>set.has(c)).join('');
}
function dayCodeHtml(str){
  const code = normalizeDays(str);
  if(!code) return '<span class="daycode none">—</span>';
  const set = new Set(code.split(''));
  return '<span class="daycode">'+DAY_ORDER.split('').map(c=>`<span class="${set.has(c)?'on':'off'}">${c}</span>`).join('')+'</span>';
}
function fmtDateTime(iso){
  if(!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' · '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}
function fmtRel(iso){
  if(!iso) return '';
  const diff = Math.floor((Date.now() - new Date(iso).getTime())/86400000);
  if(diff<=0) return 'today';
  if(diff===1) return 'yesterday';
  if(diff<7) return diff+' days ago';
  if(diff<30) return Math.floor(diff/7)+'w ago';
  if(diff<365) return Math.floor(diff/30)+'mo ago';
  return Math.floor(diff/365)+'y ago';
}
function isVideoFile(f){ return (f.type||'').startsWith('video/'); }
function videoExt(f){ const m=(f.type||'').split('/')[1]||'mp4'; return m==='quicktime'?'mov':m; }

function toast(msg, kind){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + (kind==='ok'?'ok':kind==='err'?'err':'');
  clearTimeout(el._t);
  el._t = setTimeout(()=>el.classList.remove('show'), 2800);
}

// ── AUTH (shared with HELM via same-origin localStorage session) ───────
function readHelmSession(){
  try{
    const raw = sessionStorage.getItem('helm_auth');
    if(!raw || raw==='1') return null;
    const u = JSON.parse(raw);
    return (u && u.username) ? u : null;
  }catch(e){ return null; }
}
function userIsAllowed(u){
  if(!u) return false;
  const un = (u.username||'').toLowerCase();
  if(ALLOWED_USERS.includes(un)) return true;
  if(u.role && ALLOWED_ROLES.includes(u.role)) return true;
  return false;
}
async function initAuth(){
  let session=null;
  try{ session=(await db.auth.getSession()).data.session; }catch(_){}
  if(session){
    let u = readHelmSession();
    if(!u){
      const un=(session.user&&session.user.user_metadata&&session.user.user_metadata.username)||((session.user&&session.user.email)||'').split('@')[0];
      try{ const {data}=await db.from('users').select('*').eq('username',un).single(); u=data; }catch(_){}
      if(u){ try{ sessionStorage.setItem('helm_auth', JSON.stringify(u)); }catch(_){} }
    }
    if(u && userIsAllowed(u)){ currentUser=u; showApp(); return; }
    if(u && !userIsAllowed(u)){
      document.getElementById('loginErr').textContent =
        `Signed in as ${u.display_name||u.username} — but BEACON access is restricted. Ask David to enable it for you.`;
    }
  }
  showLogin();
}
async function doLogin(){
  const un = document.getElementById('loginUser').value.trim().toLowerCase();
  const pw = document.getElementById('loginPw').value;
  const err = document.getElementById('loginErr');
  err.textContent='';
  if(!un || !pw){ err.textContent='Enter username and password.'; return; }
  const {error:authErr} = await db.auth.signInWithPassword({email: un+'@helm.internal', password: pw});
  if(authErr){ err.textContent='Incorrect username or password.'; return; }
  const {data, error} = await db.from('users').select('*').eq('username',un).single();
  if(error || !data){ err.textContent='Signed in, but no profile found — contact David.'; return; }
  if(!userIsAllowed(data)){ err.textContent='You do not have access to BEACON. Contact David.'; return; }
  currentUser = data;
  try{ sessionStorage.setItem('helm_auth', JSON.stringify(data)); }catch(_){}
  showApp();
}
function doLogout(){
  sessionStorage.removeItem('helm_auth');
  currentUser=null;
  db.auth.signOut().finally(()=>location.reload());
}
function showLogin(){
  document.getElementById('loginGate').style.display='';
  document.getElementById('app').style.display='none';
  setTimeout(()=>{ const u=document.getElementById('loginUser'); if(u) u.focus(); }, 50);
}
function showApp(){
  document.getElementById('loginGate').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('topbarUser').textContent = who();
  bootApp();
}

// ── BOOT + DATA LOAD ───────────────────────────────────────────────────
async function bootApp(){
  await Promise.all([loadCommercial(), loadEvents(), loadOutreach()]);
  route();
}
async function fetchAll(table, cols, applyFilters){
  let out=[], from=0;
  while(true){
    let q = db.from(table).select(cols).range(from, from+999);
    if(applyFilters) q = applyFilters(q);
    const {data, error} = await q;
    if(error) throw error;
    out = out.concat(data||[]);
    if(!data || data.length < 1000) break;
    from += 1000;
  }
  return out;
}
async function loadCommercial(){
  try{
    const clients = await fetchAll(
      'clients',
      'client_id,client_name,address,phone,email,service_day,account_role,master_account_id,rate1,rate2,rate3,rate4,rate5',
      q=>q.eq('account_type','commercial').eq('status','Active')
    );
    const meta = await fetchAll('commercial_accounts','*').catch(()=>[]);
    _metaMap = {};
    (meta||[]).forEach(m=>{ _metaMap[m.client_id]=m; });
    _clients = (clients||[]).map(c=>({ ...c, meta: _metaMap[c.client_id]||null }));
    document.getElementById('totalChip').textContent = _clients.length + ' active';
  }catch(e){
    toast('Load failed: '+(e.message||e),'err');
    _clients = [];
  }
}

// ── ROUTER ──────────────────────────────────────────────────────────────
function route(){
  const m = (location.hash||'').match(/^#acct\/(.+)$/);
  if(m){ renderDetail(decodeURIComponent(m[1])); }
  else { showList(); }
}
function showList(){
  document.getElementById('detailView').style.display='none';
  document.getElementById('listView').style.display='';
  renderDashboard();
  renderList();
}

// ── LIST ──────────────────────────────────────────────────────────────
function applyFilterSort(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const toks = q.split(/\s+/).filter(Boolean);
  _filtered = _clients.filter(c=>{
    if(!toks.length) return true;
    const hay = ((c.client_name||'')+' '+(c.client_id||'')+' '+(c.address||'')).toLowerCase();
    return toks.every(t=>hay.includes(t));
  });
  const dir=_sort.dir;
  _filtered.sort((a,b)=>{
    let x,y;
    if(_sort.key==='acct'){ x=Number(a.client_id)||0; y=Number(b.client_id)||0; }
    else if(_sort.key==='addr'){ x=(a.address||'').toLowerCase(); y=(b.address||'').toLowerCase(); }
    else if(_sort.key==='co'){ x=companyOf(a.client_id); y=companyOf(b.client_id); }
    else { x=(a.client_name||'~').toLowerCase(); y=(b.client_name||'~').toLowerCase(); }
    if(x<y) return -1*dir; if(x>y) return 1*dir; return 0;
  });
}
function renderList(){
  applyFilterSort();
  const total=_filtered.length;
  const pages=Math.max(1, Math.ceil(total/PAGE_SIZE));
  if(_page>pages) _page=pages;
  const start=(_page-1)*PAGE_SIZE;
  const rows=_filtered.slice(start, start+PAGE_SIZE);
  const body=document.getElementById('acctBody');

  if(!total){
    body.innerHTML = `<tr><td colspan="7" class="empty">${_clients.length? 'No accounts match your search.' : 'No active commercial accounts found.'}</td></tr>`;
  } else {
    body.innerHTML = rows.map(c=>{
      const co=companyOf(c.client_id);
      const coPill = co ? `<span class="pill ${co.toLowerCase()}">${co}</span>` : '<span class="dim">—</span>';
      const m=c.meta||{};
      const role = c.account_role && c.account_role!=='standalone'
        ? ` <span class="pill role">${c.account_role==='master'?'master':'sub'}</span>` : '';
      return `<tr onclick="location.hash='#acct/'+encodeURIComponent('${esc(c.client_id)}')">
        <td class="name">${recencyDot(c.client_id)}${esc(c.client_name||'(no name)')}${role}${bizBadge(c.client_id)}</td>
        <td class="acct">${esc(c.client_id)}</td>
        <td class="addr">${esc(c.address||'')}</td>
        <td>${coPill}</td>
        <td>${dayCodeHtml(m.trash_days)}</td>
        <td>${dayCodeHtml(m.cardboard_days)}</td>
        <td>${dayCodeHtml(m.recycle_days)}</td>
      </tr>`;
    }).join('');
  }
  // pager + caret
  document.getElementById('rangeLabel').textContent = total ? `${start+1}–${Math.min(start+PAGE_SIZE,total)} of ${total}` : '0 of 0';
  document.getElementById('pageLabel').textContent = `Page ${_page} of ${pages}`;
  document.getElementById('prevBtn').disabled = _page<=1;
  document.getElementById('nextBtn').disabled = _page>=pages;
  document.querySelectorAll('.caret').forEach(el=>{
    el.textContent = (el.dataset.for===_sort.key) ? (_sort.dir>0?'▲':'▼') : '';
  });
}
function changePage(d){ _page+=d; renderList(); }

// ── BUSINESS EVENTS: load + dashboard + detail card ─────────────────────
async function loadEvents(){
  try{
    const data = await fetchAll('commercial_events','*');
    _events = data || [];
    _eventLatest = {};
    _events.slice()
      .sort((a,b)=>{ const d=(a.event_date||'').localeCompare(b.event_date||''); return d!==0?d:(a.id-b.id); })
      .forEach(e=>{ _eventLatest[e.client_id]=e; });
  }catch(_){ _events=[]; _eventLatest={}; }
}
function fmtDate(d){ if(!d) return ''; const x=new Date(String(d)+(String(d).length===10?'T00:00:00':'')); return x.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function todayISO(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function eventsFor(id){
  return _events.filter(e=>e.client_id===id).slice()
    .sort((a,b)=>{ const d=(b.event_date||'').localeCompare(a.event_date||''); return d!==0?d:(b.id-a.id); });
}
function bizBadge(id){

function clientName(id){ const c=_clients.find(x=>x.client_id===id); return c ? (c.client_name||('#'+id)) : ('#'+id); }
function monthLabel(key){ const p=key.split('-'); const d=new Date(Number(p[0]),Number(p[1])-1,1); return d.toLocaleDateString('en-US',{month:'short',year:'2-digit'}); }
function fmtK(n){ n=Number(n)||0; return n>=1000 ? (n/1000).toFixed(n%1000?1:0)+'k' : String(Math.round(n)); }

function renderDashboard(){
  const body=document.getElementById('dashBody');
  if(!body) return;
  const now=new Date();
  const curKey=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  const months=[];
  for(let i=11;i>=0;i--){ const d=new Date(now.getFullYear(), now.getMonth()-i, 1); months.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')); }
  const lost=_events.filter(e=>e.event_type==='lost');
  const news=_events.filter(e=>e.event_type==='new');
  const lostC={}, newC={};
  months.forEach(m=>{ lostC[m]=0; newC[m]=0; });
  lost.forEach(e=>{ const m=(e.event_date||'').slice(0,7); if(m in lostC) lostC[m]++; });
  news.forEach(e=>{ const m=(e.event_date||'').slice(0,7); if(m in newC) newC[m]++; });
  const inMonth=(arr,k)=>arr.filter(e=>(e.event_date||'').slice(0,7)===k);
  const lostThis=inMonth(lost,curKey), newThis=inMonth(news,curKey);
  const lost12=months.reduce((s,m)=>s+lostC[m],0);
  const new12=months.reduce((s,m)=>s+newC[m],0);
  const net=new12-lost12;
  const maxC=Math.max(1, ...months.map(m=>lostC[m]));
  const recent=lost.slice().sort((a,b)=>(b.event_date||'').localeCompare(a.event_date||'')).slice(0,5);
  const kpi=(label,num,val,kind,signed)=>`<div class="kpi ${kind}">
      <div class="kpi-num">${signed&&num>=0?'+':''}${num}</div>
      <div class="kpi-label">${label}</div>
      ${val!=null&&val>0?`<div class="kpi-sub">$${fmtK(val)}/mo</div>`:''}
    </div>`;
  body.innerHTML=`
    <div class="kpi-row">
      ${kpi('Lost this month', lostThis.length, null, 'lost')}
      ${kpi('Lost · 12 mo', lost12, null, 'lost')}
      ${kpi('New this month', newThis.length, null, 'new')}
      ${kpi('Net · 12 mo', net, null, net>=0?'new':'lost', true)}
    </div>
    <div class="dash-section">
      <div class="dash-section-title">Lost business by month</div>
      <div class="bars">
        ${months.map(m=>{
          const c=lostC[m], pct=c?Math.max(Math.round(c/maxC*100),5):0;
          return `<div class="bar-row">
            <div class="bar-label">${monthLabel(m)}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
            <div class="bar-val">${c?c+(c===1?' acct':' accts'):''}</div>
          </div>`;
        }).join('')}
      </div>
    </div>
    ${recent.length?`<div class="dash-section">
      <div class="dash-section-title">Recent losses &amp; reasons</div>
      <div class="recent-losses">
        ${recent.map(e=>`<div class="loss-row" onclick="location.hash='#acct/'+encodeURIComponent('${esc(e.client_id)}')">
          <div class="loss-name">${esc(clientName(e.client_id))}</div>
          <div class="loss-date">${fmtDate(e.event_date)}</div>
          <div class="loss-reason">${e.reason?esc(e.reason):`<span class="dim">No reason given</span>`}</div>
        </div>`).join('')}
      </div>
    </div>`:''}
  `;
}

// ── CONTACTS + CONTACT LOG (outreach) ────────────────────────────────────
async function loadOutreach(){
  try{
    const data=await fetchAll('commercial_outreach','*');
    _outreach=data||[];
    _lastContact={};
    _outreach.slice()
      .sort((a,b)=>{ const d=(a.contact_date||'').localeCompare(b.contact_date||''); return d!==0?d:(a.id-b.id); })
      .forEach(o=>{ _lastContact[o.client_id]={contact_date:o.contact_date, contacted_by:o.contacted_by}; });
  }catch(_){ _outreach=[]; _lastContact={}; }
}
function contactRecency(id){
  const last=_lastContact[id];
  if(!last || !last.contact_date) return {level:'never', days:null, by:null};
  const days=Math.floor((Date.now()-new Date(last.contact_date+'T00:00:00').getTime())/86400000);
  const level = days<=30?'fresh':days<=90?'stale':'cold';
  return {level, days, by:last.contacted_by};
}
function recencyDot(id){
  const r=contactRecency(id);
  const label = r.level==='never' ? 'Never contacted' : `Last contacted ${r.days===0?'today':r.days===1?'yesterday':r.days+'d ago'}${r.by?' by '+r.by:''}`;
  return `<span class="cdot ${r.level}" title="${esc(label)}"></span>`;
}
function contactChipHtml(id){
  const r=contactRecency(id);
  if(r.level==='never') return `<span class="contact-chip never">○ Never contacted — log your first outreach</span>`;
  const ago = r.days===0?'today':r.days===1?'yesterday':r.days+' days ago';
  return `<span class="contact-chip ${r.level}">● Last contacted ${ago}${r.by?' by '+esc(r.by):''}</span>`;
}

function normalizePhone(s){
  if(!s) return s;
  const d=String(s).replace(/\D/g,'');
  if(d.length===10) return d.slice(0,3)+'-'+d.slice(3,6)+'-'+d.slice(6);
  if(d.length===11 && d[0]==='1') return d.slice(1,4)+'-'+d.slice(4,7)+'-'+d.slice(7);
  return s;
}

        return `<div class="svc-row" data-service="${key}">
          <div class="svc-label"><span class="dot" style="background:${color}"></span>${label}</div>
          <div class="svc-days">${DAYS.map(([l,full])=>`<button class="daybtn${code.includes(l)?' active':''}" data-day="${l}" title="${full}" onclick="toggleDay('${esc(id)}','${key}',this)">${l}</button>`).join('')}</div>
          <span class="svc-saved">Saved ✓</span>
        </div>`;
      }).join('')}
      <div class="svc-legend">M Mon · T Tue · W Wed · R Thu · F Fri · S Sat · N Sun — tap a day to toggle; changes save automatically.</div>
    </div>

    <div class="card">
      <h3>Dispatch Notes</h3>
      <textarea class="notes" id="dispatchNotes" placeholder="Gate codes, container locations, special instructions…" onblur="saveNotes('${esc(id)}')">${esc(meta.dispatch_notes||'')}</textarea>
    </div>

    <div class="card">
      <div class="hist-add-bar">
        <h3 style="margin:0">History</h3>
        <button class="btn-primary" onclick="openComposer()">＋ Add photos / note</button>
      </div>
      <div class="hist-composer" id="histComposer" style="display:none">
        <textarea class="notes" id="histNote" placeholder="What's going on at this site? (optional)"></textarea>
        <div class="hist-composer-actions">
          <button class="btn" onclick="pickHistoryFiles()">📎 Attach photos / video</button>
          <span id="histFileInfo" class="muted"></span>
          <div style="flex:1"></div>
          <button class="btn" onclick="closeComposer()">Cancel</button>
          <button class="btn-primary" id="histSaveBtn" onclick="saveHistory()">Save</button>
        </div>
        <div id="histPreview" class="hist-preview"></div>
      </div>
      <div id="historyTimeline" class="timeline"></div>
    </div>
  `;
  renderTimeline(history);
}

async function renderTimeline(history){
  const el=document.getElementById('historyTimeline');
  if(!el) return;
  if(!history.length){ el.innerHTML = `<div class="dim" style="padding:6px 0">No history yet. Add photos or a note above.</div>`; return; }
  // collect + sign all photo paths
  const paths=[];
  history.forEach(h=>(h.photos||[]).forEach(p=>{ if(p&&p.path) paths.push(p.path); }));
  _lbUrls = await signPaths(paths);
  el.innerHTML = history.map((h,i)=>{
    const photos=(h.photos||[]).map(p=>{
      const url=_lbUrls[p.path]||'';
      const isVid = p.type==='video';
      if(!url) return `<div class="thumb"><div class="dim" style="padding:8px;font-size:11px">media</div></div>`;
      const inner = isVid
        ? `<video src="${esc(url)}" muted></video><span class="vbadge">▶</span>`
        : `<img src="${esc(url)}" loading="lazy"/>`;
      return `<div class="thumb" onclick="openLightbox('${esc(p.path)}',${isVid})">${inner}</div>`;
    }).join('');
    return `<div class="tl-entry">
      <div class="tl-rail"><div class="dot"></div>${i<history.length-1?'<div class="line"></div>':''}</div>
      <div class="tl-body">
        <div class="tl-meta"><b>${esc(fmtRel(h.created_at))}</b> · ${esc(fmtDateTime(h.created_at))}${h.created_by?` · ${esc(h.created_by)}`:''}</div>
        ${h.notes?`<div class="tl-note">${esc(h.notes)}</div>`:''}
        ${photos?`<div class="tl-photos">${photos}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

// ── SCHEDULE EDIT ───────────────────────────────────────────────────────
async function toggleDay(clientId, serviceKey, btn){
  btn.classList.toggle('active');
  const row = btn.closest('.svc-row');
  const code = normalizeDays(Array.from(row.querySelectorAll('.daybtn.active')).map(b=>b.dataset.day).join(''));
  const patch = {}; patch[serviceKey]=code;
  const ok = await saveSchedule(clientId, patch);
  if(ok){
    const s=row.querySelector('.svc-saved');
    s.classList.add('show'); clearTimeout(s._t); s._t=setTimeout(()=>s.classList.remove('show'),1400);
  }
}
async function saveNotes(clientId){
  const val = document.getElementById('dispatchNotes').value;
  if((_metaMap[clientId]||{}).dispatch_notes === val) return;
  await saveSchedule(clientId, {dispatch_notes: val});
}
async function saveSchedule(clientId, patch){
  const row = { client_id:clientId, ...patch, updated_at:new Date().toISOString(), updated_by:who() };
  const {error} = await db.from('commercial_accounts').upsert(row, {onConflict:'client_id'});
  if(error){ toast('Save failed: '+error.message,'err'); return false; }
  _metaMap[clientId] = { ...(_metaMap[clientId]||{client_id:clientId}), ...patch };
  const c=_clients.find(x=>x.client_id===clientId); if(c) c.meta=_metaMap[clientId];
  return true;
}

// ── HISTORY ADD ─────────────────────────────────────────────────────────
function openComposer(){ document.getElementById('histComposer').style.display=''; }
function closeComposer(){
  _pendingFiles=[];
  document.getElementById('histComposer').style.display='none';
  document.getElementById('histNote').value='';
  document.getElementById('histFileInfo').textContent='';
  document.getElementById('histPreview').innerHTML='';
}
function pickHistoryFiles(){ document.getElementById('historyFileInput').click(); }
document.getElementById('historyFileInput').addEventListener('change', e=>{
  _pendingFiles = Array.from(e.target.files||[]);
  e.target.value='';
  const info=document.getElementById('histFileInfo');
  const prev=document.getElementById('histPreview');
  info.textContent = _pendingFiles.length ? `${_pendingFiles.length} file(s) selected` : '';
  prev.innerHTML = _pendingFiles.map(f=>{
    if(isVideoFile(f)) return `<div class="thumb" style="display:flex;align-items:center;justify-content:center;background:var(--surface-3);font-size:11px">🎥</div>`;
    const u=URL.createObjectURL(f);
    return `<img class="thumb" src="${u}"/>`;
  }).join('');
});
async function resizeImage(file, maxDim, quality){
  return new Promise((resolve,reject)=>{
    const img=new Image(); const url=URL.createObjectURL(file);
    img.onload=()=>{
      let w=img.width, h=img.height;
      if(w>maxDim||h>maxDim){ if(w>=h){ h=Math.round(h*maxDim/w); w=maxDim; } else { w=Math.round(w*maxDim/h); h=maxDim; } }
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      cv.toBlob(b=>{ URL.revokeObjectURL(url); b?resolve(b):reject(new Error('resize failed')); },'image/jpeg',quality||0.85);
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); reject(new Error('image load failed')); };
    img.src=url;
  });
}
async function saveHistory(){
  const clientId=_detailId;
  const note=document.getElementById('histNote').value.trim();
  const files=_pendingFiles.slice();
  if(!note && !files.length){ toast('Add a note or a photo first.','err'); return; }
  const btn=document.getElementById('histSaveBtn'); btn.disabled=true; btn.textContent='Saving…';
  const photos=[];
  for(const f of files){
    try{
      let blob=f, ext, type;
      if(isVideoFile(f)){ ext=videoExt(f); type='video'; }
      else { blob=await resizeImage(f,1600,0.85); ext='jpg'; type='image'; }
      const path=`commercial/${clientId}/${ymNow()}/${uuid()}.${ext}`;
      const {error}=await db.storage.from(BUCKET).upload(path, blob, {contentType:type==='video'?f.type:'image/jpeg', upsert:false});
      if(error){ toast('Upload failed: '+error.message,'err'); continue; }
      photos.push({path, type, uploaded_at:new Date().toISOString(), uploaded_by:who()});
    }catch(e){ toast('Upload error: '+(e.message||e),'err'); }
  }
  const {error}=await db.from('commercial_history').insert({
    client_id:clientId, entry_type:photos.length?'photo':'note', notes:note||null, photos, created_by:who()
  });
  btn.disabled=false; btn.textContent='Save';
  if(error){ toast('Save failed: '+error.message,'err'); return; }
  toast('Added to history','ok');
  closeComposer();
  const {data}=await db.from('commercial_history').select('*').eq('client_id',clientId).order('created_at',{ascending:false});
  renderTimeline(data||[]);
}

// ── STORAGE SIGNING + LIGHTBOX ───────────────────────────────────────────
async function signPaths(paths){
  const map={};
  const uniq=[...new Set(paths)];
  if(!uniq.length) return map;
  try{
    const {data}=await db.storage.from(BUCKET).createSignedUrls(uniq, 3600);
    (data||[]).forEach(d=>{ if(d.signedUrl) map[d.path]=d.signedUrl; });
  }catch(_){}
  return map;
}
function openLightbox(path, isVid){
  const url=_lbUrls[path]; if(!url) return;
  document.getElementById('lbContent').innerHTML = isVid
    ? `<video src="${esc(url)}" controls autoplay></video>`
    : `<img src="${esc(url)}"/>`;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('show');
  document.getElementById('lbContent').innerHTML='';
}
