<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>BEACON — Retention & Outreach</title>
<link rel="manifest" href="manifest.webmanifest"/>
<meta name="theme-color" content="#0a0a0f"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="BEACON"/>
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20viewBox%3D%270%200%20180%20180%27%3E%3Crect%20width%3D%27180%27%20height%3D%27180%27%20rx%3D%2740%27%20fill%3D%27%230a0a0f%27%2F%3E%3Cellipse%20cx%3D%2790%27%20cy%3D%2755%27%20rx%3D%2755%27%20ry%3D%2716%27%20fill%3D%27%23f59e0b%27%20opacity%3D%270.45%27%2F%3E%3Cpolygon%20points%3D%2774%2C150%20106%2C150%20100%2C58%2080%2C58%27%20fill%3D%27%23f5f5f4%27%2F%3E%3Crect%20x%3D%2776%27%20y%3D%2750%27%20width%3D%2728%27%20height%3D%2710%27%20fill%3D%27%23dc2626%27%2F%3E%3Ccircle%20cx%3D%2790%27%20cy%3D%2740%27%20r%3D%2710%27%20fill%3D%27%23f59e0b%27%2F%3E%3Crect%20x%3D%2776%27%20y%3D%2780%27%20width%3D%2728%27%20height%3D%276%27%20fill%3D%27%23dc2626%27%2F%3E%3Crect%20x%3D%2776%27%20y%3D%27108%27%20width%3D%2728%27%20height%3D%276%27%20fill%3D%27%23dc2626%27%2F%3E%3Crect%20x%3D%2777%27%20y%3D%27135%27%20width%3D%2726%27%20height%3D%276%27%20fill%3D%27%23dc2626%27%2F%3E%3C%2Fsvg%3E"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── BEACON: dark lighthouse-at-night theme ─────────────────────────── */
:root{
  --bg:        #0a0a0f;
  --surface:   #14141f;
  --surface-2: #1c1c2e;
  --surface-3: #252538;
  --border:    rgba(255,255,255,0.07);
  --border-2:  rgba(255,255,255,0.12);
  --text:      #f5f5f4;
  --text-mute: #a8a29e;
  --text-dim:  #6b7280;
  --amber:     #f59e0b;
  --amber-dim: #d97706;
  --amber-soft:rgba(245,158,11,0.12);
  --green:     #10b981;
  --green-dim: #047857;
  --red:       #ef4444;
  --red-dim:   #b91c1c;
  --blue:      #3b82f6;
  --purple:    #a78bfa;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  background:var(--bg);color:var(--text);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  min-height:100vh;
}
button,input,select,textarea{font-family:inherit;}
a{color:var(--amber);text-decoration:none;}
a:hover{text-decoration:underline;}

/* ── LOGIN GATE ─────────────────────────────────────────────────────── */
#loginGate{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at top, rgba(245,158,11,0.08) 0%, transparent 60%);
  padding:24px;
}
.login-card{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:36px 32px;max-width:380px;width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}
.login-brand{display:flex;align-items:center;gap:12px;margin-bottom:26px;}
.login-brand svg{width:44px;height:44px;}
.login-brand-text h1{font-size:22px;font-weight:800;letter-spacing:.04em;color:var(--text);}
.login-brand-text .sub{font-size:11px;color:var(--text-dim);letter-spacing:.06em;text-transform:uppercase;margin-top:2px;}
.login-card label{display:block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-mute);margin-bottom:6px;font-weight:600;}
.login-card input{
  width:100%;padding:11px 14px;background:var(--surface-2);
  border:1px solid var(--border);border-radius:8px;
  color:var(--text);font-size:14px;margin-bottom:14px;
}
.login-card input:focus{border-color:var(--amber);outline:none;}
.login-btn{
  width:100%;padding:12px;background:var(--amber);color:#1a0f00;
  border:none;border-radius:8px;font-weight:700;letter-spacing:.02em;
  font-size:14px;cursor:pointer;transition:background .15s,transform .1s;
}
.login-btn:hover{background:#fbbf24;}
.login-btn:active{transform:scale(0.98);}
.login-err{color:var(--red);font-size:12px;margin-top:10px;text-align:center;min-height:18px;}
.login-back{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:18px;font-size:12px;color:var(--text-dim);
  padding:8px 0;
}
.login-back:hover{color:var(--amber);}

/* ── APP SHELL ──────────────────────────────────────────────────────── */
#app{display:none;flex-direction:column;min-height:100vh;}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(180deg,#0d0d18 0%,#0a0a0f 100%);
  border-bottom:1px solid var(--border);
  padding:0 18px;
  padding-top:env(safe-area-inset-top);
  padding-left:max(18px,env(safe-area-inset-left));
  padding-right:max(18px,env(safe-area-inset-right));
  height:calc(54px + env(safe-area-inset-top));
  position:sticky;top:0;z-index:100;backdrop-filter:blur(8px);
}
.brand{display:flex;align-items:center;gap:11px;}
.brand svg{width:28px;height:28px;}
.brand .wordmark{
  font-weight:800;font-size:17px;letter-spacing:.12em;color:var(--text);
}
.brand .tagline{
  font-size:10px;color:var(--text-dim);letter-spacing:.08em;text-transform:uppercase;
  margin-top:-2px;
}
.topbar-right{display:flex;align-items:center;gap:10px;}
.topbar-user{font-size:13px;color:var(--text-mute);font-weight:500;}
@media (max-width:540px){ .topbar-user{display:none;} }
.btn-topbar{
  background:transparent;border:1px solid var(--border-2);
  color:var(--text-mute);font-size:12px;font-weight:500;
  padding:6px 12px;border-radius:6px;cursor:pointer;
  display:inline-flex;align-items:center;gap:6px;transition:all .12s;
}
.btn-topbar:hover{background:var(--surface-2);color:var(--text);border-color:var(--amber);}
.btn-topbar.danger:hover{border-color:var(--red);color:var(--red);}
.btn-topbar svg{width:13px;height:13px;}

/* Tabs strip below the topbar */
.tabs{
  display:flex;gap:2px;padding:0 18px;
  background:#0a0a0f;border-bottom:1px solid var(--border);
  position:sticky;top:calc(54px + env(safe-area-inset-top));z-index:90;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{
  background:transparent;border:none;color:var(--text-dim);
  padding:14px 16px;font-size:13px;font-weight:600;letter-spacing:.01em;
  cursor:pointer;border-bottom:2px solid transparent;
  transition:color .12s,border-color .12s;white-space:nowrap;
  font-family:inherit;
}
.tab-btn:hover{color:var(--text-mute);}
.tab-btn.active{color:var(--amber);border-bottom-color:var(--amber);}
.tab-btn .badge{
  display:inline-block;background:var(--surface-3);color:var(--text);
  font-size:10px;font-weight:700;padding:2px 7px;border-radius:9px;margin-left:6px;
}
.tab-btn.active .badge{background:var(--amber);color:#1a0f00;}

main{
  flex:1;padding:24px 18px;
  padding-bottom:max(120px,env(safe-area-inset-bottom));
  max-width:1280px;margin:0 auto;width:100%;
}

/* ── DASHBOARD KPI CARDS ────────────────────────────────────────────── */
.dash-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:14px;margin-bottom:24px;
}
.kpi-card{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:18px 20px;position:relative;overflow:hidden;
  transition:border-color .15s,transform .1s;
}
.kpi-card:hover{border-color:var(--border-2);}
.kpi-card.amber::before, .kpi-card.green::before, .kpi-card.red::before, .kpi-card.blue::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
}
.kpi-card.amber::before{background:linear-gradient(90deg,var(--amber),transparent);}
.kpi-card.green::before{background:linear-gradient(90deg,var(--green),transparent);}
.kpi-card.red::before  {background:linear-gradient(90deg,var(--red),transparent);}
.kpi-card.blue::before {background:linear-gradient(90deg,var(--blue),transparent);}
.kpi-label{
  font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--text-dim);margin-bottom:8px;
}
.kpi-value{font-size:28px;font-weight:800;color:var(--text);letter-spacing:-.02em;line-height:1.1;}
.kpi-value.amber{color:var(--amber);}
.kpi-value.green{color:#34d399;}
.kpi-value.red  {color:#f87171;}
.kpi-sub{font-size:12px;color:var(--text-mute);margin-top:4px;}

.section-hdr{
  font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--text-dim);margin:20px 0 12px;display:flex;align-items:center;gap:10px;
}
.section-hdr::after{
  content:'';flex:1;height:1px;background:var(--border);
}

/* ── ACCOUNTS LIST ──────────────────────────────────────────────────── */
.filter-strip{
  display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;align-items:center;
}
.filter-chip{
  background:var(--surface);border:1px solid var(--border);
  color:var(--text-mute);font-size:12px;font-weight:500;
  padding:6px 12px;border-radius:16px;cursor:pointer;
  display:inline-flex;align-items:center;gap:6px;transition:all .12s;
}
.filter-chip:hover{border-color:var(--border-2);color:var(--text);}
.filter-chip.active{background:var(--amber);color:#1a0f00;border-color:var(--amber);font-weight:700;}
.filter-chip .count{
  background:rgba(0,0,0,0.2);padding:1px 7px;border-radius:9px;
  font-size:10px;font-weight:700;
}
.filter-chip.active .count{background:rgba(26,15,0,0.25);color:#1a0f00;}

.search-row{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap;}
.search-input{
  flex:1;min-width:220px;
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:10px 14px;color:var(--text);font-size:14px;
}
.search-input::placeholder{color:var(--text-dim);}
.search-input:focus{border-color:var(--amber);outline:none;}

.accounts-table{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  overflow:hidden;
}
.accounts-row{
  display:grid;grid-template-columns:1.6fr 0.9fr 1fr 0.9fr 0.7fr 0.7fr 0.7fr;
  gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);
  align-items:center;font-size:13px;cursor:pointer;transition:background .12s;
}
.accounts-row:hover{background:var(--surface-2);}
.accounts-row:last-child{border-bottom:none;}
.accounts-row.head{
  font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--text-dim);background:#0e0e18;cursor:default;
}
.accounts-row.head:hover{background:#0e0e18;}
.accounts-name{font-weight:600;color:var(--text);}
.accounts-name .acct{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);font-weight:500;margin-left:6px;}
.accounts-cell-muted{color:var(--text-mute);}
.accounts-cell-money{font-family:'DM Mono',monospace;font-weight:600;color:var(--green);text-align:right;}
.accounts-cell-money.lost{color:var(--red);}
@media (max-width:780px){
  .accounts-row{grid-template-columns:1.4fr auto;gap:6px;}
  .accounts-row > *:not(:nth-child(1)):not(:nth-child(2)){display:none;}
  .accounts-row.head{display:none;}
  .accounts-row{padding:14px 16px;}
}

.pill{
  display:inline-flex;align-items:center;padding:2px 9px;border-radius:11px;
  font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
  font-family:'Inter',sans-serif;
}
.pill.event-new   {background:rgba(16,185,129,0.15);color:#34d399;border:1px solid rgba(16,185,129,0.3);}
.pill.event-lost  {background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3);}
.pill.stage-new           {background:rgba(245,158,11,0.15);color:var(--amber);border:1px solid rgba(245,158,11,0.3);}
.pill.stage-active        {background:rgba(16,185,129,0.15);color:#34d399;border:1px solid rgba(16,185,129,0.3);}
.pill.stage-at_risk       {background:rgba(245,158,11,0.15);color:var(--amber);border:1px solid rgba(245,158,11,0.3);}
.pill.stage-won_back      {background:rgba(167,139,250,0.15);color:var(--purple);border:1px solid rgba(167,139,250,0.3);}
.pill.stage-new_loss      {background:rgba(239,68,68,0.18);color:#f87171;border:1px solid rgba(239,68,68,0.35);}
.pill.stage-first_contact {background:rgba(245,158,11,0.18);color:var(--amber);border:1px solid rgba(245,158,11,0.35);}
.pill.stage-engaged       {background:rgba(59,130,246,0.18);color:#60a5fa;border:1px solid rgba(59,130,246,0.35);}
.pill.stage-negotiating   {background:rgba(167,139,250,0.18);color:var(--purple);border:1px solid rgba(167,139,250,0.35);}
.pill.stage-permanent     {background:rgba(120,113,108,0.18);color:var(--text-mute);border:1px solid rgba(120,113,108,0.35);}
.pill.stage-archived      {background:var(--surface-3);color:var(--text-dim);border:1px solid var(--border);}

/* ── EXIT PIPELINE VIEW ─────────────────────────────────────────────── */
.pipeline-board{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:14px;
}
.pipeline-col{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  overflow:hidden;display:flex;flex-direction:column;min-height:300px;
}
.pipeline-col-hdr{
  padding:12px 14px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.pipeline-col-hdr h3{
  font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--text);
}
.pipeline-col-stats{font-size:11px;color:var(--text-dim);}
.pipeline-col-stats .count{
  background:var(--surface-3);color:var(--text);
  font-weight:700;padding:2px 7px;border-radius:9px;margin-right:6px;
}
.pipeline-col-body{flex:1;padding:8px;overflow-y:auto;max-height:60vh;}
.pipeline-card{
  background:var(--surface-2);border:1px solid var(--border);border-radius:7px;
  padding:10px 12px;margin-bottom:8px;cursor:pointer;
  transition:border-color .12s,transform .1s;
}
.pipeline-card:hover{border-color:var(--amber);}
.pipeline-card-name{font-weight:600;color:var(--text);font-size:13px;margin-bottom:3px;}
.pipeline-card-meta{font-size:11px;color:var(--text-dim);display:flex;justify-content:space-between;align-items:center;gap:8px;}
.pipeline-card-meta .money{font-family:'DM Mono',monospace;color:#f87171;font-weight:600;}
.pipeline-empty{padding:20px;text-align:center;color:var(--text-dim);font-size:12px;font-style:italic;}

/* ── FAB ────────────────────────────────────────────────────────────── */
.fab{
  position:fixed;
  bottom:max(28px,calc(env(safe-area-inset-bottom) + 18px));
  right:max(28px,calc(env(safe-area-inset-right) + 18px));
  width:60px;height:60px;border-radius:50%;
  background:var(--amber);color:#1a0f00;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 28px rgba(245,158,11,0.4);
  font-size:30px;line-height:1;z-index:50;
  transition:transform .12s,background .15s;
}
.fab:hover{background:#fbbf24;transform:scale(1.06);}

/* ── MODALS ─────────────────────────────────────────────────────────── */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);
  display:none;align-items:flex-start;justify-content:center;
  z-index:9000;padding:24px 16px;overflow-y:auto;
  animation:fadeIn .12s ease-out;
  backdrop-filter:blur(4px);
}
.modal-backdrop.open{display:flex;}
@keyframes fadeIn{from{background:rgba(0,0,0,0);backdrop-filter:blur(0);}to{background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);}}
.modal-sheet{
  background:var(--surface);border:1px solid var(--border-2);border-radius:12px;
  max-width:680px;width:100%;margin-top:5vh;
  max-height:88vh;display:flex;flex-direction:column;
  box-shadow:0 30px 80px rgba(0,0,0,0.6);
  animation:slideUp .18s ease-out;
}
.modal-sheet.wide{max-width:980px;}
.modal-sheet.narrow{max-width:460px;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-hdr{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 22px;border-bottom:1px solid var(--border);
}
.modal-hdr h2{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.005em;}
.modal-hdr h2 .sub{font-size:11px;color:var(--text-dim);font-weight:500;margin-left:8px;letter-spacing:0;}
.modal-close{
  background:transparent;border:none;color:var(--text-dim);
  font-size:24px;width:30px;height:30px;border-radius:6px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-family:inherit;
}
.modal-close:hover{background:var(--surface-2);color:var(--text);}
.modal-body{padding:20px 22px;overflow-y:auto;flex:1;}
.modal-ftr{
  padding:14px 22px;border-top:1px solid var(--border);
  display:flex;justify-content:flex-end;gap:8px;background:#0e0e18;
}

/* Form fields */
.fld{margin-bottom:14px;}
.fld-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
@media (max-width:560px){ .fld-row{grid-template-columns:1fr;} }
.fld label{
  display:block;font-size:10px;letter-spacing:.06em;text-transform:uppercase;
  color:var(--text-mute);margin-bottom:5px;font-weight:600;
}
.fld input, .fld select, .fld textarea{
  width:100%;padding:10px 12px;
  background:var(--surface-2);border:1px solid var(--border);border-radius:7px;
  color:var(--text);font-size:13px;font-family:inherit;
}
.fld input:focus, .fld select:focus, .fld textarea:focus{border-color:var(--amber);outline:none;}
.fld textarea{min-height:80px;resize:vertical;}
.fld .hint{font-size:11px;color:var(--text-dim);margin-top:4px;font-style:italic;}
.fld input::placeholder, .fld textarea::placeholder{color:var(--text-dim);}

.radio-grp{display:flex;gap:8px;}
.radio-grp label{
  flex:1;padding:11px 12px;background:var(--surface-2);border:1px solid var(--border);
  border-radius:7px;cursor:pointer;text-align:center;font-size:13px;font-weight:600;
  text-transform:none;letter-spacing:0;color:var(--text-mute);
  display:flex;align-items:center;justify-content:center;gap:6px;transition:all .12s;
  margin-bottom:0;
}
.radio-grp label.checked{border-color:var(--amber);color:var(--amber);background:var(--amber-soft);}
.radio-grp input{display:none;}

.btn-primary{
  background:var(--amber);color:#1a0f00;border:none;
  padding:9px 18px;border-radius:6px;font-weight:700;font-size:13px;cursor:pointer;
  letter-spacing:.01em;transition:background .15s;
}
.btn-primary:hover{background:#fbbf24;}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.btn-secondary{
  background:transparent;border:1px solid var(--border-2);color:var(--text-mute);
  padding:9px 18px;border-radius:6px;font-weight:500;font-size:13px;cursor:pointer;
  font-family:inherit;
}
.btn-secondary:hover{background:var(--surface-2);color:var(--text);}
.btn-danger{
  background:transparent;border:1px solid rgba(239,68,68,0.3);color:#f87171;
  padding:9px 16px;border-radius:6px;font-weight:600;font-size:13px;cursor:pointer;
  font-family:inherit;
}
.btn-danger:hover{background:rgba(239,68,68,0.1);}

/* Client search dropdown inside Add Account modal */
.client-search-results{
  position:absolute;top:100%;left:0;right:0;margin-top:3px;
  background:var(--surface-2);border:1px solid var(--border-2);border-radius:7px;
  max-height:240px;overflow-y:auto;z-index:30;
  box-shadow:0 8px 24px rgba(0,0,0,0.5);
}
.client-search-row{

}

.client-search-empty{padding:14px;color:var(--text-dim);font-size:12px;font-style:italic;text-align:center;}

/* ── DETAIL PANEL ───────────────────────────────────────────────────── */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 22px;margin-bottom:18px;}
@media (max-width:560px){ .detail-grid{grid-template-columns:1fr;} }
.detail-fld label{

.outreach-list{margin-top:10px;}
.outreach-entry{
  background:var(--surface-2);border:1px solid var(--border);border-radius:8px;

}
.outreach-entry .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;gap:8px;flex-wrap:wrap;}
.outreach-entry .otype{

  color:var(--amber);
}
.outreach-entry .odate{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;}
.outreach-entry .outcome{

}
.outreach-entry .outcome.spoke      {background:rgba(16,185,129,0.15);color:#34d399;}
.outreach-entry .outcome.interested {background:rgba(245,158,11,0.18);color:var(--amber);}
.outreach-entry .outcome.won_back   {background:rgba(167,139,250,0.18);color:var(--purple);}
.outreach-entry .outcome.declined   {background:rgba(239,68,68,0.15);color:#f87171;}
.outreach-entry .onotes{font-size:13px;color:var(--text-mute);margin-top:4px;line-height:1.45;}
.outreach-entry .ostep{
  font-size:11px;color:var(--amber);margin-top:6px;
  padding:4px 8px;background:var(--amber-soft);border-radius:5px;

/* ── REPORTS ────────────────────────────────────────────────────────── */
.report-section{

/* ── TOAST ──────────────────────────────────────────────────────────── */
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);
  background:var(--surface-2);border:1px solid var(--border-2);

}

.toast.ok{border-color:rgba(16,185,129,0.4);}
.toast.err{border-color:rgba(239,68,68,0.4);}

<script>
// ── CONFIG ─────────────────────────────────────────────────────────────
const SUPABASE_URL   = 'https://iiqlhqtyyqctgupalrlc.supabase.co';
const SUPABASE_ANON  = 'sb_publishable_JAASDdg8OERvpDTnEeLd5Q_Re48qR1I';
const ALLOWED_USERS  = ['david','chris','admin','jarrett'];
const ALLOWED_ROLES  = ['admin'];   // anyone with role='admin' can also access

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON);

// ── STATE ──────────────────────────────────────────────────────────────
let currentUser   = null;
let _accounts     = [];     // beacon_accounts rows
let _salesReps    = [];     // user.display_name list (filtered)
let _clientsCache = null;   // HELM clients (lazy load for the search input)
let _currentTab   = 'dashboard';
let _filter       = 'all';
let _searchTerm   = '';
let _editingId    = null;   // when set, Add modal is in edit mode
let _detailId     = null;
let _confirmCb    = null;

function esc(s){
  return String(s==null?'':s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function fmtMoney(n){
  if(n==null || isNaN(n)) return '—';
  return '$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtDate(iso){
  if(!iso) return '—';
  const d = new Date(iso+(iso.length===10?'T00:00:00':''));
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function fmtRelDate(iso){
  if(!iso) return '';
  const d = new Date(iso+(iso.length===10?'T00:00:00':''));
  const diff = Math.floor((Date.now() - d.getTime())/86400000);
  if(diff===0) return 'today';
  if(diff===1) return 'yesterday';
  if(diff<7)   return diff+' days ago';
  if(diff<30)  return Math.floor(diff/7)+'w ago';
  if(diff<365) return Math.floor(diff/30)+'mo ago';
  return Math.floor(diff/365)+'y ago';
}
function todayISO(){
  const d = new Date(); d.setHours(0,0,0,0);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function toast(msg, kind){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + (kind==='ok' ? 'ok' : kind==='err' ? 'err' : '');
  clearTimeout(el._t);
  el._t = setTimeout(()=>{ el.classList.remove('show'); }, 2800);
}

// ── AUTH ──────────────────────────────────────────────────────────────
function readHelmSession(){
  try {
    const raw = sessionStorage.getItem('helm_auth');
    if(!raw || raw === '1') return null;
    const u = JSON.parse(raw);
    return (u && u.username) ? u : null;
  } catch(e){ return null; }
}
function userIsAllowed(u){
  if(!u) return false;
  const un = (u.username || '').toLowerCase();
  if(ALLOWED_USERS.includes(un)) return true;
  if(u.role && ALLOWED_ROLES.includes(u.role)) return true;
  return false;
}
async function initAuth(){
  // Try the shared HELM session first (the most common path: user clicked
  // BEACON from HELM, gets dropped in already logged in).
  const u = readHelmSession();
  if(u && userIsAllowed(u)){
    currentUser = u;
    showApp();
    return;
  }
  if(u && !userIsAllowed(u)){
    // Someone's logged in to HELM but not authorized for BEACON.
    document.getElementById('loginErr').textContent =
      `Signed in as ${u.display_name||u.username} — but BEACON access is restricted. Ask David to enable it for you.`;
  }
  showLogin();
}
async function doLogin(){
  const un = document.getElementById('loginUser').value.trim().toLowerCase();
  const pw = document.getElementById('loginPw').value;
  const err = document.getElementById('loginErr');
  err.textContent = '';
  if(!un || !pw){ err.textContent = 'Enter username and password.'; return; }
  const {data, error} = await db.from('users').select('*')
    .eq('username', un).eq('password', pw).single();
  if(error || !data){ err.textContent = 'Incorrect username or password.'; return; }
  if(!userIsAllowed(data)){
    err.textContent = 'You do not have access to BEACON. Contact David.';
    return;
  }
  currentUser = data;
  // Sync into the HELM session key so a follow-on jump to HELM works too.
  try { sessionStorage.setItem('helm_auth', JSON.stringify(data)); } catch(_){}
  showApp();
}
function doLogout(){
  sessionStorage.removeItem('helm_auth');
  currentUser = null;
  location.reload();
}
function showLogin(){
  document.getElementById('loginGate').style.display = '';
  document.getElementById('app').style.display = 'none';
  setTimeout(()=>{ const u = document.getElementById('loginUser'); if(u) u.focus(); }, 50);
}
function showApp(){
  document.getElementById('loginGate').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('topbarUser').textContent = currentUser.display_name || currentUser.username;
  bootApp();
}

// ── BOOT ──────────────────────────────────────────────────────────────
async function bootApp(){
  await Promise.all([loadAccounts(), loadSalesReps()]);
  setTab('dashboard');
}

async function loadAccounts(){
  const {data, error} = await db.from('beacon_accounts').select('*')
    .order('effective_date', {ascending:false});
  if(error){ toast('Load failed: '+error.message,'err'); return; }
  _accounts = data || [];
  updateTabBadges();
}

async function loadSalesReps(){
  // Pull HELM users with real display_names. Skip the literal 'admin'
  // account but keep anyone whose ROLE is admin (David, etc.).
  const {data} = await db.from('users').select('username,display_name,role').order('display_name');
  _salesReps = (data || [])
    .filter(u => u.username !== 'admin' && u.display_name && u.display_name.trim())
    .map(u => u.display_name.trim());
  // Always include the current user even if their name is somehow missing
  if(currentUser && currentUser.display_name && !_salesReps.includes(currentUser.display_name)){
    _salesReps.push(currentUser.display_name);
  }
  _salesReps.sort((a,b) => a.localeCompare(b));
}

function updateTabBadges(){
  document.getElementById('badgeAll').textContent = _accounts.filter(a => !a.archived).length;
  document.getElementById('badgePipe').textContent = _accounts.filter(a =>
    a.event_type==='lost' && !a.archived &&
    !['won_back','permanent'].includes(a.pipeline_stage)
  ).length;
}

// ── TABS ──────────────────────────────────────────────────────────────
function setTab(name){
  _currentTab = name;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === name);
  });
  ['dashboard','accounts','pipeline','reports'].forEach(t => {
    document.getElementById('view-'+t).style.display = (t===name ? '' : 'none');
  });
  if(name === 'dashboard') renderDashboard();
  if(name === 'accounts')  renderAccounts();
  if(name === 'pipeline')  renderPipeline();
  if(name === 'reports')   renderReports();
}

// ── DASHBOARD ─────────────────────────────────────────────────────────
function renderDashboard(){
  const live = _accounts.filter(a => !a.archived);
  // Current month window
  const now = new Date();
  const monthStart = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-01';
  const monthLabel = now.toLocaleString('en-US',{month:'long',year:'numeric'});

  const thisMonthNew  = live.filter(a => a.event_type==='new'  && a.effective_date >= monthStart);
  const thisMonthLost = live.filter(a => a.event_type==='lost' && a.effective_date >= monthStart);
  const inPipeline    = live.filter(a => a.event_type==='lost' && !['won_back','permanent'].includes(a.pipeline_stage));
  const wonBack       = live.filter(a => a.pipeline_stage === 'won_back');
  const permanentLost = live.filter(a => a.pipeline_stage === 'permanent');

  const newDollarsMonth   = thisMonthNew.reduce((s,a)=>s+(+a.monthly_dollar_amount||0), 0);
  const lostDollarsMonth  = thisMonthLost.reduce((s,a)=>s+(+a.monthly_dollar_amount||0), 0);
  const pipelineDollars   = inPipeline.reduce((s,a)=>s+(+a.monthly_dollar_amount||0), 0);
  const wonBackDollars    = wonBack.reduce((s,a)=>s+(+a.monthly_dollar_amount||0), 0);
  const netMonth          = newDollarsMonth - lostDollarsMonth;
  const recoveryRate = (wonBack.length + permanentLost.length) > 0
    ? (wonBack.length / (wonBack.length + permanentLost.length)) * 100
    : null;

  // Recent activity (last 10 entries by effective_date)
  const recent = [...live].sort((a,b) => (b.effective_date||'').localeCompare(a.effective_date||'')).slice(0,8);

  document.getElementById('view-dashboard').innerHTML = `
    <div class="section-hdr">${esc(monthLabel)} — At a Glance</div>
    <div class="dash-grid">
      <div class="kpi-card green">
        <div class="kpi-label">New Business This Month</div>
        <div class="kpi-value green">${thisMonthNew.length}</div>
        <div class="kpi-sub">${fmtMoney(newDollarsMonth)} / month potential</div>
      </div>
      <div class="kpi-card red">
        <div class="kpi-label">Lost Business This Month</div>
        <div class="kpi-value red">${thisMonthLost.length}</div>
        <div class="kpi-sub">${fmtMoney(lostDollarsMonth)} / month gone</div>
      </div>
      <div class="kpi-card ${netMonth>=0?'green':'red'}">
        <div class="kpi-label">Net Monthly Change</div>
        <div class="kpi-value ${netMonth>=0?'green':'red'}">${netMonth>=0?'+':''}${fmtMoney(netMonth)}</div>
        <div class="kpi-sub">Direction: ${netMonth>=0?'growing':'shrinking'}</div>
      </div>
      <div class="kpi-card amber">
        <div class="kpi-label">In Exit Pipeline</div>
        <div class="kpi-value amber">${inPipeline.length}</div>
        <div class="kpi-sub">${fmtMoney(pipelineDollars)}/mo at risk — actively pursued</div>
      </div>
      <div class="kpi-card blue">
        <div class="kpi-label">Won Back</div>
        <div class="kpi-value">${wonBack.length}</div>
        <div class="kpi-sub">${fmtMoney(wonBackDollars)}/mo recovered</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Recovery Rate</div>
        <div class="kpi-value">${recoveryRate==null ? '—' : recoveryRate.toFixed(0)+'%'}</div>
        <div class="kpi-sub">Won back / closed lost cases</div>
      </div>
    </div>

    <div class="section-hdr">Recent Activity</div>
    ${recent.length ? `
      <div class="accounts-table">
        <div class="accounts-row head">
          <div>Business</div><div>Date</div><div>Sales Rep</div><div>Reason</div><div>Type</div><div>Stage</div><div style="text-align:right">$/mo</div>
        </div>
        ${recent.map(renderAccountRow).join('')}
      </div>` : '<div class="empty-state">No activity yet. Click the + button to log the first account event.</div>'}
  `;
}

// ── ACCOUNTS LIST ─────────────────────────────────────────────────────
const ACCOUNT_FILTERS = [
  {key:'all',           label:'All',           match:a => !a.archived},
  {key:'new',           label:'New Business',  match:a => !a.archived && a.event_type==='new'},
  {key:'lost',          label:'Lost',          match:a => !a.archived && a.event_type==='lost'},
  {key:'won_back',      label:'Won Back',      match:a => !a.archived && a.pipeline_stage==='won_back'},
  {key:'at_risk',       label:'At Risk',       match:a => !a.archived && a.pipeline_stage==='at_risk'},
  {key:'permanent',     label:'Permanently Lost', match:a => !a.archived && a.pipeline_stage==='permanent'},
  {key:'archived',      label:'Archived',      match:a => a.archived},
];

function renderAccounts(){
  const filterChips = ACCOUNT_FILTERS.map(f => {
    const count = _accounts.filter(f.match).length;
    return `<button class="filter-chip ${f.key===_filter?'active':''}" onclick="setFilter('${f.key}')">${f.label}<span class="count">${count}</span></button>`;
  }).join('');

  let rows = _accounts.filter(a => {
    const f = ACCOUNT_FILTERS.find(x => x.key===_filter);
    if(!f.match(a)) return false;
    if(_searchTerm){
      const q = _searchTerm.toLowerCase();
      const hay = [a.business_name, a.account_number, a.contact_name, a.sales_rep, a.reason, a.competitor]
        .filter(Boolean).join(' ').toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });

  document.getElementById('view-accounts').innerHTML = `
    <div class="filter-strip">${filterChips}</div>
    <div class="search-row">
      <input type="text" class="search-input" placeholder="Search by name, account #, contact, sales rep, reason…" oninput="setSearch(this.value)" value="${esc(_searchTerm)}"/>
    </div>
    ${rows.length ? `
      <div class="accounts-table">
        <div class="accounts-row head">
          <div>Business</div><div>Date</div><div>Sales Rep</div><div>Reason</div><div>Type</div><div>Stage</div><div style="text-align:right">$/mo</div>
        </div>
        ${rows.map(renderAccountRow).join('')}
      </div>` : '<div class="empty-state">No accounts match your filters.</div>'}
  `;
}
function setFilter(k){ _filter = k; renderAccounts(); }
function setSearch(s){ _searchTerm = s; renderAccounts(); }

function renderAccountRow(a){
  const stageCls  = 'stage-'+(a.pipeline_stage||'new');
  const stageLbl  = (a.pipeline_stage||'new').replace(/_/g,' ');
  const evtCls    = 'event-'+a.event_type;
  const moneyCls  = a.event_type==='lost' ? 'accounts-cell-money lost' : 'accounts-cell-money';
  return `<div class="accounts-row" onclick="openDetail(${a.id})">
    <div class="accounts-name">${esc(a.business_name)}${a.account_number?`<span class="acct">#${esc(a.account_number)}</span>`:''}</div>
    <div class="accounts-cell-muted">${fmtDate(a.effective_date)}</div>
    <div class="accounts-cell-muted">${esc(a.sales_rep || '—')}</div>
    <div class="accounts-cell-muted" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(a.reason || '—')}</div>
    <div><span class="pill ${evtCls}">${a.event_type==='new'?'New':'Lost'}</span></div>
    <div><span class="pill ${stageCls}">${esc(stageLbl)}</span></div>
    <div class="${moneyCls}">${a.event_type==='lost'?'-':'+'}${fmtMoney(a.monthly_dollar_amount)}</div>
  </div>`;
}

// ── EXIT PIPELINE (lost accounts, grouped by stage) ───────────────────
const PIPELINE_STAGES = [
  {key:'new_loss',      label:'New Loss',       hint:'Just lost — needs first outreach'},
  {key:'first_contact', label:'First Contact',  hint:'Reached out, awaiting response'},
  {key:'engaged',       label:'Engaged',        hint:'Conversation going'},
  {key:'negotiating',   label:'Negotiating',    hint:'Working a deal to win back'},
];
function renderPipeline(){
  const lost = _accounts.filter(a => !a.archived && a.event_type==='lost' && !['won_back','permanent'].includes(a.pipeline_stage));
  const cols = PIPELINE_STAGES.map(s => {
    const accts = lost.filter(a => (a.pipeline_stage||'new_loss') === s.key);
    const total = accts.reduce((sum,a) => sum + (+a.monthly_dollar_amount || 0), 0);
    const cards = accts.map(a => `
      <div class="pipeline-card" onclick="openDetail(${a.id})">
        <div class="pipeline-card-name">${esc(a.business_name)}</div>
        <div class="pipeline-card-meta">
          <span>${esc(a.sales_rep||'—')} · ${fmtRelDate(a.effective_date)}</span>
          <span class="money">${fmtMoney(a.monthly_dollar_amount)}</span>
        </div>
      </div>`).join('') || '<div class="pipeline-empty">No accounts at this stage</div>';
    return `
      <div class="pipeline-col">
        <div class="pipeline-col-hdr">
          <div>
            <h3>${esc(s.label)}</h3>
            <div style="font-size:10px;color:var(--text-dim);margin-top:2px;">${esc(s.hint)}</div>
          </div>
          <div class="pipeline-col-stats">
            <span class="count">${accts.length}</span>
            <span>${fmtMoney(total)}/mo</span>
          </div>
        </div>
        <div class="pipeline-col-body">${cards}</div>
      </div>`;
  }).join('');

  document.getElementById('view-pipeline').innerHTML = `
    <div class="section-hdr">Exit Pipeline — Lost Accounts in Active Recovery</div>
    <div style="font-size:12px;color:var(--text-mute);margin-bottom:16px;">
      Open an account card to log outreach and advance them through the pipeline. When you log an outreach with outcome
      <em style="color:#34d399">Spoke</em>/<em style="color:var(--amber)">Interested</em>/<em style="color:var(--purple)">Won Back</em>,
      the stage advances automatically.
    </div>
    <div class="pipeline-board">${cols}</div>
  `;
}

// ── REPORTS ───────────────────────────────────────────────────────────
function renderReports(){
  const live = _accounts.filter(a => !a.archived);

  // By sales rep
  const byRep = {};
  live.forEach(a => {
    const r = a.sales_rep || 'Unassigned';
    if(!byRep[r]) byRep[r] = {new:0, lost:0, won_back:0, new_dollars:0, lost_dollars:0};
    if(a.event_type==='new')  { byRep[r].new++;  byRep[r].new_dollars  += +a.monthly_dollar_amount||0; }
    if(a.event_type==='lost') { byRep[r].lost++; byRep[r].lost_dollars += +a.monthly_dollar_amount||0; }
    if(a.pipeline_stage==='won_back') byRep[r].won_back++;
  });
  const repRows = Object.entries(byRep)
    .sort((a,b) => (b[1].new + b[1].won_back) - (a[1].new + a[1].won_back))
    .map(([rep, s]) => `
      <tr>
        <td style="font-weight:600">${esc(rep)}</td>
        <td class="num money-green">${s.new}</td>
        <td class="num money-red">${s.lost}</td>
        <td class="num">${s.won_back}</td>
        <td class="num money-green">${fmtMoney(s.new_dollars)}</td>
        <td class="num money-red">${fmtMoney(s.lost_dollars)}</td>
      </tr>`).join('');

  // By line of business
  const byLob = {};
  live.forEach(a => {
    const l = a.line_of_business || 'unspecified';
    if(!byLob[l]) byLob[l] = {new:0, lost:0, new_dollars:0, lost_dollars:0};
    if(a.event_type==='new')  { byLob[l].new++;  byLob[l].new_dollars  += +a.monthly_dollar_amount||0; }
    if(a.event_type==='lost') { byLob[l].lost++; byLob[l].lost_dollars += +a.monthly_dollar_amount||0; }
  });
  const lobRows = Object.entries(byLob)
    .sort((a,b) => (b[1].new_dollars + b[1].lost_dollars) - (a[1].new_dollars + a[1].lost_dollars))
    .map(([lob, s]) => `
      <tr>
        <td style="font-weight:600">${esc(lob.replace(/_/g,' '))}</td>
        <td class="num money-green">${s.new}</td>
        <td class="num money-red">${s.lost}</td>
        <td class="num money-green">${fmtMoney(s.new_dollars)}</td>
        <td class="num money-red">${fmtMoney(s.lost_dollars)}</td>
        <td class="num ${(s.new_dollars - s.lost_dollars)>=0?'money-green':'money-red'}">${(s.new_dollars - s.lost_dollars)>=0?'+':''}${fmtMoney(s.new_dollars - s.lost_dollars)}</td>
      </tr>`).join('');

  // Top reasons for loss
  const reasons = {};
  live.filter(a => a.event_type==='lost' && a.reason).forEach(a => {
    const r = a.reason.trim();
    reasons[r] = (reasons[r] || 0) + 1;
  });
  const reasonRows = Object.entries(reasons)
    .sort((a,b) => b[1] - a[1])
    .slice(0, 10)
    .map(([r, c]) => `<tr><td>${esc(r)}</td><td class="num">${c}</td></tr>`).join('');

  document.getElementById('view-reports').innerHTML = `
    <div class="report-section">
      <h3>By Sales Rep</h3>
      ${repRows ? `
        <table class="report-table">
          <thead><tr><th>Rep</th><th style="text-align:right">New</th><th style="text-align:right">Lost</th><th style="text-align:right">Won Back</th><th style="text-align:right">New $/mo</th><th style="text-align:right">Lost $/mo</th></tr></thead>
          <tbody>${repRows}</tbody>
        </table>` : '<div class="empty-state">No data yet.</div>'}
    </div>
    <div class="report-section">
      <h3>By Line of Business</h3>
      ${lobRows ? `
        <table class="report-table">
          <thead><tr><th>Line</th><th style="text-align:right">New</th><th style="text-align:right">Lost</th><th style="text-align:right">New $/mo</th><th style="text-align:right">Lost $/mo</th><th style="text-align:right">Net</th></tr></thead>
          <tbody>${lobRows}</tbody>
        </table>` : '<div class="empty-state">No data yet.</div>'}
    </div>
    <div class="report-section">
      <h3>Top Reasons for Loss</h3>
      ${reasonRows ? `
        <table class="report-table">
          <thead><tr><th>Reason</th><th style="text-align:right">Count</th></tr></thead>
          <tbody>${reasonRows}</tbody>
        </table>` : '<div class="empty-state">No lost-business reasons logged yet.</div>'}
    </div>
  `;
}

// HELM client search inside the Add modal (lazy-loaded once)
async function ensureClientsLoaded(){
  if(_clientsCache) return _clientsCache;
  const {data, error} = await db.from('clients').select('client_id,client_name,address,phone').limit(20000);
  if(error){ toast('Clients load failed: '+error.message,'err'); return []; }
  _clientsCache = (data || []).filter(c => c.client_id);
  return _clientsCache;
}
async function searchClients(q){
  q = (q||'').trim().toLowerCase();
  const wrap = document.getElementById('clientSearchResults');
  const chip = document.getElementById('fldClientChip');
  // Clear chip whenever user is actively typing
  chip.textContent = 'Type at least 2 letters to search existing HELM clients, or just type a new business name.';
  chip.style.color = 'var(--text-dim)';
  chip.dataset.clientId = '';
  if(q.length < 2){
    wrap.style.display = 'none';
    return;
  }
  const clients = await ensureClientsLoaded();
  const tokens = q.split(/\s+/).filter(Boolean);
  const matches = clients.map(c => {
    const idL    = (c.client_id || '').toLowerCase();
    const nameL  = (c.client_name || '').toLowerCase();
    const addrL  = (c.address || '').toLowerCase();
    const phoneL = (c.phone || '').replace(/\D/g,'');
    const hay = idL+' '+nameL+' '+addrL+' '+phoneL;
    if(!tokens.every(t => hay.includes(t))) return {c, s:0};
    let s = 1;
    if(idL === q) s = 10;
    else if(idL.startsWith(q)) s = 8;
    if(nameL && nameL.includes(q)) s = Math.max(s, 7);
    if(addrL.includes(q)) s = Math.max(s, 3);
    return {c, s};
  })
  .filter(x => x.s > 0)
  .sort((a,b) => b.s - a.s)
  .slice(0, 8);

  wrap.style.display = '';
  if(!matches.length){
    wrap.innerHTML = `<div class="client-search-empty">No HELM clients matched "${esc(q)}". Just type the business name — it'll save without a HELM link.</div>`;
    return;
  }
  wrap.innerHTML = matches.map(({c}) => `
    <div class="client-search-row" onmousedown="pickClient('${esc(c.client_id)}')" ontouchstart="pickClient('${esc(c.client_id)}')">
      <div class="nm">${esc(c.client_name || 'Account '+c.client_id)}</div>
      <div class="ad">${esc(c.address || '')}</div>
      <div class="ac">#${esc(c.client_id)}${c.phone?' · '+esc(c.phone):''}</div>
    </div>`).join('');
}
function pickClient(clientId){
  const c = _clientsCache.find(x => x.client_id === clientId);
  if(!c) return;
  document.getElementById('fldBusinessName').value = c.client_name || ('Account '+c.client_id);
  document.getElementById('fldAcctNum').value      = c.client_id;
  if(c.phone) document.getElementById('fldContactPhone').value = c.phone;
  document.getElementById('clientSearchResults').style.display = 'none';
  const chip = document.getElementById('fldClientChip');
  chip.textContent = `✓ Linked to HELM client #${c.client_id}`;
  chip.style.color = '#34d399';
  chip.dataset.clientId = c.client_id;
}

async function submitAccount(){
  const business    = document.getElementById('fldBusinessName').value.trim();
  const acctNum     = document.getElementById('fldAcctNum').value.trim();
  const effDate     = document.getElementById('fldEffDate').value;
  const eventType   = document.getElementById('evtTypeGrp').dataset.value || 'new';
  if(!business){ toast('Business name is required','err'); return; }
  if(!effDate){  toast('Effective date is required','err'); return; }

  const monthlyRaw = document.getElementById('fldMonthly').value;
  const monthly = monthlyRaw === '' ? null : Number(monthlyRaw);
  const startDate = document.getElementById('fldStartDate').value || null;
  const clientId  = document.getElementById('fldClientChip').dataset.clientId || null;
  const submitBy  = currentUser ? (currentUser.display_name || currentUser.username) : '';

  const payload = {
    business_name:         business,
    account_number:        acctNum || null,
    client_id:             clientId,
    contact_name:          document.getElementById('fldContactName').value.trim() || null,
    contact_phone:         document.getElementById('fldContactPhone').value.trim() || null,
    original_start_date:   startDate,
    effective_date:        effDate,
    event_type:            eventType,
    line_of_business:      document.getElementById('fldLineOfBusiness').value || null,
    monthly_dollar_amount: monthly,
    sales_rep:             document.getElementById('fldSalesRep').value || null,
    competitor:            document.getElementById('fldCompetitor').value.trim() || null,
    reason:                document.getElementById('fldReason').value.trim() || null,
    notes:                 document.getElementById('fldNotes').value.trim() || null,
    updated_at:            new Date().toISOString(),
    updated_by:            submitBy,
  };

  const btn = document.getElementById('addSubmitBtn');
  btn.disabled = true; btn.textContent = 'Saving…';

  let error;
  if(_editingId){
    ({error} = await db.from('beacon_accounts').update(payload).eq('id', _editingId));
  } else {
    payload.created_by = submitBy;
    payload.pipeline_stage = (eventType === 'lost') ? 'new_loss' : 'new';
    ({error} = await db.from('beacon_accounts').insert(payload));
  }
  btn.disabled = false; btn.textContent = 'Save';
  if(error){ toast('Save failed: '+error.message,'err'); return; }

  closeAddModal();
  toast(_editingId ? 'Account updated' : 'Account saved', 'ok');
  _editingId = null;
  await loadAccounts();
  if(_currentTab === 'dashboard') renderDashboard();
  if(_currentTab === 'accounts')  renderAccounts();
  if(_currentTab === 'pipeline')  renderPipeline();
  if(_currentTab === 'reports')   renderReports();
}

  document.getElementById('detailTitle').textContent = a.business_name;
  document.getElementById('detailModal').classList.add('open');
  document.body.style.overflow = 'hidden';
  await renderDetail(a);
}
function closeDetail(){
  document.getElementById('detailModal').classList.remove('open');
  document.body.style.overflow = '';
  _detailId = null;
}

async function renderDetail(a){
  // Fetch the outreach log
  const {data:outreach} = await db.from('beacon_outreach').select('*')
    .eq('account_id', a.id).order('outreach_date', {ascending:false}).order('created_at', {ascending:false});

  const evtCls   = 'event-'+a.event_type;
  const stageCls = 'stage-'+(a.pipeline_stage||'new');
  const stageLbl = (a.pipeline_stage||'new').replace(/_/g,' ');

  // Stage transition controls — different for new vs lost
  let stageControls = '';
  if(a.event_type === 'lost' && a.pipeline_stage !== 'won_back' && a.pipeline_stage !== 'permanent'){
    stageControls = `
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;">
        <button class="btn-secondary" onclick="advanceStage(${a.id},'first_contact')" ${a.pipeline_stage==='first_contact'?'disabled':''}>→ First Contact</button>
        <button class="btn-secondary" onclick="advanceStage(${a.id},'engaged')"       ${a.pipeline_stage==='engaged'?'disabled':''}>→ Engaged</button>
        <button class="btn-secondary" onclick="advanceStage(${a.id},'negotiating')"   ${a.pipeline_stage==='negotiating'?'disabled':''}>→ Negotiating</button>
        <button class="btn-primary"   onclick="markWonBack(${a.id})">✓ Won Back</button>
        <button class="btn-danger"    onclick="markPermanentLost(${a.id})">Permanently Lost</button>
      </div>`;
  } else if(a.event_type === 'new' && a.pipeline_stage !== 'at_risk' && a.pipeline_stage !== 'lost_again'){
    stageControls = `
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;">
        <button class="btn-secondary" onclick="advanceStage(${a.id},'at_risk')" ${a.pipeline_stage==='at_risk'?'disabled':''}>⚠ Mark At Risk</button>
        <button class="btn-secondary" onclick="advanceStage(${a.id},'active')"  ${a.pipeline_stage==='active'?'disabled':''}>↪ Mark Active</button>
        <button class="btn-danger"    onclick="convertToLost(${a.id})">→ Convert to Lost</button>
      </div>`;
  }

  document.getElementById('detailBody').innerHTML = `
    <div style="margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
      <span class="pill ${evtCls}">${a.event_type==='new'?'New Business':'Lost Business'}</span>
      <span class="pill ${stageCls}">${esc(stageLbl)}</span>
      ${a.archived ? '<span class="pill stage-archived">Archived</span>' : ''}
      <span style="font-size:12px;color:var(--text-dim);margin-left:auto;">${a.event_type==='lost'?'Lost':'Effective'}: ${fmtDate(a.effective_date)}</span>
    </div>
    <div class="detail-grid">
      <div class="detail-fld"><label>Business</label><div class="val">${esc(a.business_name)}</div></div>
      <div class="detail-fld"><label>Account #</label><div class="val">${a.account_number?esc(a.account_number):'<span class="muted">none</span>'}${a.client_id?` <span style="font-size:10px;color:var(--text-dim);">· linked to HELM</span>`:''}</div></div>
      <div class="detail-fld"><label>Contact</label><div class="val">${a.contact_name?esc(a.contact_name):'<span class="muted">none</span>'}</div></div>
      <div class="detail-fld"><label>Phone</label><div class="val">${a.contact_phone?`<a href="tel:${esc(a.contact_phone)}" style="color:var(--amber)">${esc(a.contact_phone)}</a>`:'<span class="muted">none</span>'}</div></div>
      <div class="detail-fld"><label>Sales Rep</label><div class="val">${a.sales_rep?esc(a.sales_rep):'<span class="muted">unassigned</span>'}</div></div>
      <div class="detail-fld"><label>Line of Business</label><div class="val">${a.line_of_business?esc(a.line_of_business.replace(/_/g,' ')):'<span class="muted">—</span>'}</div></div>
      <div class="detail-fld"><label>Original Start</label><div class="val">${a.original_start_date?fmtDate(a.original_start_date):'<span class="muted">—</span>'}</div></div>
      <div class="detail-fld"><label>Monthly $</label><div class="val money ${a.event_type==='lost'?'lost':''}">${a.event_type==='lost'?'-':'+'}${fmtMoney(a.monthly_dollar_amount)}</div></div>
      ${a.competitor?`<div class="detail-fld"><label>Lost To</label><div class="val">${esc(a.competitor)}</div></div>`:''}
    </div>
    ${a.reason?`<div style="margin-bottom:14px;"><div class="detail-fld" style="margin-bottom:6px;"><label>Reason</label></div><div style="background:var(--surface-2);padding:11px 14px;border-radius:7px;color:var(--text);font-size:13px;line-height:1.5;border-left:2px solid var(--amber);">${esc(a.reason)}</div></div>`:''}
    ${a.notes ?`<div style="margin-bottom:14px;"><div class="detail-fld" style="margin-bottom:6px;"><label>Notes</label></div><div style="background:var(--surface-2);padding:11px 14px;border-radius:7px;color:var(--text-mute);font-size:13px;line-height:1.5;">${esc(a.notes)}</div></div>`:''}
    ${stageControls}

    <div class="section-hdr" style="margin-top:24px">Outreach Log (${(outreach||[]).length})</div>
    <button class="btn-primary" onclick="openOutreach(${a.id})">+ Log Outreach</button>
    <div class="outreach-list">
      ${(outreach||[]).map(o => `
        <div class="outreach-entry">
          <div class="top">
            <span class="otype">${esc(o.outreach_type.replace(/_/g,' '))}</span>
            ${o.outcome?`<span class="outcome ${esc(o.outcome)}">${esc(o.outcome.replace(/_/g,' '))}</span>`:''}
            <span class="odate" style="margin-left:auto">${fmtDate(o.outreach_date)} · ${esc(o.performed_by||'—')}</span>
          </div>
          ${o.notes?`<div class="onotes">${esc(o.notes)}</div>`:''}
          ${o.next_step_date||o.next_step_note?`<div class="ostep">Next: ${o.next_step_date?fmtDate(o.next_step_date):''}${o.next_step_note?' — '+esc(o.next_step_note):''}</div>`:''}
        </div>
      `).join('') || '<div class="empty-state" style="padding:20px 0">No outreach logged yet.</div>'}
    </div>
  `;
  document.getElementById('detailFooter').innerHTML = `
    <button class="btn-danger"    onclick="confirmDelete(${a.id})">Delete</button>
    <button class="btn-secondary" onclick="toggleArchive(${a.id})">${a.archived?'Unarchive':'Archive'}</button>
    <button class="btn-secondary" onclick="editAccount(${a.id})">Edit</button>
    <button class="btn-primary"   onclick="closeDetail()">Close</button>
  `;
}

// ── STAGE TRANSITIONS / LIFECYCLE ─────────────────────────────────────
async function advanceStage(id, newStage){
  const by = currentUser ? (currentUser.display_name || currentUser.username) : '';
  const {error} = await db.from('beacon_accounts')
    .update({pipeline_stage:newStage, updated_at:new Date().toISOString(), updated_by:by})
    .eq('id', id);
  if(error){ toast('Update failed: '+error.message,'err'); return; }
  await refreshOne(id);
  toast('Moved to ' + newStage.replace(/_/g,' '), 'ok');
}
async function markWonBack(id){
  const by = currentUser ? (currentUser.display_name || currentUser.username) : '';
  // Flip event_type to 'new' so they're counted as active again, but mark
  // the stage as 'won_back' so we know they were a recovery.
  const {error} = await db.from('beacon_accounts')
    .update({event_type:'new', pipeline_stage:'won_back', updated_at:new Date().toISOString(), updated_by:by})
    .eq('id', id);
  if(error){ toast('Update failed: '+error.message,'err'); return; }
  await refreshOne(id);
  toast('🎉 Marked as Won Back', 'ok');
}
async function markPermanentLost(id){
  const by = currentUser ? (currentUser.display_name || currentUser.username) : '';
  const {error} = await db.from('beacon_accounts')
    .update({pipeline_stage:'permanent', updated_at:new Date().toISOString(), updated_by:by})
    .eq('id', id);
  if(error){ toast('Update failed: '+error.message,'err'); return; }
  await refreshOne(id);
  toast('Marked as permanently lost','ok');
}
async function convertToLost(id){
  const by = currentUser ? (currentUser.display_name || currentUser.username) : '';
  const {error} = await db.from('beacon_accounts')
    .update({event_type:'lost', pipeline_stage:'new_loss', effective_date: todayISO(), updated_at:new Date().toISOString(), updated_by:by})
    .eq('id', id);
  if(error){ toast('Update failed: '+error.message,'err'); return; }
  await refreshOne(id);
  toast('Converted to lost — open the account to add a reason','ok');
}
async function toggleArchive(id){
  const a = _accounts.find(x => x.id === id);
  if(!a) return;
  const {error} = await db.from('beacon_accounts').update({archived: !a.archived}).eq('id', id);
  if(error){ toast('Update failed: '+error.message,'err'); return; }
  await refreshOne(id);
  toast(a.archived ? 'Unarchived' : 'Archived','ok');
}

async function refreshOne(id){
  await loadAccounts();
  const fresh = _accounts.find(x => x.id === id);
  if(fresh && _detailId === id) renderDetail(fresh);
  if(_currentTab === 'dashboard') renderDashboard();
  if(_currentTab === 'accounts')  renderAccounts();
  if(_currentTab === 'pipeline')  renderPipeline();
  if(_currentTab === 'reports')   renderReports();
}

// ── OUTREACH ──────────────────────────────────────────────────────────
function openOutreach(accountId){
  document.getElementById('outreachModal').dataset.accountId = String(accountId);
  document.getElementById('orDate').value = todayISO();
  document.getElementById('orType').value = 'phone_call';
  document.getElementById('orOutcome').value = '';
  document.getElementById('orNotes').value = '';
  document.getElementById('orNextDate').value = '';
  document.getElementById('orNextNote').value = '';
  document.getElementById('outreachModal').classList.add('open');
}
function closeOutreach(){
  document.getElementById('outreachModal').classList.remove('open');
}
async function submitOutreach(){
  const accountId = Number(document.getElementById('outreachModal').dataset.accountId);
  const date = document.getElementById('orDate').value;
  const type = document.getElementById('orType').value;
  if(!date){ toast('Date is required','err'); return; }
  if(!type){ toast('Type is required','err'); return; }
  const by = currentUser ? (currentUser.display_name || currentUser.username) : '';
  const outcome = document.getElementById('orOutcome').value || null;
  const payload = {
    account_id:     accountId,
    outreach_type:  type,
    outreach_date:  date,
    performed_by:   by,
    outcome:        outcome,
    notes:          document.getElementById('orNotes').value.trim() || null,
    next_step_date: document.getElementById('orNextDate').value || null,
    next_step_note: document.getElementById('orNextNote').value.trim() || null,
  };
  const {error} = await db.from('beacon_outreach').insert(payload);
  if(error){ toast('Save failed: '+error.message,'err'); return; }

  // Auto-advance the pipeline stage based on outcome.
  const a = _accounts.find(x => x.id === accountId);
  if(a && a.event_type === 'lost'){
    let nextStage = null;
    if(outcome === 'won_back')                              nextStage = null; // handled separately
    else if(outcome === 'declined')                         nextStage = 'permanent';
    else if(outcome === 'interested')                       nextStage = 'engaged';
    else if(outcome === 'spoke' && a.pipeline_stage==='new_loss')      nextStage = 'first_contact';
    else if(outcome === 'spoke' && a.pipeline_stage==='first_contact') nextStage = 'engaged';
    else if(a.pipeline_stage === 'new_loss')                nextStage = 'first_contact';

    if(outcome === 'won_back'){
      await markWonBack(accountId);
    } else if(nextStage && nextStage !== a.pipeline_stage){
      await advanceStage(accountId, nextStage);
    }
  }

  closeOutreach();
  toast('Outreach logged','ok');
  await refreshOne(accountId);
}

// ── DELETE ────────────────────────────────────────────────────────────
function confirmDelete(id){
  const a = _accounts.find(x => x.id === id);
  if(!a) return;
  openConfirm(
    'Delete this account?',
    `<strong style="color:var(--text)">${esc(a.business_name)}</strong><br><br>This removes the account and every outreach entry against it. This cannot be undone.<br><br>Consider Archive instead — same end result but reversible.`,
    async () => {
      const {error} = await db.from('beacon_accounts').delete().eq('id', id);
      if(error){ toast('Delete failed: '+error.message,'err'); return; }
      toast('Deleted','ok');
      closeDetail();
      await loadAccounts();
      if(_currentTab === 'dashboard') renderDashboard();
      if(_currentTab === 'accounts')  renderAccounts();
      if(_currentTab === 'pipeline')  renderPipeline();
      if(_currentTab === 'reports')   renderReports();
    },
    'Delete'
  );
}

// ── GENERIC CONFIRM MODAL ─────────────────────────────────────────────
function openConfirm(title, bodyHtml, onYes, yesLabel){
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmBody').innerHTML = bodyHtml;
  document.getElementById('confirmYesBtn').textContent = yesLabel || 'Confirm';
  _confirmCb = onYes;
  document.getElementById('confirmModal').classList.add('open');
}
function closeConfirm(){
  document.getElementById('confirmModal').classList.remove('open');
  _confirmCb = null;
}
function confirmYes(){
  const cb = _confirmCb;
  closeConfirm();
  if(typeof cb === 'function') cb();
}

// ── KICK OFF ──────────────────────────────────────────────────────────
initAuth();
</script>
</body>
