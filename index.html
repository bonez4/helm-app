  }, 60);
}

async function icrShowProjections() {
  const {data:d26}=await db.from('irr_reports').select('*').gte('report_date','2026-01-01').lte('report_date','2026-12-31').order('report_date');
  const {data:d25}=await db.from('irr_reports').select('*').gte('report_date','2025-01-01').lte('report_date','2025-12-31').order('report_date');

  await irrLoadRates();
  for(const arr of [d25||[],d26||[]]){
    for(const d of arr){
      const {ir, er} = irrRatesFor(d.report_date);
      if(ir&&!(parseFloat(d.island_revenue)>0)&&(d.island_tickets||0)>0)
        d.island_revenue=(ir.hook_fee*d.island_tickets)+((ir.per_ton*(1+(ir.ton_markup||0)))*parseFloat(d.island_tons||0));
      if(er&&!(parseFloat(d.santos_revenue)>0)&&(d.santos_tickets||0)>0)
        d.santos_revenue=(er.hook_fee*d.santos_tickets)+((er.per_ton*(1+(er.ton_markup||0)))*parseFloat(d.santos_tons||0));
    }
  }

  // Group by month per company
  function monthlyAgg(data){
    const months={};
    for(const d of (data||[])){
      const m=parseInt(d.report_date.substring(5,7));
      if(!months[m]) months[m]={totalLoads:0,totalTons:0,totalRev:0,days:0,
        reisLoads:0,reisTons:0,reisRev:0,islandLoads:0,islandTons:0,islandRev:0,santosLoads:0,santosTons:0,santosRev:0};
      const o=months[m];
      o.reisLoads+=d.reis_tickets||0;o.reisTons+=parseFloat(d.reis_tons)||0;o.reisRev+=(parseFloat(d.reis_tip_revenue)||0)+(parseFloat(d.reis_svc_revenue)||0);
      o.islandLoads+=d.island_tickets||0;o.islandTons+=parseFloat(d.island_tons)||0;o.islandRev+=parseFloat(d.island_revenue)||0;
      o.santosLoads+=d.santos_tickets||0;o.santosTons+=parseFloat(d.santos_tons)||0;o.santosRev+=parseFloat(d.santos_revenue)||0;
      o.totalLoads+=allLoads(d);o.totalTons+=allTons(d);o.totalRev+=allRev(d);o.days++;
    }
    return months;
  }

  const m25=monthlyAgg(d25), m26=monthlyAgg(d26);
  icrProjData={m25,m26};

  // Initialize assumptions from data if not set
  let total25={loads:0,tons:0,rev:0};
  for(let m=1;m<=12;m++){if(m25[m]){total25.loads+=m25[m].totalLoads;total25.tons+=m25[m].totalTons;total25.rev+=m25[m].totalRev;}}

  if(!icrProjAssumptions) icrProjAssumptions=icrDefaultAssumptions(m25,m26,total25);
  icrRenderProjections(m25,m26,total25);
}

function icrRenderProjections(m25,m26,total25) {
  const a=icrProjAssumptions;
  const monthNames=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const today=new Date();
  const curMonth=today.getMonth()+1;
  const target={loads:Math.round(total25.loads*1.5),tons:total25.tons*1.5,rev:total25.rev*1.5};

  // Seasonal weights from 2025
  const weights={};
  for(let m=1;m<=12;m++) weights[m]=m25[m]?(m25[m].totalLoads/total25.loads):1/12;

  // Company-level growth rate for a given month (with tapering)
  function compGrowth(comp, month) {
    const c=a[comp];
    if(!c) return 0;
    const base=c.annualGrowth/100;
    if(c.taperMonth>0 && month>=c.taperMonth){
      const taperBase=c.taperTo/100;
      const fadeMonths=12-c.taperMonth;
      const progress=Math.min(1,(month-c.taperMonth)/Math.max(fadeMonths,1));
      return base+(taperBase-base)*progress;
    }
    return base;
  }

  const fM=n=>'$'+n.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
  const fT=n=>n.toLocaleString('en-US',{minimumFractionDigits:1,maximumFractionDigits:1});

  let annualProj={loads:0,tons:0,rev:0};
  let tableRows='';

  for(let m=1;m<=12;m++){
    const isActual = m26[m] && m < curMonth;
    const isPartial = m === curMonth;
    const actual = m26[m]||{totalLoads:0,totalTons:0,totalRev:0,days:0};

    let loads,tons,rev,cls;
    if(isActual){
      loads=actual.totalLoads;tons=actual.totalTons;rev=actual.totalRev;cls='actual';
    } else {
      // Project using 2025 base × (1 + weighted company growth) × seasonal
      const base25=m25[m]||{reisLoads:0,reisTons:0,reisRev:0,islandLoads:0,islandTons:0,islandRev:0,santosLoads:0,santosTons:0,santosRev:0};
      const rG=1+compGrowth('reis',m), iG=1+compGrowth('island',m), sG=1+compGrowth('santos',m);
      const pLoads=Math.round(base25.reisLoads*rG + base25.islandLoads*iG + base25.santosLoads*sG);
      const pTons=base25.reisTons*rG + base25.islandTons*iG + base25.santosTons*sG;
      const rateMult = (a.rateChangePct && m>=4) ? (1+a.rateChangePct/100) : 1;
      const pRev=(base25.reisRev*rG + base25.islandRev*iG + base25.santosRev*sG)*rateMult;

      if(isPartial){
        // Blend: actual days so far + projected remaining
        const pctComplete=actual.days>0?actual.days/(a.operatingDaysPerMonth[m]||22):0;
        loads=Math.round(actual.totalLoads + pLoads*(1-pctComplete));
        tons=actual.totalTons + pTons*(1-pctComplete);
        rev=actual.totalRev + pRev*(1-pctComplete);
        cls='projected';
      } else {
        loads=pLoads;tons=pTons;rev=pRev;cls='projected';
      }
    }
    annualProj.loads+=loads;annualProj.tons+=tons;annualProj.rev+=rev;

    const tgtLoads=Math.round(target.loads*weights[m]);
    const tgtRev=target.rev*weights[m];
    const pct=tgtLoads>0?((loads/tgtLoads)*100).toFixed(0)+'%':'--';
    const prior=m25[m]?m25[m].totalLoads:'--';

    tableRows+=`<tr class="${cls}">
      <td>${monthNames[m-1]}${isPartial?' *':''}</td>
      <td>${prior}</td>
      <td>${loads}</td><td>${fT(tons)}</td><td>${fM(rev)}</td>
      <td class="target">${tgtLoads}</td><td class="target">${fM(tgtRev)}</td>
      <td>${pct}</td>
    </tr>`;
  }

  const pctAnnual=target.loads>0?((annualProj.loads/target.loads)*100).toFixed(0)+'%':'--';
  tableRows+=`<tr class="annual-total">
    <td>Full Year</td><td>${total25.loads}</td>
    <td>${annualProj.loads}</td><td>${fT(annualProj.tons)}</td><td>${fM(annualProj.rev)}</td>
    <td class="target">${target.loads}</td><td class="target">${fM(target.rev)}</td>
    <td>${pctAnnual}</td>
  </tr>`;

  // Assumptions panel
  function inputRow(lbl, id, val, unit) {
    return `<div style="display:flex;align-items:center;gap:8px;margin:4px 0;">
      <span style="width:180px;font-size:12px;color:#444;">${lbl}</span>
      <input type="number" id="${id}" value="${val}" style="width:70px;font-size:12px;padding:4px 6px;border:1px solid #ddd;border-radius:4px;text-align:right;" step="1">
      <span style="font-size:11px;color:#888;">${unit}</span>
    </div>`;
  }

  const existingOverlay=document.getElementById('icrProjOverlay');
  if(existingOverlay) existingOverlay.remove();

  const overlay=document.createElement('div');
  overlay.className='irr-report-overlay';
  overlay.id='icrProjOverlay';
  overlay.onclick=function(e){if(e.target===overlay)overlay.remove();};
  overlay.innerHTML=`<div class="irr-report-modal" style="max-width:960px;">
    <div class="irr-report-toolbar">
      <button class="rpt-print" onclick="window.print()">Print</button>
      <button class="rpt-close" onclick="document.getElementById('icrProjOverlay').remove()">Close</button>
    </div>
    <div class="irr-report-body">
      <h1>Rolloff Growth Projection — 2026</h1>
      <div class="rpt-period">Target: 50% increase over 2025 (${total25.loads.toLocaleString()} &rarr; ${target.loads.toLocaleString()} loads)</div>
      <div class="rpt-period" style="margin-bottom:20px;">Projections use 2025 monthly actuals as base, adjusted by per-company growth rates and seasonal patterns. * = partial month.</div>

      <div class="rpt-kpi-row">
        <div class="rpt-kpi"><div class="rpt-kpi-label">Projected Full Year</div><div class="rpt-kpi-val">${annualProj.loads.toLocaleString()}</div><div style="font-size:11px;color:#888">loads</div></div>
        <div class="rpt-kpi"><div class="rpt-kpi-label">Target</div><div class="rpt-kpi-val">${target.loads.toLocaleString()}</div><div style="font-size:11px;color:#888">loads</div></div>
        <div class="rpt-kpi"><div class="rpt-kpi-label">Projected Revenue</div><div class="rpt-kpi-val">${fM(annualProj.rev)}</div></div>
        <div class="rpt-kpi"><div class="rpt-kpi-label">On Track</div><div class="rpt-kpi-val">${pctAnnual}</div></div>
      </div>

      <table class="icr-proj-table">
        <thead><tr><th>Month</th><th>2025 Actual</th><th>2026 Proj</th><th>Tons</th><th>Revenue</th><th>Target Loads</th><th>Target Rev</th><th>% of Target</th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table>

      <div style="margin-top:28px;padding:20px;border:1px solid #ddd;border-radius:8px;">
        <h2 style="font-size:14px;font-weight:700;margin:0 0 12px;">Assumptions</h2>
        <div style="font-size:11px;color:#666;margin-bottom:12px;">Adjust these values and click "Recalculate" to update the forecast. Growth rates are annual, applied to each month's 2025 base. Taper reduces growth starting at the specified month.</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div>
            <div style="font-size:11px;font-weight:700;color:#000;margin-bottom:6px;">Reis Rolloff</div>
            ${inputRow('Annual Growth Rate','projReisGr',a.reis.annualGrowth,'%')}
          </div>
          <div>
            <div style="font-size:11px;font-weight:700;color:#000;margin-bottom:6px;">Island Rubbish</div>
            ${inputRow('Annual Growth Rate','projIslandGr',a.island.annualGrowth,'%')}
            ${inputRow('Taper Starting Month','projIslandTaper',a.island.taperMonth,'(0=none)')}
            ${inputRow('Taper To Rate','projIslandTaperTo',a.island.taperTo,'%')}
          </div>
          <div>
            <div style="font-size:11px;font-weight:700;color:#000;margin-bottom:6px;">East End</div>
            ${inputRow('Annual Growth Rate','projSantosGr',a.santos.annualGrowth,'%')}
          </div>
          <div>
            <div style="font-size:11px;font-weight:700;color:#000;margin-bottom:6px;">Pricing</div>
            ${inputRow('Rate Change %','projRateChg',a.rateChangePct,'% (applies Apr+)')}
          </div>
        </div>
        <button onclick="icrRecalcProjections()" style="margin-top:14px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;padding:8px 24px;border:none;border-radius:4px;background:#0f1f3d;color:white;cursor:pointer;">Recalculate</button>
      </div>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}

function icrRecalcProjections() {
  const a=icrProjAssumptions;
  a.reis.annualGrowth=parseFloat(document.getElementById('projReisGr').value)||0;
  a.island.annualGrowth=parseFloat(document.getElementById('projIslandGr').value)||0;
  a.island.taperMonth=parseInt(document.getElementById('projIslandTaper').value)||0;
  a.island.taperTo=parseFloat(document.getElementById('projIslandTaperTo').value)||0;
  a.santos.annualGrowth=parseFloat(document.getElementById('projSantosGr').value)||0;
  a.rateChangePct=parseFloat(document.getElementById('projRateChg').value)||0;

  const m25=icrProjData.m25, m26=icrProjData.m26;
  let total25={loads:0,tons:0,rev:0};
  for(let m=1;m<=12;m++){if(m25[m]){total25.loads+=m25[m].totalLoads;total25.tons+=m25[m].totalTons;total25.rev+=m25[m].totalRev;}}
  icrRenderProjections(m25,m26,total25);
}

let cmdState = null;
let cmdActiveSub = 'priorities';
let cmdExpanded = {}; // id -> bool for inline note expansion
let cmdSaveTimers = {}; // key -> timeoutId
let cmdPersistDisabled = false;

function cmdDeepClone(o){ return JSON.parse(JSON.stringify(o)); }

async function cmdLoad(){
  cmdState = cmdDeepClone(CMD_SEED);
  if(!cmdState.plan.startDate) cmdState.plan.startDate = getTodayISO();
  if(cmdPersistDisabled || !currentUser) return;
  try{
    const {data,error} = await db.from('helm_command_state')
      .select('key,data').eq('user_id', currentUser.username);
    if(error){
      cmdPersistDisabled = true;
      console.warn('[Command Center] Persistence disabled. Run this SQL in Supabase:\n\ncreate table if not exists helm_command_state (\n  id bigserial primary key,\n  user_id text not null,\n  key text not null,\n  data jsonb not null default \'{}\'::jsonb,\n  updated_at timestamptz default now(),\n  unique(user_id, key)\n);');
      return;
    }
    if(data && data.length){
      for(const row of data){
        if(cmdState[row.key] && row.data){
          cmdState[row.key] = Object.assign(cmdState[row.key], row.data);
        }
      }
    }
    // Ensure plan start date is set and persisted on first run
    if(!cmdState.plan.startDate){
      cmdState.plan.startDate = getTodayISO();
      cmdSaveNow('plan');
    }
  }catch(e){ cmdPersistDisabled = true; }
}

function cmdSave(key){
  if(cmdSaveTimers[key]) clearTimeout(cmdSaveTimers[key]);
  cmdMarkStatus(key,'saving');
  cmdSaveTimers[key] = setTimeout(()=>cmdSaveNow(key), 450);
}

async function cmdSaveNow(key){
  if(cmdPersistDisabled || !currentUser){ cmdMarkStatus(key,'saved'); return; }
  try{
    const {error} = await db.from('helm_command_state').upsert({
      user_id: currentUser.username,
      key,
      data: cmdState[key],
      updated_at: new Date().toISOString(),
    }, {onConflict:'user_id,key'});
    if(error){ cmdMarkStatus(key,''); return; }
    cmdMarkStatus(key,'saved');
  }catch(e){ cmdMarkStatus(key,''); }
}

function cmdMarkStatus(key,state){
  const el = document.querySelector(`[data-cmd-save="${key}"]`);
  if(!el) return;
  el.className = 'cmd-autosave '+state;
  el.textContent = state==='saving' ? 'Saving…' : state==='saved' ? 'Saved' : '';
  if(state==='saved') setTimeout(()=>{ if(el.classList.contains('saved')) el.textContent=''; }, 1600);
}

function cmdUid(prefix){ return prefix+'-'+Math.random().toString(36).slice(2,9); }

function cmdEsc(s){ return esc(s); }

async function renderCmd(){
  const tab = document.getElementById('tab-cmd');
  if(!cmdState){
    tab.innerHTML = '<div class="cmd-wrap"><div style="text-align:center;padding:40px;color:rgba(255,255,255,0.5);font-size:13px">Loading command center…</div></div>';
    await cmdLoad();
  }
  tab.innerHTML = `
    <div class="cmd-wrap">
      <div class="cmd-header">
        <div class="cmd-header-left">
          <h1>Command Center</h1>
          <div class="cmd-header-sub">Strategic War Room &nbsp;·&nbsp; Private</div>
        </div>
        <div class="cmd-header-right">
          <div class="cmd-status"><div class="cmd-status-dot"></div><span>${cmdPersistDisabled?'Local only':'Live'}</span></div>
        </div>
      </div>
      <div class="cmd-subnav">
        <button class="${cmdActiveSub==='priorities'?'active':''}" onclick="cmdSwitchSub('priorities')">Priorities</button>
        <button class="${cmdActiveSub==='people'?'active':''}" onclick="cmdSwitchSub('people')">People &amp; Politics</button>
        <button class="${cmdActiveSub==='revenue'?'active':''}" onclick="cmdSwitchSub('revenue')">Revenue</button>
        <button class="${cmdActiveSub==='plan'?'active':''}" onclick="cmdSwitchSub('plan')">90-Day Plan</button>
        <button class="${cmdActiveSub==='org'?'active':''}" onclick="cmdSwitchSub('org')">Org Chart</button>

function cmdSwitchSub(sub){
  cmdActiveSub = sub;
  document.querySelectorAll('.cmd-subnav button').forEach((b,i)=>{
    const subs = ['priorities','people','revenue','plan','org'];
    b.classList.toggle('active', subs[i]===sub);
  });
  cmdRenderBody();
}

function cmdRenderBody(){
  const body = document.getElementById('cmdBody');
  if(!body) return;
  if(cmdActiveSub==='priorities') body.innerHTML = cmdRenderPriorities();
  else if(cmdActiveSub==='people') body.innerHTML = cmdRenderPeople();
  else if(cmdActiveSub==='revenue') body.innerHTML = cmdRenderRevenue();

}

// ── 90-DAY PLAN ──────────────────────────────────────────────────────
function cmdRenderPlan(){
  const plan = cmdState.plan;
  if(!plan.startDate) plan.startDate = getTodayISO();
  const phases = plan.phases.map((phase,idx)=>{
    const milestones = (phase.milestones||[]).map(m=>{
      const dateISO = cmdAddDays(plan.startDate, m.day-1);
      const label = fmtDate(dateISO);
      const calUrl = cmdCalendarUrl(m.title, dateISO);
      return `
        <div class="cmd-milestone ${m.checked?'checked':''}">
          <div class="cmd-check ${m.checked?'on':''}" onclick="cmdToggleMilestone('${phase.key}','${m.id}')"></div>
          <div class="cmd-milestone-body">
            <div class="cmd-milestone-title">${cmdEsc(m.title)}</div>
            <div class="cmd-milestone-date">Day ${m.day} · ${label}</div>
          </div>
          <a class="cmd-milestone-cal" href="${calUrl}" target="_blank" rel="noopener" title="Add to Google Calendar">📅</a>
        </div>`;
    }).join('');
    return `
      <div class="cmd-phase">
        <div class="cmd-phase-marker">${idx+1}</div>
        <div class="cmd-phase-body">
          <div class="cmd-phase-days">${phase.days}</div>
          <div class="cmd-phase-title">${cmdEsc(phase.title)}</div>
          <div class="cmd-phase-sub">Phase ${idx+1}</div>
          ${milestones}
        </div>
      </div>`;
  }).join('');
  return `
    <div class="cmd-section-title">90-Day Plan</div>
    <div class="cmd-section-desc">Day 1 = ${fmtDate(plan.startDate)}. Each milestone links to a pre-filled Google Calendar event.</div>
    <div class="cmd-timeline">
      <div class="cmd-timeline-track"></div>
      <div class="cmd-phases">${phases}</div>
    </div>
    ${cmdScratchBlock('plan', plan.scratch||'', 'Scratchpad — 90-day plan')}
  `;
}
function cmdToggleMilestone(phaseKey,id){
  const phase = cmdState.plan.phases.find(p=>p.key===phaseKey);
  if(!phase) return;
  const m = phase.milestones.find(x=>x.id===id);
  if(!m) return;
  m.checked = !m.checked;
  cmdSave('plan');
  cmdRenderBody();
}
function cmdAddDays(iso,days){
  const d = new Date(iso+'T00:00:00');
  d.setDate(d.getDate()+days);
  return d.toISOString().split('T')[0];
}
function cmdCalDateStr(iso){
  // Returns YYYYMMDD (all-day Google Cal format)
  return iso.replace(/-/g,'');
}
function cmdCalendarUrl(title,iso){
  const start = cmdCalDateStr(iso);
  const endDate = cmdAddDays(iso,1);
  const end = cmdCalDateStr(endDate);
  const params = new URLSearchParams({
    action:'TEMPLATE',
    text:title,
    dates:`${start}/${end}`,
    details:'HELM Command Center · 90-day plan milestone',
  });
  return 'https://calendar.google.com/calendar/render?'+params.toString();
}

function apTasksByProject(pid){ return apData.tasks.filter(t=>t.project_id===pid); }
function apTopTasks(filter){
  return apData.tasks.filter(t=>!t.parent_task_id && (filter ? filter(t) : true));
}
function apSubtasks(parentId){ return apData.tasks.filter(t=>t.parent_task_id===parentId); }
function apProjectProgress(pid){
  const tasks = apTopTasks(t=>t.project_id===pid);
  if(!tasks.length) return 0;
  const sum = tasks.reduce((s,t)=>s+(t.status==='Done'?100:(t.percent_complete||0)),0);
  return Math.round(sum / tasks.length);
}
function apMilestoneProgress(mid){
  const tasks = apData.tasks.filter(t=>t.milestone_id===mid && !t.parent_task_id);
  if(!tasks.length) return 0;
  const done = tasks.filter(t=>t.status==='Done').length;
  return Math.round((done / tasks.length)*100);
}
function apFmtDate(d){
  if(!d) return '';
  const dt = new Date(d+'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const days = Math.round((dt-today)/86400000);
  if(days===0) return 'Today';
  if(days===1) return 'Tomorrow';
  if(days===-1) return 'Yesterday';
  if(days>1 && days<7) return dt.toLocaleDateString('en-US',{weekday:'short'});
  if(days<-1 && days>-7) return Math.abs(days)+'d ago';
  return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
// Relative timestamp formatter (handles full timestamptz values, no UTC date-slice bug)
function apFmtTs(ts){
  if(!ts) return 'never';
  const d = new Date(ts);
  if(isNaN(d.getTime())) return 'never';
  const diffSec = Math.round((Date.now() - d.getTime()) / 1000);
  if(diffSec < 30) return 'just now';
  if(diffSec < 3600) return Math.round(diffSec/60)+'m ago';
  if(diffSec < 86400) return Math.round(diffSec/3600)+'h ago';
  if(diffSec < 86400*7) return Math.round(diffSec/86400)+'d ago';
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

// ── Recurrence helpers ───────────────────────────────────────────────
// recurrence shape (jsonb on helm_action_tasks):
//   {type:'daily'}
//   {type:'weekly', days:[1,5]}            // 0=Sun..6=Sat
//   {type:'monthly_day', day:15}            // day-of-month
//   {type:'monthly_last'}                   // last calendar day each month
//   {type:'every_n_days', n:14}
function apFmtRecurrence(rec){
  if(!rec || !rec.type) return '';
  if(rec.type === 'daily') return 'Daily';
  if(rec.type === 'weekly'){
    const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const days = (rec.days||[]).slice().sort();
    if(!days.length) return 'Weekly (no days picked)';
    if(days.length===5 && [1,2,3,4,5].every(d=>days.includes(d))) return 'Weekdays';
    if(days.length===2 && [0,6].every(d=>days.includes(d))) return 'Weekends';
    if(days.length===7) return 'Daily';
    return 'Weekly: '+days.map(d=>dayNames[d]).join(', ');
  }
  if(rec.type === 'monthly_day'){
    const d = rec.day || 1;
    const suffix = (d%10===1 && d!==11)?'st':(d%10===2 && d!==12)?'nd':(d%10===3 && d!==13)?'rd':'th';
    return 'Monthly on the '+d+suffix;
  }
  if(rec.type === 'monthly_last') return 'Last day of every month';
  if(rec.type === 'every_n_days') return 'Every '+(rec.n||7)+' day'+((rec.n||7)===1?'':'s');
  return '';
}
// Compute the next occurrence date AFTER fromIso. Returns 'YYYY-MM-DD' or null.
function apComputeNextDue(rec, fromIso){
  if(!rec || !rec.type) return null;
  const baseIso = fromIso || new Date().toISOString().slice(0,10);
  const from = new Date(baseIso+'T00:00:00');
  // Always advance at least one day past the fromIso anchor
  from.setDate(from.getDate() + 1);
  const iso = d => {
    const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
    return y+'-'+m+'-'+day;
  };

  if(rec.type === 'daily') return iso(from);
  if(rec.type === 'weekly'){
    const days = rec.days || [];
    if(!days.length) return null;
    for(let i=0; i<14; i++){
      const d = new Date(from);
      d.setDate(from.getDate() + i);
      if(days.includes(d.getDay())) return iso(d);
    }
    return null;
  }
  if(rec.type === 'monthly_day'){
    const want = Math.max(1, Math.min(31, rec.day || 1));
    let candidate = new Date(from.getFullYear(), from.getMonth(), want);
    while(candidate < from){
      candidate = new Date(candidate.getFullYear(), candidate.getMonth() + 1, want);
    }
    return iso(candidate);
  }
  if(rec.type === 'monthly_last'){
    let candidate = new Date(from.getFullYear(), from.getMonth() + 1, 0); // last day of current month
    if(candidate < from){
      candidate = new Date(from.getFullYear(), from.getMonth() + 2, 0);
    }
    return iso(candidate);
  }
  if(rec.type === 'every_n_days'){
    const n = Math.max(1, rec.n || 7);
    const d = new Date(from);
    d.setDate(from.getDate() + n - 1); // -1 because we already advanced 1
    return iso(d);
  }
  return null;
}

// Recurrence config sub-UI rendered inside the detail panel
function apRenderRecurConfig(t){
  const r = t.recurrence;
  if(!r || !r.type) return '';
  const inputStyle = 'width:80px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);color:#fff;font-family:inherit;font-size:12px;font-weight:500;padding:6px 10px;border-radius:5px;outline:none;';
  let cfgHtml = '';
  if(r.type === 'weekly'){
    const days = r.days || [];
    const dayLabels = ['S','M','T','W','T','F','S'];
    cfgHtml = `<div style="display:flex;gap:4px;">${dayLabels.map((label,i)=>`
      <button onclick="apToggleRecurDay(${t.id}, ${i})" style="
        width:30px;height:30px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;
        background:${days.includes(i)?'rgba(124,92,255,0.32)':'rgba(255,255,255,0.05)'};
        border:1px solid ${days.includes(i)?'rgba(124,92,255,0.65)':'rgba(255,255,255,0.15)'};
        color:${days.includes(i)?'#fff':'#cbd2e3'};
        font-family:inherit;">${label}</button>`).join('')}</div>
      <div style="font-size:10px;color:#a8b0c2;margin-top:5px;">Sun → Sat. Tap each day this should repeat.</div>`;
  } else if(r.type === 'monthly_day'){
    cfgHtml = `<input type="number" min="1" max="31" value="${r.day||1}" style="${inputStyle}"
      onchange="apSetRecurField(${t.id},'day',parseInt(this.value)||1)">
      <span style="font-size:11px;color:#a8b0c2;margin-left:8px;">Day of month (1-31). Months without that day will use the closest valid date.</span>`;
  } else if(r.type === 'every_n_days'){
    cfgHtml = `<input type="number" min="1" max="365" value="${r.n||7}" style="${inputStyle}"
      onchange="apSetRecurField(${t.id},'n',parseInt(this.value)||1)">
      <span style="font-size:11px;color:#a8b0c2;margin-left:8px;">Number of days between repeats.</span>`;
  }
  // Show next planned occurrence after current due date
  const baseDate = t.due_date || new Date().toISOString().slice(0,10);
  const next = apComputeNextDue(r, baseDate);
  const summary = apFmtRecurrence(r);
  return cfgHtml + `<div style="font-size:11px;color:#cbd2e3;margin-top:8px;padding-top:6px;border-top:1px dashed rgba(255,255,255,0.10);">
    <strong style="color:var(--ap-accent-2);">${esc(summary)}</strong>
    ${next?` &middot; <span style="color:#a8b0c2;">After this one, next would be <strong>${apFmtDate(next)}</strong></span>`:''}
  </div>`;
}

async function apOnRecurTypeChange(id, type){
  let recurrence = null;
  if(type === 'daily') recurrence = {type:'daily'};
  else if(type === 'weekly') recurrence = {type:'weekly', days:[]};
  else if(type === 'monthly_day') recurrence = {type:'monthly_day', day: new Date().getDate()};
  else if(type === 'monthly_last') recurrence = {type:'monthly_last'};
  else if(type === 'every_n_days') recurrence = {type:'every_n_days', n:7};
  // type === '' means stop repeating → store null
  await apUpdateTask(id, {recurrence});
  const t = apTask(id);
  if(t) apRenderTaskPanel(t);
}
async function apToggleRecurDay(id, day){
  const t = apTask(id);
  if(!t || !t.recurrence) return;
  const days = (t.recurrence.days || []).slice();
  const i = days.indexOf(day);
  if(i>=0) days.splice(i,1); else { days.push(day); days.sort(); }
  const nextRec = Object.assign({}, t.recurrence, {days});
  await apUpdateTask(id, {recurrence: nextRec});
  const updated = apTask(id);
  if(updated) apRenderTaskPanel(updated);
}
async function apSetRecurField(id, field, value){
  const t = apTask(id);
  if(!t || !t.recurrence) return;
  const nextRec = Object.assign({}, t.recurrence, {[field]: value});
  await apUpdateTask(id, {recurrence: nextRec});
  const updated = apTask(id);
  if(updated) apRenderTaskPanel(updated);
}
function apDueClass(d, status){
  if(!d || status==='Done' || status==='Cancelled') return '';
  const dt = new Date(d+'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const days = Math.round((dt-today)/86400000);
  if(days < 0) return 'overdue';
  if(days <= 2) return 'soon';
  return '';
}
function apStatusObj(s){ return AP_STATUSES.find(x=>x.id===s) || AP_STATUSES[0]; }
function apPriorityObj(p){ return AP_PRIORITIES.find(x=>x.id===p) || AP_PRIORITIES[0]; }
function apPriorityColor(p){ return ['#6b7280','#22d3ee','#f59e0b','#fb923c','#ef4444'][p]||'#6b7280'; }
function apTaskFullId(t){
  const proj = apProject(t.project_id);
  if(!proj || !proj.identifier) return '#'+t.id;
  return (proj.identifier||'?')+'-'+(t.task_number||t.id);
}
function apOverdueCount(projectId){
  const today = new Date(); today.setHours(0,0,0,0);
  const tasks = projectId ? apTasksByProject(projectId) : apData.tasks;
  return tasks.filter(t=>{
    if(!t.due_date || t.status==='Done' || t.status==='Cancelled') return false;
    return new Date(t.due_date+'T00:00:00') < today;
  }).length;
}
function apOpenCount(projectId){
  const tasks = projectId ? apTasksByProject(projectId) : apData.tasks;
  return tasks.filter(t=>t.status!=='Done' && t.status!=='Cancelled' && !t.parent_task_id).length;
}
function apUpdateBadge(){
  const btn = document.getElementById('actionTabBtn');
  if(!btn) return;
  const count = apData.tasks.filter(t=>!t.parent_task_id && (t.status==='InProgress' || t.status==='Todo')).length;
  const existing = btn.querySelector('.ai-tab-badge');
  if(existing) existing.remove();
  if(count > 0){
    const span = document.createElement('span');
    span.className = 'ai-tab-badge';
    span.textContent = count;
    btn.appendChild(span);
  }
}

  else apRenderMyTasks();
}

// ── Project header + view tabs ──
function apProjectHeader(p){
  const progress = apProjectProgress(p.id);
  const overdue = apOverdueCount(p.id);
  const total = apOpenCount(p.id);
  const v = apView.projectView;
  const tabBtn = (k,label) => `<button class="ap-viewtab ${v===k?'active':''}" onclick="apSetProjectView('${k}')">${label}</button>`;
  return `
    <div class="ap-top">
      <div class="ap-top-row">
        <div class="ap-top-icon" style="background:${p.color}1a;">${esc(p.emoji||'📁')}</div>
        <div class="ap-top-titlewrap">
          <input class="ap-top-title" spellcheck="false" value="${esc(p.name)}" onblur="apRenameProject(${p.id},this.value)" onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}">
        </div>
        ${p.identifier?`<span class="ap-top-id">${esc(p.identifier)}</span>`:''}
        <div class="ap-top-progresswrap">
          <div class="ap-top-progress"><div class="ap-top-progress-fill" style="width:${progress}%"></div></div>
          <span style="font-family:'DM Mono',monospace;font-size:12px;">${progress}%</span>
        </div>
        <button class="ap-icon-btn danger" onclick="apDeleteProject(${p.id})" title="Archive project">\u{1F5D1}</button>
      </div>
      <div class="ap-top-meta">
        <span class="ap-meta-pill">${total} open</span>
        ${overdue>0?`<span class="ap-meta-pill danger">${overdue} overdue</span>`:''}
        ${p.due_date?`<span class="ap-meta-pill">Due ${apFmtDate(p.due_date)}</span>`:''}
        ${apData.milestones.filter(m=>m.project_id===p.id).length>0?`<span class="ap-meta-pill">${apData.milestones.filter(m=>m.project_id===p.id).length} milestone${apData.milestones.filter(m=>m.project_id===p.id).length===1?'':'s'}</span>`:''}
      </div>
      <div class="ap-viewtabs">
        ${tabBtn('dashboard','Dashboard')}
        ${tabBtn('list','List')}
        ${tabBtn('board','Board')}
        ${tabBtn('gantt','Gantt')}
        ${tabBtn('milestones','Milestones')}
      </div>
    </div>
  `;
}

function apRenderProject(pid){
  const main = document.getElementById('apMain');
  const p = apProject(pid);
  if(!p){ main.innerHTML = '<div class="ap-empty">Project not found.</div>'; return; }
  const view = apView.projectView;
  let body = '';
  if(view === 'dashboard') body = apViewDashboard(p);
  else if(view === 'list') body = apViewList(p);
  else if(view === 'board') body = apViewBoard(p);
  else if(view === 'gantt') body = apViewGantt(p);
  else if(view === 'milestones') body = apViewMilestones(p);
  main.innerHTML = apProjectHeader(p) + `<div class="ap-body">${body}</div>`;
  if(view==='gantt') apGanttDrawArrows(p);
}

// ── Dashboard view ──
function apViewDashboard(p){
  const tasks = apTasksByProject(p.id);
  const top = apTopTasks(t=>t.project_id===p.id);
  const open = top.filter(t=>t.status!=='Done' && t.status!=='Cancelled').length;
  const doneN = top.filter(t=>t.status==='Done').length;
  const inProg = top.filter(t=>t.status==='InProgress').length;
  const overdue = apOverdueCount(p.id);
  const milestones = apData.milestones.filter(m=>m.project_id===p.id);
  const recent = apData.activity.filter(a=>a.project_id===p.id).slice(0,8);
  const upcoming = top
    .filter(t=>t.status!=='Done' && t.status!=='Cancelled')
    .sort((a,b)=>(b.priority||0)-(a.priority||0) || ((a.due_date||'9999')>(b.due_date||'9999')?1:-1))
    .slice(0,5);

  return `
    <div class="ap-kpi-grid">
      <div class="ap-kpi"><div class="ap-kpi-label">Open</div><div class="ap-kpi-val">${open}</div></div>
      <div class="ap-kpi"><div class="ap-kpi-label">In Progress</div><div class="ap-kpi-val">${inProg}</div></div>
      <div class="ap-kpi"><div class="ap-kpi-label">Done</div><div class="ap-kpi-val">${doneN}</div></div>
      <div class="ap-kpi"><div class="ap-kpi-label">Overdue</div><div class="ap-kpi-val">${overdue}</div>${overdue>0?'<div class="ap-kpi-sub danger">Needs attention</div>':'<div class="ap-kpi-sub ok">On track</div>'}</div>
    </div>

    <div class="ap-section">
      <div class="ap-section-hdr">Top Priority — Next Up</div>
      ${upcoming.length === 0 ? '<div style="color:var(--ap-text-mute);font-size:12px;padding:8px;">Nothing waiting. Add a task with C.</div>' : upcoming.map(t=>`
        <div class="ap-card-row" onclick="apOpenTask(${t.id})">
          ${apPrioBars(t.priority||0)}
          <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--ap-text-mute);min-width:56px;">${esc(apTaskFullId(t))}</span>
          <span style="flex:1;color:var(--ap-text);">${esc(t.title)}</span>
          ${t.due_date?`<span class="ap-row-due ${apDueClass(t.due_date,t.status)}">${apFmtDate(t.due_date)}</span>`:''}
          ${apStatusChip(t.status, t.id)}
        </div>`).join('')}
    </div>

    ${milestones.length>0 ? `
    <div class="ap-section">
      <div class="ap-section-hdr">Milestones</div>
      ${milestones.map(m=>{
        const pct = apMilestoneProgress(m.id);
        const overdueM = m.due_date && new Date(m.due_date+'T00:00:00') < new Date() && pct<100 ? 'overdue':'';
        return `<div class="ap-mile" onclick="apEditMilestonePrompt(${m.id})">
          <div class="ap-mile-hdr">
            <div class="ap-mile-icon" style="background:${m.color||'#a78bfa'};"></div>
            <div class="ap-mile-name">${esc(m.name)}</div>
            <div class="ap-mile-due ${overdueM}">${m.due_date?apFmtDate(m.due_date):'No due date'}</div>
          </div>
          <div class="ap-mile-progress">
            <div class="ap-mile-progress-bar"><div class="ap-mile-progress-fill" style="width:${pct}%"></div></div>
            <div class="ap-mile-progress-pct">${pct}%</div>
          </div>
        </div>`;
      }).join('')}
    </div>` : ''}

    ${recent.length>0?`
    <div class="ap-section">
      <div class="ap-section-hdr">Recent Activity</div>
      ${recent.map(a=>`<div style="padding:6px 8px;font-size:12px;color:var(--ap-text-dim);border-bottom:1px solid rgba(255,255,255,0.03);">
        <span style="color:var(--ap-text-mute);font-family:'DM Mono',monospace;font-size:10px;margin-right:8px;">${new Date(a.created_at).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}</span>
        ${esc(a.action)}${a.detail&&a.detail.title?` — ${esc(a.detail.title)}`:''}
      </div>`).join('')}
    </div>`:''}
  `;
}

// ── List view (with tasklist groups + subtasks + inline add) ──
function apViewList(p){
  const tasklists = apData.tasklists.filter(tl=>tl.project_id===p.id);
  let html = '';
  for(const tl of tasklists){
    const tasks = apData.tasks.filter(t=>t.tasklist_id===tl.id && !t.parent_task_id);
    const collapsed = apView.collapsedTasklists.has(tl.id);
    html += `<div class="ap-list-group">
      <div class="ap-list-group-hdr" onclick="apToggleTasklist(${tl.id})">
        <span class="ap-list-group-arrow ${collapsed?'':'open'}">\u25B8</span>
        <span data-selectable>${esc(tl.name)}</span>
        <span class="ap-list-group-count">${tasks.length}</span>
        <span class="ap-list-group-actions">
          <button class="ap-icon-btn" onclick="event.stopPropagation();apRenameTasklist(${tl.id})" title="Rename">\u270E</button>
          <button class="ap-icon-btn danger" onclick="event.stopPropagation();apDeleteTasklist(${tl.id})" title="Archive">\u00D7</button>
        </span>
      </div>`;
    if(!collapsed){
      for(const t of tasks){
        html += apListRow(t, false);
        for(const sub of apSubtasks(t.id)) html += apListRow(sub, true);
      }
      // Inline add task
      if(apView.inlineAddTasklistId === tl.id){
        html += `<div class="ap-add-task-input">
          <span class="ap-status-dot" style="background:#6b7280"></span>
          <input id="apInlineTask" placeholder="Task title + Enter (Esc to cancel)"
            spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"
            style="color:#fff;caret-color:#fff;"
            onkeydown="if(event.key==='Enter'){event.preventDefault();apInlineCommitTask(${tl.id});}else if(event.key==='Escape'){event.preventDefault();apInlineCancelTask();}"
            onblur="apInlineMaybeCommitTask(${tl.id})">
        </div>`;
      } else {
        html += `<div class="ap-add-task-row" onclick="apInlineAddTask(${tl.id})">
          <span style="font-size:14px;line-height:1;">+</span><span>Add task</span>
        </div>`;
      }
    }
    html += `</div>`;
  }
  // Tasks with no tasklist
  const orphan = apData.tasks.filter(t=>t.project_id===p.id && !t.tasklist_id && !t.parent_task_id);
  if(orphan.length){
    html += `<div class="ap-list-group"><div class="ap-list-group-hdr"><span class="ap-list-group-arrow open">\u25B8</span><span>Unsorted</span><span class="ap-list-group-count">${orphan.length}</span></div>`;
    for(const t of orphan){ html += apListRow(t,false); for(const sub of apSubtasks(t.id)) html += apListRow(sub,true); }
    html += `</div>`;
  }
  // New tasklist row
  html += `<div class="ap-add-task-row" style="margin-top:18px;border:1px dashed rgba(255,255,255,0.1);padding:10px;justify-content:center;border-radius:6px;" onclick="apCreateTasklistPrompt(${p.id})">+ New section</div>`;
  if(tasklists.length===0 && orphan.length===0){
    html += `<div class="ap-empty"><div class="ap-empty-icon">\u2756</div>No tasks yet. Press <kbd style="background:rgba(255,255,255,0.06);padding:2px 6px;border-radius:3px;">C</kbd> to add one, or click <strong style="color:var(--ap-accent-2);">+ New section</strong> above.</div>`;
  }
  return html;
}

function apListRow(t, isSub){
  const due = t.due_date ? `<span class="ap-row-due ${apDueClass(t.due_date,t.status)}">${apFmtDate(t.due_date)}</span>` : '<span></span>';
  const ms = t.milestone_id ? (apMilestone(t.milestone_id) ? `<span class="ap-row-mile">\u25C6 ${esc(apMilestone(t.milestone_id).name)}</span>` : '<span></span>') : '<span></span>';
  const pct = (t.percent_complete||0) > 0 && t.status !== 'Done'
    ? `<span class="ap-row-pct">${t.percent_complete}%<span class="ap-row-pct-bar"><span class="ap-row-pct-bar-fill" style="width:${t.percent_complete}%"></span></span></span>`
    : '<span></span>';
  const titleCls = t.status==='Done' || t.status==='Cancelled' ? 'done':'';
  const recurIcon = (t.recurrence && t.recurrence.type)
    ? `<span title="Repeats: ${esc(apFmtRecurrence(t.recurrence))}" style="margin-left:6px;color:var(--ap-accent-2);font-size:11px;vertical-align:middle;">\u{1F501}</span>`
    : '';
  return `<div class="ap-row ${isSub?'subtask':''} ${apView.selectedTaskId===t.id?'selected':''}" onclick="apOpenTask(${t.id})">
    ${apPrioBars(t.priority||0)}
    <span class="ap-row-id">${esc(apTaskFullId(t))}</span>
    <span class="ap-row-title ${titleCls}" data-selectable>${esc(t.title)}${recurIcon}</span>
    ${ms}
    ${due}
    ${pct}
    ${apStatusChip(t.status, t.id)}
  </div>`;
}

function apToggleTasklist(id){
  if(apView.collapsedTasklists.has(id)) apView.collapsedTasklists.delete(id);
  else apView.collapsedTasklists.add(id);
  apRenderMain();
}

// ── Inline add task ──
function apInlineAddTask(tasklistId){
  apView.inlineAddTasklistId = tasklistId;
  apRenderMain();
  setTimeout(()=>{const el=document.getElementById('apInlineTask'); if(el){ el.focus(); }}, 30);
}
function apInlineCancelTask(){ apView.inlineAddTasklistId=null; apRenderMain(); }
let apInlineCommittingTask = false;
async function apInlineCommitTask(tasklistId){
  if(apInlineCommittingTask) return;
  apInlineCommittingTask = true;
  try{
    const el = document.getElementById('apInlineTask');
    if(!el) return;
    const title = el.value.trim();
    if(!title){ apInlineCancelTask(); return; }
    const tl = apTasklist(tasklistId);
    if(!tl) return;
    await apCreateTask({project_id: tl.project_id, tasklist_id: tasklistId, title, status:'Backlog'});
    apView.inlineAddTasklistId = null;
    apRenderMain();
  } finally { apInlineCommittingTask = false; }
}
function apInlineMaybeCommitTask(tasklistId){
  if(apInlineCommittingTask) return;
  const el = document.getElementById('apInlineTask');
  if(!el) return;
  const title = el.value.trim();
  if(!title){ apInlineCancelTask(); return; }
  apInlineCommitTask(tasklistId);
}

// ── Board view ──
function apViewBoard(p){
  const tasks = apTopTasks(t=>t.project_id===p.id);
  let html = `<div class="ap-board" id="apBoard">`;
  for(const s of AP_STATUSES){
    const colTasks = tasks.filter(t=>t.status===s.id);
    html += `<div class="ap-col" data-status="${s.id}" ondragover="event.preventDefault();" ondrop="apDropOnBoard(event,'${s.id}')">
      <div class="ap-col-hdr">
        <span class="ap-status-dot" style="background:${s.color}"></span>
        <span>${s.label}</span>
        <span class="ap-col-count">${colTasks.length}</span>
      </div>
      <div class="ap-col-body">
        ${colTasks.map(t=>apBoardCard(t)).join('')}
        <div class="ap-col-add" onclick="apQuickAddInStatus(${p.id},'${s.id}')">+ Add task</div>
      </div>
    </div>`;
  }
  html += `</div>`;
  return html;
}
function apBoardCard(t){
  const tl = t.tasklist_id ? apTasklist(t.tasklist_id) : null;
  const due = t.due_date?`<span class="ap-row-due ${apDueClass(t.due_date,t.status)}">${apFmtDate(t.due_date)}</span>`:'';
  return `<div class="ap-card" draggable="true"
    ondragstart="apDragStart(event,${t.id})" ondragend="this.classList.remove('dragging')"
    onclick="apOpenTask(${t.id})">
    <div class="ap-card-hdr">
      ${apPrioBars(t.priority||0)}
      <span class="ap-card-id">${esc(apTaskFullId(t))}</span>
      ${tl?`<span style="font-size:10px;color:var(--ap-text-mute);margin-left:auto;">${esc(tl.name)}</span>`:''}
    </div>
    <div class="ap-card-title" data-selectable>${esc(t.title)}</div>
    <div class="ap-card-foot">
      ${due}
      ${(t.percent_complete||0)>0 ? `<span class="ap-row-pct">${t.percent_complete}%</span>`:''}
    </div>
  </div>`;
}
function apDragStart(e, taskId){
  e.dataTransfer.setData('text/plain', String(taskId));
  e.target.classList.add('dragging');
}
async function apDropOnBoard(e, newStatus){
  e.preventDefault();
  const taskId = parseInt(e.dataTransfer.getData('text/plain'));
  if(!taskId) return;
  await apUpdateTask(taskId, {status:newStatus, ...(newStatus==='Done'?{percent_complete:100,completed_at:new Date().toISOString()}:{})});
  apRenderMain();
  apUpdateBadge();
}
async function apQuickAddInStatus(projectId, status){
  const result = await apPrompt({
    title: 'New task',
    fields: [{key:'title', label:'Task title', placeholder:"What's the task?", required:true}],
    submitLabel: 'Add task',
  });
  if(!result) return;
  const firstTl = apData.tasklists.find(tl=>tl.project_id===projectId);
  await apCreateTask({project_id: projectId, tasklist_id: firstTl?firstTl.id:null, title:result.title, status});
  apRenderMain();
}

// ── Gantt view ──
function apViewGantt(p){
  const tasks = apTopTasks(t=>t.project_id===p.id && (t.start_date || t.due_date));
  const milestones = apData.milestones.filter(m=>m.project_id===p.id && m.due_date);
  const zoomBtn = (z,label) => `<button class="${apView.ganttZoom===z?'active':''}" onclick="apView.ganttZoom='${z}';apRenderMain();">${label}</button>`;
  if(tasks.length===0 && milestones.length===0){
    return `<div class="ap-gantt-zoom">${zoomBtn('week','Week')}${zoomBtn('month','Month')}${zoomBtn('quarter','Quarter')}</div>
      <div class="ap-gantt-empty">No scheduled work yet. Give a task a start &amp; due date and it'll show up here.</div>`;
  }
  // Compute date range
  const dates = [];
  for(const t of tasks){
    if(t.start_date) dates.push(t.start_date);
    if(t.due_date) dates.push(t.due_date);
  }
  for(const m of milestones) if(m.due_date) dates.push(m.due_date);
  dates.push(new Date().toISOString().slice(0,10));
  dates.sort();
  const minD = new Date(dates[0]+'T00:00:00');
  const maxD = new Date(dates[dates.length-1]+'T00:00:00');
  // Pad
  minD.setDate(minD.getDate() - 3);
  maxD.setDate(maxD.getDate() + 7);
  const dayCount = Math.ceil((maxD - minD)/86400000) + 1;
  const dayWidth = apView.ganttZoom==='week'?40 : apView.ganttZoom==='month'?20 : 8;
  const trackWidth = dayCount * dayWidth;
  // Header
  let hdrCells = '';
  for(let i=0;i<dayCount;i++){
    const d = new Date(minD); d.setDate(minD.getDate()+i);
    const dow = d.getDay();
    const weekend = (dow===0||dow===6) ? 'weekend':'';
    const showLabel = apView.ganttZoom==='week' || (apView.ganttZoom==='month' && d.getDate()%5===1) || (apView.ganttZoom==='quarter' && d.getDate()===1);
    hdrCells += `<div class="ap-gantt-hdr-cell ${weekend}" style="width:${dayWidth}px;">
      ${showLabel?`<div class="gw">${d.getDate()}</div><div>${d.toLocaleDateString('en-US',{month:'short'})}</div>`:''}
    </div>`;
  }
  // Today line
  const today = new Date(); today.setHours(0,0,0,0);
  const todayOffset = Math.round((today - minD)/86400000) * dayWidth;
  // Rows
  let rowsHTML = '';
  const allRows = [...tasks.map(t=>({type:'task',obj:t})), ...milestones.map(m=>({type:'mile',obj:m}))];
  for(const r of allRows){
    if(r.type==='task'){
      const t = r.obj;
      const start = new Date((t.start_date||t.due_date)+'T00:00:00');
      const end = new Date((t.due_date||t.start_date)+'T00:00:00');
      const left = Math.round((start - minD)/86400000) * dayWidth;
      const w = Math.max(dayWidth, (Math.round((end - start)/86400000) + 1) * dayWidth);
      const cls = t.status==='Done'?'done' : t.status==='InProgress'?'inprogress' : t.status==='Todo'?'todo' : t.status==='InReview'?'inreview' : t.status==='Cancelled'?'cancelled' : 'backlog';
      rowsHTML += `<div class="ap-gantt-row" data-task="${t.id}">
        <div class="ap-gantt-label" onclick="apOpenTask(${t.id})">
          ${apPrioBars(t.priority||0)}
          <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;">${esc(t.title)}</span>
        </div>
        <div class="ap-gantt-track" style="width:${trackWidth}px;">
          <div class="ap-gantt-bar ${cls}" style="left:${left}px;width:${w-2}px;" onclick="apOpenTask(${t.id})" title="${esc(t.title)} (${apStatusObj(t.status).label})">
            ${esc(t.title.slice(0,Math.max(1,Math.floor(w/8))))}
          </div>
        </div>
      </div>`;
    } else {
      const m = r.obj;
      const d = new Date(m.due_date+'T00:00:00');
      const left = Math.round((d - minD)/86400000) * dayWidth;
      rowsHTML += `<div class="ap-gantt-row" data-mile="${m.id}">
        <div class="ap-gantt-label" onclick="apEditMilestonePrompt(${m.id})">
          <div class="ap-mile-icon" style="width:12px;height:12px;background:${m.color||'#a78bfa'};border:none;"></div>
          <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;color:var(--ap-accent-2);">${esc(m.name)}</span>
        </div>
        <div class="ap-gantt-track" style="width:${trackWidth}px;">
          <div class="ap-gantt-mile" style="left:${left}px;background:${m.color||'#a78bfa'};" onclick="apEditMilestonePrompt(${m.id})" title="${esc(m.name)} — ${apFmtDate(m.due_date)}"></div>
        </div>
      </div>`;
    }
  }
  return `
    <div class="ap-gantt-zoom">${zoomBtn('week','Week')}${zoomBtn('month','Month')}${zoomBtn('quarter','Quarter')}</div>
    <div class="ap-gantt" id="apGantt">
      <div class="ap-gantt-hdr">
        <div class="ap-gantt-hdr-spacer">Task / Milestone</div>
        <div class="ap-gantt-hdr-track" style="width:${trackWidth}px;">${hdrCells}</div>
      </div>
      <div class="ap-gantt-grid" style="position:relative;">
        ${todayOffset>=0?`<div class="ap-gantt-today" style="left:${240+todayOffset}px;height:${(allRows.length)*36}px;"></div>`:''}
        <svg class="ap-gantt-svg" id="apGanttSvg" width="${trackWidth}" height="${allRows.length*36}" style="overflow:visible;">
          <defs><marker id="ap-arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M0,0 L8,4 L0,8 z" fill="#a78bfa"/>
          </marker></defs>
        </svg>
        ${rowsHTML}
      </div>
    </div>
  `;
}

function apGanttDrawArrows(p){
  const svg = document.getElementById('apGanttSvg');
  if(!svg) return;
  const deps = apData.dependencies.filter(d=>{
    const a = apTask(d.task_id), b = apTask(d.depends_on_task_id);
    return a && b && a.project_id===p.id && b.project_id===p.id;
  });
  // Find row positions
  const rows = svg.parentElement.querySelectorAll('.ap-gantt-row');
  const rowMap = {};
  rows.forEach((row,i)=>{
    const tid = row.getAttribute('data-task');
    if(tid) rowMap[tid] = {y: i*36 + 18, bar: row.querySelector('.ap-gantt-bar')};
  });
  let arrows = svg.innerHTML.includes('marker') ? svg.innerHTML.split('</defs>')[0]+'</defs>' : svg.innerHTML;
  for(const dep of deps){
    const from = rowMap[dep.depends_on_task_id], to = rowMap[dep.task_id];
    if(!from || !to || !from.bar || !to.bar) continue;
    const fx = from.bar.offsetLeft + from.bar.offsetWidth, fy = from.y;
    const tx = to.bar.offsetLeft, ty = to.y;
    const midX = Math.max(fx + 8, tx - 8);
    arrows += `<path class="ap-gantt-line" d="M ${fx} ${fy} H ${midX} V ${ty} H ${tx}" marker-end="url(#ap-arrow)"/>`;
  }
  svg.innerHTML = arrows;
}

  for(const m of milestones){

function apGroupedTaskList(tasks, by){
  if(!tasks.length) return '<div class="ap-empty">Nothing here.</div>';
  // Group by project
  const groups = {};
  for(const t of tasks){
    const k = by==='project' ? (t.project_id||0) : 'all';
    if(!groups[k]) groups[k] = [];
    groups[k].push(t);
  }
  let html = '';
  for(const [k, gtasks] of Object.entries(groups)){
    const proj = by==='project' ? apProject(parseInt(k)) : null;
    if(proj){
      html += `<div class="ap-list-group">
        <div class="ap-list-group-hdr" onclick="apOpenProject(${proj.id})">
          <span style="font-size:14px;">${esc(proj.emoji||'📁')}</span>
          <span data-selectable>${esc(proj.name)}</span>
          <span class="ap-list-group-count">${gtasks.length}</span>
        </div>`;
    }
    for(const t of gtasks) html += apListRow(t, false);
    if(proj) html += `</div>`;
  }
  return html;
}

async function apCommitSubtask(parentId){

async function apAddDependencyPrompt(taskId, kind){
  const t = apTask(taskId);
  if(!t) return;
  const choices = apData.tasks.filter(x=>x.id!==taskId && x.project_id===t.project_id && !x.parent_task_id);
  if(!choices.length){ toast('No other tasks in this project to depend on'); return; }
  // Build a dark modal with a select
  const bd = document.createElement('div');
  bd.className = 'ap-modal-bd';
  bd.id = 'apDepModal';
  bd.onclick = e=>{ if(e.target===bd) bd.remove(); };
  const opts = choices.map(c=>`<option value="${c.id}">${esc(apTaskFullId(c))} — ${esc(c.title)}</option>`).join('');
  bd.innerHTML = `
    <div class="ap-modal" style="max-width:480px;">
      <div class="ap-modal-hdr"><span style="color:#fff;font-weight:500;">Add dependency</span><span style="margin-left:auto;font-size:10px;">Esc to cancel</span></div>
      <div class="ap-modal-body">
        <div class="ap-prompt-field">
          <label>This task is blocked by</label>
          <select id="apDepSel" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);color:#fff;font-family:inherit;font-size:13px;padding:9px 12px;border-radius:6px;outline:none;">
            ${opts}
          </select>
        </div>
      </div>
      <div class="ap-modal-foot">
        <button class="ap-btn ap-btn-ghost" data-act="cancel">Cancel</button>
        <button class="ap-btn ap-btn-primary" data-act="ok">Add dependency</button>
      </div>
    </div>`;
  document.body.appendChild(bd);
  const close = ()=>bd.remove();
  bd.querySelector('[data-act=cancel]').onclick = close;
  bd.querySelector('[data-act=ok]').onclick = async ()=>{
    const sel = document.getElementById('apDepSel');
    if(!sel) return;
    const depOn = parseInt(sel.value);
    const {data, error} = await db.from('helm_action_dependencies').insert({
      task_id: taskId, depends_on_task_id: depOn, dep_type:'FS',
    }).select().single();
    if(error){ toast('Failed: '+error.message); return; }
    apData.dependencies.push(data);
    close();
    toast('Dependency added', true);
    apOpenTask(taskId);
  };
  bd.addEventListener('keydown', e=>{ if(e.key==='Escape'){e.preventDefault();close();} });
  setTimeout(()=>{const el=document.getElementById('apDepSel');if(el)el.focus();},30);
}
async function apRemoveDependency(depId){
  const {error} = await db.from('helm_action_dependencies').delete().eq('id',depId);
  if(error){ toast('Failed: '+error.message); return; }
  apData.dependencies = apData.dependencies.filter(d=>d.id!==depId);
  if(apView.selectedTaskId) apOpenTask(apView.selectedTaskId);
}

// ── Generic dark prompt (replaces native prompt() / confirm()) ──
function apPrompt(opts){
  // opts: { title, fields: [{key,label,value,placeholder,type,required}], submitLabel, danger }
  return new Promise(resolve=>{
    const bd = document.createElement('div');
    bd.className = 'ap-modal-bd';
    bd.id = 'apPromptModal';
    const onClose = (val)=>{ bd.remove(); resolve(val); };
    bd.onclick = e=>{ if(e.target===bd) onClose(null); };
    const fieldsHTML = (opts.fields||[]).map((f,i)=>{
      const id = 'apPF_'+i;
      const tag = f.type==='textarea' ? 'textarea' : 'input';
      const typeAttr = (f.type && f.type!=='textarea') ? `type="${f.type}"` : '';
      const valAttr = f.type==='textarea' ? '' : `value="${esc(f.value||'')}"`;
      const inner = f.type==='textarea' ? esc(f.value||'') : '';
      return `<div class="ap-prompt-field">
        <label>${esc(f.label||f.key)}</label>
        <${tag} id="${id}" data-key="${esc(f.key)}" ${typeAttr} ${valAttr} placeholder="${esc(f.placeholder||'')}">${inner}</${tag}>
      </div>`;
    }).join('');
    bd.innerHTML = `
      <div class="ap-modal" style="max-width:420px;">
        <div class="ap-modal-hdr">
          <span style="color:#fff;font-weight:500;">${esc(opts.title||'')}</span>
          <span style="margin-left:auto;font-size:10px;">Esc to cancel</span>
        </div>
        <div class="ap-modal-body">${fieldsHTML}</div>
        <div class="ap-modal-foot">
          <button class="ap-btn ap-btn-ghost" data-act="cancel">Cancel</button>
          <button class="ap-btn ${opts.danger?'ap-btn-ghost':'ap-btn-primary'}" data-act="ok" ${opts.danger?'style="color:#f87171;border-color:rgba(248,113,113,0.4);"':''}>${esc(opts.submitLabel||'OK')}</button>
        </div>
      </div>`;
    document.body.appendChild(bd);
    const collect = ()=>{
      const out = {};
      for(const f of (opts.fields||[])){
        const el = bd.querySelector(`[data-key="${f.key}"]`);
        out[f.key] = el ? el.value.trim() : '';
        if(f.required && !out[f.key]) return null;
      }
      return out;
    };
    const submit = ()=>{ const v = collect(); if(v===null){ toast('Required field is empty'); return; } onClose(v); };
    bd.querySelector('[data-act=cancel]').onclick = ()=>onClose(null);
    bd.querySelector('[data-act=ok]').onclick = submit;
    bd.addEventListener('keydown', e=>{
      if(e.key==='Escape'){ e.preventDefault(); onClose(null); }
      else if(e.key==='Enter' && e.target.tagName!=='TEXTAREA'){ e.preventDefault(); submit(); }
    });
    setTimeout(()=>{ const first=bd.querySelector('input,textarea'); if(first){ first.focus(); first.select && first.select(); } },30);
  });
}

function apConfirm(message, opts){
  // opts: {title, danger, confirmLabel}
  return new Promise(resolve=>{
    const bd = document.createElement('div');
    bd.className = 'ap-modal-bd';
    const onClose = (val)=>{ bd.remove(); resolve(val); };
    bd.onclick = e=>{ if(e.target===bd) onClose(false); };
    bd.innerHTML = `
      <div class="ap-modal" style="max-width:380px;">
        <div class="ap-modal-hdr"><span style="color:#fff;font-weight:500;">${esc((opts&&opts.title)||'Confirm')}</span></div>
        <div class="ap-modal-body" style="font-size:13px;color:var(--ap-text);line-height:1.5;">${esc(message)}</div>
        <div class="ap-modal-foot">
          <button class="ap-btn ap-btn-ghost" data-act="cancel">Cancel</button>
          <button class="ap-btn ${opts&&opts.danger?'ap-btn-ghost':'ap-btn-primary'}" ${opts&&opts.danger?'style="color:#f87171;border-color:rgba(248,113,113,0.4);"':''} data-act="ok">${esc((opts&&opts.confirmLabel)||'Confirm')}</button>
        </div>
      </div>`;
    document.body.appendChild(bd);
    bd.querySelector('[data-act=cancel]').onclick = ()=>onClose(false);
    bd.querySelector('[data-act=ok]').onclick = ()=>onClose(true);
    bd.addEventListener('keydown', e=>{
      if(e.key==='Escape'){ e.preventDefault(); onClose(false); }
      else if(e.key==='Enter'){ e.preventDefault(); onClose(true); }
    });
    setTimeout(()=>{ const ok=bd.querySelector('[data-act=ok]'); if(ok) ok.focus(); },30);
  });
}

async function apCreateTask(payload){

  const {data, error} = await db.from('helm_action_tasks').update(updates).eq('id',id).select().single();
  if(error){ toast('Save failed: '+error.message); return null; }
  const idx = apData.tasks.findIndex(t=>t.id===id);
  if(idx>=0) apData.tasks[idx] = data;
  apUpdateBadge();
  return data;
}
async function apUpdateTaskField(id, field, value){
  const update = {[field]:value};
  const old = apTask(id);
  if(field==='status' && value==='Done'){
    // Recurring task? Roll forward to next occurrence instead of completing.
    if(old && old.recurrence && old.recurrence.type){
      const baseDate = old.due_date || new Date().toISOString().slice(0,10);
      const nextDue = apComputeNextDue(old.recurrence, baseDate);
      if(nextDue){
        update.status = 'Todo';
        update.due_date = nextDue;
        update.percent_complete = 0;
        update.completed_at = null;
        toast('Rolled forward → next: '+apFmtDate(nextDue), true);
      } else {
        // Recurrence couldn't compute (e.g., weekly with no days picked) → fall back to Done
        update.percent_complete = 100;
        update.completed_at = new Date().toISOString();
      }
    } else {
      update.percent_complete = 100;
      update.completed_at = new Date().toISOString();
    }
  }
  if(field==='status' && value!=='Done'){
    update.completed_at = null;
    // Cycling away from Done: drop the auto-100% so project progress isn't
    // stuck at 100. (Status moves backward → progress moves backward.)
    if(old && old.status === 'Done') update.percent_complete = 0;
  }
  await apUpdateTask(id, update);
  if(field==='status') apLogActivity(update.status==='Todo' && old && old.recurrence ? 'Recurring task rolled' : 'Status changed', old.project_id, id, {from:old.status, to:update.status||value, title:old.title});
  // Re-render whatever's open
  if(apView.current==='project') apRenderMain();
  else apRenderMain();
  if(apView.selectedTaskId===id){ const t=apTask(id); if(t) apRenderTaskPanel(t); }
}
async function apCycleStatus(taskId){
  const t = apTask(taskId);
  if(!t) return;
  const idx = AP_STATUSES.findIndex(s=>s.id===t.status);
  const next = AP_STATUSES[(idx+1)%AP_STATUSES.length];
  await apUpdateTaskField(taskId, 'status', next.id);
}
async function apDuplicateTask(id){
  const t = apTask(id); if(!t) return;
  const dup = await apCreateTask({
    project_id:t.project_id, tasklist_id:t.tasklist_id, milestone_id:t.milestone_id,

// ── Command palette (Cmd+K) ──
function apOpenCmdPalette(){
  if(document.getElementById('apCmdModal')) return;
  apView.cmdQuery=''; apView.cmdSelected=0;
  const bd = document.createElement('div');
  bd.className = 'ap-cmd-bd';
  bd.id = 'apCmdModal';
  bd.onclick = e=>{ if(e.target===bd) apCloseCmd(); };
  bd.innerHTML = `
    <div class="ap-cmd">
      <div class="ap-cmd-input-wrap">
        <input type="text" id="apCmdInput" class="ap-cmd-input" placeholder="Type a command, jump to a task or project..."
          oninput="apView.cmdQuery=this.value;apView.cmdSelected=0;apRenderCmdResults();"
          onkeydown="apCmdKey(event)">
      </div>
      <div class="ap-cmd-list" id="apCmdResults"></div>
    </div>`;
  document.body.appendChild(bd);
  setTimeout(()=>{const el=document.getElementById('apCmdInput');if(el)el.focus();},30);
  apRenderCmdResults();
}
function apCloseCmd(){
  const m = document.getElementById('apCmdModal');
  if(m) m.remove();
}
function apCmdKey(e){
  const items = apCmdResults();
  if(e.key==='Escape'){ e.preventDefault(); apCloseCmd(); return; }
  if(e.key==='ArrowDown'){ e.preventDefault(); apView.cmdSelected = Math.min(apView.cmdSelected+1, items.length-1); apRenderCmdResults(); return; }
  if(e.key==='ArrowUp'){ e.preventDefault(); apView.cmdSelected = Math.max(apView.cmdSelected-1, 0); apRenderCmdResults(); return; }
  if(e.key==='Enter'){ e.preventDefault(); const item = items[apView.cmdSelected]; if(item){ apCloseCmd(); item.run(); } return; }
}
function apCmdResults(){
  const q = apView.cmdQuery.trim().toLowerCase();
  const items = [];
  // Static commands
  const cmds = [
    {icon:'+', label:'New task', kind:'Action', run:apOpenQuickAdd},
    {icon:'📁', label:'New project', kind:'Action', run:apCreateProjectPrompt},
    {icon:'📥', label:'Go to Inbox', kind:'Nav', run:()=>apSetView('inbox')},
    {icon:'⭐', label:'Go to Today', kind:'Nav', run:()=>apSetView('today')},
    {icon:'✓', label:'Go to My Tasks', kind:'Nav', run:()=>apSetView('my-tasks')},
    {icon:'📜', label:'Go to Activity', kind:'Nav', run:()=>apSetView('activity')},
  ];
  for(const c of cmds){
    if(!q || c.label.toLowerCase().includes(q)) items.push(c);
  }
  // Projects
  for(const p of apData.projects){
    if(!q || p.name.toLowerCase().includes(q)){
      items.push({icon:p.emoji||'📁', label:'Open '+p.name, kind:'Project', run:()=>apOpenProject(p.id)});
    }
  }
  // Tasks
  if(q.length >= 2){
    const matches = apData.tasks.filter(t=>t.title.toLowerCase().includes(q) || apTaskFullId(t).toLowerCase().includes(q)).slice(0,15);
    for(const t of matches){
      items.push({icon:'•', label:apTaskFullId(t)+' · '+t.title, kind:'Task', run:()=>apOpenTask(t.id)});
    }
  }
  return items.slice(0, 20);
}
function apRenderCmdResults(){
  const el = document.getElementById('apCmdResults');
  if(!el) return;
  const items = apCmdResults();
  if(!items.length){ el.innerHTML = '<div class="ap-cmd-empty">No results</div>'; return; }
  el.innerHTML = items.map((it,i)=>`<div class="ap-cmd-item ${i===apView.cmdSelected?'selected':''}" onclick="apRunCmd(${i})">
    <span class="ap-cmd-icon">${esc(it.icon)}</span>
    <span>${esc(it.label)}</span>
    <span class="ap-cmd-kind">${esc(it.kind)}</span>
  </div>`).join('');
}
function apRunCmd(i){
  const items = apCmdResults();
  const it = items[i];
  if(!it) return;
  apCloseCmd();
  it.run();
}

// ── Keyboard shortcuts ──
function apMountShortcuts(){
  if(apShortcutsBound) return;
  apShortcutsBound = true;
  document.addEventListener('keydown', e=>{
    // Only when on action items tab
    if(!document.body.classList.contains('on-action-tab')) return;
    const t = e.target;
    const inField = t && (t.tagName==='INPUT' || t.tagName==='TEXTAREA' || t.tagName==='SELECT' || t.isContentEditable);
    if((e.metaKey||e.ctrlKey) && (e.key==='k' || e.key==='K')){
      e.preventDefault(); apOpenCmdPalette(); return;
    }
    if(inField) return;
    if(e.key==='c' || e.key==='C'){ e.preventDefault(); apOpenQuickAdd(); }
    else if(e.key==='Escape'){
      if(document.getElementById('apCmdModal')) apCloseCmd();
      else if(document.getElementById('apQuickModal')) apCloseQuickAdd();
      else if(apView.selectedTaskId) apCloseTask();
    }
  });
}

function blaIsoOf(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function blaTodayIso(){ return blaIsoOf(new Date()); }
function blaMonday(d){
  const dt = new Date(d);
  const dow = dt.getDay();          // 0=Sun
  const diff = (dow===0 ? -6 : 1-dow);
  dt.setDate(dt.getDate()+diff);
  dt.setHours(0,0,0,0);
  return blaIsoOf(dt);
}
function blaParseHHMM(s){
  if(s===null||s===undefined||s==='') return null;
  s = String(s).trim();
  if(!s) return null;
  if(s.includes(':')){
    const [h,m] = s.split(':').map(x=>parseInt(x,10)||0);
    return h*60 + m;
  }
  const n = parseFloat(s);
  return isNaN(n) ? null : Math.round(n);
}
function blaFmtHHMM(mins){
  if(mins===null||mins===undefined||isNaN(mins)) return '';
  const h = Math.floor(mins/60), m = mins%60;
  return h+':'+String(m).padStart(2,'0');
}
function blaFmtNum(n, d=2){
  if(n===null||n===undefined||isNaN(n)) return '';
  return Number(n).toLocaleString(undefined,{minimumFractionDigits:d, maximumFractionDigits:d});
}
function blaFmtInt(n){
  if(n===null||n===undefined||isNaN(n)) return '';
  return Math.round(n).toLocaleString();
}
function blaFmtDateMD(iso){
  if(!iso) return '';
  const [y,m,d] = iso.split('-');
  return parseInt(m,10)+'/'+parseInt(d,10);
}

// Decimal hours -> "H:MM" string. Returns '' for null/undefined.
function blaHrsToHHMM(h){
  if(h===null||h===undefined||h==='') return '';
  const total = Math.round(parseFloat(h)*60);
  if(isNaN(total)) return '';
  return blaFmtHHMM(total);
}
// "H:MM" or numeric string -> decimal hours (number) or null.
function blaHHMMToHrs(s){
  const m = blaParseHHMM(s);
  return m===null ? null : m/60;
}

async function blaLoadAll(){
  // Pull last 13 months for analysis aggregations + autosuggest history.
  const yrAgo = new Date(); yrAgo.setMonth(yrAgo.getMonth()-13);
  const since = blaIsoOf(yrAgo);
  const yrStart = (new Date().getFullYear())+'-01-01';
  const earliest = since < yrStart ? since : yrStart;

  const [staff, resi, comm, rm, xm, irr] = await Promise.all([
    db.from('bla_staff').select('*').order('name'),
    db.from('bla_resi_entries').select('*').gte('entry_date', earliest).order('entry_date',{ascending:false}),
    db.from('bla_comm_entries').select('*').gte('entry_date', earliest).order('entry_date',{ascending:false}),
    db.from('bla_rolloff_manual').select('*').gte('entry_date', earliest),
    db.from('bla_xfer_manual').select('*').gte('entry_date', earliest),
    db.from('irr_reports').select('report_date,reis_tons,reis_tickets,reis_tip_revenue,reis_svc_revenue,island_tons,island_tickets,island_revenue,santos_tons,santos_tickets,santos_revenue,walkin_tons,walkin_tickets,walkin_tip_revenue,vinagro_tons,vinagro_loads,total_inbound_tons,total_inbound_tickets').gte('report_date', earliest)
  ]);
  blaState.staff = staff.data || [];
  blaState.resiEntries = resi.data || [];
  blaState.commEntries = comm.data || [];
  blaState.rolloffManual = {}; (rm.data||[]).forEach(r=>blaState.rolloffManual[r.entry_date]=r);
  blaState.xferManual = {};    (xm.data||[]).forEach(r=>blaState.xferManual[r.entry_date]=r);
  blaState.irrRows = irr.data || [];
  blaState.loaded = true;
}

async function blaSaveResi(){
  const d = blaState.resiDraft;

  if(!d.driver_id){ toast('Driver required'); return; }
  const validRoutes = (d.routes||[]).filter(r=>r.name && r.name.trim()).map(r=>({

    stops: r.stops===''?null:parseInt(r.stops,10),

    routes: validRoutes,

  };

// ── Add staff prompt ──
async function blaPromptAddStaff(role, ctx, idx){
  const name = prompt(`Add a new ${role}. Enter their name:`);
  if(!name || !name.trim()){
    // restore the dropdown selection state
    blaRenderBody(); return;
  }
  const {data, error} = await db.from('bla_staff').insert({name:name.trim(), role}).select().single();
  if(error){ toast('Failed: '+error.message); blaRenderBody(); return; }
  blaState.staff.push(data);
  // assign back to whichever draft prompted this
  if(ctx==='resi') blaState.resiDraft.driver_id = String(data.id);
  else if(ctx==='comm') blaState.commDraft.driver_id = String(data.id);
  else if(ctx==='resi-route') blaState.resiDraft.routes[idx].helper_id = String(data.id);
  else if(ctx==='rolloff') blaState.rolloffDraft.driver_hours[idx].driver_id = String(data.id);
  toast(`Added ${name.trim()}`);
  blaRenderBody();
}

// Aggregate residential metrics for a list of entries.
function blaAggResi(entries){
  const drivers = new Set(), helpers = new Set(), routeNames = new Set();
  let stops=0, tons=0, loads=0, miles=0, drvMin=0, hlpMin=0, lfMin=0;
  entries.forEach(e=>{
    if(e.driver_id) drivers.add(e.driver_id);
    drvMin += e.driver_minutes||0;
    hlpMin += e.helper_minutes||0;
    lfMin  += e.landfill_minutes||0;
    miles  += parseFloat(e.total_miles)||0;
    tons   += (parseFloat(e.net_weight_lbs)||0)/2000;
    // Each entry is at least 1 landfill trip; use explicit count when set.
    loads  += (e.landfill_trips==null ? 1 : (parseInt(e.landfill_trips,10)||1));
    (e.routes||[]).forEach(r=>{
      if(r.name) routeNames.add(r.name+'|'+e.entry_date);   // unique per day
      if(r.helper_id) helpers.add(r.helper_id);
      stops += parseInt(r.stops,10)||0;
    });
  });
  const drvHrs = drvMin/60, hlpHrs = hlpMin/60, lfHrs = lfMin/60;
  return {
    drivers: drivers.size,
    helpers: helpers.size,
    routes:  routeNames.size,
    services: stops,
    tons,
    loads,
    miles,
    drvMin, hlpMin, lfMin,
    drvHrs, hlpHrs, lfHrs,
    svcsPerDrvHr: drvHrs>0 ? stops/drvHrs : null,
    tonsPerLoad:  loads>0  ? tons/loads   : null,
    milesPerSvc:  stops>0  ? miles/stops  : null,
    svcsPerRoute: routeNames.size>0 ? stops/routeNames.size : null,
    lfPerLoad:    loads>0  ? lfMin/loads  : null
  };
}
function blaAggComm(entries){
  const drivers = new Set(), routeNames = new Set();
  let stops=0, tons=0, loads=0, miles=0, drvMin=0, lfMin=0;
  entries.forEach(e=>{

    drvMin += e.driver_minutes||0;
    lfMin  += e.landfill_minutes||0;
    miles  += parseFloat(e.total_miles)||0;

    (e.routes||[]).forEach(r=>{

  };
}
function blaAggRolloff(start, end){
  const irrInRange = blaState.irrRows.filter(r=>r.report_date>=start && r.report_date<=end);
  let tons=0, tickets=0, revenue=0;
  irrInRange.forEach(r=>{
    tons    += (parseFloat(r.reis_tons)||0) + (parseFloat(r.island_tons)||0) + (parseFloat(r.santos_tons)||0);
    tickets += (parseInt(r.reis_tickets,10)||0) + (parseInt(r.island_tickets,10)||0) + (parseInt(r.santos_tickets,10)||0);
    revenue += (parseFloat(r.reis_tip_revenue)||0) + (parseFloat(r.reis_svc_revenue)||0) + (parseFloat(r.island_revenue)||0) + (parseFloat(r.santos_revenue)||0);
  });
  let st=0, ot=0; const drivers=new Set();
  Object.keys(blaState.rolloffManual).forEach(d=>{
    if(d<start||d>end) return;
    const dh = blaState.rolloffManual[d].driver_hours||[];
    dh.forEach(r=>{
      if(r.driver_id) drivers.add(r.driver_id);
      st += parseFloat(r.st_hours)||0;
      ot += parseFloat(r.ot_hours)||0;
    });
  });
  const totalHrs = st+ot;
  const days = irrInRange.length || 1;
  return {
    revenue, loads:tickets, tons,
    loadsPerDay: tickets/days,
    revPerLoad: tickets>0?revenue/tickets:null,
    tonsPerLoad: tickets>0?tons/tickets:null,
    drivers: drivers.size,
    stHours: st, otHours: ot, totalHours: totalHrs,
    hrsPerDriver: drivers.size>0?totalHrs/drivers.size:null,
    hrsPerLoad:   tickets>0?totalHrs/tickets:null
  };
}
function blaAggXfer(start, end){
  const irrInRange = blaState.irrRows.filter(r=>r.report_date>=start && r.report_date<=end);
  let revenue=0, ldsRecv=0, tonsRecv=0, loadsHauledAuto=0, tonsHauledAuto=0;
  irrInRange.forEach(r=>{
    // Xfer Station tracks walk-ins only — rolloff revenue/tickets/tons live in the Rolloff section.
    revenue  += (parseFloat(r.walkin_tip_revenue)||0);
    ldsRecv  += (parseInt(r.walkin_tickets,10)||0);
    tonsRecv += (parseFloat(r.walkin_tons)||0);
    loadsHauledAuto += (parseInt(r.vinagro_loads,10)||0);
    tonsHauledAuto  += (parseFloat(r.vinagro_tons)||0);
  });
  let trlrsLoaded=0, tonsLoaded=0, loadsHauledManual=null, tonsHauledManual=null;
  Object.keys(blaState.xferManual).forEach(d=>{
    if(d<start||d>end) return;
    const m = blaState.xferManual[d];
    trlrsLoaded += parseInt(m.trlrs_loaded,10)||0;
    tonsLoaded  += parseFloat(m.tons_loaded)||0;
    if(m.loads_hauled!=null) loadsHauledManual = (loadsHauledManual||0)+parseInt(m.loads_hauled,10);
    if(m.tons_hauled !=null) tonsHauledManual  = (tonsHauledManual ||0)+parseFloat(m.tons_hauled);
  });
  const loadsHauled = loadsHauledManual!=null?loadsHauledManual:loadsHauledAuto;
  const tonsHauled  = tonsHauledManual !=null?tonsHauledManual :tonsHauledAuto;
  return {
    revenue, ldsRecv, tonsRecv,
    trlrsLoaded, tonsLoaded,
    tonsPerTrlr: trlrsLoaded>0?tonsLoaded/trlrsLoaded:null,
    loadsHauled, tonsHauled,
    revPerLoad: ldsRecv>0?revenue/ldsRecv:null,
    tonsPerLoad: ldsRecv>0?tonsRecv/ldsRecv:null,
    trlrToHauled: loadsHauled>0?trlrsLoaded/loadsHauled:null,
    tonsHauledPerLoad: loadsHauled>0?tonsHauled/loadsHauled:null
  };
}

function blaRenderMetricTable(bl){
  const dates = blaWeekDates();
  const wkRange = { start: dates[0], end: dates[5] };
  const moRange = blaMonthRange(blaState.weekStart);
  const yrRange = blaYearRange(blaState.weekStart);

  const aggForRange = (start,end)=>{
    if(bl==='resi'){ return blaAggResi(blaState.resiEntries.filter(e=>e.entry_date>=start && e.entry_date<=end)); }
    if(bl==='comm'){ return blaAggComm(blaState.commEntries.filter(e=>e.entry_date>=start && e.entry_date<=end)); }
    if(bl==='rolloff'){ return blaAggRolloff(start,end); }
    return blaAggXfer(start,end);
  };

  const dayAggs = dates.map(d=>aggForRange(d,d));
  const wkAgg = aggForRange(wkRange.start, wkRange.end);
  const moAgg = aggForRange(moRange.start, moRange.end);
  const yrAgg = aggForRange(yrRange.start, yrRange.end);

  const rows = bl==='resi'?blaResiMetricRows() : bl==='comm'?blaCommMetricRows() : bl==='rolloff'?blaRolloffMetricRows() : blaXferMetricRows();

  const dayHdrs = dates.map((d,i)=>{
    const dn = ['Mon','Tue','Wed','Thu','Fri','Sat'][i];
    return `<th><div>${dn}</div><div class="bla-hdr-date">${blaFmtDateMD(d)}</div></th>`;
  }).join('');

  const cellHtml = (val, row, range)=>{
    const v = val[row.key];
    if(v===null || v===undefined || (typeof v==='number' && isNaN(v))) return '<td class="bla-cell-empty">—</td>';
    const display = row.fmt(v);
    if(!display) return '<td class="bla-cell-empty">—</td>';
    return `<td class="bla-cell-num" onclick="blaCellClick('${bl}','${range.start}','${range.end}')">${display}</td>`;
  };

  return `<table class="bla-metric-table">
    <thead><tr><th class="bla-metric-col">Category / Metric</th>${dayHdrs}<th class="bla-sum">Wk</th><th class="bla-sum">Mo</th><th class="bla-sum">Yr</th></tr></thead>
    <tbody>
      ${rows.map(row=>`<tr>
        <td class="bla-metric-col">${row.label}</td>
        ${dates.map((d,i)=>cellHtml(dayAggs[i], row, {start:d,end:d})).join('')}
        ${cellHtml(wkAgg, row, wkRange)}
        ${cellHtml(moAgg, row, moRange)}
        ${cellHtml(yrAgg, row, yrRange)}
      </tr>`).join('')}
    </tbody>
  </table>`;
}

function blaCellClick(bl, start, end){
  blaState.inputBL = bl;
  blaState.filterRange = { start, end };
  blaState.view = 'input';
  blaRenderBody();
  // Re-render top-level header so view toggle reflects active state
  const toggleBtns = document.querySelectorAll('.bla-view-toggle button');
  toggleBtns.forEach(b=>{
    b.classList.toggle('active', b.textContent.trim().toLowerCase()===blaState.view);
  });
  // Scroll the saved-list into view
  setTimeout(()=>{
    const el = document.querySelector('.bla-saved-list');
    if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
  }, 50);
}
