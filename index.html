<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HELM — Reis Trucking</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&family=DM+Serif+Display:ital@0;1&family=Inter:wght@100;200;300&family=Pacifico&family=Playfair+Display:ital,wght@1,400;1,500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
<style>
:root {
  --navy:       #0f1f3d;
  --navy-mid:   #1a2f52;
  --navy-light: #243a63;
  --teal:       #1a9b8a;
  --teal-dim:   #147a6d;
  --teal-pale:  #e6f5f3;
  --gold:       #d4a843;
  --gold-pale:  #fdf6e3;
  --white:      #ffffff;
  --gray-50:    #f7f8fa;
  --gray-100:   #eef0f4;
  --gray-200:   #dde1ea;
  --gray-300:   #c8cdd8;
  --gray-400:   #9aa3b5;
  --gray-500:   #6b7385;
  --gray-600:   #4a5168;
  --gray-800:   #1e2435;
  --warn-bg:    #fff8e6;
  --warn-text:  #8a6200;
  --warn-border:#f0c040;
  --ok-bg:      #e8f5f0;
  --ok-text:    #156b4f;
  --err-bg:     #fdecea;
  --err-text:   #b92b2b;
  --radius:     10px;
  --radius-sm:  6px;
  --radius-lg:  14px;
  --shadow:     0 1px 3px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:  0 4px 16px rgba(0,0,0,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--gray-50);color:var(--gray-800);min-height:100vh;font-size:13px;-webkit-font-smoothing:antialiased;}

/* ── LOGIN ───────────────────────────────── */
#loginScreen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--navy);
  background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,255,255,0.03) 39px,rgba(255,255,255,0.03) 40px),
                   repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(255,255,255,0.03) 39px,rgba(255,255,255,0.03) 40px);
}
.login-box{
  background:white;border-radius:var(--radius-lg);
  padding:2.75rem 2.25rem;width:100%;max-width:380px;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
}
.login-brand{display:flex;align-items:center;gap:12px;margin-bottom:2rem;}
.login-icon{
  width:52px;height:52px;border-radius:12px;
  background:var(--navy);display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.login-icon svg{width:26px;height:26px;}
.login-brand-text{}
.helm-title{font-size:26px;font-weight:600;color:var(--navy);letter-spacing:-.02em;line-height:1;}
.helm-sub{font-size:12px;color:var(--gray-400);margin-top:3px;letter-spacing:.04em;text-transform:uppercase;}
.login-box label{display:block;font-size:12px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.login-box input[type=text],.login-box input[type=password]{
  width:100%;padding:11px 14px;
  border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;font-size:15px;color:var(--gray-800);
  background:var(--gray-50);margin-bottom:14px;outline:none;transition:border-color .15s,background .15s;
}
.login-box input[type=text]:focus,.login-box input[type=password]:focus{border-color:var(--teal);background:white;}
.btn-signin{
  width:100%;padding:12px;background:var(--navy);color:white;
  border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;
  font-size:15px;font-weight:600;cursor:pointer;transition:background .15s;letter-spacing:.01em;
}
.btn-signin:hover{background:var(--navy-light);}
.login-err{color:var(--err-text);font-size:13px;margin-top:10px;text-align:center;}
.login-footer{margin-top:1.75rem;padding-top:1.25rem;border-top:1px solid var(--gray-100);text-align:center;font-size:12px;color:var(--gray-400);}

/* ── APP SHELL ───────────────────────────── */
#appScreen{display:none;min-height:100vh;flex-direction:column;}

.topbar{
  background:var(--navy);height:44px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1rem;position:sticky;top:0;z-index:100;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-center{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  display:none;align-items:center;gap:8px;pointer-events:none;
  font-family:'Pacifico',cursive;font-style:italic;font-size:15px;
  color:#ffd6e0;text-shadow:0 1px 2px rgba(0,0,0,0.25);
  white-space:nowrap;
}
.topbar-center .palm{font-family:'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif;font-style:normal;font-size:17px;}
.topbar-icon{width:28px;height:28px;border-radius:6px;background:var(--navy-light);display:flex;align-items:center;justify-content:center;}
.topbar-icon svg{width:15px;height:15px;}
.topbar-name{font-size:15px;font-weight:600;color:white;letter-spacing:-.01em;}
.topbar-company{font-size:10px;color:rgba(255,255,255,0.4);margin-top:1px;letter-spacing:.03em;text-transform:uppercase;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:#2dc653;box-shadow:0 0 0 2px rgba(45,198,83,0.25);}
.live-label{font-size:11px;color:rgba(255,255,255,0.45);}
.btn-logout{
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.6);font-size:12px;padding:4px 10px;
  border-radius:var(--radius-sm);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;
}
.btn-logout:hover{background:rgba(255,255,255,0.15);color:white;}

/* ── STICKY NOTES ───────────────────────────────────────── */
.btn-sticky{
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);
  color:rgba(255,255,255,0.38);font-size:11px;padding:4px 10px;margin-left:22px;
  border-radius:var(--radius-sm);cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all .15s;letter-spacing:.02em;
}
.btn-sticky:hover{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.65);}
.btn-sticky.s-open{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);}
.btn-topbar-tool{
  background:rgba(26,155,138,0.15);border:1px solid rgba(26,155,138,0.3);
  color:rgba(255,255,255,0.7);font-size:11px;font-weight:600;padding:5px 12px;margin-left:8px;
  border-radius:var(--radius-sm);cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all .15s;letter-spacing:.02em;
}
.btn-topbar-tool:first-of-type{margin-left:22px;}
.btn-topbar-tool:hover{background:rgba(26,155,138,0.3);color:white;}
.btn-topbar-tool.tool-open{background:var(--teal);color:white;border-color:var(--teal);}

/* ── esme pink theme: topbar takeover ─────────────── */
body.theme-esme .topbar{
  background:linear-gradient(90deg,#ec407a 0%,#d81b60 100%);
  border-bottom:1px solid rgba(255,255,255,0.14);
}
body.theme-esme .topbar-icon{background:rgba(255,255,255,0.18);}
body.theme-esme .topbar-name{color:#fff8fb;letter-spacing:0;}
body.theme-esme .topbar-company{color:rgba(255,255,255,0.7);}
body.theme-esme .btn-topbar-tool{
  background:rgba(255,255,255,0.14);
  border-color:rgba(255,255,255,0.28);
  color:rgba(255,255,255,0.88);
}
body.theme-esme .btn-topbar-tool:hover{background:rgba(255,255,255,0.26);color:#fff;}
body.theme-esme .btn-topbar-tool.tool-open{background:#fff;color:#d81b60;border-color:#fff;}
body.theme-esme .btn-logout{
  background:rgba(255,255,255,0.12);
  border-color:rgba(255,255,255,0.26);
  color:rgba(255,255,255,0.85);
}
body.theme-esme .btn-logout:hover{background:rgba(255,255,255,0.25);color:#fff;}
body.theme-esme .live-label{color:rgba(255,255,255,0.75);}
body.theme-esme .live-dot{background:#fff;box-shadow:0 0 0 2px rgba(255,255,255,0.35);}

/* ── CONTACTS PANEL ──────────────────────────────── */
.contacts-panel{
  position:fixed;top:80px;left:50%;transform:translateX(-50%);
  width:720px;min-width:500px;max-width:90vw;
  background:#0e1524;border:1px solid rgba(255,255,255,0.18);
  border-radius:10px;box-shadow:0 12px 48px rgba(0,0,0,0.6);
  z-index:9999;display:none;overflow:hidden;resize:both;
}
.contacts-panel.ct-open{display:block;}
.ct-drag-handle{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;border-bottom:1px solid rgba(255,255,255,0.1);
  cursor:grab;user-select:none;
}
.ct-drag-handle:active{cursor:grabbing;}
.ct-drag-title{font-size:11px;font-weight:700;color:rgba(255,255,255,0.5);letter-spacing:.06em;text-transform:uppercase;}
.ct-close{
  background:none;border:none;color:rgba(255,255,255,0.4);font-size:18px;
  cursor:pointer;padding:0 4px;line-height:1;transition:color .15s;
}
.ct-close:hover{color:white;}
.ct-layout{display:flex;height:520px;min-height:300px;}
.ct-sidebar{width:130px;border-right:1px solid rgba(255,255,255,0.07);padding:8px 0;flex-shrink:0;display:flex;flex-direction:column;}
.ct-sidebar-btn{
  display:block;width:100%;padding:10px 14px;border:none;background:none;
  color:rgba(255,255,255,0.6);font-family:'DM Sans',sans-serif;font-size:12px;
  font-weight:600;text-align:left;cursor:pointer;transition:all .1s;
}
.ct-sidebar-btn:hover{color:white;background:rgba(255,255,255,0.06);}
.ct-sidebar-btn.ct-active{color:white;background:rgba(26,155,138,0.15);border-left:3px solid var(--teal);}
.ct-main{flex:1;overflow-y:auto;padding:12px 14px;}
.ct-section-hdr{
  font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:rgba(255,255,255,0.7);margin:10px 0 6px;padding-bottom:4px;
  border-bottom:1px solid rgba(255,255,255,0.12);
}
.ct-section-hdr:first-child{margin-top:0;}
.ct-row{
  display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:6px;align-items:center;
  padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.08);
  font-size:13px;color:white;
}
.ct-row.ct-driver-row{grid-template-columns:1fr 1fr auto;}
.ct-row-name{font-weight:700;color:white;}
.ct-row-phone{font-family:'DM Mono',monospace;font-size:12px;color:white;}
.ct-row-email{font-size:12px;color:rgba(255,255,255,0.85);}
.ct-edit{
  display:inline-block;min-width:1em;min-height:1.2em;padding:2px 5px;margin:-2px -5px;
  border-radius:3px;cursor:text;transition:background .1s;outline:none;
  white-space:pre;overflow:hidden;text-overflow:ellipsis;max-width:100%;
}
.ct-edit:hover{background:rgba(255,255,255,0.06);}
.ct-edit:focus{background:rgba(255,255,255,0.12);box-shadow:0 0 0 1px rgba(26,155,138,0.6);white-space:normal;}
.ct-edit:empty::before{content:attr(data-placeholder);color:rgba(255,255,255,0.3);}
.ct-add-row{display:flex;gap:4px;margin-top:8px;align-items:center;}
.ct-add-row input{
  flex:1;padding:5px 6px;background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.09);border-radius:4px;
  color:rgba(255,255,255,0.85);font-family:'DM Sans',sans-serif;font-size:11px;
}
.ct-add-row input::placeholder{color:rgba(255,255,255,0.25);}
.ct-add-row input:focus{border-color:rgba(255,255,255,0.22);outline:none;}
.ct-add-btn{
  padding:5px 10px;background:var(--teal);border:none;color:white;
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;
  border-radius:4px;cursor:pointer;white-space:nowrap;
}
.ct-add-btn:hover{filter:brightness(1.1);}
.ct-del{
  background:none;border:none;color:rgba(255,255,255,0.25);cursor:pointer;
  font-size:14px;padding:0 4px;transition:color .15s;line-height:1;
}
.ct-del:hover{color:#ef5350;}
.sticky-panel{
  position:fixed;top:50px;width:400px;
  background:#1b2233;border:1px solid rgba(255,255,255,0.11);
  border-radius:8px;box-shadow:0 10px 36px rgba(0,0,0,0.45);
  z-index:9999;display:none;overflow:hidden;
}
.sticky-panel.s-open{display:block;}
.sticky-drag-handle{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 10px 5px;border-bottom:1px solid rgba(255,255,255,0.07);
  cursor:grab;user-select:none;
}
.sticky-drag-handle:active{cursor:grabbing;}
.sticky-drag-title{
  font-size:10px;font-weight:600;color:rgba(255,255,255,0.35);
  letter-spacing:.07em;text-transform:uppercase;
}
.sticky-drag-dots{
  font-size:13px;color:rgba(255,255,255,0.18);letter-spacing:1px;line-height:1;
}
.sticky-close{
  background:none;border:none;color:rgba(255,255,255,0.25);
  font-size:16px;cursor:pointer;padding:0 2px;line-height:1;
  font-family:'DM Sans',sans-serif;
}
.sticky-close:hover{color:rgba(255,255,255,0.6);}
.sticky-sec-hdr{
  padding:4px 10px 3px;border-bottom:1px solid rgba(255,255,255,0.07);
  font-size:9px;font-weight:600;color:rgba(255,255,255,0.3);
  letter-spacing:.07em;text-transform:uppercase;
}
.sticky-compose{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,0.07);}
.sticky-compose input,.sticky-compose textarea{
  width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);
  color:rgba(255,255,255,0.85);font-family:'DM Sans',sans-serif;font-size:12px;
  padding:5px 8px;border-radius:4px;box-sizing:border-box;outline:none;
}
.sticky-compose input{margin-bottom:5px;}
.sticky-compose input::placeholder,.sticky-compose textarea::placeholder{color:rgba(255,255,255,0.25);}
.sticky-compose textarea{resize:vertical;min-height:160px;line-height:1.5;}
.sticky-compose input:focus,.sticky-compose textarea:focus{border-color:rgba(255,255,255,0.22);}
.sticky-actions{display:flex;gap:6px;margin-top:6px;justify-content:flex-end;}
.s-btn-cancel{
  background:none;border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.35);
  font-size:11px;padding:3px 10px;border-radius:4px;cursor:pointer;font-family:'DM Sans',sans-serif;
}
.s-btn-cancel:hover{color:rgba(255,255,255,0.6);}
.s-btn-save{
  background:var(--teal);border:none;color:white;font-size:11px;
  padding:3px 13px;border-radius:4px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;
}
.s-btn-save:hover{filter:brightness(1.1);}
.sticky-list{max-height:220px;overflow-y:auto;}
.sticky-list::-webkit-scrollbar{width:4px;}
.sticky-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}
.sticky-item{
  padding:9px 32px 9px 12px;border-bottom:1px solid rgba(255,255,255,0.05);
  cursor:pointer;transition:background .1s;position:relative;
}
.sticky-item:hover{background:rgba(255,255,255,0.04);}
.sticky-item.s-expanded{background:rgba(255,255,255,0.05);}
.sticky-item-title{font-size:12px;font-weight:600;color:rgba(255,255,255,0.75);margin-bottom:2px;}
.sticky-item-preview{font-size:11px;color:rgba(255,255,255,0.3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sticky-item-full{font-size:12px;color:rgba(255,255,255,0.55);margin-top:5px;white-space:pre-wrap;word-break:break-word;line-height:1.5;}
.sticky-item-date{font-size:10px;color:rgba(255,255,255,0.2);margin-top:4px;}
.sticky-del{
  position:absolute;right:8px;top:9px;background:none;border:none;
  color:rgba(255,255,255,0.2);cursor:pointer;font-size:15px;padding:0 3px;line-height:1;
}
.sticky-del:hover{color:rgba(255,100,100,0.65);}
.sticky-edit-btn{
  position:absolute;right:28px;top:9px;background:none;border:none;
  color:rgba(255,255,255,0.18);cursor:pointer;font-size:12px;padding:0 3px;line-height:1;
}
.sticky-edit-btn:hover{color:rgba(255,255,255,0.5);}
.sticky-edit-form input,.sticky-edit-form textarea{
  width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);
  color:rgba(255,255,255,0.85);font-family:'DM Sans',sans-serif;font-size:12px;
  padding:5px 8px;border-radius:4px;box-sizing:border-box;outline:none;margin-bottom:5px;
}
.sticky-edit-form textarea{resize:vertical;min-height:80px;line-height:1.45;}
.sticky-edit-form input:focus,.sticky-edit-form textarea:focus{border-color:rgba(255,255,255,0.22);}
.sticky-empty{padding:22px;text-align:center;color:rgba(255,255,255,0.2);font-size:12px;}

.tab-nav{
  background:white;border-bottom:1px solid var(--gray-200);
  display:flex;padding:0 1rem;gap:0;overflow-x:auto;
}
.tab-nav::-webkit-scrollbar{display:none;}
.tab-nav button{
  background:none;border:none;font-family:'DM Sans',sans-serif;
  font-size:12px;font-weight:500;color:var(--gray-400);
  padding:9px 12px;cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  white-space:nowrap;transition:color .15s,border-color .15s;letter-spacing:.01em;
}
.tab-nav button.active{color:var(--navy);border-bottom-color:var(--teal);font-weight:600;}
.tab-nav button:hover:not(.active){color:var(--gray-600);}

.main{padding:0.75rem;max-width:1060px;margin:0 auto;width:100%;}

/* ── SEARCH ─────────────────────────────── */
.search-wrap{position:relative;margin-bottom:0.75rem;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--gray-400);pointer-events:none;}
.search-wrap input{
  width:100%;padding:9px 12px 9px 36px;
  border:1.5px solid var(--gray-200);border-radius:var(--radius);
  font-family:'DM Sans',sans-serif;font-size:13px;color:var(--gray-800);
  background:white;box-shadow:var(--shadow);outline:none;transition:border-color .15s,box-shadow .15s;
}
.search-wrap input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(26,155,138,0.1);}
.search-wrap input::placeholder{color:var(--gray-300);}
.search-hint{font-size:11px;color:var(--gray-400);margin-top:4px;margin-left:2px;}
.lookup-watermark{
  display:none;flex-direction:column;align-items:center;justify-content:flex-start;
  gap:6px;margin-top:max(4vh,28px);padding:0 20px;
  text-align:center;width:100%;
}
.lookup-watermark::before{
  content:'welcome back,';font-family:'Inter','DM Sans',sans-serif;font-weight:300;
  font-size:clamp(10px,0.95vw,12px);letter-spacing:0.32em;text-transform:uppercase;
  color:var(--gray-400);opacity:0.7;margin-bottom:-4px;
}
.lookup-watermark-name{
  font-family:'Playfair Display','DM Serif Display',serif;font-style:italic;font-weight:400;
  font-size:clamp(36px,6vw,72px);line-height:1;
  color:var(--navy);opacity:0.14;letter-spacing:-0.015em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;
  text-transform:lowercase;pointer-events:none;user-select:none;
}
.lookup-watermark-name::first-letter{text-transform:uppercase;}
.lookup-watermark-flourish{
  width:clamp(36px,6vw,72px);height:1px;background:var(--navy);opacity:0.15;margin-top:2px;
}
.lw-cards{
  display:grid;grid-template-columns:1fr 1fr;gap:16px;
  margin-top:20px;max-width:1100px;width:100%;
  align-items:start;
}
@media (max-width:780px){ .lw-cards{grid-template-columns:1fr;} }
.lw-rates{
  width:100%;
  background:white;border:1px solid var(--gray-200);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:18px 26px 16px;
}
.lw-rates-title{
  font-size:11px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--gray-500);text-align:center;margin-bottom:12px;
  padding-bottom:10px;border-bottom:1px solid var(--gray-100);
}
.lw-rates-table{
  width:100%;border-collapse:collapse;font-family:'DM Sans',sans-serif;
}
.lw-rates-table td{
  padding:8px 2px;font-size:14px;border-bottom:1px solid var(--gray-100);
}
.lw-rates-table tr:last-child td{border-bottom:none;}
.lw-rates-table td:first-child{color:var(--gray-700);text-align:left;}
.lw-rates-table td:last-child{
  font-family:'DM Mono',monospace;font-weight:600;color:var(--navy);
  text-align:right;white-space:nowrap;
}
.lw-notes{
  width:100%;
  background:#fffdf5;border:1px solid #eedcb0;border-radius:var(--radius);
  box-shadow:var(--shadow);padding:18px 22px 14px;text-align:left;
}
.lw-notes-title{
  font-size:11px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;
  color:#8a7230;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;
}
.lw-notes-title .lw-saved{
  font-size:9px;font-weight:500;letter-spacing:0.1em;color:#b5a060;opacity:0;transition:opacity .25s;
}
.lw-notes-title .lw-saved.show{opacity:1;}
.lw-notes-input{
  width:100%;min-height:100px;resize:vertical;
  border:none;background:transparent;outline:none;
  font-family:'DM Sans',sans-serif;font-size:14px;color:var(--gray-800);
  line-height:1.5;padding:2px;
}
.lw-notes-input::placeholder{color:#b5a060;font-style:italic;}

/* ── RESULTS LIST ────────────────────────── */
.results-list{margin-bottom:0.75rem;}
.result-item{
  background:white;border:1px solid var(--gray-200);border-radius:var(--radius-sm);
  padding:8px 12px;margin-bottom:4px;cursor:pointer;
  display:flex;justify-content:space-between;align-items:center;
  box-shadow:var(--shadow);transition:border-color .15s,transform .1s,box-shadow .15s;
}
.result-item:hover,.result-item:focus{border-color:var(--teal);transform:translateY(-1px);box-shadow:var(--shadow-md);outline:none;}
.result-id{font-family:'DM Mono',monospace;font-size:11px;color:var(--gray-400);margin-bottom:2px;}
.result-addr{font-size:13px;font-weight:500;color:var(--gray-800);}
.result-day{font-size:11px;font-weight:600;color:var(--teal);background:var(--teal-pale);padding:2px 7px;border-radius:20px;}

/* ── CLIENT CARD ─────────────────────────── */
.client-card{background:white;border:1px solid var(--gray-200);border-radius:var(--radius);box-shadow:var(--shadow-md);overflow:hidden;}
.card-header{background:var(--navy);padding:0.75rem 1rem;display:flex;align-items:center;gap:10px;}
.avatar{
  width:36px;height:36px;border-radius:8px;
  background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.15);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;color:white;flex-shrink:0;letter-spacing:.02em;
}
.card-header-meta h2{font-size:14px;font-weight:600;color:white;letter-spacing:-.01em;}
.card-header-meta p{font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px;}
.card-body{padding:0.75rem 1rem;}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:0.75rem;}
.info-tile{background:var(--gray-50);border:1px solid var(--gray-100);border-radius:var(--radius-sm);padding:6px 10px;}
.info-tile label{font-size:9px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:3px;}
.day-pill{display:inline-block;background:var(--teal-pale);color:var(--teal-dim);font-size:12px;font-weight:600;padding:2px 8px;border-radius:20px;}
.status-pill{display:inline-block;font-size:12px;font-weight:600;padding:2px 8px;border-radius:20px;}
.s-active{background:var(--ok-bg);color:var(--ok-text);}
.s-skipped{background:var(--warn-bg);color:var(--warn-text);}
.s-paused{background:var(--err-bg);color:var(--err-text);}
.autopay-yes{background:var(--ok-bg);color:var(--ok-text);}
.autopay-no{background:var(--gray-100);color:var(--gray-400);}

.section-title{font-size:10px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.08em;margin-bottom:0.5rem;}
.divider{border:none;border-top:1px solid var(--gray-100);margin:0.5rem 0;}

/* ── ADD CLIENT ──────────────────────────── */
.form-card{background:white;border:1px solid var(--gray-200);border-radius:var(--radius);padding:1rem;box-shadow:var(--shadow);}
.form-card h2{font-size:15px;font-weight:600;color:var(--navy);margin-bottom:1rem;}
.form-group{margin-bottom:0.75rem;}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--gray-500);letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px;}
.form-group input,.form-group select{
  width:100%;padding:7px 10px;
  border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;font-size:13px;color:var(--gray-800);
  background:var(--gray-50);outline:none;transition:border-color .15s,background .15s;
}
.form-group input:focus,.form-group select:focus{border-color:var(--teal);background:white;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-add{
  background:var(--teal);color:white;border:none;border-radius:var(--radius-sm);
  padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;transition:background .15s;
}
.btn-add:hover{background:var(--teal-dim);}
.day-toggle-grid{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.co-pick-btn{
  display:flex;align-items:center;padding:10px 14px;
  border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);
  background:white;cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all .15s;
}
.co-pick-btn:hover{border-color:var(--gray-400);}
.co-pick-btn.co-pick-active{border-color:var(--teal);background:var(--teal-pale);}
.day-toggle{
  flex:1;min-width:70px;padding:8px 6px;
  border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);
  background:white;cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:2px;
}
.day-toggle:hover{border-color:var(--teal);background:var(--teal-pale);}
.day-toggle-active{background:var(--teal)!important;border-color:var(--teal)!important;}
.day-toggle-active .day-abbr,.day-toggle-active .day-full{color:white!important;}
.day-abbr{font-size:13px;font-weight:700;color:var(--navy);}
.day-full{font-size:10px;color:var(--gray-400);}

/* ── IMPORT ──────────────────────────────── */
.import-zone{
  border:2px dashed var(--gray-200);border-radius:var(--radius);
  padding:2rem 1.5rem;text-align:center;cursor:pointer;
  transition:border-color .2s,background .2s;background:white;
}
.import-zone:hover{border-color:var(--teal);background:var(--teal-pale);}
.import-zone-icon{width:36px;height:36px;margin:0 auto 0.75rem;color:var(--gray-300);}
.import-zone h3{font-size:14px;font-weight:600;color:var(--gray-600);margin-bottom:4px;}
.import-zone p{font-size:12px;color:var(--gray-400);}
.import-zone span{font-size:11px;color:var(--teal);font-weight:600;margin-top:4px;display:block;}
.import-preview{background:white;border:1px solid var(--gray-200);border-radius:var(--radius-sm);padding:0.75rem;margin-top:0.75rem;box-shadow:var(--shadow);}
.import-preview-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;}
.import-preview h3{font-size:13px;font-weight:600;color:var(--navy);}
.preview-row{font-size:12px;padding:5px 0;border-bottom:1px solid var(--gray-100);display:flex;gap:10px;align-items:center;}
.preview-row:last-child{border-bottom:none;}
.p-id{font-family:'DM Mono',monospace;color:var(--gray-400);font-size:10px;width:40px;flex-shrink:0;}
.p-addr{color:var(--gray-800);flex:1;}
.p-day{color:var(--teal);font-weight:600;font-size:11px;}

/* ── TOAST ───────────────────────────────── */
.toast{
  position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--navy);color:white;padding:8px 18px;
  border-radius:var(--radius-sm);font-size:13px;font-weight:500;
  box-shadow:var(--shadow-md);opacity:0;pointer-events:none;
  transition:opacity .2s,transform .2s;z-index:9999;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{background:var(--teal);}

/* ── MISC ────────────────────────────────── */
.empty-state{text-align:center;padding:2rem 1rem;color:var(--gray-400);font-size:13px;}
.loading{text-align:center;padding:1.5rem;color:var(--gray-400);font-size:13px;}
/* ── FLOATING CLIENT PANEL ───────────────── */
.client-panel{
  position:fixed;right:0;top:44px;width:420px;height:calc(100vh - 44px);
  background:white;border-left:1px solid var(--gray-200);
  box-shadow:-4px 0 20px rgba(0,0,0,0.08);
  z-index:90;overflow-y:auto;display:none;
  transition:transform .2s ease;
}
.client-panel.open{display:block;}

/* ── INLINE CLIENT CARD (under search bar) ──────────────── */
.cli-inline-card{
  background:white;border:1px solid var(--gray-200);border-radius:var(--radius);
  box-shadow:var(--shadow);overflow:hidden;
}
.cli-inline-grid{display:grid;grid-template-columns:1fr 1.2fr;gap:0;}
.cli-info-col{padding:18px 22px;border-right:1px solid var(--gray-100);}
.cli-notes-col{padding:18px 22px;display:flex;flex-direction:column;min-height:280px;}

.cli-info-header{margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--gray-100);}
.cli-name-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px;}
.cli-name-row h2{font-size:18px;font-weight:700;color:var(--navy);letter-spacing:-.2px;}
.cli-acct{font-size:12px;color:var(--gray-500);margin-bottom:4px;}
.cli-acct strong{color:var(--gray-800);font-weight:600;}
.cli-addr{font-size:13px;color:var(--gray-700);margin-bottom:2px;}
.cli-phone{font-size:13px;color:var(--gray-600);font-family:'DM Mono',monospace;}
.cli-info-tiles{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.cli-info-tiles .info-tile{grid-column:span 1;}
.cli-info-tiles .info-tile:first-child{grid-column:span 2;}

.cli-notes-header{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-400);margin-bottom:10px;}
.cli-notes-history-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-400);margin:6px 0 6px;}
.cli-notes-history{flex:1;overflow-y:auto;border:1px solid var(--gray-100);border-radius:var(--radius-sm);max-height:320px;background:var(--gray-50);}
.cli-notes-history .note-row{background:white;margin:4px;border-radius:4px;padding:8px 10px;border:1px solid var(--gray-100);}
.cli-notes-history .note-row:hover{border-color:var(--gray-200);}
.cli-notes-history .note-row-header{margin-bottom:4px;}

@media(max-width:900px){
  .cli-inline-grid{grid-template-columns:1fr;}
  .cli-info-col{border-right:none;border-bottom:1px solid var(--gray-100);}
}
.panel-close{
  position:absolute;top:8px;right:8px;background:none;border:none;
  font-size:18px;color:var(--gray-400);cursor:pointer;z-index:2;
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  border-radius:4px;transition:all .15s;
}
.panel-close:hover{background:var(--gray-100);color:var(--err-text);}

/* ── NOTES ───────────────────────────────── */
.notes-section{margin-top:0.5rem;}
.note-form{display:flex;gap:4px;align-items:end;flex-wrap:wrap;margin-bottom:6px;}
.note-form select{
  padding:5px 6px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;font-size:11px;color:var(--gray-800);
  background:var(--gray-50);outline:none;min-width:120px;
}
.note-form input[type=date]{
  padding:5px 6px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;font-size:11px;color:var(--gray-800);
  background:var(--gray-50);outline:none;width:130px;
}
.note-form input[type=text]{
  flex:1;min-width:120px;padding:5px 6px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;font-size:11px;color:var(--gray-800);
  background:var(--gray-50);outline:none;
}
.note-form select:focus,.note-form input:focus{border-color:var(--teal);background:white;}
.note-form .btn-note-add{
  padding:5px 10px;background:var(--teal);color:white;border:none;border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;
}
.note-form .btn-note-add:hover{background:var(--teal-dim);}
.notes-list-wrap{max-height:220px;overflow-y:auto;border:1px solid var(--gray-100);border-radius:var(--radius-sm);}
.note-row{padding:6px 8px;border-bottom:1px solid var(--gray-100);}
.note-row:last-child{border-bottom:none;}
.note-row:hover{background:var(--gray-50);}
.note-row-header{display:flex;gap:6px;align-items:center;margin-bottom:2px;}
.note-row-header .note-meta{font-family:'DM Sans',sans-serif;font-size:10px;color:var(--gray-400);}
.note-row-header .note-user{font-size:10px;font-weight:600;color:var(--gray-500);}
.note-del{background:none;border:none;color:var(--gray-300);font-size:12px;cursor:pointer;padding:0 2px;margin-left:auto;line-height:1;transition:color .15s;}
.note-del:hover{color:var(--err-text);}
.note-del-confirm{display:flex;align-items:center;gap:4px;margin-left:auto;}
.note-del-confirm span{font-size:10px;color:var(--gray-400);}
.note-del-yes{background:var(--err-text);border:none;color:#fff;font-size:10px;padding:1px 6px;border-radius:3px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;}
.note-del-no{background:none;border:1px solid var(--gray-200);color:var(--gray-400);font-size:10px;padding:1px 6px;border-radius:3px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-edit-sm{background:none;border:1px solid var(--gray-200);color:var(--gray-500);font-size:11px;padding:3px 10px;border-radius:var(--radius-sm);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.btn-edit-sm:hover{border-color:var(--teal);color:var(--teal);}
.note-row-body{font-family:'Courier New',monospace;font-size:12px;color:var(--gray-800);line-height:1.4;word-break:break-word;}
.company-tag{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;text-transform:uppercase;letter-spacing:.04em;margin-left:4px;}
.co-reis{background:#d1fae5;color:#065f46;}
.co-santos{background:#dbeafe;color:#1e40af;}
.action-tag{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;text-transform:uppercase;letter-spacing:.03em;}
.action-tag.at-skip{background:var(--warn-bg);color:var(--warn-text);}
.action-tag.at-1xer{background:#e8f0fe;color:#1a56db;}
.action-tag.at-1xwk{background:#dbeafe;color:#1e40af;}
.action-tag.at-2xwk{background:#c7d2fe;color:#3730a3;}
.action-tag.at-lpu{background:#fef3c7;color:#92400e;}
.action-tag.at-special{background:#fce7f3;color:#9d174d;}
.action-tag.at-misc{background:var(--gray-100);color:var(--gray-500);}
.action-tag.at-pause{background:var(--err-bg);color:var(--err-text);}

/* ── REPORT ──────────────────────────────── */
.report-summary{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:0.75rem;}
.report-summary-pill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap;}
.report-group{margin-bottom:0.75rem;}
.report-group-header{
  background:var(--navy);color:white;padding:5px 10px;
  border-radius:var(--radius-sm) var(--radius-sm) 0 0;
  font-size:12px;font-weight:600;display:flex;justify-content:space-between;
}
.report-table{width:100%;border-collapse:collapse;font-size:12px;border:1px solid var(--gray-200);border-top:none;}
.report-table th{text-align:left;padding:4px 8px;font-size:10px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.05em;border-bottom:1.5px solid var(--gray-200);background:var(--gray-50);}
.report-table td{padding:4px 8px;border-bottom:1px solid var(--gray-100);}
.report-table tr:nth-child(even) td{background:var(--gray-50);}
.report-table tr:hover td{background:var(--teal-pale);}
.report-table tr:last-child td:first-child{border-radius:0 0 0 var(--radius-sm);}
.report-table tr:last-child td:last-child{border-radius:0 0 var(--radius-sm) 0;}
.rt-num{width:28px;text-align:center;font-weight:700;color:var(--gray-300);font-size:10px;}
.rt-id{width:52px;font-family:'DM Mono',monospace;font-size:10px;color:var(--gray-400);}
.rt-name{font-weight:600;white-space:nowrap;}
.rt-addr{color:var(--gray-600);}
.rt-phone{color:var(--gray-400);white-space:nowrap;font-size:11px;}
.rt-note{font-size:11px;color:var(--gray-600);font-style:italic;max-width:300px;word-break:break-word;}

.ro-table{width:100%;border-collapse:collapse;font-size:12px;}
.ro-table th{text-align:left;padding:4px 6px;font-size:10px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid var(--gray-200);white-space:nowrap;}
.ro-table td{padding:2px 3px;border-bottom:1px solid var(--gray-100);}
.ro-table tr:hover{background:var(--gray-50);}
.ro-input{width:100%;border:1px solid transparent;background:transparent;padding:3px 5px;font-size:12px;font-family:inherit;border-radius:4px;outline:none;}
.ro-input:focus{border-color:var(--teal);background:white;box-shadow:0 0 0 2px rgba(20,184,166,0.15);}
.ro-input:hover:not(:focus){border-color:var(--gray-200);}
select.ro-input{cursor:pointer;}
.ro-del{background:none;border:none;cursor:pointer;font-size:14px;opacity:0.3;padding:2px 4px;}
.ro-del:hover{opacity:1;color:var(--err-text);}
.ro-tip-btn{
  border:1px solid var(--gray-300);background:white;color:var(--gray-500);
  font-family:inherit;font-size:11px;font-weight:600;padding:3px 12px;
  border-radius:12px;cursor:pointer;transition:all .15s;min-width:46px;
}
.ro-tip-btn:hover:not(:disabled){border-color:var(--gray-400);color:var(--gray-700);}
.ro-tip-btn.tipped{background:#d4edda;border-color:#28a745;color:#155724;}
.ro-tip-btn.tipped:hover:not(:disabled){background:#c3e6cb;}
.ro-tip-btn:disabled{cursor:not-allowed;opacity:0.5;}

@media(max-width:900px){
  .client-panel{width:100%;left:0;right:0;}
}
@media(max-width:520px){
  .info-grid{grid-template-columns:1fr;}
  .form-row{grid-template-columns:1fr;}
  .main{padding:0.5rem;}
  .topbar{padding:0 0.5rem;}
  .topbar-company{display:none;}
}
/* ── ACTIVITY REPORT ─────────────────────────────────────────────────── */
.activity-row{padding:10px 12px;border-bottom:1px solid var(--gray-100);display:flex;flex-direction:column;gap:2px;}
.activity-row:last-child{border-bottom:none;}
.activity-user{font-weight:600;font-size:13px;color:var(--navy);}
.activity-time{font-size:12px;color:var(--gray-500);}
.activity-acts{font-size:11px;color:var(--teal);font-weight:500;}
.activity-wrap{border:1px solid var(--gray-200);border-radius:var(--radius);overflow:hidden;margin-top:10px;}

/* ── IRR SCALE TAB ─────────────────────────────────────────────────── */
.irr-wrap{max-width:780px;margin:0 auto;padding:1.5rem 0;}
.irr-drop{
  border:2px dashed var(--gray-300);border-radius:var(--radius-lg);
  padding:48px 24px;text-align:center;cursor:pointer;transition:all .2s;
  background:var(--white);position:relative;
}
.irr-drop:hover,.irr-drop.drag-over{border-color:var(--teal);background:var(--teal-pale);}
.irr-drop input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.irr-drop-icon{font-size:36px;margin-bottom:10px;opacity:.5;}
.irr-drop-label{font-size:13px;color:var(--gray-500);}
.irr-drop-label strong{color:var(--teal);}
.irr-status{
  display:none;font-family:'DM Mono',monospace;font-size:12px;color:var(--teal);
  padding:10px 14px;background:var(--teal-pale);border-left:3px solid var(--teal);
  border-radius:0 var(--radius-sm) var(--radius-sm) 0;margin-top:12px;
}
.irr-report{margin-top:24px;}
.irr-section-hdr{
  font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--gray-400);margin:20px 0 8px;
}
.irr-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:4px;}
.irr-table th{
  text-align:left;font-size:10px;font-weight:600;letter-spacing:.08em;

}
.irr-table th:not(:first-child){text-align:right;}
.irr-table td{padding:8px 12px;border-bottom:1px solid var(--gray-100);}
.irr-table td:not(:first-child){text-align:right;font-family:'DM Mono',monospace;font-size:12px;}
.irr-table tr.irr-total td{font-weight:700;border-top:2px solid var(--navy);border-bottom:none;}
.irr-table tr.irr-total td:first-child{color:var(--teal);}
.irr-ytd-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0 24px;}
.irr-ytd-card{

  padding:16px;text-align:center;
}
.irr-ytd-card .ytd-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gray-400);margin-bottom:4px;}
.irr-ytd-card .ytd-val{font-family:'DM Mono',monospace;font-size:22px;font-weight:700;color:var(--navy);}
.irr-ytd-card .ytd-sub{font-size:11px;color:var(--gray-400);margin-top:2px;}
.irr-email-box{
  background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);
  overflow:hidden;margin-top:12px;
}
.irr-email-hdr{background:var(--gray-50);padding:10px 16px;border-bottom:1px solid var(--gray-200);font-weight:600;font-size:13px;color:var(--navy);}
.irr-email-body{padding:16px;font-size:13px;line-height:1.6;color:var(--gray-800);}
.irr-btn-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;align-items:center;}
.irr-btn{
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;
  padding:9px 20px;border:none;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;
}
.irr-btn-primary{background:var(--teal);color:white;}
.irr-btn-primary:hover{filter:brightness(1.1);}
.irr-btn-secondary{background:var(--white);color:var(--gray-500);border:1px solid var(--gray-200);}
.irr-btn-secondary:hover{border-color:var(--gray-400);color:var(--gray-800);}
.irr-toast{display:none;font-size:11px;color:var(--ok-text);font-weight:600;}
.irr-history{margin-top:32px;}
.irr-hist-table{width:100%;border-collapse:collapse;font-size:12px;}
.irr-hist-table th{
  text-align:left;font-size:10px;font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;color:var(--gray-400);padding:8px 10px;
  border-bottom:1px solid var(--gray-200);
}
.irr-hist-table th:not(:first-child){text-align:right;}
.irr-hist-table td{padding:7px 10px;border-bottom:1px solid var(--gray-100);color:var(--gray-600);}
.irr-hist-table td:not(:first-child){text-align:right;font-family:'DM Mono',monospace;}
.irr-hist-table tr{cursor:pointer;transition:background .1s;}
.irr-hist-table tr:hover{background:var(--gray-50);}

/* IRR sub-nav */
.irr-subnav{display:flex;gap:6px;margin-bottom:20px;border-bottom:1px solid var(--gray-200);padding-bottom:10px;}
.irr-subnav button{
  background:none;border:1px solid var(--gray-200);color:var(--gray-500);
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;
  padding:6px 16px;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;
}
.irr-subnav button.active{background:var(--navy);color:white;border-color:var(--navy);}
.irr-subnav button:hover:not(.active){border-color:var(--gray-400);color:var(--gray-800);}

/* Dashboard */
.irr-dash-controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
.irr-range-btn{
  background:var(--white);border:1px solid var(--gray-200);color:var(--gray-500);
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;
  padding:5px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;
}
.irr-range-btn.active{background:var(--navy);color:white;border-color:var(--navy);}
.irr-range-btn:hover:not(.active){border-color:var(--gray-400);color:var(--gray-800);}
.irr-dash-custom{display:flex;gap:6px;align-items:center;}
.irr-dash-custom input[type="date"]{
  font-family:'DM Sans',sans-serif;font-size:11px;padding:4px 8px;
  border:1px solid var(--gray-200);border-radius:var(--radius-sm);color:var(--gray-600);
}
.irr-kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.irr-kpi{
  background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);
  padding:14px 16px;
}
.irr-kpi-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-400);margin-bottom:4px;}
.irr-kpi-val{font-family:'DM Mono',monospace;font-size:20px;font-weight:700;color:var(--navy);}
.irr-kpi-sub{font-size:11px;color:var(--gray-400);margin-top:2px;}
.irr-chart-wrap{
  background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);
  padding:20px;margin-bottom:16px;position:relative;
}
.irr-chart-wrap canvas{width:100%!important;}
.irr-chart-resize{
  display:flex;gap:4px;position:absolute;top:12px;right:16px;
}
.irr-chart-resize button{
  background:var(--gray-50);border:1px solid var(--gray-200);color:var(--gray-500);
  font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;
  padding:3px 8px;border-radius:3px;cursor:pointer;
}
.irr-chart-resize button:hover{background:var(--gray-100);color:var(--gray-800);}
.irr-toggle-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.irr-toggle{
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;
  padding:4px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;
  border:1px solid var(--gray-200);background:var(--white);color:var(--gray-400);
}
.irr-toggle.on{color:white;}

/* Driver hours form */
.irr-hours-form{
  background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);
  padding:16px;margin-top:16px;
}
.irr-hours-form h4{font-size:12px;font-weight:600;color:var(--navy);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em;}
.irr-hours-row{display:flex;gap:10px;align-items:flex-end;}
.irr-hours-row label{font-size:11px;font-weight:600;color:var(--gray-500);display:flex;flex-direction:column;gap:3px;}
.irr-hours-row input{
  font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 10px;
  border:1px solid var(--gray-200);border-radius:var(--radius-sm);color:var(--gray-800);width:140px;
}
.irr-hours-row button{
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;
  padding:7px 16px;border:none;border-radius:var(--radius-sm);
  background:var(--teal);color:white;cursor:pointer;
}
.irr-hours-row button:hover{filter:brightness(1.1);}

/* IRR Report overlay */
.irr-report-overlay{
  position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,0.5);
  display:flex;align-items:flex-start;justify-content:center;padding:30px 20px;overflow-y:auto;
}
.irr-report-modal{
  background:white;border-radius:var(--radius);max-width:800px;width:100%;
  box-shadow:var(--shadow-md);position:relative;
}
.irr-report-toolbar{
  display:flex;gap:8px;align-items:center;padding:12px 20px;
  border-bottom:1px solid var(--gray-200);flex-wrap:wrap;
}
.irr-report-toolbar button{
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;
  padding:6px 14px;border-radius:var(--radius-sm);cursor:pointer;border:none;
}
.irr-report-toolbar .rpt-print{background:var(--navy);color:white;}
.irr-report-toolbar .rpt-email{background:var(--teal);color:white;}
.irr-report-toolbar .rpt-close{background:var(--gray-100);color:var(--gray-600);margin-left:auto;}
.irr-report-toolbar input[type="text"]{
  font-family:'DM Sans',sans-serif;font-size:11px;padding:5px 10px;
  border:1px solid var(--gray-200);border-radius:var(--radius-sm);color:var(--gray-800);flex:1;min-width:200px;
}
.irr-report-body{padding:32px 40px;font-family:Arial,Helvetica,sans-serif;color:#222;}
.irr-report-body h1{font-size:18px;font-weight:700;margin-bottom:4px;color:#000;}
.irr-report-body .rpt-period{font-size:13px;color:#666;margin-bottom:24px;}
.irr-report-body .rpt-kpi-row{display:flex;gap:16px;margin-bottom:24px;}
.irr-report-body .rpt-kpi{flex:1;border:1px solid #ddd;border-radius:6px;padding:12px;text-align:center;}
.irr-report-body .rpt-kpi-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-bottom:4px;}
.irr-report-body .rpt-kpi-val{font-size:20px;font-weight:700;color:#000;}
.irr-report-body table{width:100%;border-collapse:collapse;font-size:12px;margin-top:16px;}
.irr-report-body th{text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#888;padding:8px 10px;border-bottom:2px solid #000;}
.irr-report-body th:first-child{text-align:left;}
.irr-report-body td{padding:7px 10px;border-bottom:1px solid #eee;text-align:right;font-family:'Courier New',monospace;font-size:11px;}
.irr-report-body td:first-child{text-align:left;font-family:Arial,Helvetica,sans-serif;}
.irr-report-body tr:last-child td{border-bottom:none;}
.irr-report-body .rpt-total td{font-weight:700;border-top:2px solid #000;border-bottom:none;}

@media print{
  body>*:not(.irr-report-overlay){display:none!important;}
  .irr-report-overlay{position:static!important;background:none!important;padding:0!important;display:block!important;}
  .irr-report-modal{box-shadow:none!important;border-radius:0!important;max-width:100%!important;}
  .irr-report-toolbar{display:none!important;}
  .irr-report-body{padding:10px!important;overflow:visible!important;}
  .irr-report-body table{font-size:9px!important;}
}

/* ── FILES TAB ───────────────────────────────────────────────────── */
.files-wrap{max-width:1100px;margin:0 auto;padding:1rem 0;}
.files-subnav{display:flex;gap:6px;margin-bottom:20px;border-bottom:1px solid var(--gray-200);padding-bottom:10px;}
.files-subnav button{
  background:none;border:1px solid var(--gray-200);color:var(--gray-500);
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;
  padding:6px 16px;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;
}
.files-subnav button.active{background:var(--navy);color:white;border-color:var(--navy);}
.files-subnav button:hover:not(.active){border-color:var(--gray-400);color:var(--gray-800);}
.files-layout{display:grid;grid-template-columns:260px 1fr;gap:16px;align-items:flex-start;}
.files-sidebar{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px;}
.files-sidebar-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.files-sidebar-hdr h3{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-400);}
.files-new-folder-btn{
  background:var(--teal);color:white;border:none;
  font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;
  padding:4px 10px;border-radius:var(--radius-sm);cursor:pointer;
}
.files-new-folder-btn:hover{filter:brightness(1.1);}
.files-folder-list{display:flex;flex-direction:column;gap:2px;}
.files-folder-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;
  font-size:13px;color:var(--gray-800);transition:background .1s;
}
.files-folder-item:hover{background:var(--gray-50);}
.files-folder-item.active{background:var(--teal-pale);color:var(--teal);font-weight:600;}
.files-folder-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.files-folder-del{
  background:none;border:none;color:var(--gray-400);cursor:pointer;font-size:14px;
  padding:0 4px;display:none;
}
.files-folder-item:hover .files-folder-del{display:inline;}
.files-folder-del:hover{color:var(--err-text);}
.files-empty{font-size:12px;color:var(--gray-400);padding:10px 4px;}

.files-main{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:16px;min-height:300px;}
.files-main-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--gray-100);}
.files-main-hdr h3{font-size:15px;font-weight:600;color:var(--navy);}
.files-upload-btn{
  background:var(--teal);color:white;border:none;
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;
  padding:7px 16px;border-radius:var(--radius-sm);cursor:pointer;
  position:relative;overflow:hidden;
}
.files-upload-btn input[type="file"]{
  position:absolute;inset:0;opacity:0;cursor:pointer;
}
.files-upload-btn:hover{filter:brightness(1.1);}
.files-table{width:100%;border-collapse:collapse;font-size:13px;}
.files-table th{
  text-align:left;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--gray-400);padding:8px 10px;border-bottom:1px solid var(--gray-200);
}
.files-table th:nth-child(2),.files-table th:nth-child(3),.files-table th:nth-child(4){text-align:right;}
.files-table td{padding:10px;border-bottom:1px solid var(--gray-100);color:var(--gray-800);}
.files-table td:nth-child(2),.files-table td:nth-child(3){text-align:right;font-family:'DM Mono',monospace;font-size:12px;color:var(--gray-500);}
.files-table td:nth-child(4){text-align:right;}
.files-table tr:hover{background:var(--gray-50);}
.files-name{font-weight:500;}
.files-meta{font-size:11px;color:var(--gray-400);}
.files-action-btn{
  background:none;border:1px solid var(--gray-200);color:var(--gray-600);
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;
  padding:4px 10px;border-radius:var(--radius-sm);cursor:pointer;margin-left:4px;
}
.files-action-btn:hover{border-color:var(--gray-400);color:var(--gray-800);}
.files-action-btn.danger:hover{border-color:var(--err-text);color:var(--err-text);}
.files-status{font-size:11px;color:var(--teal);padding:10px;display:none;}
.files-status.active{display:block;}
@media(max-width:760px){
  .files-layout{grid-template-columns:1fr;}
}

/* ── INTERCOMPANY REPORT ───────────────────────────────────── */
.icr-controls{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.icr-controls h3{font-size:14px;font-weight:600;color:var(--navy);margin-right:8px;}
.icr-nav-btn{
  background:var(--white);border:1px solid var(--gray-200);color:var(--gray-600);
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;
  padding:5px 10px;border-radius:var(--radius-sm);cursor:pointer;
}
.icr-nav-btn:hover{border-color:var(--gray-400);color:var(--gray-800);}
.icr-year-btn{
  background:var(--white);border:1px solid var(--gray-200);color:var(--gray-500);
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;
  padding:4px 12px;border-radius:var(--radius-sm);cursor:pointer;
}
.icr-year-btn.active{background:var(--navy);color:white;border-color:var(--navy);}
.icr-table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed;}
.icr-table th{
  font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--gray-400);padding:6px 8px;border-bottom:1px solid var(--gray-200);text-align:right;
}
.icr-table th:first-child{text-align:left;width:100px;}
.icr-table td{padding:5px 8px;text-align:right;font-family:'DM Mono',monospace;font-size:11px;color:var(--gray-700);}
.icr-table td:first-child{text-align:left;font-family:'DM Sans',sans-serif;font-weight:500;color:var(--gray-600);}
.icr-company-hdr td{
  font-family:'DM Sans',sans-serif!important;font-weight:700!important;font-size:12px!important;
  color:var(--navy)!important;padding:14px 8px 4px!important;border-bottom:none!important;
}
.icr-blank td{padding:2px 0!important;border-bottom:none!important;}
.icr-sep td{border-bottom:1px solid var(--gray-200)!important;padding:0!important;height:8px;}
.icr-total-hdr td{
  font-family:'DM Sans',sans-serif!important;font-weight:700!important;font-size:12px!important;

}
.icr-spacer{width:8px!important;border-bottom:none!important;}
.icr-agg{background:var(--gray-50);font-weight:600!important;}
.crc-manual td:first-child{color:var(--gray-500)!important;font-style:italic;}
.crc-manual td{background:#fffcf0;}
.crc-derived td{background:#f0f7ff;color:var(--navy)!important;font-weight:600;}
.crc-derived td:first-child{color:var(--gray-500)!important;font-style:italic;}
.crc-input{
  width:100%;padding:3px 5px;border:1px solid transparent;background:transparent;

.crc-input:hover{border-color:var(--gray-300);background:white;}
.crc-input:focus{border-color:var(--navy);background:white;}
.icr-proj-section{margin-top:32px;}
.icr-proj-table{width:100%;border-collapse:collapse;font-size:12px;}
.icr-proj-table th{
  font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--gray-400);padding:8px 10px;border-bottom:2px solid var(--navy);text-align:right;
}
.icr-proj-table th:first-child{text-align:left;}
.icr-proj-table td{padding:7px 10px;text-align:right;font-family:'DM Mono',monospace;font-size:11px;border-bottom:1px solid var(--gray-100);}
.icr-proj-table td:first-child{text-align:left;font-family:'DM Sans',sans-serif;font-weight:500;}
.icr-proj-table .actual{color:var(--navy);}
.icr-proj-table .projected{color:var(--teal);font-style:italic;}
.icr-proj-table .target{color:var(--gray-400);}
.icr-proj-table tr.annual-total td{font-weight:700;border-top:2px solid var(--navy);font-size:12px;}

/* Driver hours modal */
.icr-driver-modal{
  position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,0.4);
  display:flex;align-items:center;justify-content:center;

.icr-driver-box{

  box-shadow:var(--shadow-md);max-width:360px;width:100%;
}
.icr-driver-box h3{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:16px;}
.icr-driver-row{display:flex;gap:12px;margin-bottom:12px;}
.icr-driver-row label{font-size:11px;font-weight:600;color:var(--gray-500);display:flex;flex-direction:column;gap:4px;flex:1;}
.icr-driver-row input{
  font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 10px;
  border:1px solid var(--gray-200);border-radius:var(--radius-sm);
}
.icr-driver-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
.icr-driver-btns button{
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;
  padding:8px 20px;border:none;border-radius:var(--radius-sm);cursor:pointer;
}

/* ── COMMAND CENTER ───────────────────────────────────────── */
.cmd-badge-private{
  display:inline-block;background:var(--teal);color:var(--navy);
  font-size:8px;font-weight:700;letter-spacing:.1em;

}

}
.cmd-header-left h1{

  font-size:30px;font-weight:400;color:white;letter-spacing:-.01em;
  line-height:1;margin-bottom:6px;
}
.cmd-header-sub{
  font-size:11px;color:rgba(255,255,255,0.4);
  letter-spacing:.15em;text-transform:uppercase;font-weight:500;
}
.cmd-header-right{display:flex;align-items:center;gap:14px;}
.cmd-status{
  display:flex;align-items:center;gap:7px;
  font-size:10px;color:rgba(255,255,255,0.4);
  letter-spacing:.08em;text-transform:uppercase;
}
.cmd-status-dot{
  width:7px;height:7px;border-radius:50%;background:var(--teal);
  box-shadow:0 0 0 3px rgba(26,155,138,0.2);animation:cmd-pulse 2.4s ease-in-out infinite;
}
@keyframes cmd-pulse{50%{box-shadow:0 0 0 6px rgba(26,155,138,0.08);}}

.cmd-subnav{
  display:flex;gap:4px;margin-bottom:18px;
  background:rgba(0,0,0,0.22);border:1px solid rgba(255,255,255,0.06);
  padding:4px;border-radius:8px;width:fit-content;
}
.cmd-subnav button{
  background:none;border:none;color:rgba(255,255,255,0.45);
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;
  padding:8px 16px;border-radius:5px;cursor:pointer;
  letter-spacing:.02em;transition:all .15s;
}
.cmd-subnav button:hover{color:rgba(255,255,255,0.8);}
.cmd-subnav button.active{background:var(--teal);color:white;box-shadow:0 2px 8px rgba(26,155,138,0.35);}

.cmd-section-title{
  font-family:'DM Serif Display',serif;
  font-size:22px;color:white;margin-bottom:2px;font-weight:400;
}
.cmd-section-desc{font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:14px;}

.cmd-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
@media(max-width:960px){.cmd-grid-3{grid-template-columns:1fr;}}

/* Priority columns */
.cmd-col{
  background:rgba(255,255,255,0.025);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:10px;padding:13px 12px;
  display:flex;flex-direction:column;
}
.cmd-col-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding-bottom:10px;margin-bottom:10px;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.cmd-col-title{
  font-family:'DM Sans',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  display:flex;align-items:center;gap:7px;
}
.cmd-col-dot{width:8px;height:8px;border-radius:50%;}
.cmd-col-hot .cmd-col-dot{background:#ff5b5b;box-shadow:0 0 0 3px rgba(255,91,91,0.15);}
.cmd-col-hot .cmd-col-title{color:#ff7a7a;}
.cmd-col-soon .cmd-col-dot{background:var(--gold);box-shadow:0 0 0 3px rgba(212,168,67,0.18);}
.cmd-col-soon .cmd-col-title{color:#e6bc52;}
.cmd-col-med .cmd-col-dot{background:var(--teal);box-shadow:0 0 0 3px rgba(26,155,138,0.2);}
.cmd-col-med .cmd-col-title{color:#3bc8b5;}
.cmd-col-count{
  font-size:10px;color:rgba(255,255,255,0.35);
  background:rgba(255,255,255,0.05);padding:2px 7px;border-radius:10px;
  font-family:'DM Mono',monospace;
}

.cmd-card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:8px;padding:11px 12px;margin-bottom:8px;
  cursor:pointer;transition:all .15s;
  position:relative;
}
.cmd-card:hover{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.13);}
.cmd-card.checked{opacity:.5;}
.cmd-card.checked .cmd-card-title{text-decoration:line-through;color:rgba(255,255,255,0.5);}
.cmd-card-head{display:flex;align-items:flex-start;gap:9px;}
.cmd-check{
  flex-shrink:0;width:16px;height:16px;margin-top:1px;
  border:1.5px solid rgba(255,255,255,0.3);border-radius:4px;
  background:rgba(0,0,0,0.2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.cmd-check:hover{border-color:var(--teal);}
.cmd-check.on{background:var(--teal);border-color:var(--teal);}
.cmd-check.on::after{
  content:'';width:8px;height:4px;border:2px solid white;
  border-top:none;border-right:none;transform:rotate(-45deg) translate(1px,-1px);
}
.cmd-card-body{flex:1;min-width:0;}
.cmd-card-title{
  font-size:12.5px;font-weight:600;color:rgba(255,255,255,0.92);
  line-height:1.35;margin-bottom:4px;
}
.cmd-card-sub{
  font-size:11px;color:rgba(255,255,255,0.5);line-height:1.5;
}
.cmd-card-notes{
  margin-top:9px;padding-top:9px;
  border-top:1px dashed rgba(255,255,255,0.08);
  display:none;
}
.cmd-card.expanded .cmd-card-notes{display:block;}
.cmd-card-notes textarea{
  width:100%;background:rgba(0,0,0,0.25);
  border:1px solid rgba(255,255,255,0.09);
  color:rgba(255,255,255,0.85);
  font-family:'DM Sans',sans-serif;font-size:11px;
  padding:7px 9px;border-radius:5px;resize:vertical;min-height:60px;
  outline:none;line-height:1.5;
}
.cmd-card-notes textarea:focus{border-color:var(--teal);background:rgba(0,0,0,0.4);}
.cmd-card-notes-lbl{
  font-size:9px;letter-spacing:.08em;text-transform:uppercase;
  color:rgba(255,255,255,0.35);margin-bottom:5px;font-weight:600;
}
.cmd-card-del{
  position:absolute;top:8px;right:8px;
  background:none;border:none;color:rgba(255,255,255,0.2);
  cursor:pointer;font-size:14px;line-height:1;padding:2px 4px;
  display:none;
}
.cmd-card:hover .cmd-card-del{display:block;}
.cmd-card-del:hover{color:#ff6b6b;}

.cmd-add-btn{
  width:100%;padding:8px;margin-top:4px;
  background:none;border:1px dashed rgba(255,255,255,0.14);
  color:rgba(255,255,255,0.4);
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;
  border-radius:6px;cursor:pointer;letter-spacing:.02em;
}
.cmd-add-btn:hover{border-color:var(--teal);color:var(--teal);}

/* People */
.cmd-person{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:8px;padding:11px 12px;margin-bottom:8px;
  cursor:pointer;transition:all .15s;position:relative;
}
.cmd-person:hover{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.13);}
.cmd-person-hdr{display:flex;align-items:center;gap:10px;}
.cmd-person-avatar{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  background:rgba(26,155,138,0.15);border:1px solid rgba(26,155,138,0.3);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:var(--teal);letter-spacing:.02em;
}
.cmd-col-friction .cmd-person-avatar{background:rgba(255,91,91,0.12);border-color:rgba(255,91,91,0.3);color:#ff7a7a;}
.cmd-col-rules .cmd-person-avatar{background:rgba(212,168,67,0.12);border-color:rgba(212,168,67,0.3);color:var(--gold);}
.cmd-person-meta{flex:1;min-width:0;}
.cmd-person-name{font-size:12.5px;font-weight:600;color:white;line-height:1.2;}
.cmd-person-role{font-size:10.5px;color:rgba(255,255,255,0.45);margin-top:2px;line-height:1.35;}
.cmd-person-status{
  margin-top:7px;font-size:11px;color:rgba(255,255,255,0.62);line-height:1.5;
}
.cmd-person .cmd-card-notes{margin-top:8px;padding-top:8px;}
.cmd-person.expanded .cmd-card-notes{display:block;}

.cmd-col-coalition .cmd-col-dot{background:var(--teal);box-shadow:0 0 0 3px rgba(26,155,138,0.2);}
.cmd-col-coalition .cmd-col-title{color:#3bc8b5;}
.cmd-col-friction .cmd-col-dot{background:#ff5b5b;box-shadow:0 0 0 3px rgba(255,91,91,0.15);}
.cmd-col-friction .cmd-col-title{color:#ff7a7a;}
.cmd-col-rules .cmd-col-dot{background:var(--gold);box-shadow:0 0 0 3px rgba(212,168,67,0.18);}
.cmd-col-rules .cmd-col-title{color:#e6bc52;}

/* Revenue kanban */
.cmd-kanban{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
@media(max-width:960px){.cmd-kanban{grid-template-columns:1fr;}}
.cmd-rev-card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:8px;padding:12px;margin-bottom:8px;
  cursor:pointer;transition:all .15s;position:relative;
}
.cmd-rev-card:hover{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.13);}
.cmd-rev-title{font-size:12.5px;font-weight:600;color:white;line-height:1.35;margin-bottom:5px;}
.cmd-rev-desc{font-size:11px;color:rgba(255,255,255,0.5);line-height:1.5;}
.cmd-rev-move{
  margin-top:10px;display:flex;gap:4px;
}
.cmd-rev-move button{
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);
  color:rgba(255,255,255,0.5);
  font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;
  padding:3px 8px;border-radius:4px;cursor:pointer;
}
.cmd-rev-move button:hover{background:var(--teal);border-color:var(--teal);color:white;}
.cmd-col-idea .cmd-col-dot{background:#8a9bc7;box-shadow:0 0 0 3px rgba(138,155,199,0.2);}
.cmd-col-idea .cmd-col-title{color:#a8b8dc;}
.cmd-col-progress .cmd-col-dot{background:var(--gold);box-shadow:0 0 0 3px rgba(212,168,67,0.18);}
.cmd-col-progress .cmd-col-title{color:#e6bc52;}
.cmd-col-done .cmd-col-dot{background:var(--teal);box-shadow:0 0 0 3px rgba(26,155,138,0.2);}
.cmd-col-done .cmd-col-title{color:#3bc8b5;}
.cmd-col-done .cmd-rev-title{text-decoration:line-through;opacity:.65;}

/* Timeline */
.cmd-timeline{
  position:relative;padding:14px 4px 8px;margin-top:8px;
}
.cmd-timeline-track{
  position:absolute;left:0;right:0;top:58px;height:2px;
  background:linear-gradient(90deg,rgba(255,91,91,0.3),rgba(212,168,67,0.3),rgba(26,155,138,0.3));
  border-radius:2px;
}
.cmd-phases{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;position:relative;}
.cmd-phase{position:relative;padding-top:30px;}
.cmd-phase-marker{
  position:absolute;top:18px;left:50%;transform:translateX(-50%);
  width:22px;height:22px;border-radius:50%;
  background:var(--navy);border:2px solid var(--teal);
  box-shadow:0 0 0 4px rgba(26,155,138,0.15);z-index:2;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:var(--teal);
}
.cmd-phase:nth-child(1) .cmd-phase-marker{border-color:#ff5b5b;color:#ff7a7a;box-shadow:0 0 0 4px rgba(255,91,91,0.12);}
.cmd-phase:nth-child(2) .cmd-phase-marker{border-color:var(--gold);color:var(--gold);box-shadow:0 0 0 4px rgba(212,168,67,0.12);}
.cmd-phase:nth-child(3) .cmd-phase-marker{border-color:var(--teal);color:var(--teal);box-shadow:0 0 0 4px rgba(26,155,138,0.12);}
.cmd-phase-body{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:10px;padding:15px 13px 13px;
  margin-top:14px;
}
.cmd-phase-days{
  font-family:'DM Mono',monospace;font-size:10px;
  color:rgba(255,255,255,0.4);letter-spacing:.06em;text-align:center;
  margin-bottom:3px;
}
.cmd-phase-title{
  font-family:'DM Serif Display',serif;
  font-size:18px;color:white;text-align:center;
  margin-bottom:3px;font-weight:400;
}
.cmd-phase-sub{
  font-size:10px;color:rgba(255,255,255,0.4);
  letter-spacing:.08em;text-transform:uppercase;
  text-align:center;margin-bottom:13px;font-weight:600;
}
.cmd-milestone{
  background:rgba(0,0,0,0.2);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:6px;padding:8px 10px;margin-bottom:6px;
  display:flex;align-items:flex-start;gap:8px;
  cursor:pointer;transition:all .15s;
}
.cmd-milestone:hover{background:rgba(0,0,0,0.35);border-color:rgba(255,255,255,0.12);}
.cmd-milestone.checked .cmd-milestone-title{text-decoration:line-through;opacity:.55;}
.cmd-milestone-body{flex:1;min-width:0;}
.cmd-milestone-title{
  font-size:11.5px;color:rgba(255,255,255,0.85);line-height:1.4;font-weight:500;
}
.cmd-milestone-date{
  font-family:'DM Mono',monospace;font-size:9.5px;
  color:rgba(255,255,255,0.35);margin-top:2px;
}
.cmd-milestone-cal{
  flex-shrink:0;color:rgba(255,255,255,0.3);
  text-decoration:none;font-size:11px;padding:2px 4px;
}
.cmd-milestone-cal:hover{color:var(--teal);}

/* Section scratchpad */
.cmd-scratch{
  margin-top:18px;padding:13px 14px;
  background:rgba(0,0,0,0.22);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:10px;
}
.cmd-scratch-lbl{
  font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:rgba(255,255,255,0.38);margin-bottom:8px;
  display:flex;align-items:center;gap:8px;
}
.cmd-scratch-lbl::before{content:'';width:18px;height:1px;background:rgba(255,255,255,0.2);}
.cmd-scratch-lbl::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.07);}
.cmd-scratch textarea{
  width:100%;background:transparent;border:none;
  color:rgba(255,255,255,0.8);
  font-family:'DM Sans',sans-serif;font-size:12.5px;
  outline:none;resize:vertical;min-height:70px;line-height:1.6;
}
.cmd-scratch textarea::placeholder{color:rgba(255,255,255,0.22);font-style:italic;}
.cmd-autosave{
  font-size:9px;color:rgba(255,255,255,0.25);
  letter-spacing:.1em;text-transform:uppercase;margin-left:auto;
}
.cmd-autosave.saving{color:var(--gold);}
.cmd-autosave.saved{color:var(--teal);}

/* Org chart */
.cmd-org-wrap{display:flex;flex-direction:column;gap:14px;margin-top:8px;}
.cmd-org-group{
  background:rgba(255,255,255,0.025);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:10px;padding:14px 16px 16px;
}
.cmd-org-group-hdr{
  display:flex;align-items:center;gap:9px;
  padding-bottom:11px;margin-bottom:12px;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.cmd-org-group-dot{width:8px;height:8px;border-radius:50%;}
.cmd-org-group-label{
  font-family:'DM Sans',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
}
.cmd-org-tone-teal .cmd-org-group-dot{background:var(--teal);box-shadow:0 0 0 3px rgba(26,155,138,0.2);}
.cmd-org-tone-teal .cmd-org-group-label{color:#3bc8b5;}
.cmd-org-tone-gold .cmd-org-group-dot{background:var(--gold);box-shadow:0 0 0 3px rgba(212,168,67,0.18);}
.cmd-org-tone-gold .cmd-org-group-label{color:#e6bc52;}
.cmd-org-tone-neutral .cmd-org-group-dot{background:#8a9bc7;box-shadow:0 0 0 3px rgba(138,155,199,0.2);}
.cmd-org-tone-neutral .cmd-org-group-label{color:#a8b8dc;}
.cmd-org-people{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px;
}
.cmd-org-person{
  background:rgba(0,0,0,0.22);
  border:1px solid rgba(255,255,255,0.06);
  border-left:3px solid var(--teal);
  border-radius:7px;padding:11px 13px;
}
.cmd-org-tone-gold .cmd-org-person{border-left-color:var(--gold);}
.cmd-org-tone-neutral .cmd-org-person{border-left-color:#8a9bc7;}
.cmd-org-person-name{
  font-size:13px;font-weight:700;color:white;line-height:1.3;
  letter-spacing:-.01em;
}
.cmd-org-person-title{
  font-family:'DM Mono',monospace;
  font-size:10.5px;color:var(--teal);
  margin-top:3px;letter-spacing:.02em;
}
.cmd-org-tone-gold .cmd-org-person-title{color:#e6bc52;}
.cmd-org-tone-neutral .cmd-org-person-title{color:#a8b8dc;}
.cmd-org-person-note{
  font-size:11px;color:rgba(255,255,255,0.55);
  line-height:1.55;margin-top:7px;
}

/* ── ACTION ITEMS (David only) — own visual environment ──────────── */
/* When this tab is active, escape the .main max-width:1060px so the
   dark canvas spans the full viewport. Toggled in switchTab(). */
body.on-action-tab .main{max-width:none;padding:0;width:100%;}
#tab-action{padding:0;margin:0;width:100%;}
.ai-root{
  min-height:calc(100vh - 78px);
  background:#0a0e1a;
  background-image:
    radial-gradient(circle at 18% 12%, rgba(99,102,241,0.10), transparent 50%),
    radial-gradient(circle at 86% 88%, rgba(236,72,153,0.06), transparent 55%),
    linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
  background-size: auto, auto, 32px 32px, 32px 32px;
  color:#e4e7ef;
  font-family:'Inter','DM Sans',sans-serif;
  display:flex;flex-direction:column;
}
.ai-topbar{
  display:flex;align-items:center;gap:14px;
  padding:14px 22px;border-bottom:1px solid rgba(255,255,255,0.06);
  background:rgba(10,14,26,0.6);backdrop-filter:blur(8px);
}
.ai-title{font-size:18px;font-weight:600;letter-spacing:-0.01em;color:#fff;white-space:nowrap;}
.ai-title .ai-title-accent{color:#a5b4fc;font-weight:400;margin-left:6px;font-size:13px;}
.ai-digest{display:flex;gap:6px;flex-wrap:wrap;flex:1;margin-left:18px;}
.ai-digest-pill{
  font-size:11px;padding:4px 10px;border-radius:999px;
  background:rgba(255,255,255,0.05);color:#cbd2e3;border:1px solid rgba(255,255,255,0.08);
  font-weight:500;
}
.ai-digest-pill.warn{background:rgba(245,158,11,0.13);color:#fbbf24;border-color:rgba(245,158,11,0.25);}
.ai-digest-pill.danger{background:rgba(239,68,68,0.13);color:#fca5a5;border-color:rgba(239,68,68,0.25);}
.ai-views{display:flex;gap:2px;background:rgba(255,255,255,0.04);padding:3px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);}
.ai-view-btn{
  background:transparent;border:none;color:#9ca3af;font-family:inherit;font-size:12px;
  font-weight:500;padding:6px 14px;border-radius:5px;cursor:pointer;letter-spacing:0.01em;
}
.ai-view-btn:hover:not(:disabled){color:#fff;}
.ai-view-btn.active{background:rgba(99,102,241,0.22);color:#c7d2fe;}
.ai-view-btn:disabled{opacity:0.32;cursor:not-allowed;}
.ai-main{display:flex;flex:1;min-height:0;}
.ai-sidebar{
  width:260px;border-right:1px solid rgba(255,255,255,0.06);
  padding:14px 12px;overflow-y:auto;background:rgba(0,0,0,0.18);flex-shrink:0;
}
.ai-sidebar-hdr{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;
  font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#7c849a;
  padding:0 6px;
}
.ai-sb-add{
  background:transparent;border:1px solid rgba(255,255,255,0.12);color:#c7d2fe;
  font-family:inherit;font-size:14px;width:22px;height:22px;border-radius:5px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;line-height:1;
}
.ai-sb-add:hover{background:rgba(99,102,241,0.18);border-color:rgba(99,102,241,0.4);}
.ai-cat-row{
  display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;
  font-size:13px;color:#cbd2e3;margin-bottom:1px;position:relative;
}
.ai-cat-row:hover{background:rgba(255,255,255,0.04);}
.ai-cat-row.active{background:rgba(99,102,241,0.16);color:#fff;}
.ai-cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ai-cat-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ai-cat-count{font-size:10px;color:#7c849a;background:rgba(255,255,255,0.05);padding:1px 6px;border-radius:8px;}
.ai-cat-row.depth-1{padding-left:22px;font-size:12px;}
.ai-cat-row.depth-2{padding-left:38px;font-size:12px;color:#a8b0c2;}
.ai-cat-actions{display:none;gap:2px;}
.ai-cat-row:hover .ai-cat-actions{display:flex;}
.ai-cat-act{

<script>
// ── CONFIG ────────────────────────────────────────────────────────────
const SUPABASE_URL   = 'https://iiqlhqtyyqctgupalrlc.supabase.co';
const SUPABASE_ANON  = 'sb_publishable_JAASDdg8OERvpDTnEeLd5Q_Re48qR1I';
const OFFICE_PW      = 'nantucket';
// ───────────────────────────────────────────────────────────────────────

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON);

const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
function getCompany(id){
  if(!id) return {name:'',tag:'',cls:''};
  // REIS = any 6-digit ID starting with 2 (covers 20xxxx, 21xxxx, 22xxxx, ...)
  // SANTOS = any 6-digit ID starting with 3 (covers 30xxxx, 31xxxx, ...)
  if(id.length>=6){
    if(id[0]==='2') return {name:'REIS',tag:'co-reis',cls:'co-reis'};
    if(id[0]==='3') return {name:'SANTOS',tag:'co-santos',cls:'co-santos'};
  }
  // Fallback: still match 2-digit legacy prefix for older 4-digit IDs
  if(id.startsWith('20')) return {name:'REIS',tag:'co-reis',cls:'co-reis'};
  if(id.startsWith('30')) return {name:'SANTOS',tag:'co-santos',cls:'co-santos'};
  return {name:'',tag:'',cls:''};
}
const ACTION_TYPES = [
  {value:'Skip Day', label:'Skip Day', needsDate:true, tag:'at-skip'},
  {value:'1XER', label:'1XER', needsDate:true, tag:'at-1xer'},

];

// ── ACTIVITY TRACKING ────────────────────────────────────────────────
async function logActivity(action, detail=''){
  if(!currentUser) return;
  try{ await db.from('activity_log').insert({user_id:currentUser.display_name,action,detail:detail||null}); }catch(e){}
}
function startHeartbeat(){
  if(heartbeatTimer) clearInterval(heartbeatTimer);
  const beat=()=>{ if(currentUser) db.from('heartbeats').insert({user_id:currentUser.display_name}).then(()=>{}); };
  beat();
  heartbeatTimer=setInterval(beat, 5*60*1000);
}
function fmtTime(d){
  if(!(d instanceof Date)) d=new Date(d);
  let h=d.getHours(), m=d.getMinutes();
  const ap=h>=12?'pm':'am';
  h=h%12||12;
  return `${h}:${String(m).padStart(2,'0')}${ap}`;
}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function parseCSVLine(line){
  const fields=[];
  let field='', inQuotes=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(inQuotes){
      if(ch==='"'&&line[i+1]==='"'){field+='"';i++;}
      else if(ch==='"'){inQuotes=false;}
      else{field+=ch;}
    } else {
      if(ch==='"'){inQuotes=true;}
      else if(ch===','){fields.push(field.trim());field='';}
      else{field+=ch;}
    }
  }
  fields.push(field.trim());
  return fields;
}

// ── STICKY NOTES ──────────────────────────────────────────────────────
let stickyOpen = false;
let stickyData = [];
