function irrGetPDFFilename() {
  return (window._irrReportSubject||'Rolloff Performance Report').replace(/[^a-zA-Z0-9 \-]/g,'').replace(/\s+/g,'_')+'.pdf';
}

function irrGetPDFOptions() {
  return {
    margin: [10,12,10,12],
    filename: irrGetPDFFilename(),
    image: {type:'jpeg',quality:0.98},
    html2canvas: {scale:2,useCORS:true},
    jsPDF: {unit:'mm',format:'letter',orientation:'portrait'},
  };
}

function irrDownloadPDF() {
  // Try multiple overlay IDs — daily report, weekly print, quarterly, projections
  const el=document.querySelector('.irr-report-overlay .irr-report-body');
  if(!el){toast('No report to export');return;}
  toast('Generating PDF...');
  html2pdf().set(irrGetPDFOptions()).from(el).save().then(()=>{
    toast('PDF downloaded',true);
  });
}

async function irrEmailReport() {
  const emails=document.getElementById('irrReportEmails').value.trim();
  if(!emails){toast('Enter at least one email address');return;}
  const el=document.querySelector('#irrReportOverlay .irr-report-body');
  if(!el){toast('No report to export');return;}

  // Copy report HTML to clipboard so user can paste into Gmail body
  const html = el.outerHTML;
  const plain = el.innerText;
  try {
    await navigator.clipboard.write([new ClipboardItem({
      'text/html': new Blob([html], {type:'text/html'}),
      'text/plain': new Blob([plain], {type:'text/plain'}),
    })]);
  } catch(e) {
    try { await navigator.clipboard.writeText(plain); } catch(e2) {}
  }

  // Open Gmail compose
  const sub = encodeURIComponent(window._irrReportSubject||'Rolloff Performance Report');
  const to = encodeURIComponent(emails);
  window.open('https://mail.google.com/mail/?view=cm&to='+to+'&su='+sub, '_blank');
  toast('Report copied to clipboard — press Ctrl+V in Gmail to paste',true);
}

// ── Historical bulk import ─────────────────────────────────────────────

function irrParseBulk(rows) {
  // Same parsing logic as irrParseReport, but tags each ticket with its date
  // then groups by date to produce daily report rows
  const tickets = {};
  let currentCode = null, parentCode = null;
  const codeStack = [];
  let lastDate = null;

  for (let i = 0; i < rows.length; i++) {
    const vals = rows[i];
    const nonEmpty = vals.filter(v => v && v.trim());
    if (!nonEmpty.length) continue;
    const first = nonEmpty[0];
    const isHeader = first.includes(' - ') && !first.includes('Totals') && !first.includes('Tickets:')
      && !first.includes('TIPFEES') && !first.includes('ROLLOFFS') && !first.includes('No Order')
      && !first.startsWith('Page ') && !first.includes('Date Range') && first.trim()!=='Date' && !first.includes('Report');
    const isTotals = first.includes(' - ') && first.includes('Totals') && !first.includes('TIPFEES') && !first.includes('Non Order');

    if (isHeader) { const c=first.split(' - ')[0].trim(); codeStack.push(c); currentCode=c; parentCode=codeStack.length>1?codeStack[0]:null; }
    if (isTotals) { const c=first.split(' - ')[0].trim(); const idx=codeStack.lastIndexOf(c); if(idx!==-1)codeStack.splice(idx,1); currentCode=codeStack.length>0?codeStack[codeStack.length-1]:null; parentCode=codeStack.length>1?codeStack[0]:null; }

    const effectiveCode = (parentCode && parentCode.startsWith('ZZ')) ? parentCode : currentCode;
    if (!effectiveCode) continue;
    const flatUpper = vals.join(' ').toUpperCase();
    const dataVals = vals.filter(v => v!==null && v!=='' && v!==undefined);

    // Track date from rows — date appears as M/D/YYYY in data values
    for (const v of dataVals) {
      const dm = v.match(/^(\d{1,2}\/\d{1,2}\/\d{4})$/);
      if (dm) { lastDate = dm[1]; break; }
    }

    if (flatUpper.includes('REIS SITE TRANSFER FEE')) {
      const fi = dataVals.findIndex(v => v && v.includes('REIS SITE TRANSFER FEE'));
      if (fi!==-1 && fi+2<dataVals.length) {
        const ticket=dataVals[1]||'?', net=parseFloat(dataVals[fi+2])||0;
        if(!tickets[ticket]) tickets[ticket]={tons:0,service:null,code:effectiveCode,date:lastDate,tipRev:0};
        tickets[ticket].tons+=net;
        if(!tickets[ticket].service) tickets[ticket].code=effectiveCode;
        if(!tickets[ticket].date) tickets[ticket].date=lastDate;
        // Revenue
        const rateStr=dataVals[fi+3]||'';
        const rateMatch=rateStr.match(/\$([0-9.]+)/);
        if(rateMatch) tickets[ticket].tipRev=net*parseFloat(rateMatch[1]);
      }
    }
    for (const kw of IRR_ROLLOFF_SVC) {
      if (flatUpper.includes(kw)) {
        const ticket=dataVals[1]||'?';
        if(!tickets[ticket]) tickets[ticket]={tons:0,service:null,code:effectiveCode,date:lastDate,tipRev:0};
        tickets[ticket].service=kw; tickets[ticket].code=effectiveCode;
        if(!tickets[ticket].date) tickets[ticket].date=lastDate;
        // Service fee amount — only scan AFTER the keyword to avoid grabbing ticket numbers
        let svcFee=0;
        if(!effectiveCode.startsWith('ZZ')){
          let fileAmt=0;
          const kwIdx2=dataVals.findIndex(v=>v&&v.toUpperCase().includes(kw));
          if(kwIdx2>=0){
            for(let j=dataVals.length-1;j>kwIdx2;j--){
              const amt=parseFloat(dataVals[j]);
              if(!isNaN(amt)&&amt>0){fileAmt=amt;break;}
            }
          }
          // Apply hardcoded rate only when the ticket's date is on/after the rate-change date.
          // Earlier dates keep whatever the scale file recorded.
          const ticketIso = mdyToIso(tickets[ticket].date || lastDate);
          svcFee = rolloffSvcFeeForDate(kw, ticketIso, fileAmt);
        }
        tickets[ticket].svcFee=(tickets[ticket].svcFee||0)+svcFee;
        break;
      }
    }
    // Per-unit fees — attach to ticket so grouping pass can route based on ticket context
    for (const item of IRR_PER_UNIT_FEES) {
      if (flatUpper.includes(item.kw)) {
        const kwIdx = dataVals.findIndex(v => v && v.toUpperCase().includes(item.kw));
        if (kwIdx >= 0 && kwIdx+1 < dataVals.length && lastDate) {
          const qty = parseFloat(dataVals[kwIdx+1]) || 0;
          const rev = qty * item.price;
          if (rev > 0) {
            const ticket = dataVals[1] || '?';
            if(!tickets[ticket]) tickets[ticket]={tons:0,service:null,code:effectiveCode,date:lastDate,tipRev:0};
            if(!tickets[ticket].date) tickets[ticket].date = lastDate;
            if (item.bucket === 'hook') {
              tickets[ticket].hookFee = (tickets[ticket].hookFee||0) + rev;
            } else {
              tickets[ticket].disposalFee = (tickets[ticket].disposalFee||0) + rev;
            }
          }
        }
        break;
      }
    }
  }

  // Group tickets by date
  const dailyMap = {};
  for (const [tn,t] of Object.entries(tickets)) {
    const dt = t.date;
    if(!dt) continue;
    if(!dailyMap[dt]) dailyMap[dt]={
      reis:{tons:0,tickets:0,tipRev:0,svcFees:0,deliveries:0,empties:0,doubleDrops:0},
      pile:{tons:0,tickets:0}, island:{tons:0,tickets:0}, santos:{tons:0,tickets:0},
      vinagro:{tons:0,tickets:0}, walkin:{tons:0,tickets:0,tipRev:0},
    };
    const b=dailyMap[dt], c=t.code;
    const disposalFee = t.disposalFee || 0;
    const hookFee = t.hookFee || 0;
    if(c==='ZZISLAND'){b.island.tons+=t.tons;b.island.tickets++;}
    else if(c==='ZZEASTEND'){b.santos.tons+=t.tons;b.santos.tickets++;}
    else if(c==='ZZDELTA'){b.pile.tons+=t.tons;b.pile.tickets++;}
    else if(c==='ZZREIS'){b.vinagro.tons+=t.tons;b.vinagro.tickets++;}
    else if(c.startsWith('ZZ')){
      // ZZ walk-in: disposal + hook per-unit fees go to walk-in tip revenue
      b.walkin.tons+=t.tons;b.walkin.tickets++;
      b.walkin.tipRev+=(t.tipRev||0)+disposalFee+hookFee;
    }
    else if(t.service!==null){
      // Non-ZZ rolloff ticket: disposal fees ride with tonnage revenue; hook fees add to svcFees
      b.reis.tons+=t.tons;b.reis.tickets++;
      b.reis.tipRev+=(t.tipRev||0)+disposalFee;
      b.reis.svcFees+=(t.svcFee||0)+hookFee;
      if(t.service.includes('DELIVERY'))b.reis.deliveries++;
      else if(t.service.includes('DOUBLE DROP'))b.reis.doubleDrops++;
      else if(t.service.includes('EMPTY'))b.reis.empties++;
    } else {
      // Non-ZZ walk-in: disposal goes to walk-in tip rev; hook-type per-unit fee (unusual on a
      // walk-in) still goes to walk-in for routing simplicity
      b.walkin.tons+=t.tons;b.walkin.tickets++;
      b.walkin.tipRev+=(t.tipRev||0)+disposalFee+hookFee;
    }
  }

  // Convert to array of DB rows
  const dbRows = [];
  for (const [dateStr,b] of Object.entries(dailyMap)) {
    const parts=dateStr.split('/');
    const isoDate=parts[2]+'-'+parts[0].padStart(2,'0')+'-'+parts[1].padStart(2,'0');
    const totalTons=b.reis.tons+b.pile.tons+b.island.tons+b.santos.tons+b.walkin.tons;
    const totalTickets=b.reis.tickets+b.pile.tickets+b.island.tickets+b.santos.tickets+b.walkin.tickets;
    dbRows.push({
      report_date:isoDate,
      reis_tons:b.reis.tons, reis_tickets:b.reis.tickets,
      reis_deliveries:b.reis.deliveries, reis_empties:b.reis.empties, reis_double_drops:b.reis.doubleDrops,
      reis_tip_revenue:b.reis.tipRev, reis_svc_revenue:b.reis.svcFees,
      pile_tons:b.pile.tons, pile_tickets:b.pile.tickets,
      island_tons:b.island.tons, island_tickets:b.island.tickets, island_revenue:0,
      santos_tons:b.santos.tons, santos_tickets:b.santos.tickets, santos_revenue:0,
      walkin_tons:b.walkin.tons, walkin_tickets:b.walkin.tickets, walkin_tip_revenue:b.walkin.tipRev,
      vinagro_tons:b.vinagro.tons, vinagro_loads:b.vinagro.tickets,
      total_inbound_tons:totalTons, total_inbound_tickets:totalTickets,
    });
  }
  dbRows.sort((a,b)=>a.report_date.localeCompare(b.report_date));
  return {ticketCount:Object.keys(tickets).length, days:dbRows};
}

async function irrHandleBulk(file) {
  if(!file) return;
  const status = document.getElementById('irrBulkStatus');
  status.style.display='block';
  status.textContent='Reading '+file.name+'...';

  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      status.textContent='Parsing historical data...';
      const rows = irrParseSpreadsheetML(e.target.result);
      status.textContent='Parsed '+rows.length+' rows, grouping by date...';
      const result = irrParseBulk(rows);

      // Calculate Island/East End revenue from rates
      await irrLoadRates();
      for (const d of result.days) {
        const {ir, er} = irrRatesFor(d.report_date);
        if (ir) d.island_revenue = (ir.hook_fee*(d.island_tickets||0)) + ((ir.per_ton*(1+(ir.ton_markup||0)))*(parseFloat(d.island_tons)||0));
        if (er) d.santos_revenue = (er.hook_fee*(d.santos_tickets||0)) + ((er.per_ton*(1+(er.ton_markup||0)))*(parseFloat(d.santos_tons)||0));
      }

      status.textContent=result.ticketCount+' tickets across '+result.days.length+' days. Saving...';

      // Upsert in batches
      const batchSize=100;
      let saved=0;
      for(let i=0;i<result.days.length;i+=batchSize){
        const chunk=result.days.slice(i,i+batchSize);
        const {error}=await db.from('irr_reports').upsert(chunk,{onConflict:'report_date'});
        if(error){status.textContent='Error at batch '+(i/batchSize+1)+': '+error.message;return;}
        saved+=chunk.length;
        status.textContent='Saved '+saved+' / '+result.days.length+' days...';
      }

      status.textContent='Import complete: '+result.days.length+' days, '+result.ticketCount+' tickets.';
      toast(result.days.length+' days of historical data imported',true);
      irrLoadHistoryView();
    } catch(err) {
      status.textContent='Error: '+err.message;
      console.error(err);
    }
  };
  reader.readAsText(file);
}

// ── Ticket reclassification (move IC pile pickups to walk-in) ─────────

function irrShowReclassify(data, file) {
  return new Promise(resolve => {
    const icTickets = [];
    for (const [tn, t] of Object.entries(data.tickets)) {
      if (t.code === 'ZZISLAND' || t.code === 'ZZEASTEND' || t.code === 'ZZDELTA') {
        const company = t.code === 'ZZISLAND' ? 'Island Rubbish'
                      : t.code === 'ZZEASTEND' ? 'East End'
                      : 'Delta (Reis Pile)';
        icTickets.push({ ticket: tn, code: t.code, tons: t.tons, company });
      }
    }
    if (!icTickets.length) { resolve(); irrFinalizeDailyUpload(data, file); return; }
    icTickets.sort((a, b) => a.company.localeCompare(b.company) || b.tons - a.tons);

    const existing = document.getElementById('icrReclassModal');
    if (existing) existing.remove();

    let rows = '';
    for (const t of icTickets) {
      // Delta tickets are already pile — no Pile checkbox shown. Others get all three.
      const pileCb = t.code === 'ZZDELTA'
        ? '<span style="color:var(--gray-300);font-size:11px;">\u2014</span>'
        : `<input type="checkbox" value="${t.ticket}" class="reclass-cb" data-action="pile">`;
      const walkinCb = `<input type="checkbox" value="${t.ticket}" class="reclass-cb" data-action="walkin">`;
      const excludeCb = `<input type="checkbox" value="${t.ticket}" class="reclass-cb" data-action="exclude">`;
      rows += `<tr>
        <td style="text-align:center;">${excludeCb}</td>
        <td style="text-align:center;">${pileCb}</td>
        <td style="text-align:center;">${walkinCb}</td>
        <td>${t.ticket}</td>
        <td>${t.company}</td>
        <td style="font-family:'DM Mono',monospace;text-align:right;">${t.tons.toFixed(2)}</td>
      </tr>`;
    }

    const overlay = document.createElement('div');
    overlay.className = 'icr-driver-modal';
    overlay.id = 'icrReclassModal';
    overlay.innerHTML = `<div class="icr-driver-box" style="max-width:640px;">
      <h3>Review IC Tickets \u2014 ${data.date || 'Today'}</h3>
      <div style="font-size:12px;color:var(--gray-500);margin-bottom:12px;line-height:1.5;">
        <b>Exclude</b>: drop the ticket entirely (tons/tickets/revenue removed). Use for misclassified or duplicate tickets.<br>
        <b>Pile Pickup</b>: Island/East End pile pickup \u2014 move to walk-in.<br>
        <b>Walk In</b>: this IC ticket was actually a walk-in customer \u2014 move to walk-in.
      </div>
      <div style="max-height:320px;overflow-y:auto;border:1px solid var(--gray-200);border-radius:var(--radius-sm);">
        <table style="width:100%;border-collapse:collapse;font-size:12px;">
          <thead><tr style="border-bottom:1px solid var(--gray-200);background:var(--gray-50);">
            <th style="padding:6px 8px;width:58px;">Exclude</th>
            <th style="padding:6px 8px;width:70px;">Pile Pickup</th>
            <th style="padding:6px 8px;width:54px;">Walk In</th>
            <th style="padding:6px 8px;text-align:left;">Ticket</th>
            <th style="padding:6px 8px;text-align:left;">Company</th>
            <th style="padding:6px 8px;text-align:right;">Tons</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div class="icr-driver-btns" style="margin-top:14px;">
        <button style="background:var(--gray-100);color:var(--gray-600);" onclick="irrReclassifyConfirm(false)">Nothing to flag</button>
        <button style="background:var(--teal);color:white;" onclick="irrReclassifyConfirm(true)">Apply</button>
      </div>
    </div>`;
    document.body.appendChild(overlay);

    window._reclassResolve = resolve;
    window._reclassData = data;
    window._reclassFile = file;
  });
}

function irrReclassifyConfirm(applyChanges) {
  const data = window._reclassData;
  const file = window._reclassFile;
  const resolve = window._reclassResolve;

  if (applyChanges) {
    const actions = {}; // ticket -> 'exclude' | 'pile' | 'walkin'
    // Exclude wins over pile/walk-in; pile and walk-in are functionally the same (move to walk-in)
    document.querySelectorAll('.reclass-cb[data-action="exclude"]:checked').forEach(cb => {
      actions[cb.value] = 'exclude';
    });
    document.querySelectorAll('.reclass-cb[data-action="pile"]:checked').forEach(cb => {
      if (!actions[cb.value]) actions[cb.value] = 'pile';
    });
    document.querySelectorAll('.reclass-cb[data-action="walkin"]:checked').forEach(cb => {
      if (!actions[cb.value]) actions[cb.value] = 'walkin';
    });

    if (Object.keys(actions).length > 0) {
      const b = data.buckets;
      let piledCount = 0, walkinCount = 0, excludedCount = 0;
      for (const [tn, action] of Object.entries(actions)) {
        const t = data.tickets[tn];
        if (!t) continue;
        // Remove from source bucket
        const src = t.code === 'ZZISLAND' ? b.island
                  : t.code === 'ZZEASTEND' ? b.santos
                  : t.code === 'ZZDELTA'   ? b.pile
                  : null;
        if (!src) continue;
        src.tons    -= t.tons;
        src.tickets -= 1;
        if (action === 'pile' || action === 'walkin') {
          b.walkin.tons    += t.tons;
          b.walkin.tickets += 1;
          t.code = 'WALKIN_RECLASS';
          if (action === 'pile') piledCount++; else walkinCount++;
        } else {
          // Exclude — drop entirely. Zero the ticket so downstream revenue passes skip it.
          t.code = 'EXCLUDED';
          t.tons = 0;
          excludedCount++;
        }
      }
      // Recalculate Island/East End revenue from the updated bucket state
      irrCalcRevenue(data.buckets, data.date);
      const msg = [];
      if (piledCount)    msg.push(`${piledCount} pile \u2192 walk-in`);
      if (walkinCount)   msg.push(`${walkinCount} walk-in`);
      if (excludedCount) msg.push(`${excludedCount} excluded`);
      toast(msg.join(' \u00b7 '), true);
    }
  }

  document.getElementById('icrReclassModal').remove();
  irrFinalizeDailyUpload(data, file);
  if (resolve) resolve();
}

async function irrFinalizeDailyUpload(data, file) {
  const status = document.getElementById('irrStatus');
  status.style.display = 'block';
  status.textContent = 'Saving report...';

  await irrSaveReport(data);

  try { await irrAutoSaveFile(file, data.date); } catch (ex) { console.warn('File backup failed:', ex); }

  const ytd = await irrLoadYTD(data.date);

  document.getElementById('irrUploadSection').style.display = 'none';
  document.getElementById('irrReportView').innerHTML = irrRenderReportView(data, ytd);
  window._irrEmail = irrGenerateEmail(data, ytd);

  irrLoadHistoryView();
  toast('Scale report processed', true);

  irrPromptDriverData(data.date);
}

// Auto-save uploaded .xls files to shared "Daily Scale Reports" folder
async function irrAutoSaveFile(file, reportDate) {
  // Find or create the shared folder
  const folderName = 'Daily Scale Reports';
  let {data:folders} = await db.from('helm_folders').select('id').eq('name',folderName).eq('scope','shared').limit(1);
  let folderId;
  if (folders && folders.length > 0) {
    folderId = folders[0].id;
  } else {
    const {data:newFolder,error} = await db.from('helm_folders').insert({name:folderName,scope:'shared',owner:null,created_by:currentUser.username}).select().single();
    if (error || !newFolder) return;
    folderId = newFolder.id;
  }

  // Name the file with the report date
  const dateParts = reportDate ? reportDate.split('/') : [];
  const dateLabel = dateParts.length===3 ? dateParts[2]+'-'+dateParts[0].padStart(2,'0')+'-'+dateParts[1].padStart(2,'0') : new Date().toISOString().split('T')[0];
  const fileName = 'Scale_Report_'+dateLabel+'.xls';
  const storagePath = folderId+'/'+Date.now()+'-'+fileName;

  const {error:sErr} = await db.storage.from('helm-files').upload(storagePath, file, {
    contentType: file.type || 'application/octet-stream',
    upsert: false,
  });
  if (sErr) { console.warn('File upload failed:', sErr.message); return; }

  await db.from('helm_files').insert({
    folder_id: folderId,
    filename: fileName,
    storage_path: storagePath,
    size_bytes: file.size,
    mime_type: file.type || null,
    uploaded_by: currentUser.username,
  });
}

async function irrHandleFile(file) {
  if(!file) return;
  const status = document.getElementById('irrStatus');
  status.style.display='block';
  status.textContent='Reading '+file.name+'...';

  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      status.textContent='Parsing scale data...';
      const rows = irrParseSpreadsheetML(e.target.result);
      const data = irrParseReport(rows);
      await irrLoadRates();
      irrCalcRevenue(data.buckets, data.date);
      irrCurrentData = data;
      status.textContent='Parsed '+Object.keys(data.tickets).length+' tickets.';

      // Show reclassification modal for Island/East End pile pickups
      const hasICTickets = Object.values(data.tickets).some(t=>t.code==='ZZISLAND'||t.code==='ZZEASTEND');
      if (hasICTickets) {
        await irrShowReclassify(data, file);
      } else {
        await irrFinalizeDailyUpload(data, file);
      }
    } catch(err) {
      status.textContent='Error: '+err.message;
      console.error(err);
    }
  };
  reader.readAsText(file);
}

  };

  // Always recalculate Island/East End revenue from rates (covers historical data)
  await irrLoadRates();
  irrCalcRevenue(buckets, isoDate);

  // Convert ISO date to M/D/YYYY for display
  const parts = isoDate.split('-');
  const displayDate = parseInt(parts[1])+'/'+parseInt(parts[2])+'/'+parts[0];
  const reportData = {date: displayDate, buckets, tickets:{}};
  irrCurrentData = reportData;

  const ytd = await irrLoadYTD(displayDate);

  document.getElementById('irrUploadSection').style.display='none';
  document.getElementById('irrReportView').innerHTML = irrRenderReportView(reportData, ytd);

const xferPad = n => String(n).padStart(2,'0');
const xferIsoOf = d => d.getFullYear()+'-'+xferPad(d.getMonth()+1)+'-'+xferPad(d.getDate());
function xferGetMonday(d) {
  const dt = new Date(d);
  const day = dt.getDay();
  const diff = dt.getDate() - day + (day===0?-6:1);
  dt.setDate(diff);
  return xferIsoOf(dt);
}

let xferState = {
  capacity: parseFloat(localStorage.getItem('xfer_capacity')) || 0,
  seedBalance: NaN,
  seedDate: localStorage.getItem('xfer_seed_date') || null,
  weekStart: null,
  editingSeed: false,
  chart: null
};
{
  const sb = parseFloat(localStorage.getItem('xfer_seed_balance'));
  if(isNaN(sb)) {
    xferState.seedBalance = 95;
    xferState.seedDate = xferIsoOf(new Date());
    localStorage.setItem('xfer_seed_balance', '95');
    localStorage.setItem('xfer_seed_date', xferState.seedDate);
  } else {
    xferState.seedBalance = sb;
  }
}

async function renderXfer() {
  const tab = document.getElementById('tab-xfer');
  tab.innerHTML = '<div style="padding:20px;color:var(--gray-400);font-size:12px;">Loading...</div>';

  const today = new Date();
  const todayIso = xferIsoOf(today);
  if(!xferState.weekStart) xferState.weekStart = xferGetMonday(today);

  const {data:rows, error} = await db.from('irr_reports')
    .select('report_date,total_inbound_tons,vinagro_tons')
    .order('report_date', {ascending:true});
  if(error){tab.innerHTML='<div style="padding:20px;color:#c00;">Error: '+error.message+'</div>';return;}

  const byDate = {};
  for(const r of (rows||[])) {
    byDate[r.report_date] = {
      inT: parseFloat(r.total_inbound_tons)||0,
      outT: parseFloat(r.vinagro_tons)||0
    };
  }

  // Compute running balance for every date from seed_date through today.
  // balance(seed_date) = seed; balance(d) = balance(d-1) + net(d) for d > seed_date.
  const balances = {};
  balances[xferState.seedDate] = xferState.seedBalance;
  const seedDt = new Date(xferState.seedDate+'T00:00:00');
  const cursor = new Date(seedDt);
  cursor.setDate(cursor.getDate()+1);
  while(xferIsoOf(cursor) <= todayIso){
    const iso = xferIsoOf(cursor);
    const prev = xferIsoOf(new Date(cursor.getTime()-86400000));
    const row = byDate[iso];
    const net = row ? (row.inT - row.outT) : 0;
    balances[iso] = (balances[prev] ?? xferState.seedBalance) + net;
    cursor.setDate(cursor.getDate()+1);
  }
  // Balances going backward from seed
  const backCursor = new Date(seedDt);
  backCursor.setDate(backCursor.getDate()-1);
  const earliestIso = rows.length ? rows[0].report_date : xferState.seedDate;
  while(xferIsoOf(backCursor) >= earliestIso){
    const iso = xferIsoOf(backCursor);
    const next = xferIsoOf(new Date(backCursor.getTime()+86400000));
    const nextRow = byDate[next];
    const nextNet = nextRow ? (nextRow.inT - nextRow.outT) : 0;
    balances[iso] = (balances[next] ?? xferState.seedBalance) - nextNet;
    backCursor.setDate(backCursor.getDate()-1);
  }

  // Current balance = balance on latest date that has data (or seed if no data after seed)
  let currentBalance = xferState.seedBalance;
  if(rows.length){
    const latestIso = rows[rows.length-1].report_date;
    currentBalance = balances[latestIso] ?? xferState.seedBalance;
  }

  // KPIs — 30-day avg daily net
  const thirtyAgo = new Date(today); thirtyAgo.setDate(today.getDate()-30);
  const thirtyIso = xferIsoOf(thirtyAgo);
  let sumNet30 = 0, days30 = 0;
  for(const r of rows){
    if(r.report_date < thirtyIso) continue;
    sumNet30 += (parseFloat(r.total_inbound_tons)||0) - (parseFloat(r.vinagro_tons)||0);
    days30++;
  }
  const avgDailyNet = days30 > 0 ? sumNet30/days30 : 0;
  let daysToCapacity = null;
  if(xferState.capacity > 0 && avgDailyNet > 0.01 && currentBalance < xferState.capacity){
    daysToCapacity = (xferState.capacity - currentBalance) / avgDailyNet;
  }

  // Build weekly grid for xferState.weekStart
  const weekMonday = new Date(xferState.weekStart+'T00:00:00');
  const weekDates = [];
  for(let i=0;i<6;i++){
    const d = new Date(weekMonday); d.setDate(weekMonday.getDate()+i);
    weekDates.push(xferIsoOf(d));
  }
  const weekEnd = weekDates[5];
  const weekYear = weekMonday.getFullYear();
  const weekMonth = weekMonday.getMonth()+1;
  const mtdStart = weekYear+'-'+xferPad(weekMonth)+'-01';
  const yearStart = weekYear+'-01-01';

  // Period sums: for past weeks use full Mon-Sat; for current week use Mon-through-today
  const periodEnd = (weekEnd > todayIso) ? todayIso : weekEnd;
  function sumRange(startIso, endIso){
    let inT=0, outT=0;
    for(const r of rows){
      if(r.report_date < startIso || r.report_date > endIso) continue;
      inT += parseFloat(r.total_inbound_tons)||0;
      outT += parseFloat(r.vinagro_tons)||0;
    }
    return {inT, outT};
  }
  const wtd = sumRange(xferState.weekStart, periodEnd);
  const mtd = sumRange(mtdStart, periodEnd);
  const ytd = sumRange(yearStart, periodEnd);

  const dayNames = ['Mon','Tue','Wed','Thu','Fri','Sat'];
  const f = n => (n===null||n===undefined||isNaN(n)) ? '--' : n.toFixed(2);
  const fSigned = n => {
    if(n===null||n===undefined||isNaN(n)) return '--';
    return (n>0?'+':'')+n.toFixed(2);
  };

  // End-of-period balance for WTD/MTD/YTD = balance on periodEnd
  const wtdEndBal = balances[periodEnd];
  const mtdEndBal = balances[periodEnd];
  const ytdEndBal = balances[periodEnd];

  const pctOver = (bal) => {
    if(!xferState.capacity || xferState.capacity<=0 || bal===undefined || bal===null) return '';
    const p = ((bal/xferState.capacity - 1) * 100);
    const color = p > 0 ? '#c0392b' : '#27ae60';
    return '<div style="font-size:9px;color:'+color+';margin-top:2px;">'+(p>0?'+':'')+p.toFixed(1)+'%</div>';
  };

  // Format seed date nicely
  const seedDateDisp = new Date(xferState.seedDate+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  const weekLabel = weekMonday.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' – '+(new Date(weekMonday.getTime()+5*86400000)).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

  const seedPanel = xferState.editingSeed ? `
    <div style="display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fff3cd;border:1px solid #ffc107;border-radius:6px;margin-bottom:16px;">
      <label style="font-size:12px;font-weight:600;color:#856404;">Seed balance (tons):</label>
      <input id="xferSeedInput" type="number" step="0.01" value="${xferState.seedBalance}" style="width:100px;padding:6px 10px;border:1px solid #ffc107;border-radius:4px;font-family:'DM Mono',monospace;font-size:12px;"/>
      <span style="font-size:11px;color:#856404;">Date will stamp as ${new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span>
      <button onclick="xferSaveSeed()" class="icr-nav-btn" style="cursor:pointer;background:#28a745;color:white;border-color:#28a745;">Confirm &amp; Save</button>
      <button onclick="xferState.editingSeed=false;renderXfer()" class="icr-nav-btn" style="cursor:pointer;">Cancel</button>
    </div>
  ` : `
    <div style="display:flex;align-items:center;gap:14px;padding:10px 14px;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:6px;margin-bottom:16px;font-size:12px;">
      <span style="color:var(--gray-500);">Seed balance:</span>
      <span style="font-weight:600;color:var(--gray-800);font-family:'DM Mono',monospace;">${xferState.seedBalance.toFixed(2)} tons</span>
      <span style="color:var(--gray-400);">·</span>
      <span style="color:var(--gray-500);">Set on:</span>
      <span style="color:var(--gray-700);">${seedDateDisp}</span>
      <span style="margin-left:auto;display:flex;gap:8px;align-items:center;">
        <label style="color:var(--gray-500);">Capacity target:</label>
        <input id="xferCapacityInput" type="number" step="0.01" value="${xferState.capacity||''}" placeholder="tons" style="width:80px;padding:4px 8px;border:1px solid var(--gray-300);border-radius:4px;font-family:'DM Mono',monospace;font-size:11px;"/>
        <button onclick="xferSaveCapacity()" class="icr-nav-btn" style="cursor:pointer;padding:4px 10px;font-size:11px;">Save</button>
        <span style="color:var(--gray-300);">·</span>
        <button onclick="xferState.editingSeed=true;renderXfer()" class="icr-nav-btn" style="cursor:pointer;padding:4px 10px;font-size:11px;">\u270E Edit seed</button>
      </span>
    </div>
  `;

  const kpiCard = (label, value, sub) => `
    <div style="flex:1;min-width:140px;padding:14px 16px;background:white;border:1px solid var(--gray-200);border-radius:8px;">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--gray-400);letter-spacing:0.5px;">${label}</div>
      <div style="font-size:22px;font-weight:700;color:var(--navy);font-family:'DM Mono',monospace;margin-top:4px;">${value}</div>
      ${sub?'<div style="font-size:10px;color:var(--gray-500);margin-top:2px;">'+sub+'</div>':''}
    </div>
  `;

  const capacityPct = xferState.capacity > 0 ? ((currentBalance/xferState.capacity - 1)*100) : null;
  const capSub = capacityPct === null ? 'no capacity target' :
    (capacityPct>0?'<span style="color:#c0392b">+'+capacityPct.toFixed(1)+'% over target</span>':'<span style="color:#27ae60">'+capacityPct.toFixed(1)+'% of target</span>');

  tab.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;">
      <h3 style="font-size:14px;font-weight:600;color:var(--navy);margin:0;">Xfer Station \u2014 C&amp;D Room Balance</h3>
    </div>
    ${seedPanel}
    <div style="display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;">
      ${kpiCard('Currently in station', f(currentBalance)+' tons', capSub)}
      ${kpiCard('Daily avg net (30d)', fSigned(avgDailyNet)+' tons/day', days30+' days w/ data')}
      ${kpiCard('Days to capacity', daysToCapacity===null?'\u2014':Math.round(daysToCapacity)+' days', daysToCapacity===null?'set capacity & net must be +':'at current pace')}
      ${kpiCard('YTD inbound', f(ytd.inT)+' tons', '')}
      ${kpiCard('YTD outbound', f(ytd.outT)+' tons', '')}
    </div>

    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
      <button class="icr-nav-btn" onclick="xferChangeWeek(-1)" style="cursor:pointer;">\u2190</button>
      <input type="date" value="${xferState.weekStart}" onchange="xferGoToDate(this.value)" style="padding:5px 8px;border:1px solid var(--gray-300);border-radius:4px;font-size:12px;"/>
      <button class="icr-nav-btn" onclick="xferChangeWeek(1)" style="cursor:pointer;">\u2192</button>
      <span style="font-size:12px;color:var(--gray-600);margin-left:6px;">${weekLabel}</span>
      <button class="icr-nav-btn" onclick="xferGoToDate('${xferGetMonday(new Date())}')" style="cursor:pointer;margin-left:6px;">Current week</button>
    </div>
    <table class="icr-table">
      <thead><tr>
        <th></th>
        ${dayNames.map((n,i)=>'<th>'+n+'<br><span style="font-weight:400;font-size:9px;color:var(--gray-300);">'+weekDates[i].substring(5)+'</span></th>').join('')}
        <th class="icr-spacer"></th><th>WTD</th>
        <th class="icr-spacer"></th><th>MTD</th>
        <th class="icr-spacer"></th><th>YTD</th>
      </tr></thead>
      <tbody>
        <tr><td>Inbound</td>${weekDates.map(d=>{const r=byDate[d];return '<td>'+(r?f(r.inT):'--')+'</td>';}).join('')}
          <td class="icr-spacer"></td><td class="icr-agg">${f(wtd.inT)}</td>
          <td class="icr-spacer"></td><td class="icr-agg">${f(mtd.inT)}</td>
          <td class="icr-spacer"></td><td class="icr-agg">${f(ytd.inT)}</td>
        </tr>
        <tr><td>Outbound</td>${weekDates.map(d=>{const r=byDate[d];return '<td>'+(r?f(r.outT):'--')+'</td>';}).join('')}
          <td class="icr-spacer"></td><td class="icr-agg">${f(wtd.outT)}</td>
          <td class="icr-spacer"></td><td class="icr-agg">${f(mtd.outT)}</td>
          <td class="icr-spacer"></td><td class="icr-agg">${f(ytd.outT)}</td>
        </tr>
        <tr><td>Net</td>${weekDates.map(d=>{const r=byDate[d];return '<td>'+(r?fSigned(r.inT-r.outT):'--')+'</td>';}).join('')}
          <td class="icr-spacer"></td><td class="icr-agg">${fSigned(wtd.inT-wtd.outT)}</td>
          <td class="icr-spacer"></td><td class="icr-agg">${fSigned(mtd.inT-mtd.outT)}</td>
          <td class="icr-spacer"></td><td class="icr-agg">${fSigned(ytd.inT-ytd.outT)}</td>
        </tr>
        <tr style="border-top:2px solid var(--gray-200);"><td style="font-weight:600;">End-of-day balance</td>${weekDates.map(d=>{const b=balances[d];return '<td style="font-weight:600;">'+(b===undefined?'--':f(b))+pctOver(b)+'</td>';}).join('')}
          <td class="icr-spacer"></td><td class="icr-agg">${f(wtdEndBal)}${pctOver(wtdEndBal)}</td>
          <td class="icr-spacer"></td><td class="icr-agg">${f(mtdEndBal)}${pctOver(mtdEndBal)}</td>
          <td class="icr-spacer"></td><td class="icr-agg">${f(ytdEndBal)}${pctOver(ytdEndBal)}</td>
        </tr>
      </tbody>
    </table>

    <div style="margin-top:28px;">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--gray-500);letter-spacing:0.5px;margin-bottom:10px;">Running balance \u2014 full history</div>
      <div style="position:relative;height:300px;"><canvas id="xferChart"></canvas></div>
    </div>
  `;

  // Draw chart
  const sortedDates = Object.keys(balances).sort();
  const labels = sortedDates;
  const balanceData = sortedDates.map(d => balances[d]);
  if(xferState.chart){ try{xferState.chart.destroy();}catch(e){} }
  const ctx = document.getElementById('xferChart').getContext('2d');
  const datasets = [{
    label:'Balance (tons)',
    data:balanceData,
    borderColor:'#003f5c',
    backgroundColor:'rgba(0,63,92,0.08)',
    borderWidth:2,
    fill:true,
    tension:0.2,
    pointRadius:0
  }];
  if(xferState.capacity > 0){
    datasets.push({
      label:'Capacity target',
      data:sortedDates.map(()=>xferState.capacity),
      borderColor:'#c0392b',
      borderWidth:1.5,
      borderDash:[6,4],
      fill:false,
      pointRadius:0
    });
  }
  xferState.chart = new Chart(ctx, {
    type:'line',
    data:{labels, datasets},
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{legend:{position:'top',labels:{font:{size:10},usePointStyle:true}}},
      scales:{
        y:{title:{display:true,text:'Tons',font:{size:10}},ticks:{font:{size:10}},grid:{color:'rgba(0,0,0,0.04)'}},
        x:{ticks:{font:{size:9},maxRotation:0,autoSkip:true,maxTicksLimit:12},grid:{display:false}}
      }
    }
  });
}

function xferChangeWeek(delta){
  const d = new Date(xferState.weekStart+'T00:00:00');
  d.setDate(d.getDate() + delta*7);
  xferState.weekStart = xferIsoOf(d);
  renderXfer();
}
function xferGoToDate(iso){
  if(!iso) return;
  xferState.weekStart = xferGetMonday(new Date(iso+'T00:00:00'));
  renderXfer();
}
function xferSaveCapacity(){
  const val = parseFloat(document.getElementById('xferCapacityInput').value)||0;
  xferState.capacity = val;
  localStorage.setItem('xfer_capacity', String(val));
  renderXfer();
  toast('Capacity saved');
}
function xferSaveSeed(){
  const val = parseFloat(document.getElementById('xferSeedInput').value);
  if(isNaN(val)) { toast('Enter a valid number'); return; }
  xferState.seedBalance = val;
  xferState.seedDate = xferIsoOf(new Date());
  xferState.editingSeed = false;
  localStorage.setItem('xfer_seed_balance', String(val));
  localStorage.setItem('xfer_seed_date', xferState.seedDate);
  renderXfer();
  toast('Seed updated');
}

            <h3 id="filesMainTitle">Select a folder</h3>
            <label class="files-upload-btn" id="filesUploadBtn" style="display:none">
              Upload File
              <input type="file" id="filesUploadInput" onchange="filesHandleUpload(this.files)" multiple>
            </label>
          </div>
          <div class="files-status" id="filesStatus"></div>
          <div id="filesMainContent"></div>
        </div>
      </div>
    </div>`;

  filesLoadFolders();
}

function filesSwitchView(view) {
  filesActiveView = view;
  filesActiveFolderId = null;
  document.getElementById('filesSubShared').className = view==='shared'?'active':'';
  document.getElementById('filesSubPersonal').className = view==='personal'?'active':'';
  filesLoadFolders();
}

async function filesLoadFolders() {
  let q = db.from('helm_folders').select('*').eq('scope', filesActiveView);
  if (filesActiveView === 'personal') {
    q = q.eq('owner', currentUser.username);
  }
  const {data, error} = await q.order('name', {ascending:true});
  if (error) { toast('Folder load error: '+error.message); return; }
  filesFolders = data || [];
  filesRenderFolderList();
  // Auto-select first folder
  if (filesFolders.length > 0 && !filesActiveFolderId) {
    filesSelectFolder(filesFolders[0].id);
  } else if (filesFolders.length === 0) {
    document.getElementById('filesMainTitle').textContent = 'No folders yet';
    document.getElementById('filesMainContent').innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--gray-400);font-size:13px;">Create a folder to start uploading files.</div>';
    document.getElementById('filesUploadBtn').style.display = 'none';
  }
}

function filesRenderFolderList() {
  const container = document.getElementById('filesFolderList');
  if (!filesFolders.length) {
    container.innerHTML = '<div class="files-empty">No folders yet.</div>';
    return;
  }
  container.innerHTML = filesFolders.map(f =>
    `<div class="files-folder-item ${f.id===filesActiveFolderId?'active':''}" onclick="filesSelectFolder('${f.id}')">
      <span class="files-folder-name">${esc(f.name)}</span>
      <button class="files-folder-del" onclick="event.stopPropagation();filesDeleteFolder('${f.id}','${esc(f.name)}')" title="Delete folder">&times;</button>
    </div>`).join('');
}

async function filesCreateFolder() {
  const name = prompt('New folder name:');
  if (!name || !name.trim()) return;
  const row = {
    name: name.trim(),
    scope: filesActiveView,
    owner: filesActiveView==='personal' ? currentUser.username : null,
    created_by: currentUser.username,
  };
  const {data, error} = await db.from('helm_folders').insert(row).select().single();
  if (error) { toast('Create folder error: '+error.message); return; }
  toast('Folder created', true);
  await filesLoadFolders();
  if (data) filesSelectFolder(data.id);
}

async function filesDeleteFolder(id, name) {
  if (!confirm('Delete folder "'+name+'" and all files inside it? This cannot be undone.')) return;

  // Fetch files in folder to delete from storage
  const {data:files} = await db.from('helm_files').select('storage_path').eq('folder_id', id);
  if (files && files.length > 0) {
    const paths = files.map(f => f.storage_path);
    const {error:sErr} = await db.storage.from('helm-files').remove(paths);
    if (sErr) { toast('Storage delete error: '+sErr.message); return; }
  }

  // Delete folder (cascade will remove helm_files rows)
  const {error} = await db.from('helm_folders').delete().eq('id', id);
  if (error) { toast('Delete folder error: '+error.message); return; }
  toast('Folder deleted', true);
  if (filesActiveFolderId === id) filesActiveFolderId = null;
  filesLoadFolders();
}

async function filesSelectFolder(id) {
  filesActiveFolderId = id;
  filesRenderFolderList();
  const folder = filesFolders.find(f => f.id === id);
  if (!folder) return;
  document.getElementById('filesMainTitle').textContent = folder.name;
  document.getElementById('filesUploadBtn').style.display = '';
  await filesLoadFiles(id);
}

async function filesLoadFiles(folderId) {
  const {data, error} = await db.from('helm_files').select('*').eq('folder_id', folderId).order('uploaded_at', {ascending:false});
  if (error) { toast('File load error: '+error.message); return; }
  filesList = data || [];
  filesRenderFileList();
}

function filesFormatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  if (bytes < 1024*1024*1024) return (bytes/(1024*1024)).toFixed(1) + ' MB';
  return (bytes/(1024*1024*1024)).toFixed(2) + ' GB';
}

function filesFormatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}) + ' ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}

function filesRenderFileList() {
  const container = document.getElementById('filesMainContent');
  if (!filesList.length) {
    container.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--gray-400);font-size:13px;">No files yet. Click Upload to add one.</div>';
    return;
  }
  let rows = '';
  for (const f of filesList) {
    rows += `<tr>
      <td>
        <div class="files-name">${esc(f.filename)}</div>
        <div class="files-meta">Uploaded by ${esc(f.uploaded_by)}</div>
      </td>
      <td>${filesFormatSize(f.size_bytes)}</td>
      <td>${filesFormatDate(f.uploaded_at)}</td>
      <td>
        <button class="files-action-btn" onclick="filesDownload('${f.id}')">Download</button>
        <button class="files-action-btn danger" onclick="filesDeleteFile('${f.id}','${esc(f.filename)}')">Delete</button>
      </td>
    </tr>`;
  }
  container.innerHTML = `
    <table class="files-table">
      <thead><tr><th>Name</th><th>Size</th><th>Uploaded</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

async function filesHandleUpload(fileList) {
  if (!filesActiveFolderId) { toast('Select a folder first'); return; }
  if (!fileList || !fileList.length) return;

  const status = document.getElementById('filesStatus');
  status.className = 'files-status active';

  let uploaded = 0;
  for (const file of fileList) {
    status.textContent = 'Uploading '+file.name+' ('+(uploaded+1)+'/'+fileList.length+')...';

    // Generate storage path: folderId/timestamp-filename
    const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
    const storagePath = filesActiveFolderId + '/' + Date.now() + '-' + safeName;

    const {error:sErr} = await db.storage.from('helm-files').upload(storagePath, file, {
      contentType: file.type || 'application/octet-stream',
      upsert: false,
    });
    if (sErr) { status.textContent = 'Upload failed: '+sErr.message; toast('Upload failed'); return; }

    const row = {
      folder_id: filesActiveFolderId,
      filename: file.name,
      storage_path: storagePath,
      size_bytes: file.size,
      mime_type: file.type || null,
      uploaded_by: currentUser.username,
    };
    const {error:dErr} = await db.from('helm_files').insert(row);
    if (dErr) { status.textContent = 'DB insert failed: '+dErr.message; toast('Upload failed'); return; }
    uploaded++;
  }

  status.textContent = uploaded+' file(s) uploaded.';
  setTimeout(()=>{status.className='files-status';},3000);
  toast(uploaded+' file(s) uploaded', true);
  document.getElementById('filesUploadInput').value = '';
  await filesLoadFiles(filesActiveFolderId);
}

async function filesDownload(fileId) {
  const file = filesList.find(f => f.id === fileId);
  if (!file) return;
  const {data, error} = await db.storage.from('helm-files').createSignedUrl(file.storage_path, 300); // 5 min
  if (error) { toast('Download error: '+error.message); return; }
  // Trigger download via anchor with download attribute
  const a = document.createElement('a');
  a.href = data.signedUrl;
  a.download = file.filename;
  a.target = '_blank';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

async function filesDeleteFile(fileId, filename) {
  if (!confirm('Delete "'+filename+'"? This cannot be undone.')) return;
  const file = filesList.find(f => f.id === fileId);
  if (!file) return;

  const {error:sErr} = await db.storage.from('helm-files').remove([file.storage_path]);
  if (sErr) { toast('Storage delete error: '+sErr.message); return; }

  const {error:dErr} = await db.from('helm_files').delete().eq('id', fileId);
  if (dErr) { toast('DB delete error: '+dErr.message); return; }

  toast('File deleted', true);
  await filesLoadFiles(filesActiveFolderId);
}

// ── INTERCOMPANY ROLLOFF REPORT ──────────────────────────────────────

let icrYear = new Date().getFullYear();
let icrWeekStart = null; // ISO date string for Monday of current week

function icrGetMonday(d) {
  const dt = new Date(d);
  const day = dt.getDay();
  const diff = dt.getDate() - day + (day===0?-6:1);
  dt.setDate(diff);
  return dt.toISOString().split('T')[0];
}

function icrInit() {
  if(!icrWeekStart) icrWeekStart = icrGetMonday(new Date());
}

async function icrLoadReport() {
  icrInit();
  const container = document.getElementById('irrICRContent');
  container.innerHTML = '<div style="padding:20px;color:var(--gray-400);font-size:12px;">Loading...</div>';

  // Load all data for the selected year
  const {data,error} = await db.from('irr_reports').select('*')
    .gte('report_date', icrYear+'-01-01')
    .lte('report_date', icrYear+'-12-31')
    .order('report_date',{ascending:true});
  if(error){container.innerHTML='Error loading data';return;}

  await irrLoadRates();
  const allData = data||[];

  // Fill in Island/East End revenue if missing
  for(const d of allData){
    const {ir, er} = irrRatesFor(d.report_date);
    if(ir && !(parseFloat(d.island_revenue)>0) && (d.island_tickets||0)>0)
      d.island_revenue=(ir.hook_fee*(d.island_tickets||0))+((ir.per_ton*(1+(ir.ton_markup||0)))*(parseFloat(d.island_tons)||0));
    if(er && !(parseFloat(d.santos_revenue)>0) && (d.santos_tickets||0)>0)
      d.santos_revenue=(er.hook_fee*(d.santos_tickets||0))+((er.per_ton*(1+(er.ton_markup||0)))*(parseFloat(d.santos_tons)||0));
  }

  icrRenderReport(allData, container);
}

function icrRenderReport(allData, container) {
  const dayNames=['Mon','Tue','Wed','Thu','Fri','Sat'];
  const weekDates=[];
  for(let i=0;i<6;i++){
    const d=new Date(icrWeekStart+'T00:00:00');
    d.setDate(d.getDate()+i);
    weekDates.push(d.toISOString().split('T')[0]);
  }

  const weekEnd = weekDates[5];
  const today = new Date().toISOString().split('T')[0];
  const aggEnd = icrYear===new Date().getFullYear() ? today : icrYear+'-12-31';
  const weekLabel = (()=>{
    const s=new Date(icrWeekStart+'T00:00:00');
    return 'Week of '+s.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  })();

  // Index data by date
  const byDate={};
  for(const d of allData) byDate[d.report_date]=d;

  // MTD and YTD always sum through today (or end of year for past years)
  const monthStart = icrWeekStart.substring(0,8)+'01';
  const monthEnd = aggEnd;
  const yearStart = icrYear+'-01-01';
  const ytdEnd = aggEnd;

  function getCompanyData(d, company) {
    if(!d) return {loads:0,tons:0,rev:0,drivers:null,hours:null};
    if(company==='reis') return {
      loads:d.reis_tickets||0, tons:parseFloat(d.reis_tons)||0,
      rev:(parseFloat(d.reis_tip_revenue)||0)+(parseFloat(d.reis_svc_revenue)||0),
      drivers:null, hours:null
    };
    if(company==='island') return {
      loads:d.island_tickets||0, tons:parseFloat(d.island_tons)||0,
      rev:parseFloat(d.island_revenue)||0,
      drivers:d.island_drivers!=null?d.island_drivers:null,
      hours:d.island_hours!=null?parseFloat(d.island_hours):null
    };
    if(company==='santos') return {
      loads:d.santos_tickets||0, tons:parseFloat(d.santos_tons)||0,
      rev:parseFloat(d.santos_revenue)||0,
      drivers:null, hours:null
    };
    // null company = totals (sum all)
    return {
      loads:allLoads(d),
      tons:allTons(d),
      rev:allRev(d),
      drivers:d.island_drivers!=null?d.island_drivers:null,
      hours:d.island_hours!=null?parseFloat(d.island_hours):null
    };
  }

  function sumRange(data, startDate, endDate, company) {
    const r={loads:0,tons:0,rev:0,drivers:0,hours:0,driverDays:0};
    for(const d of data){
      if(d.report_date<startDate||d.report_date>endDate) continue;
      const c=getCompanyData(d,company);
      r.loads+=c.loads;r.tons+=c.tons;r.rev+=c.rev;
      if(c.drivers!==null){r.drivers+=c.drivers;r.driverDays++;}
      if(c.hours!==null) r.hours+=c.hours;
    }
    return r;
  }

  function sumRangeAll(data, startDate, endDate) {
    const r={loads:0,tons:0,rev:0,drivers:0,hours:0,driverDays:0};
    for(const d of data){
      if(d.report_date<startDate||d.report_date>endDate) continue;
      r.loads+=(d.reis_tickets||0)+(d.island_tickets||0)+(d.santos_tickets||0);
      r.tons+=(parseFloat(d.reis_tons)||0)+(parseFloat(d.island_tons)||0)+(parseFloat(d.santos_tons)||0);
      r.rev+=(parseFloat(d.reis_tip_revenue)||0)+(parseFloat(d.reis_svc_revenue)||0)+(parseFloat(d.island_revenue)||0)+(parseFloat(d.santos_revenue)||0);
      if(d.island_drivers!=null){r.drivers+=d.island_drivers;r.driverDays++;}
      if(d.island_hours!=null) r.hours+=parseFloat(d.island_hours);
    }
    return r;
  }

  const f2=n=>n.toFixed(2);
  const fM=n=>'$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  const fv=(v,fmt)=>v===null||v===undefined||isNaN(v)?'--':fmt(v);

  function companyBlock(label, company, isTotal) {
    const hdrClass = isTotal?'icr-total-hdr':'icr-company-hdr';
    let rows=`<tr class="${hdrClass}"><td>${label}</td>${'<td></td>'.repeat(12)}</tr>`;

    const daily = weekDates.map(dt=>getCompanyData(byDate[dt],company));
    const wtd = isTotal ? sumRangeAll(allData, icrWeekStart, weekEnd) : sumRange(allData, icrWeekStart, weekEnd, company);
    const mtd = isTotal ? sumRangeAll(allData, monthStart, monthEnd) : sumRange(allData, monthStart, monthEnd, company);
    const ytd = isTotal ? sumRangeAll(allData, yearStart, ytdEnd) : sumRange(allData, yearStart, ytdEnd, company);

    function row(lbl, dailyFn, wtdV, mtdV, ytdV) {
      return `<tr><td>${lbl}</td>${daily.map(d=>'<td>'+dailyFn(d)+'</td>').join('')}<td class="icr-spacer"></td><td class="icr-agg">${wtdV}</td><td class="icr-spacer"></td><td class="icr-agg">${mtdV}</td><td class="icr-spacer"></td><td class="icr-agg">${ytdV}</td></tr>`;
    }
    const blank=()=>'<tr class="icr-blank"><td></td>'+'<td></td>'.repeat(12)+'</tr>';

    // Revenue block
    rows+=row('Rev/Load', d=>d.loads>0?fM(d.rev/d.loads):'--',
      wtd.loads>0?fM(wtd.rev/wtd.loads):'--', mtd.loads>0?fM(mtd.rev/mtd.loads):'--', ytd.loads>0?fM(ytd.rev/ytd.loads):'--');
    rows+=row('Total Revenue', d=>d.loads>0?fM(d.rev):'--',
      fM(wtd.rev), fM(mtd.rev), fM(ytd.rev));
    rows+=blank();

    // Loads block
    rows+=row('Loads', d=>d.loads>0?d.loads:'--',
      wtd.loads||'--', mtd.loads||'--', ytd.loads||'--');
    rows+=blank();

    // Tonnage block
    rows+=row('Tons/Load', d=>d.loads>0?f2(d.tons/d.loads):'--',
      wtd.loads>0?f2(wtd.tons/wtd.loads):'--', mtd.loads>0?f2(mtd.tons/mtd.loads):'--', ytd.loads>0?f2(ytd.tons/ytd.loads):'--');
    rows+=row('Total Tons', d=>d.tons>0?f2(d.tons):'--',
      f2(wtd.tons), f2(mtd.tons), f2(ytd.tons));
    rows+=blank();

    // Drivers / Hours
    if(company==='island'||isTotal){
      rows+=row('# Drivers', d=>d.drivers!==null?d.drivers:'--',
        wtd.driverDays>0?Math.round(wtd.drivers/wtd.driverDays):'--',
        mtd.driverDays>0?Math.round(mtd.drivers/mtd.driverDays):'--',
        ytd.driverDays>0?Math.round(ytd.drivers/ytd.driverDays):'--');
      rows+=row('# Hours', d=>d.hours!==null?f2(d.hours):'--',
        wtd.hours>0?f2(wtd.hours):'--', mtd.hours>0?f2(mtd.hours):'--', ytd.hours>0?f2(ytd.hours):'--');
    } else {
      rows+=row('# Drivers', ()=>'--', '--','--','--');
      rows+=row('# Hours', ()=>'--', '--','--','--');
    }

    rows+='<tr class="icr-sep"><td></td>'+'<td></td>'.repeat(12)+'</tr>';
    return rows;
  }

  const yearBtn=(y)=>`<button class="icr-year-btn ${icrYear===y?'active':''}" onclick="icrYear=${y};icrLoadReport()">${y}</button>`;

  container.innerHTML = `
    <div class="icr-controls">
      <button class="icr-nav-btn" onclick="icrPrevWeek()">&larr;</button>
      <h3>${weekLabel}</h3>
      <button class="icr-nav-btn" onclick="icrNextWeek()">&rarr;</button>
      <input type="date" value="${icrWeekStart}" onchange="icrJumpToWeek(this.value)" style="font-family:'DM Sans',sans-serif;font-size:11px;padding:4px 8px;border:1px solid var(--gray-200);border-radius:var(--radius-sm);margin-left:8px;">
      <button style="margin-left:auto;" class="icr-nav-btn" onclick="icrExportFile()">Export File</button>
      <button class="icr-nav-btn" onclick="icrPrintWeekly()">Print</button>
      <button class="icr-nav-btn" style="background:var(--teal);color:white;border-color:var(--teal);" onclick="icrShowQuarterly()">Quarterly Report</button>
      <button class="icr-nav-btn" style="background:var(--navy);color:white;border-color:var(--navy);" onclick="icrShowProjections()">Projections</button>
    </div>
    <table class="icr-table">
      <thead><tr>
        <th></th>${dayNames.map((n,i)=>'<th>'+n+'<br><span style="font-weight:400;font-size:9px;color:var(--gray-300);">'+weekDates[i].substring(5)+'</span></th>').join('')}
        <th class="icr-spacer"></th><th>WTD</th><th class="icr-spacer"></th><th>MTD</th><th class="icr-spacer"></th><th>YTD</th>
      </tr></thead>
      <tbody>
        ${companyBlock('TOTALS',null,true)}
        ${(()=>{
          // Vinagro outbound block
          const vDaily = weekDates.map(dt=>{const d=byDate[dt];return d?{loads:d.vinagro_loads||0,tons:parseFloat(d.vinagro_tons)||0}:{loads:0,tons:0};});
          function vSum(start,end){const r={loads:0,tons:0};for(const d of allData){if(d.report_date<start||d.report_date>end)continue;r.loads+=d.vinagro_loads||0;r.tons+=parseFloat(d.vinagro_tons)||0;}return r;}
          const vWtd=vSum(icrWeekStart,weekEnd),vMtd=vSum(monthStart,monthEnd),vYtd=vSum(yearStart,ytdEnd);
          function vRow(lbl,dFn,w,m,y){return '<tr><td>'+lbl+'</td>'+vDaily.map(d=>'<td>'+dFn(d)+'</td>').join('')+'<td class="icr-spacer"></td><td class="icr-agg">'+w+'</td><td class="icr-spacer"></td><td class="icr-agg">'+m+'</td><td class="icr-spacer"></td><td class="icr-agg">'+y+'</td></tr>';}

          // Total inbound = ALL inbound (rolloff + walk-in + pile)
          function totalInboundSum(start,end){let tons=0;for(const d of allData){if(d.report_date<start||d.report_date>end)continue;tons+=parseFloat(d.total_inbound_tons)||0;}return tons;}
          const tiWtd=totalInboundSum(icrWeekStart,weekEnd),tiMtd=totalInboundSum(monthStart,monthEnd),tiYtd=totalInboundSum(yearStart,ytdEnd);
          const iDaily=weekDates.map(dt=>{const d=byDate[dt];return d?{tons:parseFloat(d.total_inbound_tons)||0}:{tons:0};});

          return '<tr class="icr-company-hdr"><td>VINAGRO (OUTBOUND)</td>'+'<td></td>'.repeat(12)+'</tr>'+
            vRow('Loads',d=>d.loads>0?d.loads:'--',vWtd.loads||'--',vMtd.loads||'--',vYtd.loads||'--')+
            vRow('Total Tons',d=>d.tons>0?f2(d.tons):'--',f2(vWtd.tons),f2(vMtd.tons),f2(vYtd.tons))+
            '<tr class="icr-sep"><td></td>'+'<td></td>'.repeat(12)+'</tr>'+
            '<tr class="icr-total-hdr"><td>TOTAL TONNAGE INBOUND V OUTBOUND</td>'+'<td></td>'.repeat(12)+'</tr>'+
            '<tr><td style="font-weight:600">Total Inbound (all sources incl. walk-ins)</td>'+iDaily.map(d=>'<td>'+(d.tons>0?f2(d.tons):'--')+'</td>').join('')+'<td class="icr-spacer"></td><td class="icr-agg">'+f2(tiWtd)+'</td><td class="icr-spacer"></td><td class="icr-agg">'+f2(tiMtd)+'</td><td class="icr-spacer"></td><td class="icr-agg">'+f2(tiYtd)+'</td></tr>'+
            '<tr><td style="font-weight:600">Total Outbound</td>'+vDaily.map(d=>'<td>'+(d.tons>0?f2(d.tons):'--')+'</td>').join('')+'<td class="icr-spacer"></td><td class="icr-agg">'+f2(vWtd.tons)+'</td><td class="icr-spacer"></td><td class="icr-agg">'+f2(vMtd.tons)+'</td><td class="icr-spacer"></td><td class="icr-agg">'+f2(vYtd.tons)+'</td></tr>';
        })()}
        ${companyBlock('REIS','reis',false)}
        ${companyBlock('ISLAND','island',false)}
        ${companyBlock('SANTOS','santos',false)}
      </tbody>
    </table>`;
}

async function icrExportFile(){
  toast('Generating export...');

  const weekMonday = new Date(icrWeekStart+'T00:00:00');
  const weekDates = [];
  for(let i=0;i<6;i++){
    const d = new Date(weekMonday); d.setDate(weekMonday.getDate()+i);
    weekDates.push(d.toISOString().split('T')[0]);
  }

  const [reportsRes, manualData] = await Promise.all([
    db.from('irr_reports').select('*').in('report_date', weekDates),
    crcFetchManual(icrWeekStart)
  ]);
  const rowsRaw = reportsRes.data || [];

  await irrLoadRates();
  for(const d of rowsRaw){
    const {ir, er} = irrRatesFor(d.report_date);
    if(ir && !(parseFloat(d.island_revenue)>0) && (d.island_tickets||0)>0)
      d.island_revenue=(ir.hook_fee*d.island_tickets)+((ir.per_ton*(1+(ir.ton_markup||0)))*parseFloat(d.island_tons||0));
    if(er && !(parseFloat(d.santos_revenue)>0) && (d.santos_tickets||0)>0)
      d.santos_revenue=(er.hook_fee*d.santos_tickets)+((er.per_ton*(1+(er.ton_markup||0)))*parseFloat(d.santos_tons||0));
  }

  const byDate = {};
  for(const r of rowsRaw) byDate[r.report_date] = r;

  const daily = weekDates.map(d => {
    const r = byDate[d];
    if(!r) return {rev:0,loads:0,tons:0,inbound:0,outbound:0,hasData:false};
    const rev = (parseFloat(r.reis_tip_revenue)||0)+(parseFloat(r.reis_svc_revenue)||0)
              + (parseFloat(r.island_revenue)||0)+(parseFloat(r.santos_revenue)||0);
    const loads = (r.reis_tickets||0)+(r.island_tickets||0)+(r.santos_tickets||0);
    const tons = (parseFloat(r.reis_tons)||0)+(parseFloat(r.island_tons)||0)+(parseFloat(r.santos_tons)||0);
    const inbound = parseFloat(r.total_inbound_tons)||0;
    const outbound = parseFloat(r.vinagro_tons)||0;
    return {rev, loads, tons, inbound, outbound, hasData:true};
  });

  const totRev = daily.reduce((s,d)=>s+d.rev,0);
  const totLoads = daily.reduce((s,d)=>s+d.loads,0);
  const totTons = daily.reduce((s,d)=>s+d.tons,0);
  const totInbound = daily.reduce((s,d)=>s+d.inbound,0);
  const totOutbound = daily.reduce((s,d)=>s+d.outbound,0);
  const daysWithData = daily.filter(d=>d.hasData).length;

  const manual = manualData || {};
  const man = (field, idx) => (manual[field]||{})[idx];

  function totHrs(idx){
    const ov = parseFloat(man('totalHours',idx));
    if(!isNaN(ov)) return ov;
    const st = parseFloat(man('stHours',idx))||0;
    const ot = parseFloat(man('otHours',idx))||0;
    return (st+ot) > 0 ? (st+ot) : null;
  }
  function hrsDrv(idx){
    const ov = parseFloat(man('hrsDrvr',idx));
    if(!isNaN(ov)) return ov;
    const th = totHrs(idx);
    const drv = parseFloat(man('drivers',idx));
    if(th && drv>0) return th/drv;
    return null;
  }
  function hrsLd(idx){
    const ov = parseFloat(man('hrsLoad',idx));
    if(!isNaN(ov)) return ov;
    const th = totHrs(idx);
    if(th && daily[idx].loads>0) return th/daily[idx].loads;
    return null;
  }

  let sumDrv=0, nDrv=0, sumST=0, sumOT=0, sumTH=0;
  for(let i=0;i<6;i++){
    const drv = parseFloat(man('drivers',i));
    const st = parseFloat(man('stHours',i));
    const ot = parseFloat(man('otHours',i));
    const th = totHrs(i);
    if(!isNaN(drv)){sumDrv+=drv; nDrv++;}
    if(!isNaN(st)) sumST+=st;
    if(!isNaN(ot)) sumOT+=ot;
    if(th!==null) sumTH+=th;
  }

  const fM = n => '$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  const fmt2 = n => (n===null||n===undefined||isNaN(n))?'':n.toFixed(2);

  const dayHeaders = ['Mon','Tues','Wed','Thur','Fri','Sat'];
  const weekLabel = weekMonday.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  const fileLabel = String(weekMonday.getMonth()+1).padStart(2,'0')+'-'+String(weekMonday.getDate()).padStart(2,'0')+'-'+String(weekMonday.getFullYear()).slice(2);

  const cellBase = 'padding:5px 8px;border:1px solid #ccc;font-family:Arial,Helvetica,sans-serif;font-size:11px;';
  const labelStyle = cellBase+'text-align:left;font-weight:600;background:#fafafa;';
  const numCell = (val) => `<td style="${cellBase}text-align:right;">${val}</td>`;
  const totCell = (val) => `<td style="${cellBase}text-align:right;font-weight:700;background:#f5f5f5;">${val}</td>`;

  function sdCell(diff, isTotal){
    let display='', color='';
    if(diff > 0.005) { color='#c00'; display=diff.toFixed(2)+' (Deficit)'; }
    else if(diff < -0.005) { color='#0a7c2a'; display=diff.toFixed(2)+' (Surplus)'; }
    else { color='#666'; display='0.00'; }
    const bg = isTotal ? 'background:#f5f5f5;' : '';
    return `<td style="${cellBase}text-align:right;color:${color};font-weight:${isTotal?'700':'600'};${bg}">${display}</td>`;
  }

  const dateCells = weekDates.map(d=>{
    const dt = new Date(d+'T00:00:00');
    return numCell(String(dt.getMonth()+1).padStart(2,'0')+'/'+String(dt.getDate()).padStart(2,'0')+'/'+String(dt.getFullYear()).slice(2));
  }).join('');

  const rowHTML = (label, dailyVals, totalVal) =>
    `<tr><td style="${labelStyle}">${label}</td>${dailyVals.map(v=>numCell(v)).join('')}${totCell(totalVal)}</tr>`;
  const blankRow = `<tr><td colspan="8" style="border:none;height:8px;background:#fff;"></td></tr>`;

  const sdDaily = daily.map(d=> d.hasData ? sdCell(d.inbound - d.outbound, false) : `<td style="${cellBase}"></td>`).join('');
  const sdTotalCell = sdCell(totInbound - totOutbound, true);

  const tableBody = `
    <tr><td style="${labelStyle}">Date</td>${dateCells}${totCell('Total')}</tr>
    ${rowHTML('Revenue', daily.map(d=>d.rev>0?fM(d.rev):''), fM(totRev))}
    ${rowHTML('Loads', daily.map(d=>d.loads>0?d.loads:''), totLoads||'')}
    ${rowHTML('Tons', daily.map(d=>d.tons>0?d.tons.toFixed(2):''), totTons.toFixed(2))}
    ${rowHTML('Loads/Day', daily.map(()=>''), daysWithData>0?(totLoads/daysWithData).toFixed(1):'')}
    ${rowHTML('Rev/Load', daily.map(d=>d.loads>0?fM(d.rev/d.loads):''), totLoads>0?fM(totRev/totLoads):'')}
    ${rowHTML('Tons/Load', daily.map(d=>d.loads>0?(d.tons/d.loads).toFixed(2):''), totLoads>0?(totTons/totLoads).toFixed(2):'')}
    ${blankRow}
    ${rowHTML('# of drvrs', [0,1,2,3,4,5].map(i=>{const v=parseFloat(man('drivers',i));return isNaN(v)?'':v;}), nDrv>0?sumDrv:'')}
    ${rowHTML('ST Hrs', [0,1,2,3,4,5].map(i=>{const v=parseFloat(man('stHours',i));return isNaN(v)?'':v;}), sumST>0?sumST.toFixed(2):'')}
    ${rowHTML('OT Hrs', [0,1,2,3,4,5].map(i=>{const v=parseFloat(man('otHours',i));return isNaN(v)?'':v;}), sumOT>0?sumOT.toFixed(2):'')}
    ${rowHTML('Total Hrs', [0,1,2,3,4,5].map(i=>fmt2(totHrs(i))), sumTH>0?sumTH.toFixed(2):'')}
    ${rowHTML('Hrs/Drvr', [0,1,2,3,4,5].map(i=>fmt2(hrsDrv(i))), (sumDrv>0&&sumTH>0)?(sumTH/sumDrv).toFixed(2):'')}
    ${rowHTML('Hrs/Load', [0,1,2,3,4,5].map(i=>fmt2(hrsLd(i))), (totLoads>0&&sumTH>0)?(sumTH/totLoads).toFixed(2):'')}
    ${blankRow}
    ${rowHTML('Inbound C&D Tonnage (Rolloffs + Walk-Ins)', daily.map(d=>d.inbound>0?d.inbound.toFixed(2):''), totInbound.toFixed(2))}
    ${rowHTML('Outbound C&D Tonnage (Vinagro)', daily.map(d=>d.outbound>0?d.outbound.toFixed(2):''), totOutbound.toFixed(2))}
    <tr><td style="${labelStyle}">Surplus / Deficit</td>${sdDaily}${sdTotalCell}</tr>
  `;

  const headerStyle = 'padding:6px 8px;border:1px solid #999;background:#e8e8e8;font-family:Arial,Helvetica,sans-serif;font-size:11px;font-weight:700;';
  const tableHtml = `
    <div style="font-family:Arial,Helvetica,sans-serif;padding:20px;background:#fff;color:#000;">
      <h2 style="font-size:18px;margin:0 0 4px 0;color:#000;">Consolidated Rolloff Report</h2>
      <div style="font-size:12px;color:#666;margin-bottom:14px;">Week of ${weekLabel}</div>
      <table style="border-collapse:collapse;width:100%;border:1px solid #999;">
        <thead>
          <tr>
            <th style="${headerStyle}text-align:left;">Day</th>
            ${dayHeaders.map(n=>`<th style="${headerStyle}text-align:right;">${n}</th>`).join('')}
            <th style="${headerStyle}text-align:right;">Total</th>
          </tr>
        </thead>
        <tbody>${tableBody}</tbody>
      </table>
    </div>
  `;

  // ── EXCEL ──
  const xlsHtml = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="UTF-8"><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet><x:Name>Consolidated Rolloff</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]--></head><body>'+tableHtml+'</body></html>';
  const xlsBlob = new Blob(['\ufeff', xlsHtml], {type:'application/vnd.ms-excel'});
  const xlsLink = document.createElement('a');
  xlsLink.href = URL.createObjectURL(xlsBlob);
  xlsLink.download = 'Consolidated_Rolloff_Week_of_'+fileLabel+'.xls';
  document.body.appendChild(xlsLink);
  xlsLink.click();
  document.body.removeChild(xlsLink);
  setTimeout(()=>URL.revokeObjectURL(xlsLink.href), 1000);

  // ── PDF ──
  // html2canvas honors opacity/visibility, so a hidden element renders blank.
  // Render in a brief visible overlay — same pattern as irrDownloadPDF.
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(255,255,255,0.98);z-index:99998;display:flex;align-items:flex-start;justify-content:center;overflow:auto;padding:20px;';
  const inner = document.createElement('div');
  inner.style.cssText = 'background:#fff;width:1100px;max-width:100%;';
  inner.innerHTML = tableHtml;
  overlay.appendChild(inner);
  document.body.appendChild(overlay);
  await new Promise(r => setTimeout(r, 80));

  const pdfOptions = {
    margin: [10,10,10,10],
    filename: 'Consolidated_Rolloff_Week_of_'+fileLabel+'.pdf',
    image: {type:'jpeg',quality:0.98},
    html2canvas: {scale:2, useCORS:true},
    jsPDF: {unit:'mm', format:'letter', orientation:'landscape'},
  };

  try {
    await html2pdf().set(pdfOptions).from(inner).save();
    toast('Export complete: PDF + Excel downloaded', true);
  } catch(err) {
    console.error('PDF export error:', err);
    toast('PDF export failed (Excel still saved): '+err.message);
  } finally {
    document.body.removeChild(overlay);
  }
}

// ── CONSOLIDATED ROLLOFF REPORT ──────────────────────────────────────

let crcWeekStart = null;
let crcManualCache = {}; // {weekStart: {field: {idx: value}}}
let crcSaveTimer = null;

function crcGetMonday(d) {
  const dt = new Date(d);
  const day = dt.getDay();
  const diff = dt.getDate() - day + (day===0?-6:1);
  dt.setDate(diff);
  return dt.toISOString().split('T')[0];
}

async function crcFetchManual(weekStart){
  const {data, error} = await db.from('crc_weekly_manual')
    .select('data').eq('week_start', weekStart).maybeSingle();
  if(error) { console.error('CRC fetch error:', error); return {}; }
  return (data && data.data) || {};
}

function crcDebouncedSave(weekStart){
  clearTimeout(crcSaveTimer);
  crcSaveTimer = setTimeout(async () => {
    const payload = crcManualCache[weekStart] || {};
    const {error} = await db.from('crc_weekly_manual').upsert(
      {week_start: weekStart, data: payload},
      {onConflict: 'week_start'}
    );
    if(error) { console.error('CRC save error:', error); toast('Save failed: '+error.message); }
  }, 600);
}

async function crcLoadReport() {
  if(!crcWeekStart) crcWeekStart = crcGetMonday(new Date());
  const container = document.getElementById('irrCRCContent');
  container.innerHTML = '<div style="padding:20px;color:var(--gray-400);font-size:12px;">Loading...</div>';

  const weekMonday = new Date(crcWeekStart+'T00:00:00');
  const weekDates = [];
  for(let i=0;i<6;i++){
    const d = new Date(weekMonday); d.setDate(weekMonday.getDate()+i);
    weekDates.push(d.toISOString().split('T')[0]);
  }

  // Fetch both irr_reports and manual-data in parallel
  const [reportsRes, manualData] = await Promise.all([
    db.from('irr_reports').select('*').in('report_date', weekDates),
    crcFetchManual(crcWeekStart)
  ]);
  const {data:rows, error} = reportsRes;
  if(error){container.innerHTML='<div style="padding:20px;color:#c00;">Error: '+error.message+'</div>';return;}
  crcManualCache[crcWeekStart] = manualData;

  const byDate = {};
  for(const r of (rows||[])) byDate[r.report_date] = r;

  // Rolloff = reis + island + santos (no walk-in, no pile, no vinagro)
  const daily = weekDates.map(d => {
    const r = byDate[d];
    if(!r) return {rev:0,loads:0,tons:0,hasData:false};
    const rev = (parseFloat(r.reis_tip_revenue)||0) + (parseFloat(r.reis_svc_revenue)||0)
              + (parseFloat(r.island_revenue)||0) + (parseFloat(r.santos_revenue)||0);
    const loads = (r.reis_tickets||0) + (r.island_tickets||0) + (r.santos_tickets||0);
    const tons = (parseFloat(r.reis_tons)||0) + (parseFloat(r.island_tons)||0) + (parseFloat(r.santos_tons)||0);
    return {rev, loads, tons, hasData:true};
  });

  const totRev = daily.reduce((s,d)=>s+d.rev,0);
  const totLoads = daily.reduce((s,d)=>s+d.loads,0);
  const totTons = daily.reduce((s,d)=>s+d.tons,0);
  const daysWithData = daily.filter(d=>d.hasData).length;

  const manual = crcManualCache[crcWeekStart] || {};
  const man = (field, idx) => {
    if(!manual[field]) return '';
    return manual[field][idx]==null ? '' : manual[field][idx];
  };

  const fM = n => n>0 ? '$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}) : '--';
  const f2 = n => n>0 ? n.toFixed(2) : '--';
  const fInt = n => n>0 ? n.toLocaleString('en-US') : '--';

  const dayHeaders = ['Mon','Tue','Wed','Thu','Fri','Sat'];
  const weekLabel = weekMonday.toLocaleDateString('en-US',{month:'short',day:'numeric'})+
    ' \u2013 '+(new Date(weekMonday.getTime()+5*86400000)).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

  // Build manual input cell — editable, saves to localStorage, auto-updates derived rows
  const manCell = (field, idx) => {
    const val = man(field, idx);
    return `<input type="text" class="crc-input" value="${val}" data-field="${field}" data-idx="${idx}" oninput="crcOnManualInput(this)" />`;
  };

  // Derived rows (auto-calc from manual + auto rows). All have manual-override fallback.
  function totalHrsForDay(idx){
    const override = parseFloat(man('totalHours', idx));
    if(!isNaN(override)) return override;
    const st = parseFloat(man('stHours', idx)) || 0;
    const ot = parseFloat(man('otHours', idx)) || 0;
    const sum = st + ot;
    return sum > 0 ? sum : null;
  }
  function hrsPerDriver(idx){
    const override = parseFloat(man('hrsDrvr', idx));
    if(!isNaN(override)) return override;
    const th = totalHrsForDay(idx);
    const drv = parseFloat(man('drivers', idx));
    if(th && drv>0) return th/drv;
    return null;
  }
  function hrsPerLoad(idx){
    const override = parseFloat(man('hrsLoad', idx));
    if(!isNaN(override)) return override;
    const th = totalHrsForDay(idx);
    const lds = daily[idx].loads;
    if(th && lds>0) return th/lds;
    return null;
  }

  // Build table
  let html = `
    <div class="icr-controls">
      <h3 style="font-size:14px;font-weight:600;color:var(--navy);margin:0;">Consolidated Rolloff \u2014 Reis + Island + East End</h3>
      <button class="icr-nav-btn" onclick="crcChangeWeek(-1)" style="cursor:pointer;">\u2190</button>
      <input type="date" value="${crcWeekStart}" onchange="crcJumpToWeek(this.value)" style="padding:5px 8px;border:1px solid var(--gray-300);border-radius:4px;font-size:12px;"/>
      <button class="icr-nav-btn" onclick="crcChangeWeek(1)" style="cursor:pointer;">\u2192</button>
      <span style="font-size:12px;color:var(--gray-600);margin-left:6px;">${weekLabel}</span>
      <span style="flex:1;"></span>
      <button class="irr-btn irr-btn-secondary" onclick="crcExport()" style="cursor:pointer;">Export to Excel</button>
    </div>
    <table class="icr-table" id="crcTable">
      <thead><tr>
        <th>Day</th>
        ${dayHeaders.map((n,i)=>'<th>'+n+'<br><span style="font-weight:400;font-size:9px;color:var(--gray-300);">'+weekDates[i].substring(5)+'</span></th>').join('')}
        <th class="icr-spacer"></th><th>Total</th>
      </tr></thead>
      <tbody>
        <tr><td>Date</td>${weekDates.map(d=>'<td>'+d.substring(5)+'</td>').join('')}<td class="icr-spacer"></td><td class="icr-agg">\u2014</td></tr>
        <tr><td>Revenue</td>${daily.map(d=>'<td>'+fM(d.rev)+'</td>').join('')}<td class="icr-spacer"></td><td class="icr-agg">${fM(totRev)}</td></tr>
        <tr><td>Loads</td>${daily.map(d=>'<td>'+fInt(d.loads)+'</td>').join('')}<td class="icr-spacer"></td><td class="icr-agg">${fInt(totLoads)}</td></tr>
        <tr><td>Tons</td>${daily.map(d=>'<td>'+f2(d.tons)+'</td>').join('')}<td class="icr-spacer"></td><td class="icr-agg">${f2(totTons)}</td></tr>
        <tr><td>Loads/Day</td>${daily.map(d=>'<td>'+fInt(d.loads)+'</td>').join('')}<td class="icr-spacer"></td><td class="icr-agg">${daysWithData>0?(totLoads/daysWithData).toFixed(1):'--'}</td></tr>
        <tr><td>Rev/Load</td>${daily.map(d=>'<td>'+(d.loads>0?fM(d.rev/d.loads):'--')+'</td>').join('')}<td class="icr-spacer"></td><td class="icr-agg">${totLoads>0?fM(totRev/totLoads):'--'}</td></tr>
        <tr><td>Tons/Load</td>${daily.map(d=>'<td>'+(d.loads>0?f2(d.tons/d.loads):'--')+'</td>').join('')}<td class="icr-spacer"></td><td class="icr-agg">${totLoads>0?f2(totTons/totLoads):'--'}</td></tr>
        <tr class="crc-manual"><td># of Drivers</td>${[0,1,2,3,4,5].map(i=>'<td>'+manCell('drivers',i)+'</td>').join('')}<td class="icr-spacer"></td><td class="icr-agg" id="crc-tot-drivers"></td></tr>
        <tr class="crc-manual"><td>ST Hours</td>${[0,1,2,3,4,5].map(i=>'<td>'+manCell('stHours',i)+'</td>').join('')}<td class="icr-spacer"></td><td class="icr-agg" id="crc-tot-st"></td></tr>
        <tr class="crc-manual"><td>OT Hours</td>${[0,1,2,3,4,5].map(i=>'<td>'+manCell('otHours',i)+'</td>').join('')}<td class="icr-spacer"></td><td class="icr-agg" id="crc-tot-ot"></td></tr>
        <tr class="crc-derived"><td>Total Hours</td>${[0,1,2,3,4,5].map(i=>'<td id="crc-th-'+i+'"></td>').join('')}<td class="icr-spacer"></td><td class="icr-agg" id="crc-tot-th"></td></tr>
        <tr class="crc-derived"><td>Hrs/Drvr</td>${[0,1,2,3,4,5].map(i=>'<td id="crc-hd-'+i+'"></td>').join('')}<td class="icr-spacer"></td><td class="icr-agg" id="crc-tot-hd"></td></tr>
        <tr class="crc-derived"><td>Hrs/Load</td>${[0,1,2,3,4,5].map(i=>'<td id="crc-hl-'+i+'"></td>').join('')}<td class="icr-spacer"></td><td class="icr-agg" id="crc-tot-hl"></td></tr>
