<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HELM — Reis Trucking</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --navy:       #0f1f3d;
  --navy-mid:   #1a2f52;
  --navy-light: #243a63;
  --teal:       #1a9b8a;
  --teal-dim:   #147a6d;
  --teal-pale:  #e6f5f3;
  --gold:       #d4a843;
  --gold-pale:  #fdf6e3;
  --white:      #ffffff;
  --gray-50:    #f7f8fa;
  --gray-100:   #eef0f4;
  --gray-200:   #dde1ea;
  --gray-300:   #c8cdd8;
  --gray-400:   #9aa3b5;
  --gray-500:   #6b7385;
  --gray-600:   #4a5168;
  --gray-800:   #1e2435;
  --warn-bg:    #fff8e6;
  --warn-text:  #8a6200;
  --warn-border:#f0c040;
  --ok-bg:      #e8f5f0;
  --ok-text:    #156b4f;
  --err-bg:     #fdecea;
  --err-text:   #b92b2b;
  --radius:     10px;
  --radius-sm:  6px;
  --radius-lg:  14px;
  --shadow:     0 1px 3px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:  0 4px 16px rgba(0,0,0,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--gray-50);color:var(--gray-800);min-height:100vh;font-size:13px;-webkit-font-smoothing:antialiased;}

/* ── LOGIN ───────────────────────────────── */
#loginScreen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--navy);
  background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,255,255,0.03) 39px,rgba(255,255,255,0.03) 40px),
                   repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(255,255,255,0.03) 39px,rgba(255,255,255,0.03) 40px);
}
.login-box{
  background:white;border-radius:var(--radius-lg);
  padding:2.75rem 2.25rem;width:100%;max-width:380px;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
}
.login-brand{display:flex;align-items:center;gap:12px;margin-bottom:2rem;}
.login-icon{
  width:52px;height:52px;border-radius:12px;
  background:var(--navy);display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.login-icon svg{width:26px;height:26px;}
.login-brand-text{}
.helm-title{font-size:26px;font-weight:600;color:var(--navy);letter-spacing:-.02em;line-height:1;}
.helm-sub{font-size:12px;color:var(--gray-400);margin-top:3px;letter-spacing:.04em;text-transform:uppercase;}
.login-box label{display:block;font-size:12px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.login-box input[type=text],.login-box input[type=password]{
  width:100%;padding:11px 14px;
  border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;font-size:15px;color:var(--gray-800);
  background:var(--gray-50);margin-bottom:14px;outline:none;transition:border-color .15s,background .15s;
}
.login-box input[type=text]:focus,.login-box input[type=password]:focus{border-color:var(--teal);background:white;}
.btn-signin{
  width:100%;padding:12px;background:var(--navy);color:white;
  border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;
  font-size:15px;font-weight:600;cursor:pointer;transition:background .15s;letter-spacing:.01em;
}
.btn-signin:hover{background:var(--navy-light);}
.login-err{color:var(--err-text);font-size:13px;margin-top:10px;text-align:center;}
.login-footer{margin-top:1.75rem;padding-top:1.25rem;border-top:1px solid var(--gray-100);text-align:center;font-size:12px;color:var(--gray-400);}

/* ── APP SHELL ───────────────────────────── */
#appScreen{display:none;min-height:100vh;flex-direction:column;}

.topbar{
  background:var(--navy);height:44px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1rem;position:sticky;top:0;z-index:100;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-icon{width:28px;height:28px;border-radius:6px;background:var(--navy-light);display:flex;align-items:center;justify-content:center;}
.topbar-icon svg{width:15px;height:15px;}
.topbar-name{font-size:15px;font-weight:600;color:white;letter-spacing:-.01em;}
.topbar-company{font-size:10px;color:rgba(255,255,255,0.4);margin-top:1px;letter-spacing:.03em;text-transform:uppercase;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:#2dc653;box-shadow:0 0 0 2px rgba(45,198,83,0.25);}
.live-label{font-size:11px;color:rgba(255,255,255,0.45);}
.btn-logout{
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.6);font-size:12px;padding:4px 10px;
  border-radius:var(--radius-sm);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;
}
.btn-logout:hover{background:rgba(255,255,255,0.15);color:white;}

/* ── STICKY NOTES ───────────────────────────────────────── */
.btn-sticky{
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);
  color:rgba(255,255,255,0.38);font-size:11px;padding:4px 10px;margin-left:22px;
  border-radius:var(--radius-sm);cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all .15s;letter-spacing:.02em;
}
.btn-sticky:hover{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.65);}
.btn-sticky.s-open{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);}
.sticky-panel{
  position:fixed;top:50px;width:400px;
  background:#1b2233;border:1px solid rgba(255,255,255,0.11);
  border-radius:8px;box-shadow:0 10px 36px rgba(0,0,0,0.45);
  z-index:9999;display:none;overflow:hidden;
}
.sticky-panel.s-open{display:block;}
.sticky-drag-handle{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 10px 5px;border-bottom:1px solid rgba(255,255,255,0.07);
  cursor:grab;user-select:none;
}
.sticky-drag-handle:active{cursor:grabbing;}
.sticky-drag-title{
  font-size:10px;font-weight:600;color:rgba(255,255,255,0.35);
  letter-spacing:.07em;text-transform:uppercase;
}
.sticky-drag-dots{
  font-size:13px;color:rgba(255,255,255,0.18);letter-spacing:1px;line-height:1;
}
.sticky-close{
  background:none;border:none;color:rgba(255,255,255,0.25);
  font-size:16px;cursor:pointer;padding:0 2px;line-height:1;
  font-family:'DM Sans',sans-serif;
}
.sticky-close:hover{color:rgba(255,255,255,0.6);}
.sticky-sec-hdr{
  padding:4px 10px 3px;border-bottom:1px solid rgba(255,255,255,0.07);
  font-size:9px;font-weight:600;color:rgba(255,255,255,0.3);
  letter-spacing:.07em;text-transform:uppercase;
}
.sticky-compose{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,0.07);}
.sticky-compose input,.sticky-compose textarea{
  width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);
  color:rgba(255,255,255,0.85);font-family:'DM Sans',sans-serif;font-size:12px;
  padding:5px 8px;border-radius:4px;box-sizing:border-box;outline:none;
}
.sticky-compose input{margin-bottom:5px;}
.sticky-compose input::placeholder,.sticky-compose textarea::placeholder{color:rgba(255,255,255,0.25);}
.sticky-compose textarea{resize:vertical;min-height:160px;line-height:1.5;}
.sticky-compose input:focus,.sticky-compose textarea:focus{border-color:rgba(255,255,255,0.22);}
.sticky-actions{display:flex;gap:6px;margin-top:6px;justify-content:flex-end;}
.s-btn-cancel{
  background:none;border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.35);
  font-size:11px;padding:3px 10px;border-radius:4px;cursor:pointer;font-family:'DM Sans',sans-serif;
}
.s-btn-cancel:hover{color:rgba(255,255,255,0.6);}
.s-btn-save{
  background:var(--teal);border:none;color:white;font-size:11px;
  padding:3px 13px;border-radius:4px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;
}
.s-btn-save:hover{filter:brightness(1.1);}
.sticky-list{max-height:220px;overflow-y:auto;}
.sticky-list::-webkit-scrollbar{width:4px;}
.sticky-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}
.sticky-item{
  padding:9px 32px 9px 12px;border-bottom:1px solid rgba(255,255,255,0.05);
  cursor:pointer;transition:background .1s;position:relative;
}
.sticky-item:hover{background:rgba(255,255,255,0.04);}
.sticky-item.s-expanded{background:rgba(255,255,255,0.05);}
.sticky-item-title{font-size:12px;font-weight:600;color:rgba(255,255,255,0.75);margin-bottom:2px;}
.sticky-item-preview{font-size:11px;color:rgba(255,255,255,0.3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sticky-item-full{font-size:12px;color:rgba(255,255,255,0.55);margin-top:5px;white-space:pre-wrap;word-break:break-word;line-height:1.5;}
.sticky-item-date{font-size:10px;color:rgba(255,255,255,0.2);margin-top:4px;}
.sticky-del{
  position:absolute;right:8px;top:9px;background:none;border:none;
  color:rgba(255,255,255,0.2);cursor:pointer;font-size:15px;padding:0 3px;line-height:1;
}
.sticky-del:hover{color:rgba(255,100,100,0.65);}
.sticky-empty{padding:22px;text-align:center;color:rgba(255,255,255,0.2);font-size:12px;}

.tab-nav{
  background:white;border-bottom:1px solid var(--gray-200);
  display:flex;padding:0 1rem;gap:0;overflow-x:auto;
}
.tab-nav::-webkit-scrollbar{display:none;}
.tab-nav button{
  background:none;border:none;font-family:'DM Sans',sans-serif;
  font-size:12px;font-weight:500;color:var(--gray-400);
  padding:9px 12px;cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  white-space:nowrap;transition:color .15s,border-color .15s;letter-spacing:.01em;
}
.tab-nav button.active{color:var(--navy);border-bottom-color:var(--teal);font-weight:600;}
.tab-nav button:hover:not(.active){color:var(--gray-600);}

.main{padding:0.75rem;max-width:1060px;margin:0 auto;width:100%;}

/* ── SEARCH ─────────────────────────────── */
.search-wrap{position:relative;margin-bottom:0.75rem;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--gray-400);pointer-events:none;}
.search-wrap input{
  width:100%;padding:9px 12px 9px 36px;
  border:1.5px solid var(--gray-200);border-radius:var(--radius);
  font-family:'DM Sans',sans-serif;font-size:13px;color:var(--gray-800);
  background:white;box-shadow:var(--shadow);outline:none;transition:border-color .15s,box-shadow .15s;
}
.search-wrap input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(26,155,138,0.1);}
.search-wrap input::placeholder{color:var(--gray-300);}
.search-hint{font-size:11px;color:var(--gray-400);margin-top:4px;margin-left:2px;}

/* ── RESULTS LIST ────────────────────────── */
.results-list{margin-bottom:0.75rem;}
.result-item{
  background:white;border:1px solid var(--gray-200);border-radius:var(--radius-sm);
  padding:8px 12px;margin-bottom:4px;cursor:pointer;
  display:flex;justify-content:space-between;align-items:center;
  box-shadow:var(--shadow);transition:border-color .15s,transform .1s,box-shadow .15s;
}
.result-item:hover,.result-item:focus{border-color:var(--teal);transform:translateY(-1px);box-shadow:var(--shadow-md);outline:none;}
.result-id{font-family:'DM Mono',monospace;font-size:11px;color:var(--gray-400);margin-bottom:2px;}
.result-addr{font-size:13px;font-weight:500;color:var(--gray-800);}
.result-day{font-size:11px;font-weight:600;color:var(--teal);background:var(--teal-pale);padding:2px 7px;border-radius:20px;}

/* ── CLIENT CARD ─────────────────────────── */
.client-card{background:white;border:1px solid var(--gray-200);border-radius:var(--radius);box-shadow:var(--shadow-md);overflow:hidden;}
.card-header{background:var(--navy);padding:0.75rem 1rem;display:flex;align-items:center;gap:10px;}
.avatar{
  width:36px;height:36px;border-radius:8px;
  background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.15);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;color:white;flex-shrink:0;letter-spacing:.02em;
}
.card-header-meta h2{font-size:14px;font-weight:600;color:white;letter-spacing:-.01em;}
.card-header-meta p{font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px;}
.card-body{padding:0.75rem 1rem;}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:0.75rem;}
.info-tile{background:var(--gray-50);border:1px solid var(--gray-100);border-radius:var(--radius-sm);padding:6px 10px;}
.info-tile label{font-size:9px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:3px;}
.day-pill{display:inline-block;background:var(--teal-pale);color:var(--teal-dim);font-size:12px;font-weight:600;padding:2px 8px;border-radius:20px;}
.status-pill{display:inline-block;font-size:12px;font-weight:600;padding:2px 8px;border-radius:20px;}
.s-active{background:var(--ok-bg);color:var(--ok-text);}
.s-skipped{background:var(--warn-bg);color:var(--warn-text);}
.s-paused{background:var(--err-bg);color:var(--err-text);}
.autopay-yes{background:var(--ok-bg);color:var(--ok-text);}
.autopay-no{background:var(--gray-100);color:var(--gray-400);}

.section-title{font-size:10px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.08em;margin-bottom:0.5rem;}
.divider{border:none;border-top:1px solid var(--gray-100);margin:0.5rem 0;}

/* ── ADD CLIENT ──────────────────────────── */
.form-card{background:white;border:1px solid var(--gray-200);border-radius:var(--radius);padding:1rem;box-shadow:var(--shadow);}
.form-card h2{font-size:15px;font-weight:600;color:var(--navy);margin-bottom:1rem;}
.form-group{margin-bottom:0.75rem;}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--gray-500);letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px;}
.form-group input,.form-group select{
  width:100%;padding:7px 10px;
  border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;font-size:13px;color:var(--gray-800);
  background:var(--gray-50);outline:none;transition:border-color .15s,background .15s;
}
.form-group input:focus,.form-group select:focus{border-color:var(--teal);background:white;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-add{
  background:var(--teal);color:white;border:none;border-radius:var(--radius-sm);
  padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;transition:background .15s;
}
.btn-add:hover{background:var(--teal-dim);}
.day-toggle-grid{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.day-toggle{
  flex:1;min-width:70px;padding:8px 6px;
  border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);
  background:white;cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:2px;
}
.day-toggle:hover{border-color:var(--teal);background:var(--teal-pale);}
.day-toggle-active{background:var(--teal)!important;border-color:var(--teal)!important;}
.day-toggle-active .day-abbr,.day-toggle-active .day-full{color:white!important;}
.day-abbr{font-size:13px;font-weight:700;color:var(--navy);}
.day-full{font-size:10px;color:var(--gray-400);}

/* ── IMPORT ──────────────────────────────── */
.import-zone{
  border:2px dashed var(--gray-200);border-radius:var(--radius);
  padding:2rem 1.5rem;text-align:center;cursor:pointer;
  transition:border-color .2s,background .2s;background:white;
}
.import-zone:hover{border-color:var(--teal);background:var(--teal-pale);}
.import-zone-icon{width:36px;height:36px;margin:0 auto 0.75rem;color:var(--gray-300);}
.import-zone h3{font-size:14px;font-weight:600;color:var(--gray-600);margin-bottom:4px;}
.import-zone p{font-size:12px;color:var(--gray-400);}
.import-zone span{font-size:11px;color:var(--teal);font-weight:600;margin-top:4px;display:block;}
.import-preview{background:white;border:1px solid var(--gray-200);border-radius:var(--radius-sm);padding:0.75rem;margin-top:0.75rem;box-shadow:var(--shadow);}
.import-preview-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;}
.import-preview h3{font-size:13px;font-weight:600;color:var(--navy);}
.preview-row{font-size:12px;padding:5px 0;border-bottom:1px solid var(--gray-100);display:flex;gap:10px;align-items:center;}
.preview-row:last-child{border-bottom:none;}
.p-id{font-family:'DM Mono',monospace;color:var(--gray-400);font-size:10px;width:40px;flex-shrink:0;}
.p-addr{color:var(--gray-800);flex:1;}
.p-day{color:var(--teal);font-weight:600;font-size:11px;}

/* ── TOAST ───────────────────────────────── */
.toast{
  position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--navy);color:white;padding:8px 18px;
  border-radius:var(--radius-sm);font-size:13px;font-weight:500;
  box-shadow:var(--shadow-md);opacity:0;pointer-events:none;
  transition:opacity .2s,transform .2s;z-index:9999;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{background:var(--teal);}

/* ── MISC ────────────────────────────────── */
.empty-state{text-align:center;padding:2rem 1rem;color:var(--gray-400);font-size:13px;}
.loading{text-align:center;padding:1.5rem;color:var(--gray-400);font-size:13px;}
/* ── FLOATING CLIENT PANEL ───────────────── */
.client-panel{
  position:fixed;right:0;top:44px;width:420px;height:calc(100vh - 44px);
  background:white;border-left:1px solid var(--gray-200);
  box-shadow:-4px 0 20px rgba(0,0,0,0.08);
  z-index:90;overflow-y:auto;display:none;
  transition:transform .2s ease;
}
.client-panel.open{display:block;}
.panel-close{
  position:absolute;top:8px;right:8px;background:none;border:none;
  font-size:18px;color:var(--gray-400);cursor:pointer;z-index:2;
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  border-radius:4px;transition:all .15s;
}
.panel-close:hover{background:var(--gray-100);color:var(--err-text);}

/* ── NOTES ───────────────────────────────── */
.notes-section{margin-top:0.5rem;}
.note-form{display:flex;gap:4px;align-items:end;flex-wrap:wrap;margin-bottom:6px;}
.note-form select{
  padding:5px 6px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;font-size:11px;color:var(--gray-800);
  background:var(--gray-50);outline:none;min-width:120px;
}
.note-form input[type=date]{
  padding:5px 6px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;font-size:11px;color:var(--gray-800);
  background:var(--gray-50);outline:none;width:130px;
}
.note-form input[type=text]{
  flex:1;min-width:120px;padding:5px 6px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;font-size:11px;color:var(--gray-800);
  background:var(--gray-50);outline:none;
}
.note-form select:focus,.note-form input:focus{border-color:var(--teal);background:white;}
.note-form .btn-note-add{
  padding:5px 10px;background:var(--teal);color:white;border:none;border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;
}
.note-form .btn-note-add:hover{background:var(--teal-dim);}
.notes-list-wrap{max-height:220px;overflow-y:auto;border:1px solid var(--gray-100);border-radius:var(--radius-sm);}

<script>
// ── CONFIG ────────────────────────────────────────────────────────────

function getCompany(id){
  if(!id) return {name:'',tag:'',cls:''};
  if(id.startsWith('20')) return {name:'REIS',tag:'co-reis',cls:'co-reis'};
  if(id.startsWith('30')) return {name:'SANTOS',tag:'co-santos',cls:'co-santos'};

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function parseCSVLine(line){
  const fields=[];
  let field='', inQuotes=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(inQuotes){
      if(ch==='"'&&line[i+1]==='"'){field+='"';i++;}
      else if(ch==='"'){inQuotes=false;}
      else{field+=ch;}
    } else {
      if(ch==='"'){inQuotes=true;}
      else if(ch===','){fields.push(field.trim());field='';}
      else{field+=ch;}
    }
  }
  fields.push(field.trim());
  return fields;
}

// ── STICKY NOTES ──────────────────────────────────────────────────────
let stickyOpen = false;
let stickyData = [];

function toggleStickyPanel(){
  const panel = document.getElementById('stickyPanel');
  const btn   = document.getElementById('stickyBtn');
  stickyOpen  = !stickyOpen;
  if(stickyOpen){
    const rect = btn.getBoundingClientRect();
    panel.style.left = rect.left + 'px';
    panel.classList.add('s-open');
    btn.classList.add('s-open');
    loadAndRenderStickies();
  } else {
    panel.classList.remove('s-open');
    btn.classList.remove('s-open');
  }
}

async function loadAndRenderStickies(){
  if(!currentUser) return;
  const {data,error} = await db.from('stickies')
    .select('*').eq('user_id', currentUser.display_name)
    .order('created_at',{ascending:false});
  if(!error) stickyData = data || [];
  renderStickies();
}

function renderStickies(){
  const list = document.getElementById('stickyList');
  if(!stickyData.length){ list.innerHTML='<div class="sticky-empty">No notes yet</div>'; return; }
  list.innerHTML = stickyData.map(s=>`
    <div class="sticky-item" id="sk-${s.id}" onclick="expandSticky(${s.id})">
      <button class="sticky-del" onclick="event.stopPropagation();deleteSticky(${s.id})" title="Delete">&times;</button>
      <div class="sticky-item-title">${esc(s.title||'Untitled')}</div>
      <div class="sticky-item-preview">${esc(s.content)}</div>
      <div class="sticky-item-date">${fmtStickyDate(s.created_at)}</div>
    </div>`).join('');
}

function expandSticky(id){
  const s = stickyData.find(x=>x.id===id);
  if(!s) return;
  const el = document.getElementById('sk-'+id);
  const expanded = el.classList.contains('s-expanded');
  // collapse all
  document.querySelectorAll('.sticky-item.s-expanded').forEach(e=>e.classList.remove('s-expanded'));
  renderStickies();
  if(!expanded){
    const el2 = document.getElementById('sk-'+id);
    el2.innerHTML = `
      <button class="sticky-del" onclick="event.stopPropagation();deleteSticky(${s.id})" title="Delete">&times;</button>
      <div class="sticky-item-title">${esc(s.title||'Untitled')}</div>
      <div class="sticky-item-full">${esc(s.content)}</div>
      <div class="sticky-item-date">${fmtStickyDate(s.created_at)}</div>`;
    el2.classList.add('s-expanded');
  }
}

async function saveSticky(){
  if(!currentUser) return;
  const title   = (document.getElementById('stickyTitle').value||'').trim();
  const content = (document.getElementById('stickyContent').value||'').trim();
  if(!content){ toast('Write something first'); return; }
  const {error} = await db.from('stickies').insert({
    user_id: currentUser.display_name,
    title:   title||'Untitled',
    content: content
  });
  if(error){ toast('Error: '+error.message); return; }
  cancelSticky();
  loadAndRenderStickies();
}

async function deleteSticky(id){
  const {error} = await db.from('stickies').delete().eq('id',id);
  if(error){ toast('Error: '+error.message); return; }
  stickyData = stickyData.filter(s=>s.id!==id);
  renderStickies();
}

function cancelSticky(){
  document.getElementById('stickyTitle').value   = '';
  document.getElementById('stickyContent').value = '';
}

function fmtStickyDate(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})
    +' '+d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}

// ── STICKY DRAG ───────────────────────────────────────────────────────
(function(){
  let dragging=false, ox=0, oy=0, pl=0, pt=0;
  document.addEventListener('mousedown', function(e){
    const handle = document.getElementById('stickyHandle');
    if(!handle || !handle.contains(e.target)) return;
    const panel = document.getElementById('stickyPanel');
    dragging=true;
    ox=e.clientX; oy=e.clientY;
    pl=panel.offsetLeft; pt=panel.offsetTop;
    e.preventDefault();
  });
  document.addEventListener('mousemove', function(e){
    if(!dragging) return;
    const panel = document.getElementById('stickyPanel');
    panel.style.left = (pl + e.clientX - ox) + 'px';
    panel.style.top  = (pt + e.clientY - oy) + 'px';
  });
  document.addEventListener('mouseup', function(){ dragging=false; });
})();

// ── AUTH ──────────────────────────────────────────────────────────────
async function login() {
  const un = document.getElementById('unInput').value.trim().toLowerCase();
  const pw = document.getElementById('pwInput').value;
  const errEl = document.getElementById('loginErr');
  if(!un||!pw){errEl.textContent='Enter username and password.';return;}
  const {data,error} = await db.from('users').select('*').eq('username',un).eq('password',pw).single();
  if(error||!data){errEl.textContent='Incorrect username or password.';return;}
  currentUser = data;
  sessionStorage.setItem('helm_auth', JSON.stringify(data));
  show('appScreen'); hide('loginScreen');
  document.getElementById('appScreen').style.flexDirection='column';
  document.getElementById('topbarUser').textContent = data.display_name;
  if(data.role==='admin') document.getElementById('importTabBtn').style.display='';
  init();
}
function logout() { sessionStorage.removeItem('helm_auth'); location.reload(); }

// ── INIT ──────────────────────────────────────────────────────────────
async function init() {
  selectedWeek = getTodayISO();
  renderLookup();
  await Promise.all([loadClients(), loadSkips()]);
}

function getTodayISO() {
  const d = new Date();
  d.setHours(0,0,0,0);
  return d.toISOString().split('T')[0];
}

function fmtDate(iso){
  if(!iso) return '';
  const d=new Date(iso+'T00:00:00');
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function fmtDateShort(iso){
  if(!iso) return '';
  const d=new Date(iso+'T00:00:00');
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  const y=String(d.getFullYear()).slice(2);
  return m+day+y;
}

function fmtTimestamp(ts){
  if(!ts) return '';
  const d=new Date(ts);
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  const y=String(d.getFullYear()).slice(2);
  const h=String(d.getHours()).padStart(2,'0');
  const min=String(d.getMinutes()).padStart(2,'0');
  return `${m}/${day}/${y} ${h}:${min}`;
}

// ── DATA ──────────────────────────────────────────────────────────────
async function loadClients() {
  let all=[], from=0, batch=1000;
  while(true){
    const {data,error}=await db.from('clients').select('*').order('client_id').range(from,from+batch-1);
    if(error){toast('Failed to load clients');break;}
    if(!data||data.length===0) break;
    all=[...all,...data];
    if(data.length<batch) break;
    from+=batch;
  }
  clients=all;
  const hint=document.getElementById('srchHint');
  if(hint) hint.textContent=clients.length>0
    ?`${clients.length.toLocaleString()} clients loaded — search by account #, name, address, or phone`
    :'No clients found — import clients to get started';
}

async function loadSkips() {
  const {data,error}=await db.from('skips').select('*').order('skip_week',{ascending:false});
  if(!error) skips=data||[];
}

async function loadNotes(baseId){
  // Load notes for base ID (notes are stored against base ID, not suffixed IDs)
  const {data,error}=await db.from('notes').select('*').eq('client_id',baseId).order('created_at',{ascending:false});
  if(!error) clientNotes=data||[];
  return clientNotes;
}

// ── TABS ──────────────────────────────────────────────────────────────
function switchTab(name,btn){
  ['lookup','add','report','rolloffs','import'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===name?'':'none';
  });
  document.querySelectorAll('.tab-nav button').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  // Only re-render lookup on first visit; preserve state after that
  if(name==='lookup' && !lookupRendered) renderLookup();
  if(name==='add')    renderAdd();
  if(name==='report') renderReport();
  if(name==='rolloffs') renderRolloffs();
  if(name==='import') renderImport();
}

// ── LOOKUP ────────────────────────────────────────────────────────────
function renderLookup(){
  lookupRendered = true;
  document.getElementById('tab-lookup').innerHTML=`
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="srch" placeholder="Search by client ID, name, address, or phone…" oninput="doSearch(this.value)" onkeydown="handleSearchKey(event)" autocomplete="off"/>
    </div>
    <div class="search-hint" id="srchHint">${clients.length>0?`${clients.length.toLocaleString()} clients loaded — search by account #, name, address, or phone`:'Loading clients…'}</div>
    <div id="srchResults" style="margin-top:.5rem"></div>`;
  document.getElementById('srch').focus();
}

function doSearch(q){
  q=q.trim().toLowerCase();
  const res=document.getElementById('srchResults');
  if(q.length<2){res.innerHTML='';return;}

  const results=clients
    .map(c=>{
      const idL=c.client_id.toLowerCase();
      const addrL=c.address.toLowerCase();
      const nameL=(c.client_name||'').toLowerCase();
      const phoneClean=(c.phone||'').replace(/\D/g,'');
      const qClean=q.replace(/\D/g,'');
      let score=0;
      if(idL===q) score=4;
      else if(idL.startsWith(q)) score=3;
      else if(idL.includes(q)) score=2;
      if(nameL&&nameL.includes(q)) score=Math.max(score,3);
      if(addrL.includes(q)) score=Math.max(score,1);
      if(qClean.length>=3&&phoneClean.includes(qClean)) score=Math.max(score,qClean.length>=7?4:2);
      return {c,score};
    })
    .filter(x=>x.score>0)
    .sort((a,b)=>b.score-a.score)
    .slice(0,10);

  if(!results.length){res.innerHTML='<div class="empty-state">No clients found</div>';return;}
  if(results.length===1){res.innerHTML='';openClient(results[0].c);return;}
  res.innerHTML='<div class="results-list">'+results.map(({c})=>{
    const co=getCompany(c.client_id);
    return `
    <div class="result-item" tabindex="0" data-cid="${esc(c.client_id)}" onclick="pickClient('${esc(c.client_id)}')" onkeydown="handleResultKey(event,'${esc(c.client_id)}')">
      <div>
        <div class="result-id">${c.client_name?`${esc(c.client_name)} &mdash; `:''}${esc(c.client_id)}${co.name?` <span class="company-tag ${co.cls}">${co.name}</span>`:''}</div>
        <div class="result-addr">${esc(c.address)}</div>
      </div>
      <div class="result-day">${esc(c.service_day||'')}</div>
    </div>`;
  }).join('')+'</div>';
}

function handleSearchKey(e){
  if(e.key==='Enter'){
    e.preventDefault();
    const first=document.querySelector('.result-item');
    if(first){first.click();return;}
    // If search has text but no results list, check if single match auto-opened
  }
  if(e.key==='ArrowDown'){
    e.preventDefault();
    const first=document.querySelector('.result-item');
    if(first) first.focus();
  }
}

function handleResultKey(e,cid){
  if(e.key==='Enter'){e.preventDefault();pickClient(cid);return;}
  if(e.key==='ArrowDown'){
    e.preventDefault();
    const next=e.target.nextElementSibling;
    if(next) next.focus();
  }
  if(e.key==='ArrowUp'){
    e.preventDefault();
    const prev=e.target.previousElementSibling;
    if(prev) prev.focus();
    else document.getElementById('srch').focus();
  }
}

function pickClient(id){
  const c=clients.find(x=>x.client_id===id);
  if(!c) return;
  document.getElementById('srchResults').innerHTML='';
  document.getElementById('srch').value=`${c.client_id} — ${c.address}`;
  openClient(c);
}

function openClient(c){

function toggleNoteDateField(){

function renderNotesTable(notes){

  if(!wrap) return;
  if(!notes.length){
    wrap.innerHTML='<div style="padding:8px;text-align:center;color:var(--gray-400);font-size:11px">No notes yet</div>';

  wrap.innerHTML=notes.map(n=>{

    return `<div class="note-row">

      </div>
      ${n.note?`<div class="note-row-body">${esc(n.note)}</div>`:''}

async function submitNote(baseId){
  const action=document.getElementById('noteAction').value;
  const dateIn=document.getElementById('noteActionDate');
  const textIn=document.getElementById('noteText');
  const noteText=textIn.value.trim();
  const actionType=ACTION_TYPES.find(a=>a.value===action);
  const actionDate=actionType&&actionType.needsDate?dateIn.value:null;

  if(actionType&&actionType.needsDate&&!actionDate){
    toast('Select a date for this action');return;
  }

  const {error}=await db.from('notes').insert({
    client_id:baseId,
    user_id:currentUser?currentUser.display_name:'',
    action:action,
    action_date:actionDate||null,
    note:noteText
  });
  if(error){toast('Error: '+error.message);return;}
  textIn.value='';
  dateIn.value='';
  toast('Note added',true);
  const notes=await loadNotes(baseId);
  renderNotesTable(notes);
}

async function saveClientEdit(cid){
  const name=document.getElementById('editName').value.trim();
  const addr=document.getElementById('editAddr').value.trim();
  const phone=document.getElementById('editPhone').value.trim();
  const email=document.getElementById('editEmail').value.trim();

async function deleteNote(noteId){

  if(!activeClient){toast('Error: no active client');return;}

  const {data,error}=await db.from('notes').delete().eq('id',noteId).select();
  if(error){toast('Error: '+error.message);return;}
  toast('Note deleted',true);
  const notes=await loadNotes(activeClient.client_id);
  renderNotesTable(notes);

function findClient(cid){
  return clients.find(x=>x.client_id===cid)||clients.find(x=>x.client_id===getBaseId(cid))||{};
}

function fetchReportData(notesData,skipsData,date){
  const data=[...(notesData||[])];
  if(skipsData&&skipsData.length){
    skipsData.forEach(s=>{
      const skipId=getBaseId(s.client_id); // handle legacy suffixed IDs
      const already=data.some(n=>n.client_id===skipId&&n.action==='Skip Day');
      if(!already){
        data.push({
          client_id:skipId,
          action:'Skip Day',
          action_date:date,
          note:s.inquiry_method?`via ${s.inquiry_method}`:'',
          logged_by:s.logged_by||'',
          created_at:s.created_at||''
        });
      }
    });
  }
  // Group by action
  const grouped={};
  data.forEach(n=>{
    if(!grouped[n.action]) grouped[n.action]=[];
    grouped[n.action].push(n);
  });
  return {data,grouped};
}

async function generateReport(){
  const date=document.getElementById('reportDate').value;
  if(!date){toast('Select a date');return;}
  const results=document.getElementById('reportResults');
  results.innerHTML='<div class="loading">Loading…</div>';

  const {data:notesData,error}=await db.from('notes').select('*').eq('action_date',date).order('action').order('created_at');
  if(error){toast('Error: '+error.message);return;}
  const {data:skipsData}=await db.from('skips').select('*').eq('skip_week',date);

  const {data,grouped}=fetchReportData(notesData,skipsData,date);

  if(!data.length){
    results.innerHTML='<div class="empty-state">No action items for '+fmtDate(date)+'</div>';
    return;
  }

  // Split data by company
  const companies=[
    {key:'REIS',label:'REIS',cls:'co-reis',filter:n=>n.client_id&&n.client_id.startsWith('20')},
    {key:'SANTOS',label:'SANTOS',cls:'co-santos',filter:n=>n.client_id&&n.client_id.startsWith('30')},
    {key:'OTHER',label:'Other',cls:'',filter:n=>!n.client_id||(!n.client_id.startsWith('20')&&!n.client_id.startsWith('30'))}
  ];

  let html=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;flex-wrap:wrap;gap:6px">
      <div style="font-size:14px;font-weight:700;color:var(--navy)">${fmtDate(date)} — ${data.length} item${data.length!==1?'s':''}</div>
      <button class="btn-add" onclick="printReport('${date}')" style="white-space:nowrap">Print Report</button>
    </div>`;

  companies.forEach(comp=>{
    const compData=data.filter(comp.filter);
    if(!compData.length) return;
    // Group by action within this company
    const compGrouped={};
    compData.forEach(n=>{(compGrouped[n.action]=compGrouped[n.action]||[]).push(n);});

    html+=`<div style="margin-bottom:1.5rem">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <h3 style="margin:0;font-size:16px;color:var(--navy)">${comp.label}</h3>
        ${comp.cls?`<span class="company-tag ${comp.cls}">${compData.length} items</span>`:`<span style="font-size:11px;color:var(--gray-400)">${compData.length} items</span>`}
      </div>`;

    Object.entries(compGrouped).forEach(([action,notes])=>{
      html+=`<div class="report-group">
        <div class="report-group-header">
          <span>${esc(action)}</span>
          <span>${notes.length}</span>
        </div>
        <table class="report-table"><thead><tr>
          <th style="width:28px">#</th>
          <th style="width:52px">Acct</th>
          <th>Name</th>
          <th>Address</th>
          <th>Phone</th>
          ${notes.some(n=>n.note)?'<th>Note</th>':''}
        </tr></thead><tbody>`;
      notes.forEach((n,i)=>{
        const c=findClient(n.client_id);
        html+=`<tr>
          <td class="rt-num">${i+1}</td>
          <td class="rt-id">${esc(n.client_id)}</td>
          <td class="rt-name">${esc(c.client_name||'—')}</td>
          <td class="rt-addr">${esc(c.address||'—')}</td>
          <td class="rt-phone">${esc(c.phone||'')}</td>
          ${notes.some(n=>n.note)?`<td class="rt-note">${esc(n.note||'')}</td>`:''}
        </tr>`;
      });
      html+=`</tbody></table></div>`;
    });
    html+=`</div>`;
  });

  results.innerHTML=html;
}

            <td style="font-size:10px;color:#888">${esc(n.client_id)}</td>

function toggleDay(btn){ btn.classList.toggle('day-toggle-active'); }

async function addClient(){
  const id=document.getElementById('nId').value.trim();
  const name=document.getElementById('nName').value.trim();
  const addr=document.getElementById('nAddr').value.trim();
  const phone=document.getElementById('nPhone').value.trim();
  const email=document.getElementById('nEmail').value.trim();
  const selectedDays=[...document.querySelectorAll('.day-toggle-active')].map(b=>b.dataset.day);
  if(!id||!addr){toast('Account # and address are required');return;}
  if(!selectedDays.length){toast('Select at least one pickup day');return;}

  const addrLower=addr.toLowerCase().trim();
  const nameLower=name.toLowerCase().trim();
  const dupes=clients.filter(c=>{
    const sameAddr=c.address.toLowerCase().trim()===addrLower;
    const sameName=nameLower&&c.client_name&&c.client_name.toLowerCase().trim()===nameLower;
    return sameAddr||sameName;
  });

  if(dupes.length){
    pendingClient={id,selectedDays,addr,phone,email,name};
    const dupeList=dupes.map(c=>`${esc(c.client_name||'')}${c.client_name?' �� ':''}${esc(c.client_id)} (${esc(c.service_day)})`).join(', ');
    const msg=document.getElementById('addMsg');
    msg.style.color='var(--warn-text)';
    msg.innerHTML=`
      <div style="background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:var(--radius-sm);padding:8px 10px;margin-bottom:8px">
        <strong>Possible duplicate</strong><br/>
        <span style="font-size:12px">${dupeList}</span>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn-add" style="flex:1;background:var(--gray-400)" onclick="renderAdd()">Cancel</button>
        <button class="btn-add" style="flex:2" onclick="confirmAddClient()">Add Anyway</button>
      </div>`;
    return;
  }

  await saveClient(id,selectedDays,addr,phone,email,name);
}

async function confirmAddClient(){
  if(!pendingClient) return;
  const {id,selectedDays,addr,phone,email,name}=pendingClient;
  pendingClient=null;
  await saveClient(id,selectedDays,addr,phone,email,name);
}

async function saveClient(id,selectedDays,addr,phone,email,name){
  const msg=document.getElementById('addMsg');
  if(msg){msg.style.color='var(--gray-400)';msg.textContent='Saving…';}
  const record={
    client_id: id,
    service_day: selectedDays.join(','),
    address: addr,
    phone: phone||null,
    email: email||null,
    client_name: name||null,
  };
  const {error}=await db.from('clients').insert(record);
  if(error){toast('Error: '+error.message);if(msg)msg.textContent='';return;}
  await loadClients();
  if(msg){msg.style.color='var(--ok-text)';msg.textContent=`Client ${id} added — ${selectedDays.join(', ')}`;}
  toast(`Client ${id} added`,true);
  setTimeout(()=>renderAdd(), 1800);
}

// ── ROLL-OFFS ─────────────────────────────────────────────────────────
let rolloffsData=[];
let rolloffSort={col:'date',asc:false};
let showDeleted=false;
let rolloffUndo=null;

let rolloffSearch='';
function renderRolloffs(){
  document.getElementById('tab-rolloffs').innerHTML=`
    <div class="card" style="max-width:100%">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <h2 style="font-size:15px;font-weight:700;margin:0">Roll-offs</h2>
        <div style="display:flex;gap:6px;align-items:center">
          <label style="font-size:11px;color:var(--gray-400);cursor:pointer;display:flex;align-items:center;gap:4px">
            <input type="checkbox" id="showDeletedToggle" onchange="showDeleted=this.checked;loadRolloffs()" ${showDeleted?'checked':''}/> Show deleted
          </label>
          <button class="btn-add" onclick="addRolloffRow()">+ Add Row</button>
        </div>
      </div>
      <div style="position:relative;margin-bottom:8px">
        <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--gray-300);font-size:14px">&#128269;</span>
        <input type="text" id="rolloffSearchInput" placeholder="Search roll-offs by customer, address, type, notes…" oninput="rolloffSearch=this.value;renderRolloffTable()" style="width:100%;padding:7px 10px 7px 32px;border:1px solid var(--gray-200);border-radius:var(--radius-sm);font-size:12px;font-family:inherit;outline:none;transition:border-color .15s;" onfocus="this.style.borderColor='var(--teal)'" onblur="this.style.borderColor='var(--gray-200)'"/>
      </div>
      <div id="rolloffUndo" style="display:none;background:#fef3cd;padding:6px 10px;border-radius:6px;margin-bottom:6px;font-size:12px;justify-content:space-between;align-items:center"></div>
      <div id="rolloffTable" style="overflow-x:auto">
        <div class="loading">Loading…</div>
      </div>
    </div>`;
  loadRolloffs();
}

async function loadRolloffs(){
  let q=db.from('rolloffs').select('*').order(rolloffSort.col,{ascending:rolloffSort.asc});
  if(!showDeleted) q=q.eq('deleted',false);
  const {data,error}=await q;
  if(error){toast('Error: '+error.message);return;}
  rolloffsData=data||[];
  renderRolloffTable();
}

function renderRolloffTable(){
  const wrap=document.getElementById('rolloffTable');
  if(!rolloffsData.length){
    wrap.innerHTML='<div class="empty-state">No roll-offs yet. Click "+ Add Row" to start.</div>';
    return;
  }
  const q=rolloffSearch.trim().toLowerCase();
  const filtered=q?rolloffsData.filter(r=>{
    return [r.customer,r.address_number,r.street,r.type,r.notes,r.date]
      .filter(Boolean).some(v=>v.toLowerCase().includes(q));
  }):rolloffsData;
  if(q&&!filtered.length){
    wrap.innerHTML=`<div class="empty-state">No roll-offs matching "${esc(rolloffSearch.trim())}"</div>`;
    return;
  }
  const cols=[
    {key:'date',label:'Date',width:'100px'},
    {key:'type',label:'Type',width:'70px'},
    {key:'customer',label:'Customer',width:'auto'},
    {key:'address_number',label:'Number',width:'80px'},
    {key:'street',label:'Street',width:'auto'},
    {key:'notes',label:'Notes',width:'120px'}
  ];
  const sortIcon=(col)=>rolloffSort.col===col?(rolloffSort.asc?'&#9650;':'&#9660;'):'';
  let html=`<table class="ro-table"><thead><tr>`;
  cols.forEach(c=>{
    html+=`<th style="width:${c.width};cursor:pointer;user-select:none" onclick="sortRolloffs('${c.key}')">${c.label} <span style="font-size:9px">${sortIcon(c.key)}</span></th>`;
  });
  html+=`<th style="width:36px"></th></tr></thead><tbody>`;
  filtered.forEach(r=>{
    const deleted=r.deleted;
    const rowStyle=deleted?'opacity:0.4;text-decoration:line-through;':'';
    html+=`<tr style="${rowStyle}" data-roid="${r.id}">`;
    // Date cell
    html+=`<td><input type="date" class="ro-input" value="${r.date||''}" onchange="updateRolloff(${r.id},'date',this.value)" ${deleted?'disabled':''}/></td>`;
    // Type cell - dropdown
    const roTypes=['AJ','REIS','AJ/REIS','30YD','40YD','30/40YD','SANTOS BOX'];
    html+=`<td><select class="ro-input" onchange="updateRolloff(${r.id},'type',this.value)" ${deleted?'disabled':''}>
      <option value=""${!r.type?' selected':''}></option>
      ${roTypes.map(t=>`<option value="${t}"${r.type===t?' selected':''}>${t}</option>`).join('')}
    </select></td>`;
    // Customer cell
    html+=`<td><input type="text" class="ro-input" value="${esc(r.customer||'')}" onchange="updateRolloff(${r.id},'customer',this.value)" onkeydown="roKeyNav(event,${r.id},'customer')" ${deleted?'disabled':''}/></td>`;
    // Number cell
    html+=`<td><input type="text" class="ro-input" value="${esc(r.address_number||'')}" onchange="updateRolloff(${r.id},'address_number',this.value)" onkeydown="roKeyNav(event,${r.id},'address_number')" ${deleted?'disabled':''}/></td>`;
    // Street cell
    html+=`<td><input type="text" class="ro-input" value="${esc(r.street||'')}" onchange="updateRolloff(${r.id},'street',this.value)" onkeydown="roKeyNav(event,${r.id},'street')" ${deleted?'disabled':''}/></td>`;
    // Notes cell
    html+=`<td><input type="text" class="ro-input" value="${esc(r.notes||'')}" onchange="updateRolloff(${r.id},'notes',this.value)" onkeydown="roKeyNav(event,${r.id},'notes')" ${deleted?'disabled':''}/></td>`;
    // Delete/restore button
    if(deleted){
      html+=`<td><button class="ro-del" title="Restore" onclick="restoreRolloff(${r.id})">&#8634;</button></td>`;
    } else {
      html+=`<td><button class="ro-del" title="Delete" onclick="softDeleteRolloff(${r.id})">&#128465;</button></td>`;
    }
    html+=`</tr>`;
  });
  html+=`</tbody></table>`;
  const countLabel=q?`<div style="font-size:11px;color:var(--gray-400);margin-top:4px">${filtered.length} of ${rolloffsData.length} roll-offs shown</div>`:'';
  wrap.innerHTML=html+countLabel;
}

function sortRolloffs(col){
  if(rolloffSort.col===col) rolloffSort.asc=!rolloffSort.asc;
  else { rolloffSort.col=col; rolloffSort.asc=true; }
  loadRolloffs();
}

async function addRolloffRow(){
  const today=new Date().toISOString().split('T')[0];
  const {data,error}=await db.from('rolloffs').insert({date:today,type:null,customer:'',address_number:'',street:'',deleted:false}).select();
  if(error){toast('Error: '+error.message);return;}
  const newId=data&&data[0]?data[0].id:null;
  await loadRolloffs();
  // Focus the new row's customer field by ID
  if(newId){
    setTimeout(()=>{
      const row=document.querySelector(`tr[data-roid="${newId}"]`);
      if(row){
        const inp=row.querySelector('input[type="text"]');
        if(inp) inp.focus();
      }
    },100);
  }
}

async function updateRolloff(id,col,val){
  const update={[col]:val||null,updated_at:new Date().toISOString()};
  const {error}=await db.from('rolloffs').update(update).eq('id',id);
  if(error) toast('Save error: '+error.message);
}

async function softDeleteRolloff(id){
  const row=rolloffsData.find(r=>r.id===id);
  const {error}=await db.from('rolloffs').update({deleted:true,deleted_at:new Date().toISOString(),deleted_by:currentUser?currentUser.display_name:''}).eq('id',id);
  if(error){toast('Error: '+error.message);return;}
  // Show undo
  rolloffUndo={id,timeout:null};
  const undoEl=document.getElementById('rolloffUndo');
  undoEl.style.display='flex';
  undoEl.innerHTML=`<span>Row deleted (${esc(row?row.customer||'':'')})</span><button class="btn-add" style="padding:2px 10px;font-size:11px" onclick="restoreRolloff(${id})">Undo</button>`;
  clearTimeout(rolloffUndo.timeout);
  rolloffUndo.timeout=setTimeout(()=>{undoEl.style.display='none';rolloffUndo=null;},8000);
  await loadRolloffs();
}

async function restoreRolloff(id){
  const {error}=await db.from('rolloffs').update({deleted:false,deleted_at:null,deleted_by:null}).eq('id',id);
  if(error){toast('Error: '+error.message);return;}
  const undoEl=document.getElementById('rolloffUndo');
  if(undoEl) undoEl.style.display='none';
  rolloffUndo=null;
  toast('Row restored',true);
  await loadRolloffs();
}

function roKeyNav(event,id,col){
  if(event.key==='Tab'||event.key==='Enter'){
    event.target.blur(); // trigger onchange save
  }
}

// ── IMPORT ────────────────────────────────────────────────────────────
function renderImport(){
  if(!currentUser||currentUser.role!=='admin'){
    document.getElementById('tab-import').innerHTML='<div class="empty-state">Admin access required for imports.</div>';
    return;
  }
  document.getElementById('tab-import').innerHTML=`
    <div class="form-card" style="margin-bottom:0.75rem">
      <h2>Import Clients from CSV</h2>
      <p style="font-size:12px;color:var(--gray-400);margin-bottom:1rem">
        CSV headers: <code style="font-family:'DM Mono',monospace;font-size:11px;background:var(--gray-100);padding:2px 6px;border-radius:4px">client_id, address, phone, client_name</code> (client_id = account number)
      </p>
      <div class="import-zone" onclick="document.getElementById('csvIn').click()">
        <svg class="import-zone-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <h3>Click to upload CSV</h3>
        <p>or drag and drop</p>
        <input type="file" id="csvIn" accept=".csv" style="display:none" onchange="handleCSV(this)"/>
      </div>
    </div>
    <div id="importPreview"></div>

    <div class="form-card" style="margin-top:1rem">
      <h2>Import Roll-offs from CSV</h2>
      <p style="font-size:12px;color:var(--gray-400);margin-bottom:1rem">
        CSV headers: <code style="font-family:'DM Mono',monospace;font-size:11px;background:var(--gray-100);padding:2px 6px;border-radius:4px">date, type, customer, address_number, street, notes</code>
        <br><span style="margin-top:4px;display:inline-block">Type should be <strong>AJ</strong> or <strong>REIS</strong>. Date format: YYYY-MM-DD or MM/DD/YYYY</span>
      </p>
      <div class="import-zone" onclick="document.getElementById('roCsvIn').click()">
        <svg class="import-zone-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <h3>Click to upload Roll-offs CSV</h3>
        <p>or drag and drop</p>
        <input type="file" id="roCsvIn" accept=".csv" style="display:none" onchange="handleRolloffCSV(this)"/>
      </div>
    </div>
    <div id="roImportPreview"></div>`;
}

function handleCSV(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split('\n').filter(l=>l.trim());
    const headers=parseCSVLine(lines[0]).map(h=>h.replace(/^"|"$/g,'').toLowerCase());
    const rawRows=lines.slice(1).map(line=>{
      const vals=parseCSVLine(line);
      const obj={};
      headers.forEach((h,i)=>obj[h]=vals[i]||'');
      return obj;
    }).filter(r=>r.client_id&&r.address);

    // Dedupe by client_id (keep first occurrence)
    const seen={};
    const rows=rawRows.filter(r=>{
      if(seen[r.client_id]) return false;
      seen[r.client_id]=true;
      return true;
    });

    pendingImport=rows;
    const preview=document.getElementById('importPreview');
    preview.innerHTML=`
      <div class="import-preview">
        <div class="import-preview-header">
          <h3>${rows.length.toLocaleString()} clients ready</h3>
          <button class="btn-add" onclick="doImport(pendingImport)">Import All</button>
        </div>
        ${rows.slice(0,6).map(r=>`
          <div class="preview-row">
            <span class="p-id">${esc(r.client_id)}</span>
            <span class="p-name">${esc(r.client_name||'')}</span>
            <span class="p-addr">${esc(r.address)}</span>
          </div>`).join('')}
        ${rows.length>6?`<p style="font-size:12px;color:var(--gray-400);margin-top:8px">…and ${(rows.length-6).toLocaleString()} more</p>`:''}
      </div>`;
  };
  reader.readAsText(file);
}

async function doImport(rows){
  const batchSize=500;
  let done=0;
  for(let i=0;i<rows.length;i+=batchSize){
    const chunk=rows.slice(i,i+batchSize);
    const {error}=await db.from('clients').upsert(chunk,{onConflict:'client_id'});
    if(error){toast('Import error: '+error.message);return;}
    done+=chunk.length;
  }
  await loadClients();
  toast(`${done.toLocaleString()} clients imported`,true);
  document.getElementById('importPreview').innerHTML=
    '<div class="empty-state" style="color:var(--ok-text);font-weight:500">Import complete — '+done.toLocaleString()+' clients loaded.</div>';
}

function handleRolloffCSV(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split('\n').filter(l=>l.trim());
    const headers=parseCSVLine(lines[0]).map(h=>h.replace(/^"|"$/g,'').toLowerCase().replace(/\s+/g,'_'));
    const rows=lines.slice(1).map(line=>{
      const vals=parseCSVLine(line);
      const obj={};
      headers.forEach((h,i)=>obj[h]=vals[i]||'');
      return obj;
    }).filter(r=>r.customer||r.street);

    // Normalize dates (handle MM/DD/YYYY -> YYYY-MM-DD)
    rows.forEach(r=>{
      if(r.date&&r.date.includes('/')){
        const parts=r.date.split('/');
        if(parts.length===3){
          const [m,d,y]=parts;
          r.date=`${y.length===2?'20'+y:y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
        }
      }
      // Normalize type to uppercase
      if(r.type) r.type=r.type.toUpperCase();
    });

    pendingRoImport=rows;
    const preview=document.getElementById('roImportPreview');
    preview.innerHTML=`
      <div class="import-preview">
        <div class="import-preview-header">
          <h3>${rows.length.toLocaleString()} roll-offs ready</h3>
          <button class="btn-add" onclick="doRolloffImport(pendingRoImport)">Import All</button>
        </div>
        ${rows.slice(0,6).map(r=>`
          <div class="preview-row">
            <span class="p-id">${esc(r.type||'')}</span>
            <span class="p-addr">${esc(r.customer||'')}</span>
            <span class="p-day">${esc(r.address_number||'')} ${esc(r.street||'')}</span>
          </div>`).join('')}
        ${rows.length>6?`<p style="font-size:12px;color:var(--gray-400);margin-top:8px">…and ${(rows.length-6).toLocaleString()} more</p>`:''}
      </div>`;
  };
  reader.readAsText(file);
}

async function doRolloffImport(rows){
  const records=rows.map(r=>({
    date:r.date||null,
    type:r.type||null,
    customer:r.customer||null,
    address_number:r.address_number||null,
    street:r.street||null,
    notes:r.notes||null
  }));
  const batchSize=500;
  let done=0;
  for(let i=0;i<records.length;i+=batchSize){
    const chunk=records.slice(i,i+batchSize);
    const {error}=await db.from('rolloffs').insert(chunk);
    if(error){toast('Import error: '+error.message);return;}
    done+=chunk.length;
  }
  toast(`${done} roll-offs imported`,true);
  document.getElementById('roImportPreview').innerHTML=
    '<div class="empty-state" style="color:var(--ok-text);font-weight:500">Import complete — '+done+' roll-offs loaded.</div>';
}

// ── TOAST ─────────────────────────────────────────────────────────────
function toast(msg,ok=false){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show'+(ok?' ok':'');
  clearTimeout(t._to);
  t._to=setTimeout(()=>t.classList.remove('show'),2600);
}

// ── BOOT ──────────────────────────────────────────────────────────────
const _saved = sessionStorage.getItem('helm_auth');
if(_saved && _saved !== '1'){
  try{
    currentUser = JSON.parse(_saved);
    hide('loginScreen'); show('appScreen');
    document.getElementById('appScreen').style.flexDirection='column';
    document.getElementById('topbarUser').textContent = currentUser.display_name;
    if(currentUser.role==='admin') document.getElementById('importTabBtn').style.display='';
    init().catch(err=>{
      toast('Connection error — please refresh');
      console.error('Init failed:',err);
    });
  }catch(e){ sessionStorage.removeItem('helm_auth'); }
}
