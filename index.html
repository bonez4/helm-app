<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HELM — Reis Trucking</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --navy:       #0f1f3d;
  --navy-mid:   #1a2f52;
  --navy-light: #243a63;
  --teal:       #1a9b8a;
  --teal-dim:   #147a6d;
  --teal-pale:  #e6f5f3;
  --gold:       #d4a843;
  --gold-pale:  #fdf6e3;
  --white:      #ffffff;
  --gray-50:    #f7f8fa;
  --gray-100:   #eef0f4;
  --gray-200:   #dde1ea;
  --gray-300:   #c8cdd8;
  --gray-400:   #9aa3b5;
  --gray-500:   #6b7385;
  --gray-600:   #4a5168;
  --gray-800:   #1e2435;
  --warn-bg:    #fff8e6;
  --warn-text:  #8a6200;
  --warn-border:#f0c040;
  --ok-bg:      #e8f5f0;
  --ok-text:    #156b4f;
  --err-bg:     #fdecea;
  --err-text:   #b92b2b;
  --radius:     10px;
  --radius-sm:  6px;
  --radius-lg:  14px;
  --shadow:     0 1px 3px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:  0 4px 16px rgba(0,0,0,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--gray-50);color:var(--gray-800);min-height:100vh;font-size:13px;-webkit-font-smoothing:antialiased;}

/* ── LOGIN ───────────────────────────────── */
#loginScreen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--navy);
  background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,255,255,0.03) 39px,rgba(255,255,255,0.03) 40px),
                   repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(255,255,255,0.03) 39px,rgba(255,255,255,0.03) 40px);
}
.login-box{
  background:white;border-radius:var(--radius-lg);
  padding:2.75rem 2.25rem;width:100%;max-width:380px;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
}
.login-brand{display:flex;align-items:center;gap:12px;margin-bottom:2rem;}
.login-icon{
  width:52px;height:52px;border-radius:12px;
  background:var(--navy);display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.login-icon svg{width:26px;height:26px;}
.login-brand-text{}
.helm-title{font-size:26px;font-weight:600;color:var(--navy);letter-spacing:-.02em;line-height:1;}
.helm-sub{font-size:12px;color:var(--gray-400);margin-top:3px;letter-spacing:.04em;text-transform:uppercase;}
.login-box label{display:block;font-size:12px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.login-box input[type=text],.login-box input[type=password]{
  width:100%;padding:11px 14px;
  border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;font-size:15px;color:var(--gray-800);
  background:var(--gray-50);margin-bottom:14px;outline:none;transition:border-color .15s,background .15s;
}
.login-box input[type=text]:focus,.login-box input[type=password]:focus{border-color:var(--teal);background:white;}
.btn-signin{
  width:100%;padding:12px;background:var(--navy);color:white;
  border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;
  font-size:15px;font-weight:600;cursor:pointer;transition:background .15s;letter-spacing:.01em;
}
.btn-signin:hover{background:var(--navy-light);}
.login-err{color:var(--err-text);font-size:13px;margin-top:10px;text-align:center;}
.login-footer{margin-top:1.75rem;padding-top:1.25rem;border-top:1px solid var(--gray-100);text-align:center;font-size:12px;color:var(--gray-400);}

/* ── APP SHELL ───────────────────────────── */
#appScreen{display:none;min-height:100vh;flex-direction:column;}

.topbar{
  background:var(--navy);height:44px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1rem;position:sticky;top:0;z-index:100;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-icon{width:28px;height:28px;border-radius:6px;background:var(--navy-light);display:flex;align-items:center;justify-content:center;}
.topbar-icon svg{width:15px;height:15px;}
.topbar-name{font-size:15px;font-weight:600;color:white;letter-spacing:-.01em;}
.topbar-company{font-size:10px;color:rgba(255,255,255,0.4);margin-top:1px;letter-spacing:.03em;text-transform:uppercase;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:#2dc653;box-shadow:0 0 0 2px rgba(45,198,83,0.25);}
.live-label{font-size:11px;color:rgba(255,255,255,0.45);}
.btn-logout{
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.6);font-size:12px;padding:4px 10px;
  border-radius:var(--radius-sm);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;
}
.btn-logout:hover{background:rgba(255,255,255,0.15);color:white;}

.tab-nav{
  background:white;border-bottom:1px solid var(--gray-200);
  display:flex;padding:0 1rem;gap:0;overflow-x:auto;
}
.tab-nav::-webkit-scrollbar{display:none;}
.tab-nav button{
  background:none;border:none;font-family:'DM Sans',sans-serif;
  font-size:12px;font-weight:500;color:var(--gray-400);
  padding:9px 12px;cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  white-space:nowrap;transition:color .15s,border-color .15s;letter-spacing:.01em;
}
.tab-nav button.active{color:var(--navy);border-bottom-color:var(--teal);font-weight:600;}
.tab-nav button:hover:not(.active){color:var(--gray-600);}

.main{padding:0.75rem;max-width:1060px;margin:0 auto;width:100%;}

/* ── SEARCH ─────────────────────────────── */
.search-wrap{position:relative;margin-bottom:0.75rem;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--gray-400);pointer-events:none;}
.search-wrap input{
  width:100%;padding:9px 12px 9px 36px;
  border:1.5px solid var(--gray-200);border-radius:var(--radius);
  font-family:'DM Sans',sans-serif;font-size:13px;color:var(--gray-800);
  background:white;box-shadow:var(--shadow);outline:none;transition:border-color .15s,box-shadow .15s;
}
.search-wrap input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(26,155,138,0.1);}
.search-wrap input::placeholder{color:var(--gray-300);}
.search-hint{font-size:11px;color:var(--gray-400);margin-top:4px;margin-left:2px;}

/* ── RESULTS LIST ────────────────────────── */
.results-list{margin-bottom:0.75rem;}
.result-item{
  background:white;border:1px solid var(--gray-200);border-radius:var(--radius-sm);
  padding:8px 12px;margin-bottom:4px;cursor:pointer;
  display:flex;justify-content:space-between;align-items:center;
  box-shadow:var(--shadow);transition:border-color .15s,transform .1s,box-shadow .15s;
}
.result-item:hover,.result-item:focus{border-color:var(--teal);transform:translateY(-1px);box-shadow:var(--shadow-md);outline:none;}
.result-id{font-family:'DM Mono',monospace;font-size:11px;color:var(--gray-400);margin-bottom:2px;}
.result-addr{font-size:13px;font-weight:500;color:var(--gray-800);}
.result-day{font-size:11px;font-weight:600;color:var(--teal);background:var(--teal-pale);padding:2px 7px;border-radius:20px;}

/* ── CLIENT CARD ─────────────────────────── */
.client-card{background:white;border:1px solid var(--gray-200);border-radius:var(--radius);box-shadow:var(--shadow-md);overflow:hidden;}
.card-header{background:var(--navy);padding:0.75rem 1rem;display:flex;align-items:center;gap:10px;}
.avatar{
  width:36px;height:36px;border-radius:8px;
  background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.15);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;color:white;flex-shrink:0;letter-spacing:.02em;
}
.card-header-meta h2{font-size:14px;font-weight:600;color:white;letter-spacing:-.01em;}
.card-header-meta p{font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px;}
.card-body{padding:0.75rem 1rem;}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:0.75rem;}
.info-tile{background:var(--gray-50);border:1px solid var(--gray-100);border-radius:var(--radius-sm);padding:6px 10px;}
.info-tile label{font-size:9px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:3px;}
.day-pill{display:inline-block;background:var(--teal-pale);color:var(--teal-dim);font-size:12px;font-weight:600;padding:2px 8px;border-radius:20px;}
.status-pill{display:inline-block;font-size:12px;font-weight:600;padding:2px 8px;border-radius:20px;}
.s-active{background:var(--ok-bg);color:var(--ok-text);}
.s-skipped{background:var(--warn-bg);color:var(--warn-text);}
.s-paused{background:var(--err-bg);color:var(--err-text);}

.inquiry-grid{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.inq-btn{
  flex:1;min-width:80px;padding:6px 8px;
  border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);
  background:white;color:var(--gray-600);font-size:12px;font-weight:500;
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;
}
.inq-btn:hover{border-color:var(--teal);color:var(--teal);}
.inq-active{background:var(--teal-pale)!important;border-color:var(--teal)!important;color:var(--teal-dim)!important;font-weight:600!important;}
.inq-tag{display:inline-block;background:var(--gray-100);color:var(--gray-500);font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;margin-left:4px;text-transform:capitalize;vertical-align:middle;}

.section-title{font-size:10px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.08em;margin-bottom:0.5rem;}
.divider{border:none;border-top:1px solid var(--gray-100);margin:0.5rem 0;}

.week-grid{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:0.75rem;}
.week-btn{
  padding:5px 10px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);
  background:white;color:var(--gray-600);font-size:12px;font-weight:500;
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;
}
.week-btn:hover{border-color:var(--teal);color:var(--teal);}
.week-btn.active{background:var(--teal);border-color:var(--teal);color:white;font-weight:600;}

.action-btn{
  width:100%;padding:8px;border-radius:var(--radius-sm);border:none;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .15s;letter-spacing:.01em;
}
.a-skip{background:var(--navy);color:white;}
.a-skip:hover{background:var(--navy-light);}
.a-unskip{background:var(--warn-bg);color:var(--warn-text);border:1.5px solid var(--warn-border);}
.a-unskip:hover{background:#fff3cc;}

.skip-history{margin-top:0.75rem;}
.skip-hist-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:5px 0;border-bottom:1px solid var(--gray-100);font-size:12px;
}
.skip-hist-row:last-child{border-bottom:none;}
.skip-wk-label{color:var(--gray-600);}
.skip-tag{background:var(--warn-bg);color:var(--warn-text);font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px;letter-spacing:.04em;}


/* ── SHARED ──────────────────────────────── */
.log-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;}
.log-title{font-size:16px;font-weight:600;color:var(--navy);}
.log-count-badge{background:var(--gray-100);color:var(--gray-500);font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;}

.remove-skip-btn{
  background:none;border:none;color:var(--gray-400);font-size:12px;
  cursor:pointer;padding:2px 4px;border-radius:4px;transition:color .15s;
}
.remove-skip-btn:hover{color:var(--err-text);}
.date-range-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:end;margin-bottom:.5rem;}
.date-range-arrow{font-size:18px;color:var(--gray-300);padding-bottom:8px;text-align:center;}
.date-field label{display:block;font-size:10px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;}
.date-field input[type=date]{
  width:100%;padding:7px 9px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;font-size:13px;color:var(--gray-800);
  background:var(--gray-50);outline:none;transition:border-color .15s;
}
.date-field input[type=date]:focus{border-color:var(--teal);background:white;}
.skip-preview{min-height:24px;margin-bottom:.25rem;}
.skip-preview-ok{background:var(--ok-bg);color:var(--ok-text);font-size:12px;font-weight:500;padding:6px 10px;border-radius:var(--radius-sm);}
.skip-preview-warn{background:var(--err-bg);color:var(--err-text);font-size:12px;padding:6px 10px;border-radius:var(--radius-sm);}
@media(max-width:520px){.date-range-grid{grid-template-columns:1fr;}.date-range-arrow{display:none;}}

/* ── ADD CLIENT ──────────────────────────── */
.form-card{background:white;border:1px solid var(--gray-200);border-radius:var(--radius);padding:1rem;box-shadow:var(--shadow);}
.form-card h2{font-size:15px;font-weight:600;color:var(--navy);margin-bottom:1rem;}
.form-group{margin-bottom:0.75rem;}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--gray-500);letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px;}
.form-group input,.form-group select{
  width:100%;padding:7px 10px;
  border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;font-size:13px;color:var(--gray-800);
  background:var(--gray-50);outline:none;transition:border-color .15s,background .15s;
}
.form-group input:focus,.form-group select:focus{border-color:var(--teal);background:white;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-add{
  background:var(--teal);color:white;border:none;border-radius:var(--radius-sm);
  padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;transition:background .15s;
}
.btn-add:hover{background:var(--teal-dim);}
.day-toggle-grid{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.day-toggle{
  flex:1;min-width:70px;padding:8px 6px;
  border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);
  background:white;cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:2px;
}
.day-toggle:hover{border-color:var(--teal);background:var(--teal-pale);}
.day-toggle-active{background:var(--teal)!important;border-color:var(--teal)!important;}
.day-toggle-active .day-abbr,.day-toggle-active .day-full{color:white!important;}
.day-abbr{font-size:13px;font-weight:700;color:var(--navy);}
.day-full{font-size:10px;color:var(--gray-400);}

/* ── IMPORT ──────────────────────────────── */
.import-zone{
  border:2px dashed var(--gray-200);border-radius:var(--radius);
  padding:2rem 1.5rem;text-align:center;cursor:pointer;
  transition:border-color .2s,background .2s;background:white;
}
.import-zone:hover{border-color:var(--teal);background:var(--teal-pale);}
.import-zone-icon{width:36px;height:36px;margin:0 auto 0.75rem;color:var(--gray-300);}
.import-zone h3{font-size:14px;font-weight:600;color:var(--gray-600);margin-bottom:4px;}
.import-zone p{font-size:12px;color:var(--gray-400);}
.import-zone span{font-size:11px;color:var(--teal);font-weight:600;margin-top:4px;display:block;}
.import-preview{background:white;border:1px solid var(--gray-200);border-radius:var(--radius-sm);padding:0.75rem;margin-top:0.75rem;box-shadow:var(--shadow);}
.import-preview-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;}
.import-preview h3{font-size:13px;font-weight:600;color:var(--navy);}
.preview-row{font-size:12px;padding:5px 0;border-bottom:1px solid var(--gray-100);display:flex;gap:10px;align-items:center;}
.preview-row:last-child{border-bottom:none;}
.p-id{font-family:'DM Mono',monospace;color:var(--gray-400);font-size:10px;width:40px;flex-shrink:0;}
.p-addr{color:var(--gray-800);flex:1;}
.p-day{color:var(--teal);font-weight:600;font-size:11px;}

/* ── TOAST ───────────────────────────────── */
.toast{
  position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--navy);color:white;padding:8px 18px;
  border-radius:var(--radius-sm);font-size:13px;font-weight:500;
  box-shadow:var(--shadow-md);opacity:0;pointer-events:none;
  transition:opacity .2s,transform .2s;z-index:9999;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{background:var(--teal);}

/* ── MISC ────────────────────────────────── */
.empty-state{text-align:center;padding:2rem 1rem;color:var(--gray-400);font-size:13px;}
.loading{text-align:center;padding:1.5rem;color:var(--gray-400);font-size:13px;}
.chip{display:inline-block;background:var(--gray-100);color:var(--gray-500);font-size:10px;font-weight:600;padding:1px 6px;border-radius:20px;margin-left:4px;vertical-align:middle;}

/* ── FLOATING CLIENT PANEL ───────────────── */
.client-panel{
  position:fixed;right:0;top:44px;width:420px;height:calc(100vh - 44px);
  background:white;border-left:1px solid var(--gray-200);
  box-shadow:-4px 0 20px rgba(0,0,0,0.08);
  z-index:90;overflow-y:auto;display:none;
  transition:transform .2s ease;
}
.client-panel.open{display:block;}
.panel-close{
  position:absolute;top:8px;right:8px;background:none;border:none;
  font-size:18px;color:var(--gray-400);cursor:pointer;z-index:2;
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  border-radius:4px;transition:all .15s;
}
.panel-close:hover{background:var(--gray-100);color:var(--err-text);}

/* ── NOTES ───────────────────────────────── */
.notes-section{margin-top:0.5rem;}
.note-form{display:flex;gap:4px;align-items:end;flex-wrap:wrap;margin-bottom:6px;}
.note-form select{
  padding:5px 6px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;font-size:11px;color:var(--gray-800);
  background:var(--gray-50);outline:none;min-width:120px;
}
.note-form input[type=date]{
  padding:5px 6px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;font-size:11px;color:var(--gray-800);
  background:var(--gray-50);outline:none;width:130px;
}
.note-form input[type=text]{
  flex:1;min-width:120px;padding:5px 6px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;font-size:11px;color:var(--gray-800);
  background:var(--gray-50);outline:none;
}
.note-form select:focus,.note-form input:focus{border-color:var(--teal);background:white;}
.note-form .btn-note-add{
  padding:5px 10px;background:var(--teal);color:white;border:none;border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;
}
.note-form .btn-note-add:hover{background:var(--teal-dim);}
.notes-list-wrap{max-height:220px;overflow-y:auto;border:1px solid var(--gray-100);border-radius:var(--radius-sm);}
.note-row{padding:6px 8px;border-bottom:1px solid var(--gray-100);}
.note-row:last-child{border-bottom:none;}
.note-row:hover{background:var(--gray-50);}
.note-row-header{display:flex;gap:6px;align-items:center;margin-bottom:2px;}
.note-row-header .note-meta{font-family:'DM Sans',sans-serif;font-size:10px;color:var(--gray-400);}
.note-row-header .note-user{font-size:10px;font-weight:600;color:var(--gray-500);}
.note-row-body{font-family:'Courier New',monospace;font-size:12px;color:var(--gray-800);line-height:1.4;word-break:break-word;}
.action-tag{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;text-transform:uppercase;letter-spacing:.03em;}
.action-tag.at-otp{background:#e8f0fe;color:#1a56db;}

<script>
// ── CONFIG ────────────────────────────────────────────────────────────
const SUPABASE_URL   = 'https://iiqlhqtyyqctgupalrlc.supabase.co';
const SUPABASE_ANON  = 'sb_publishable_JAASDdg8OERvpDTnEeLd5Q_Re48qR1I';
const OFFICE_PW      = 'nantucket';
// ───────────────────────────────────────────────────────────────────────

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON);

const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const ACTION_TYPES = [
  {value:'One Time Pickup', label:'One Time Pickup', needsDate:true, tag:'at-otp'},
  {value:'Pile Pickup', label:'Pile Pickup', needsDate:true, tag:'at-pile'},
  {value:'Skip Day', label:'Skip Day', needsDate:true, tag:'at-skip'},
  {value:'Complaint', label:'Complaint', needsDate:false, tag:'at-complaint'},
  {value:'Note', label:'Note', needsDate:false, tag:'at-note'},
];

let clients = [], skips = [], clientNotes = [], selectedWeek = '', activeClient = null;
let currentUser = null;
let lookupRendered = false;

function getBaseId(cid){ return cid.replace(/-\d+$/,''); }
function getRelatedClients(c){
  const base=getBaseId(c.client_id);
  return clients.filter(x=>getBaseId(x.client_id)===base);
}

// ── AUTH ──────────────────────────────────────────────────────────────
async function login() {
  const un = document.getElementById('unInput').value.trim().toLowerCase();
  const pw = document.getElementById('pwInput').value;
  const errEl = document.getElementById('loginErr');
  if(!un||!pw){errEl.textContent='Enter username and password.';return;}
  const {data,error} = await db.from('users').select('*').eq('username',un).eq('password',pw).single();
  if(error||!data){errEl.textContent='Incorrect username or password.';return;}
  currentUser = data;
  sessionStorage.setItem('helm_auth', JSON.stringify(data));
  show('appScreen'); hide('loginScreen');
  document.getElementById('appScreen').style.flexDirection='column';
  document.getElementById('topbarUser').textContent = data.display_name;
  init();
}
function logout() { sessionStorage.removeItem('helm_auth'); location.reload(); }
function show(id){ document.getElementById(id).style.display='flex'; }
function hide(id){ document.getElementById(id).style.display='none'; }

// ── INIT ──────────────────────────────────────────────────────────────
async function init() {
  selectedWeek = getTodayISO();
  renderLookup();
  await Promise.all([loadClients(), loadSkips()]);
}

function getTodayISO() {
  const d = new Date();
  d.setHours(0,0,0,0);
  return d.toISOString().split('T')[0];
}

function getMondayISO(d) {
  const day=d.getDay();
  const diff = day===0 ? 1 : 1-day;
  const m=new Date(d);
  m.setDate(d.getDate()+diff);
  m.setHours(0,0,0,0);
  return m.toISOString().split('T')[0];
}

function getWeekOptions() {
  const today=new Date();
  const day=today.getDay();
  const diff=day===0?1:1-day;
  const mon=new Date(today);
  mon.setDate(today.getDate()+diff);
  mon.setHours(0,0,0,0);
  return Array.from({length:6},(_,i)=>{
    const d=new Date(mon); d.setDate(mon.getDate()+i*7);
    return d.toISOString().split('T')[0];
  });
}

function fmtDate(iso){
  if(!iso) return '';
  const d=new Date(iso+'T00:00:00');
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function fmtDateShort(iso){
  if(!iso) return '';
  const d=new Date(iso+'T00:00:00');
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  const y=String(d.getFullYear()).slice(2);
  return m+day+y;
}

function fmtTimestamp(ts){
  if(!ts) return '';
  const d=new Date(ts);
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  const y=String(d.getFullYear()).slice(2);
  const h=String(d.getHours()).padStart(2,'0');
  const min=String(d.getMinutes()).padStart(2,'0');
  return `${m}/${day}/${y} ${h}:${min}`;
}

// ── DATA ──────────────────────────────────────────────────────────────
async function loadClients() {
  let all=[], from=0, batch=1000;
  while(true){
    const {data,error}=await db.from('clients').select('*').order('client_id').range(from,from+batch-1);
    if(error||!data||data.length===0) break;
    all=[...all,...data];
    if(data.length<batch) break;
    from+=batch;
  }
  clients=all;
  const hint=document.getElementById('srchHint');
  if(hint) hint.textContent=`${clients.length.toLocaleString()} clients loaded — search by ID, name, address, or phone`;
}

async function loadSkips() {
  const {data,error}=await db.from('skips').select('*').order('skip_week',{ascending:false});
  if(!error) skips=data||[];
}

function isSkipped(cid,date){
  // Check if client has a skip for any day in the week containing this date
  const d = new Date(date+'T00:00:00');
  const monday = getMondayISO(d);
  return skips.some(s=>s.client_id===cid&&s.skip_week===monday);
}

async function loadNotes(baseId){
  // Load notes for base ID (notes are stored against base ID, not suffixed IDs)
  const {data,error}=await db.from('notes').select('*').eq('client_id',baseId).order('created_at',{ascending:false});
  if(!error) clientNotes=data||[];
  return clientNotes;
}

// ── TABS ──────────────────────────────────────────────────────────────
function switchTab(name,btn){
  ['lookup','add','report','import'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===name?'':'none';
  });
  document.querySelectorAll('.tab-nav button').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  // Only re-render lookup on first visit; preserve state after that
  if(name==='lookup' && !lookupRendered) renderLookup();
  if(name==='add')    renderAdd();
  if(name==='report') renderReport();
  if(name==='import') renderImport();
}

// ── LOOKUP ────────────────────────────────────────────────────────────
function renderLookup(){
  lookupRendered = true;
  document.getElementById('tab-lookup').innerHTML=`
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="srch" placeholder="Search by client ID, name, address, or phone…" oninput="doSearch(this.value)" onkeydown="handleSearchKey(event)" autocomplete="off"/>
    </div>
    <div class="search-hint" id="srchHint">${clients.length>0?`${clients.length.toLocaleString()} clients loaded — search by ID, name, address, or phone`:'Loading clients…'}</div>
    <div id="srchResults" style="margin-top:.5rem"></div>`;
  document.getElementById('srch').focus();
}

function doSearch(q){
  q=q.trim().toLowerCase();
  const res=document.getElementById('srchResults');
  if(q.length<2){res.innerHTML='';return;}

  const scored=clients
    .map(c=>{
      const idL=c.client_id.toLowerCase();
      const addrL=c.address.toLowerCase();
      const nameL=(c.client_name||'').toLowerCase();
      const phoneClean=(c.phone||'').replace(/\D/g,'');
      const qClean=q.replace(/\D/g,'');
      let score=0;
      if(idL===q) score=4;
      else if(idL.startsWith(q)) score=3;
      else if(idL.includes(q)) score=2;
      if(nameL&&nameL.includes(q)) score=Math.max(score,3);
      if(addrL.includes(q)) score=Math.max(score,1);
      if(qClean.length>=3&&phoneClean.includes(qClean)) score=Math.max(score,qClean.length>=7?4:2);
      return {c,score};
    })
    .filter(x=>x.score>0)
    .sort((a,b)=>b.score-a.score);

  // Group by base ID so multi-day clients show as one result
  const grouped={};
  scored.forEach(({c,score})=>{
    const base=getBaseId(c.client_id);
    if(!grouped[base]||score>grouped[base].score){
      grouped[base]={c,score,base};
    }
  });
  const results=Object.values(grouped).sort((a,b)=>b.score-a.score).slice(0,10);

  if(!results.length){res.innerHTML='<div class="empty-state">No clients found</div>';return;}
  if(results.length===1){res.innerHTML='';openClient(results[0].c);return;}
  res.innerHTML='<div class="results-list">'+results.map(({c,base})=>{
    const related=getRelatedClients(c);
    const days=related.map(r=>r.service_day).join(', ');
    return `
    <div class="result-item" tabindex="0" data-cid="${c.client_id}" onclick="pickClient('${c.client_id}')" onkeydown="handleResultKey(event,'${c.client_id}')">
      <div>
        <div class="result-id">${c.client_name?`${c.client_name} &mdash; `:''}${base}</div>
        <div class="result-addr">${c.address}</div>
      </div>
      <div class="result-day">${days}</div>
    </div>`;
  }).join('')+'</div>';
}

function handleSearchKey(e){
  if(e.key==='Enter'){
    e.preventDefault();
    const first=document.querySelector('.result-item');
    if(first){first.click();return;}
    // If search has text but no results list, check if single match auto-opened
  }
  if(e.key==='ArrowDown'){
    e.preventDefault();
    const first=document.querySelector('.result-item');
    if(first) first.focus();
  }
}

function handleResultKey(e,cid){
  if(e.key==='Enter'){e.preventDefault();pickClient(cid);return;}
  if(e.key==='ArrowDown'){
    e.preventDefault();
    const next=e.target.nextElementSibling;
    if(next) next.focus();
  }
  if(e.key==='ArrowUp'){
    e.preventDefault();
    const prev=e.target.previousElementSibling;
    if(prev) prev.focus();
    else document.getElementById('srch').focus();
  }
}

function pickClient(id){
  const c=clients.find(x=>x.client_id===id);
  if(!c) return;
  document.getElementById('srchResults').innerHTML='';
  document.getElementById('srch').value=`${getBaseId(c.client_id)} — ${c.address}`;
  openClient(c);
}

function openClient(c){
  activeClient=c;
  showPanel(c);
}

// ── FLOATING PANEL ───────────────────────────────────────────────────
function closePanel(){
  document.getElementById('clientPanel').classList.remove('open');
  activeClient=null;
}

async function showPanel(c){
  activeClient=c;
  const panel=document.getElementById('clientPanel');
  panel.classList.add('open');

  const related=getRelatedClients(c);
  const baseId=getBaseId(c.client_id);
  const allIds=related.map(r=>r.client_id);
  const paused=c.status==='Paused';

  const displayName=c.client_name||`Client ${baseId}`;
  const allDays=related.map(r=>r.service_day);

  // Skips across all related IDs
  const cSkips=skips.filter(s=>allIds.includes(s.client_id)).sort((a,b)=>a.skip_week>b.skip_week?1:-1);
  const skipRanges=groupSkipRanges(cSkips);
  const todayWeek=getMondayISO(new Date());
  const activeSkip=cSkips.some(s=>s.skip_week===todayWeek);

  document.getElementById('panelCard').innerHTML=`
    <div class="client-card" style="border:none;border-radius:0;box-shadow:none">
      <div class="card-header">
        <div class="avatar">${ini}</div>
        <div class="card-header-meta">
          <h2>${displayName}</h2>
          <p style="opacity:.7;font-size:11px;margin-bottom:1px">ID: ${baseId}${related.length>1?' ('+related.length+' days)':''}</p>
          <p>${c.address}, Nantucket MA &middot; ${c.phone||'No phone'}</p>
        </div>
      </div>
      <div class="card-body">
        <div class="info-grid">
          <div class="info-tile"><label>Pickup Day${allDays.length>1?'s':''}</label>${allDays.map(d=>`<span class="day-pill">${d}</span>`).join(' ')}</div>
          <div class="info-tile"><label>Account Status</label>
            <span class="status-pill ${paused?'s-paused':activeSkip?'s-skipped':'s-active'}">
              ${paused?'Paused':activeSkip?'Skipped':'Active'}
            </span>
          </div>
        </div>

        ${!paused?`
        <hr class="divider"/>
        <div class="section-title">Schedule a skip</div>
        ${related.length>1?`
        <div style="margin-bottom:6px">
          <label style="font-size:10px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:4px">Skip for</label>
          <div style="display:flex;gap:4px;flex-wrap:wrap">
            ${related.map(r=>`<button class="inq-btn skip-day-btn inq-active" data-skipid="${r.client_id}" onclick="this.classList.toggle('inq-active')">${r.service_day}</button>`).join('')}
          </div>
        </div>`:''}
        <div class="date-range-grid">
          <div class="date-field">
            <label>Skip from</label>
            <input type="date" id="skipStart" onchange="updateSkipPreview()"/>
          </div>
          <div class="date-range-arrow">&#8594;</div>
          <div class="date-field">
            <label>Skip through</label>
            <input type="date" id="skipEnd" onchange="updateSkipPreview()"/>
          </div>
        </div>
        <div id="skipPreview" class="skip-preview"></div>

        <div class="section-title" style="margin-top:0.5rem">Contact method</div>
        <div class="inquiry-grid">
          <button class="inq-btn inq-active" id="inq-phone" onclick="selectInquiry('phone')">Phone</button>
          <button class="inq-btn" id="inq-email" onclick="selectInquiry('email')">Email</button>
          <button class="inq-btn" id="inq-person" onclick="selectInquiry('person')">In Person</button>
        </div>

        <button class="action-btn a-skip" style="margin-top:0.5rem" onclick="addSkipRangeAll()">
          &#10003; Confirm Skip
        </button>`:''}

        ${skipRanges.length?`
          <div class="skip-history">
            <div class="section-title" style="margin-top:0.75rem;display:flex;justify-content:space-between;align-items:center">
              <span>Skips on file <span class="chip">${cSkips.length}</span></span>
            </div>
            ${skipRanges.map(r=>`
              <div class="skip-hist-row">
                <div>
                  <span class="skip-wk-label">${r.label}</span>
                  ${r.method?`<span class="inq-tag">${r.method}</span>`:''}
                </div>
                <div style="display:flex;align-items:center;gap:6px">
                  ${r.loggedBy?`<span style="font-size:10px;color:var(--gray-400)">${r.loggedBy}</span>`:''}
                  <span class="skip-tag">SKIP</span>
                  <button class="remove-skip-btn" onclick="removeSkipRange('${r.cid||c.client_id}','${r.weeks.join(',')}')">&#10005;</button>
                </div>
              </div>`).join('')}
          </div>`:''}

        <hr class="divider"/>
        <div class="notes-section">
          <div class="section-title">Notes</div>
          <div class="note-form">
            <select id="noteAction" onchange="toggleNoteDateField()">
              ${ACTION_TYPES.map(a=>`<option value="${a.value}">${a.label}</option>`).join('')}
            </select>
            <input type="date" id="noteActionDate" style="display:none"/>
            <input type="text" id="noteText" placeholder="Add a note…" onkeydown="if(event.key==='Enter'){event.preventDefault();submitNote('${baseId}');}"/>
            <button class="btn-note-add" onclick="submitNote('${baseId}')">Add</button>
          </div>
          <div id="notesTableWrap" class="notes-list-wrap">
            <div class="loading">Loading notes…</div>
          </div>
        </div>
      </div>
    </div>`;

  // Set default action to Note
  const sel = document.getElementById('noteAction');
  if(sel) sel.value = 'Note';
  toggleNoteDateField();

  // Load notes using base ID
  const notes = await loadNotes(baseId);
  renderNotesTable(notes);
}

function toggleNoteDateField(){
  const sel=document.getElementById('noteAction');
  const dateIn=document.getElementById('noteActionDate');
  if(!sel||!dateIn) return;
  const action=ACTION_TYPES.find(a=>a.value===sel.value);
  dateIn.style.display=action&&action.needsDate?'':'none';
}

function renderNotesTable(notes){
  const wrap=document.getElementById('notesTableWrap');
  if(!wrap) return;
  if(!notes.length){
    wrap.innerHTML='<div style="padding:8px;text-align:center;color:var(--gray-400);font-size:11px">No notes yet</div>';
    return;
  }
  wrap.innerHTML=notes.map(n=>{
    const at=ACTION_TYPES.find(a=>a.value===n.action)||{tag:'at-note'};
    return `<div class="note-row">
      <div class="note-row-header">
        <span class="note-meta">${fmtTimestamp(n.created_at)}</span>
        <span class="note-user">${n.user_id||''}</span>
        <span class="action-tag ${at.tag}">${n.action}</span>
        ${n.action_date?`<span style="font-size:10px;color:var(--teal);font-weight:600">${fmtDate(n.action_date)}</span>`:''}
      </div>
      ${n.note?`<div class="note-row-body">${n.note}</div>`:''}
    </div>`;
  }).join('');
}

async function submitNote(baseId){
  const action=document.getElementById('noteAction').value;
  const dateIn=document.getElementById('noteActionDate');
  const textIn=document.getElementById('noteText');
  const noteText=textIn.value.trim();
  const actionType=ACTION_TYPES.find(a=>a.value===action);
  const actionDate=actionType&&actionType.needsDate?dateIn.value:null;

  if(actionType&&actionType.needsDate&&!actionDate){
    toast('Select a date for this action');return;
  }

  const {error}=await db.from('notes').insert({
    client_id:baseId,
    user_id:currentUser?currentUser.display_name:'',
    action:action,
    action_date:actionDate||null,
    note:noteText
  });
  if(error){toast('Error: '+error.message);return;}
  textIn.value='';
  dateIn.value='';
  toast('Note added',true);
  const notes=await loadNotes(baseId);
  renderNotesTable(notes);
}

async function addSkipRangeAll(){
  if(!activeClient) return;
  const start=document.getElementById('skipStart')?.value;
  const end=document.getElementById('skipEnd')?.value;
  if(!start||!end){toast('Select start and end dates');return;}
  const weeks=getDaysInRange(start,end);
  if(!weeks.length){toast('End date must be on or after start date');return;}

  const related=getRelatedClients(activeClient);
  // For multi-day clients, check which day buttons are active
  const dayBtns=[...document.querySelectorAll('.skip-day-btn.inq-active')];
  const skipIds=dayBtns.length>0?dayBtns.map(b=>b.dataset.skipid):related.map(r=>r.client_id);

  const records=[];
  skipIds.forEach(cid=>{
    weeks.forEach(w=>{
      records.push({client_id:cid,skip_week:w,inquiry_method:selectedInquiry,logged_by:currentUser?currentUser.display_name:null});
    });
  });

  const {error}=await db.from('skips').upsert(records,{onConflict:'client_id,skip_week'});
  if(error){toast('Error: '+error.message);return;}
  await loadSkips();
  showPanel(activeClient);
  toast(`Skip logged — ${weeks.length===1?fmtDate(weeks[0]):weeks.length+' weeks'}`,true);
}


// ── SKIP LOGIC ───────────────────────────────────────────────────────
function groupSkipRanges(cSkips){
  if(!cSkips.length) return [];
  const sorted=[...cSkips].sort((a,b)=>a.skip_week>b.skip_week?1:-1);
  const ranges=[];
  let cur={weeks:[sorted[0].skip_week],method:sorted[0].inquiry_method,loggedBy:sorted[0].logged_by,cid:sorted[0].client_id};
  for(let i=1;i<sorted.length;i++){
    const prev=new Date(sorted[i-1].skip_week+'T00:00:00');
    const curr=new Date(sorted[i].skip_week+'T00:00:00');
    const diff=(curr-prev)/(1000*60*60*24*7);
    if(diff===1&&sorted[i].inquiry_method===cur.method&&sorted[i].logged_by===cur.loggedBy&&sorted[i].client_id===cur.cid){
      cur.weeks.push(sorted[i].skip_week);
    } else {
      ranges.push(cur);
      cur={weeks:[sorted[i].skip_week],method:sorted[i].inquiry_method,loggedBy:sorted[i].logged_by,cid:sorted[i].client_id};
    }
  }
  ranges.push(cur);
  return ranges.map(r=>({
    ...r,
    label: r.weeks.length===1
      ? fmtDate(r.weeks[0])
      : `${fmtDate(r.weeks[0])} — ${fmtDate(r.weeks[r.weeks.length-1])} (${r.weeks.length} wk)`
  }));
}

function getDaysInRange(startISO, endISO){
  const days=[];
  const start=new Date(startISO+'T00:00:00');
  const end=new Date(endISO+'T00:00:00');
  if(start>end) return [];
  // Snap both to Monday
  const snapMon=d=>{const diff=(d.getDay()===0?-6:1-d.getDay());d.setDate(d.getDate()+diff);return d;};
  const s=snapMon(new Date(start));
  const e=snapMon(new Date(end));
  const cur=new Date(s);
  while(cur<=e){
    days.push(cur.toISOString().split('T')[0]);
    cur.setDate(cur.getDate()+7);
  }
  return days;
}

function updateSkipPreview(){
  const start=document.getElementById('skipStart')?.value;
  const end=document.getElementById('skipEnd')?.value;
  const preview=document.getElementById('skipPreview');
  if(!preview) return;
  if(!start||!end){preview.innerHTML='';return;}
  const weeks=getDaysInRange(start,end);
  if(!weeks.length){
    preview.innerHTML=`<div class="skip-preview-warn">End date must be on or after start date</div>`;
    return;
  }
  const label=weeks.length===1
    ? `Skipping ${fmtDate(weeks[0])}`
    : `Skipping ${weeks.length} weeks — ${fmtDate(weeks[0])} through ${fmtDate(weeks[weeks.length-1])}`;
  preview.innerHTML=`<div class="skip-preview-ok">&#10003; ${label}</div>`;
}

let selectedInquiry='phone';
function selectInquiry(method){

async function removeSkipRange(cid, weeksStr){
  const weeks=weeksStr.split(',');
  for(const w of weeks){
    await db.from('skips').delete().eq('client_id',cid).eq('skip_week',w);
  }
  await loadSkips();
  showPanel(activeClient);
  toast(`Skip${weeks.length>1?'s':''} removed`);
}


function jumpToClient(cid){
  const c=clients.find(x=>x.client_id===cid);
  if(!c) return;
  openClient(c);
}

async function generateReport(){
  const date=document.getElementById('reportDate').value;
  if(!date){toast('Select a date');return;}
  const results=document.getElementById('reportResults');
  results.innerHTML='<div class="loading">Loading…</div>';

  const {data,error}=await db.from('notes').select('*').eq('action_date',date).order('action').order('created_at');
  if(error){toast('Error: '+error.message);return;}
  if(!data||!data.length){
    results.innerHTML='<div class="empty-state">No action items for '+fmtDate(date)+'</div>';
    return;
  }

  // Group by action
  const grouped={};
  data.forEach(n=>{
    if(!grouped[n.action]) grouped[n.action]=[];
    grouped[n.action].push(n);
  });

  let html=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem">
      <div style="font-size:13px;font-weight:600;color:var(--navy)">${data.length} action item${data.length!==1?'s':''} for ${fmtDate(date)}</div>
      <button class="btn-add" onclick="printReport('${date}')">Print Report</button>
    </div>`;

  Object.entries(grouped).forEach(([action,notes])=>{
    const at=ACTION_TYPES.find(a=>a.value===action)||{tag:'at-note'};
    html+=`<div class="report-group">
      <div class="report-group-header">
        <span>${action}</span>
        <span>${notes.length}</span>
      </div>`;
    notes.forEach(n=>{
      const c=clients.find(x=>x.client_id===n.client_id)||{};
      html+=`<div class="report-row">
        <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--gray-400);width:50px;flex-shrink:0">${n.client_id}</span>
        <span style="font-weight:600;width:120px;flex-shrink:0">${c.client_name||''}</span>
        <span style="flex:1">${c.address||''}</span>
        <span style="width:90px;flex-shrink:0;color:var(--gray-500)">${c.phone||''}</span>
        <span style="flex:1;font-family:'Courier New',monospace;font-size:11px">${n.note||''}</span>
      </div>`;
    });
    html+=`</div>`;
  });

  results.innerHTML=html;
}

// ── ADD CLIENT ────────────────────────────────────────────────────────
function renderAdd(){
  const nextId=clients.length>0
    ? String(Math.max(...clients.map(c=>parseInt(c.client_id.replace(/-\d+$/,''))||0))+1).padStart(4,'0')
    : '0001';
  document.getElementById('tab-add').innerHTML=`
    <div class="form-card">
      <h2>Add New Client</h2>
      <div class="form-row">
        <div class="form-group"><label>Client ID</label><input id="nId" value="${nextId}"/></div>
        <div class="form-group"><label>Client Name</label><input id="nName" placeholder="e.g. John Smith"/></div>
      </div>
      <div class="form-group"><label>Street Address</label><input id="nAddr" placeholder="e.g. 47 Polpis Rd"/></div>
      <div class="form-row">
        <div class="form-group"><label>Phone</label><input id="nPhone" placeholder="(508) 228-0000"/></div>
        <div class="form-group"><label>Email</label><input id="nEmail" placeholder="email@example.com" onkeydown="if(event.key==='Enter'){event.preventDefault();addClient();}"/></div>
      </div>
      <div class="form-group">
        <label>Pickup Day(s)</label>
        <div class="day-toggle-grid">
          ${DAYS.map(d=>`
            <button type="button" class="day-toggle" data-day="${d}" onclick="toggleDay(this)">
              <span class="day-abbr">${d.slice(0,3)}</span>
              <span class="day-full">${d}</span>
            </button>`).join('')}
        </div>
      </div>
      <button class="btn-add" onclick="addClient()">Add Client</button>
      <div id="addMsg" style="margin-top:8px;font-size:12px;min-height:16px;"></div>
    </div>`;
}

function toggleDay(btn){ btn.classList.toggle('day-toggle-active'); }

async function addClient(){
  const id=document.getElementById('nId').value.trim();
  const name=document.getElementById('nName').value.trim();
  const addr=document.getElementById('nAddr').value.trim();
  const phone=document.getElementById('nPhone').value.trim();
  const email=document.getElementById('nEmail').value.trim();
  const selectedDays=[...document.querySelectorAll('.day-toggle-active')].map(b=>b.dataset.day);
  if(!id||!addr){toast('Client ID and address are required');return;}
  if(!selectedDays.length){toast('Select at least one pickup day');return;}

  const addrLower=addr.toLowerCase().trim();
  const nameLower=name.toLowerCase().trim();
  const dupes=clients.filter(c=>{
    const sameAddr=c.address.toLowerCase().trim()===addrLower;
    const sameName=nameLower&&c.client_name&&c.client_name.toLowerCase().trim()===nameLower;
    return sameAddr||sameName;
  });

  if(dupes.length){
    const dupeList=dupes.map(c=>`${c.client_name||''}${c.client_name?' — ':''}${c.client_id} (${c.service_day})`).join(', ');
    const msg=document.getElementById('addMsg');
    msg.style.color='var(--warn-text)';
    msg.innerHTML=`
      <div style="background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:var(--radius-sm);padding:8px 10px;margin-bottom:8px">
        <strong>Possible duplicate</strong><br/>
        <span style="font-size:12px">${dupeList}</span>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn-add" style="flex:1;background:var(--gray-400)" onclick="renderAdd()">Cancel</button>
        <button class="btn-add" style="flex:2" onclick="forceAddClient('${id}','${selectedDays.join(',')}','${addr.replace(/'/g,"\\'")}','${phone}','${email}','${name.replace(/'/g,"\\'")}')">Add Anyway</button>
      </div>`;
    return;
  }

  await saveClient(id,selectedDays,addr,phone,email,name);
}

async function forceAddClient(id,daysStr,addr,phone,email,name){
  await saveClient(id,daysStr.split(','),addr,phone,email,name);
}

async function saveClient(id,selectedDays,addr,phone,email,name){
  const msg=document.getElementById('addMsg');
  if(msg){msg.style.color='var(--gray-400)';msg.textContent='Saving…';}
  const records=selectedDays.map((day,i)=>({
    client_id: selectedDays.length===1 ? id : `${id}-${i+1}`,
    service_day: day,
    address: addr,
    phone: phone||null,
    email: email||null,
    client_name: name||null,
  }));
  const {error}=await db.from('clients').insert(records);
  if(error){toast('Error: '+error.message);if(msg)msg.textContent='';return;}
  await loadClients();
  if(msg){msg.style.color='var(--ok-text)';msg.textContent=`Client ${id} added — ${selectedDays.join(', ')}`;}
  toast(`Client ${id} added`,true);
  setTimeout(()=>renderAdd(), 1800);
}

// ── IMPORT ────────────────────────────────────────────────────────────
function renderImport(){
  document.getElementById('tab-import').innerHTML=`
    <div class="form-card" style="margin-bottom:0.75rem">
      <h2>Import Clients from CSV</h2>
      <p style="font-size:12px;color:var(--gray-400);margin-bottom:1rem">
        CSV headers: <code style="font-family:'DM Mono',monospace;font-size:11px;background:var(--gray-100);padding:2px 6px;border-radius:4px">client_id, service_day, address, phone</code>
      </p>
      <div class="import-zone" onclick="document.getElementById('csvIn').click()">
        <svg class="import-zone-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <h3>Click to upload CSV</h3>
        <p>or drag and drop</p>
        <input type="file" id="csvIn" accept=".csv" style="display:none" onchange="handleCSV(this)"/>
      </div>
    </div>
    <div id="importPreview"></div>`;
}

function handleCSV(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split('\n').filter(l=>l.trim());
    const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase());
    const rows=lines.slice(1).map(line=>{
      const vals=line.split(',').map(v=>v.trim().replace(/^"|"$/g,''));
      const obj={};
      headers.forEach((h,i)=>obj[h]=vals[i]||'');
      return obj;
    }).filter(r=>r.client_id&&r.address);

    const preview=document.getElementById('importPreview');
    const safeRows=JSON.stringify(rows).replace(/'/g,"\\'");
    preview.innerHTML=`
      <div class="import-preview">
        <div class="import-preview-header">
          <h3>${rows.length.toLocaleString()} clients ready</h3>
          <button class="btn-add" onclick='doImport(${safeRows})'>Import All</button>
        </div>
        ${rows.slice(0,6).map(r=>`
          <div class="preview-row">
            <span class="p-id">${r.client_id}</span>
            <span class="p-addr">${r.address}</span>
            <span class="p-day">${r.service_day}</span>
          </div>`).join('')}
        ${rows.length>6?`<p style="font-size:12px;color:var(--gray-400);margin-top:8px">…and ${(rows.length-6).toLocaleString()} more</p>`:''}
      </div>`;
  };
  reader.readAsText(file);
}

async function doImport(rows){
  const batchSize=500;
  let done=0;
  for(let i=0;i<rows.length;i+=batchSize){
    const chunk=rows.slice(i,i+batchSize);
    const {error}=await db.from('clients').upsert(chunk,{onConflict:'client_id'});
    if(error){toast('Import error: '+error.message);return;}
    done+=chunk.length;
  }
  await loadClients();
  toast(`${done.toLocaleString()} clients imported`,true);
  document.getElementById('importPreview').innerHTML=
    '<div class="empty-state" style="color:var(--ok-text);font-weight:500">Import complete — '+done.toLocaleString()+' clients loaded.</div>';
}

// ── TOAST ─────────────────────────────────────────────────────────────
function toast(msg,ok=false){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show'+(ok?' ok':'');
  clearTimeout(t._to);
  t._to=setTimeout(()=>t.classList.remove('show'),2600);
}

if(_saved && _saved !== '1'){
