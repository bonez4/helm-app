async function loadActivityReport(){
  const date=document.getElementById('activityDate').value;
  if(!date) return;
  const wrap=document.getElementById('activityReportWrap');
  wrap.innerHTML='<div class="loading" style="padding:10px 0">Loading…</div>';
  const start=date+'T00:00:00', end=date+'T23:59:59';
  const [{data:hb},{data:acts}]=await Promise.all([
    db.from('heartbeats').select('*').gte('ts',start).lte('ts',end).order('ts'),
    db.from('activity_log').select('*').gte('ts',start).lte('ts',end).order('ts')
  ]);
  if(!hb?.length&&!acts?.length){
    wrap.innerHTML='<div style="padding:10px 0;color:var(--gray-400);font-size:12px">No activity recorded for this date.</div>';
    return;
  }
  const users=[...new Set([...(hb||[]).map(h=>h.user_id),...(acts||[]).map(a=>a.user_id)])].sort();
  const ACTION_LABELS={'client_lookup':'lookups','note_added':'notes added','report_generated':'reports run','rolloff_edit':'rolloff edits'};
  let html='<div class="activity-wrap">';
  users.forEach(user=>{
    const userHb=(hb||[]).filter(h=>h.user_id===user).map(h=>new Date(h.ts)).sort((a,b)=>a-b);
    const userActs=(acts||[]).filter(a=>a.user_id===user);
    let activeMin=0;
    let firstSeen=null,lastSeen=null;
    if(userHb.length){
      firstSeen=userHb[0]; lastSeen=userHb[userHb.length-1];
      for(let i=1;i<userHb.length;i++){
        const gap=(userHb[i]-userHb[i-1])/60000;
        if(gap<=10) activeMin+=gap;
      }
      activeMin+=5;
    }
    const counts={};
    userActs.forEach(a=>{counts[a.action]=(counts[a.action]||0)+1;});
    const actStr=Object.entries(counts).map(([k,v])=>`${v} ${ACTION_LABELS[k]||k}`).join(' &middot; ')||'No actions logged';
    const hrs=Math.floor(activeMin/60), mins=Math.round(activeMin%60);
    const durStr=activeMin>0?(hrs>0?`${hrs}h ${mins}m active`:`${mins}m active`):'';
    const timeStr=firstSeen?`${fmtTime(firstSeen)} &rarr; ${fmtTime(lastSeen)}`:'No heartbeat data';
    html+=`<div class="activity-row">
      <div class="activity-user">${esc(user)}</div>
      <div class="activity-time">${timeStr}${durStr?' &nbsp;&middot;&nbsp; <strong>'+durStr+'</strong>':''}</div>
      <div class="activity-acts">${actStr}</div>
    </div>`;
  });
  html+='</div>';
  wrap.innerHTML=html;
}

function handleCSV(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split('\n').filter(l=>l.trim());
    const headers=parseCSVLine(lines[0]).map(h=>h.replace(/^"|"$/g,'').toLowerCase());
    const rawRows=lines.slice(1).map(line=>{
      const vals=parseCSVLine(line);
      const obj={};
      headers.forEach((h,i)=>obj[h]=vals[i]||'');
      return obj;
    }).filter(r=>r.client_id&&r.address);

    // Dedupe by client_id (keep first occurrence)
    const seen={};
    const rows=rawRows.filter(r=>{
      if(seen[r.client_id]) return false;
      seen[r.client_id]=true;
      return true;
    });

    pendingImport=rows;
    const preview=document.getElementById('importPreview');
    preview.innerHTML=`
      <div class="import-preview">
        <div class="import-preview-header">
          <h3>${rows.length.toLocaleString()} clients ready</h3>
          <button class="btn-add" onclick="doImport(pendingImport)">Import All</button>
        </div>
        ${rows.slice(0,6).map(r=>`
          <div class="preview-row">
            <span class="p-id">${esc(r.client_id)}</span>
            <span class="p-name">${esc(r.client_name||'')}</span>
            <span class="p-addr">${esc(r.address)}</span>
          </div>`).join('')}
        ${rows.length>6?`<p style="font-size:12px;color:var(--gray-400);margin-top:8px">…and ${(rows.length-6).toLocaleString()} more</p>`:''}
      </div>`;
  };
  reader.readAsText(file);
}

async function doImport(rows){
  const batchSize=500;
  let done=0;
  for(let i=0;i<rows.length;i+=batchSize){
    const chunk=rows.slice(i,i+batchSize);
    const {error}=await db.from('clients').upsert(chunk,{onConflict:'client_id'});
    if(error){toast('Import error: '+error.message);return;}
    done+=chunk.length;
  }
  await loadClients();
  toast(`${done.toLocaleString()} clients imported`,true);
  document.getElementById('importPreview').innerHTML=
    '<div class="empty-state" style="color:var(--ok-text);font-weight:500">Import complete — '+done.toLocaleString()+' clients loaded.</div>';
}

function handleRolloffCSV(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split('\n').filter(l=>l.trim());
    const headers=parseCSVLine(lines[0]).map(h=>h.replace(/^"|"$/g,'').toLowerCase().replace(/\s+/g,'_'));
    const rows=lines.slice(1).map(line=>{
      const vals=parseCSVLine(line);
      const obj={};
      headers.forEach((h,i)=>obj[h]=vals[i]||'');

    }).filter(r=>r.customer||r.street);

    // Normalize dates (handle MM/DD/YYYY -> YYYY-MM-DD)
    rows.forEach(r=>{

        const parts=r.date.split('/');
        if(parts.length===3){
          const [m,d,y]=parts;
          r.date=`${y.length===2?'20'+y:y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;

      <div class="import-preview">

const IRR_ROLLOFF_SVC = ['ROLLOFF DELIVERY','ROLLOFF DOUBLE DROP','EMPTY ROLLOFF','EMPTY ROLL-OFF'];
// Per-unit fees. Prices fixed in HELM since scale file rates are often $0/EA.
// bucket='hook'     → counts as Reis hook fee (rolloffFees) like delivery/empty/double-drop
// bucket='disposal' → routed by the ticket: on a Reis rolloff ticket, goes to tonnage rev
//                     (reis.tipRevenue); otherwise walk-in revenue (walkin.tipRevenue).
const IRR_PER_UNIT_FEES = [
  {kw:'MATTRESS LANDFILL DISPOSAL FEE', price:50,   bucket:'disposal'},
  {kw:'STOVE DISHWASH APPLIANCE DISP',  price:11,   bucket:'disposal'},
  {kw:'FRION LANDFILL DISPOSAL FEE',    price:45,   bucket:'disposal'},
  {kw:'MONITOR LANDFILL DISPOSAL FEE',  price:16.5, bucket:'disposal'},
  {kw:'DUMPTIRE',                       price:16.5, bucket:'disposal'},
  {kw:'MOVE ROLLOFF ON JOB SITE',       price:60,   bucket:'hook'},
];
// Rolloff service fees — hardcoded rate schedule effective on/after IRR_ROLLOFF_RATE_CHANGE_ISO.
// Reports dated before this still use the dollar amount shown on the scale file (historical preserved).
const IRR_ROLLOFF_RATE_CHANGE_ISO = '2026-04-17';
const IRR_ROLLOFF_FIXED_PRICES = {
  'ROLLOFF DELIVERY':    100,
  'ROLLOFF DOUBLE DROP': 250,
  'EMPTY ROLLOFF':       250,
  'EMPTY ROLL-OFF':      250,
};
function mdyToIso(mdy){
  if(!mdy) return null;
  const p = mdy.split('/');
  if(p.length!==3) return null;
  return p[2]+'-'+p[0].padStart(2,'0')+'-'+p[1].padStart(2,'0');
}
function rolloffSvcFeeForDate(kw, reportIsoDate, fileAmount){
  if(reportIsoDate && reportIsoDate >= IRR_ROLLOFF_RATE_CHANGE_ISO){
    const fixed = IRR_ROLLOFF_FIXED_PRICES[kw];
    if(fixed != null) return fixed;
  }
  return fileAmount;
}
let irrCurrentData = null;
let irrRendered = false;

// Company rates (loaded from irr_rates table)
let irrRates = null;
async function irrLoadRates() {
  if (irrRates) return irrRates;
  const {data} = await db.from('irr_rates').select('*');
  irrRates = {};
  if (data) for (const r of data) irrRates[r.company] = r;
  return irrRates;
}

// Rate cutoff: reports on/after this date use current irr_rates table values.
// Reports before use IRR_OLD_RATES. Keeps historical math stable after the 4/17/2026 price change.
const IRR_RATE_CUTOFF = '2026-04-17';
const IRR_OLD_RATES = {
  island: {hook_fee:250, per_ton:480, ton_markup:0},
  eastend: {hook_fee:200, per_ton:380, ton_markup:0.10},
};
function irrRatesFor(reportDate) {
  let iso = reportDate;
  if (iso && iso.includes('/')) {
    const p = iso.split('/');
    iso = p[2]+'-'+String(p[0]).padStart(2,'0')+'-'+String(p[1]).padStart(2,'0');
  }
  const useNew = !iso || iso >= IRR_RATE_CUTOFF;
  return {
    ir: useNew ? (irrRates?irrRates.island:null) : IRR_OLD_RATES.island,
    er: useNew ? (irrRates?irrRates.eastend:null) : IRR_OLD_RATES.eastend,
  };
}

function irrCalcRevenue(buckets, reportDate) {
  const {ir, er} = irrRatesFor(reportDate);
  if (ir) {
    buckets.island.revenue = (ir.hook_fee * buckets.island.tickets) + ((ir.per_ton * (1 + (ir.ton_markup||0))) * buckets.island.tons);
  }
  if (er) {
    buckets.santos.revenue = (er.hook_fee * buckets.santos.tickets) + ((er.per_ton * (1 + (er.ton_markup||0))) * buckets.santos.tons);
  }
}

function irrParseSpreadsheetML(xmlText) {
  xmlText = xmlText.replace(/<\?[^?]*\?>/g, '');
  const result = [];
  const rowRx = /<(?:ss:)?Row[^>]*>([\s\S]*?)<\/(?:ss:)?Row>/gi;
  let rm;
  while ((rm = rowRx.exec(xmlText)) !== null) {
    const rc = rm[1], vals = [];
    const cellRx = /<(?:ss:)?Cell([^>]*)>([\s\S]*?)<\/(?:ss:)?Cell>/gi;
    let cm, ci = 0;
    while ((cm = cellRx.exec(rc)) !== null) {
      const idxM = cm[1].match(/ss:Index="(\d+)"/);
      if (idxM) { const t = parseInt(idxM[1])-1; while(ci<t){vals.push('');ci++;} }
      const dm = cm[2].match(/<(?:ss:)?Data[^>]*>([\s\S]*?)<\/(?:ss:)?Data>/i);
      vals.push(dm ? dm[1].trim() : '');
      ci++;
    }
    result.push(vals);
  }
  return result;
}

function irrParseReport(rows) {
  let reportDate = null;
  const firstRow = rows[0] ? rows[0].join(' ') : '';
  const dateMatch = firstRow.match(/(\d{1,2}\/\d{1,2}\/\d{4})/);
  if (dateMatch) reportDate = dateMatch[1];

  const tickets = {};
  let currentCode = null, parentCode = null;
  const codeStack = [];

  for (let i = 0; i < rows.length; i++) {
    const vals = rows[i];
    const nonEmpty = vals.filter(v => v && v.trim());
    if (!nonEmpty.length) continue;
    const first = nonEmpty[0];
    const isHeader = first.includes(' - ') && !first.includes('Totals') && !first.includes('Tickets:')
      && !first.includes('TIPFEES') && !first.includes('ROLLOFFS') && !first.includes('No Order')
      && !first.startsWith('Page ') && !first.includes('Date Range') && first.trim()!=='Date' && !first.includes('Report');
    const isTotals = first.includes(' - ') && first.includes('Totals') && !first.includes('TIPFEES') && !first.includes('Non Order');

    if (isHeader) { const c=first.split(' - ')[0].trim(); codeStack.push(c); currentCode=c; parentCode=codeStack.length>1?codeStack[0]:null; }
    if (isTotals) { const c=first.split(' - ')[0].trim(); const idx=codeStack.lastIndexOf(c); if(idx!==-1)codeStack.splice(idx,1); currentCode=codeStack.length>0?codeStack[codeStack.length-1]:null; parentCode=codeStack.length>1?codeStack[0]:null; }

    const effectiveCode = (parentCode && parentCode.startsWith('ZZ')) ? parentCode : currentCode;
    if (!effectiveCode) continue;
    const flatUpper = vals.join(' ').toUpperCase();
    const dataVals = vals.filter(v => v!==null && v!=='' && v!==undefined);

    if (flatUpper.includes('REIS SITE TRANSFER FEE')) {
      const fi = dataVals.findIndex(v => v && v.includes('REIS SITE TRANSFER FEE'));
      if (fi!==-1 && fi+2<dataVals.length) {
        const ticket=dataVals[1]||'?', net=parseFloat(dataVals[fi+2])||0;
        if(!tickets[ticket]) tickets[ticket]={tons:0,service:null,code:effectiveCode};
        tickets[ticket].tons+=net;
        if(!tickets[ticket].service) tickets[ticket].code=effectiveCode;
      }
    }
    for (const kw of IRR_ROLLOFF_SVC) {
      if (flatUpper.includes(kw)) {
        const ticket=dataVals[1]||'?';
        if(!tickets[ticket]) tickets[ticket]={tons:0,service:null,code:effectiveCode};
        tickets[ticket].service=kw; tickets[ticket].code=effectiveCode; break;
      }
    }
  }

  const buckets = {
    reis:{label:'Reis Rolloff',tons:0,tickets:0,tipRevenue:0,rolloffFees:0,deliveries:0,empties:0,doubleDrops:0},
    pile:{label:'Pile Pickups (Reis)',tons:0,tickets:0},
    island:{label:'Island Rubbish',tons:0,tickets:0},
    santos:{label:'East End',tons:0,tickets:0},
    vinagro:{label:'VINAGRO Output',tons:0,tickets:0},
    walkin:{label:'Walk-In / Drive-Through',tons:0,tickets:0,tipRevenue:0},
  };

  for (const [tn,t] of Object.entries(tickets)) {
    const c=t.code;
    if(c==='ZZISLAND'){buckets.island.tons+=t.tons;buckets.island.tickets++;}
    else if(c==='ZZEASTEND'){buckets.santos.tons+=t.tons;buckets.santos.tickets++;}
    else if(c==='ZZDELTA'){buckets.pile.tons+=t.tons;buckets.pile.tickets++;}
    else if(c==='ZZREIS'){buckets.vinagro.tons+=t.tons;buckets.vinagro.tickets++;}
    else if(c.startsWith('ZZ')){buckets.walkin.tons+=t.tons;buckets.walkin.tickets++;}
    else if(t.service!==null){
      buckets.reis.tons+=t.tons;buckets.reis.tickets++;
      if(t.service.includes('DELIVERY'))buckets.reis.deliveries++;
      else if(t.service.includes('DOUBLE DROP'))buckets.reis.doubleDrops++;
      else if(t.service.includes('EMPTY'))buckets.reis.empties++;
    } else {buckets.walkin.tons+=t.tons;buckets.walkin.tickets++;}
  }

  // Revenue pass — scan for tip fee rates and rolloff service fees
  let revCode2 = null, parentCode2 = null;
  const revStack2 = [];
  for (let i = 0; i < rows.length; i++) {
    const vals = rows[i];
    const nonEmpty = vals.filter(v => v && v.trim());
    if (!nonEmpty.length) continue;
    const first = nonEmpty[0];
    const isHdr = first.includes(' - ') && !first.includes('Totals') && !first.includes('Tickets:')
      && !first.includes('TIPFEES') && !first.includes('ROLLOFFS') && !first.includes('No Order')
      && !first.startsWith('Page ') && !first.includes('Date Range') && first.trim()!=='Date' && !first.includes('Report');
    const isTot = first.includes(' - ') && first.includes('Totals') && !first.includes('TIPFEES') && !first.includes('Non Order');
    if (isHdr) { const c=first.split(' - ')[0].trim(); revStack2.push(c); revCode2=c; parentCode2=revStack2.length>1?revStack2[0]:null; }
    if (isTot) { const c=first.split(' - ')[0].trim(); const idx=revStack2.lastIndexOf(c); if(idx!==-1)revStack2.splice(idx,1); revCode2=revStack2.length>0?revStack2[revStack2.length-1]:null; parentCode2=revStack2.length>1?revStack2[0]:null; }
    const rc = (parentCode2 && parentCode2.startsWith('ZZ')) ? parentCode2 : revCode2;
    if (!rc) continue;
    const flatUpper = vals.join(' ').toUpperCase();
    const dataVals = vals.filter(v => v!==null && v!=='' && v!==undefined);

    // Tip fee revenue
    if (flatUpper.includes('REIS SITE TRANSFER FEE')) {
      const fi = dataVals.findIndex(v => v && v.includes('REIS SITE TRANSFER FEE'));
      if (fi!==-1 && fi+2<dataVals.length) {
        const ticket=dataVals[1]||'?';
        const net=parseFloat(dataVals[fi+2])||0;
        const rateStr=dataVals[fi+3]||'';
        const rateMatch=rateStr.match(/\$([0-9.]+)/);
        if (rateMatch && tickets[ticket]) {
          const rev=net*parseFloat(rateMatch[1]);
          const tc=tickets[ticket].code, svc=tickets[ticket].service;
          if (!tc.startsWith('ZZ') && svc!==null) buckets.reis.tipRevenue+=rev;
          else if (!tc.startsWith('ZZ') && svc===null) buckets.walkin.tipRevenue+=rev;
          else if (tc.startsWith('ZZ') && tc!=='ZZISLAND' && tc!=='ZZEASTEND' && tc!=='ZZDELTA' && tc!=='ZZREIS') buckets.walkin.tipRevenue+=rev;
        }
      }
    }
    // Rolloff service fees (Reis only, not ZZ). Uses hardcoded rate on/after rate-change date.
    for (const kw of IRR_ROLLOFF_SVC) {
      if (flatUpper.includes(kw) && !rc.startsWith('ZZ')) {
        let fileAmt = 0;
        const kwIdx = dataVals.findIndex(v => v && v.toUpperCase().includes(kw));
        if (kwIdx >= 0) {
          for (let j=dataVals.length-1;j>kwIdx;j--) {
            const amt=parseFloat(dataVals[j]);
            if (!isNaN(amt) && amt>0) { fileAmt=amt; break; }
          }
        }
        const reportIso = mdyToIso(reportDate);
        const fee = rolloffSvcFeeForDate(kw, reportIso, fileAmt);
        if (fee > 0) buckets.reis.rolloffFees += fee;
        break;
      }
    }
    // Per-unit fees (hook vs disposal). Hook fees add to reis.rolloffFees like deliveries.
    // Disposal fees follow the ticket: rolloff ticket -> reis.tipRevenue; else walk-in.
    for (const item of IRR_PER_UNIT_FEES) {
      if (flatUpper.includes(item.kw)) {
        const kwIdx = dataVals.findIndex(v => v && v.toUpperCase().includes(item.kw));
        if (kwIdx >= 0 && kwIdx+1 < dataVals.length) {
          const qty = parseFloat(dataVals[kwIdx+1]) || 0;
          const rev = qty * item.price;
          if (rev > 0) {
            const ticket = dataVals[1] || '?';
            const t = tickets[ticket];
            const tc = t ? t.code : rc;
            const svc = t ? t.service : null;
            const isZZwalkin = tc.startsWith('ZZ') && tc!=='ZZISLAND' && tc!=='ZZEASTEND' && tc!=='ZZDELTA' && tc!=='ZZREIS';
            if (item.bucket === 'hook') {
              if (!tc.startsWith('ZZ')) buckets.reis.rolloffFees += rev;
              else if (isZZwalkin) buckets.walkin.tipRevenue += rev;
            } else {
              // disposal
              if (!tc.startsWith('ZZ') && svc !== null) buckets.reis.tipRevenue += rev;
              else if (!tc.startsWith('ZZ') && svc === null) buckets.walkin.tipRevenue += rev;
              else if (isZZwalkin) buckets.walkin.tipRevenue += rev;
            }
          }
        }
        break;
      }
    }
  }

  return {date:reportDate, buckets, tickets};
}

function irrFmtDate(dateStr) {
  if(!dateStr) return 'Today';
  const d=new Date(dateStr);
  return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}
function irrFmt(n,dec=2){return (isNaN(n)||n===null||n===undefined)?'--':n.toFixed(dec);}
function irrFmtMoney(n){return '$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}

// Generates the daily scale summary email in the four-section format:
//   1. Internal Volume — rolloff tonnage (Reis + Island + East End)
//   2. External Volume — walk-in tonnage
//   3. Outbound        — Vinagro tonnage hauled to mainland
//   4. Revenue         — total $ + $/ton derived metric
// Each section uses a uniform 5-row layout: Today / MTD / MTD YoY / YTD / YTD YoY.
// YoY rows show the prior-period value plus a percent delta in accounting
// convention (positive: "5.2%", negative: "(5.2%)").
function irrGenerateEmail(data, ytd) {
  const {date, buckets} = data;
  const displayDate = irrFmtDate(date);
  const subject = 'IRR Scale Report — '+(date||'Today');

  // Today's revenue is computed fresh from buckets (post-4/17 hook fee logic);
  // prior-period revenue comes from DB-stored values which had the same
  // logic applied at upload time.
  const {reis,island,santos,walkin} = buckets;
  const {ir, er} = irrRatesFor(date);
  const islandHook   = (ir ? ir.hook_fee : 250) * (island.tickets||0);
  const santosHook   = (er ? er.hook_fee : 250) * (santos.tickets||0);
  const islandTonRev = (island.revenue||0) - islandHook;
  const santosTonRev = (santos.revenue||0) - santosHook;
  const rolloffRevToday = (reis.rolloffFees||0) + islandHook + santosHook
                        + (reis.tipRevenue||0)  + islandTonRev + santosTonRev;
  const totalRevToday   = rolloffRevToday + (walkin.tipRevenue||0);

  // Period buckets — sums by period from irrLoadYTD.
  const t = ytd.today || {rolloff:0,walkin:0,vin:0,rollRev:0,walkRev:0};
  const m = ytd.mtd   || {rolloff:0,walkin:0,vin:0,rollRev:0,walkRev:0};
  const y = ytd.ytd   || {rolloff:0,walkin:0,vin:0,rollRev:0,walkRev:0};
  const my= ytd.mtdYoy|| {rolloff:0,walkin:0,vin:0,rollRev:0,walkRev:0};
  const yo= ytd.yoy   || {rolloff:0,walkin:0,vin:0,rollRev:0,walkRev:0};

  // Formatters
  const f2 = n => (Number(n)||0).toFixed(2);
  const fmtTons = n => f2(n) + ' tons';
  const fmtMoney = n => '$'+(Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  // Accounting-convention percent delta. Positive: "5.2%", negative: "(5.2%)".
  const pctAcct = (cur, prev) => {
    const c = Number(cur)||0, p = Number(prev)||0;
    if(Math.abs(c) < 0.005 && Math.abs(p) < 0.005) return '—';
    if(Math.abs(p) < 0.005) return 'new';
    const pct = ((c - p) / Math.abs(p)) * 100;
    if(pct >= 0) return pct.toFixed(1) + '%';
    return '(' + Math.abs(pct).toFixed(1) + '%)';
  };
  // YoY row value: "245.00 tons · 5.2%"  /  "245.00 tons · (5.2%)"
  const yoyTons  = (cur, prev) => fmtTons(prev) + ' · ' + pctAcct(cur, prev);
  const yoyMoney = (cur, prev) => fmtMoney(prev) + ' · ' + pctAcct(cur, prev);
  // Rev/ton appended inline. Drops if zero tonnage in period.
  const revPerTon = (rev, tons) => {
    const r = Number(rev)||0, ts = Number(tons)||0;
    if(ts < 0.005) return '';
    return ' · $'+(r/ts).toFixed(0)+'/ton';
  };

  // Email row + section header builders (inline-styled for email clients).
  const labelStyle = 'padding:3px 0;color:#222;font-size:14px;';
  const valStyle   = 'padding:3px 0;color:#222;font-size:14px;text-align:right;';

  // Period totals for revenue rows + their tonnage denominators (rev/ton).

  const mtdYoyRev = (my.rollRev||0) + (my.walkRev||0);
  const ytdYoyRev = (yo.rollRev||0) + (yo.walkRev||0);
  const todayTons = t.rolloff + t.walkin;

  const sec1 = `

    ${row('MTD YoY',   yoyTons(m.rolloff, my.rolloff))}
    ${row('YTD',       fmtTons(y.rolloff))}

  const sec2 = `
    ${sectionHdr('External Volume')}
    ${row('Today',     fmtTons(t.walkin), false, false)}
    ${row('MTD',       fmtTons(m.walkin))}
    ${row('MTD YoY',   yoyTons(m.walkin, my.walkin))}
    ${row('YTD',       fmtTons(y.walkin))}
    ${row('YTD YoY',   yoyTons(y.walkin, yo.walkin))}
  `;
  const sec3 = `
    ${sectionHdr('Outbound')}
    ${row('Today',     fmtTons(t.vin), false, false)}
    ${row('MTD',       fmtTons(m.vin))}
    ${row('MTD YoY',   yoyTons(m.vin, my.vin))}
    ${row('YTD',       fmtTons(y.vin))}
    ${row('YTD YoY',   yoyTons(y.vin, yo.vin))}
  `;
  const sec4 = `
    ${sectionHdr('Revenue')}
    ${row('Today',     fmtMoney(totalRevToday) + revPerTon(totalRevToday, todayTons), true, false)}
    ${row('MTD',       fmtMoney(mtdRev) + revPerTon(mtdRev, mtdTons))}
    ${row('MTD YoY',   yoyMoney(mtdRev, mtdYoyRev))}
    ${row('YTD',       fmtMoney(ytdRev) + revPerTon(ytdRev, ytdTons))}
    ${row('YTD YoY',   yoyMoney(ytdRev, ytdYoyRev))}
  `;

  const body = `<div style="font-family:Arial,Helvetica,sans-serif;font-size:14px;color:#222;max-width:560px;line-height:1.55;">

  <table style="width:100%;border-collapse:collapse;">
    ${sec1}
    ${sec2}
    ${sec3}
    ${sec4}
  </table></div>`;

  return {subject, body};
}

// Loads all the period rollups the daily email needs: today, WTD, MTD,
// MOM (same days of prior month), YTD, YOY (same days of prior year),
// and MTD YOY (same MTD slice of prior year). All sums come from irr_reports.
async function irrLoadYTD(asOfDate) {
  let asOf;
  if(asOfDate){
    const p=asOfDate.split('/');
    asOf={year:parseInt(p[2]),month:parseInt(p[0]),day:parseInt(p[1])};
  } else {
    const d=new Date();
    asOf={year:d.getFullYear(),month:d.getMonth()+1,day:d.getDate()};
  }
  const pad = n => String(n).padStart(2,'0');
  const asOfIso = asOf.year+'-'+pad(asOf.month)+'-'+pad(asOf.day);
  const asOfDt  = new Date(asOf.year, asOf.month-1, asOf.day);

  // WTD = Monday this week → today
  const dow = asOfDt.getDay();
  const diff = asOfDt.getDate() - dow + (dow===0?-6:1);
  const monday = new Date(asOfDt); monday.setDate(diff);
  const wtdStart = monday.getFullYear()+'-'+pad(monday.getMonth()+1)+'-'+pad(monday.getDate());

  // MTD = 1st of this month → today
  const mtdStart = asOf.year+'-'+pad(asOf.month)+'-01';

  // MOM = 1st of prior month → same day-of-month of prior month (capped at last day)
  let pmYear = asOf.year, pmMonth = asOf.month - 1;
  if(pmMonth < 1){ pmMonth = 12; pmYear -= 1; }
  const pmLastDay = new Date(pmYear, pmMonth, 0).getDate();
  const pmDay = Math.min(asOf.day, pmLastDay);
  const momStart = pmYear+'-'+pad(pmMonth)+'-01';
  const momEnd   = pmYear+'-'+pad(pmMonth)+'-'+pad(pmDay);

  // YTD = Jan 1 this year → today
  const ytdStart = asOf.year+'-01-01';

  // YOY = Jan 1 prior year → same date of prior year (handle Feb 29)
  const lyYear = asOf.year - 1;
  let lyDay = asOf.day;
  if(asOf.month === 2 && asOf.day === 29){
    const isLeap = (lyYear%4===0 && lyYear%100!==0) || lyYear%400===0;
    if(!isLeap) lyDay = 28;
  }
  const yoyStart = lyYear+'-01-01';
  const yoyEnd   = lyYear+'-'+pad(asOf.month)+'-'+pad(lyDay);

  // MTD YOY = 1st of (same month, prior year) → same day-of-month, prior year
  const mtdYoyStart = lyYear+'-'+pad(asOf.month)+'-01';
  const mtdYoyEnd   = lyYear+'-'+pad(asOf.month)+'-'+pad(lyDay);

  const fields = 'reis_tons,island_tons,santos_tons,walkin_tons,vinagro_tons,'
               + 'pile_tons,pile_tickets,'
               + 'reis_tip_revenue,reis_svc_revenue,island_revenue,santos_revenue,walkin_tip_revenue';

  async function fetchRange(start, end){
    const {data, error} = await db.from('irr_reports').select(fields)
      .gte('report_date', start).lte('report_date', end);
    if(error) console.error('irrLoadYTD fetch '+start+'..'+end+' →', error);
    return data || [];
  }
  function sum(rows){
    const r = {rolloff:0, walkin:0, vin:0, pileTons:0, pileTickets:0, rollRev:0, walkRev:0};
    for(const d of rows){
      const reis   = parseFloat(d.reis_tons)||0;
      const island = parseFloat(d.island_tons)||0;
      const santos = parseFloat(d.santos_tons)||0;
      const walkin = parseFloat(d.walkin_tons)||0;
      const vin    = parseFloat(d.vinagro_tons)||0;
      r.rolloff += reis + island + santos;
      r.walkin  += walkin;
      r.vin     += vin;
      r.pileTons    += parseFloat(d.pile_tons)||0;
      r.pileTickets += parseInt(d.pile_tickets)||0;
      r.rollRev += (parseFloat(d.reis_tip_revenue)||0) + (parseFloat(d.reis_svc_revenue)||0)
                + (parseFloat(d.island_revenue)||0)   + (parseFloat(d.santos_revenue)||0);
      r.walkRev += parseFloat(d.walkin_tip_revenue)||0;
    }
    return r;
  }

  const [tD, wD, mD, momD, yD, yoyD, mYoyD] = await Promise.all([
    fetchRange(asOfIso,    asOfIso),
    fetchRange(wtdStart,   asOfIso),
    fetchRange(mtdStart,   asOfIso),
    fetchRange(momStart,   momEnd),
    fetchRange(ytdStart,   asOfIso),
    fetchRange(yoyStart,   yoyEnd),
    fetchRange(mtdYoyStart, mtdYoyEnd),
  ]);

  return {
    today:  sum(tD),
    wtd:    sum(wD),
    mtd:    sum(mD),
    mom:    sum(momD),
    ytd:    sum(yD),
    yoy:    sum(yoyD),
    mtdYoy: sum(mYoyD),
    _ranges: {
      today:[asOfIso, asOfIso], wtd:[wtdStart, asOfIso], mtd:[mtdStart, asOfIso],
      mom:[momStart, momEnd], ytd:[ytdStart, asOfIso], yoy:[yoyStart, yoyEnd],
      mtdYoy:[mtdYoyStart, mtdYoyEnd],
    },
  };
}

async function irrSaveReport(data) {
  const {date, buckets} = data;
  if(!date) return;
  const parts = date.split('/');
  const isoDate = parts[2]+'-'+parts[0].padStart(2,'0')+'-'+parts[1].padStart(2,'0');
  const {reis,pile,island,santos,vinagro,walkin} = buckets;
  const totalTons = reis.tons+pile.tons+island.tons+santos.tons+walkin.tons;
  const totalTickets = reis.tickets+pile.tickets+island.tickets+santos.tickets+walkin.tickets;

  const row = {
    report_date: isoDate,
    reis_tons: reis.tons, reis_tickets: reis.tickets,
    reis_deliveries: reis.deliveries||0, reis_empties: reis.empties||0, reis_double_drops: reis.doubleDrops||0,
    reis_tip_revenue: reis.tipRevenue||0, reis_svc_revenue: reis.rolloffFees||0,
    pile_tons: pile.tons, pile_tickets: pile.tickets,
    island_tons: island.tons, island_tickets: island.tickets, island_revenue: island.revenue||0,
    santos_tons: santos.tons, santos_tickets: santos.tickets, santos_revenue: santos.revenue||0,
    walkin_tons: walkin.tons, walkin_tickets: walkin.tickets, walkin_tip_revenue: walkin.tipRevenue||0,
    vinagro_tons: vinagro.tons, vinagro_loads: vinagro.tickets,
    total_inbound_tons: totalTons, total_inbound_tickets: totalTickets,
  };
  const {error} = await db.from('irr_reports').upsert(row, {onConflict:'report_date'});
  if(error) console.error('IRR save error:', error);
}

function irrRenderReportView(data, ytd) {
  const email = irrGenerateEmail(data, ytd);
  const {date, buckets} = data;

  // Today's revenue (computed fresh — same logic as irrGenerateEmail).
  const {reis,island,santos,walkin} = buckets;
  const {ir, er} = irrRatesFor(date);
  const islandHook   = (ir ? ir.hook_fee : 250) * (island.tickets||0);
  const santosHook   = (er ? er.hook_fee : 250) * (santos.tickets||0);
  const islandTonRev = (island.revenue||0) - islandHook;
  const santosTonRev = (santos.revenue||0) - santosHook;
  const rolloffRevToday = (reis.rolloffFees||0) + islandHook + santosHook
                        + (reis.tipRevenue||0)  + islandTonRev + santosTonRev;
  const totalRevToday   = rolloffRevToday + (walkin.tipRevenue||0);

  // Period buckets — must mirror irrGenerateEmail.
  const t = ytd.today || {rolloff:0,walkin:0,vin:0,rollRev:0,walkRev:0};
  const m = ytd.mtd   || {rolloff:0,walkin:0,vin:0,rollRev:0,walkRev:0};
  const y = ytd.ytd   || {rolloff:0,walkin:0,vin:0,rollRev:0,walkRev:0};
  const my= ytd.mtdYoy|| {rolloff:0,walkin:0,vin:0,rollRev:0,walkRev:0};
  const yo= ytd.yoy   || {rolloff:0,walkin:0,vin:0,rollRev:0,walkRev:0};

  const f2 = n => (Number(n)||0).toFixed(2);
  const fmtTons = n => f2(n) + ' tons';
  const fmtMoney = n => '$'+(Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  const pctAcct = (cur, prev) => {
    const c = Number(cur)||0, p = Number(prev)||0;
    if(Math.abs(c) < 0.005 && Math.abs(p) < 0.005) return '—';
    if(Math.abs(p) < 0.005) return 'new';
    const pct = ((c - p) / Math.abs(p)) * 100;
    if(pct >= 0) return pct.toFixed(1) + '%';
    return '(' + Math.abs(pct).toFixed(1) + '%)';
  };
  const yoyTons  = (cur, prev) => fmtTons(prev) + ' · ' + pctAcct(cur, prev);
  const yoyMoney = (cur, prev) => fmtMoney(prev) + ' · ' + pctAcct(cur, prev);
  const revPerTon = (rev, tons) => {
    const r = Number(rev)||0, ts = Number(tons)||0;
    if(ts < 0.005) return '';
    return ' · $'+(r/ts).toFixed(0)+'/ton';
  };

  const rowH = (label, val, bold, highlight) => {
    const sty = (bold?'font-weight:700;':'') + (highlight?'background:#fff4cc;':'');
    const attr = sty ? ` style="${sty}"` : '';
    return `<tr><td${attr}>${label}</td><td${attr}>${val}</td></tr>`;
  };

  // Period totals for revenue rows
  const mtdRev    = (m.rollRev||0)  + (m.walkRev||0);
  const mtdTons   = m.rolloff + m.walkin;
  const ytdRev    = (y.rollRev||0)  + (y.walkRev||0);
  const ytdTons   = y.rolloff + y.walkin;
  const mtdYoyRev = (my.rollRev||0) + (my.walkRev||0);
  const ytdYoyRev = (yo.rollRev||0) + (yo.walkRev||0);
  const todayTons = t.rolloff + t.walkin;

  return `
    <div class="irr-report">
      <h3 style="font-size:18px;font-weight:400;color:var(--navy);margin-bottom:4px;">
        Daily Scale Report &mdash; <strong style="color:var(--teal)">${irrFmtDate(date)}</strong>
      </h3>

      <div class="irr-section-hdr">Internal Volume</div>
      <table class="irr-table"><tbody>
        ${rowH('Today',     fmtTons(t.rolloff), false, false)}
        ${rowH('MTD',       fmtTons(m.rolloff))}
        ${rowH('MTD YoY',   yoyTons(m.rolloff, my.rolloff))}
        ${rowH('YTD',       fmtTons(y.rolloff))}
        ${rowH('YTD YoY',   yoyTons(y.rolloff, yo.rolloff))}
      </tbody></table>

      <div class="irr-section-hdr">External Volume</div>
      <table class="irr-table"><tbody>
        ${rowH('Today',     fmtTons(t.walkin), false, false)}
        ${rowH('MTD',       fmtTons(m.walkin))}
        ${rowH('MTD YoY',   yoyTons(m.walkin, my.walkin))}
        ${rowH('YTD',       fmtTons(y.walkin))}
        ${rowH('YTD YoY',   yoyTons(y.walkin, yo.walkin))}
      </tbody></table>

      <div class="irr-section-hdr">Outbound</div>
      <table class="irr-table"><tbody>
        ${rowH('Today',     fmtTons(t.vin), false, false)}
        ${rowH('MTD',       fmtTons(m.vin))}
        ${rowH('MTD YoY',   yoyTons(m.vin, my.vin))}
        ${rowH('YTD',       fmtTons(y.vin))}
        ${rowH('YTD YoY',   yoyTons(y.vin, yo.vin))}
      </tbody></table>

      <div class="irr-section-hdr">Revenue</div>
      <table class="irr-table"><tbody>
        ${rowH('Today',     fmtMoney(totalRevToday) + revPerTon(totalRevToday, todayTons), true, false)}
        ${rowH('MTD',       fmtMoney(mtdRev) + revPerTon(mtdRev, mtdTons))}
        ${rowH('MTD YoY',   yoyMoney(mtdRev, mtdYoyRev))}
        ${rowH('YTD',       fmtMoney(ytdRev) + revPerTon(ytdRev, ytdTons))}
        ${rowH('YTD YoY',   yoyMoney(ytdRev, ytdYoyRev))}
      </tbody></table>

      <hr style="border:none;border-top:1px solid var(--gray-200);margin:24px 0 16px;">
      <div class="irr-section-hdr">Email Draft</div>
      <div class="irr-email-box">
        <div class="irr-email-hdr">${esc(email.subject)}</div>
        <div class="irr-email-body">${email.body}</div>
      </div>
      <div class="irr-btn-row">
        <button class="irr-btn irr-btn-primary" onclick="irrCopyEmail()">Copy Email</button>
        <button class="irr-btn irr-btn-secondary" onclick="irrCreateDraft()">Create Gmail Draft</button>
        <span class="irr-toast" id="irrCopyToast">Copied!</span>
      </div>
      <a style="display:block;text-align:center;margin-top:16px;font-size:12px;color:var(--gray-400);cursor:pointer;text-decoration:none;" onclick="irrReset()">Upload a new file</a>
    </div>`;
}

function irrGetDateRange(range, customStart, customEnd) {
  const today = new Date();
  today.setHours(0,0,0,0);
  let start;
  if(range==='wtd') { start=new Date(today); start.setDate(today.getDate()-today.getDay()); }
  else if(range==='mtd') { start=new Date(today.getFullYear(),today.getMonth(),1); }
  else if(range==='30d') { start=new Date(today); start.setDate(today.getDate()-30); }
  else if(range==='ytd') { start=new Date(today.getFullYear(),0,1); }
  else if(range==='custom' && customStart) { start=new Date(customStart+'T00:00:00'); }
  else { start=new Date(today); start.setDate(today.getDate()-7); }
  const end = (range==='custom' && customEnd) ? new Date(customEnd+'T00:00:00') : today;
  const fmt=d=>d.toISOString().split('T')[0];
  return {start:fmt(start), end:fmt(end)};
}

async function irrLoadDashboard() {

  if(error){container.innerHTML='<div style="color:var(--err-text)">Error loading data</div>';return;}
  irrDashData = data||[];

  // Ensure Island/East End revenue is calculated for all rows (covers pre-rate historical data)
  await irrLoadRates();
  for(const d of irrDashData){
    const {ir, er} = irrRatesFor(d.report_date);
    if(ir && !(parseFloat(d.island_revenue)>0) && (d.island_tickets||0)>0){
      d.island_revenue = (ir.hook_fee*(d.island_tickets||0)) + ((ir.per_ton*(1+(ir.ton_markup||0)))*(parseFloat(d.island_tons)||0));
    }
    if(er && !(parseFloat(d.santos_revenue)>0) && (d.santos_tickets||0)>0){
      d.santos_revenue = (er.hook_fee*(d.santos_tickets||0)) + ((er.per_ton*(1+(er.ton_markup||0)))*(parseFloat(d.santos_tons)||0));
    }
  }

  irrRenderDashboard();
}

// Rolloff helpers (global scope — used by dashboard, chart, and report generator)
function allLoads(d){return (d.reis_tickets||0)+(d.island_tickets||0)+(d.santos_tickets||0);}
function allTons(d){return (parseFloat(d.reis_tons)||0)+(parseFloat(d.island_tons)||0)+(parseFloat(d.santos_tons)||0);}
function allRev(d){return (parseFloat(d.reis_tip_revenue)||0)+(parseFloat(d.reis_svc_revenue)||0)+(parseFloat(d.island_revenue)||0)+(parseFloat(d.santos_revenue)||0);}

// Company-specific helpers (driven by irrCompanyFilter)
function cLoads(d){
  if(irrCompanyFilter==='reis') return d.reis_tickets||0;
  if(irrCompanyFilter==='island') return d.island_tickets||0;
  if(irrCompanyFilter==='eastend') return d.santos_tickets||0;
  return allLoads(d);
}
function cTons(d){
  if(irrCompanyFilter==='reis') return parseFloat(d.reis_tons)||0;
  if(irrCompanyFilter==='island') return parseFloat(d.island_tons)||0;
  if(irrCompanyFilter==='eastend') return parseFloat(d.santos_tons)||0;
  return allTons(d);
}
function cRev(d){
  if(irrCompanyFilter==='reis') return (parseFloat(d.reis_tip_revenue)||0)+(parseFloat(d.reis_svc_revenue)||0);
  if(irrCompanyFilter==='island') return parseFloat(d.island_revenue)||0;
  if(irrCompanyFilter==='eastend') return parseFloat(d.santos_revenue)||0;
  return allRev(d);
}
function irrSetCompany(c){irrCompanyFilter=c;irrRenderDashboard();}

  container.innerHTML = `
    <div class="irr-dash-controls">
      ${rangeBtn('wtd','WTD')}${rangeBtn('mtd','MTD')}${rangeBtn('30d','30D')}${rangeBtn('ytd','YTD')}${rangeBtn('custom','Custom')}
      <div class="irr-dash-custom" id="irrCustomRange" style="display:${irrDashRange==='custom'?'flex':'none'}">

      <button class="irr-range-btn" style="margin-left:auto;background:var(--navy);color:white;border-color:var(--navy);" onclick="irrGenerateReport()">Generate Report</button>

      ${compBtn('all','All Combined')}${compBtn('reis','Reis')}${compBtn('island','Island Rubbish')}${compBtn('eastend','East End')}
    </div>

    <div class="irr-kpi-row">
      <div class="irr-kpi">
        <div class="irr-kpi-label">${companyLabel} — Avg Rev / Load</div>
        <div class="irr-kpi-val">${avgRevPerLoad>0?'$'+avgRevPerLoad.toFixed(2):'--'}</div>
        <div class="irr-kpi-sub">${filtered.length} days, ${totalCLoads} loads</div>
      </div>
      <div class="irr-kpi">
        <div class="irr-kpi-label">${companyLabel} — Avg Tons / Load</div>
        <div class="irr-kpi-val">${avgTonsPerLoad>0?avgTonsPerLoad.toFixed(2):'--'}</div>
        <div class="irr-kpi-sub">${totalCTons.toFixed(1)} total tons</div>
      </div>
      <div class="irr-kpi">
        <div class="irr-kpi-label">Avg Hours / Load</div>
        <div class="irr-kpi-val">${avgHoursPerLoad>0?avgHoursPerLoad.toFixed(2):'--'}</div>
        <div class="irr-kpi-sub">${hoursCount>0?hoursCount+' days with data':'No data yet'}</div>
      </div>
      <div class="irr-kpi">
        <div class="irr-kpi-label">${companyLabel} — Avg Loads / Day</div>
        <div class="irr-kpi-val">${filtered.length>0?(totalCLoads/filtered.length).toFixed(1):'--'}</div>

      <button class="irr-toggle ${irrToggles.tonsPerLoad?'on':''}" style="${irrToggles.tonsPerLoad?'background:'+IRR_COLORS.tonsPerLoad+';border-color:'+IRR_COLORS.tonsPerLoad:''}" onclick="irrToggleSeries('tonsPerLoad')">Tons / Load</button>
      <button class="irr-toggle ${irrToggles.hoursPerLoad?'on':''}" style="${irrToggles.hoursPerLoad?'background:'+IRR_COLORS.hoursPerLoad+';border-color:'+IRR_COLORS.hoursPerLoad:''}" onclick="irrToggleSeries('hoursPerLoad')">Hours / Load</button>
      <button class="irr-toggle ${irrToggles.loadsPerDay?'on':''}" style="${irrToggles.loadsPerDay?'background:'+IRR_COLORS.loadsPerDay+';border-color:'+IRR_COLORS.loadsPerDay:''}" onclick="irrToggleSeries('loadsPerDay')">Loads / Day</button>

      ${irrCompanyFilter==='all'?`<button class="irr-toggle ${irrToggles.eastendLoads?'on':''}" style="${irrToggles.eastendLoads?'background:'+IRR_COLORS.eastendLoads+';border-color:'+IRR_COLORS.eastendLoads:''}" onclick="irrToggleSeries('eastendLoads')">East End Loads</button>`:''}

        <label>Total Hours (HH:MM)<input type="text" id="irrHoursVal" placeholder="e.g. 8:57"></label>

  irrDrawChart(filtered);

function irrSetRange(range) {
  irrDashRange=range;
  irrRenderDashboard();
}
function irrRefreshDash() { irrRenderDashboard(); }

function irrToggleSeries(key) {
  irrToggles[key]=!irrToggles[key];
  irrRenderDashboard();
}

function irrDrawChart(filtered) {
  const ctx = document.getElementById('irrChartCanvas');
  if(!ctx) return;
  if(irrChart){irrChart.destroy();irrChart=null;}

  const labels = filtered.map(d=>d.report_date);
  const datasets = [];

  const cClr = IRR_COMPANY_COLORS[irrCompanyFilter]||IRR_COMPANY_COLORS.all;

  if(irrToggles.revPerLoad){
    datasets.push({
      label:'Rev / Load ($)',
      data:filtered.map(d=>{
        const t=cLoads(d);
        return t>0?cRev(d)/t:null;
      }),
      borderColor:IRR_COLORS.revPerLoad, backgroundColor:IRR_COLORS.revPerLoad+'20',
      tension:0.3, pointRadius:3, borderWidth:2, yAxisID:'y',
    });
  }
  if(irrToggles.tonsPerLoad){
    datasets.push({
      label:'Tons / Load',
      data:filtered.map(d=>{
        const t=cLoads(d);
        return t>0?cTons(d)/t:null;
      }),
      borderColor:IRR_COLORS.tonsPerLoad, backgroundColor:IRR_COLORS.tonsPerLoad+'20',
      tension:0.3, pointRadius:3, borderWidth:2, yAxisID:'y1',
    });
  }
  if(irrToggles.hoursPerLoad){
    datasets.push({
      label:'Hours / Load',
      data:filtered.map(d=>{
        const t=cLoads(d);
        const h=d.driver_hours!=null?parseFloat(d.driver_hours):null;
        return (t>0 && h!==null)?h/t:null;
      }),
      borderColor:IRR_COLORS.hoursPerLoad, backgroundColor:IRR_COLORS.hoursPerLoad+'20',
      tension:0.3, pointRadius:3, borderWidth:2, yAxisID:'y2',
    });
  }
  if(irrToggles.loadsPerDay){
    datasets.push({
      label:'Loads / Day',
      data:filtered.map(d=>cLoads(d)),
      borderColor:IRR_COLORS.loadsPerDay, backgroundColor:IRR_COLORS.loadsPerDay+'20',
      tension:0.3, pointRadius:3, borderWidth:2, yAxisID:'y3',
    });
  }
  // Per-company load breakdown only in "All Combined" view
  if(irrCompanyFilter==='all' && irrToggles.reisLoads){
    datasets.push({
      label:'Reis Loads',
      data:filtered.map(d=>d.reis_tickets||0),
      borderColor:IRR_COLORS.reisLoads, backgroundColor:IRR_COLORS.reisLoads+'20',
      tension:0.3, pointRadius:3, borderWidth:2, yAxisID:'y3',
    });
  }
  if(irrCompanyFilter==='all' && irrToggles.islandLoads){
    datasets.push({
      label:'Island Loads',
      data:filtered.map(d=>d.island_tickets||0),
      borderColor:IRR_COLORS.islandLoads, backgroundColor:IRR_COLORS.islandLoads+'20',
      tension:0.3, pointRadius:3, borderWidth:2, yAxisID:'y3',
    });
  }
  if(irrCompanyFilter==='all' && irrToggles.eastendLoads){
    datasets.push({
      label:'East End Loads',
      data:filtered.map(d=>d.santos_tickets||0),
      borderColor:IRR_COLORS.eastendLoads, backgroundColor:IRR_COLORS.eastendLoads+'20',
      tension:0.3, pointRadius:3, borderWidth:2, yAxisID:'y3',
    });
  }

  const scales = {
    x:{
      type:'category',
      ticks:{font:{size:10,family:"'DM Sans',sans-serif"},color:'#9aa3b5',maxRotation:45},
      grid:{display:false},
    }
  };
  // Build y axes dynamically based on active toggles
  let axisCount=0;
  if(irrToggles.revPerLoad){
    scales.y={
      position:'left', title:{display:true,text:'Rev / Load ($)',font:{size:10,family:"'DM Sans',sans-serif"},color:IRR_COLORS.revPerLoad},
      ticks:{font:{size:10},color:IRR_COLORS.revPerLoad, callback:v=>'$'+v.toFixed(0)},
      grid:{color:'rgba(0,0,0,0.04)'}, border:{display:false},
    };
    axisCount++;
  }
  if(irrToggles.tonsPerLoad){
    scales.y1={
      position:axisCount>0?'right':'left',
      title:{display:true,text:'Tons / Load',font:{size:10,family:"'DM Sans',sans-serif"},color:IRR_COLORS.tonsPerLoad},
      ticks:{font:{size:10},color:IRR_COLORS.tonsPerLoad},
      grid:{display:false}, border:{display:false},
    };
    axisCount++;
  }
  if(irrToggles.hoursPerLoad){
    scales.y2={
      position:axisCount>0?'right':'left',
      title:{display:true,text:'Hours / Load',font:{size:10,family:"'DM Sans',sans-serif"},color:IRR_COLORS.hoursPerLoad},
      ticks:{font:{size:10},color:IRR_COLORS.hoursPerLoad},
      grid:{display:false}, border:{display:false},

      interaction:{mode:'index',intersect:false},
      plugins:{

          backgroundColor:'#0f1f3d', titleFont:{family:"'DM Sans',sans-serif",size:11},
          bodyFont:{family:"'DM Mono',monospace",size:11}, cornerRadius:6, padding:10,

      },

}

async function irrSaveHours() {
  const dateVal = document.getElementById('irrHoursDate').value;
  const hoursVal = irrParseHoursInput(document.getElementById('irrHoursVal').value);
  if(!dateVal||hoursVal===null){toast('Enter a valid date and hours (HH:MM)');return;}

  // Check if report exists for this date
  const {data:existing} = await db.from('irr_reports').select('report_date').eq('report_date',dateVal).single();
  if(existing){
    // Update existing
    const {error} = await db.from('irr_reports').update({driver_hours:hoursVal}).eq('report_date',dateVal);
    if(error){toast('Error saving: '+error.message);return;}
  } else {
    // Insert minimal row with just hours
    const {error} = await db.from('irr_reports').insert({report_date:dateVal,driver_hours:hoursVal});
    if(error){toast('Error saving: '+error.message);return;}
  }
  toast('Driver hours saved for '+dateVal,true);
  document.getElementById('irrHoursVal').value='';
  // Refresh dashboard data
  const {data} = await db.from('irr_reports').select('*').order('report_date',{ascending:true});
  irrDashData=data||[];
  irrRenderDashboard();
}

// ── Period Report Generator ───────────────────────────────────────────

function irrGenerateReport() {
  const {start,end} = irrGetDateRange(irrDashRange,
    document.getElementById('irrCustomStart')?.value,
    document.getElementById('irrCustomEnd')?.value);
  const filtered = irrDashData.filter(d=>d.report_date>=start && d.report_date<=end && allLoads(d)>0);
  if(!filtered.length){toast('No data in selected range');return;}

  let totalLoads=0,totalTons=0,totalRev=0,totalHours=0,hoursCount=0;
  for(const d of filtered){
    totalLoads+=allLoads(d);
    totalTons+=allTons(d);
    totalRev+=allRev(d);
    if(d.driver_hours!=null){totalHours+=parseFloat(d.driver_hours)||0;hoursCount++;}
  }
  const avgRev=totalLoads>0?(totalRev/totalLoads):0;
  const avgTons=totalLoads>0?(totalTons/totalLoads):0;
  const avgHours=(totalLoads>0&&hoursCount>0)?(totalHours/totalLoads):0;

  const fmtD=iso=>{const d=new Date(iso+'T00:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});};
  const fmtFull=iso=>{const d=new Date(iso+'T00:00:00');return d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});};
  const f2=n=>n.toFixed(2);
  const fM=n=>'$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});

  let tableRows='';
  for(const d of filtered){
    const loads=allLoads(d);
    const tons=allTons(d);
    const rev=allRev(d);
    const rpl=loads>0?fM(rev/loads):'--';
    const tpl=loads>0?f2(tons/loads):'--';
    const hpl=(loads>0&&d.driver_hours!=null)?f2(parseFloat(d.driver_hours)/loads):'--';
    tableRows+=`<tr>
      <td>${fmtD(d.report_date)}</td><td>${loads}</td><td>${f2(tons)}</td>
      <td>${fM(rev)}</td><td>${rpl}</td><td>${tpl}</td><td>${hpl}</td></tr>`;
  }
  tableRows+=`<tr class="rpt-total">
    <td>Total / Avg</td><td>${totalLoads}</td><td>${f2(totalTons)}</td>
    <td>${fM(totalRev)}</td><td>${fM(avgRev)}</td><td>${f2(avgTons)}</td><td>${avgHours>0?f2(avgHours):'--'}</td></tr>`;

  // Build week-over-week summary using ALL data for prior-week lookback
  const allByDate={};
  for(const d of irrDashData){
    if(allLoads(d)>0) allByDate[d.report_date]=d;
  }

  // Group filtered data into ISO weeks (Mon-Sun)
  function getWeekStart(iso){
    const d=new Date(iso+'T00:00:00');
    const day=d.getDay();
    const diff=d.getDate()-day+(day===0?-6:1); // Monday
    const mon=new Date(d);mon.setDate(diff);
    return mon.toISOString().split('T')[0];
  }

  const weekMap={};
  for(const d of filtered){
    const ws=getWeekStart(d.report_date);
    if(!weekMap[ws]) weekMap[ws]={tons:0,rev:0,loads:0,days:0};
    weekMap[ws].tons+=allTons(d);
    weekMap[ws].rev+=allRev(d);
    weekMap[ws].loads+=allLoads(d);
    weekMap[ws].days++;
  }
  // Also compute prior weeks from all data for WoW calc
  const allWeekMap={};
  for(const d of irrDashData){
    if(allLoads(d)<=0) continue;
    const ws=getWeekStart(d.report_date);
    if(!allWeekMap[ws]) allWeekMap[ws]={tons:0,rev:0,loads:0,days:0};
    allWeekMap[ws].tons+=allTons(d);
    allWeekMap[ws].rev+=allRev(d);
    allWeekMap[ws].loads+=allLoads(d);
    allWeekMap[ws].days++;
  }

  const weekKeys=Object.keys(weekMap).sort();
  function getPriorWeek(ws){
    const d=new Date(ws+'T00:00:00');d.setDate(d.getDate()-7);
    return d.toISOString().split('T')[0];
  }
  function pctChange(curr,prev){
    if(!prev||prev===0) return '--';
    const pct=((curr-prev)/prev)*100;
    const sign=pct>0?'+':'';
    return sign+pct.toFixed(1)+'%';
  }

  const fmtWeek=ws=>{
    const s=new Date(ws+'T00:00:00');
    const e=new Date(s);e.setDate(s.getDate()+6);
    return fmtD(ws)+' - '+fmtD(e.toISOString().split('T')[0]);
  };

  let wowRows='';
  for(const ws of weekKeys){
    const w=weekMap[ws];
    const pw=allWeekMap[getPriorWeek(ws)];
    const tonsWoW=pw?pctChange(w.tons,pw.tons):'--';
    const revWoW=pw?pctChange(w.rev,pw.rev):'--';
    const lpd=w.days>0?(w.loads/w.days).toFixed(1):'--';
    const pwLpd=pw&&pw.days>0?(pw.loads/pw.days):0;
    const lpdWoW=(pw&&pw.days>0&&w.days>0)?pctChange(w.loads/w.days,pwLpd):'--';
    wowRows+=`<tr>
      <td>${fmtWeek(ws)}</td><td>${w.loads}</td><td>${f2(w.tons)}</td><td>${tonsWoW}</td>
      <td>${fM(w.rev)}</td><td>${revWoW}</td><td>${lpd}</td><td>${lpdWoW}</td></tr>`;
  }

  const reportHTML=`
    <h1>Rolloff Performance Report</h1>
    <div class="rpt-period">${fmtFull(start)} — ${fmtFull(end)}</div>
    <div class="rpt-kpi-row">
      <div class="rpt-kpi"><div class="rpt-kpi-label">Avg Rev / Load</div><div class="rpt-kpi-val">${fM(avgRev)}</div></div>
      <div class="rpt-kpi"><div class="rpt-kpi-label">Avg Tons / Load</div><div class="rpt-kpi-val">${f2(avgTons)}</div></div>
      <div class="rpt-kpi"><div class="rpt-kpi-label">Avg Hours / Load</div><div class="rpt-kpi-val">${avgHours>0?f2(avgHours):'--'}</div></div>
      <div class="rpt-kpi"><div class="rpt-kpi-label">Total Loads</div><div class="rpt-kpi-val">${totalLoads}</div></div>
      <div class="rpt-kpi"><div class="rpt-kpi-label">Total Revenue</div><div class="rpt-kpi-val">${fM(totalRev)}</div></div>
      <div class="rpt-kpi"><div class="rpt-kpi-label">Avg Loads / Day</div><div class="rpt-kpi-val">${filtered.length>0?(totalLoads/filtered.length).toFixed(1):'--'}</div></div>
    </div>
    <table>
      <thead><tr><th>Date</th><th>Loads</th><th>Tons</th><th>Revenue</th><th>Rev/Load</th><th>Tons/Load</th><th>Hrs/Load</th></tr></thead>
      <tbody>${tableRows}</tbody>
    </table>
    ${weekKeys.length>0?`
    <h2 style="font-size:14px;font-weight:700;margin-top:28px;margin-bottom:4px;">Week-over-Week</h2>
    <table>
      <thead><tr><th>Week</th><th>Loads</th><th>Tons</th><th>Tons WoW</th><th>Revenue</th><th>Rev WoW</th><th>Loads/Day</th><th>L/D WoW</th></tr></thead>
      <tbody>${wowRows}</tbody>
    </table>`:''}`;

  // Create overlay
  const overlay = document.createElement('div');
  overlay.className='irr-report-overlay';
  overlay.id='irrReportOverlay';
  overlay.innerHTML=`<div class="irr-report-modal">
    <div class="irr-report-toolbar">
      <button class="rpt-print" onclick="window.print()">Print</button>
      <button class="rpt-print" onclick="irrDownloadPDF()">Download PDF</button>
      <input type="text" id="irrReportEmails" placeholder="Email addresses (comma-separated)">
      <button class="rpt-email" onclick="irrEmailReport()">Copy &amp; Open Gmail</button>
      <button class="rpt-close" onclick="document.getElementById('irrReportOverlay').remove()">Close</button>
    </div>
    <div class="irr-report-body">${reportHTML}</div>
  </div>`;
  document.body.appendChild(overlay);

  // Store HTML for email
  window._irrReportHTML=reportHTML;
  window._irrReportSubject='Rolloff Performance Report — '+fmtFull(start)+' to '+fmtFull(end);
}

function irrGetPDFFilename() {
  return (window._irrReportSubject||'Rolloff Performance Report').replace(/[^a-zA-Z0-9 \-]/g,'').replace(/\s+/g,'_')+'.pdf';
}

function irrGetPDFOptions() {
  return {
    margin: [10,12,10,12],
    filename: irrGetPDFFilename(),
    image: {type:'jpeg',quality:0.98},
    html2canvas: {scale:2,useCORS:true},
    jsPDF: {unit:'mm',format:'letter',orientation:'portrait'},
  };
}

function irrDownloadPDF() {
  // Try multiple overlay IDs — daily report, weekly print, quarterly, projections
  const el=document.querySelector('.irr-report-overlay .irr-report-body');
  if(!el){toast('No report to export');return;}
  toast('Generating PDF...');
  html2pdf().set(irrGetPDFOptions()).from(el).save().then(()=>{
    toast('PDF downloaded',true);
  });
}

async function irrEmailReport() {
  const emails=document.getElementById('irrReportEmails').value.trim();
  if(!emails){toast('Enter at least one email address');return;}
  const el=document.querySelector('#irrReportOverlay .irr-report-body');
  if(!el){toast('No report to export');return;}

  // Copy report HTML to clipboard so user can paste into Gmail body
  const html = el.outerHTML;
  const plain = el.innerText;
  try {
    await navigator.clipboard.write([new ClipboardItem({
      'text/html': new Blob([html], {type:'text/html'}),
      'text/plain': new Blob([plain], {type:'text/plain'}),
    })]);
  } catch(e) {
    try { await navigator.clipboard.writeText(plain); } catch(e2) {}
  }

  // Open Gmail compose
  const sub = encodeURIComponent(window._irrReportSubject||'Rolloff Performance Report');
  const to = encodeURIComponent(emails);
  window.open('https://mail.google.com/mail/?view=cm&to='+to+'&su='+sub, '_blank');
  toast('Report copied to clipboard — press Ctrl+V in Gmail to paste',true);
}

// ── Historical bulk import ─────────────────────────────────────────────

function irrParseBulk(rows) {
  // Same parsing logic as irrParseReport, but tags each ticket with its date
  // then groups by date to produce daily report rows
  const tickets = {};
  let currentCode = null, parentCode = null;
  const codeStack = [];
  let lastDate = null;

  for (let i = 0; i < rows.length; i++) {
    const vals = rows[i];
    const nonEmpty = vals.filter(v => v && v.trim());
    if (!nonEmpty.length) continue;
    const first = nonEmpty[0];
    const isHeader = first.includes(' - ') && !first.includes('Totals') && !first.includes('Tickets:')
      && !first.includes('TIPFEES') && !first.includes('ROLLOFFS') && !first.includes('No Order')
      && !first.startsWith('Page ') && !first.includes('Date Range') && first.trim()!=='Date' && !first.includes('Report');
    const isTotals = first.includes(' - ') && first.includes('Totals') && !first.includes('TIPFEES') && !first.includes('Non Order');

    if (isHeader) { const c=first.split(' - ')[0].trim(); codeStack.push(c); currentCode=c; parentCode=codeStack.length>1?codeStack[0]:null; }
    if (isTotals) { const c=first.split(' - ')[0].trim(); const idx=codeStack.lastIndexOf(c); if(idx!==-1)codeStack.splice(idx,1); currentCode=codeStack.length>0?codeStack[codeStack.length-1]:null; parentCode=codeStack.length>1?codeStack[0]:null; }

    const effectiveCode = (parentCode && parentCode.startsWith('ZZ')) ? parentCode : currentCode;
    if (!effectiveCode) continue;
    const flatUpper = vals.join(' ').toUpperCase();
    const dataVals = vals.filter(v => v!==null && v!=='' && v!==undefined);

    // Track date from rows — date appears as M/D/YYYY in data values
    for (const v of dataVals) {
      const dm = v.match(/^(\d{1,2}\/\d{1,2}\/\d{4})$/);
      if (dm) { lastDate = dm[1]; break; }
    }

    if (flatUpper.includes('REIS SITE TRANSFER FEE')) {
      const fi = dataVals.findIndex(v => v && v.includes('REIS SITE TRANSFER FEE'));
      if (fi!==-1 && fi+2<dataVals.length) {
        const ticket=dataVals[1]||'?', net=parseFloat(dataVals[fi+2])||0;
        if(!tickets[ticket]) tickets[ticket]={tons:0,service:null,code:effectiveCode,date:lastDate,tipRev:0};
        tickets[ticket].tons+=net;
        if(!tickets[ticket].service) tickets[ticket].code=effectiveCode;
        if(!tickets[ticket].date) tickets[ticket].date=lastDate;
        // Revenue
        const rateStr=dataVals[fi+3]||'';
        const rateMatch=rateStr.match(/\$([0-9.]+)/);
        if(rateMatch) tickets[ticket].tipRev=net*parseFloat(rateMatch[1]);
      }
    }
    for (const kw of IRR_ROLLOFF_SVC) {
      if (flatUpper.includes(kw)) {
        const ticket=dataVals[1]||'?';
        if(!tickets[ticket]) tickets[ticket]={tons:0,service:null,code:effectiveCode,date:lastDate,tipRev:0};
        tickets[ticket].service=kw; tickets[ticket].code=effectiveCode;
        if(!tickets[ticket].date) tickets[ticket].date=lastDate;
        // Service fee amount — only scan AFTER the keyword to avoid grabbing ticket numbers
        let svcFee=0;
        if(!effectiveCode.startsWith('ZZ')){
          let fileAmt=0;
          const kwIdx2=dataVals.findIndex(v=>v&&v.toUpperCase().includes(kw));
          if(kwIdx2>=0){
            for(let j=dataVals.length-1;j>kwIdx2;j--){
              const amt=parseFloat(dataVals[j]);
              if(!isNaN(amt)&&amt>0){fileAmt=amt;break;}
            }
          }
          // Apply hardcoded rate only when the ticket's date is on/after the rate-change date.
          // Earlier dates keep whatever the scale file recorded.
          const ticketIso = mdyToIso(tickets[ticket].date || lastDate);
          svcFee = rolloffSvcFeeForDate(kw, ticketIso, fileAmt);
        }
        tickets[ticket].svcFee=(tickets[ticket].svcFee||0)+svcFee;
        break;
      }
    }
    // Per-unit fees — attach to ticket so grouping pass can route based on ticket context
    for (const item of IRR_PER_UNIT_FEES) {
      if (flatUpper.includes(item.kw)) {
        const kwIdx = dataVals.findIndex(v => v && v.toUpperCase().includes(item.kw));
        if (kwIdx >= 0 && kwIdx+1 < dataVals.length && lastDate) {
          const qty = parseFloat(dataVals[kwIdx+1]) || 0;
          const rev = qty * item.price;
          if (rev > 0) {
            const ticket = dataVals[1] || '?';
            if(!tickets[ticket]) tickets[ticket]={tons:0,service:null,code:effectiveCode,date:lastDate,tipRev:0};
            if(!tickets[ticket].date) tickets[ticket].date = lastDate;
            if (item.bucket === 'hook') {
              tickets[ticket].hookFee = (tickets[ticket].hookFee||0) + rev;
            } else {
              tickets[ticket].disposalFee = (tickets[ticket].disposalFee||0) + rev;
            }
          }
        }
        break;
      }
    }
  }

  // Group tickets by date
  const dailyMap = {};
  for (const [tn,t] of Object.entries(tickets)) {
    const dt = t.date;
    if(!dt) continue;
    if(!dailyMap[dt]) dailyMap[dt]={
      reis:{tons:0,tickets:0,tipRev:0,svcFees:0,deliveries:0,empties:0,doubleDrops:0},
      pile:{tons:0,tickets:0}, island:{tons:0,tickets:0}, santos:{tons:0,tickets:0},
      vinagro:{tons:0,tickets:0}, walkin:{tons:0,tickets:0,tipRev:0},
    };
    const b=dailyMap[dt], c=t.code;
    const disposalFee = t.disposalFee || 0;
    const hookFee = t.hookFee || 0;
    if(c==='ZZISLAND'){b.island.tons+=t.tons;b.island.tickets++;}
    else if(c==='ZZEASTEND'){b.santos.tons+=t.tons;b.santos.tickets++;}
    else if(c==='ZZDELTA'){b.pile.tons+=t.tons;b.pile.tickets++;}
    else if(c==='ZZREIS'){b.vinagro.tons+=t.tons;b.vinagro.tickets++;}
    else if(c.startsWith('ZZ')){
      // ZZ walk-in: disposal + hook per-unit fees go to walk-in tip revenue
      b.walkin.tons+=t.tons;b.walkin.tickets++;
      b.walkin.tipRev+=(t.tipRev||0)+disposalFee+hookFee;
    }
    else if(t.service!==null){
      // Non-ZZ rolloff ticket: disposal fees ride with tonnage revenue; hook fees add to svcFees
      b.reis.tons+=t.tons;b.reis.tickets++;
      b.reis.tipRev+=(t.tipRev||0)+disposalFee;
      b.reis.svcFees+=(t.svcFee||0)+hookFee;
      if(t.service.includes('DELIVERY'))b.reis.deliveries++;
      else if(t.service.includes('DOUBLE DROP'))b.reis.doubleDrops++;
      else if(t.service.includes('EMPTY'))b.reis.empties++;
    } else {
      // Non-ZZ walk-in: disposal goes to walk-in tip rev; hook-type per-unit fee (unusual on a
      // walk-in) still goes to walk-in for routing simplicity
      b.walkin.tons+=t.tons;b.walkin.tickets++;
      b.walkin.tipRev+=(t.tipRev||0)+disposalFee+hookFee;
    }
  }

  // Convert to array of DB rows
  const dbRows = [];
  for (const [dateStr,b] of Object.entries(dailyMap)) {
    const parts=dateStr.split('/');
    const isoDate=parts[2]+'-'+parts[0].padStart(2,'0')+'-'+parts[1].padStart(2,'0');
    const totalTons=b.reis.tons+b.pile.tons+b.island.tons+b.santos.tons+b.walkin.tons;
    const totalTickets=b.reis.tickets+b.pile.tickets+b.island.tickets+b.santos.tickets+b.walkin.tickets;
    dbRows.push({
      report_date:isoDate,
      reis_tons:b.reis.tons, reis_tickets:b.reis.tickets,
      reis_deliveries:b.reis.deliveries, reis_empties:b.reis.empties, reis_double_drops:b.reis.doubleDrops,
      reis_tip_revenue:b.reis.tipRev, reis_svc_revenue:b.reis.svcFees,
      pile_tons:b.pile.tons, pile_tickets:b.pile.tickets,
      island_tons:b.island.tons, island_tickets:b.island.tickets, island_revenue:0,
      santos_tons:b.santos.tons, santos_tickets:b.santos.tickets, santos_revenue:0,
      walkin_tons:b.walkin.tons, walkin_tickets:b.walkin.tickets, walkin_tip_revenue:b.walkin.tipRev,
      vinagro_tons:b.vinagro.tons, vinagro_loads:b.vinagro.tickets,
      total_inbound_tons:totalTons, total_inbound_tickets:totalTickets,
    });
  }
  dbRows.sort((a,b)=>a.report_date.localeCompare(b.report_date));
  return {ticketCount:Object.keys(tickets).length, days:dbRows};
}

async function irrHandleBulk(file) {
  if(!file) return;
  const status = document.getElementById('irrBulkStatus');
  status.style.display='block';
  status.textContent='Reading '+file.name+'...';

  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      status.textContent='Parsing historical data...';
      const rows = irrParseSpreadsheetML(e.target.result);
      status.textContent='Parsed '+rows.length+' rows, grouping by date...';
      const result = irrParseBulk(rows);

      // Calculate Island/East End revenue from rates
      await irrLoadRates();
      for (const d of result.days) {
        const {ir, er} = irrRatesFor(d.report_date);
        if (ir) d.island_revenue = (ir.hook_fee*(d.island_tickets||0)) + ((ir.per_ton*(1+(ir.ton_markup||0)))*(parseFloat(d.island_tons)||0));
        if (er) d.santos_revenue = (er.hook_fee*(d.santos_tickets||0)) + ((er.per_ton*(1+(er.ton_markup||0)))*(parseFloat(d.santos_tons)||0));
      }

      status.textContent=result.ticketCount+' tickets across '+result.days.length+' days. Saving...';

      // Upsert in batches
      const batchSize=100;
      let saved=0;
      for(let i=0;i<result.days.length;i+=batchSize){
        const chunk=result.days.slice(i,i+batchSize);
        const {error}=await db.from('irr_reports').upsert(chunk,{onConflict:'report_date'});
        if(error){status.textContent='Error at batch '+(i/batchSize+1)+': '+error.message;return;}
        saved+=chunk.length;
        status.textContent='Saved '+saved+' / '+result.days.length+' days...';
      }

      status.textContent='Import complete: '+result.days.length+' days, '+result.ticketCount+' tickets.';
      toast(result.days.length+' days of historical data imported',true);
      irrLoadHistoryView();
    } catch(err) {
      status.textContent='Error: '+err.message;
      console.error(err);
    }
  };
  reader.readAsText(file);
}

// ── Ticket reclassification (move IC pile pickups to walk-in) ─────────

function irrShowReclassify(data, file) {
  return new Promise(resolve => {
    const icTickets = [];
    for (const [tn, t] of Object.entries(data.tickets)) {
      if (t.code === 'ZZISLAND' || t.code === 'ZZEASTEND' || t.code === 'ZZDELTA') {
        const company = t.code === 'ZZISLAND' ? 'Island Rubbish'
                      : t.code === 'ZZEASTEND' ? 'East End'
                      : 'Delta (Reis Pile)';
        icTickets.push({ ticket: tn, code: t.code, tons: t.tons, company });
      }
    }
    if (!icTickets.length) { resolve(); irrFinalizeDailyUpload(data, file); return; }
    icTickets.sort((a, b) => a.company.localeCompare(b.company) || b.tons - a.tons);

    const existing = document.getElementById('icrReclassModal');
    if (existing) existing.remove();

    let rows = '';
    for (const t of icTickets) {
      // Delta tickets are already pile — no Pile checkbox shown. Others get all three.
      const pileCb = t.code === 'ZZDELTA'
        ? '<span style="color:var(--gray-300);font-size:11px;">\u2014</span>'
        : `<input type="checkbox" value="${t.ticket}" class="reclass-cb" data-action="pile">`;
      const walkinCb = `<input type="checkbox" value="${t.ticket}" class="reclass-cb" data-action="walkin">`;
      const excludeCb = `<input type="checkbox" value="${t.ticket}" class="reclass-cb" data-action="exclude">`;
      rows += `<tr>
        <td style="text-align:center;">${excludeCb}</td>
        <td style="text-align:center;">${pileCb}</td>
        <td style="text-align:center;">${walkinCb}</td>
        <td>${t.ticket}</td>
        <td>${t.company}</td>
        <td style="font-family:'DM Mono',monospace;text-align:right;">${t.tons.toFixed(2)}</td>
      </tr>`;
    }

    const overlay = document.createElement('div');
    overlay.className = 'icr-driver-modal';
    overlay.id = 'icrReclassModal';
    overlay.innerHTML = `<div class="icr-driver-box" style="max-width:640px;">
      <h3>Review IC Tickets \u2014 ${data.date || 'Today'}</h3>
      <div style="font-size:12px;color:var(--gray-500);margin-bottom:12px;line-height:1.5;">
        <b>Exclude</b>: drop the ticket entirely (tons/tickets/revenue removed). Use for misclassified or duplicate tickets.<br>
        <b>Pile Pickup</b>: Island/East End pile pickup \u2014 move to walk-in.<br>
        <b>Walk In</b>: this IC ticket was actually a walk-in customer \u2014 move to walk-in.
      </div>
      <div style="max-height:320px;overflow-y:auto;border:1px solid var(--gray-200);border-radius:var(--radius-sm);">
        <table style="width:100%;border-collapse:collapse;font-size:12px;">
          <thead><tr style="border-bottom:1px solid var(--gray-200);background:var(--gray-50);">
            <th style="padding:6px 8px;width:58px;">Exclude</th>
            <th style="padding:6px 8px;width:70px;">Pile Pickup</th>
            <th style="padding:6px 8px;width:54px;">Walk In</th>
            <th style="padding:6px 8px;text-align:left;">Ticket</th>
            <th style="padding:6px 8px;text-align:left;">Company</th>
            <th style="padding:6px 8px;text-align:right;">Tons</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div class="icr-driver-btns" style="margin-top:14px;">
        <button style="background:var(--gray-100);color:var(--gray-600);" onclick="irrReclassifyConfirm(false)">Nothing to flag</button>
        <button style="background:var(--teal);color:white;" onclick="irrReclassifyConfirm(true)">Apply</button>
      </div>
    </div>`;
    document.body.appendChild(overlay);

    window._reclassResolve = resolve;
    window._reclassData = data;
    window._reclassFile = file;
  });
}

function irrReclassifyConfirm(applyChanges) {
  const data = window._reclassData;
  const file = window._reclassFile;
  const resolve = window._reclassResolve;

  if (applyChanges) {
    const actions = {}; // ticket -> 'exclude' | 'pile' | 'walkin'
    // Exclude wins over pile/walk-in; pile and walk-in are functionally the same (move to walk-in)
    document.querySelectorAll('.reclass-cb[data-action="exclude"]:checked').forEach(cb => {
      actions[cb.value] = 'exclude';
    });
    document.querySelectorAll('.reclass-cb[data-action="pile"]:checked').forEach(cb => {
      if (!actions[cb.value]) actions[cb.value] = 'pile';
    });
    document.querySelectorAll('.reclass-cb[data-action="walkin"]:checked').forEach(cb => {
      if (!actions[cb.value]) actions[cb.value] = 'walkin';
    });

    if (Object.keys(actions).length > 0) {
      const b = data.buckets;
      let piledCount = 0, walkinCount = 0, excludedCount = 0;
      for (const [tn, action] of Object.entries(actions)) {
        const t = data.tickets[tn];
        if (!t) continue;
        // Remove from source bucket
        const src = t.code === 'ZZISLAND' ? b.island
                  : t.code === 'ZZEASTEND' ? b.santos
                  : t.code === 'ZZDELTA'   ? b.pile
                  : null;
        if (!src) continue;
        src.tons    -= t.tons;
        src.tickets -= 1;
        if (action === 'pile' || action === 'walkin') {
          b.walkin.tons    += t.tons;
          b.walkin.tickets += 1;
          t.code = 'WALKIN_RECLASS';
          if (action === 'pile') piledCount++; else walkinCount++;
        } else {
          // Exclude — drop entirely. Zero the ticket so downstream revenue passes skip it.
          t.code = 'EXCLUDED';
          t.tons = 0;
          excludedCount++;
        }
      }
      // Recalculate Island/East End revenue from the updated bucket state
      irrCalcRevenue(data.buckets, data.date);
      const msg = [];
      if (piledCount)    msg.push(`${piledCount} pile \u2192 walk-in`);
      if (walkinCount)   msg.push(`${walkinCount} walk-in`);
      if (excludedCount) msg.push(`${excludedCount} excluded`);
      toast(msg.join(' \u00b7 '), true);
    }
  }

  document.getElementById('icrReclassModal').remove();
  irrFinalizeDailyUpload(data, file);
  if (resolve) resolve();
}

async function irrFinalizeDailyUpload(data, file) {
  const status = document.getElementById('irrStatus');
  status.style.display = 'block';
  status.textContent = 'Saving report...';

  await irrSaveReport(data);

  try { await irrAutoSaveFile(file, data.date); } catch (ex) { console.warn('File backup failed:', ex); }

  const ytd = await irrLoadYTD(data.date);

  document.getElementById('irrUploadSection').style.display = 'none';
  document.getElementById('irrReportView').innerHTML = irrRenderReportView(data, ytd);
  window._irrEmail = irrGenerateEmail(data, ytd);

  irrLoadHistoryView();
  toast('Scale report processed', true);

  irrPromptDriverData(data.date);
}

// Auto-save uploaded .xls files to shared "Daily Scale Reports" folder
async function irrAutoSaveFile(file, reportDate) {
  // Find or create the shared folder
  const folderName = 'Daily Scale Reports';
  let {data:folders} = await db.from('helm_folders').select('id').eq('name',folderName).eq('scope','shared').limit(1);
  let folderId;
  if (folders && folders.length > 0) {
    folderId = folders[0].id;
  } else {
    const {data:newFolder,error} = await db.from('helm_folders').insert({name:folderName,scope:'shared',owner:null,created_by:currentUser.username}).select().single();
    if (error || !newFolder) return;
    folderId = newFolder.id;
  }

  // Name the file with the report date
  const dateParts = reportDate ? reportDate.split('/') : [];
  const dateLabel = dateParts.length===3 ? dateParts[2]+'-'+dateParts[0].padStart(2,'0')+'-'+dateParts[1].padStart(2,'0') : new Date().toISOString().split('T')[0];
  const fileName = 'Scale_Report_'+dateLabel+'.xls';
  const storagePath = folderId+'/'+Date.now()+'-'+fileName;

  const {error:sErr} = await db.storage.from('helm-files').upload(storagePath, file, {
    contentType: file.type || 'application/octet-stream',
    upsert: false,
  });
  if (sErr) { console.warn('File upload failed:', sErr.message); return; }

  await db.from('helm_files').insert({
    folder_id: folderId,
    filename: fileName,
    storage_path: storagePath,
    size_bytes: file.size,
    mime_type: file.type || null,
    uploaded_by: currentUser.username,
  });
}

async function irrHandleFile(file) {
  if(!file) return;
  const status = document.getElementById('irrStatus');
  status.style.display='block';
  status.textContent='Reading '+file.name+'...';

  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      status.textContent='Parsing scale data...';
      const rows = irrParseSpreadsheetML(e.target.result);
      const data = irrParseReport(rows);
      await irrLoadRates();
      irrCalcRevenue(data.buckets, data.date);
      irrCurrentData = data;
      status.textContent='Parsed '+Object.keys(data.tickets).length+' tickets.';

      // Show reclassification modal for Island/East End pile pickups
      const hasICTickets = Object.values(data.tickets).some(t=>t.code==='ZZISLAND'||t.code==='ZZEASTEND');
      if (hasICTickets) {
        await irrShowReclassify(data, file);
      } else {
        await irrFinalizeDailyUpload(data, file);
      }
    } catch(err) {
      status.textContent='Error: '+err.message;
      console.error(err);
    }
  };
  reader.readAsText(file);
}

function irrCopyEmail() {
  if(!window._irrEmail) return;
  const html = window._irrEmail.body;
  const tempDiv = document.createElement('div');
  tempDiv.innerHTML = html;
  const plain = tempDiv.innerText;
  try {
    const blob = new ClipboardItem({
      'text/html': new Blob([html],{type:'text/html'}),
      'text/plain': new Blob([plain],{type:'text/plain'}),
    });
    navigator.clipboard.write([blob]).then(()=>{
      const t=document.getElementById('irrCopyToast');
      t.style.display='inline'; setTimeout(()=>t.style.display='none',2500);
    });

      const t=document.getElementById('irrCopyToast');
      t.style.display='inline'; setTimeout(()=>t.style.display='none',2500);
    });
  }
}

    walkin:{label:'Walk-In / Drive-Through',tons:parseFloat(data.walkin_tons),tickets:data.walkin_tickets,tipRevenue:parseFloat(data.walkin_tip_revenue)||0},
  };

  // Always recalculate Island/East End revenue from rates (covers historical data)
  await irrLoadRates();
  irrCalcRevenue(buckets, isoDate);

  // Convert ISO date to M/D/YYYY for display
  const parts = isoDate.split('-');
  const displayDate = parseInt(parts[1])+'/'+parseInt(parts[2])+'/'+parts[0];
  const reportData = {date: displayDate, buckets, tickets:{}};
  irrCurrentData = reportData;

  const ytd = await irrLoadYTD(displayDate);

  document.getElementById('irrUploadSection').style.display='none';
  document.getElementById('irrReportView').innerHTML = irrRenderReportView(reportData, ytd);

  // Scroll to top of report
  document.getElementById('tab-irr').scrollIntoView({behavior:'smooth'});
