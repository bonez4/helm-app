let ctCurrentCompany = 'reis';
let ctData = [];
let ctSearchQuery = '';

// Drag functionality for contacts panel
(function(){
  let dragging=false,ox=0,oy=0;
  document.addEventListener('mousedown',function(e){
    const handle=e.target.closest('#ctDragHandle');
    if(!handle||e.target.closest('.ct-close')) return;
    dragging=true;
    const panel=document.getElementById('contactsPanel');
    panel.style.transform='none'; // remove centering transform once dragging starts
    ox=e.clientX-panel.offsetLeft;
    oy=e.clientY-panel.offsetTop;
    e.preventDefault();
  });
  document.addEventListener('mousemove',function(e){
    if(!dragging) return;
    const panel=document.getElementById('contactsPanel');
    panel.style.left=(e.clientX-ox)+'px';
    panel.style.top=(e.clientY-oy)+'px';
  });
  document.addEventListener('mouseup',function(){dragging=false;});
})();

function toggleContactsPanel(){
  const panel = document.getElementById('contactsPanel');
  const btn = document.getElementById('contactsBtn');
  const isOpen = panel.classList.contains('ct-open');
  if(isOpen){
    panel.classList.remove('ct-open');
    btn.classList.remove('tool-open');
  } else {
    panel.classList.add('ct-open');
    btn.classList.add('tool-open');
    ctLoadContacts();
  }
}

function ctSelectCompany(company, btn){
  ctCurrentCompany = company;
  ctSearchQuery = '';
  const searchEl = document.getElementById('ctSearch');
  if(searchEl) searchEl.value = '';
  document.querySelectorAll('.ct-sidebar-btn').forEach(b=>b.classList.remove('ct-active'));
  if(btn) btn.classList.add('ct-active');
  ctRenderContacts();
}

async function ctLoadContacts(){
  const {data,error} = await db.from('contacts').select('*').order('section').order('sort_order').order('name');
  if(error){console.error(error);return;}
  ctData = data||[];
  ctRenderContacts();
}

function ctDoSearch(q){
  ctSearchQuery = q.trim().toLowerCase();
  ctRenderContacts();
}

function ctRenderContacts(){
  const main = document.getElementById('ctMain');
  const co = ctCurrentCompany;
  const q = ctSearchQuery;

  let office, drivers;
  if(q.length>=2){
    // Search across ALL companies
    office = ctData.filter(c=>c.section==='office' && (c.name||'').toLowerCase().includes(q));
    drivers = ctData.filter(c=>c.section==='driver' && (c.name||'').toLowerCase().includes(q));
    // Deactivate company buttons visually
    document.querySelectorAll('.ct-sidebar-btn').forEach(b=>b.classList.remove('ct-active'));
  } else {
    office = ctData.filter(c=>c.company===co&&c.section==='office');
    drivers = ctData.filter(c=>c.company===co&&c.section==='driver');
  }

  let html = '';

  // Office section
  html += '<div class="ct-section-hdr">Office</div>';
  const coTag=c=>q.length>=2?` <span style="font-size:9px;opacity:0.5;text-transform:uppercase;padding-left:4px;">${c.company}</span>`:'';
  const ed=(id,field,val,placeholder)=>`<span class="ct-edit" contenteditable="true" data-placeholder="${placeholder}" onblur="ctSaveField(${id},'${field}',this.textContent)" onkeydown="ctEditKey(event)">${esc(val||'')}</span>`;
  if(office.length){
    for(const c of office){
      html += `<div class="ct-row">
        <span class="ct-row-name">${ed(c.id,'name',c.name,'Name')}${coTag(c)}</span>
        <span class="ct-row-phone">${ed(c.id,'phone',c.phone,'Phone')}</span>
        <span class="ct-row-email">${ed(c.id,'email',c.email,'Email')}</span>
        <button class="ct-del" onclick="ctDelete(${c.id})" title="Remove">&times;</button>
      </div>`;
    }
  } else {
    html += '<div style="font-size:11px;color:rgba(255,255,255,0.4);padding:6px 0;">'+(q.length>=2?'No office matches':'No office contacts yet')+'</div>';
  }
  html += `<div class="ct-add-row">
    <input id="ctOffName" placeholder="Name">
    <input id="ctOffPhone" placeholder="Phone">
    <input id="ctOffEmail" placeholder="Email">
    <button class="ct-add-btn" onclick="ctAdd('office')">+</button>
  </div>`;

  // Drivers section (no email column)
  html += '<div class="ct-section-hdr" style="margin-top:14px">Drivers</div>';
  if(drivers.length){
    for(const c of drivers){
      html += `<div class="ct-row ct-driver-row">
        <span class="ct-row-name">${ed(c.id,'name',c.name,'Name')}${coTag(c)}</span>
        <span class="ct-row-phone">${ed(c.id,'phone',c.phone,'Phone')}</span>
        <button class="ct-del" onclick="ctDelete(${c.id})" title="Remove">&times;</button>
      </div>`;
    }
  } else {

async function ctAdd(section){
  const isOffice = section==='office';
  const nameEl = document.getElementById(isOffice?'ctOffName':'ctDrvName');
  const phoneEl = document.getElementById(isOffice?'ctOffPhone':'ctDrvPhone');
  const emailEl = isOffice ? document.getElementById('ctOffEmail') : null;
  const name = nameEl?.value.trim();
  const phone = phoneEl?.value.trim();
  const email = emailEl?.value.trim();
  if(!name){toast('Name is required');return;}

  const {error} = await db.from('contacts').insert({
    company: ctCurrentCompany,
    section: section,
    name: name,
    phone: phone||null,
    email: (isOffice&&email)?email:null,
  });
  if(error){toast('Error: '+error.message);return;}
  toast(name+' added',true);
  await ctLoadContacts();
}

async function ctDelete(id){
  const {error} = await db.from('contacts').delete().eq('id',id);
  if(error){toast('Error: '+error.message);return;}
  await ctLoadContacts();
}

function ctEditKey(event){
  if(event.key==='Enter'){event.preventDefault();event.target.blur();}
  else if(event.key==='Escape'){event.preventDefault();const c=ctData.find(x=>x.id==event.target.getAttribute('data-id'));event.target.blur();}
}

async function ctSaveField(id, field, value){
  const trimmed = (value||'').replace(/\s+/g,' ').trim();
  const contact = ctData.find(c=>c.id===id);
  if(!contact) return;
  const original = contact[field] || '';
  if(trimmed === original) return;
  if(field==='name' && !trimmed){toast('Name cannot be empty');ctRenderContacts();return;}
  const payload = {}; payload[field] = trimmed || null;
  const {error} = await db.from('contacts').update(payload).eq('id', id);
  if(error){toast('Error: '+error.message);ctRenderContacts();return;}
  contact[field] = trimmed || null;
  toast('Saved',true);
}

function expandSticky(id){

// ── STICKY DRAG ───────────────────────────────────────────────────────
(function(){
  let dragging=false, ox=0, oy=0, pl=0, pt=0;
  document.addEventListener('mousedown', function(e){
    const handle = document.getElementById('stickyHandle');
    if(!handle || !handle.contains(e.target)) return;
    const panel = document.getElementById('stickyPanel');
    dragging=true;
    ox=e.clientX; oy=e.clientY;
    pl=panel.offsetLeft; pt=panel.offsetTop;
    e.preventDefault();
  });
  document.addEventListener('mousemove', function(e){
    if(!dragging) return;
    const panel = document.getElementById('stickyPanel');
    panel.style.left = (pl + e.clientX - ox) + 'px';
    panel.style.top  = (pt + e.clientY - oy) + 'px';
  });
  document.addEventListener('mouseup', function(){ dragging=false; });
})();

function getTodayISO() {
  const d = new Date();
  d.setHours(0,0,0,0);
  return d.toISOString().split('T')[0];
}

function fmtDate(iso){
  if(!iso) return '';
  const d=new Date(iso+'T00:00:00');
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function fmtDateShort(iso){
  if(!iso) return '';
  const d=new Date(iso+'T00:00:00');
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  const y=String(d.getFullYear()).slice(2);
  return m+day+y;
}

function fmtTimestamp(ts){
  if(!ts) return '';
  const d=new Date(ts);
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  const y=String(d.getFullYear()).slice(2);
  const h=String(d.getHours()).padStart(2,'0');
  const min=String(d.getMinutes()).padStart(2,'0');
  return `${m}/${day}/${y} ${h}:${min}`;
}

async function loadClients() {
  let all=[], from=0, batch=1000;
  while(true){
    const {data,error}=await db.from('clients').select('*').order('client_id').range(from,from+batch-1);
    if(error){toast('Failed to load clients');break;}
    if(!data||data.length===0) break;
    all=[...all,...data];
    if(data.length<batch) break;
    from+=batch;

  clients=all;
  const hint=document.getElementById('srchHint');
  if(hint) hint.textContent=clients.length>0
    ?`${clients.length.toLocaleString()} clients loaded — search by account #, name, address, or phone`

function doSearch(q){
  q=q.trim().toLowerCase();
  const res=document.getElementById('srchResults');
  if(q.length<2){res.innerHTML='';updateLookupWatermark();return;}

  // Tokenize: split query into words, every word must match SOMEWHERE
  const tokens=q.split(/\s+/).filter(t=>t.length>0);
  const qClean=q.replace(/\D/g,'');

  const results=clients
    .map(c=>{
      const idL=c.client_id.toLowerCase();
      const addrL=c.address.toLowerCase();
      const nameL=(c.client_name||'').toLowerCase();
      const phoneClean=(c.phone||'').replace(/\D/g,'');
      // Haystack = all searchable fields combined
      const hay=idL+' '+nameL+' '+addrL+' '+phoneClean;
      // Every token must appear in the haystack
      const allMatch=tokens.every(t=>hay.includes(t));
      if(!allMatch) return {c,score:0};
      // Score for ranking: prefer name/id matches over address
      let score=1;
      if(idL===q) score=10;
      else if(idL.startsWith(q)) score=8;
      else if(idL.includes(q)) score=6;
      if(nameL){
        if(nameL.includes(q)) score=Math.max(score,7);
        else if(tokens.every(t=>nameL.includes(t))) score=Math.max(score,5);
      }
      if(addrL.includes(q)) score=Math.max(score,3);
      if(qClean.length>=3&&phoneClean.includes(qClean)) score=Math.max(score,qClean.length>=7?9:4);
      return {c,score};
    })
    .filter(x=>x.score>0)
    .sort((a,b)=>b.score-a.score)
    .slice(0,10);

  if(!results.length){res.innerHTML='<div class="empty-state">No clients found</div>';updateLookupWatermark();return;}
  if(results.length===1){res.innerHTML='';openClient(results[0].c);updateLookupWatermark();return;}
  res.innerHTML='<div class="results-list">'+results.map(({c})=>{
    const co=getCompany(c.client_id);
    return `
    <div class="result-item" tabindex="0" data-cid="${esc(c.client_id)}" onclick="pickClient('${esc(c.client_id)}')" onkeydown="handleResultKey(event,'${esc(c.client_id)}')">
      <div>
        <div class="result-id">${c.client_name?`${esc(c.client_name)} &mdash; `:''}${esc(c.client_id)}${co.name?` <span class="company-tag ${co.cls}">${co.name}</span>`:''}</div>
        <div class="result-addr">${esc(c.address)}</div>
      </div>
      <div class="result-day">${esc(c.service_day||'')}</div>
    </div>`;
  }).join('')+'</div>';
  updateLookupWatermark();
}

function handleSearchKey(e){
  if(e.key==='Enter'){
    e.preventDefault();
    const first=document.querySelector('.result-item');
    if(first){first.click();return;}
    // If search has text but no results list, check if single match auto-opened
  }
  if(e.key==='ArrowDown'){
    e.preventDefault();
    const first=document.querySelector('.result-item');
    if(first) first.focus();
  }
}

function handleResultKey(e,cid){
  if(e.key==='Enter'){e.preventDefault();pickClient(cid);return;}
  if(e.key==='ArrowDown'){
    e.preventDefault();
    const next=e.target.nextElementSibling;
    if(next) next.focus();
  }
  if(e.key==='ArrowUp'){
    e.preventDefault();
    const prev=e.target.previousElementSibling;
    if(prev) prev.focus();
    else document.getElementById('srch').focus();
  }
}

function toggleNoteDateField(){
  const sel=document.getElementById('noteAction');
  const dateIn=document.getElementById('noteActionDate');
  if(!sel||!dateIn) return;
  const action=ACTION_TYPES.find(a=>a.value===sel.value);
  dateIn.style.display=action&&action.needsDate?'':'none';
}

function renderNotesTable(notes){
  const wrap=document.getElementById('notesTableWrap');
  if(!wrap) return;
  if(!notes.length){
    wrap.innerHTML='<div style="padding:8px;text-align:center;color:var(--gray-400);font-size:11px">No notes yet</div>';
    return;
  }
  wrap.innerHTML=notes.map(n=>{
    const at=ACTION_TYPES.find(a=>a.value===n.action)||{tag:'at-note'};
    return `<div class="note-row">
      <div class="note-row-header">
        <span class="note-meta">${fmtTimestamp(n.created_at)}</span>
        <span class="note-user">${esc(n.user_id)||''}</span>
        <span class="action-tag ${at.tag}">${esc(n.action)}</span>
        ${n.action_date?`<span style="font-size:10px;color:var(--teal);font-weight:600">${fmtDate(n.action_date)}</span>`:''}
        <button class="note-del" data-note-id="${n.id}" title="Delete note">&times;</button>
      </div>
      ${n.note?`<div class="note-row-body">${esc(n.note)}</div>`:''}
    </div>`;
  }).join('');
  // Event delegation — inline confirm replaces × button on first click
  wrap.onclick=function(e){
    const btn=e.target.closest('.note-del');
    const yes=e.target.closest('.note-del-yes');
    const no=e.target.closest('.note-del-no');
    if(btn){
      const noteId=btn.dataset.noteId;
      btn.outerHTML=`<div class="note-del-confirm"><span>Delete?</span><button class="note-del-yes" data-note-id="${noteId}">Yes</button><button class="note-del-no">No</button></div>`;
    } else if(yes){
      deleteNote(yes.dataset.noteId);
    } else if(no){
      // Reset — re-render notes to restore × button
      renderNotesTable(clientNotes);
    }
  };
}

async function submitNote(baseId){
  const action=document.getElementById('noteAction').value;
  const dateIn=document.getElementById('noteActionDate');
  const textIn=document.getElementById('noteText');
  const noteText=textIn.value.trim();
  const actionType=ACTION_TYPES.find(a=>a.value===action);
  const actionDate=actionType&&actionType.needsDate?dateIn.value:null;

  if(actionType&&actionType.needsDate&&!actionDate){
    toast('Select a date for this action');return;
  }

  const {error}=await db.from('notes').insert({
    client_id:baseId,
    user_id:currentUser?currentUser.display_name:'',
    action:action,
    action_date:actionDate||null,
    note:noteText
  });
  if(error){toast('Error: '+error.message);return;}
  textIn.value='';
  dateIn.value='';
  toast('Note added',true);
  logActivity('note_added', action+(baseId?' on '+baseId:''));
  const notes=await loadNotes(baseId);
  renderNotesTable(notes);
}

async function saveClientEdit(cid){
  const name=document.getElementById('editName').value.trim();
  const addr=document.getElementById('editAddr').value.trim();
  const phone=document.getElementById('editPhone').value.trim();
  const email=document.getElementById('editEmail').value.trim();
  const days=[...document.querySelectorAll('#editDaysWrap .day-toggle-active')].map(b=>b.dataset.day);
  const autopay=document.getElementById('editAutopay')?.checked||false;
  const routeVal=document.getElementById('editRoute')?.value||'';
  const route=routeVal?parseInt(routeVal):null;
  if(!addr){toast('Address is required');return;}
  if(!days.length){toast('Select at least one pickup day');return;}
  const {error}=await db.from('clients').update({

  }).eq('client_id',cid);

  if(updated){activeClient=updated;showPanel(updated);}

function findClient(cid){
  return clients.find(x=>x.client_id===cid)||clients.find(x=>x.client_id===getBaseId(cid))||{};
}

function fetchReportData(notesData,skipsData,date){
  const data=[...(notesData||[])];
  if(skipsData&&skipsData.length){
    skipsData.forEach(s=>{
      const skipId=getBaseId(s.client_id); // handle legacy suffixed IDs
      const already=data.some(n=>n.client_id===skipId&&n.action==='Skip Day');
      if(!already){
        data.push({
          client_id:skipId,
          action:'Skip Day',
          action_date:date,
          note:s.inquiry_method?`via ${s.inquiry_method}`:'',
          logged_by:s.logged_by||'',
          created_at:s.created_at||''
        });
      }
    });
  }
  // Group by action
  const grouped={};
  data.forEach(n=>{
    if(!grouped[n.action]) grouped[n.action]=[];
    grouped[n.action].push(n);
  });
  return {data,grouped};
}

  companies.forEach(comp=>{
    const compData=data.filter(comp.filter);
    if(!compData.length) return;
    // Group by action within this company
    const compGrouped={};

    html+=`<div style="margin-bottom:1.5rem">

// Track whether first add has happened in this session per company
// First add gets +50 buffer, subsequent adds get +1
let _firstAddReis = true, _firstAddSantos = true;

function nextIdForCompany(company){
  // Match any 6-digit ID whose first digit matches the company
  // REIS = first digit 2 (20xxxx, 21xxxx, ...)
  // SANTOS = first digit 3 (30xxxx, 31xxxx, ...)
  const firstDigit = company==='santos' ? '3' : '2';
  const matching = clients.map(c=>c.client_id||'').filter(id=>id.length>=6 && id[0]===firstDigit);
  // Baseline: 200000 for REIS, 300000 for SANTOS
  let maxId = parseInt(firstDigit+'00000', 10);
  for(const id of matching){
    const n = parseInt(id, 10);
    if(!isNaN(n) && n > maxId) maxId = n;
  }
  // First add gets +50 safety buffer (+1 for increment = +51)
  const isFirst = (company==='santos' ? _firstAddSantos : _firstAddReis);
  const bump = isFirst ? 51 : 1;
  let next = maxId + bump;
  // Ensure uniqueness: if by some chance the computed ID is already in use, bump until free
  const existing = new Set(clients.map(c=>c.client_id));
  while(existing.has(String(next))) next++;
  return String(next);
}

                <span class="day-full">${d}</span>

}

function setAddCompany(company){
  window._addCompany = company;
  renderAdd(); // re-render to enable/populate the form
}

function markCompanyFirstAddDone(company){
  if(company==='santos') _firstAddSantos = false;
  else _firstAddReis = false;
}

function toggleDay(btn){ btn.classList.toggle('day-toggle-active'); }

async function addClient(){
  const id=document.getElementById('nId').value.trim();
  const name=document.getElementById('nName').value.trim();
  const addr=document.getElementById('nAddr').value.trim();
  const phone=document.getElementById('nPhone').value.trim();
  const email=document.getElementById('nEmail').value.trim();
  const selectedDays=[...document.querySelectorAll('.day-toggle-active')].map(b=>b.dataset.day);
  if(!id||!addr){toast('Account # and address are required');return;}
  if(!selectedDays.length){toast('Select at least one pickup day');return;}

  const addrLower=addr.toLowerCase().trim();
  const nameLower=name.toLowerCase().trim();
  const dupes=clients.filter(c=>{
    const sameAddr=c.address.toLowerCase().trim()===addrLower;
    const sameName=nameLower&&c.client_name&&c.client_name.toLowerCase().trim()===nameLower;
    return sameAddr||sameName;
  });

  if(dupes.length){
    pendingClient={id,selectedDays,addr,phone,email,name};
    const dupeList=dupes.map(c=>`${esc(c.client_name||'')}${c.client_name?' �� ':''}${esc(c.client_id)} (${esc(c.service_day)})`).join(', ');
    const msg=document.getElementById('addMsg');
    msg.style.color='var(--warn-text)';
    msg.innerHTML=`
      <div style="background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:var(--radius-sm);padding:8px 10px;margin-bottom:8px">
        <strong>Possible duplicate</strong><br/>
        <span style="font-size:12px">${dupeList}</span>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn-add" style="flex:1;background:var(--gray-400)" onclick="renderAdd()">Cancel</button>
        <button class="btn-add" style="flex:2" onclick="confirmAddClient()">Add Anyway</button>
      </div>`;
    return;
  }

  await saveClient(id,selectedDays,addr,phone,email,name);
}

async function confirmAddClient(){
  if(!pendingClient) return;
  const {id,selectedDays,addr,phone,email,name}=pendingClient;
  pendingClient=null;
  await saveClient(id,selectedDays,addr,phone,email,name);
}

async function saveClient(id,selectedDays,addr,phone,email,name){
  const msg=document.getElementById('addMsg');
  if(msg){msg.style.color='var(--gray-400)';msg.textContent='Saving…';}
  const record={
    client_id: id,
    service_day: selectedDays.join(','),
    address: addr,
    phone: phone||null,
    email: email||null,
    client_name: name||null,
  };
  const {error}=await db.from('clients').insert(record);
  if(error){
    // Handle duplicate key violation specifically
    if(error.code==='23505'||(error.message||'').toLowerCase().includes('duplicate')){
      toast('Account # '+id+' already exists — try again');
      if(msg){msg.style.color='var(--err-text)';msg.textContent='Account # already exists. The next available ID will be suggested.';}
      // Reload to get fresh client list and re-render (will compute a new next ID)
      await loadClients();
      setTimeout(()=>renderAdd(), 1200);
      return;
    }
    toast('Error: '+error.message);if(msg)msg.textContent='';return;
  }
  await loadClients();
  // Mark that first-add has happened for this company (so next add increments by 1, not 51)
  const co=getCompany(id);
  if(co.name==='SANTOS') markCompanyFirstAddDone('santos');
  else if(co.name==='REIS') markCompanyFirstAddDone('reis');
  if(msg){msg.style.color='var(--ok-text)';msg.textContent=`Client ${id} added — ${selectedDays.join(', ')}`;}
  toast(`Client ${id} added`,true);
  setTimeout(()=>{window._addCompany=null;renderAdd();}, 1800);
}

// ── ROLL-OFFS ─────────────────────────────────────────────────────────
// When the "RESET MONTHLY RENTAL FEES" banner appears on the Roll-offs page.
// Accepts: 'last' (last day of the current month), a number 1-31, or null to disable.
const ROLLOFF_TIP_RESET_DAY = 'last';
let rolloffsData=[];
let rolloffSort={col:'date',asc:false};
let showDeleted=false;
let rolloffUndo=null;

let rolloffSearch='';
function renderRolloffs(){
  document.getElementById('tab-rolloffs').innerHTML=`
    <div class="card" style="max-width:100%">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <h2 style="font-size:15px;font-weight:700;margin:0">Roll-offs</h2>
        <div style="display:flex;gap:6px;align-items:center">
          <label style="font-size:11px;color:var(--gray-400);cursor:pointer;display:flex;align-items:center;gap:4px">
            <input type="checkbox" id="showDeletedToggle" onchange="showDeleted=this.checked;loadRolloffs()" ${showDeleted?'checked':''}/> Show deleted
          </label>
          <button class="btn-add" style="background:var(--gray-100);color:var(--gray-700);" onclick="exportRolloffSheet()" title="Export print-style rolloff sheet with 20 blank handwriting rows">Export Print Sheet</button>
          <button class="btn-add" style="background:var(--gray-100);color:var(--gray-700);" onclick="exportUntippedRolloffs()" title="Export all un-tipped roll-offs to Excel">Export Untipped</button>
          <button class="btn-add" style="background:#fff3cd;color:#856404;border:1px solid #ffc107;" onclick="resetMonthlyTips()" title="Clear all Monthly Tip flags">Reset Monthly Tips</button>
          <button class="btn-add" onclick="addRolloffRow()">+ Add Row</button>
        </div>
      </div>
      <div id="rolloffResetBanner" style="display:none;"></div>
      <div style="position:relative;margin-bottom:8px">
        <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--gray-300);font-size:14px">&#128269;</span>
        <input type="text" id="rolloffSearchInput" placeholder="Search roll-offs by customer, address, type, notes…" oninput="rolloffSearch=this.value;renderRolloffTable()" style="width:100%;padding:7px 10px 7px 32px;border:1px solid var(--gray-200);border-radius:var(--radius-sm);font-size:12px;font-family:inherit;outline:none;transition:border-color .15s;" onfocus="this.style.borderColor='var(--teal)'" onblur="this.style.borderColor='var(--gray-200)'"/>
      </div>
      <div id="rolloffUndo" style="display:none;background:#fef3cd;padding:6px 10px;border-radius:6px;margin-bottom:6px;font-size:12px;justify-content:space-between;align-items:center"></div>
      <div id="rolloffTable" style="overflow-x:auto">
        <div class="loading">Loading…</div>
      </div>
    </div>`;
  loadRolloffs();
}

async function loadRolloffs(){
  let q=db.from('rolloffs').select('*').order(rolloffSort.col,{ascending:rolloffSort.asc});
  if(!showDeleted) q=q.eq('deleted',false);
  const {data,error}=await q;
  if(error){toast('Error: '+error.message);return;}
  rolloffsData=data||[];
  renderRolloffTable();
}

function renderRolloffTable(){
  // Update reset-banner visibility
  const banner = document.getElementById('rolloffResetBanner');
  if(banner){
    const today = new Date();
    const anyTipped = rolloffsData.some(r => r.monthly_tip && !r.deleted);
    let isResetDay = false;
    if(ROLLOFF_TIP_RESET_DAY === 'last'){
      const tomorrow = new Date(today); tomorrow.setDate(today.getDate()+1);
      isResetDay = tomorrow.getDate() === 1; // today is last day of month
    } else if(typeof ROLLOFF_TIP_RESET_DAY === 'number'){
      isResetDay = today.getDate() >= ROLLOFF_TIP_RESET_DAY;
    }
    const showBanner = isResetDay && anyTipped;
    if(showBanner){
      const tippedCount = rolloffsData.filter(r => r.monthly_tip && !r.deleted).length;
      banner.style.display = 'flex';
      banner.style.cssText = 'display:flex;align-items:center;justify-content:space-between;gap:12px;background:linear-gradient(90deg,#fef3cd 0%,#ffe08a 100%);border:1px solid #ffc107;color:#856404;padding:10px 14px;margin-bottom:10px;border-radius:6px;font-weight:700;font-size:13px;letter-spacing:0.5px;';
      banner.innerHTML = `<span>\u26A0 RESET MONTHLY RENTAL FEES \u2014 ${tippedCount} roll-off(s) still marked as tipped this month</span>
        <button class="btn-add" style="background:#856404;color:#fff3cd;font-size:11px;" onclick="resetMonthlyTips()">Reset Now</button>`;
    } else {
      banner.style.display = 'none';
    }
  }

  const wrap=document.getElementById('rolloffTable');
  if(!rolloffsData.length){
    wrap.innerHTML='<div class="empty-state">No roll-offs yet. Click "+ Add Row" to start.</div>';
    return;
  }
  const q=rolloffSearch.trim().toLowerCase();
  const filtered=q?rolloffsData.filter(r=>{
    return [r.customer,r.address_number,r.street,r.type,r.notes,r.date]
      .filter(Boolean).some(v=>v.toLowerCase().includes(q));
  }):rolloffsData;
  if(q&&!filtered.length){
    wrap.innerHTML=`<div class="empty-state">No roll-offs matching "${esc(rolloffSearch.trim())}"</div>`;
    return;
  }
  const cols=[
    {key:'date',label:'Date',width:'100px'},
    {key:'type',label:'Type',width:'70px'},
    {key:'customer',label:'Customer',width:'auto'},
    {key:'address_number',label:'Number',width:'80px'},
    {key:'street',label:'Street',width:'auto'},
    {key:'monthly_tip',label:'Monthly Tip',width:'90px'},
    {key:'notes',label:'Notes',width:'120px'}
  ];
  const sortIcon=(col)=>rolloffSort.col===col?(rolloffSort.asc?'&#9650;':'&#9660;'):'';
  let html=`<table class="ro-table"><thead><tr>`;
  cols.forEach(c=>{
    html+=`<th style="width:${c.width};cursor:pointer;user-select:none" onclick="sortRolloffs('${c.key}')">${c.label} <span style="font-size:9px">${sortIcon(c.key)}</span></th>`;
  });
  html+=`<th style="width:36px"></th></tr></thead><tbody>`;
  filtered.forEach(r=>{
    const deleted=r.deleted;
    const rowStyle=deleted?'opacity:0.4;text-decoration:line-through;':'';
    html+=`<tr style="${rowStyle}" data-roid="${r.id}">`;
    // Date cell
    html+=`<td><input type="date" class="ro-input" value="${r.date||''}" onchange="updateRolloff(${r.id},'date',this.value)" ${deleted?'disabled':''}/></td>`;
    // Type cell - dropdown
    const roTypes=['AJ','REIS','AJ/REIS','30YD','40YD','30/40YD','SANTOS BOX'];
    html+=`<td><select class="ro-input" onchange="updateRolloff(${r.id},'type',this.value)" ${deleted?'disabled':''}>
      <option value=""${!r.type?' selected':''}></option>
      ${roTypes.map(t=>`<option value="${t}"${r.type===t?' selected':''}>${t}</option>`).join('')}
    </select></td>`;
    // Customer cell
    html+=`<td><input type="text" class="ro-input" value="${esc(r.customer||'')}" onchange="updateRolloff(${r.id},'customer',this.value)" onkeydown="roKeyNav(event,${r.id},'customer')" ${deleted?'disabled':''}/></td>`;
    // Number cell
    html+=`<td><input type="text" class="ro-input" value="${esc(r.address_number||'')}" onchange="updateRolloff(${r.id},'address_number',this.value)" onkeydown="roKeyNav(event,${r.id},'address_number')" ${deleted?'disabled':''}/></td>`;
    // Street cell
    html+=`<td><input type="text" class="ro-input" value="${esc(r.street||'')}" onchange="updateRolloff(${r.id},'street',this.value)" onkeydown="roKeyNav(event,${r.id},'street')" ${deleted?'disabled':''}/></td>`;
    // Monthly Tip cell — checkbox + Yes/No label
    const tipped = !!r.monthly_tip;
    html+=`<td style="text-align:center;"><button class="ro-tip-btn ${tipped?'tipped':''}" onclick="toggleRolloffTip(${r.id})" ${deleted?'disabled':''} title="Click to toggle">${tipped?'Yes':'No'}</button></td>`;
    // Notes cell
    html+=`<td><input type="text" class="ro-input" value="${esc(r.notes||'')}" onchange="updateRolloff(${r.id},'notes',this.value)" onkeydown="roKeyNav(event,${r.id},'notes')" ${deleted?'disabled':''}/></td>`;
    // Delete/restore button
    if(deleted){
      html+=`<td><button class="ro-del" title="Restore" onclick="restoreRolloff(${r.id})">&#8634;</button></td>`;
    } else {
      html+=`<td><button class="ro-del" title="Delete" onclick="softDeleteRolloff(${r.id})">&#128465;</button></td>`;
    }
    html+=`</tr>`;
  });
  html+=`</tbody></table>`;
  const countLabel=q?`<div style="font-size:11px;color:var(--gray-400);margin-top:4px">${filtered.length} of ${rolloffsData.length} roll-offs shown</div>`:'';
  wrap.innerHTML=html+countLabel;
}

function sortRolloffs(col){
  if(rolloffSort.col===col) rolloffSort.asc=!rolloffSort.asc;
  else { rolloffSort.col=col; rolloffSort.asc=true; }
  loadRolloffs();
}

async function addRolloffRow(){
  // Flush any pending onchange edits before re-rendering
  if(document.activeElement && document.activeElement !== document.body) document.activeElement.blur();
  await new Promise(r=>setTimeout(r,60));
  const today=new Date().toISOString().split('T')[0];
  const {data,error}=await db.from('rolloffs').insert({date:today,type:null,customer:'',address_number:'',street:'',deleted:false}).select();
  if(error){toast('Error: '+error.message);return;}
  const newId=data&&data[0]?data[0].id:null;
  await loadRolloffs();
  // Focus the new row's customer field by ID
  if(newId){
    setTimeout(()=>{
      const row=document.querySelector(`tr[data-roid="${newId}"]`);
      if(row){
        const inp=row.querySelector('input[type="text"]');
        if(inp) inp.focus();
      }
    },100);
  }
}

async function updateRolloff(id,col,val){
  const update={[col]:val||null,updated_at:new Date().toISOString()};
  const {error}=await db.from('rolloffs').update(update).eq('id',id);
  if(error) toast('Save error: '+error.message);
  else logActivity('rolloff_edit','id:'+id+' '+col+'='+val);
}

async function softDeleteRolloff(id){
  const row=rolloffsData.find(r=>r.id===id);
  const {error}=await db.from('rolloffs').update({deleted:true,deleted_at:new Date().toISOString(),deleted_by:currentUser?currentUser.display_name:''}).eq('id',id);
  if(error){toast('Error: '+error.message);return;}
  // Show undo
  rolloffUndo={id,timeout:null};
  const undoEl=document.getElementById('rolloffUndo');
  undoEl.style.display='flex';
  undoEl.innerHTML=`<span>Row deleted (${esc(row?row.customer||'':'')})</span><button class="btn-add" style="padding:2px 10px;font-size:11px" onclick="restoreRolloff(${id})">Undo</button>`;
  clearTimeout(rolloffUndo.timeout);
  rolloffUndo.timeout=setTimeout(()=>{undoEl.style.display='none';rolloffUndo=null;},8000);
  await loadRolloffs();
}

async function restoreRolloff(id){
  const {error}=await db.from('rolloffs').update({deleted:false,deleted_at:null,deleted_by:null}).eq('id',id);
  if(error){toast('Error: '+error.message);return;}
  const undoEl=document.getElementById('rolloffUndo');
  if(undoEl) undoEl.style.display='none';
  rolloffUndo=null;
  toast('Row restored',true);
  await loadRolloffs();
}

function roKeyNav(event,id,col){
  if(event.key==='Tab'||event.key==='Enter'){
    event.target.blur(); // trigger onchange save
  }
}

async function toggleRolloffTip(id){
  const row = rolloffsData.find(r=>r.id===id);
  if(!row) return;
  const newVal = !row.monthly_tip;
  const {error} = await db.from('rolloffs').update({monthly_tip: newVal, updated_at: new Date().toISOString()}).eq('id', id);
  if(error){toast('Save error: '+error.message);return;}
  row.monthly_tip = newVal;
  renderRolloffTable();
  logActivity('rolloff_tip','id:'+id+' monthly_tip='+newVal);
}

async function resetMonthlyTips(){
  const tippedCount = rolloffsData.filter(r => r.monthly_tip && !r.deleted).length;
  if(tippedCount === 0){ toast('No Monthly Tip flags set \u2014 nothing to reset'); return; }
  if(!confirm('Reset Monthly Tip to No for all '+tippedCount+' tipped roll-off(s)? This cannot be undone.')) return;
  const {error} = await db.from('rolloffs').update({monthly_tip: false, updated_at: new Date().toISOString()}).eq('monthly_tip', true);
  if(error){toast('Reset failed: '+error.message); return;}
  toast(tippedCount+' Monthly Tip flag(s) cleared', true);
  logActivity('rolloff_tip_reset','count:'+tippedCount);
  await loadRolloffs();
}

<x:WorksheetOptions>

  <x:Print><x:ValidPrinterInfo/><x:HorizontalResolution>600</x:HorizontalResolution><x:VerticalResolution>600</x:VerticalResolution></x:Print>
  <x:Selected/>
  <x:Zoom>100</x:Zoom>
  <x:PageBreakZoom>100</x:PageBreakZoom>
</x:WorksheetOptions>
</x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]-->
<style>table{border-collapse:collapse;} td, th{mso-number-format:"\\@";}</style>
</head><body>
<table border="1" cellspacing="0" cellpadding="0" style="border-collapse:collapse;font-family:'Times New Roman',serif;">
  <colgroup>${colGroup}</colgroup>
  <thead>
    <tr style="height:32pt;">

  const blob = new Blob(['\ufeff', html], {type:'application/vnd.ms-excel'});

  document.body.appendChild(a);

function exportUntippedRolloffs(){
  const untipped = rolloffsData.filter(r => !r.monthly_tip && !r.deleted);
  if(!untipped.length){ toast('No untipped roll-offs to export'); return; }

  const today = new Date();
  const isoDate = today.toISOString().split('T')[0];
  const fmt = d => d ? new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'numeric',day:'numeric',year:'numeric'}) : '';
  const daysOnSite = d => {
    if(!d) return '';
    const placed = new Date(d+'T00:00:00');
    const diff = Math.floor((today - placed) / 86400000);
    return diff >= 0 ? diff : '';
  };

  // Build HTML table for Excel export
  let rows = '';
  untipped.forEach(r => {
    const days = daysOnSite(r.date);
    const charge = typeof days==='number' ? '$'+(days*4).toFixed(2) : '';
    rows += `<tr>
      <td>${fmt(r.date)}</td>
      <td>${esc(r.type||'')}</td>
      <td>${esc(r.customer||'')}</td>
      <td>${esc(r.address_number||'')}</td>
      <td>${esc(r.street||'')}</td>
      <td>${esc(r.notes||'')}</td>
      <td style="text-align:right;">${days}</td>
      <td style="text-align:right;">${charge}</td>
    </tr>`;
  });

  const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="UTF-8"><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet><x:Name>Untipped Rolloffs</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]--></head><body>
    <h2>Untipped Roll-offs as of ${fmt(isoDate)}</h2>
    <table border="1" cellpadding="4" cellspacing="0" style="border-collapse:collapse;font-family:Arial,sans-serif;font-size:11px;">
      <thead style="background:#0f1f3d;color:white;"><tr>

async function loadActivityReport(){
  const date=document.getElementById('activityDate').value;
  if(!date) return;
  const wrap=document.getElementById('activityReportWrap');
  wrap.innerHTML='<div class="loading" style="padding:10px 0">Loading…</div>';
  const start=date+'T00:00:00', end=date+'T23:59:59';
  const [{data:hb},{data:acts}]=await Promise.all([
    db.from('heartbeats').select('*').gte('ts',start).lte('ts',end).order('ts'),
    db.from('activity_log').select('*').gte('ts',start).lte('ts',end).order('ts')
  ]);
  if(!hb?.length&&!acts?.length){
    wrap.innerHTML='<div style="padding:10px 0;color:var(--gray-400);font-size:12px">No activity recorded for this date.</div>';
    return;
  }
  const users=[...new Set([...(hb||[]).map(h=>h.user_id),...(acts||[]).map(a=>a.user_id)])].sort();
  const ACTION_LABELS={'client_lookup':'lookups','note_added':'notes added','report_generated':'reports run','rolloff_edit':'rolloff edits'};
  let html='<div class="activity-wrap">';
  users.forEach(user=>{
    const userHb=(hb||[]).filter(h=>h.user_id===user).map(h=>new Date(h.ts)).sort((a,b)=>a-b);
    const userActs=(acts||[]).filter(a=>a.user_id===user);
    let activeMin=0;
    let firstSeen=null,lastSeen=null;
    if(userHb.length){
      firstSeen=userHb[0]; lastSeen=userHb[userHb.length-1];
      for(let i=1;i<userHb.length;i++){
        const gap=(userHb[i]-userHb[i-1])/60000;
        if(gap<=10) activeMin+=gap;
      }
      activeMin+=5;
    }
    const counts={};
    userActs.forEach(a=>{counts[a.action]=(counts[a.action]||0)+1;});
    const actStr=Object.entries(counts).map(([k,v])=>`${v} ${ACTION_LABELS[k]||k}`).join(' &middot; ')||'No actions logged';
    const hrs=Math.floor(activeMin/60), mins=Math.round(activeMin%60);
    const durStr=activeMin>0?(hrs>0?`${hrs}h ${mins}m active`:`${mins}m active`):'';
    const timeStr=firstSeen?`${fmtTime(firstSeen)} &rarr; ${fmtTime(lastSeen)}`:'No heartbeat data';
    html+=`<div class="activity-row">
      <div class="activity-user">${esc(user)}</div>
      <div class="activity-time">${timeStr}${durStr?' &nbsp;&middot;&nbsp; <strong>'+durStr+'</strong>':''}</div>
      <div class="activity-acts">${actStr}</div>
    </div>`;
  });
  html+='</div>';
  wrap.innerHTML=html;
}

function handleCSV(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split('\n').filter(l=>l.trim());
    const headers=parseCSVLine(lines[0]).map(h=>h.replace(/^"|"$/g,'').toLowerCase());
    const rawRows=lines.slice(1).map(line=>{
      const vals=parseCSVLine(line);
      const obj={};
      headers.forEach((h,i)=>obj[h]=vals[i]||'');
      return obj;
    }).filter(r=>r.client_id&&r.address);

    // Dedupe by client_id (keep first occurrence)
    const seen={};
    const rows=rawRows.filter(r=>{
      if(seen[r.client_id]) return false;
      seen[r.client_id]=true;
      return true;
    });

    pendingImport=rows;
    const preview=document.getElementById('importPreview');
    preview.innerHTML=`
      <div class="import-preview">
        <div class="import-preview-header">
          <h3>${rows.length.toLocaleString()} clients ready</h3>
          <button class="btn-add" onclick="doImport(pendingImport)">Import All</button>
        </div>
        ${rows.slice(0,6).map(r=>`
          <div class="preview-row">
            <span class="p-id">${esc(r.client_id)}</span>
            <span class="p-name">${esc(r.client_name||'')}</span>
            <span class="p-addr">${esc(r.address)}</span>
          </div>`).join('')}
        ${rows.length>6?`<p style="font-size:12px;color:var(--gray-400);margin-top:8px">…and ${(rows.length-6).toLocaleString()} more</p>`:''}
      </div>`;
  };
  reader.readAsText(file);
}

async function doImport(rows){
  const batchSize=500;
  let done=0;
  for(let i=0;i<rows.length;i+=batchSize){
    const chunk=rows.slice(i,i+batchSize);
    const {error}=await db.from('clients').upsert(chunk,{onConflict:'client_id'});
    if(error){toast('Import error: '+error.message);return;}
    done+=chunk.length;
  }
  await loadClients();
  toast(`${done.toLocaleString()} clients imported`,true);
  document.getElementById('importPreview').innerHTML=
    '<div class="empty-state" style="color:var(--ok-text);font-weight:500">Import complete — '+done.toLocaleString()+' clients loaded.</div>';
}

function handleRolloffCSV(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split('\n').filter(l=>l.trim());
    const headers=parseCSVLine(lines[0]).map(h=>h.replace(/^"|"$/g,'').toLowerCase().replace(/\s+/g,'_'));
    const rows=lines.slice(1).map(line=>{
      const vals=parseCSVLine(line);
      const obj={};
      headers.forEach((h,i)=>obj[h]=vals[i]||'');
      return obj;
    }).filter(r=>r.customer||r.street);

    // Normalize dates (handle MM/DD/YYYY -> YYYY-MM-DD)
    rows.forEach(r=>{
      if(r.date&&r.date.includes('/')){
        const parts=r.date.split('/');
        if(parts.length===3){
          const [m,d,y]=parts;
          r.date=`${y.length===2?'20'+y:y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
        }
      }
      // Normalize type to uppercase
      if(r.type) r.type=r.type.toUpperCase();
    });

    pendingRoImport=rows;
    const preview=document.getElementById('roImportPreview');
    preview.innerHTML=`
      <div class="import-preview">
        <div class="import-preview-header">
          <h3>${rows.length.toLocaleString()} roll-offs ready</h3>
          <button class="btn-add" onclick="doRolloffImport(pendingRoImport)">Import All</button>
        </div>
        ${rows.slice(0,6).map(r=>`
          <div class="preview-row">
            <span class="p-id">${esc(r.type||'')}</span>
            <span class="p-addr">${esc(r.customer||'')}</span>
            <span class="p-day">${esc(r.address_number||'')} ${esc(r.street||'')}</span>
          </div>`).join('')}
        ${rows.length>6?`<p style="font-size:12px;color:var(--gray-400);margin-top:8px">…and ${(rows.length-6).toLocaleString()} more</p>`:''}
      </div>`;
  };
  reader.readAsText(file);
}

const IRR_ROLLOFF_SVC = ['ROLLOFF DELIVERY','ROLLOFF DOUBLE DROP','EMPTY ROLLOFF','EMPTY ROLL-OFF'];
// Per-unit fees. Prices fixed in HELM since scale file rates are often $0/EA.
// bucket='hook'     → counts as Reis hook fee (rolloffFees) like delivery/empty/double-drop
// bucket='disposal' → routed by the ticket: on a Reis rolloff ticket, goes to tonnage rev
//                     (reis.tipRevenue); otherwise walk-in revenue (walkin.tipRevenue).
const IRR_PER_UNIT_FEES = [
  {kw:'MATTRESS LANDFILL DISPOSAL FEE', price:50,   bucket:'disposal'},
  {kw:'STOVE DISHWASH APPLIANCE DISP',  price:11,   bucket:'disposal'},
  {kw:'FRION LANDFILL DISPOSAL FEE',    price:45,   bucket:'disposal'},
  {kw:'MONITOR LANDFILL DISPOSAL FEE',  price:16.5, bucket:'disposal'},
  {kw:'DUMPTIRE',                       price:16.5, bucket:'disposal'},
  {kw:'MOVE ROLLOFF ON JOB SITE',       price:60,   bucket:'hook'},
];
// Rolloff service fees — hardcoded rate schedule effective on/after IRR_ROLLOFF_RATE_CHANGE_ISO.
// Reports dated before this still use the dollar amount shown on the scale file (historical preserved).
const IRR_ROLLOFF_RATE_CHANGE_ISO = '2026-04-17';
const IRR_ROLLOFF_FIXED_PRICES = {
  'ROLLOFF DELIVERY':    100,
  'ROLLOFF DOUBLE DROP': 250,
  'EMPTY ROLLOFF':       250,
  'EMPTY ROLL-OFF':      250,
};
function mdyToIso(mdy){
  if(!mdy) return null;
  const p = mdy.split('/');
  if(p.length!==3) return null;
  return p[2]+'-'+p[0].padStart(2,'0')+'-'+p[1].padStart(2,'0');
}
function rolloffSvcFeeForDate(kw, reportIsoDate, fileAmount){
  if(reportIsoDate && reportIsoDate >= IRR_ROLLOFF_RATE_CHANGE_ISO){
    const fixed = IRR_ROLLOFF_FIXED_PRICES[kw];
    if(fixed != null) return fixed;
  }
  return fileAmount;
}
let irrCurrentData = null;
let irrRendered = false;

// Company rates (loaded from irr_rates table)
let irrRates = null;
async function irrLoadRates() {
  if (irrRates) return irrRates;
  const {data} = await db.from('irr_rates').select('*');
  irrRates = {};
  if (data) for (const r of data) irrRates[r.company] = r;
  return irrRates;
}

// Rate cutoff: reports on/after this date use current irr_rates table values.
// Reports before use IRR_OLD_RATES. Keeps historical math stable after the 4/17/2026 price change.
const IRR_RATE_CUTOFF = '2026-04-17';
const IRR_OLD_RATES = {
  island: {hook_fee:250, per_ton:480, ton_markup:0},
  eastend: {hook_fee:200, per_ton:380, ton_markup:0.10},
};
function irrRatesFor(reportDate) {
  let iso = reportDate;
  if (iso && iso.includes('/')) {
    const p = iso.split('/');
    iso = p[2]+'-'+String(p[0]).padStart(2,'0')+'-'+String(p[1]).padStart(2,'0');
  }
  const useNew = !iso || iso >= IRR_RATE_CUTOFF;
  return {
    ir: useNew ? (irrRates?irrRates.island:null) : IRR_OLD_RATES.island,
    er: useNew ? (irrRates?irrRates.eastend:null) : IRR_OLD_RATES.eastend,
  };
}

function irrCalcRevenue(buckets, reportDate) {
  const {ir, er} = irrRatesFor(reportDate);
  if (ir) {
    buckets.island.revenue = (ir.hook_fee * buckets.island.tickets) + ((ir.per_ton * (1 + (ir.ton_markup||0))) * buckets.island.tons);
  }
  if (er) {
    buckets.santos.revenue = (er.hook_fee * buckets.santos.tickets) + ((er.per_ton * (1 + (er.ton_markup||0))) * buckets.santos.tons);
  }
}

function irrParseSpreadsheetML(xmlText) {
  xmlText = xmlText.replace(/<\?[^?]*\?>/g, '');
  const result = [];
  const rowRx = /<(?:ss:)?Row[^>]*>([\s\S]*?)<\/(?:ss:)?Row>/gi;
  let rm;
  while ((rm = rowRx.exec(xmlText)) !== null) {
    const rc = rm[1], vals = [];
    const cellRx = /<(?:ss:)?Cell([^>]*)>([\s\S]*?)<\/(?:ss:)?Cell>/gi;
    let cm, ci = 0;
    while ((cm = cellRx.exec(rc)) !== null) {
      const idxM = cm[1].match(/ss:Index="(\d+)"/);
      if (idxM) { const t = parseInt(idxM[1])-1; while(ci<t){vals.push('');ci++;} }
      const dm = cm[2].match(/<(?:ss:)?Data[^>]*>([\s\S]*?)<\/(?:ss:)?Data>/i);
      vals.push(dm ? dm[1].trim() : '');
      ci++;
    }
    result.push(vals);
  }
  return result;
}

function irrParseReport(rows) {
  let reportDate = null;
  const firstRow = rows[0] ? rows[0].join(' ') : '';
  const dateMatch = firstRow.match(/(\d{1,2}\/\d{1,2}\/\d{4})/);
  if (dateMatch) reportDate = dateMatch[1];

  const tickets = {};
  let currentCode = null, parentCode = null;
  const codeStack = [];

  for (let i = 0; i < rows.length; i++) {
    const vals = rows[i];
    const nonEmpty = vals.filter(v => v && v.trim());
    if (!nonEmpty.length) continue;
    const first = nonEmpty[0];
    const isHeader = first.includes(' - ') && !first.includes('Totals') && !first.includes('Tickets:')
      && !first.includes('TIPFEES') && !first.includes('ROLLOFFS') && !first.includes('No Order')
      && !first.startsWith('Page ') && !first.includes('Date Range') && first.trim()!=='Date' && !first.includes('Report');
    const isTotals = first.includes(' - ') && first.includes('Totals') && !first.includes('TIPFEES') && !first.includes('Non Order');

    if (isHeader) { const c=first.split(' - ')[0].trim(); codeStack.push(c); currentCode=c; parentCode=codeStack.length>1?codeStack[0]:null; }
    if (isTotals) { const c=first.split(' - ')[0].trim(); const idx=codeStack.lastIndexOf(c); if(idx!==-1)codeStack.splice(idx,1); currentCode=codeStack.length>0?codeStack[codeStack.length-1]:null; parentCode=codeStack.length>1?codeStack[0]:null; }

    const effectiveCode = (parentCode && parentCode.startsWith('ZZ')) ? parentCode : currentCode;
    if (!effectiveCode) continue;
    const flatUpper = vals.join(' ').toUpperCase();
    const dataVals = vals.filter(v => v!==null && v!=='' && v!==undefined);

    if (flatUpper.includes('REIS SITE TRANSFER FEE')) {
      const fi = dataVals.findIndex(v => v && v.includes('REIS SITE TRANSFER FEE'));
      if (fi!==-1 && fi+2<dataVals.length) {
        const ticket=dataVals[1]||'?', net=parseFloat(dataVals[fi+2])||0;
        if(!tickets[ticket]) tickets[ticket]={tons:0,service:null,code:effectiveCode};
        tickets[ticket].tons+=net;
        if(!tickets[ticket].service) tickets[ticket].code=effectiveCode;
      }
    }
    for (const kw of IRR_ROLLOFF_SVC) {
      if (flatUpper.includes(kw)) {
        const ticket=dataVals[1]||'?';
        if(!tickets[ticket]) tickets[ticket]={tons:0,service:null,code:effectiveCode};
        tickets[ticket].service=kw; tickets[ticket].code=effectiveCode; break;
      }
    }
  }

  const buckets = {
    reis:{label:'Reis Rolloff',tons:0,tickets:0,tipRevenue:0,rolloffFees:0,deliveries:0,empties:0,doubleDrops:0},
    pile:{label:'Pile Pickups (Reis)',tons:0,tickets:0},
    island:{label:'Island Rubbish',tons:0,tickets:0},
    santos:{label:'East End',tons:0,tickets:0},
    vinagro:{label:'VINAGRO Output',tons:0,tickets:0},
    walkin:{label:'Walk-In / Drive-Through',tons:0,tickets:0,tipRevenue:0},
  };

  for (const [tn,t] of Object.entries(tickets)) {
    const c=t.code;
    if(c==='ZZISLAND'){buckets.island.tons+=t.tons;buckets.island.tickets++;}
    else if(c==='ZZEASTEND'){buckets.santos.tons+=t.tons;buckets.santos.tickets++;}
    else if(c==='ZZDELTA'){buckets.pile.tons+=t.tons;buckets.pile.tickets++;}
    else if(c==='ZZREIS'){buckets.vinagro.tons+=t.tons;buckets.vinagro.tickets++;}
    else if(c.startsWith('ZZ')){buckets.walkin.tons+=t.tons;buckets.walkin.tickets++;}
    else if(t.service!==null){
      buckets.reis.tons+=t.tons;buckets.reis.tickets++;
      if(t.service.includes('DELIVERY'))buckets.reis.deliveries++;
      else if(t.service.includes('DOUBLE DROP'))buckets.reis.doubleDrops++;
      else if(t.service.includes('EMPTY'))buckets.reis.empties++;
    } else {buckets.walkin.tons+=t.tons;buckets.walkin.tickets++;}
  }

  // Revenue pass — scan for tip fee rates and rolloff service fees
  let revCode2 = null, parentCode2 = null;
  const revStack2 = [];
  for (let i = 0; i < rows.length; i++) {
    const vals = rows[i];
    const nonEmpty = vals.filter(v => v && v.trim());
    if (!nonEmpty.length) continue;
    const first = nonEmpty[0];
    const isHdr = first.includes(' - ') && !first.includes('Totals') && !first.includes('Tickets:')
      && !first.includes('TIPFEES') && !first.includes('ROLLOFFS') && !first.includes('No Order')
      && !first.startsWith('Page ') && !first.includes('Date Range') && first.trim()!=='Date' && !first.includes('Report');
    const isTot = first.includes(' - ') && first.includes('Totals') && !first.includes('TIPFEES') && !first.includes('Non Order');
    if (isHdr) { const c=first.split(' - ')[0].trim(); revStack2.push(c); revCode2=c; parentCode2=revStack2.length>1?revStack2[0]:null; }
    if (isTot) { const c=first.split(' - ')[0].trim(); const idx=revStack2.lastIndexOf(c); if(idx!==-1)revStack2.splice(idx,1); revCode2=revStack2.length>0?revStack2[revStack2.length-1]:null; parentCode2=revStack2.length>1?revStack2[0]:null; }
    const rc = (parentCode2 && parentCode2.startsWith('ZZ')) ? parentCode2 : revCode2;
    if (!rc) continue;
    const flatUpper = vals.join(' ').toUpperCase();
    const dataVals = vals.filter(v => v!==null && v!=='' && v!==undefined);

    // Tip fee revenue
    if (flatUpper.includes('REIS SITE TRANSFER FEE')) {
      const fi = dataVals.findIndex(v => v && v.includes('REIS SITE TRANSFER FEE'));
      if (fi!==-1 && fi+2<dataVals.length) {
        const ticket=dataVals[1]||'?';
        const net=parseFloat(dataVals[fi+2])||0;
        const rateStr=dataVals[fi+3]||'';
        const rateMatch=rateStr.match(/\$([0-9.]+)/);
        if (rateMatch && tickets[ticket]) {
          const rev=net*parseFloat(rateMatch[1]);
          const tc=tickets[ticket].code, svc=tickets[ticket].service;
          if (!tc.startsWith('ZZ') && svc!==null) buckets.reis.tipRevenue+=rev;
          else if (!tc.startsWith('ZZ') && svc===null) buckets.walkin.tipRevenue+=rev;
          else if (tc.startsWith('ZZ') && tc!=='ZZISLAND' && tc!=='ZZEASTEND' && tc!=='ZZDELTA' && tc!=='ZZREIS') buckets.walkin.tipRevenue+=rev;
        }
      }
    }
    // Rolloff service fees (Reis only, not ZZ). Uses hardcoded rate on/after rate-change date.
    for (const kw of IRR_ROLLOFF_SVC) {
      if (flatUpper.includes(kw) && !rc.startsWith('ZZ')) {
        let fileAmt = 0;
        const kwIdx = dataVals.findIndex(v => v && v.toUpperCase().includes(kw));
        if (kwIdx >= 0) {
          for (let j=dataVals.length-1;j>kwIdx;j--) {
            const amt=parseFloat(dataVals[j]);
            if (!isNaN(amt) && amt>0) { fileAmt=amt; break; }
          }
        }
        const reportIso = mdyToIso(reportDate);
        const fee = rolloffSvcFeeForDate(kw, reportIso, fileAmt);
        if (fee > 0) buckets.reis.rolloffFees += fee;
        break;
      }
    }
    // Per-unit fees (hook vs disposal). Hook fees add to reis.rolloffFees like deliveries.
    // Disposal fees follow the ticket: rolloff ticket -> reis.tipRevenue; else walk-in.
    for (const item of IRR_PER_UNIT_FEES) {
      if (flatUpper.includes(item.kw)) {
        const kwIdx = dataVals.findIndex(v => v && v.toUpperCase().includes(item.kw));
        if (kwIdx >= 0 && kwIdx+1 < dataVals.length) {
          const qty = parseFloat(dataVals[kwIdx+1]) || 0;
          const rev = qty * item.price;
          if (rev > 0) {
            const ticket = dataVals[1] || '?';
            const t = tickets[ticket];
            const tc = t ? t.code : rc;
            const svc = t ? t.service : null;
            const isZZwalkin = tc.startsWith('ZZ') && tc!=='ZZISLAND' && tc!=='ZZEASTEND' && tc!=='ZZDELTA' && tc!=='ZZREIS';
            if (item.bucket === 'hook') {
              if (!tc.startsWith('ZZ')) buckets.reis.rolloffFees += rev;
              else if (isZZwalkin) buckets.walkin.tipRevenue += rev;
            } else {
              // disposal
              if (!tc.startsWith('ZZ') && svc !== null) buckets.reis.tipRevenue += rev;
              else if (!tc.startsWith('ZZ') && svc === null) buckets.walkin.tipRevenue += rev;
              else if (isZZwalkin) buckets.walkin.tipRevenue += rev;
            }
          }
        }
        break;
      }
    }
  }

  return {date:reportDate, buckets, tickets};
}

function irrFmtDate(dateStr) {
  if(!dateStr) return 'Today';
  const d=new Date(dateStr);
  return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}
function irrFmt(n,dec=2){return (isNaN(n)||n===null||n===undefined)?'--':n.toFixed(dec);}
function irrFmtMoney(n){return '$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}

    ${R('Tickets',walkin.tickets)}

    ${companyBlock('Reis Rolloff', reis.tickets, reis.tons, reis.rolloffFees||0, reis.tipRevenue||0)}

async function irrLoadYTD(asOfDate) {
  let asOf;
  if(asOfDate){
    const p=asOfDate.split('/');
    asOf={year:parseInt(p[2]),month:parseInt(p[0]),day:parseInt(p[1])};
  } else {
    const d=new Date();
    asOf={year:d.getFullYear(),month:d.getMonth()+1,day:d.getDate()};
  }
  const pad=n=>String(n).padStart(2,'0');
  const curEnd=asOf.year+'-'+pad(asOf.month)+'-'+pad(asOf.day);
  const curStart=asOf.year+'-01-01';
  const prevEnd=(asOf.year-1)+'-'+pad(asOf.month)+'-'+pad(asOf.day);
  const prevStart=(asOf.year-1)+'-01-01';

  // Monday of the report week (ISO: Mon-Sun)
  const asOfDt = new Date(asOf.year, asOf.month-1, asOf.day);
  const dow = asOfDt.getDay();
  const diff = asOfDt.getDate() - dow + (dow===0?-6:1);
  const monday = new Date(asOfDt); monday.setDate(diff);
  const wtdStart = monday.getFullYear()+'-'+pad(monday.getMonth()+1)+'-'+pad(monday.getDate());

  const fields='total_inbound_tons,vinagro_tons,reis_tons,island_tons,santos_tons';

  const {data:curData}=await db.from('irr_reports').select(fields).gte('report_date',curStart).lte('report_date',curEnd);
  const {data:prevData}=await db.from('irr_reports').select(fields).gte('report_date',prevStart).lte('report_date',prevEnd);
  const {data:wtdData}=await db.from('irr_reports').select(fields).gte('report_date',wtdStart).lte('report_date',curEnd);

  function sum(rows){
    const r={total:0,vin:0,reis:0,island:0,santos:0};
    if(rows) for(const d of rows){
      r.total+=parseFloat(d.total_inbound_tons)||0;
      r.vin+=parseFloat(d.vinagro_tons)||0;
      r.reis+=parseFloat(d.reis_tons)||0;
      r.island+=parseFloat(d.island_tons)||0;
      r.santos+=parseFloat(d.santos_tons)||0;
    }
    return r;
  }
  const cur=sum(curData), prev=sum(prevData), wtd=sum(wtdData);
  return {
    ytd2026:cur.total, ytd2025:prev.total,
    vin2026:cur.vin, vin2025:prev.vin,
    reisYtdCur:cur.reis, reisYtdPrev:prev.reis,
    islandYtdCur:cur.island, islandYtdPrev:prev.island,
    santosYtdCur:cur.santos, santosYtdPrev:prev.santos,
    wtdInbound:wtd.total, wtdOutbound:wtd.vin,
  };
}

function irrGetDateRange(range, customStart, customEnd) {
  const today = new Date();
  today.setHours(0,0,0,0);
  let start;
  if(range==='wtd') { start=new Date(today); start.setDate(today.getDate()-today.getDay()); }
  else if(range==='mtd') { start=new Date(today.getFullYear(),today.getMonth(),1); }
  else if(range==='30d') { start=new Date(today); start.setDate(today.getDate()-30); }
  else if(range==='ytd') { start=new Date(today.getFullYear(),0,1); }
  else if(range==='custom' && customStart) { start=new Date(customStart+'T00:00:00'); }
  else { start=new Date(today); start.setDate(today.getDate()-7); }
  const end = (range==='custom' && customEnd) ? new Date(customEnd+'T00:00:00') : today;
  const fmt=d=>d.toISOString().split('T')[0];
  return {start:fmt(start), end:fmt(end)};
}

async function irrLoadDashboard() {
  const container = document.getElementById('irrDashContent');
  container.innerHTML = '<div style="padding:20px;color:var(--gray-400);font-size:12px;">Loading...</div>';

  const {data,error} = await db.from('irr_reports').select('*').order('report_date',{ascending:true});
  if(error){container.innerHTML='<div style="color:var(--err-text)">Error loading data</div>';return;}
  irrDashData = data||[];

  // Ensure Island/East End revenue is calculated for all rows (covers pre-rate historical data)
  await irrLoadRates();
  for(const d of irrDashData){
    const {ir, er} = irrRatesFor(d.report_date);
    if(ir && !(parseFloat(d.island_revenue)>0) && (d.island_tickets||0)>0){
      d.island_revenue = (ir.hook_fee*(d.island_tickets||0)) + ((ir.per_ton*(1+(ir.ton_markup||0)))*(parseFloat(d.island_tons)||0));
    }
    if(er && !(parseFloat(d.santos_revenue)>0) && (d.santos_tickets||0)>0){
      d.santos_revenue = (er.hook_fee*(d.santos_tickets||0)) + ((er.per_ton*(1+(er.ton_markup||0)))*(parseFloat(d.santos_tons)||0));
    }
  }

  irrRenderDashboard();
}

// Rolloff helpers (global scope — used by dashboard, chart, and report generator)
function allLoads(d){return (d.reis_tickets||0)+(d.island_tickets||0)+(d.santos_tickets||0);}
function allTons(d){return (parseFloat(d.reis_tons)||0)+(parseFloat(d.island_tons)||0)+(parseFloat(d.santos_tons)||0);}
function allRev(d){return (parseFloat(d.reis_tip_revenue)||0)+(parseFloat(d.reis_svc_revenue)||0)+(parseFloat(d.island_revenue)||0)+(parseFloat(d.santos_revenue)||0);}

// Company-specific helpers (driven by irrCompanyFilter)
function cLoads(d){
  if(irrCompanyFilter==='reis') return d.reis_tickets||0;
  if(irrCompanyFilter==='island') return d.island_tickets||0;
  if(irrCompanyFilter==='eastend') return d.santos_tickets||0;
  return allLoads(d);
}
function cTons(d){
  if(irrCompanyFilter==='reis') return parseFloat(d.reis_tons)||0;
  if(irrCompanyFilter==='island') return parseFloat(d.island_tons)||0;
  if(irrCompanyFilter==='eastend') return parseFloat(d.santos_tons)||0;
  return allTons(d);
}
function cRev(d){
  if(irrCompanyFilter==='reis') return (parseFloat(d.reis_tip_revenue)||0)+(parseFloat(d.reis_svc_revenue)||0);
  if(irrCompanyFilter==='island') return parseFloat(d.island_revenue)||0;
  if(irrCompanyFilter==='eastend') return parseFloat(d.santos_revenue)||0;
  return allRev(d);
}
function irrSetCompany(c){irrCompanyFilter=c;irrRenderDashboard();}

    datasets.push({
      label:'Rev / Load ($)',

async function irrSaveHours() {
  const dateVal = document.getElementById('irrHoursDate').value;
  const hoursVal = parseFloat(document.getElementById('irrHoursVal').value);
  if(!dateVal||isNaN(hoursVal)){toast('Enter a valid date and hours');return;}

  // Check if report exists for this date
  const {data:existing} = await db.from('irr_reports').select('report_date').eq('report_date',dateVal).single();
  if(existing){
    // Update existing
    const {error} = await db.from('irr_reports').update({driver_hours:hoursVal}).eq('report_date',dateVal);
    if(error){toast('Error saving: '+error.message);return;}
  } else {
    // Insert minimal row with just hours
    const {error} = await db.from('irr_reports').insert({report_date:dateVal,driver_hours:hoursVal});
    if(error){toast('Error saving: '+error.message);return;}
  }
  toast('Driver hours saved for '+dateVal,true);
  document.getElementById('irrHoursVal').value='';
  // Refresh dashboard data
  const {data} = await db.from('irr_reports').select('*').order('report_date',{ascending:true});
  irrDashData=data||[];
  irrRenderDashboard();
}

// ── Period Report Generator ───────────────────────────────────────────

function irrGenerateReport() {
  const {start,end} = irrGetDateRange(irrDashRange,
    document.getElementById('irrCustomStart')?.value,
    document.getElementById('irrCustomEnd')?.value);
  const filtered = irrDashData.filter(d=>d.report_date>=start && d.report_date<=end && allLoads(d)>0);
  if(!filtered.length){toast('No data in selected range');return;}

  let totalLoads=0,totalTons=0,totalRev=0,totalHours=0,hoursCount=0;
  for(const d of filtered){
    totalLoads+=allLoads(d);
    totalTons+=allTons(d);
    totalRev+=allRev(d);
    if(d.driver_hours!=null){totalHours+=parseFloat(d.driver_hours)||0;hoursCount++;}
  }
  const avgRev=totalLoads>0?(totalRev/totalLoads):0;
  const avgTons=totalLoads>0?(totalTons/totalLoads):0;
  const avgHours=(totalLoads>0&&hoursCount>0)?(totalHours/totalLoads):0;

  const fmtD=iso=>{const d=new Date(iso+'T00:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});};
  const fmtFull=iso=>{const d=new Date(iso+'T00:00:00');return d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});};
  const f2=n=>n.toFixed(2);
  const fM=n=>'$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});

  let tableRows='';
  for(const d of filtered){
    const loads=allLoads(d);
    const tons=allTons(d);
    const rev=allRev(d);
    const rpl=loads>0?fM(rev/loads):'--';
    const tpl=loads>0?f2(tons/loads):'--';
    const hpl=(loads>0&&d.driver_hours!=null)?f2(parseFloat(d.driver_hours)/loads):'--';
    tableRows+=`<tr>
      <td>${fmtD(d.report_date)}</td><td>${loads}</td><td>${f2(tons)}</td>
      <td>${fM(rev)}</td><td>${rpl}</td><td>${tpl}</td><td>${hpl}</td></tr>`;
  }
  tableRows+=`<tr class="rpt-total">
    <td>Total / Avg</td><td>${totalLoads}</td><td>${f2(totalTons)}</td>
    <td>${fM(totalRev)}</td><td>${fM(avgRev)}</td><td>${f2(avgTons)}</td><td>${avgHours>0?f2(avgHours):'--'}</td></tr>`;

  // Build week-over-week summary using ALL data for prior-week lookback
  const allByDate={};
  for(const d of irrDashData){
    if(allLoads(d)>0) allByDate[d.report_date]=d;
  }

  // Group filtered data into ISO weeks (Mon-Sun)
  function getWeekStart(iso){
    const d=new Date(iso+'T00:00:00');
    const day=d.getDay();
    const diff=d.getDate()-day+(day===0?-6:1); // Monday
    const mon=new Date(d);mon.setDate(diff);
    return mon.toISOString().split('T')[0];
  }

  const weekMap={};
  for(const d of filtered){
    const ws=getWeekStart(d.report_date);
    if(!weekMap[ws]) weekMap[ws]={tons:0,rev:0,loads:0,days:0};
    weekMap[ws].tons+=allTons(d);
    weekMap[ws].rev+=allRev(d);
    weekMap[ws].loads+=allLoads(d);
    weekMap[ws].days++;
  }
  // Also compute prior weeks from all data for WoW calc
  const allWeekMap={};
  for(const d of irrDashData){
    if(allLoads(d)<=0) continue;
    const ws=getWeekStart(d.report_date);
    if(!allWeekMap[ws]) allWeekMap[ws]={tons:0,rev:0,loads:0,days:0};
    allWeekMap[ws].tons+=allTons(d);
    allWeekMap[ws].rev+=allRev(d);
    allWeekMap[ws].loads+=allLoads(d);
    allWeekMap[ws].days++;
  }

  const weekKeys=Object.keys(weekMap).sort();
  function getPriorWeek(ws){
    const d=new Date(ws+'T00:00:00');d.setDate(d.getDate()-7);
    return d.toISOString().split('T')[0];
  }
  function pctChange(curr,prev){
    if(!prev||prev===0) return '--';
    const pct=((curr-prev)/prev)*100;
    const sign=pct>0?'+':'';
    return sign+pct.toFixed(1)+'%';
  }

  const fmtWeek=ws=>{
    const s=new Date(ws+'T00:00:00');
    const e=new Date(s);e.setDate(s.getDate()+6);
    return fmtD(ws)+' - '+fmtD(e.toISOString().split('T')[0]);
  };

  let wowRows='';
  for(const ws of weekKeys){
    const w=weekMap[ws];
    const pw=allWeekMap[getPriorWeek(ws)];
    const tonsWoW=pw?pctChange(w.tons,pw.tons):'--';
    const revWoW=pw?pctChange(w.rev,pw.rev):'--';
    const lpd=w.days>0?(w.loads/w.days).toFixed(1):'--';
    const pwLpd=pw&&pw.days>0?(pw.loads/pw.days):0;
    const lpdWoW=(pw&&pw.days>0&&w.days>0)?pctChange(w.loads/w.days,pwLpd):'--';
    wowRows+=`<tr>
      <td>${fmtWeek(ws)}</td><td>${w.loads}</td><td>${f2(w.tons)}</td><td>${tonsWoW}</td>
      <td>${fM(w.rev)}</td><td>${revWoW}</td><td>${lpd}</td><td>${lpdWoW}</td></tr>`;
  }

  const reportHTML=`
    <h1>Rolloff Performance Report</h1>
    <div class="rpt-period">${fmtFull(start)} — ${fmtFull(end)}</div>
    <div class="rpt-kpi-row">
      <div class="rpt-kpi"><div class="rpt-kpi-label">Avg Rev / Load</div><div class="rpt-kpi-val">${fM(avgRev)}</div></div>
      <div class="rpt-kpi"><div class="rpt-kpi-label">Avg Tons / Load</div><div class="rpt-kpi-val">${f2(avgTons)}</div></div>
      <div class="rpt-kpi"><div class="rpt-kpi-label">Avg Hours / Load</div><div class="rpt-kpi-val">${avgHours>0?f2(avgHours):'--'}</div></div>
      <div class="rpt-kpi"><div class="rpt-kpi-label">Total Loads</div><div class="rpt-kpi-val">${totalLoads}</div></div>
      <div class="rpt-kpi"><div class="rpt-kpi-label">Total Revenue</div><div class="rpt-kpi-val">${fM(totalRev)}</div></div>
