.cmd-org-tone-teal .cmd-org-group-dot{background:var(--teal);box-shadow:0 0 0 3px rgba(26,155,138,0.2);}
.cmd-org-tone-teal .cmd-org-group-label{color:#3bc8b5;}
.cmd-org-tone-gold .cmd-org-group-dot{background:var(--gold);box-shadow:0 0 0 3px rgba(212,168,67,0.18);}
.cmd-org-tone-gold .cmd-org-group-label{color:#e6bc52;}
.cmd-org-tone-neutral .cmd-org-group-dot{background:#8a9bc7;box-shadow:0 0 0 3px rgba(138,155,199,0.2);}
.cmd-org-tone-neutral .cmd-org-group-label{color:#a8b8dc;}
.cmd-org-people{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px;
}
.cmd-org-person{
  background:rgba(0,0,0,0.22);
  border:1px solid rgba(255,255,255,0.06);
  border-left:3px solid var(--teal);
  border-radius:7px;padding:11px 13px;
}
.cmd-org-tone-gold .cmd-org-person{border-left-color:var(--gold);}
.cmd-org-tone-neutral .cmd-org-person{border-left-color:#8a9bc7;}
.cmd-org-person-name{
  font-size:13px;font-weight:700;color:white;line-height:1.3;
  letter-spacing:-.01em;
}
.cmd-org-person-title{
  font-family:'DM Mono',monospace;
  font-size:10.5px;color:var(--teal);
  margin-top:3px;letter-spacing:.02em;
}
.cmd-org-tone-gold .cmd-org-person-title{color:#e6bc52;}
.cmd-org-tone-neutral .cmd-org-person-title{color:#a8b8dc;}
.cmd-org-person-note{
  font-size:11px;color:rgba(255,255,255,0.55);
  line-height:1.55;margin-top:7px;
}

/* ─────────────────────────────────────────────────────────────────────────
   ACTION ITEMS — Premium Project Management (David only, PIN 1144)
   Inspired by Linear (speed, command-K, slide-in detail, keyboard-first),
   Notion (multi-view, fluid editing) and Zoho Projects
   (Projects → Tasklists → Tasks → Subtasks ladder + Milestones + Gantt).
   Single-user — no assignees, no comments, no @-mentions.
   ───────────────────────────────────────────────────────────────────────── */
body.on-action-tab .main{max-width:none;padding:0;width:100%;}
body.on-action-tab{caret-color:transparent;}
body.on-action-tab input,body.on-action-tab textarea,body.on-action-tab select,
body.on-action-tab [contenteditable=true],body.on-action-tab [contenteditable=""]{caret-color:auto;}
#tab-action{padding:0;margin:0;width:100%;}

/* === SIDE-NAV LAYOUT: vertical left nav + full-width content (all users) === */
body.layout-side .tab-nav{
  position:fixed; top:44px; left:0; bottom:0; width:220px;
  flex-direction:column; align-items:stretch; gap:1px;
  background:#0a0e1a; border-right:1px solid rgba(255,255,255,0.08);
  border-bottom:none; padding:14px 10px; overflow-y:auto;
  z-index:50; box-shadow:1px 0 0 rgba(255,255,255,0.02);
}
body.layout-side .tab-nav::-webkit-scrollbar{display:initial;width:6px;}
body.layout-side .tab-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px;}
body.layout-side .tab-nav button{
  text-align:left; padding:9px 14px; border-bottom:none;
  border-left:2px solid transparent; border-radius:5px;
  font-size:13px; color:rgba(255,255,255,0.62);
  margin-bottom:0; white-space:nowrap; background:transparent;
  font-family:'Inter','DM Sans',sans-serif; transition:all 0.08s;
}
body.layout-side .tab-nav button:hover:not(.active){
  background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.95);
}
body.layout-side .tab-nav button.active{
  background:rgba(26,155,138,0.16); color:white;
  font-weight:600; border-left-color:var(--teal);
  border-bottom-color:transparent;
}
/* Grouped nav: section header + indented children */
body.layout-side .nav-group{display:flex;flex-direction:column;gap:1px;margin-top:6px;}
body.layout-side .nav-group:first-child{margin-top:0;}
body.layout-side .nav-group-hdr{
  text-align:left;background:transparent;border:none;border-radius:5px;
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;cursor:pointer;
  font-family:'Inter','DM Sans',sans-serif;
  font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
  color:rgba(255,255,255,0.42);
  transition:color 0.08s;
}
body.layout-side .nav-group-hdr:hover{color:rgba(255,255,255,0.72);background:rgba(255,255,255,0.03);}
body.layout-side .nav-group-arrow{display:inline-block;font-size:9px;width:10px;color:rgba(255,255,255,0.35);transition:transform 0.12s;}
body.layout-side .nav-group.collapsed .nav-group-arrow{transform:rotate(-90deg);}
body.layout-side .nav-group.collapsed .nav-group-children{display:none;}
body.layout-side .nav-group-children{display:flex;flex-direction:column;gap:1px;padding-left:10px;border-left:1px solid rgba(255,255,255,0.06);margin-left:8px;}
body.layout-side .nav-group-children button.nav-child{padding-left:14px;}
body.layout-side .tab-nav{margin-top:0;}  /* fixed-positioned, no flow margin */
body.layout-side .main{
  margin-left:220px; margin-top:44px; max-width:none; width:calc(100% - 220px);
  padding:0.75rem 1.25rem;
}
/* Workflow + Command tabs: kill main padding so canvas goes edge-to-edge */
body.layout-side.on-action-tab .main{padding:0;}
body.layout-side.on-cmd-tab .main{padding:0;}
body.layout-side.on-cmd-tab .cmd-wrap{
  border-radius:0;border:none;border-left:none;border-right:none;
  box-shadow:none;min-height:calc(100vh - 44px);
}
/* Command for non-david (theoretically n/a since cmd is david-only) — also full width */
body.on-cmd-tab .main{max-width:none;}
/* Workflow internal sidebar accounts only for topbar in david mode (no global tab strip above) */
body.layout-side .ap-root{min-height:calc(100vh - 44px);}
body.layout-side .ap-side{height:calc(100vh - 44px); top:44px;}
body.layout-side .ap-top{position:sticky; top:44px; z-index:5;}
.ap-root{
  --ap-bg:        #08090f;
  --ap-bg-2:      #0e1019;
  --ap-surface:   #14161f;
  --ap-surface-2: #1c1f2b;
  --ap-border:    rgba(255,255,255,0.06);
  --ap-border-2:  rgba(255,255,255,0.10);
  --ap-text:      #e8eaf0;
  --ap-text-dim:  #9ca3af;
  --ap-text-mute: #6b7280;
  --ap-accent:    #7c5cff;
  --ap-accent-2:  #a78bfa;
  --ap-accent-soft: rgba(124,92,255,0.14);
  min-height:calc(100vh - 78px);
  background:var(--ap-bg);
  color:var(--ap-text);
  font-family:'Inter','DM Sans',sans-serif;
  display:flex;
  caret-color:transparent;
  user-select:none;
  font-size:13px;
}
.ap-root input, .ap-root textarea, .ap-root select, .ap-root [contenteditable]{
  caret-color:auto; user-select:text;
}
.ap-root [data-selectable]{ user-select:text; }

/* === LEFT SIDEBAR === */
.ap-side{
  width:240px;flex-shrink:0;
  background:var(--ap-bg-2);
  border-right:1px solid var(--ap-border);
  display:flex;flex-direction:column;
  height:calc(100vh - 78px);position:sticky;top:78px;overflow-y:auto;
}
.ap-side-hdr{
  padding:14px 16px 8px;font-size:13px;font-weight:600;color:var(--ap-text);
  display:flex;align-items:center;gap:8px;
}
.ap-side-hdr-mark{
  width:20px;height:20px;border-radius:5px;
  background:linear-gradient(135deg,var(--ap-accent),#a78bfa);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;
}
.ap-side-section{padding:6px 8px;}
.ap-side-section-label{
  font-size:10px;font-weight:600;letter-spacing:0.08em;
  text-transform:uppercase;color:var(--ap-text-mute);
  padding:8px 8px 6px;display:flex;align-items:center;justify-content:space-between;
}
.ap-side-section-label .ap-icon-btn{width:18px;height:18px;font-size:12px;}
.ap-side-row{
  display:flex;align-items:center;gap:8px;
  padding:5px 8px;border-radius:5px;cursor:pointer;
  font-size:12.5px;color:var(--ap-text-dim);
  transition:background 0.08s,color 0.08s;
}
.ap-side-row:hover{background:rgba(255,255,255,0.04);color:var(--ap-text);}
.ap-side-row.active{background:var(--ap-accent-soft);color:var(--ap-accent-2);font-weight:500;}
.ap-side-row .ap-side-icon{
  width:18px;height:18px;display:flex;align-items:center;justify-content:center;
  font-size:13px;flex-shrink:0;
}
.ap-side-row .ap-side-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ap-side-row .ap-side-count{
  font-size:10px;color:var(--ap-text-mute);
  background:rgba(255,255,255,0.05);padding:1px 6px;border-radius:8px;font-family:'DM Mono',monospace;
}
.ap-side-row.ap-add{color:var(--ap-text-mute);font-style:italic;font-size:12px;}
.ap-side-row.ap-add:hover{color:var(--ap-accent-2);font-style:normal;}
.ap-side-foot{
  margin-top:auto;padding:12px 14px;font-size:10px;color:var(--ap-text-mute);
  border-top:1px solid var(--ap-border);line-height:1.7;
}
.ap-side-foot kbd{
  background:rgba(255,255,255,0.06);font-family:'DM Mono',monospace;
  font-size:10px;padding:1px 5px;border-radius:3px;color:var(--ap-text-dim);
}

/* === MAIN AREA === */
.ap-main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--ap-bg);}
.ap-top{padding:18px 24px 0;background:var(--ap-bg);}
.ap-top-row{display:flex;align-items:center;gap:14px;}
.ap-top-icon{
  width:40px;height:40px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;font-size:22px;
  background:rgba(255,255,255,0.04);border:1px solid var(--ap-border);flex-shrink:0;
}
.ap-top-titlewrap{flex:1;min-width:0;}
.ap-top-title{
  font-size:20px;font-weight:600;color:var(--ap-text);letter-spacing:-0.015em;
  background:transparent;border:none;outline:none;font-family:inherit;width:100%;padding:0;
}
.ap-top-id{
  font-family:'DM Mono',monospace;font-size:11px;color:var(--ap-text-mute);
  background:rgba(255,255,255,0.04);padding:2px 7px;border-radius:4px;
}
.ap-top-progresswrap{
  display:flex;align-items:center;gap:10px;color:var(--ap-text-dim);font-size:12px;
}
.ap-top-progress{
  width:140px;height:5px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden;
}
.ap-top-progress-fill{
  height:100%;background:linear-gradient(90deg,var(--ap-accent),#a78bfa);transition:width 0.3s;
}
.ap-top-meta{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center;}
.ap-meta-pill{
  font-size:11px;color:var(--ap-text-dim);
  background:rgba(255,255,255,0.04);border:1px solid var(--ap-border);
  padding:3px 9px;border-radius:5px;display:inline-flex;align-items:center;gap:6px;
}
.ap-meta-pill.danger{color:#f87171;border-color:rgba(248,113,113,0.3);background:rgba(248,113,113,0.07);}
.ap-meta-pill.warn{color:#fbbf24;border-color:rgba(251,191,36,0.3);background:rgba(251,191,36,0.07);}
.ap-meta-pill.ok{color:#34d399;border-color:rgba(52,211,153,0.3);background:rgba(52,211,153,0.07);}

.ap-viewtabs{display:flex;gap:2px;margin-top:14px;padding-top:8px;border-top:1px solid transparent;}
.ap-viewtab{
  background:none;border:none;color:var(--ap-text-mute);
  font-family:inherit;font-size:13px;font-weight:500;
  padding:7px 13px;border-radius:5px;cursor:pointer;transition:all 0.08s;
  display:inline-flex;align-items:center;gap:6px;
}
.ap-viewtab:hover{color:var(--ap-text);background:rgba(255,255,255,0.04);}
.ap-viewtab.active{color:var(--ap-text);background:rgba(255,255,255,0.08);}

.ap-body{flex:1;overflow-y:auto;padding:18px 24px 80px;border-top:1px solid var(--ap-border);}

/* === Status & priority chips === */
.ap-status-chip{
  display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--ap-text-dim);
  background:rgba(255,255,255,0.04);padding:3px 8px;border-radius:4px;cursor:pointer;
  border:1px solid transparent;
}
.ap-status-chip:hover{border-color:var(--ap-border-2);}
.ap-status-dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0;}
.ap-prio-chip{
  display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--ap-text-mute);
  padding:3px 7px;border-radius:4px;cursor:pointer;
}
.ap-prio-chip:hover{background:rgba(255,255,255,0.04);}
.ap-prio-bars{display:inline-flex;gap:2px;align-items:flex-end;height:11px;}
.ap-prio-bar{width:2px;background:currentColor;border-radius:1px;opacity:0.25;}
.ap-prio-bar.on{opacity:1;}
.ap-prio-bar:nth-child(1){height:3px;}
.ap-prio-bar:nth-child(2){height:6px;}
.ap-prio-bar:nth-child(3){height:9px;}

/* === Dashboard === */
.ap-kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px;}
.ap-kpi{background:var(--ap-surface);border:1px solid var(--ap-border);border-radius:8px;padding:14px 16px;}
.ap-kpi-label{font-size:10px;color:var(--ap-text-mute);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:7px;}
.ap-kpi-val{font-family:'DM Mono',monospace;font-size:26px;font-weight:600;color:var(--ap-text);line-height:1;letter-spacing:-0.02em;}
.ap-kpi-sub{font-size:11px;color:var(--ap-text-mute);margin-top:6px;}
.ap-kpi-sub.warn{color:#fbbf24;} .ap-kpi-sub.danger{color:#f87171;} .ap-kpi-sub.ok{color:#34d399;}

.ap-section{margin-bottom:24px;}
.ap-section-hdr{
  font-size:11px;font-weight:600;color:var(--ap-text-mute);
  letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px;
  display:flex;align-items:center;justify-content:space-between;
}
.ap-card-row{
  display:flex;align-items:center;gap:10px;padding:8px 12px;
  background:var(--ap-surface);border:1px solid var(--ap-border);border-radius:6px;
  margin-bottom:5px;cursor:pointer;font-size:12.5px;
}
.ap-card-row:hover{border-color:var(--ap-border-2);}

/* === List View === */
.ap-list-group{margin-bottom:18px;}
.ap-list-group-hdr{
  display:flex;align-items:center;gap:8px;padding:8px 10px;
  font-size:12.5px;font-weight:600;color:var(--ap-text);
  cursor:pointer;border-radius:5px;
}
.ap-list-group-hdr:hover{background:rgba(255,255,255,0.03);}
.ap-list-group-arrow{font-size:9px;color:var(--ap-text-mute);transition:transform 0.15s;display:inline-block;}
.ap-list-group-arrow.open{transform:rotate(90deg);}
.ap-list-group-count{font-size:10px;color:var(--ap-text-mute);background:rgba(255,255,255,0.05);padding:1px 6px;border-radius:8px;font-family:'DM Mono',monospace;}
.ap-list-group-actions{margin-left:auto;display:flex;gap:4px;}

.ap-row{
  display:grid;grid-template-columns:auto 64px 1fr auto auto auto auto;
  gap:12px;align-items:center;
  padding:8px 12px;border-radius:5px;
  font-size:13px;color:var(--ap-text);cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,0.025);
}
.ap-row:hover{background:rgba(255,255,255,0.03);}
.ap-row.selected{background:rgba(124,92,255,0.10);}
.ap-row.subtask{padding-left:42px;background:rgba(255,255,255,0.012);}
.ap-row.subtask .ap-row-title{font-size:12.5px;color:var(--ap-text-dim);}
.ap-row-title{min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ap-row-title.done{color:var(--ap-text-mute);text-decoration:line-through;}
.ap-row-id{font-family:'DM Mono',monospace;font-size:11px;color:var(--ap-text-mute);}
.ap-row-due{font-size:11px;color:var(--ap-text-mute);white-space:nowrap;font-family:'DM Mono',monospace;}
.ap-row-due.overdue{color:#f87171;}
.ap-row-due.soon{color:#fbbf24;}
.ap-row-mile{
  font-size:10px;color:#a78bfa;background:rgba(167,139,250,0.1);
  padding:2px 7px;border-radius:4px;white-space:nowrap;
}
.ap-row-pct{display:inline-flex;align-items:center;gap:5px;font-size:10px;color:var(--ap-text-mute);font-family:'DM Mono',monospace;}
.ap-row-pct-bar{width:36px;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;}
.ap-row-pct-bar-fill{height:100%;background:var(--ap-accent);}

.ap-add-task-row{
  display:flex;align-items:center;gap:8px;
  padding:7px 12px;border-radius:5px;cursor:pointer;
  font-size:12px;color:var(--ap-text-mute);margin-top:4px;
}
.ap-add-task-row:hover{color:var(--ap-accent-2);background:rgba(255,255,255,0.03);}
.ap-add-task-input{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;border-radius:5px;
  background:rgba(124,92,255,0.10);border:1px solid rgba(124,92,255,0.45);
  margin-top:4px;
}
.ap-add-task-input input{
  flex:1;background:transparent;border:none;color:#fff;
  font-family:inherit;font-size:13px;outline:none;caret-color:#fff;
  text-decoration:none;
}
.ap-add-task-input input::placeholder{color:rgba(255,255,255,0.50);}
.ap-add-task-input input::-webkit-spelling-error{text-decoration:none;}

/* === Board (Kanban) === */
.ap-board{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;height:calc(100vh - 280px);min-height:400px;}
.ap-col{
  flex:0 0 280px;background:var(--ap-bg-2);
  border:1px solid var(--ap-border);border-radius:8px;
  display:flex;flex-direction:column;
}
.ap-col-hdr{
  padding:10px 12px;font-size:12px;font-weight:600;
  display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--ap-border);
}
.ap-col-count{font-size:10px;color:var(--ap-text-mute);background:rgba(255,255,255,0.05);padding:1px 6px;border-radius:8px;margin-left:auto;font-family:'DM Mono',monospace;}
.ap-col-body{padding:8px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:6px;}
.ap-card{
  background:var(--ap-surface);border:1px solid var(--ap-border);
  border-radius:6px;padding:9px 11px;cursor:pointer;
  transition:border-color 0.1s,transform 0.1s;
}
.ap-card:hover{border-color:var(--ap-border-2);transform:translateY(-1px);}
.ap-card.dragging{opacity:0.4;}
.ap-card-hdr{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.ap-card-id{font-family:'DM Mono',monospace;font-size:10px;color:var(--ap-text-mute);}
.ap-card-title{font-size:12.5px;color:var(--ap-text);line-height:1.4;margin-bottom:7px;}
.ap-card-foot{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--ap-text-mute);}
.ap-col-add{
  margin:6px 8px 8px;padding:6px;border:1px dashed rgba(255,255,255,0.1);
  border-radius:5px;font-size:11px;color:var(--ap-text-mute);text-align:center;cursor:pointer;
}
.ap-col-add:hover{border-color:var(--ap-accent);color:var(--ap-accent-2);}

/* === Gantt === */
.ap-gantt{position:relative;background:var(--ap-surface);border:1px solid var(--ap-border);border-radius:8px;overflow:auto;max-height:calc(100vh - 250px);}
.ap-gantt-hdr{display:flex;height:32px;border-bottom:1px solid var(--ap-border);background:var(--ap-bg-2);position:sticky;top:0;z-index:2;}
.ap-gantt-hdr-spacer{width:240px;flex-shrink:0;border-right:1px solid var(--ap-border);padding:8px 12px;font-size:11px;color:var(--ap-text-mute);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;display:flex;align-items:center;}
.ap-gantt-hdr-track{flex:1;display:flex;font-size:10px;color:var(--ap-text-mute);position:relative;}
.ap-gantt-hdr-cell{flex-shrink:0;padding:8px 4px;border-right:1px solid rgba(255,255,255,0.04);text-align:center;display:flex;flex-direction:column;justify-content:center;}
.ap-gantt-hdr-cell.weekend{background:rgba(255,255,255,0.015);}
.ap-gantt-hdr-cell .gw{font-weight:600;color:var(--ap-text-dim);}
.ap-gantt-row{display:flex;border-bottom:1px solid rgba(255,255,255,0.03);height:36px;align-items:center;position:relative;}
.ap-gantt-row:hover{background:rgba(255,255,255,0.015);}
.ap-gantt-label{
  width:240px;flex-shrink:0;padding:0 12px;
  background:var(--ap-bg-2);border-right:1px solid var(--ap-border);height:100%;
  display:flex;align-items:center;font-size:12px;color:var(--ap-text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;gap:8px;
}
.ap-gantt-label:hover{background:var(--ap-surface);}
.ap-gantt-track{flex:1;position:relative;height:100%;}
.ap-gantt-bar{
  position:absolute;top:8px;height:20px;border-radius:4px;
  display:flex;align-items:center;padding:0 8px;font-size:10px;color:#fff;
  cursor:pointer;font-weight:500;overflow:hidden;background:var(--ap-accent);
  transition:filter 0.1s;
}
.ap-gantt-bar:hover{filter:brightness(1.2);}
.ap-gantt-bar.done{background:#10b981;}
.ap-gantt-bar.inprogress{background:#3b82f6;}
.ap-gantt-bar.todo{background:#f59e0b;}
.ap-gantt-bar.backlog{background:#6b7280;}
.ap-gantt-bar.cancelled{background:#6b7280;text-decoration:line-through;opacity:0.6;}
.ap-gantt-bar.inreview{background:#a855f7;}
.ap-gantt-mile{
  position:absolute;top:8px;width:20px;height:20px;background:#a78bfa;
  transform:rotate(45deg);border:2px solid var(--ap-bg);cursor:pointer;
  margin-left:-10px;
}
.ap-gantt-mile:hover{filter:brightness(1.3);}
.ap-gantt-today{position:absolute;top:0;width:1.5px;background:#ef4444;opacity:0.8;pointer-events:none;z-index:1;}
.ap-gantt-svg{position:absolute;top:32px;left:240px;pointer-events:none;z-index:1;}
.ap-gantt-line{stroke:#a78bfa;stroke-width:1.5;fill:none;opacity:0.7;}
.ap-gantt-empty{padding:60px 20px;text-align:center;color:var(--ap-text-mute);font-size:13px;}
.ap-gantt-zoom{display:flex;gap:4px;margin-bottom:12px;}
.ap-gantt-zoom button{
  background:rgba(255,255,255,0.04);border:1px solid var(--ap-border);
  color:var(--ap-text-dim);font-family:inherit;font-size:11px;padding:5px 12px;
  border-radius:5px;cursor:pointer;
}
.ap-gantt-zoom button:hover{color:var(--ap-text);}
.ap-gantt-zoom button.active{background:var(--ap-accent-soft);color:var(--ap-accent-2);border-color:rgba(124,92,255,0.4);}

/* === Milestones === */
.ap-mile{
  background:var(--ap-surface);border:1px solid var(--ap-border);
  border-radius:8px;padding:14px 16px;margin-bottom:8px;cursor:pointer;
  transition:border-color 0.1s;
}
.ap-mile:hover{border-color:var(--ap-border-2);}
.ap-mile-hdr{display:flex;align-items:center;gap:10px;}
.ap-mile-icon{
  width:18px;height:18px;background:#a78bfa;transform:rotate(45deg);
  flex-shrink:0;border:2px solid var(--ap-bg);
}
.ap-mile-name{font-size:14px;font-weight:600;color:var(--ap-text);flex:1;}
.ap-mile-due{font-size:11px;color:var(--ap-text-dim);font-family:'DM Mono',monospace;}
.ap-mile-due.overdue{color:#f87171;}
.ap-mile-progress{margin-top:10px;display:flex;align-items:center;gap:10px;}
.ap-mile-progress-bar{flex:1;height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;}
.ap-mile-progress-fill{height:100%;background:linear-gradient(90deg,#a78bfa,#7c5cff);}
.ap-mile-progress-pct{font-family:'DM Mono',monospace;font-size:11px;color:var(--ap-text-dim);min-width:40px;text-align:right;}

/* === Detail panel (slide-in from right) === */
.ap-detail-overlay{
  position:fixed;inset:0;background:rgba(4,5,10,0.55);z-index:9400;
  opacity:0;pointer-events:none;transition:opacity 0.15s;
  caret-color:transparent;
}
.ap-detail-overlay.open{opacity:1;pointer-events:auto;}
.ap-detail{
  position:fixed;top:0;right:-580px;width:580px;height:100vh;
  background:#14172a;border-left:1px solid rgba(255,255,255,0.14);
  box-shadow:-16px 0 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(124,92,255,0.10);
  z-index:9401;display:flex;flex-direction:column;
  transition:right 0.22s ease;
  color:var(--ap-text);font-family:'Inter','DM Sans',sans-serif;font-size:13px;
  caret-color:transparent;
}
.ap-detail.open{right:0;}
.ap-detail input,.ap-detail textarea,.ap-detail select,.ap-detail [contenteditable]{caret-color:auto;user-select:text;}
.ap-detail-hdr{
  padding:14px 18px;border-bottom:1px solid var(--ap-border);
  display:flex;align-items:center;gap:10px;
}
.ap-detail-id{font-family:'DM Mono',monospace;font-size:11px;color:#cbd2e3;background:rgba(255,255,255,0.10);padding:3px 8px;border-radius:4px;font-weight:500;}
.ap-detail-actions{margin-left:auto;display:flex;gap:5px;}
.ap-icon-btn{
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.10);color:#cbd2e3;
  width:28px;height:28px;border-radius:5px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:13px;font-family:inherit;
}
.ap-icon-btn:hover{background:rgba(255,255,255,0.10);color:#fff;border-color:rgba(255,255,255,0.20);}
.ap-icon-btn.danger:hover{color:#f87171;border-color:rgba(248,113,113,0.4);background:rgba(248,113,113,0.12);}

.ap-detail-body{flex:1;overflow-y:auto;padding:18px 22px 28px;}
.ap-detail-title{
  font-size:20px;font-weight:600;color:#fff;letter-spacing:-0.015em;
  background:transparent;border:none;outline:none;width:100%;
  font-family:inherit;padding:4px 0;line-height:1.3;
}
.ap-detail-meta{display:grid;grid-template-columns:120px 1fr;gap:10px 14px;margin-top:18px;align-items:center;}
.ap-detail-meta-label{font-size:11px;color:#a8b0c2;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;}
.ap-detail-meta-val select,.ap-detail-meta-val input{
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);
  color:#fff;font-family:inherit;font-size:12px;font-weight:500;padding:6px 10px;border-radius:5px;outline:none;width:auto;min-width:140px;
}
.ap-detail-meta-val select:focus,.ap-detail-meta-val input:focus{border-color:var(--ap-accent);background:rgba(124,92,255,0.12);}
.ap-detail-meta-val select option{background:#1a1d2a;color:#fff;}
.ap-detail-meta-val input[type="range"]{width:100%;min-width:200px;background:transparent;border:none;padding:0;}
.ap-detail-meta-val input[type="number"]{width:80px;min-width:0;}
.ap-detail-meta-val input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.85);cursor:pointer;}

.ap-detail-section{margin-top:24px;}
.ap-detail-section-hdr{
  font-size:11px;font-weight:600;color:#a8b0c2;
  letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;
  display:flex;align-items:center;justify-content:space-between;
}
.ap-detail-desc{
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);
  border-radius:6px;padding:10px 12px;color:#f3f4f6;font-size:13px;
  min-height:80px;line-height:1.55;outline:none;font-family:inherit;width:100%;resize:vertical;
}
.ap-detail-desc::placeholder{color:rgba(255,255,255,0.45);}
.ap-detail-desc:focus{border-color:var(--ap-accent);background:rgba(124,92,255,0.08);}

.ap-sub-row{
  display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:5px;font-size:12.5px;cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,0.05);color:#e8eaf0;
}
.ap-sub-row:hover{background:rgba(255,255,255,0.05);}
.ap-sub-row .ap-sub-title.done{color:#7c849a;text-decoration:line-through;}
.ap-sub-add{
  display:flex;align-items:center;gap:8px;padding:7px 8px;
  font-size:12px;color:#a8b0c2;cursor:pointer;border-radius:5px;
}
.ap-sub-add:hover{color:var(--ap-accent-2);background:rgba(255,255,255,0.05);}

.ap-dep-row{
  display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:5px;
  font-size:12px;color:#e8eaf0;background:rgba(255,255,255,0.05);
  margin-bottom:5px;border:1px solid rgba(255,255,255,0.10);
}
.ap-detail-foot-meta{font-size:10px;color:#a8b0c2;}
.ap-dep-row .ap-icon-btn{margin-left:auto;width:20px;height:20px;font-size:11px;}

/* === Quick Add Modal === */
.ap-modal-bd{
  position:fixed;inset:0;background:rgba(2,3,8,0.92);z-index:9500;
  display:flex;align-items:flex-start;justify-content:center;padding:80px 20px 20px;
  backdrop-filter:blur(10px);
  caret-color:transparent;font-family:'Inter','DM Sans',sans-serif;
}
.ap-modal-bd input,.ap-modal-bd textarea,.ap-modal-bd select{caret-color:auto;}
.ap-modal{
  background:#262a3f;border:1px solid rgba(255,255,255,0.22);
  border-radius:12px;width:100%;max-width:560px;
  box-shadow:0 30px 100px rgba(0,0,0,0.95),
             0 0 0 1px rgba(124,92,255,0.30),
             0 0 80px rgba(124,92,255,0.18);
  overflow:hidden;
  font-family:'Inter','DM Sans',sans-serif;color:#f3f4f6;
}
.ap-modal-hdr{
  padding:13px 18px;border-bottom:1px solid rgba(255,255,255,0.12);
  font-size:12px;color:#cdd0db;font-weight:500;
  display:flex;align-items:center;gap:8px;background:rgba(0,0,0,0.18);
}
.ap-modal-body{padding:18px;}
.ap-modal-title-input{
  background:transparent;border:none;outline:none;width:100%;
  color:#fff;font-family:inherit;font-size:18px;font-weight:500;padding:0 0 12px;
}
.ap-modal-title-input::placeholder{color:rgba(255,255,255,0.55);}
.ap-modal-desc{
  background:transparent;border:none;outline:none;width:100%;
  color:#fff;font-family:inherit;font-size:13px;line-height:1.55;
  resize:none;min-height:50px;padding:0;
}
.ap-modal-desc::placeholder{color:rgba(255,255,255,0.50);}
.ap-modal-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.12);}
.ap-meta-chip{
  background:rgba(255,255,255,0.10);border:1px solid rgba(255,255,255,0.22);
  color:#f3f4f6;font-family:inherit;font-size:12px;font-weight:500;
  padding:6px 11px;border-radius:5px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;
}
.ap-meta-chip:hover{background:rgba(255,255,255,0.16);color:#fff;border-color:rgba(255,255,255,0.32);}
.ap-meta-chip.set{background:rgba(124,92,255,0.28);border-color:rgba(124,92,255,0.60);color:#fff;}
.ap-meta-chip select,.ap-meta-chip input{background:transparent;border:none;outline:none;color:inherit;font-family:inherit;font-size:12px;font-weight:500;}
.ap-meta-chip select option{background:#262a3f;color:#fff;}
.ap-modal-foot{
  display:flex;justify-content:flex-end;gap:8px;padding:12px 18px;
  border-top:1px solid rgba(255,255,255,0.12);background:rgba(0,0,0,0.20);
}
/* Brighten the buttons inside Workflow modals */
.ap-modal-bd .ap-btn-primary{
  background:#8b6dff;color:#fff;font-weight:600;
  box-shadow:0 2px 8px rgba(124,92,255,0.45);
}
.ap-modal-bd .ap-btn-primary:hover{background:#9a7eff;box-shadow:0 4px 14px rgba(124,92,255,0.55);}
.ap-modal-bd .ap-btn-ghost{color:#cdd0db;border-color:rgba(255,255,255,0.28);font-weight:500;}
.ap-modal-bd .ap-btn-ghost:hover{color:#fff;border-color:rgba(255,255,255,0.45);background:rgba(255,255,255,0.06);}
/* Generic prompt modal field */
.ap-prompt-field{margin-bottom:12px;}
.ap-prompt-field label{
  display:block;font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;
  color:var(--ap-text-mute);margin-bottom:6px;
}
.ap-prompt-field input,.ap-prompt-field textarea{
  width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);
  color:#fff;font-family:inherit;font-size:13px;padding:9px 12px;border-radius:6px;outline:none;
}
.ap-prompt-field input:focus,.ap-prompt-field textarea:focus{
  border-color:var(--ap-accent);background:rgba(124,92,255,0.06);
}
.ap-btn{
  font-family:inherit;font-size:12px;font-weight:500;
  padding:7px 14px;border-radius:5px;cursor:pointer;border:1px solid transparent;
}
.ap-btn-primary{background:var(--ap-accent);color:#fff;}
.ap-btn-primary:hover{background:#6d4ef0;}
.ap-btn-ghost{background:transparent;color:var(--ap-text-dim);border-color:var(--ap-border);}
.ap-btn-ghost:hover{color:var(--ap-text);border-color:var(--ap-border-2);}

/* === Command Palette === */
.ap-cmd-bd{
  position:fixed;inset:0;background:rgba(4,5,10,0.78);z-index:9700;
  display:flex;align-items:flex-start;justify-content:center;padding:14vh 20px 20px;
  backdrop-filter:blur(10px);
  caret-color:transparent;
}
.ap-cmd-bd input{caret-color:#fff;}
.ap-cmd{
  background:#1a1d2a;border:1px solid rgba(255,255,255,0.18);
  border-radius:12px;width:100%;max-width:580px;
  box-shadow:0 30px 100px rgba(0,0,0,0.9), 0 0 0 1px rgba(124,92,255,0.18);overflow:hidden;
}
.ap-cmd-input-wrap{padding:14px 18px;border-bottom:1px solid var(--ap-border);}
.ap-cmd-input{
  width:100%;background:transparent;border:none;outline:none;
  color:#fff;font-family:'Inter','DM Sans',sans-serif;font-size:15px;caret-color:#fff;
}
.ap-cmd-list{max-height:50vh;overflow-y:auto;padding:6px;}
.ap-cmd-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 12px;border-radius:6px;cursor:pointer;
  font-size:13px;color:var(--ap-text-dim);
}
.ap-cmd-item.selected{background:var(--ap-accent-soft);color:var(--ap-text);}
.ap-cmd-item .ap-cmd-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0;}
.ap-cmd-item .ap-cmd-kind{font-size:10px;color:var(--ap-text-mute);margin-left:auto;letter-spacing:0.05em;text-transform:uppercase;font-weight:600;}
.ap-cmd-empty{padding:24px;text-align:center;color:var(--ap-text-mute);font-size:12px;}

/* === Floating Quick Add === */
.ap-fab{
  position:fixed;bottom:24px;right:24px;z-index:9000;
  background:linear-gradient(135deg,var(--ap-accent),#a78bfa);
  color:#fff;border:none;
  padding:11px 18px 11px 14px;border-radius:999px;
  font-family:'Inter','DM Sans',sans-serif;font-size:13px;font-weight:500;
  cursor:pointer;display:flex;align-items:center;gap:8px;
  box-shadow:0 12px 32px rgba(124,92,255,0.4),0 4px 12px rgba(0,0,0,0.3);
  transition:transform 0.15s,box-shadow 0.15s;
}
.ap-fab:hover{transform:translateY(-2px);box-shadow:0 16px 40px rgba(124,92,255,0.5);}
.ap-fab kbd{
  background:rgba(255,255,255,0.18);font-family:'DM Mono',monospace;
  font-size:10px;padding:1px 5px;border-radius:3px;font-weight:600;color:#fff;
}

/* === PIN gate === */
.ap-pin-wrap{
  min-height:calc(100vh - 78px);background:var(--ap-bg);
  display:flex;align-items:center;justify-content:center;
  font-family:'Inter','DM Sans',sans-serif;
}
.ap-pin-box{
  background:var(--ap-bg-2);border:1px solid var(--ap-border);
  padding:36px 32px;border-radius:14px;width:340px;text-align:center;
  box-shadow:0 24px 80px rgba(0,0,0,0.6);
}
.ap-pin-title{color:#fff;font-size:14px;font-weight:500;margin-bottom:18px;letter-spacing:-0.01em;}
.ap-pin-input{
  background:rgba(255,255,255,0.04);border:1px solid var(--ap-border);color:#fff;
  padding:12px;border-radius:8px;font-family:'DM Mono',monospace;font-size:18px;
  text-align:center;letter-spacing:8px;width:160px;outline:none;caret-color:#fff;
}
.ap-pin-input:focus{border-color:var(--ap-accent);}
.ap-pin-err{color:#f87171;font-size:12px;margin-top:10px;display:none;}

/* === Tab nav badge === */
.ai-tab-badge{
  display:inline-block;background:#7c5cff;color:#fff;
  font-size:9px;font-weight:700;padding:2px 6px;border-radius:9px;margin-left:5px;
  vertical-align:middle;line-height:1;min-width:14px;
}

.ap-empty{text-align:center;padding:80px 20px;color:var(--ap-text-mute);font-size:13px;}
.ap-empty-icon{font-size:48px;opacity:0.18;margin-bottom:14px;}

</style>
</head>

  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
          <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
      </div>

        <div class="topbar-name">HELM</div>

function fmtTime(d){
  if(!(d instanceof Date)) d=new Date(d);
  let h=d.getHours(), m=d.getMinutes();
  const ap=h>=12?'pm':'am';
  h=h%12||12;
  return `${h}:${String(m).padStart(2,'0')}${ap}`;
}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function parseCSVLine(line){
  const fields=[];
  let field='', inQuotes=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(inQuotes){
      if(ch==='"'&&line[i+1]==='"'){field+='"';i++;}
      else if(ch==='"'){inQuotes=false;}
      else{field+=ch;}
    } else {
      if(ch==='"'){inQuotes=true;}
      else if(ch===','){fields.push(field.trim());field='';}
      else{field+=ch;}
    }
  }
  fields.push(field.trim());
  return fields;
}

function getTodayISO() {
  const d = new Date();
  d.setHours(0,0,0,0);
  return d.toISOString().split('T')[0];
}

function fmtDate(iso){
  if(!iso) return '';
  const d=new Date(iso+'T00:00:00');
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function fmtDateShort(iso){
  if(!iso) return '';
  const d=new Date(iso+'T00:00:00');
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  const y=String(d.getFullYear()).slice(2);
  return m+day+y;
}

function fmtTimestamp(ts){
  if(!ts) return '';
  const d=new Date(ts);
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  const y=String(d.getFullYear()).slice(2);
  const h=String(d.getHours()).padStart(2,'0');
  const min=String(d.getMinutes()).padStart(2,'0');
  return `${m}/${day}/${y} ${h}:${min}`;
}

async function loadClients() {
  let all=[], from=0, batch=1000;
  while(true){
    const {data,error}=await db.from('clients').select('*').order('client_id').range(from,from+batch-1);
    if(error){toast('Failed to load clients');break;}
    if(!data||data.length===0) break;
    all=[...all,...data];
    if(data.length<batch) break;
    from+=batch;
  }
  clients=all;
  const hint=document.getElementById('srchHint');
  if(hint) hint.textContent=clients.length>0
    ?`${clients.length.toLocaleString()} clients loaded — search by account #, name, address, or phone`
    :'No clients found — import clients to get started';
}

async function loadSkips() {
  const {data,error}=await db.from('skips').select('*').order('skip_week',{ascending:false});
  if(!error) skips=data||[];
}

async function loadNotes(baseId){
  // Load notes for base ID (notes are stored against base ID, not suffixed IDs)
  const {data,error}=await db.from('notes').select('*').eq('client_id',baseId).order('created_at',{ascending:false});
  if(!error) clientNotes=data||[];
  return clientNotes;
}

// Which group does each tab belong to? (Used for auto-expand on switch.)
const NAV_GROUP_OF_TAB = {
  lookup:'clients', add:'clients', report:'clients',
  irr:'analysis', xfer:'analysis', bla:'analysis'
};
function toggleNavGroup(id){
  const el = document.getElementById('navGroup-'+id);
  if(!el) return;
  el.classList.toggle('collapsed');
  // Persist
  const state = JSON.parse(localStorage.getItem('helm_nav_groups')||'{}');
  state[id] = el.classList.contains('collapsed');
  localStorage.setItem('helm_nav_groups', JSON.stringify(state));
}
function applyNavGroupState(){
  const state = JSON.parse(localStorage.getItem('helm_nav_groups')||'{}');
  Object.keys(state).forEach(id=>{
    const el = document.getElementById('navGroup-'+id);
    if(el && state[id]) el.classList.add('collapsed');
  });
}
function expandNavGroupFor(tabName){
  const g = NAV_GROUP_OF_TAB[tabName];
  if(!g) return;
  const el = document.getElementById('navGroup-'+g);
  if(el && el.classList.contains('collapsed')){
    el.classList.remove('collapsed');
    const state = JSON.parse(localStorage.getItem('helm_nav_groups')||'{}');
    state[g] = false;
    localStorage.setItem('helm_nav_groups', JSON.stringify(state));
  }
}
function switchTab(name,btn){
  expandNavGroupFor(name);
  ['lookup','add','report','rolloffs','irr','xfer','bla','files','cmd','action','import'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===name?'':'none';
  });
  document.querySelectorAll('.tab-nav button').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  // Action Items / Command both need to escape .main's max-width
  document.body.classList.toggle('on-action-tab', name==='action');
  document.body.classList.toggle('on-cmd-tab', name==='cmd');
  // Only re-render lookup on first visit; preserve state after that
  if(name==='lookup' && !lookupRendered) renderLookup();
  if(name==='add')    renderAdd();
  if(name==='report') renderReport();
  if(name==='rolloffs') renderRolloffs();
  if(name==='irr')    renderIRR();
  if(name==='xfer')   renderXfer();
  if(name==='bla')    renderBLA();
  if(name==='files')  renderFiles();
  if(name==='cmd')    { if(!cmdUnlocked){promptCmdPin();return;} renderCmd(); }
  if(name==='action') { apInit(); }
  if(name==='import') renderImport();
}

function doSearch(q){
  q=q.trim().toLowerCase();
  const res=document.getElementById('srchResults');
  if(q.length<2){res.innerHTML='';updateLookupWatermark();return;}

  // Tokenize: split query into words, every word must match SOMEWHERE
  const tokens=q.split(/\s+/).filter(t=>t.length>0);
  const qClean=q.replace(/\D/g,'');

  const results=clients
    .map(c=>{
      const idL=c.client_id.toLowerCase();
      const addrL=c.address.toLowerCase();
      const nameL=(c.client_name||'').toLowerCase();
      const phoneClean=(c.phone||'').replace(/\D/g,'');
      // Haystack = all searchable fields combined
      const hay=idL+' '+nameL+' '+addrL+' '+phoneClean;
      // Every token must appear in the haystack
      const allMatch=tokens.every(t=>hay.includes(t));
      if(!allMatch) return {c,score:0};
      // Score for ranking: prefer name/id matches over address
      let score=1;
      if(idL===q) score=10;
      else if(idL.startsWith(q)) score=8;
      else if(idL.includes(q)) score=6;
      if(nameL){
        if(nameL.includes(q)) score=Math.max(score,7);
        else if(tokens.every(t=>nameL.includes(t))) score=Math.max(score,5);
      }
      if(addrL.includes(q)) score=Math.max(score,3);
      if(qClean.length>=3&&phoneClean.includes(qClean)) score=Math.max(score,qClean.length>=7?9:4);
      return {c,score};
    })
    .filter(x=>x.score>0)
    .sort((a,b)=>b.score-a.score)
    .slice(0,10);

  if(!results.length){res.innerHTML='<div class="empty-state">No clients found</div>';updateLookupWatermark();return;}
  if(results.length===1){res.innerHTML='';openClient(results[0].c);updateLookupWatermark();return;}
  res.innerHTML='<div class="results-list">'+results.map(({c})=>{
    const co=getCompany(c.client_id);
    return `
    <div class="result-item" tabindex="0" data-cid="${esc(c.client_id)}" onclick="pickClient('${esc(c.client_id)}')" onkeydown="handleResultKey(event,'${esc(c.client_id)}')">
      <div>
        <div class="result-id">${c.client_name?`${esc(c.client_name)} &mdash; `:''}${esc(c.client_id)}${co.name?` <span class="company-tag ${co.cls}">${co.name}</span>`:''}</div>
        <div class="result-addr">${esc(c.address)}</div>
      </div>
      <div class="result-day">${esc(c.service_day||'')}</div>
    </div>`;
  }).join('')+'</div>';
  updateLookupWatermark();
}

function handleSearchKey(e){
  if(e.key==='Enter'){
    e.preventDefault();
    const first=document.querySelector('.result-item');
    if(first){first.click();return;}
    // If search has text but no results list, check if single match auto-opened
  }
  if(e.key==='ArrowDown'){
    e.preventDefault();
    const first=document.querySelector('.result-item');
    if(first) first.focus();
  }
}

function handleResultKey(e,cid){
  if(e.key==='Enter'){e.preventDefault();pickClient(cid);return;}
  if(e.key==='ArrowDown'){
    e.preventDefault();
    const next=e.target.nextElementSibling;
    if(next) next.focus();
  }
  if(e.key==='ArrowUp'){
    e.preventDefault();
    const prev=e.target.previousElementSibling;
    if(prev) prev.focus();
    else document.getElementById('srch').focus();
  }
}

function toggleRouteNoteField(){

async function saveClientEdit(cid){
  const name=document.getElementById('editName').value.trim();
  const addr=document.getElementById('editAddr').value.trim();
  const phone=document.getElementById('editPhone').value.trim();
  const email=document.getElementById('editEmail').value.trim();
  const days=[...document.querySelectorAll('#editDaysWrap .day-toggle-active')].map(b=>b.dataset.day);
  const autopay=document.getElementById('editAutopay')?.checked||false;
  const routeVal=document.getElementById('editRoute')?.value||'';
  const route=routeVal?parseInt(routeVal):null;
  const routeNote=route?(document.getElementById('editRouteNote')?.value||'').trim():'';
  if(!addr){toast('Address is required');return;}
  if(!days.length){toast('Select at least one pickup day');return;}
  const {error}=await db.from('clients').update({
    client_name:name||null,
    address:addr,
    phone:phone||null,
    email:email||null,
    service_day:days.join(','),
    autopay:autopay,
    route:route,
    route_note: routeNote||null
  }).eq('client_id',cid);
  if(error){toast('Error: '+error.message);return;}
  await loadClients();
  const updated=clients.find(x=>x.client_id===cid);
  if(updated){activeClient=updated;showPanel(updated);}
  toast('Client updated',true);
}

async function deleteNote(noteId){
  if(!noteId||!activeClient) return;
  const {data,error}=await db.from('notes').delete().eq('id',noteId).select();
  if(error){toast('Error: '+error.message);return;}
  toast('Note deleted',true);
  const notes=await loadNotes(activeClient.client_id);
  renderNotesTable(notes);
}

// Group notes by route — Route 1...14, then No Route at end. Within a route, sorted by acct #.
function groupByRoute(data){
  const grouped = {};
  data.forEach(n=>{
    const c = findClient(n.client_id);
    const route = (c.route !== null && c.route !== undefined && c.route !== '') ? String(c.route).padStart(2,'0') : 'No Route';
    if(!grouped[route]) grouped[route] = [];
    grouped[route].push(n);
  });
  const sortedKeys = Object.keys(grouped).sort((a,b)=>{
    if(a==='No Route') return 1;
    if(b==='No Route') return -1;
    return parseInt(a)-parseInt(b);
  });
  for(const k of sortedKeys){
    grouped[k].sort((a,b)=>(a.client_id||'').localeCompare(b.client_id||''));
  }
  return {sortedKeys, grouped};
}

// Action-tag CSS class lookup (reuse the same colors used in client notes)
function actionTagClass(action){
  const t = ACTION_TYPES.find(x=>x.value===action);
  return t ? t.tag : 'at-misc';
}

function findClient(cid){
  return clients.find(x=>x.client_id===cid)||clients.find(x=>x.client_id===getBaseId(cid))||{};
}

function fetchReportData(notesData,skipsData,date){
  const data=[...(notesData||[])];
  if(skipsData&&skipsData.length){
    skipsData.forEach(s=>{
      const skipId=getBaseId(s.client_id); // handle legacy suffixed IDs
      const already=data.some(n=>n.client_id===skipId&&n.action==='Skip Day');
      if(!already){
        data.push({
          client_id:skipId,
          action:'Skip Day',
          action_date:date,
          note:s.inquiry_method?`via ${s.inquiry_method}`:'',
          logged_by:s.logged_by||'',
          created_at:s.created_at||''
        });
      }
    });
  }
  // Group by action
  const grouped={};
  data.forEach(n=>{
    if(!grouped[n.action]) grouped[n.action]=[];
    grouped[n.action].push(n);
  });
  return {data,grouped};
}

  const {data:skipsData}=await db.from('skips').select('*').eq('skip_week',date);

// Filters notes by the timestamp they were INPUT (created_at), not the
// action_date the note applies to. Useful for auditing what staff entered
// on a given day, including notes scheduled for future dates.
async function generateNotesAddedReport(){
  const date = document.getElementById('notesAddedDate').value;
  if(!date){ toast('Select a date'); return; }
  const results = document.getElementById('notesAddedResults');
  results.innerHTML = '<div class="loading">Loading…</div>';

  // Local-day boundaries → ISO range. created_at is stored in UTC.
  const startDt = new Date(date+'T00:00:00');
  const endDt = new Date(date+'T00:00:00'); endDt.setDate(endDt.getDate()+1);
  const startISO = startDt.toISOString();
  const endISO = endDt.toISOString();

  const {data, error} = await db.from('notes')
    .select('*')
    .gte('created_at', startISO)
    .lt('created_at', endISO)
    .order('created_at');

  if(error){
    results.innerHTML = '<div class="empty-state" style="color:var(--err-text);text-align:left;line-height:1.5">Error: '+esc(error.message)+'</div>';
    return;
  }
  if(!data || !data.length){
    results.innerHTML = '<div class="empty-state">No notes input on '+fmtDate(date)+'</div>';
    return;
  }

  // Group by For Date (action_date). Notes without an action_date go to a 'No date' bucket.
  const byForDate = {};
  for(const n of data){
    const k = n.action_date || 'NODATE';
    (byForDate[k] = byForDate[k] || []).push(n);
  }

// Quick preset buttons that set the From/To dates relative to today.
function setEverythingRange(days){
  const fromEl = document.getElementById('everythingFromDate');
  const toEl   = document.getElementById('everythingToDate');
  if(!fromEl || !toEl) return;
  if(days === 0){ // All time → clear both
    fromEl.value = ''; toEl.value = '';
    return;
  }
  const today = new Date(); today.setHours(0,0,0,0);
  const start = new Date(today); start.setDate(today.getDate() - (days - 1));
  const iso = d => d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  fromEl.value = iso(start);
  toEl.value   = iso(today);
}

async function apFetchAllNotes(fromDate, toDate){
  // Paginate — Supabase caps single queries at 1000 rows.
  // fromDate/toDate are 'YYYY-MM-DD' strings filtering notes.created_at
  // (when the note was input). Either may be omitted for an open-ended range.
  const fromISO = fromDate ? new Date(fromDate+'T00:00:00').toISOString() : null;
  let toISO = null;
  if(toDate){
    const t = new Date(toDate+'T00:00:00'); t.setDate(t.getDate()+1); // inclusive end
    toISO = t.toISOString();
  }
  let all = [], from = 0, batch = 1000;
  while(true){
    let q = db.from('notes').select('*').order('action_date',{ascending:true,nullsFirst:false});
    if(fromISO) q = q.gte('created_at', fromISO);
    if(toISO)   q = q.lt('created_at', toISO);
    q = q.range(from, from+batch-1);
    const {data, error} = await q;
    if(error) throw error;
    if(!data || data.length===0) break;
    all = all.concat(data);
    if(data.length < batch) break;
    from += batch;
  }
  return all;
}

function _everythingGroupAndSort(data){
  const byForDate = {};
  for(const n of data){
    const k = n.action_date || 'NODATE';
    (byForDate[k] = byForDate[k] || []).push(n);
  }
  const dateKeys = Object.keys(byForDate).sort((a,b)=>{
    if(a==='NODATE') return 1;
    if(b==='NODATE') return -1;
    return a.localeCompare(b);
  });
  for(const k of dateKeys){
    byForDate[k].sort((a,b)=>{
      const ra = findClient(a.client_id).route;
      const rb = findClient(b.client_id).route;
      const aHas = ra !== null && ra !== undefined && ra !== '';
      const bHas = rb !== null && rb !== undefined && rb !== '';
      if(aHas && !bHas) return -1;
      if(!aHas && bHas) return 1;
      if(aHas && bHas){
        const diff = parseInt(ra) - parseInt(rb);
        if(diff !== 0) return diff;
      }
      return (a.client_id||'').localeCompare(b.client_id||'');
    });
  }
  return {byForDate, dateKeys};
}

// ── EXPORT CLIENTS TO EXCEL ───────────────────────────────────────────
const CLIENT_COL_LABELS = {
  client_id:'Account #', company:'Company', client_name:'Name',
  address:'Address', phone:'Phone', email:'Email',
  service_day:'Pickup Days', route:'Route',
  status:'Status', autopay:'Autopay', created_at:'Date Added',
};

function generateClientExport(){
  const status = document.getElementById('exportStatus');
  const cols = [...document.querySelectorAll('#exportCols input[type=checkbox]:checked')].map(c=>c.dataset.col);
  if(!cols.length){ toast('Pick at least one column'); return; }

  // Filters
  const fCo = document.getElementById('expCompany').value;
  const fSt = document.getElementById('expStatus').value;
  const fEm = document.getElementById('expEmail').value;
  const fRt = document.getElementById('expRoute').value;

  let list = clients.slice();
  if(fCo) list = list.filter(c=>getCompany(c.client_id).name===fCo);
  if(fSt) list = list.filter(c=>(c.status||'Active')===fSt);
  if(fEm==='with') list = list.filter(c=>c.email && c.email.trim());
  if(fEm==='without') list = list.filter(c=>!c.email || !c.email.trim());
  if(fRt==='none') list = list.filter(c=>!c.route);
  else if(fRt) list = list.filter(c=>String(c.route)===String(fRt));
  // Sort by client_id
  list.sort((a,b)=>(a.client_id||'').localeCompare(b.client_id||''));

  if(!list.length){ toast('No clients match those filters'); return; }
  status.textContent = 'Building '+list.length+' rows...';

  // Build header row + body
  const headerCells = cols.map(k=>`<th style="background:#0f1f3d;color:#fff;padding:6px 10px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;border:1px solid #999;">${esc(CLIENT_COL_LABELS[k]||k)}</th>`).join('');
  const bodyRows = list.map(c=>{
    const cells = cols.map(k=>{
      let v;
      if(k==='company') v = getCompany(c.client_id).name||'';
      else if(k==='autopay') v = c.autopay ? 'Yes' : 'No';
      else if(k==='created_at') v = c.created_at ? new Date(c.created_at).toLocaleString('en-US',{year:'numeric',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}) : '';
      else if(k==='status') v = c.status || 'Active';
      else v = c[k] || '';
      return `<td style="padding:5px 10px;border:1px solid #ccc;font-family:Arial,Helvetica,sans-serif;font-size:11px;">${esc(String(v))}</td>`;
    }).join('');
    return `<tr>${cells}</tr>`;
  }).join('');

  // Filter summary for header
  const filterBits = [];
  if(fCo) filterBits.push(fCo);
  if(fSt) filterBits.push(fSt);
  if(fEm==='with') filterBits.push('with email');
  if(fEm==='without') filterBits.push('missing email');
  if(fRt==='none') filterBits.push('no route');
  else if(fRt) filterBits.push('Route '+fRt);
  const filterStr = filterBits.length ? ' ('+filterBits.join(' / ')+')' : '';

  const today = new Date().toISOString().slice(0,10);
  const tableHtml = `
    <h2 style="font-family:Arial,Helvetica,sans-serif;font-size:16px;margin:0 0 4px 0;">HELM Clients Export${esc(filterStr)}</h2>
    <div style="font-family:Arial,Helvetica,sans-serif;font-size:11px;color:#666;margin-bottom:10px;">${list.length} clients · Generated ${today}</div>
    <table style="border-collapse:collapse;border:1px solid #999;">
      <thead><tr>${headerCells}</tr></thead>
      <tbody>${bodyRows}</tbody>
    </table>`;
  const xlsHtml = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="UTF-8"><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet><x:Name>Clients</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]--></head><body>'+tableHtml+'</body></html>';
  const blob = new Blob(['\ufeff', xlsHtml], {type:'application/vnd.ms-excel'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'HELM_Clients_'+today.replace(/-/g,'')+'.xls';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
  status.textContent = 'Downloaded '+list.length+' clients';
  logActivity('clients_exported', list.length+' rows');
}

// ── BULK UPDATE EMAILS FROM CSV ───────────────────────────────────────
let _emailUploadParsed = null;

function handleEmailUploadFile(file){
  if(!file) return;
  const preview = document.getElementById('emailUploadPreview');
  preview.innerHTML = '<div class="loading">Reading '+esc(file.name)+'...</div>';
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const text = e.target.result;
      const lines = text.split(/\r?\n/).filter(l=>l.trim());
      if(lines.length < 2){ preview.innerHTML = '<div class="empty-state" style="color:var(--err-text)">CSV needs a header row + at least one data row</div>'; return; }

      const headerRaw = parseCSVLine(lines[0]);
      const headers = headerRaw.map(h=>h.toLowerCase().replace(/[^a-z0-9]/g,''));

      // Auto-detect account-id column
      const acctCandidates = ['accountid','account','accountnum','accountnumber','clientid','acct','acctid','acctnum','id'];
      const emailCandidates = ['email','emailaddress','emailaddr','eaddress'];
      let acctIdx = headers.findIndex(h=>acctCandidates.includes(h));
      let emailIdx = headers.findIndex(h=>emailCandidates.includes(h));
      // Fallback: any header containing "acct"/"client"+"id" or "email"
      if(acctIdx === -1) acctIdx = headers.findIndex(h=>(h.includes('account')||h.includes('client')||h.includes('acct')) && (h.includes('id')||h.includes('num')||h.length<=8));
      if(emailIdx === -1) emailIdx = headers.findIndex(h=>h.includes('email'));

      if(acctIdx === -1 || emailIdx === -1){
        preview.innerHTML = `<div class="empty-state" style="color:var(--err-text);text-align:left;line-height:1.5">
          Couldn't auto-detect columns.<br>
          Found headers: <code>${esc(headerRaw.join(', '))}</code><br>
          Need one column for account # (e.g. <code>account_id</code>, <code>client_id</code>, <code>acct</code>) and one for <code>email</code>.
        </div>`;
        return;
      }

      // Parse data rows
      const rows = [];
      for(let i=1; i<lines.length; i++){
        const cells = parseCSVLine(lines[i]);
        const acct = (cells[acctIdx]||'').trim();
        const email = (cells[emailIdx]||'').trim();
        if(!acct || !email) continue;
        rows.push({acct, email});
      }

      if(!rows.length){ preview.innerHTML = '<div class="empty-state">No valid rows found in CSV</div>'; return; }

      // Match against existing clients
      const matches = [], unknowns = [], unchanged = [];
      for(const r of rows){
        const c = clients.find(x=>x.client_id===r.acct);
        if(!c){ unknowns.push(r); continue; }
        if((c.email||'').trim() === r.email){ unchanged.push(r); continue; }
        matches.push({acct:r.acct, email:r.email, oldEmail:c.email||'', name:c.client_name||''});
      }

      _emailUploadParsed = matches;

      let html = `<div style="margin-top:14px;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--radius-sm);padding:12px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <div style="font-size:13px;font-weight:600;color:var(--navy);">Preview — ${rows.length} rows in CSV</div>
          <div style="display:flex;gap:6px;">
            <span class="day-pill" style="background:var(--ok-bg);color:var(--ok-text);">${matches.length} to update</span>
            ${unchanged.length?`<span class="day-pill" style="background:var(--gray-100);color:var(--gray-500);">${unchanged.length} unchanged</span>`:''}
            ${unknowns.length?`<span class="day-pill" style="background:var(--err-bg);color:var(--err-text);">${unknowns.length} unknown acct</span>`:''}
          </div>
        </div>
        <div style="font-size:11px;color:var(--gray-500);margin-bottom:8px;">
          Detected columns: <strong>${esc(headerRaw[acctIdx])}</strong> (account) + <strong>${esc(headerRaw[emailIdx])}</strong> (email)
        </div>`;

      if(matches.length){
        html += `<div style="max-height:240px;overflow-y:auto;border:1px solid var(--gray-200);border-radius:var(--radius-sm);background:white;margin-bottom:8px;">
          <table class="report-table" style="width:100%;font-size:12px;"><thead><tr>
            <th>Acct</th><th>Name</th><th>Old Email</th><th>New Email</th>
          </tr></thead><tbody>
          ${matches.slice(0,200).map(m=>`<tr>
            <td class="rt-id">${esc(m.acct)}</td>
            <td>${esc(m.name||'—')}</td>
            <td style="color:var(--gray-400);">${esc(m.oldEmail||'(none)')}</td>
            <td style="color:var(--ok-text);font-weight:600;">${esc(m.email)}</td>
          </tr>`).join('')}
          ${matches.length>200?`<tr><td colspan="4" style="text-align:center;color:var(--gray-400);font-size:11px;padding:8px;">…${matches.length-200} more rows hidden in preview</td></tr>`:''}
          </tbody></table>
        </div>`;
      }

      if(unknowns.length){
        html += `<details style="margin-bottom:8px;"><summary style="cursor:pointer;font-size:12px;color:var(--err-text);font-weight:600;">${unknowns.length} accounts not found in HELM (will be skipped)</summary>
          <div style="font-size:11px;color:var(--gray-500);padding:8px 0;font-family:'DM Mono',monospace;">${unknowns.slice(0,50).map(u=>esc(u.acct)).join(', ')}${unknowns.length>50?` …+${unknowns.length-50} more`:''}</div>
        </details>`;
      }

      html += `<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
        <button class="btn-add" style="background:var(--gray-400)" onclick="document.getElementById('emailUploadPreview').innerHTML='';_emailUploadParsed=null;document.getElementById('emailUploadFile').value='';">Cancel</button>
        <button class="btn-add" onclick="confirmEmailUpload()" ${matches.length?'':'disabled style="opacity:0.4;cursor:not-allowed;"'}>Update ${matches.length} email${matches.length===1?'':'s'}</button>
      </div></div>`;

      preview.innerHTML = html;
    }catch(err){
      preview.innerHTML = '<div class="empty-state" style="color:var(--err-text)">Error parsing CSV: '+esc(err.message)+'</div>';
    }
  };
  reader.readAsText(file);
}

async function confirmEmailUpload(){
  if(!_emailUploadParsed || !_emailUploadParsed.length){ toast('Nothing to update'); return; }
  const preview = document.getElementById('emailUploadPreview');
  const list = _emailUploadParsed;
  preview.innerHTML = '<div class="loading">Updating '+list.length+' clients…</div>';

  let ok=0, fail=0, errors=[];
  // Sequential updates so we can track per-row failures cleanly
  for(const m of list){
    const {error} = await db.from('clients').update({email: m.email}).eq('client_id', m.acct);
    if(error){ fail++; errors.push(m.acct+': '+error.message); }
    else {
      ok++;
      // Update local cache
      const c = clients.find(x=>x.client_id===m.acct);
      if(c) c.email = m.email;
    }
    if((ok+fail) % 25 === 0){
      preview.innerHTML = '<div class="loading">Updated '+(ok+fail)+' / '+list.length+'…</div>';
    }
  }

  preview.innerHTML = `<div style="margin-top:14px;background:var(--ok-bg);border:1px solid var(--ok-text);border-radius:var(--radius-sm);padding:12px;color:var(--ok-text);">
    <div style="font-size:14px;font-weight:600;margin-bottom:4px;">\u2713 Updated ${ok} email${ok===1?'':'s'}</div>
    ${fail?`<div style="font-size:12px;color:var(--err-text);margin-top:6px;">${fail} failed:<br><code style="font-size:10px;">${esc(errors.slice(0,10).join('; '))}${errors.length>10?` (+${errors.length-10} more)`:''}</code></div>`:''}
    <div style="font-size:11px;margin-top:8px;color:var(--gray-600);">Refresh the Client Lookup tab to see updated cards.</div>
  </div>`;
  _emailUploadParsed = null;
  document.getElementById('emailUploadFile').value = '';
  logActivity('emails_bulk_updated', ok+' updated');
}

// Track whether first add has happened in this session per company
// First add gets +50 buffer, subsequent adds get +1
let _firstAddReis = true, _firstAddSantos = true;

function nextIdForCompany(company){
  // Match any 6-digit ID whose first digit matches the company
  // REIS = first digit 2 (20xxxx, 21xxxx, ...)
  // SANTOS = first digit 3 (30xxxx, 31xxxx, ...)
  const firstDigit = company==='santos' ? '3' : '2';
  const matching = clients.map(c=>c.client_id||'').filter(id=>id.length>=6 && id[0]===firstDigit);
  // Baseline: 200000 for REIS, 300000 for SANTOS
  let maxId = parseInt(firstDigit+'00000', 10);
  for(const id of matching){
    const n = parseInt(id, 10);
    if(!isNaN(n) && n > maxId) maxId = n;
  }
  // First add gets +50 safety buffer (+1 for increment = +51)
  const isFirst = (company==='santos' ? _firstAddSantos : _firstAddReis);
  const bump = isFirst ? 51 : 1;
  let next = maxId + bump;
  // Ensure uniqueness: if by some chance the computed ID is already in use, bump until free
  const existing = new Set(clients.map(c=>c.client_id));
  while(existing.has(String(next))) next++;
  return String(next);
}

  renderAdd(); // re-render to enable/populate the form
}

function markCompanyFirstAddDone(company){
  if(company==='santos') _firstAddSantos = false;
  else _firstAddReis = false;
}

function toggleDay(btn){ btn.classList.toggle('day-toggle-active'); }

async function addClient(){
  const id=document.getElementById('nId').value.trim();
  const name=document.getElementById('nName').value.trim();
  const addr=document.getElementById('nAddr').value.trim();
  const phone=document.getElementById('nPhone').value.trim();
  const email=document.getElementById('nEmail').value.trim();
  const selectedDays=[...document.querySelectorAll('.day-toggle-active')].map(b=>b.dataset.day);
  if(!id||!addr){toast('Account # and address are required');return;}
  if(!selectedDays.length){toast('Select at least one pickup day');return;}

  const addrLower=addr.toLowerCase().trim();
  const nameLower=name.toLowerCase().trim();
  const dupes=clients.filter(c=>{
    const sameAddr=c.address.toLowerCase().trim()===addrLower;
    const sameName=nameLower&&c.client_name&&c.client_name.toLowerCase().trim()===nameLower;
    return sameAddr||sameName;
  });

  if(dupes.length){
    pendingClient={id,selectedDays,addr,phone,email,name};
    const dupeList=dupes.map(c=>`${esc(c.client_name||'')}${c.client_name?' �� ':''}${esc(c.client_id)} (${esc(c.service_day)})`).join(', ');
    const msg=document.getElementById('addMsg');
    msg.style.color='var(--warn-text)';
    msg.innerHTML=`
      <div style="background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:var(--radius-sm);padding:8px 10px;margin-bottom:8px">
        <strong>Possible duplicate</strong><br/>
        <span style="font-size:12px">${dupeList}</span>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn-add" style="flex:1;background:var(--gray-400)" onclick="renderAdd()">Cancel</button>
        <button class="btn-add" style="flex:2" onclick="confirmAddClient()">Add Anyway</button>
      </div>`;
    return;
  }

  await saveClient(id,selectedDays,addr,phone,email,name);
}

async function confirmAddClient(){
  if(!pendingClient) return;
  const {id,selectedDays,addr,phone,email,name}=pendingClient;
  pendingClient=null;
  await saveClient(id,selectedDays,addr,phone,email,name);
}

async function saveClient(id,selectedDays,addr,phone,email,name){
  const msg=document.getElementById('addMsg');
  if(msg){msg.style.color='var(--gray-400)';msg.textContent='Saving…';}
  const record={
    client_id: id,
    service_day: selectedDays.join(','),
    address: addr,
    phone: phone||null,
    email: email||null,
    client_name: name||null,
  };
  const {error}=await db.from('clients').insert(record);
  if(error){
    // Handle duplicate key violation specifically
    if(error.code==='23505'||(error.message||'').toLowerCase().includes('duplicate')){
      toast('Account # '+id+' already exists — try again');
      if(msg){msg.style.color='var(--err-text)';msg.textContent='Account # already exists. The next available ID will be suggested.';}
      // Reload to get fresh client list and re-render (will compute a new next ID)
      await loadClients();
      setTimeout(()=>renderAdd(), 1200);
      return;
    }
    toast('Error: '+error.message);if(msg)msg.textContent='';return;
  }
  await loadClients();
  // Mark that first-add has happened for this company (so next add increments by 1, not 51)
  const co=getCompany(id);
  if(co.name==='SANTOS') markCompanyFirstAddDone('santos');
  else if(co.name==='REIS') markCompanyFirstAddDone('reis');
  if(msg){msg.style.color='var(--ok-text)';msg.textContent=`Client ${id} added — ${selectedDays.join(', ')}`;}
  toast(`Client ${id} added`,true);
  setTimeout(()=>{window._addCompany=null;renderAdd();}, 1800);
}

async function loadRolloffs(){

}

function renderRolloffTable(){

  if(banner){
    const today = new Date();
    const anyTipped = rolloffsData.some(r => r.monthly_tip && !r.deleted);
    let isResetDay = false;
    if(ROLLOFF_TIP_RESET_DAY === 'last'){
      const tomorrow = new Date(today); tomorrow.setDate(today.getDate()+1);
      isResetDay = tomorrow.getDate() === 1; // today is last day of month
    } else if(typeof ROLLOFF_TIP_RESET_DAY === 'number'){
      isResetDay = today.getDate() >= ROLLOFF_TIP_RESET_DAY;
    }
    const showBanner = isResetDay && anyTipped;
    if(showBanner){
      const tippedCount = rolloffsData.filter(r => r.monthly_tip && !r.deleted).length;
      banner.style.display = 'flex';
      banner.style.cssText = 'display:flex;align-items:center;justify-content:space-between;gap:12px;background:linear-gradient(90deg,#fef3cd 0%,#ffe08a 100%);border:1px solid #ffc107;color:#856404;padding:10px 14px;margin-bottom:10px;border-radius:6px;font-weight:700;font-size:13px;letter-spacing:0.5px;';
      banner.innerHTML = `<span>\u26A0 RESET MONTHLY RENTAL FEES \u2014 ${tippedCount} roll-off(s) still marked as tipped this month</span>
        <button class="btn-add" style="background:#856404;color:#fff3cd;font-size:11px;" onclick="resetMonthlyTips()">Reset Now</button>`;
    } else {
      banner.style.display = 'none';
    }
  }

  const wrap=document.getElementById('rolloffTable');
  if(!rolloffsData.length){
    wrap.innerHTML='<div class="empty-state">No roll-offs yet. Click "+ Add Row" to start.</div>';
    return;
  }
  const q=rolloffSearch.trim().toLowerCase();
  const filtered=q?rolloffsData.filter(r=>{
    return [r.customer,r.address_number,r.street,r.type,r.notes,r.date]
      .filter(Boolean).some(v=>v.toLowerCase().includes(q));
  }):rolloffsData;
  if(q&&!filtered.length){
    wrap.innerHTML=`<div class="empty-state">No roll-offs matching "${esc(rolloffSearch.trim())}"</div>`;
    return;
  }
  const cols=[
    {key:'date',label:'Date',width:'100px'},
    {key:'type',label:'Type',width:'70px'},
    {key:'customer',label:'Customer',width:'auto'},
    {key:'address_number',label:'Number',width:'80px'},
    {key:'street',label:'Street',width:'auto'},
    {key:'monthly_tip',label:'Monthly Tip',width:'90px'},
    {key:'notes',label:'Notes',width:'120px'}
  ];
  // Build datalist of unique customer names from past roll-offs (for autosuggest)
  const customerSet = new Set();
  for(const r of rolloffsData){
    const name = (r.customer||'').trim();
    if(name) customerSet.add(name);
  }
  const customerList = [...customerSet].sort((a,b)=>a.localeCompare(b, undefined, {sensitivity:'base'}));
  const datalistHtml = `<datalist id="rolloffCustomers">${customerList.map(n=>`<option value="${esc(n)}"></option>`).join('')}</datalist>`;

  // Same idea for street name reuse
  const streetSet = new Set();
  for(const r of rolloffsData){
    const s = (r.street||'').trim();
    if(s) streetSet.add(s);
  }
  const streetList = [...streetSet].sort((a,b)=>a.localeCompare(b, undefined, {sensitivity:'base'}));
  const streetDatalist = `<datalist id="rolloffStreets">${streetList.map(s=>`<option value="${esc(s)}"></option>`).join('')}</datalist>`;

  const sortIcon=(col)=>rolloffSort.col===col?(rolloffSort.asc?'&#9650;':'&#9660;'):'';
  let html=datalistHtml+streetDatalist+`<table class="ro-table"><thead><tr>`;
  cols.forEach(c=>{
    html+=`<th style="width:${c.width};cursor:pointer;user-select:none" onclick="sortRolloffs('${c.key}')">${c.label} <span style="font-size:9px">${sortIcon(c.key)}</span></th>`;
  });
  html+=`<th style="width:36px"></th></tr></thead><tbody>`;
  filtered.forEach(r=>{
    const deleted=r.deleted;
    const rowStyle=deleted?'opacity:0.4;text-decoration:line-through;':'';
    html+=`<tr style="${rowStyle}" data-roid="${r.id}">`;
    // Date cell
    html+=`<td><input type="date" class="ro-input" value="${r.date||''}" onchange="updateRolloff(${r.id},'date',this.value)" ${deleted?'disabled':''}/></td>`;
    // Type cell - dropdown
    const roTypes=['AJ','REIS','AJ/REIS','30YD','40YD','30/40YD','SANTOS BOX'];
    html+=`<td><select class="ro-input" onchange="updateRolloff(${r.id},'type',this.value)" ${deleted?'disabled':''}>
      <option value=""${!r.type?' selected':''}></option>
      ${roTypes.map(t=>`<option value="${t}"${r.type===t?' selected':''}>${t}</option>`).join('')}
    </select></td>`;
    // Customer cell — datalist gives autosuggest from past roll-off customers
    html+=`<td><input type="text" class="ro-input" list="rolloffCustomers" value="${esc(r.customer||'')}" onchange="updateRolloff(${r.id},'customer',this.value)" onkeydown="roKeyNav(event,${r.id},'customer')" ${deleted?'disabled':''}/></td>`;
    // Number cell
    html+=`<td><input type="text" class="ro-input" value="${esc(r.address_number||'')}" onchange="updateRolloff(${r.id},'address_number',this.value)" onkeydown="roKeyNav(event,${r.id},'address_number')" ${deleted?'disabled':''}/></td>`;
    // Street cell — datalist with previously-used street names
    html+=`<td><input type="text" class="ro-input" list="rolloffStreets" value="${esc(r.street||'')}" onchange="updateRolloff(${r.id},'street',this.value)" onkeydown="roKeyNav(event,${r.id},'street')" ${deleted?'disabled':''}/></td>`;
    // Monthly Tip cell — checkbox + Yes/No label
    const tipped = !!r.monthly_tip;
    html+=`<td style="text-align:center;"><button class="ro-tip-btn ${tipped?'tipped':''}" onclick="toggleRolloffTip(${r.id})" ${deleted?'disabled':''} title="Click to toggle">${tipped?'Yes':'No'}</button></td>`;
    // Notes cell
    html+=`<td><input type="text" class="ro-input" value="${esc(r.notes||'')}" onchange="updateRolloff(${r.id},'notes',this.value)" onkeydown="roKeyNav(event,${r.id},'notes')" ${deleted?'disabled':''}/></td>`;
    // Delete/restore button
    if(deleted){
      html+=`<td><button class="ro-del" title="Restore" onclick="restoreRolloff(${r.id})">&#8634;</button></td>`;
    } else {
      html+=`<td><button class="ro-del" title="Delete" onclick="softDeleteRolloff(${r.id})">&#128465;</button></td>`;
    }
    html+=`</tr>`;
  });
  html+=`</tbody></table>`;
  const countLabel=q?`<div style="font-size:11px;color:var(--gray-400);margin-top:4px">${filtered.length} of ${rolloffsData.length} roll-offs shown</div>`:'';
  wrap.innerHTML=html+countLabel;
}

function sortRolloffs(col){
  if(rolloffSort.col===col) rolloffSort.asc=!rolloffSort.asc;
  else { rolloffSort.col=col; rolloffSort.asc=true; }
  loadRolloffs();
}

async function addRolloffRow(){
  // Flush any pending onchange edits before re-rendering
  if(document.activeElement && document.activeElement !== document.body) document.activeElement.blur();
  await new Promise(r=>setTimeout(r,60));
  const today=new Date().toISOString().split('T')[0];
  const {data,error}=await db.from('rolloffs').insert({date:today,type:null,customer:'',address_number:'',street:'',deleted:false}).select();
  if(error){toast('Error: '+error.message);return;}
  const newId=data&&data[0]?data[0].id:null;
  await loadRolloffs();
  // Focus the new row's customer field by ID
  if(newId){
    setTimeout(()=>{
      const row=document.querySelector(`tr[data-roid="${newId}"]`);
      if(row){
        const inp=row.querySelector('input[type="text"]');
        if(inp) inp.focus();
      }
    },100);
  }
}

async function updateRolloff(id,col,val){
  const update={[col]:val||null,updated_at:new Date().toISOString()};
  const {error}=await db.from('rolloffs').update(update).eq('id',id);
  if(error) toast('Save error: '+error.message);
  else logActivity('rolloff_edit','id:'+id+' '+col+'='+val);
}

async function softDeleteRolloff(id){
  const row=rolloffsData.find(r=>r.id===id);
  const {error}=await db.from('rolloffs').update({deleted:true,deleted_at:new Date().toISOString(),deleted_by:currentUser?currentUser.display_name:''}).eq('id',id);
  if(error){toast('Error: '+error.message);return;}
  // Show undo
  rolloffUndo={id,timeout:null};
  const undoEl=document.getElementById('rolloffUndo');
  undoEl.style.display='flex';
  undoEl.innerHTML=`<span>Row deleted (${esc(row?row.customer||'':'')})</span><button class="btn-add" style="padding:2px 10px;font-size:11px" onclick="restoreRolloff(${id})">Undo</button>`;
  clearTimeout(rolloffUndo.timeout);
  rolloffUndo.timeout=setTimeout(()=>{undoEl.style.display='none';rolloffUndo=null;},8000);
  await loadRolloffs();
}

async function restoreRolloff(id){
  const {error}=await db.from('rolloffs').update({deleted:false,deleted_at:null,deleted_by:null}).eq('id',id);
  if(error){toast('Error: '+error.message);return;}
  const undoEl=document.getElementById('rolloffUndo');
  if(undoEl) undoEl.style.display='none';
  rolloffUndo=null;
  toast('Row restored',true);
  await loadRolloffs();
}

function roKeyNav(event,id,col){
  if(event.key==='Tab'||event.key==='Enter'){
    event.target.blur(); // trigger onchange save
  }
}

async function toggleRolloffTip(id){
  const row = rolloffsData.find(r=>r.id===id);
  if(!row) return;
  const newVal = !row.monthly_tip;
  const {error} = await db.from('rolloffs').update({monthly_tip: newVal, updated_at: new Date().toISOString()}).eq('id', id);
  if(error){toast('Save error: '+error.message);return;}
  row.monthly_tip = newVal;
  renderRolloffTable();
  logActivity('rolloff_tip','id:'+id+' monthly_tip='+newVal);
}

async function resetMonthlyTips(){
  const tippedCount = rolloffsData.filter(r => r.monthly_tip && !r.deleted).length;
  if(tippedCount === 0){ toast('No Monthly Tip flags set \u2014 nothing to reset'); return; }
  if(!confirm('Reset Monthly Tip to No for all '+tippedCount+' tipped roll-off(s)? This cannot be undone.')) return;
  const {error} = await db.from('rolloffs').update({monthly_tip: false, updated_at: new Date().toISOString()}).eq('monthly_tip', true);
  if(error){toast('Reset failed: '+error.message); return;}
  toast(tippedCount+' Monthly Tip flag(s) cleared', true);
  logActivity('rolloff_tip_reset','count:'+tippedCount);
  await loadRolloffs();
}

</x:WorksheetOptions>
</x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]-->
<style>table{border-collapse:collapse;} td, th{mso-number-format:"\\@";}</style>
</head><body>
<table border="1" cellspacing="0" cellpadding="0" style="border-collapse:collapse;font-family:'Times New Roman',serif;">

function exportUntippedRolloffs(){
  const untipped = rolloffsData.filter(r => !r.monthly_tip && !r.deleted);
  if(!untipped.length){ toast('No untipped roll-offs to export'); return; }

  const today = new Date();
  const isoDate = today.toISOString().split('T')[0];
  const fmt = d => d ? new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'numeric',day:'numeric',year:'numeric'}) : '';

  // Columns: A=Date  B=Type  C=Customer  D=Number  E=Street  F=Notes  G=Days  H=Charge
  // 'Days' is blank for the CSR to fill in. 'Charge' is a formula = G * 4.
  let rows = '';
  untipped.forEach((r, i) => {
    const rowNum = i + 2; // header sits on row 1
    rows += `<tr>
      <td>${fmt(r.date)}</td>
      <td>${esc(r.type||'')}</td>
      <td>${esc(r.customer||'')}</td>
      <td>${esc(r.address_number||'')}</td>
      <td>${esc(r.street||'')}</td>
      <td>${esc(r.notes||'')}</td>
      <td style="text-align:right;"></td>
      <td style="text-align:right;" x:fmla="=G${rowNum}*4">=G${rowNum}*4</td>
    </tr>`;
  });

  const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="UTF-8"><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet><x:Name>Untipped Rolloffs</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]--></head><body>
    <h2>Untipped Roll-offs as of ${fmt(isoDate)}</h2>
    <table border="1" cellpadding="4" cellspacing="0" style="border-collapse:collapse;font-family:Arial,sans-serif;font-size:11px;">
      <thead style="background:#0f1f3d;color:white;"><tr>
        <th>Date Placed</th><th>Type</th><th>Customer</th><th>Number</th><th>Street</th><th>Notes</th><th>Days</th><th>Charge (=Days &times; 4)</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <p style="font-size:10px;color:#666;margin-top:10px;">Total rows: ${untipped.length}. Fill in the <strong>Days</strong> column for each row \u2014 the <strong>Charge</strong> column auto-multiplies by 4.</p>
  </body></html>`;

  const blob = new Blob(['\ufeff', html], {type:'application/vnd.ms-excel'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'Untipped_Rolloffs_'+isoDate+'.xls';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
  toast(untipped.length+' untipped roll-offs exported', true);
}
