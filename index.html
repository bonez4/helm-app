<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HELM — Reis Trucking</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
<style>
:root {
  --navy:       #0f1f3d;
  --navy-mid:   #1a2f52;
  --navy-light: #243a63;
  --teal:       #1a9b8a;
  --teal-dim:   #147a6d;
  --teal-pale:  #e6f5f3;
  --gold:       #d4a843;
  --gold-pale:  #fdf6e3;
  --white:      #ffffff;
  --gray-50:    #f7f8fa;
  --gray-100:   #eef0f4;
  --gray-200:   #dde1ea;
  --gray-300:   #c8cdd8;
  --gray-400:   #9aa3b5;
  --gray-500:   #6b7385;
  --gray-600:   #4a5168;
  --gray-800:   #1e2435;
  --warn-bg:    #fff8e6;
  --warn-text:  #8a6200;
  --warn-border:#f0c040;
  --ok-bg:      #e8f5f0;
  --ok-text:    #156b4f;
  --err-bg:     #fdecea;
  --err-text:   #b92b2b;
  --radius:     10px;
  --radius-sm:  6px;
  --radius-lg:  14px;
  --shadow:     0 1px 3px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:  0 4px 16px rgba(0,0,0,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--gray-50);color:var(--gray-800);min-height:100vh;font-size:13px;-webkit-font-smoothing:antialiased;}

/* ── LOGIN ───────────────────────────────── */
#loginScreen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--navy);
  background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,255,255,0.03) 39px,rgba(255,255,255,0.03) 40px),
                   repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(255,255,255,0.03) 39px,rgba(255,255,255,0.03) 40px);
}
.login-box{
  background:white;border-radius:var(--radius-lg);
  padding:2.75rem 2.25rem;width:100%;max-width:380px;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
}
.login-brand{display:flex;align-items:center;gap:12px;margin-bottom:2rem;}
.login-icon{
  width:52px;height:52px;border-radius:12px;
  background:var(--navy);display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.login-icon svg{width:26px;height:26px;}
.login-brand-text{}
.helm-title{font-size:26px;font-weight:600;color:var(--navy);letter-spacing:-.02em;line-height:1;}
.helm-sub{font-size:12px;color:var(--gray-400);margin-top:3px;letter-spacing:.04em;text-transform:uppercase;}
.login-box label{display:block;font-size:12px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.login-box input[type=text],.login-box input[type=password]{
  width:100%;padding:11px 14px;
  border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;font-size:15px;color:var(--gray-800);
  background:var(--gray-50);margin-bottom:14px;outline:none;transition:border-color .15s,background .15s;
}
.login-box input[type=text]:focus,.login-box input[type=password]:focus{border-color:var(--teal);background:white;}
.btn-signin{
  width:100%;padding:12px;background:var(--navy);color:white;
  border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;
  font-size:15px;font-weight:600;cursor:pointer;transition:background .15s;letter-spacing:.01em;
}
.btn-signin:hover{background:var(--navy-light);}
.login-err{color:var(--err-text);font-size:13px;margin-top:10px;text-align:center;}
.login-footer{margin-top:1.75rem;padding-top:1.25rem;border-top:1px solid var(--gray-100);text-align:center;font-size:12px;color:var(--gray-400);}

/* ── APP SHELL ───────────────────────────── */
#appScreen{display:none;min-height:100vh;flex-direction:column;}

.topbar{
  background:var(--navy);height:44px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1rem;position:sticky;top:0;z-index:100;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-icon{width:28px;height:28px;border-radius:6px;background:var(--navy-light);display:flex;align-items:center;justify-content:center;}
.topbar-icon svg{width:15px;height:15px;}
.topbar-name{font-size:15px;font-weight:600;color:white;letter-spacing:-.01em;}
.topbar-company{font-size:10px;color:rgba(255,255,255,0.4);margin-top:1px;letter-spacing:.03em;text-transform:uppercase;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:#2dc653;box-shadow:0 0 0 2px rgba(45,198,83,0.25);}
.live-label{font-size:11px;color:rgba(255,255,255,0.45);}
.btn-logout{
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.6);font-size:12px;padding:4px 10px;
  border-radius:var(--radius-sm);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;
}
.btn-logout:hover{background:rgba(255,255,255,0.15);color:white;}

/* ── STICKY NOTES ───────────────────────────────────────── */
.btn-sticky{
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);
  color:rgba(255,255,255,0.38);font-size:11px;padding:4px 10px;margin-left:22px;
  border-radius:var(--radius-sm);cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all .15s;letter-spacing:.02em;
}
.btn-sticky:hover{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.65);}
.btn-sticky.s-open{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);}
.sticky-panel{
  position:fixed;top:50px;width:400px;
  background:#1b2233;border:1px solid rgba(255,255,255,0.11);
  border-radius:8px;box-shadow:0 10px 36px rgba(0,0,0,0.45);
  z-index:9999;display:none;overflow:hidden;
}
.sticky-panel.s-open{display:block;}
.sticky-drag-handle{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 10px 5px;border-bottom:1px solid rgba(255,255,255,0.07);
  cursor:grab;user-select:none;
}
.sticky-drag-handle:active{cursor:grabbing;}
.sticky-drag-title{
  font-size:10px;font-weight:600;color:rgba(255,255,255,0.35);
  letter-spacing:.07em;text-transform:uppercase;
}
.sticky-drag-dots{
  font-size:13px;color:rgba(255,255,255,0.18);letter-spacing:1px;line-height:1;
}
.sticky-close{
  background:none;border:none;color:rgba(255,255,255,0.25);
  font-size:16px;cursor:pointer;padding:0 2px;line-height:1;
  font-family:'DM Sans',sans-serif;
}
.sticky-close:hover{color:rgba(255,255,255,0.6);}
.sticky-sec-hdr{
  padding:4px 10px 3px;border-bottom:1px solid rgba(255,255,255,0.07);
  font-size:9px;font-weight:600;color:rgba(255,255,255,0.3);
  letter-spacing:.07em;text-transform:uppercase;
}
.sticky-compose{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,0.07);}
.sticky-compose input,.sticky-compose textarea{
  width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);
  color:rgba(255,255,255,0.85);font-family:'DM Sans',sans-serif;font-size:12px;
  padding:5px 8px;border-radius:4px;box-sizing:border-box;outline:none;
}
.sticky-compose input{margin-bottom:5px;}
.sticky-compose input::placeholder,.sticky-compose textarea::placeholder{color:rgba(255,255,255,0.25);}
.sticky-compose textarea{resize:vertical;min-height:160px;line-height:1.5;}
.sticky-compose input:focus,.sticky-compose textarea:focus{border-color:rgba(255,255,255,0.22);}
.sticky-actions{display:flex;gap:6px;margin-top:6px;justify-content:flex-end;}
.s-btn-cancel{
  background:none;border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.35);
  font-size:11px;padding:3px 10px;border-radius:4px;cursor:pointer;font-family:'DM Sans',sans-serif;
}
.s-btn-cancel:hover{color:rgba(255,255,255,0.6);}
.s-btn-save{
  background:var(--teal);border:none;color:white;font-size:11px;
  padding:3px 13px;border-radius:4px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;
}
.s-btn-save:hover{filter:brightness(1.1);}
.sticky-list{max-height:220px;overflow-y:auto;}
.sticky-list::-webkit-scrollbar{width:4px;}
.sticky-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}
.sticky-item{
  padding:9px 32px 9px 12px;border-bottom:1px solid rgba(255,255,255,0.05);
  cursor:pointer;transition:background .1s;position:relative;
}
.sticky-item:hover{background:rgba(255,255,255,0.04);}
.sticky-item.s-expanded{background:rgba(255,255,255,0.05);}
.sticky-item-title{font-size:12px;font-weight:600;color:rgba(255,255,255,0.75);margin-bottom:2px;}
.sticky-item-preview{font-size:11px;color:rgba(255,255,255,0.3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sticky-item-full{font-size:12px;color:rgba(255,255,255,0.55);margin-top:5px;white-space:pre-wrap;word-break:break-word;line-height:1.5;}
.sticky-item-date{font-size:10px;color:rgba(255,255,255,0.2);margin-top:4px;}
.sticky-del{
  position:absolute;right:8px;top:9px;background:none;border:none;
  color:rgba(255,255,255,0.2);cursor:pointer;font-size:15px;padding:0 3px;line-height:1;
}
.sticky-del:hover{color:rgba(255,100,100,0.65);}
.sticky-edit-btn{
  position:absolute;right:28px;top:9px;background:none;border:none;
  color:rgba(255,255,255,0.18);cursor:pointer;font-size:12px;padding:0 3px;line-height:1;
}
.sticky-edit-btn:hover{color:rgba(255,255,255,0.5);}
.sticky-edit-form input,.sticky-edit-form textarea{
  width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);
  color:rgba(255,255,255,0.85);font-family:'DM Sans',sans-serif;font-size:12px;
  padding:5px 8px;border-radius:4px;box-sizing:border-box;outline:none;margin-bottom:5px;
}
.sticky-edit-form textarea{resize:vertical;min-height:80px;line-height:1.45;}
.sticky-edit-form input:focus,.sticky-edit-form textarea:focus{border-color:rgba(255,255,255,0.22);}
.sticky-empty{padding:22px;text-align:center;color:rgba(255,255,255,0.2);font-size:12px;}

.tab-nav{
  background:white;border-bottom:1px solid var(--gray-200);
  display:flex;padding:0 1rem;gap:0;overflow-x:auto;
}
.tab-nav::-webkit-scrollbar{display:none;}
.tab-nav button{
  background:none;border:none;font-family:'DM Sans',sans-serif;
  font-size:12px;font-weight:500;color:var(--gray-400);
  padding:9px 12px;cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  white-space:nowrap;transition:color .15s,border-color .15s;letter-spacing:.01em;
}
.tab-nav button.active{color:var(--navy);border-bottom-color:var(--teal);font-weight:600;}
.tab-nav button:hover:not(.active){color:var(--gray-600);}

.main{padding:0.75rem;max-width:1060px;margin:0 auto;width:100%;}

/* ── SEARCH ─────────────────────────────── */
.search-wrap{position:relative;margin-bottom:0.75rem;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--gray-400);pointer-events:none;}
.search-wrap input{
  width:100%;padding:9px 12px 9px 36px;
  border:1.5px solid var(--gray-200);border-radius:var(--radius);
  font-family:'DM Sans',sans-serif;font-size:13px;color:var(--gray-800);
  background:white;box-shadow:var(--shadow);outline:none;transition:border-color .15s,box-shadow .15s;
}
.search-wrap input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(26,155,138,0.1);}
.search-wrap input::placeholder{color:var(--gray-300);}
.search-hint{font-size:11px;color:var(--gray-400);margin-top:4px;margin-left:2px;}

/* ── RESULTS LIST ────────────────────────── */
.results-list{margin-bottom:0.75rem;}
.result-item{
  background:white;border:1px solid var(--gray-200);border-radius:var(--radius-sm);
  padding:8px 12px;margin-bottom:4px;cursor:pointer;
  display:flex;justify-content:space-between;align-items:center;
  box-shadow:var(--shadow);transition:border-color .15s,transform .1s,box-shadow .15s;
}
.result-item:hover,.result-item:focus{border-color:var(--teal);transform:translateY(-1px);box-shadow:var(--shadow-md);outline:none;}
.result-id{font-family:'DM Mono',monospace;font-size:11px;color:var(--gray-400);margin-bottom:2px;}
.result-addr{font-size:13px;font-weight:500;color:var(--gray-800);}
.result-day{font-size:11px;font-weight:600;color:var(--teal);background:var(--teal-pale);padding:2px 7px;border-radius:20px;}

/* ── CLIENT CARD ─────────────────────────── */
.client-card{background:white;border:1px solid var(--gray-200);border-radius:var(--radius);box-shadow:var(--shadow-md);overflow:hidden;}
.card-header{background:var(--navy);padding:0.75rem 1rem;display:flex;align-items:center;gap:10px;}
.avatar{
  width:36px;height:36px;border-radius:8px;
  background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.15);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;color:white;flex-shrink:0;letter-spacing:.02em;
}
.card-header-meta h2{font-size:14px;font-weight:600;color:white;letter-spacing:-.01em;}
.card-header-meta p{font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px;}
.card-body{padding:0.75rem 1rem;}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:0.75rem;}
.info-tile{background:var(--gray-50);border:1px solid var(--gray-100);border-radius:var(--radius-sm);padding:6px 10px;}
.info-tile label{font-size:9px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:3px;}
.day-pill{display:inline-block;background:var(--teal-pale);color:var(--teal-dim);font-size:12px;font-weight:600;padding:2px 8px;border-radius:20px;}
.status-pill{display:inline-block;font-size:12px;font-weight:600;padding:2px 8px;border-radius:20px;}
.s-active{background:var(--ok-bg);color:var(--ok-text);}
.s-skipped{background:var(--warn-bg);color:var(--warn-text);}
.s-paused{background:var(--err-bg);color:var(--err-text);}
.autopay-yes{background:var(--ok-bg);color:var(--ok-text);}
.autopay-no{background:var(--gray-100);color:var(--gray-400);}

.section-title{font-size:10px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.08em;margin-bottom:0.5rem;}
.divider{border:none;border-top:1px solid var(--gray-100);margin:0.5rem 0;}

/* ── ADD CLIENT ──────────────────────────── */
.form-card{background:white;border:1px solid var(--gray-200);border-radius:var(--radius);padding:1rem;box-shadow:var(--shadow);}
.form-card h2{font-size:15px;font-weight:600;color:var(--navy);margin-bottom:1rem;}
.form-group{margin-bottom:0.75rem;}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--gray-500);letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px;}
.form-group input,.form-group select{
  width:100%;padding:7px 10px;
  border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;font-size:13px;color:var(--gray-800);
  background:var(--gray-50);outline:none;transition:border-color .15s,background .15s;
}
.form-group input:focus,.form-group select:focus{border-color:var(--teal);background:white;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-add{
  background:var(--teal);color:white;border:none;border-radius:var(--radius-sm);
  padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;transition:background .15s;
}
.btn-add:hover{background:var(--teal-dim);}
.day-toggle-grid{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.day-toggle{
  flex:1;min-width:70px;padding:8px 6px;
  border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);
  background:white;cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:2px;
}
.day-toggle:hover{border-color:var(--teal);background:var(--teal-pale);}
.day-toggle-active{background:var(--teal)!important;border-color:var(--teal)!important;}
.day-toggle-active .day-abbr,.day-toggle-active .day-full{color:white!important;}
.day-abbr{font-size:13px;font-weight:700;color:var(--navy);}
.day-full{font-size:10px;color:var(--gray-400);}

/* ── IMPORT ──────────────────────────────── */
.import-zone{
  border:2px dashed var(--gray-200);border-radius:var(--radius);
  padding:2rem 1.5rem;text-align:center;cursor:pointer;
  transition:border-color .2s,background .2s;background:white;
}
.import-zone:hover{border-color:var(--teal);background:var(--teal-pale);}
.import-zone-icon{width:36px;height:36px;margin:0 auto 0.75rem;color:var(--gray-300);}
.import-zone h3{font-size:14px;font-weight:600;color:var(--gray-600);margin-bottom:4px;}
.import-zone p{font-size:12px;color:var(--gray-400);}
.import-zone span{font-size:11px;color:var(--teal);font-weight:600;margin-top:4px;display:block;}
.import-preview{background:white;border:1px solid var(--gray-200);border-radius:var(--radius-sm);padding:0.75rem;margin-top:0.75rem;box-shadow:var(--shadow);}
.import-preview-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;}
.import-preview h3{font-size:13px;font-weight:600;color:var(--navy);}
.preview-row{font-size:12px;padding:5px 0;border-bottom:1px solid var(--gray-100);display:flex;gap:10px;align-items:center;}
.preview-row:last-child{border-bottom:none;}
.p-id{font-family:'DM Mono',monospace;color:var(--gray-400);font-size:10px;width:40px;flex-shrink:0;}
.p-addr{color:var(--gray-800);flex:1;}
.p-day{color:var(--teal);font-weight:600;font-size:11px;}

/* ── TOAST ───────────────────────────────── */
.toast{
  position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--navy);color:white;padding:8px 18px;
  border-radius:var(--radius-sm);font-size:13px;font-weight:500;
  box-shadow:var(--shadow-md);opacity:0;pointer-events:none;
  transition:opacity .2s,transform .2s;z-index:9999;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{background:var(--teal);}

/* ── MISC ────────────────────────────────── */
.empty-state{text-align:center;padding:2rem 1rem;color:var(--gray-400);font-size:13px;}
.loading{text-align:center;padding:1.5rem;color:var(--gray-400);font-size:13px;}
/* ── FLOATING CLIENT PANEL ───────────────── */
.client-panel{
  position:fixed;right:0;top:44px;width:420px;height:calc(100vh - 44px);
  background:white;border-left:1px solid var(--gray-200);
  box-shadow:-4px 0 20px rgba(0,0,0,0.08);
  z-index:90;overflow-y:auto;display:none;
  transition:transform .2s ease;
}
.client-panel.open{display:block;}
.panel-close{
  position:absolute;top:8px;right:8px;background:none;border:none;
  font-size:18px;color:var(--gray-400);cursor:pointer;z-index:2;
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  border-radius:4px;transition:all .15s;
}
.panel-close:hover{background:var(--gray-100);color:var(--err-text);}

/* ── NOTES ───────────────────────────────── */
.notes-section{margin-top:0.5rem;}
.note-form{display:flex;gap:4px;align-items:end;flex-wrap:wrap;margin-bottom:6px;}
.note-form select{
  padding:5px 6px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;font-size:11px;color:var(--gray-800);
  background:var(--gray-50);outline:none;min-width:120px;
}
.note-form input[type=date]{
  padding:5px 6px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;font-size:11px;color:var(--gray-800);
  background:var(--gray-50);outline:none;width:130px;
}
.note-form input[type=text]{
  flex:1;min-width:120px;padding:5px 6px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;font-size:11px;color:var(--gray-800);
  background:var(--gray-50);outline:none;
}
.note-form select:focus,.note-form input:focus{border-color:var(--teal);background:white;}
.note-form .btn-note-add{
  padding:5px 10px;background:var(--teal);color:white;border:none;border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;
}
.note-form .btn-note-add:hover{background:var(--teal-dim);}
.notes-list-wrap{max-height:220px;overflow-y:auto;border:1px solid var(--gray-100);border-radius:var(--radius-sm);}
.note-row{padding:6px 8px;border-bottom:1px solid var(--gray-100);}
.note-row:last-child{border-bottom:none;}
.note-row:hover{background:var(--gray-50);}
.note-row-header{display:flex;gap:6px;align-items:center;margin-bottom:2px;}
.note-row-header .note-meta{font-family:'DM Sans',sans-serif;font-size:10px;color:var(--gray-400);}
.note-row-header .note-user{font-size:10px;font-weight:600;color:var(--gray-500);}
.note-del{background:none;border:none;color:var(--gray-300);font-size:12px;cursor:pointer;padding:0 2px;margin-left:auto;line-height:1;transition:color .15s;}
.note-del:hover{color:var(--err-text);}
.note-del-confirm{display:flex;align-items:center;gap:4px;margin-left:auto;}
.note-del-confirm span{font-size:10px;color:var(--gray-400);}
.note-del-yes{background:var(--err-text);border:none;color:#fff;font-size:10px;padding:1px 6px;border-radius:3px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;}
.note-del-no{background:none;border:1px solid var(--gray-200);color:var(--gray-400);font-size:10px;padding:1px 6px;border-radius:3px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-edit-sm{background:none;border:1px solid var(--gray-200);color:var(--gray-500);font-size:11px;padding:3px 10px;border-radius:var(--radius-sm);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.btn-edit-sm:hover{border-color:var(--teal);color:var(--teal);}
.note-row-body{font-family:'Courier New',monospace;font-size:12px;color:var(--gray-800);line-height:1.4;word-break:break-word;}
.company-tag{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;text-transform:uppercase;letter-spacing:.04em;margin-left:4px;}
.co-reis{background:#d1fae5;color:#065f46;}
.co-santos{background:#dbeafe;color:#1e40af;}
.action-tag{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;text-transform:uppercase;letter-spacing:.03em;}
.action-tag.at-skip{background:var(--warn-bg);color:var(--warn-text);}
.action-tag.at-1xer{background:#e8f0fe;color:#1a56db;}
.action-tag.at-1xwk{background:#dbeafe;color:#1e40af;}
.action-tag.at-2xwk{background:#c7d2fe;color:#3730a3;}
.action-tag.at-lpu{background:#fef3c7;color:#92400e;}
.action-tag.at-special{background:#fce7f3;color:#9d174d;}
.action-tag.at-misc{background:var(--gray-100);color:var(--gray-500);}
.action-tag.at-pause{background:var(--err-bg);color:var(--err-text);}

/* ── REPORT ──────────────────────────────── */
.report-summary{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:0.75rem;}
.report-summary-pill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap;}
.report-group{margin-bottom:0.75rem;}
.report-group-header{
  background:var(--navy);color:white;padding:5px 10px;
  border-radius:var(--radius-sm) var(--radius-sm) 0 0;
  font-size:12px;font-weight:600;display:flex;justify-content:space-between;
}
.report-table{width:100%;border-collapse:collapse;font-size:12px;border:1px solid var(--gray-200);border-top:none;}
.report-table th{text-align:left;padding:4px 8px;font-size:10px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.05em;border-bottom:1.5px solid var(--gray-200);background:var(--gray-50);}
.report-table td{padding:4px 8px;border-bottom:1px solid var(--gray-100);}
.report-table tr:nth-child(even) td{background:var(--gray-50);}
.report-table tr:hover td{background:var(--teal-pale);}
.report-table tr:last-child td:first-child{border-radius:0 0 0 var(--radius-sm);}
.report-table tr:last-child td:last-child{border-radius:0 0 var(--radius-sm) 0;}
.rt-num{width:28px;text-align:center;font-weight:700;color:var(--gray-300);font-size:10px;}
.rt-id{width:52px;font-family:'DM Mono',monospace;font-size:10px;color:var(--gray-400);}
.rt-name{font-weight:600;white-space:nowrap;}
.rt-addr{color:var(--gray-600);}
.rt-phone{color:var(--gray-400);white-space:nowrap;font-size:11px;}
.rt-note{font-size:11px;color:var(--gray-600);font-style:italic;max-width:300px;word-break:break-word;}

.ro-table{width:100%;border-collapse:collapse;font-size:12px;}
.ro-table th{text-align:left;padding:4px 6px;font-size:10px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid var(--gray-200);white-space:nowrap;}
.ro-table td{padding:2px 3px;border-bottom:1px solid var(--gray-100);}
.ro-table tr:hover{background:var(--gray-50);}
.ro-input{width:100%;border:1px solid transparent;background:transparent;padding:3px 5px;font-size:12px;font-family:inherit;border-radius:4px;outline:none;}
.ro-input:focus{border-color:var(--teal);background:white;box-shadow:0 0 0 2px rgba(20,184,166,0.15);}
.ro-input:hover:not(:focus){border-color:var(--gray-200);}
select.ro-input{cursor:pointer;}
.ro-del{background:none;border:none;cursor:pointer;font-size:14px;opacity:0.3;padding:2px 4px;}
.ro-del:hover{opacity:1;color:var(--err-text);}

@media(max-width:900px){
  .client-panel{width:100%;left:0;right:0;}
}
@media(max-width:520px){
  .info-grid{grid-template-columns:1fr;}
  .form-row{grid-template-columns:1fr;}
  .main{padding:0.5rem;}
  .topbar{padding:0 0.5rem;}
  .topbar-company{display:none;}
}
/* ── ACTIVITY REPORT ─────────────────────────────────────────────────── */
.activity-row{padding:10px 12px;border-bottom:1px solid var(--gray-100);display:flex;flex-direction:column;gap:2px;}
.activity-row:last-child{border-bottom:none;}
.activity-user{font-weight:600;font-size:13px;color:var(--navy);}
.activity-time{font-size:12px;color:var(--gray-500);}
.activity-acts{font-size:11px;color:var(--teal);font-weight:500;}
.activity-wrap{border:1px solid var(--gray-200);border-radius:var(--radius);overflow:hidden;margin-top:10px;}

/* ── IRR SCALE TAB ─────────────────────────────────────────────────── */
.irr-wrap{max-width:780px;margin:0 auto;padding:1.5rem 0;}
.irr-drop{
  border:2px dashed var(--gray-300);border-radius:var(--radius-lg);
  padding:48px 24px;text-align:center;cursor:pointer;transition:all .2s;
  background:var(--white);position:relative;
}
.irr-drop:hover,.irr-drop.drag-over{border-color:var(--teal);background:var(--teal-pale);}
.irr-drop input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.irr-drop-icon{font-size:36px;margin-bottom:10px;opacity:.5;}
.irr-drop-label{font-size:13px;color:var(--gray-500);}
.irr-drop-label strong{color:var(--teal);}
.irr-status{
  display:none;font-family:'DM Mono',monospace;font-size:12px;color:var(--teal);
  padding:10px 14px;background:var(--teal-pale);border-left:3px solid var(--teal);
  border-radius:0 var(--radius-sm) var(--radius-sm) 0;margin-top:12px;
}
.irr-report{margin-top:24px;}
.irr-section-hdr{
  font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--gray-400);margin:20px 0 8px;
}
.irr-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:4px;}
.irr-table th{
  text-align:left;font-size:10px;font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;color:var(--gray-400);padding:8px 12px;
  border-bottom:1px solid var(--gray-200);
}
.irr-table th:not(:first-child){text-align:right;}
.irr-table td{padding:8px 12px;border-bottom:1px solid var(--gray-100);}
.irr-table td:not(:first-child){text-align:right;font-family:'DM Mono',monospace;font-size:12px;}
.irr-table tr.irr-total td{font-weight:700;border-top:2px solid var(--navy);border-bottom:none;}
.irr-table tr.irr-total td:first-child{color:var(--teal);}
.irr-ytd-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0 24px;}
.irr-ytd-card{
  background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);
  padding:16px;text-align:center;
}
.irr-ytd-card .ytd-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gray-400);margin-bottom:4px;}
.irr-ytd-card .ytd-val{font-family:'DM Mono',monospace;font-size:22px;font-weight:700;color:var(--navy);}
.irr-ytd-card .ytd-sub{font-size:11px;color:var(--gray-400);margin-top:2px;}
.irr-email-box{
  background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);
  overflow:hidden;margin-top:12px;
}
.irr-email-hdr{background:var(--gray-50);padding:10px 16px;border-bottom:1px solid var(--gray-200);font-weight:600;font-size:13px;color:var(--navy);}
.irr-email-body{padding:16px;font-size:13px;line-height:1.6;color:var(--gray-800);}
.irr-btn-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;align-items:center;}
.irr-btn{
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;
  padding:9px 20px;border:none;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;
}
.irr-btn-primary{background:var(--teal);color:white;}
.irr-btn-primary:hover{filter:brightness(1.1);}
.irr-btn-secondary{background:var(--white);color:var(--gray-500);border:1px solid var(--gray-200);}
.irr-btn-secondary:hover{border-color:var(--gray-400);color:var(--gray-800);}
.irr-toast{display:none;font-size:11px;color:var(--ok-text);font-weight:600;}
.irr-history{margin-top:32px;}
.irr-hist-table{width:100%;border-collapse:collapse;font-size:12px;}
.irr-hist-table th{
  text-align:left;font-size:10px;font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;color:var(--gray-400);padding:8px 10px;
  border-bottom:1px solid var(--gray-200);
}
.irr-hist-table th:not(:first-child){text-align:right;}
.irr-hist-table td{padding:7px 10px;border-bottom:1px solid var(--gray-100);color:var(--gray-600);}
.irr-hist-table td:not(:first-child){text-align:right;font-family:'DM Mono',monospace;}
.irr-hist-table tr{cursor:pointer;transition:background .1s;}
.irr-hist-table tr:hover{background:var(--gray-50);}

/* IRR sub-nav */
.irr-subnav{display:flex;gap:6px;margin-bottom:20px;border-bottom:1px solid var(--gray-200);padding-bottom:10px;}
.irr-subnav button{
  background:none;border:1px solid var(--gray-200);color:var(--gray-500);
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;
  padding:6px 16px;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;
}
.irr-subnav button.active{background:var(--navy);color:white;border-color:var(--navy);}
.irr-subnav button:hover:not(.active){border-color:var(--gray-400);color:var(--gray-800);}

/* Dashboard */
.irr-dash-controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
.irr-range-btn{
  background:var(--white);border:1px solid var(--gray-200);color:var(--gray-500);
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;
  padding:5px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;
}
.irr-range-btn.active{background:var(--navy);color:white;border-color:var(--navy);}
.irr-range-btn:hover:not(.active){border-color:var(--gray-400);color:var(--gray-800);}
.irr-dash-custom{display:flex;gap:6px;align-items:center;}
.irr-dash-custom input[type="date"]{
  font-family:'DM Sans',sans-serif;font-size:11px;padding:4px 8px;
  border:1px solid var(--gray-200);border-radius:var(--radius-sm);color:var(--gray-600);
}
.irr-kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.irr-kpi{
  background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);
  padding:14px 16px;
}
.irr-kpi-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-400);margin-bottom:4px;}
.irr-kpi-val{font-family:'DM Mono',monospace;font-size:20px;font-weight:700;color:var(--navy);}
.irr-kpi-sub{font-size:11px;color:var(--gray-400);margin-top:2px;}
.irr-chart-wrap{
  background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);
  padding:20px;margin-bottom:16px;position:relative;
}
.irr-chart-wrap canvas{width:100%!important;}
.irr-chart-resize{
  display:flex;gap:4px;position:absolute;top:12px;right:16px;
}
.irr-chart-resize button{
  background:var(--gray-50);border:1px solid var(--gray-200);color:var(--gray-500);
  font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;
  padding:3px 8px;border-radius:3px;cursor:pointer;
}
.irr-chart-resize button:hover{background:var(--gray-100);color:var(--gray-800);}
.irr-toggle-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.irr-toggle{
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;
  padding:4px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;
  border:1px solid var(--gray-200);background:var(--white);color:var(--gray-400);
}
.irr-toggle.on{color:white;}

/* Driver hours form */
.irr-hours-form{
  background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);
  padding:16px;margin-top:16px;
}
.irr-hours-form h4{font-size:12px;font-weight:600;color:var(--navy);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em;}
.irr-hours-row{display:flex;gap:10px;align-items:flex-end;}
.irr-hours-row label{font-size:11px;font-weight:600;color:var(--gray-500);display:flex;flex-direction:column;gap:3px;}
.irr-hours-row input{
  font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 10px;
  border:1px solid var(--gray-200);border-radius:var(--radius-sm);color:var(--gray-800);width:140px;
}
.irr-hours-row button{
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;
  padding:7px 16px;border:none;border-radius:var(--radius-sm);
  background:var(--teal);color:white;cursor:pointer;
}
.irr-hours-row button:hover{filter:brightness(1.1);}

/* IRR Report overlay */
.irr-report-overlay{
  position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,0.5);
  display:flex;align-items:flex-start;justify-content:center;padding:30px 20px;overflow-y:auto;
}
.irr-report-modal{
  background:white;border-radius:var(--radius);max-width:800px;width:100%;
  box-shadow:var(--shadow-md);position:relative;
}
.irr-report-toolbar{
  display:flex;gap:8px;align-items:center;padding:12px 20px;
  border-bottom:1px solid var(--gray-200);flex-wrap:wrap;
}
.irr-report-toolbar button{
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;
  padding:6px 14px;border-radius:var(--radius-sm);cursor:pointer;border:none;
}
.irr-report-toolbar .rpt-print{background:var(--navy);color:white;}
.irr-report-toolbar .rpt-email{background:var(--teal);color:white;}
.irr-report-toolbar .rpt-close{background:var(--gray-100);color:var(--gray-600);margin-left:auto;}
.irr-report-toolbar input[type="text"]{
  font-family:'DM Sans',sans-serif;font-size:11px;padding:5px 10px;
  border:1px solid var(--gray-200);border-radius:var(--radius-sm);color:var(--gray-800);flex:1;min-width:200px;
}
.irr-report-body{padding:32px 40px;font-family:Arial,Helvetica,sans-serif;color:#222;}
.irr-report-body h1{font-size:18px;font-weight:700;margin-bottom:4px;color:#000;}
.irr-report-body .rpt-period{font-size:13px;color:#666;margin-bottom:24px;}
.irr-report-body .rpt-kpi-row{display:flex;gap:16px;margin-bottom:24px;}
.irr-report-body .rpt-kpi{flex:1;border:1px solid #ddd;border-radius:6px;padding:12px;text-align:center;}
.irr-report-body .rpt-kpi-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-bottom:4px;}
.irr-report-body .rpt-kpi-val{font-size:20px;font-weight:700;color:#000;}
.irr-report-body table{width:100%;border-collapse:collapse;font-size:12px;margin-top:16px;}
.irr-report-body th{text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#888;padding:8px 10px;border-bottom:2px solid #000;}
.irr-report-body th:first-child{text-align:left;}
.irr-report-body td{padding:7px 10px;border-bottom:1px solid #eee;text-align:right;font-family:'Courier New',monospace;font-size:11px;}
.irr-report-body td:first-child{text-align:left;font-family:Arial,Helvetica,sans-serif;}
.irr-report-body tr:last-child td{border-bottom:none;}
.irr-report-body .rpt-total td{font-weight:700;border-top:2px solid #000;border-bottom:none;}

@media print{
  body>*{display:none!important;}
  .irr-report-overlay{position:static!important;background:none!important;padding:0!important;display:block!important;}
  .irr-report-modal{box-shadow:none!important;border-radius:0!important;}
  .irr-report-toolbar{display:none!important;}
  .irr-report-body{padding:20px!important;}
}
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-brand">
      <div class="login-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
      </div>
      <div class="login-brand-text">
        <div class="helm-title">HELM</div>
        <div class="helm-sub">Reis Trucking</div>
      </div>
    </div>
    <label>Username</label>
    <input type="text" id="unInput" placeholder="Enter username…" onkeydown="if(event.key==='Enter')document.getElementById('pwInput').focus()"/>
    <label>Password</label>
    <input type="password" id="pwInput" placeholder="Enter password…" onkeydown="if(event.key==='Enter')login()"/>
    <button class="btn-signin" onclick="login()">Sign In</button>
    <div class="login-err" id="loginErr"></div>
    <div class="login-footer">Route Management System &nbsp;·&nbsp; Nantucket, MA</div>
  </div>
</div>

<!-- ── APP ── -->
<div id="appScreen">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
          <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
      </div>
      <div>
        <div class="topbar-name">HELM</div>
        <div class="topbar-company">Reis Trucking</div>
      </div>
      <button id="stickyBtn" class="btn-sticky" onclick="toggleStickyPanel()">Sticky</button>
    </div>
    <div class="topbar-right">
      <div class="live-dot"></div>
      <div class="live-label" id="topbarUser"></div>
      <button class="btn-logout" onclick="logout()">Sign out</button>
    </div>
  </div>

  <div class="tab-nav" id="tabNav">
    <button class="active" onclick="switchTab('lookup',this)">Client Lookup</button>
    <button onclick="switchTab('add',this)">Add Client</button>
    <button onclick="switchTab('report',this)">Reports</button>
    <button onclick="switchTab('rolloffs',this)">Roll-offs</button>
    <button id="irrTabBtn" style="display:none" onclick="switchTab('irr',this)">IRR Scale</button>
    <button id="importTabBtn" style="display:none" onclick="switchTab('import',this)">Import</button>
  </div>

  <div class="main">
    <div id="tab-lookup"></div>
    <div id="tab-add"    style="display:none"></div>
    <div id="tab-report" style="display:none"></div>
    <div id="tab-rolloffs" style="display:none"></div>
    <div id="tab-irr"    style="display:none"></div>
    <div id="tab-import" style="display:none"></div>

function parseCSVLine(line){
  const fields=[];
  let field='', inQuotes=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(inQuotes){
      if(ch==='"'&&line[i+1]==='"'){field+='"';i++;}
      else if(ch==='"'){inQuotes=false;}
      else{field+=ch;}
    } else {
      if(ch==='"'){inQuotes=true;}
      else if(ch===','){fields.push(field.trim());field='';}
      else{field+=ch;}
    }
  }
  fields.push(field.trim());
  return fields;
}

}

function fmtDateShort(iso){
  if(!iso) return '';
  const d=new Date(iso+'T00:00:00');
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  const y=String(d.getFullYear()).slice(2);
  return m+day+y;
}

function fmtTimestamp(ts){
  if(!ts) return '';
  const d=new Date(ts);
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  const y=String(d.getFullYear()).slice(2);
  const h=String(d.getHours()).padStart(2,'0');
  const min=String(d.getMinutes()).padStart(2,'0');
  return `${m}/${day}/${y} ${h}:${min}`;
}

function renderLookup(){

      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="srch" placeholder="Search by client ID, name, address, or phone…" oninput="doSearch(this.value)" onkeydown="handleSearchKey(event)" autocomplete="off"/>
    </div>
    <div class="search-hint" id="srchHint">${clients.length>0?`${clients.length.toLocaleString()} clients loaded — search by account #, name, address, or phone`:'Loading clients…'}</div>
    <div id="srchResults" style="margin-top:.5rem"></div>`;
  document.getElementById('srch').focus();
}

function doSearch(q){
  q=q.trim().toLowerCase();
  const res=document.getElementById('srchResults');
  if(q.length<2){res.innerHTML='';return;}

  const results=clients
    .map(c=>{
      const idL=c.client_id.toLowerCase();
      const addrL=c.address.toLowerCase();
      const nameL=(c.client_name||'').toLowerCase();
      const phoneClean=(c.phone||'').replace(/\D/g,'');
      const qClean=q.replace(/\D/g,'');
      let score=0;
      if(idL===q) score=4;
      else if(idL.startsWith(q)) score=3;
      else if(idL.includes(q)) score=2;
      if(nameL&&nameL.includes(q)) score=Math.max(score,3);
      if(addrL.includes(q)) score=Math.max(score,1);
      if(qClean.length>=3&&phoneClean.includes(qClean)) score=Math.max(score,qClean.length>=7?4:2);
      return {c,score};
    })
    .filter(x=>x.score>0)
    .sort((a,b)=>b.score-a.score)
    .slice(0,10);

  if(!results.length){res.innerHTML='<div class="empty-state">No clients found</div>';return;}
  if(results.length===1){res.innerHTML='';openClient(results[0].c);return;}
  res.innerHTML='<div class="results-list">'+results.map(({c})=>{
    const co=getCompany(c.client_id);
    return `
    <div class="result-item" tabindex="0" data-cid="${esc(c.client_id)}" onclick="pickClient('${esc(c.client_id)}')" onkeydown="handleResultKey(event,'${esc(c.client_id)}')">
      <div>
        <div class="result-id">${c.client_name?`${esc(c.client_name)} &mdash; `:''}${esc(c.client_id)}${co.name?` <span class="company-tag ${co.cls}">${co.name}</span>`:''}</div>
        <div class="result-addr">${esc(c.address)}</div>
      </div>
      <div class="result-day">${esc(c.service_day||'')}</div>
    </div>`;
  }).join('')+'</div>';
}

function handleSearchKey(e){
  if(e.key==='Enter'){
    e.preventDefault();
    const first=document.querySelector('.result-item');
    if(first){first.click();return;}
    // If search has text but no results list, check if single match auto-opened
  }
  if(e.key==='ArrowDown'){
    e.preventDefault();
    const first=document.querySelector('.result-item');
    if(first) first.focus();
  }
}

function handleResultKey(e,cid){
  if(e.key==='Enter'){e.preventDefault();pickClient(cid);return;}
  if(e.key==='ArrowDown'){
    e.preventDefault();
    const next=e.target.nextElementSibling;
    if(next) next.focus();
  }
  if(e.key==='ArrowUp'){
    e.preventDefault();
    const prev=e.target.previousElementSibling;
    if(prev) prev.focus();
    else document.getElementById('srch').focus();
  }
}

    if(btn){
      const noteId=btn.dataset.noteId;
      btn.outerHTML=`<div class="note-del-confirm"><span>Delete?</span><button class="note-del-yes" data-note-id="${noteId}">Yes</button><button class="note-del-no">No</button></div>`;
    } else if(yes){
      deleteNote(yes.dataset.noteId);
    } else if(no){
      // Reset — re-render notes to restore × button
      renderNotesTable(clientNotes);
    }
  };
}

async function submitNote(baseId){
  const action=document.getElementById('noteAction').value;
  const dateIn=document.getElementById('noteActionDate');
  const textIn=document.getElementById('noteText');
  const noteText=textIn.value.trim();
  const actionType=ACTION_TYPES.find(a=>a.value===action);
  const actionDate=actionType&&actionType.needsDate?dateIn.value:null;

  if(actionType&&actionType.needsDate&&!actionDate){
    toast('Select a date for this action');return;
  }

  const {error}=await db.from('notes').insert({
    client_id:baseId,
    user_id:currentUser?currentUser.display_name:'',
    action:action,
    action_date:actionDate||null,
    note:noteText
  });
  if(error){toast('Error: '+error.message);return;}
  textIn.value='';
  dateIn.value='';
  toast('Note added',true);
  logActivity('note_added', action+(baseId?' on '+baseId:''));
  const notes=await loadNotes(baseId);
  renderNotesTable(notes);
}

async function saveClientEdit(cid){
  const name=document.getElementById('editName').value.trim();
  const addr=document.getElementById('editAddr').value.trim();
  const phone=document.getElementById('editPhone').value.trim();
  const email=document.getElementById('editEmail').value.trim();
  const days=[...document.querySelectorAll('#editDaysWrap .day-toggle-active')].map(b=>b.dataset.day);
  const autopay=document.getElementById('editAutopay')?.checked||false;
  if(!addr){toast('Address is required');return;}
  if(!days.length){toast('Select at least one pickup day');return;}
  const {error}=await db.from('clients').update({
    client_name:name||null,
    address:addr,
    phone:phone||null,
    email:email||null,
    service_day:days.join(','),
    autopay:autopay
  }).eq('client_id',cid);

async function deleteNote(noteId){
  if(!noteId||!activeClient) return;
  const {data,error}=await db.from('notes').delete().eq('id',noteId).select();
  if(error){toast('Error: '+error.message);return;}
  toast('Note deleted',true);
  const notes=await loadNotes(activeClient.client_id);
  renderNotesTable(notes);
}

function findClient(cid){
  return clients.find(x=>x.client_id===cid)||clients.find(x=>x.client_id===getBaseId(cid))||{};
}

function fetchReportData(notesData,skipsData,date){
  const data=[...(notesData||[])];
  if(skipsData&&skipsData.length){
    skipsData.forEach(s=>{
      const skipId=getBaseId(s.client_id); // handle legacy suffixed IDs
      const already=data.some(n=>n.client_id===skipId&&n.action==='Skip Day');
      if(!already){
        data.push({
          client_id:skipId,
          action:'Skip Day',
          action_date:date,
          note:s.inquiry_method?`via ${s.inquiry_method}`:'',
          logged_by:s.logged_by||'',
          created_at:s.created_at||''
        });
      }
    });
  }
  // Group by action
  const grouped={};
  data.forEach(n=>{
    if(!grouped[n.action]) grouped[n.action]=[];
    grouped[n.action].push(n);
  });
  return {data,grouped};
}

async function generateReport(){
  const date=document.getElementById('reportDate').value;
  if(!date){toast('Select a date');return;}
  const results=document.getElementById('reportResults');
  results.innerHTML='<div class="loading">Loading…</div>';

  const {data:notesData,error}=await db.from('notes').select('*').eq('action_date',date).order('action').order('created_at');
  if(error){toast('Error: '+error.message);return;}
  const {data:skipsData}=await db.from('skips').select('*').eq('skip_week',date);

  const {data,grouped}=fetchReportData(notesData,skipsData,date);

  if(!data.length){
    results.innerHTML='<div class="empty-state">No action items for '+fmtDate(date)+'</div>';
    return;
  }

  // Split data by company
  const companies=[
    {key:'REIS',label:'REIS',cls:'co-reis',filter:n=>n.client_id&&n.client_id.startsWith('20')},
    {key:'SANTOS',label:'SANTOS',cls:'co-santos',filter:n=>n.client_id&&n.client_id.startsWith('30')},
    {key:'OTHER',label:'Other',cls:'',filter:n=>!n.client_id||(!n.client_id.startsWith('20')&&!n.client_id.startsWith('30'))}
  ];

  let html=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;flex-wrap:wrap;gap:6px">
      <div style="font-size:14px;font-weight:700;color:var(--navy)">${fmtDate(date)} — ${data.length} item${data.length!==1?'s':''}</div>
      <button class="btn-add" onclick="printReport('${date}')" style="white-space:nowrap">Print Report</button>
    </div>`;

  companies.forEach(comp=>{
    const compData=data.filter(comp.filter);
    if(!compData.length) return;
    // Group by action within this company
    const compGrouped={};
    compData.forEach(n=>{(compGrouped[n.action]=compGrouped[n.action]||[]).push(n);});

    html+=`<div style="margin-bottom:1.5rem">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <h3 style="margin:0;font-size:16px;color:var(--navy)">${comp.label}</h3>
        ${comp.cls?`<span class="company-tag ${comp.cls}">${compData.length} items</span>`:`<span style="font-size:11px;color:var(--gray-400)">${compData.length} items</span>`}
      </div>`;

    Object.entries(compGrouped).forEach(([action,notes])=>{
      html+=`<div class="report-group">
        <div class="report-group-header">
          <span>${esc(action)}</span>
          <span>${notes.length}</span>
        </div>
        <table class="report-table"><thead><tr>
          <th style="width:28px">#</th>
          <th style="width:52px">Acct</th>
          <th>Name</th>
          <th>Address</th>
          <th>Phone</th>
          ${notes.some(n=>n.note)?'<th>Note</th>':''}
        </tr></thead><tbody>`;
      notes.forEach((n,i)=>{
        const c=findClient(n.client_id);
        html+=`<tr>
          <td class="rt-num">${i+1}</td>
          <td class="rt-id">${esc(n.client_id)}</td>
          <td class="rt-name">${esc(c.client_name||'—')}</td>
          <td class="rt-addr">${esc(c.address||'—')}</td>
          <td class="rt-phone">${esc(c.phone||'')}</td>
          ${notes.some(n=>n.note)?`<td class="rt-note">${esc(n.note||'')}</td>`:''}
        </tr>`;
      });
      html+=`</tbody></table></div>`;
    });
    html+=`</div>`;
  });

  results.innerHTML=html;
  logActivity('report_generated', date);
}

function toggleDay(btn){ btn.classList.toggle('day-toggle-active'); }

async function addClient(){
  const id=document.getElementById('nId').value.trim();
  const name=document.getElementById('nName').value.trim();
  const addr=document.getElementById('nAddr').value.trim();
  const phone=document.getElementById('nPhone').value.trim();
  const email=document.getElementById('nEmail').value.trim();
  const selectedDays=[...document.querySelectorAll('.day-toggle-active')].map(b=>b.dataset.day);
  if(!id||!addr){toast('Account # and address are required');return;}
  if(!selectedDays.length){toast('Select at least one pickup day');return;}

  const addrLower=addr.toLowerCase().trim();
  const nameLower=name.toLowerCase().trim();
  const dupes=clients.filter(c=>{
    const sameAddr=c.address.toLowerCase().trim()===addrLower;
    const sameName=nameLower&&c.client_name&&c.client_name.toLowerCase().trim()===nameLower;
    return sameAddr||sameName;
  });

  if(dupes.length){
    pendingClient={id,selectedDays,addr,phone,email,name};
    const dupeList=dupes.map(c=>`${esc(c.client_name||'')}${c.client_name?' �� ':''}${esc(c.client_id)} (${esc(c.service_day)})`).join(', ');
    const msg=document.getElementById('addMsg');
    msg.style.color='var(--warn-text)';
    msg.innerHTML=`
      <div style="background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:var(--radius-sm);padding:8px 10px;margin-bottom:8px">
        <strong>Possible duplicate</strong><br/>
        <span style="font-size:12px">${dupeList}</span>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn-add" style="flex:1;background:var(--gray-400)" onclick="renderAdd()">Cancel</button>
        <button class="btn-add" style="flex:2" onclick="confirmAddClient()">Add Anyway</button>
      </div>`;
    return;
  }

  await saveClient(id,selectedDays,addr,phone,email,name);
}

async function confirmAddClient(){
  if(!pendingClient) return;
  const {id,selectedDays,addr,phone,email,name}=pendingClient;
  pendingClient=null;
  await saveClient(id,selectedDays,addr,phone,email,name);
}

async function saveClient(id,selectedDays,addr,phone,email,name){
  const msg=document.getElementById('addMsg');
  if(msg){msg.style.color='var(--gray-400)';msg.textContent='Saving…';}
  const record={
    client_id: id,
    service_day: selectedDays.join(','),
    address: addr,
    phone: phone||null,
    email: email||null,
    client_name: name||null,
  };
  const {error}=await db.from('clients').insert(record);
  if(error){toast('Error: '+error.message);if(msg)msg.textContent='';return;}
  await loadClients();
  if(msg){msg.style.color='var(--ok-text)';msg.textContent=`Client ${id} added — ${selectedDays.join(', ')}`;}
  toast(`Client ${id} added`,true);
  setTimeout(()=>renderAdd(), 1800);
}

let rolloffsData=[];
let rolloffSort={col:'date',asc:false};
let showDeleted=false;
let rolloffUndo=null;

let rolloffSearch='';
function renderRolloffs(){
  document.getElementById('tab-rolloffs').innerHTML=`
    <div class="card" style="max-width:100%">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <h2 style="font-size:15px;font-weight:700;margin:0">Roll-offs</h2>
        <div style="display:flex;gap:6px;align-items:center">
          <label style="font-size:11px;color:var(--gray-400);cursor:pointer;display:flex;align-items:center;gap:4px">
            <input type="checkbox" id="showDeletedToggle" onchange="showDeleted=this.checked;loadRolloffs()" ${showDeleted?'checked':''}/> Show deleted
          </label>
          <button class="btn-add" onclick="addRolloffRow()">+ Add Row</button>
        </div>
      </div>
      <div style="position:relative;margin-bottom:8px">
        <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--gray-300);font-size:14px">&#128269;</span>
        <input type="text" id="rolloffSearchInput" placeholder="Search roll-offs by customer, address, type, notes…" oninput="rolloffSearch=this.value;renderRolloffTable()" style="width:100%;padding:7px 10px 7px 32px;border:1px solid var(--gray-200);border-radius:var(--radius-sm);font-size:12px;font-family:inherit;outline:none;transition:border-color .15s;" onfocus="this.style.borderColor='var(--teal)'" onblur="this.style.borderColor='var(--gray-200)'"/>
      </div>
      <div id="rolloffUndo" style="display:none;background:#fef3cd;padding:6px 10px;border-radius:6px;margin-bottom:6px;font-size:12px;justify-content:space-between;align-items:center"></div>
      <div id="rolloffTable" style="overflow-x:auto">
        <div class="loading">Loading…</div>
      </div>
    </div>`;
  loadRolloffs();
}

async function loadRolloffs(){
  let q=db.from('rolloffs').select('*').order(rolloffSort.col,{ascending:rolloffSort.asc});
  if(!showDeleted) q=q.eq('deleted',false);
  const {data,error}=await q;
  if(error){toast('Error: '+error.message);return;}
  rolloffsData=data||[];
  renderRolloffTable();
}

function renderRolloffTable(){
  const wrap=document.getElementById('rolloffTable');
  if(!rolloffsData.length){
    wrap.innerHTML='<div class="empty-state">No roll-offs yet. Click "+ Add Row" to start.</div>';
    return;
  }
  const q=rolloffSearch.trim().toLowerCase();
  const filtered=q?rolloffsData.filter(r=>{
    return [r.customer,r.address_number,r.street,r.type,r.notes,r.date]
      .filter(Boolean).some(v=>v.toLowerCase().includes(q));
  }):rolloffsData;
  if(q&&!filtered.length){
    wrap.innerHTML=`<div class="empty-state">No roll-offs matching "${esc(rolloffSearch.trim())}"</div>`;
    return;
  }
  const cols=[
    {key:'date',label:'Date',width:'100px'},
    {key:'type',label:'Type',width:'70px'},
    {key:'customer',label:'Customer',width:'auto'},
    {key:'address_number',label:'Number',width:'80px'},
    {key:'street',label:'Street',width:'auto'},
    {key:'notes',label:'Notes',width:'120px'}
  ];
  const sortIcon=(col)=>rolloffSort.col===col?(rolloffSort.asc?'&#9650;':'&#9660;'):'';
  let html=`<table class="ro-table"><thead><tr>`;
  cols.forEach(c=>{
    html+=`<th style="width:${c.width};cursor:pointer;user-select:none" onclick="sortRolloffs('${c.key}')">${c.label} <span style="font-size:9px">${sortIcon(c.key)}</span></th>`;
  });
  html+=`<th style="width:36px"></th></tr></thead><tbody>`;
  filtered.forEach(r=>{
    const deleted=r.deleted;
    const rowStyle=deleted?'opacity:0.4;text-decoration:line-through;':'';
    html+=`<tr style="${rowStyle}" data-roid="${r.id}">`;
    // Date cell
    html+=`<td><input type="date" class="ro-input" value="${r.date||''}" onchange="updateRolloff(${r.id},'date',this.value)" ${deleted?'disabled':''}/></td>`;
    // Type cell - dropdown
    const roTypes=['AJ','REIS','AJ/REIS','30YD','40YD','30/40YD','SANTOS BOX'];
    html+=`<td><select class="ro-input" onchange="updateRolloff(${r.id},'type',this.value)" ${deleted?'disabled':''}>
      <option value=""${!r.type?' selected':''}></option>
      ${roTypes.map(t=>`<option value="${t}"${r.type===t?' selected':''}>${t}</option>`).join('')}
    </select></td>`;
    // Customer cell
    html+=`<td><input type="text" class="ro-input" value="${esc(r.customer||'')}" onchange="updateRolloff(${r.id},'customer',this.value)" onkeydown="roKeyNav(event,${r.id},'customer')" ${deleted?'disabled':''}/></td>`;
    // Number cell
    html+=`<td><input type="text" class="ro-input" value="${esc(r.address_number||'')}" onchange="updateRolloff(${r.id},'address_number',this.value)" onkeydown="roKeyNav(event,${r.id},'address_number')" ${deleted?'disabled':''}/></td>`;
    // Street cell
    html+=`<td><input type="text" class="ro-input" value="${esc(r.street||'')}" onchange="updateRolloff(${r.id},'street',this.value)" onkeydown="roKeyNav(event,${r.id},'street')" ${deleted?'disabled':''}/></td>`;
    // Notes cell
    html+=`<td><input type="text" class="ro-input" value="${esc(r.notes||'')}" onchange="updateRolloff(${r.id},'notes',this.value)" onkeydown="roKeyNav(event,${r.id},'notes')" ${deleted?'disabled':''}/></td>`;
    // Delete/restore button
    if(deleted){
      html+=`<td><button class="ro-del" title="Restore" onclick="restoreRolloff(${r.id})">&#8634;</button></td>`;
    } else {
      html+=`<td><button class="ro-del" title="Delete" onclick="softDeleteRolloff(${r.id})">&#128465;</button></td>`;
    }
    html+=`</tr>`;
  });
  html+=`</tbody></table>`;
  const countLabel=q?`<div style="font-size:11px;color:var(--gray-400);margin-top:4px">${filtered.length} of ${rolloffsData.length} roll-offs shown</div>`:'';
  wrap.innerHTML=html+countLabel;
}

async function updateRolloff(id,col,val){
  const update={[col]:val||null,updated_at:new Date().toISOString()};
  const {error}=await db.from('rolloffs').update(update).eq('id',id);
  if(error) toast('Save error: '+error.message);

async function softDeleteRolloff(id){
  const row=rolloffsData.find(r=>r.id===id);
  const {error}=await db.from('rolloffs').update({deleted:true,deleted_at:new Date().toISOString(),deleted_by:currentUser?currentUser.display_name:''}).eq('id',id);
  if(error){toast('Error: '+error.message);return;}
  // Show undo
  rolloffUndo={id,timeout:null};
  const undoEl=document.getElementById('rolloffUndo');
  undoEl.style.display='flex';
  undoEl.innerHTML=`<span>Row deleted (${esc(row?row.customer||'':'')})</span><button class="btn-add" style="padding:2px 10px;font-size:11px" onclick="restoreRolloff(${id})">Undo</button>`;
  clearTimeout(rolloffUndo.timeout);
  rolloffUndo.timeout=setTimeout(()=>{undoEl.style.display='none';rolloffUndo=null;},8000);
  await loadRolloffs();
}

async function restoreRolloff(id){
  const {error}=await db.from('rolloffs').update({deleted:false,deleted_at:null,deleted_by:null}).eq('id',id);
  if(error){toast('Error: '+error.message);return;}
  const undoEl=document.getElementById('rolloffUndo');
  if(undoEl) undoEl.style.display='none';
  rolloffUndo=null;
  toast('Row restored',true);
  await loadRolloffs();
}

async function loadActivityReport(){
  const date=document.getElementById('activityDate').value;
  if(!date) return;
  const wrap=document.getElementById('activityReportWrap');
  wrap.innerHTML='<div class="loading" style="padding:10px 0">Loading…</div>';
  const start=date+'T00:00:00', end=date+'T23:59:59';
  const [{data:hb},{data:acts}]=await Promise.all([
    db.from('heartbeats').select('*').gte('ts',start).lte('ts',end).order('ts'),
    db.from('activity_log').select('*').gte('ts',start).lte('ts',end).order('ts')
  ]);
  if(!hb?.length&&!acts?.length){
    wrap.innerHTML='<div style="padding:10px 0;color:var(--gray-400);font-size:12px">No activity recorded for this date.</div>';
    return;
  }
  const users=[...new Set([...(hb||[]).map(h=>h.user_id),...(acts||[]).map(a=>a.user_id)])].sort();
  const ACTION_LABELS={'client_lookup':'lookups','note_added':'notes added','report_generated':'reports run','rolloff_edit':'rolloff edits'};
  let html='<div class="activity-wrap">';
  users.forEach(user=>{
    const userHb=(hb||[]).filter(h=>h.user_id===user).map(h=>new Date(h.ts)).sort((a,b)=>a-b);
    const userActs=(acts||[]).filter(a=>a.user_id===user);
    let activeMin=0;
    let firstSeen=null,lastSeen=null;
    if(userHb.length){
      firstSeen=userHb[0]; lastSeen=userHb[userHb.length-1];
      for(let i=1;i<userHb.length;i++){
        const gap=(userHb[i]-userHb[i-1])/60000;
        if(gap<=10) activeMin+=gap;
      }
      activeMin+=5;
    }
    const counts={};
    userActs.forEach(a=>{counts[a.action]=(counts[a.action]||0)+1;});
    const actStr=Object.entries(counts).map(([k,v])=>`${v} ${ACTION_LABELS[k]||k}`).join(' &middot; ')||'No actions logged';
    const hrs=Math.floor(activeMin/60), mins=Math.round(activeMin%60);
    const durStr=activeMin>0?(hrs>0?`${hrs}h ${mins}m active`:`${mins}m active`):'';
    const timeStr=firstSeen?`${fmtTime(firstSeen)} &rarr; ${fmtTime(lastSeen)}`:'No heartbeat data';
    html+=`<div class="activity-row">
      <div class="activity-user">${esc(user)}</div>
      <div class="activity-time">${timeStr}${durStr?' &nbsp;&middot;&nbsp; <strong>'+durStr+'</strong>':''}</div>
      <div class="activity-acts">${actStr}</div>
    </div>`;
  });
  html+='</div>';
  wrap.innerHTML=html;
}

function handleCSV(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split('\n').filter(l=>l.trim());
    const headers=parseCSVLine(lines[0]).map(h=>h.replace(/^"|"$/g,'').toLowerCase());
    const rawRows=lines.slice(1).map(line=>{
      const vals=parseCSVLine(line);
      const obj={};
      headers.forEach((h,i)=>obj[h]=vals[i]||'');
      return obj;
    }).filter(r=>r.client_id&&r.address);

    // Dedupe by client_id (keep first occurrence)
    const seen={};
    const rows=rawRows.filter(r=>{
      if(seen[r.client_id]) return false;
      seen[r.client_id]=true;
      return true;
    });

    pendingImport=rows;
    const preview=document.getElementById('importPreview');
    preview.innerHTML=`
      <div class="import-preview">
        <div class="import-preview-header">
          <h3>${rows.length.toLocaleString()} clients ready</h3>
          <button class="btn-add" onclick="doImport(pendingImport)">Import All</button>
        </div>
        ${rows.slice(0,6).map(r=>`
          <div class="preview-row">
            <span class="p-id">${esc(r.client_id)}</span>
            <span class="p-name">${esc(r.client_name||'')}</span>
            <span class="p-addr">${esc(r.address)}</span>
          </div>`).join('')}
        ${rows.length>6?`<p style="font-size:12px;color:var(--gray-400);margin-top:8px">…and ${(rows.length-6).toLocaleString()} more</p>`:''}
      </div>`;
  };
  reader.readAsText(file);
}

async function doImport(rows){
  const batchSize=500;
  let done=0;
  for(let i=0;i<rows.length;i+=batchSize){
    const chunk=rows.slice(i,i+batchSize);
    const {error}=await db.from('clients').upsert(chunk,{onConflict:'client_id'});
    if(error){toast('Import error: '+error.message);return;}
    done+=chunk.length;
  }
  await loadClients();
  toast(`${done.toLocaleString()} clients imported`,true);

function handleRolloffCSV(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split('\n').filter(l=>l.trim());
    const headers=parseCSVLine(lines[0]).map(h=>h.replace(/^"|"$/g,'').toLowerCase().replace(/\s+/g,'_'));
    const rows=lines.slice(1).map(line=>{
      const vals=parseCSVLine(line);
      const obj={};
      headers.forEach((h,i)=>obj[h]=vals[i]||'');
      return obj;
    }).filter(r=>r.customer||r.street);

    // Normalize dates (handle MM/DD/YYYY -> YYYY-MM-DD)
    rows.forEach(r=>{
      if(r.date&&r.date.includes('/')){
        const parts=r.date.split('/');
        if(parts.length===3){
          const [m,d,y]=parts;
          r.date=`${y.length===2?'20'+y:y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
        }
      }
      // Normalize type to uppercase
      if(r.type) r.type=r.type.toUpperCase();
    });

    pendingRoImport=rows;
    const preview=document.getElementById('roImportPreview');
    preview.innerHTML=`
      <div class="import-preview">
        <div class="import-preview-header">
          <h3>${rows.length.toLocaleString()} roll-offs ready</h3>
          <button class="btn-add" onclick="doRolloffImport(pendingRoImport)">Import All</button>

      </div>`;
  };
  reader.readAsText(file);
}

const IRR_ROLLOFF_SVC = ['ROLLOFF DELIVERY','ROLLOFF DOUBLE DROP','EMPTY ROLLOFF','EMPTY ROLL-OFF'];
let irrCurrentData = null;
let irrRendered = false;

function irrParseSpreadsheetML(xmlText) {
  xmlText = xmlText.replace(/<\?[^?]*\?>/g, '');
  const result = [];
  const rowRx = /<(?:ss:)?Row[^>]*>([\s\S]*?)<\/(?:ss:)?Row>/gi;
  let rm;
  while ((rm = rowRx.exec(xmlText)) !== null) {
    const rc = rm[1], vals = [];
    const cellRx = /<(?:ss:)?Cell([^>]*)>([\s\S]*?)<\/(?:ss:)?Cell>/gi;
    let cm, ci = 0;
    while ((cm = cellRx.exec(rc)) !== null) {
      const idxM = cm[1].match(/ss:Index="(\d+)"/);
      if (idxM) { const t = parseInt(idxM[1])-1; while(ci<t){vals.push('');ci++;} }
      const dm = cm[2].match(/<(?:ss:)?Data[^>]*>([\s\S]*?)<\/(?:ss:)?Data>/i);
      vals.push(dm ? dm[1].trim() : '');
      ci++;
    }
    result.push(vals);
  }
  return result;
}

function irrParseReport(rows) {
  let reportDate = null;
  const firstRow = rows[0] ? rows[0].join(' ') : '';
  const dateMatch = firstRow.match(/(\d{1,2}\/\d{1,2}\/\d{4})/);
  if (dateMatch) reportDate = dateMatch[1];

  const tickets = {};
  let currentCode = null, parentCode = null;
  const codeStack = [];

  for (let i = 0; i < rows.length; i++) {
    const vals = rows[i];
    const nonEmpty = vals.filter(v => v && v.trim());
    if (!nonEmpty.length) continue;
    const first = nonEmpty[0];
    const isHeader = first.includes(' - ') && !first.includes('Totals') && !first.includes('Tickets:')
      && !first.includes('TIPFEES') && !first.includes('ROLLOFFS') && !first.includes('No Order')
      && !first.startsWith('Page ') && !first.includes('Date Range') && first.trim()!=='Date' && !first.includes('Report');
    const isTotals = first.includes(' - ') && first.includes('Totals') && !first.includes('TIPFEES') && !first.includes('Non Order');

    if (isHeader) { const c=first.split(' - ')[0].trim(); codeStack.push(c); currentCode=c; parentCode=codeStack.length>1?codeStack[0]:null; }
    if (isTotals) { const c=first.split(' - ')[0].trim(); const idx=codeStack.lastIndexOf(c); if(idx!==-1)codeStack.splice(idx,1); currentCode=codeStack.length>0?codeStack[codeStack.length-1]:null; parentCode=codeStack.length>1?codeStack[0]:null; }

    const effectiveCode = (parentCode && parentCode.startsWith('ZZ')) ? parentCode : currentCode;
    if (!effectiveCode) continue;
    const flatUpper = vals.join(' ').toUpperCase();
    const dataVals = vals.filter(v => v!==null && v!=='' && v!==undefined);

    if (flatUpper.includes('REIS SITE TRANSFER FEE')) {
      const fi = dataVals.findIndex(v => v && v.includes('REIS SITE TRANSFER FEE'));
      if (fi!==-1 && fi+2<dataVals.length) {
        const ticket=dataVals[1]||'?', net=parseFloat(dataVals[fi+2])||0;
        if(!tickets[ticket]) tickets[ticket]={tons:0,service:null,code:effectiveCode};
        tickets[ticket].tons+=net;
        if(!tickets[ticket].service) tickets[ticket].code=effectiveCode;
      }
    }
    for (const kw of IRR_ROLLOFF_SVC) {
      if (flatUpper.includes(kw)) {
        const ticket=dataVals[1]||'?';
        if(!tickets[ticket]) tickets[ticket]={tons:0,service:null,code:effectiveCode};
        tickets[ticket].service=kw; tickets[ticket].code=effectiveCode; break;
      }
    }
  }

  const buckets = {
    reis:{label:'Reis Rolloff',tons:0,tickets:0,tipRevenue:0,rolloffFees:0,deliveries:0,empties:0,doubleDrops:0},
    pile:{label:'Pile Pickups (Reis)',tons:0,tickets:0},
    island:{label:'Island Rubbish',tons:0,tickets:0},
    santos:{label:'East End',tons:0,tickets:0},
    vinagro:{label:'VINAGRO Output',tons:0,tickets:0},
    walkin:{label:'Walk-In / Drive-Through',tons:0,tickets:0},
  };

  for (const [tn,t] of Object.entries(tickets)) {
    const c=t.code;
    if(c==='ZZISLAND'){buckets.island.tons+=t.tons;buckets.island.tickets++;}
    else if(c==='ZZEASTEND'){buckets.santos.tons+=t.tons;buckets.santos.tickets++;}
    else if(c==='ZZDELTA'){buckets.pile.tons+=t.tons;buckets.pile.tickets++;}
    else if(c==='ZZREIS'){buckets.vinagro.tons+=t.tons;buckets.vinagro.tickets++;}
    else if(c.startsWith('ZZ')){buckets.walkin.tons+=t.tons;buckets.walkin.tickets++;}
    else if(t.service!==null){
      buckets.reis.tons+=t.tons;buckets.reis.tickets++;
      if(t.service.includes('DELIVERY'))buckets.reis.deliveries++;
      else if(t.service.includes('DOUBLE DROP'))buckets.reis.doubleDrops++;
      else if(t.service.includes('EMPTY'))buckets.reis.empties++;
    } else {buckets.walkin.tons+=t.tons;buckets.walkin.tickets++;}
  }

  // Revenue pass — scan for tip fee rates and rolloff service fees
  let revCode2 = null, parentCode2 = null;
  const revStack2 = [];
  for (let i = 0; i < rows.length; i++) {
    const vals = rows[i];
    const nonEmpty = vals.filter(v => v && v.trim());
    if (!nonEmpty.length) continue;
    const first = nonEmpty[0];
    const isHdr = first.includes(' - ') && !first.includes('Totals') && !first.includes('Tickets:')
      && !first.includes('TIPFEES') && !first.includes('ROLLOFFS') && !first.includes('No Order')
      && !first.startsWith('Page ') && !first.includes('Date Range') && first.trim()!=='Date' && !first.includes('Report');
    const isTot = first.includes(' - ') && first.includes('Totals') && !first.includes('TIPFEES') && !first.includes('Non Order');
    if (isHdr) { const c=first.split(' - ')[0].trim(); revStack2.push(c); revCode2=c; parentCode2=revStack2.length>1?revStack2[0]:null; }
    if (isTot) { const c=first.split(' - ')[0].trim(); const idx=revStack2.lastIndexOf(c); if(idx!==-1)revStack2.splice(idx,1); revCode2=revStack2.length>0?revStack2[revStack2.length-1]:null; parentCode2=revStack2.length>1?revStack2[0]:null; }
    const rc = (parentCode2 && parentCode2.startsWith('ZZ')) ? parentCode2 : revCode2;
    if (!rc) continue;
    const flatUpper = vals.join(' ').toUpperCase();
    const dataVals = vals.filter(v => v!==null && v!=='' && v!==undefined);

    // Tip fee revenue
    if (flatUpper.includes('REIS SITE TRANSFER FEE')) {
      const fi = dataVals.findIndex(v => v && v.includes('REIS SITE TRANSFER FEE'));
      if (fi!==-1 && fi+2<dataVals.length) {
        const ticket=dataVals[1]||'?';
        const net=parseFloat(dataVals[fi+2])||0;
        const rateStr=dataVals[fi+3]||'';
        const rateMatch=rateStr.match(/\$([0-9.]+)/);
        if (rateMatch && tickets[ticket]) {
          const rev=net*parseFloat(rateMatch[1]);
          const tc=tickets[ticket].code, svc=tickets[ticket].service;
          if (!tc.startsWith('ZZ') && svc!==null) buckets.reis.tipRevenue+=rev;
        }
      }
    }
    // Rolloff service fees (Reis only, not ZZ)
    for (const kw of IRR_ROLLOFF_SVC) {
      if (flatUpper.includes(kw) && !rc.startsWith('ZZ')) {
        for (let j=dataVals.length-1;j>=0;j--) {
          const amt=parseFloat(dataVals[j]);
          if (!isNaN(amt) && amt>0) { buckets.reis.rolloffFees+=amt; break; }
        }
        break;
      }
    }
  }

  return {date:reportDate, buckets, tickets};
}

function irrFmtDate(dateStr) {
  if(!dateStr) return 'Today';
  const d=new Date(dateStr);
  return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}
function irrFmt(n,dec=2){return n.toFixed(dec);}
function irrFmtMoney(n){return '$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}

function irrGenerateEmail(data, ytd2026, ytd2025, vin2026, vin2025) {
  const {date, buckets} = data;

  const subject = 'IRR Scale Report \u2014 '+(date||'Today');

  const R=(label,val,bold=false)=>`<tr>
    <td style="padding:3px 0;color:#222;font-size:14px;${bold?'font-weight:bold;':''}">${label}</td>
    <td style="padding:3px 0;color:#222;font-size:14px;text-align:right;${bold?'font-weight:bold;':''}">${val}</td></tr>`;

    ${H('IRR Companies')}
    ${R('Reis Rolloff',reis.tickets+' tickets &nbsp; '+irrFmt(reis.tons)+' tons')}
    ${R('Pile Pickups (Reis)',pile.tickets+' tickets &nbsp; '+irrFmt(pile.tons)+' tons')}
    ${R('Island Rubbish',island.tickets+' tickets &nbsp; '+irrFmt(island.tons)+' tons')}
    ${R('East End',santos.tickets+' tickets &nbsp; '+irrFmt(santos.tons)+' tons')}
    ${H('External')}
    ${R('Walk-In / Drive-Through',walkin.tickets+' tickets &nbsp; '+irrFmt(walkin.tons)+' tons')}
    ${S()}
    <tr>
      <td style="padding:4px 0;font-weight:bold;font-size:14px;color:#000;border-top:2px solid #000;">Total</td>
      <td style="padding:4px 0;font-weight:bold;font-size:14px;color:#000;text-align:right;border-top:2px solid #000;">${totalTickets} tickets &nbsp; ${irrFmt(totalTons)} tons</td>
    </tr>
    ${S()}
    ${R('Rev / Load (Rolloff)',reis.tickets>0 ? irrFmtMoney((reis.tipRevenue+reis.rolloffFees)/reis.tickets) : '--')}
    ${R('Tons / Load (Rolloff)',reis.tickets>0 ? irrFmt(reis.tons/reis.tickets) : '--')}
    ${H('Vinagro Output (Outbound)')}
    ${R('Loads',vinagro.tickets)}
    ${R('Total Tons',irrFmt(vinagro.tons))}
    ${H('Year-to-Date Comparison')}
    ${R('2026 Inbound YTD',irrFmt(ytd2026)+' tons',true)}
    ${R('2025 Inbound YTD (same period)',irrFmt(ytd2025)+' tons')}
    ${S()}
    ${R('2026 Vinagro YTD',irrFmt(vin2026)+' tons',true)}
    ${R('2025 Vinagro YTD (same period)',irrFmt(vin2025)+' tons')}
  </table></div>`;

  return {subject, body};
}

async function irrLoadYTD() {
  const {data:seeds} = await db.from('irr_ytd_seeds').select('*');
  let ytd2026=0, ytd2025=0, vin2026=0, vin2025=0;
  if(seeds){
    for(const s of seeds){
      if(s.year===2026){ ytd2026=parseFloat(s.inbound_tons)||0; vin2026=parseFloat(s.vinagro_tons)||0; }
      if(s.year===2025){ ytd2025=parseFloat(s.inbound_tons)||0; vin2025=parseFloat(s.vinagro_tons)||0; }
    }
  }
  // Add all daily reports after seed date for 2026
  const seed2026 = seeds?.find(s=>s.year===2026);
  if(seed2026){
    const {data:dailies} = await db.from('irr_reports').select('total_inbound_tons,vinagro_tons').gt('report_date',seed2026.through_date);
    if(dailies) for(const d of dailies){ ytd2026+=parseFloat(d.total_inbound_tons)||0; vin2026+=parseFloat(d.vinagro_tons)||0; }
  }
  return {ytd2026, ytd2025, vin2026, vin2025};
}

async function irrSaveReport(data) {
  const {date, buckets} = data;
  if(!date) return;
  const parts = date.split('/');
  const isoDate = parts[2]+'-'+parts[0].padStart(2,'0')+'-'+parts[1].padStart(2,'0');
  const {reis,pile,island,santos,vinagro,walkin} = buckets;
  const totalTons = reis.tons+pile.tons+island.tons+santos.tons+walkin.tons;
  const totalTickets = reis.tickets+pile.tickets+island.tickets+santos.tickets+walkin.tickets;

  const row = {
    report_date: isoDate,
    reis_tons: reis.tons, reis_tickets: reis.tickets,
    reis_deliveries: reis.deliveries||0, reis_empties: reis.empties||0, reis_double_drops: reis.doubleDrops||0,
    reis_tip_revenue: reis.tipRevenue||0, reis_svc_revenue: reis.rolloffFees||0,
    pile_tons: pile.tons, pile_tickets: pile.tickets,
    island_tons: island.tons, island_tickets: island.tickets,
    santos_tons: santos.tons, santos_tickets: santos.tickets,
    walkin_tons: walkin.tons, walkin_tickets: walkin.tickets,
    vinagro_tons: vinagro.tons, vinagro_loads: vinagro.tickets,
    total_inbound_tons: totalTons, total_inbound_tickets: totalTickets,
  };
  const {error} = await db.from('irr_reports').upsert(row, {onConflict:'report_date'});
  if(error) console.error('IRR save error:', error);
}
