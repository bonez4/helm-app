function irrGetDateRange(range, customStart, customEnd) {
  const today = new Date();
  today.setHours(0,0,0,0);
  let start;
  if(range==='wtd') { start=new Date(today); start.setDate(today.getDate()-today.getDay()); }
  else if(range==='mtd') { start=new Date(today.getFullYear(),today.getMonth(),1); }
  else if(range==='30d') { start=new Date(today); start.setDate(today.getDate()-30); }
  else if(range==='ytd') { start=new Date(today.getFullYear(),0,1); }
  else if(range==='custom' && customStart) { start=new Date(customStart+'T00:00:00'); }
  else { start=new Date(today); start.setDate(today.getDate()-7); }
  const end = (range==='custom' && customEnd) ? new Date(customEnd+'T00:00:00') : today;
  const fmt=d=>d.toISOString().split('T')[0];
  return {start:fmt(start), end:fmt(end)};
}

async function irrLoadDashboard() {
  const container = document.getElementById('irrDashContent');
  container.innerHTML = '<div style="padding:20px;color:var(--gray-400);font-size:12px;">Loading...</div>';

  const {data,error} = await db.from('irr_reports').select('*').order('report_date',{ascending:true});
  if(error){container.innerHTML='<div style="color:var(--err-text)">Error loading data</div>';return;}
  irrDashData = data||[];

  // Ensure Island/East End revenue is calculated for all rows (covers pre-rate historical data)
  const rates = await irrLoadRates();
  const ir = rates?.island, er = rates?.eastend;
  for(const d of irrDashData){
    if(ir && !(parseFloat(d.island_revenue)>0) && (d.island_tickets||0)>0){
      d.island_revenue = (ir.hook_fee*(d.island_tickets||0)) + ((ir.per_ton*(1+(ir.ton_markup||0)))*(parseFloat(d.island_tons)||0));
    }
    if(er && !(parseFloat(d.santos_revenue)>0) && (d.santos_tickets||0)>0){
      d.santos_revenue = (er.hook_fee*(d.santos_tickets||0)) + ((er.per_ton*(1+(er.ton_markup||0)))*(parseFloat(d.santos_tons)||0));
    }
  }

  irrRenderDashboard();
}

// Rolloff helpers (global scope — used by dashboard, chart, and report generator)
function allLoads(d){return (d.reis_tickets||0)+(d.island_tickets||0)+(d.santos_tickets||0);}
function allTons(d){return (parseFloat(d.reis_tons)||0)+(parseFloat(d.island_tons)||0)+(parseFloat(d.santos_tons)||0);}
function allRev(d){return (parseFloat(d.reis_tip_revenue)||0)+(parseFloat(d.reis_svc_revenue)||0)+(parseFloat(d.island_revenue)||0)+(parseFloat(d.santos_revenue)||0);}

// Company-specific helpers (driven by irrCompanyFilter)
function cLoads(d){
  if(irrCompanyFilter==='reis') return d.reis_tickets||0;
  if(irrCompanyFilter==='island') return d.island_tickets||0;
  if(irrCompanyFilter==='eastend') return d.santos_tickets||0;
  return allLoads(d);
}
function cTons(d){
  if(irrCompanyFilter==='reis') return parseFloat(d.reis_tons)||0;
  if(irrCompanyFilter==='island') return parseFloat(d.island_tons)||0;
  if(irrCompanyFilter==='eastend') return parseFloat(d.santos_tons)||0;
  return allTons(d);
}
function cRev(d){
  if(irrCompanyFilter==='reis') return (parseFloat(d.reis_tip_revenue)||0)+(parseFloat(d.reis_svc_revenue)||0);
  if(irrCompanyFilter==='island') return parseFloat(d.island_revenue)||0;
  if(irrCompanyFilter==='eastend') return parseFloat(d.santos_revenue)||0;
  return allRev(d);
}
function irrSetCompany(c){irrCompanyFilter=c;irrRenderDashboard();}

}

}

function irrDrawChart(filtered) {

  if(!ctx) return;
  if(irrChart){irrChart.destroy();irrChart=null;}

  const labels = filtered.map(d=>d.report_date);
  const datasets = [];

  const cClr = IRR_COMPANY_COLORS[irrCompanyFilter]||IRR_COMPANY_COLORS.all;

  if(irrToggles.revPerLoad){
    datasets.push({
      label:'Rev / Load ($)',
      data:filtered.map(d=>{
        const t=cLoads(d);
        return t>0?cRev(d)/t:null;
      }),
      borderColor:IRR_COLORS.revPerLoad, backgroundColor:IRR_COLORS.revPerLoad+'20',
      tension:0.3, pointRadius:3, borderWidth:2, yAxisID:'y',
    });
  }
  if(irrToggles.tonsPerLoad){
    datasets.push({
      label:'Tons / Load',
      data:filtered.map(d=>{

      }),

      }),
      borderColor:IRR_COLORS.hoursPerLoad, backgroundColor:IRR_COLORS.hoursPerLoad+'20',
      tension:0.3, pointRadius:3, borderWidth:2, yAxisID:'y2',

      tension:0.3, pointRadius:3, borderWidth:2, yAxisID:'y3',

  if(irrCompanyFilter==='all' && irrToggles.reisLoads){
    datasets.push({
      label:'Reis Loads',
      data:filtered.map(d=>d.reis_tickets||0),

    datasets.push({
      label:'Island Loads',
      data:filtered.map(d=>d.island_tickets||0),
      borderColor:IRR_COLORS.islandLoads, backgroundColor:IRR_COLORS.islandLoads+'20',
      tension:0.3, pointRadius:3, borderWidth:2, yAxisID:'y3',

      tension:0.3, pointRadius:3, borderWidth:2, yAxisID:'y3',

      ticks:{font:{size:10,family:"'DM Sans',sans-serif"},color:'#9aa3b5',maxRotation:45},

    scales.y={
      position:'left', title:{display:true,text:'Rev / Load ($)',font:{size:10,family:"'DM Sans',sans-serif"},color:IRR_COLORS.revPerLoad},
      ticks:{font:{size:10},color:IRR_COLORS.revPerLoad, callback:v=>'$'+v.toFixed(0)},
      grid:{color:'rgba(0,0,0,0.04)'}, border:{display:false},

      ticks:{font:{size:10},color:IRR_COLORS.tonsPerLoad},
      grid:{display:false}, border:{display:false},

  if(irrToggles.hoursPerLoad){

          bodyFont:{family:"'DM Mono',monospace",size:11}, cornerRadius:6, padding:10,

async function irrSaveHours() {
  const dateVal = document.getElementById('irrHoursDate').value;
  const hoursVal = parseFloat(document.getElementById('irrHoursVal').value);
  if(!dateVal||isNaN(hoursVal)){toast('Enter a valid date and hours');return;}

  // Check if report exists for this date
  const {data:existing} = await db.from('irr_reports').select('report_date').eq('report_date',dateVal).single();
  if(existing){
    // Update existing
    const {error} = await db.from('irr_reports').update({driver_hours:hoursVal}).eq('report_date',dateVal);
    if(error){toast('Error saving: '+error.message);return;}
  } else {
    // Insert minimal row with just hours
    const {error} = await db.from('irr_reports').insert({report_date:dateVal,driver_hours:hoursVal});
    if(error){toast('Error saving: '+error.message);return;}
  }
  toast('Driver hours saved for '+dateVal,true);
  document.getElementById('irrHoursVal').value='';
  // Refresh dashboard data
  const {data} = await db.from('irr_reports').select('*').order('report_date',{ascending:true});
  irrDashData=data||[];
  irrRenderDashboard();
}

// ── Period Report Generator ───────────────────────────────────────────

function irrGenerateReport() {
  const {start,end} = irrGetDateRange(irrDashRange,
    document.getElementById('irrCustomStart')?.value,
    document.getElementById('irrCustomEnd')?.value);
  const filtered = irrDashData.filter(d=>d.report_date>=start && d.report_date<=end && allLoads(d)>0);
  if(!filtered.length){toast('No data in selected range');return;}

  let totalLoads=0,totalTons=0,totalRev=0,totalHours=0,hoursCount=0;
  for(const d of filtered){
    totalLoads+=allLoads(d);
    totalTons+=allTons(d);
    totalRev+=allRev(d);
    if(d.driver_hours!=null){totalHours+=parseFloat(d.driver_hours)||0;hoursCount++;}
  }
  const avgRev=totalLoads>0?(totalRev/totalLoads):0;
  const avgTons=totalLoads>0?(totalTons/totalLoads):0;
  const avgHours=(totalLoads>0&&hoursCount>0)?(totalHours/totalLoads):0;

  const fmtD=iso=>{const d=new Date(iso+'T00:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});};
  const fmtFull=iso=>{const d=new Date(iso+'T00:00:00');return d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});};
  const f2=n=>n.toFixed(2);
  const fM=n=>'$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});

  let tableRows='';
  for(const d of filtered){
    const loads=allLoads(d);
    const tons=allTons(d);
    const rev=allRev(d);
    const rpl=loads>0?fM(rev/loads):'--';
    const tpl=loads>0?f2(tons/loads):'--';
    const hpl=(loads>0&&d.driver_hours!=null)?f2(parseFloat(d.driver_hours)/loads):'--';
    tableRows+=`<tr>
      <td>${fmtD(d.report_date)}</td><td>${loads}</td><td>${f2(tons)}</td>
      <td>${fM(rev)}</td><td>${rpl}</td><td>${tpl}</td><td>${hpl}</td></tr>`;
  }
  tableRows+=`<tr class="rpt-total">
    <td>Total / Avg</td><td>${totalLoads}</td><td>${f2(totalTons)}</td>
    <td>${fM(totalRev)}</td><td>${fM(avgRev)}</td><td>${f2(avgTons)}</td><td>${avgHours>0?f2(avgHours):'--'}</td></tr>`;

  // Build week-over-week summary using ALL data for prior-week lookback
  const allByDate={};
  for(const d of irrDashData){
    if(allLoads(d)>0) allByDate[d.report_date]=d;
  }

  // Group filtered data into ISO weeks (Mon-Sun)
  function getWeekStart(iso){
    const d=new Date(iso+'T00:00:00');
    const day=d.getDay();
    const diff=d.getDate()-day+(day===0?-6:1); // Monday
    const mon=new Date(d);mon.setDate(diff);
    return mon.toISOString().split('T')[0];
  }

  const weekMap={};
  for(const d of filtered){
    const ws=getWeekStart(d.report_date);
    if(!weekMap[ws]) weekMap[ws]={tons:0,rev:0,loads:0,days:0};
    weekMap[ws].tons+=allTons(d);
    weekMap[ws].rev+=allRev(d);
    weekMap[ws].loads+=allLoads(d);
    weekMap[ws].days++;
  }
  // Also compute prior weeks from all data for WoW calc
  const allWeekMap={};
  for(const d of irrDashData){
    if(allLoads(d)<=0) continue;
    const ws=getWeekStart(d.report_date);
    if(!allWeekMap[ws]) allWeekMap[ws]={tons:0,rev:0,loads:0,days:0};
    allWeekMap[ws].tons+=allTons(d);
    allWeekMap[ws].rev+=allRev(d);
    allWeekMap[ws].loads+=allLoads(d);
    allWeekMap[ws].days++;
  }

  const weekKeys=Object.keys(weekMap).sort();
  function getPriorWeek(ws){
    const d=new Date(ws+'T00:00:00');d.setDate(d.getDate()-7);
    return d.toISOString().split('T')[0];
  }
  function pctChange(curr,prev){
    if(!prev||prev===0) return '--';
    const pct=((curr-prev)/prev)*100;
    const sign=pct>0?'+':'';
    return sign+pct.toFixed(1)+'%';
  }

  const fmtWeek=ws=>{
    const s=new Date(ws+'T00:00:00');
    const e=new Date(s);e.setDate(s.getDate()+6);
    return fmtD(ws)+' - '+fmtD(e.toISOString().split('T')[0]);
  };

  let wowRows='';
  for(const ws of weekKeys){
    const w=weekMap[ws];
    const pw=allWeekMap[getPriorWeek(ws)];
    const tonsWoW=pw?pctChange(w.tons,pw.tons):'--';
    const revWoW=pw?pctChange(w.rev,pw.rev):'--';
    const lpd=w.days>0?(w.loads/w.days).toFixed(1):'--';
    const pwLpd=pw&&pw.days>0?(pw.loads/pw.days):0;
    const lpdWoW=(pw&&pw.days>0&&w.days>0)?pctChange(w.loads/w.days,pwLpd):'--';
    wowRows+=`<tr>
      <td>${fmtWeek(ws)}</td><td>${w.loads}</td><td>${f2(w.tons)}</td><td>${tonsWoW}</td>
      <td>${fM(w.rev)}</td><td>${revWoW}</td><td>${lpd}</td><td>${lpdWoW}</td></tr>`;
  }

  const reportHTML=`
    <h1>Rolloff Performance Report</h1>
    <div class="rpt-period">${fmtFull(start)} — ${fmtFull(end)}</div>
    <div class="rpt-kpi-row">
      <div class="rpt-kpi"><div class="rpt-kpi-label">Avg Rev / Load</div><div class="rpt-kpi-val">${fM(avgRev)}</div></div>
      <div class="rpt-kpi"><div class="rpt-kpi-label">Avg Tons / Load</div><div class="rpt-kpi-val">${f2(avgTons)}</div></div>
      <div class="rpt-kpi"><div class="rpt-kpi-label">Avg Hours / Load</div><div class="rpt-kpi-val">${avgHours>0?f2(avgHours):'--'}</div></div>
      <div class="rpt-kpi"><div class="rpt-kpi-label">Total Loads</div><div class="rpt-kpi-val">${totalLoads}</div></div>
      <div class="rpt-kpi"><div class="rpt-kpi-label">Total Revenue</div><div class="rpt-kpi-val">${fM(totalRev)}</div></div>

// ── Historical bulk import ─────────────────────────────────────────────

function irrParseBulk(rows) {
  // Same parsing logic as irrParseReport, but tags each ticket with its date
  // then groups by date to produce daily report rows
  const tickets = {};
  let currentCode = null, parentCode = null;
  const codeStack = [];
  let lastDate = null;

  for (let i = 0; i < rows.length; i++) {
    const vals = rows[i];
    const nonEmpty = vals.filter(v => v && v.trim());
    if (!nonEmpty.length) continue;
    const first = nonEmpty[0];
    const isHeader = first.includes(' - ') && !first.includes('Totals') && !first.includes('Tickets:')
      && !first.includes('TIPFEES') && !first.includes('ROLLOFFS') && !first.includes('No Order')
      && !first.startsWith('Page ') && !first.includes('Date Range') && first.trim()!=='Date' && !first.includes('Report');
    const isTotals = first.includes(' - ') && first.includes('Totals') && !first.includes('TIPFEES') && !first.includes('Non Order');

    if (isHeader) { const c=first.split(' - ')[0].trim(); codeStack.push(c); currentCode=c; parentCode=codeStack.length>1?codeStack[0]:null; }
    if (isTotals) { const c=first.split(' - ')[0].trim(); const idx=codeStack.lastIndexOf(c); if(idx!==-1)codeStack.splice(idx,1); currentCode=codeStack.length>0?codeStack[codeStack.length-1]:null; parentCode=codeStack.length>1?codeStack[0]:null; }

    const effectiveCode = (parentCode && parentCode.startsWith('ZZ')) ? parentCode : currentCode;
    if (!effectiveCode) continue;
    const flatUpper = vals.join(' ').toUpperCase();
    const dataVals = vals.filter(v => v!==null && v!=='' && v!==undefined);

    // Track date from rows — date appears as M/D/YYYY in data values
    for (const v of dataVals) {
      const dm = v.match(/^(\d{1,2}\/\d{1,2}\/\d{4})$/);
      if (dm) { lastDate = dm[1]; break; }
    }

    if (flatUpper.includes('REIS SITE TRANSFER FEE')) {
      const fi = dataVals.findIndex(v => v && v.includes('REIS SITE TRANSFER FEE'));
      if (fi!==-1 && fi+2<dataVals.length) {
        const ticket=dataVals[1]||'?', net=parseFloat(dataVals[fi+2])||0;
        if(!tickets[ticket]) tickets[ticket]={tons:0,service:null,code:effectiveCode,date:lastDate,tipRev:0};
        tickets[ticket].tons+=net;
        if(!tickets[ticket].service) tickets[ticket].code=effectiveCode;
        if(!tickets[ticket].date) tickets[ticket].date=lastDate;
        // Revenue
        const rateStr=dataVals[fi+3]||'';
        const rateMatch=rateStr.match(/\$([0-9.]+)/);
        if(rateMatch) tickets[ticket].tipRev=net*parseFloat(rateMatch[1]);
      }
    }
    for (const kw of IRR_ROLLOFF_SVC) {
      if (flatUpper.includes(kw)) {
        const ticket=dataVals[1]||'?';
        if(!tickets[ticket]) tickets[ticket]={tons:0,service:null,code:effectiveCode,date:lastDate,tipRev:0};
        tickets[ticket].service=kw; tickets[ticket].code=effectiveCode;
        if(!tickets[ticket].date) tickets[ticket].date=lastDate;
        // Service fee amount
        let svcFee=0;
        if(!effectiveCode.startsWith('ZZ')){
          for(let j=dataVals.length-1;j>=0;j--){
            const amt=parseFloat(dataVals[j]);
            if(!isNaN(amt)&&amt>0){svcFee=amt;break;}
          }
        }
        tickets[ticket].svcFee=(tickets[ticket].svcFee||0)+svcFee;
        break;
      }
    }
  }

  // Group tickets by date
  const dailyMap = {};
  for (const [tn,t] of Object.entries(tickets)) {
    const dt = t.date;
    if(!dt) continue;
    if(!dailyMap[dt]) dailyMap[dt]={
      reis:{tons:0,tickets:0,tipRev:0,svcFees:0,deliveries:0,empties:0,doubleDrops:0},
      pile:{tons:0,tickets:0}, island:{tons:0,tickets:0}, santos:{tons:0,tickets:0},
      vinagro:{tons:0,tickets:0}, walkin:{tons:0,tickets:0},
    };
    const b=dailyMap[dt], c=t.code;
    if(c==='ZZISLAND'){b.island.tons+=t.tons;b.island.tickets++;}
    else if(c==='ZZEASTEND'){b.santos.tons+=t.tons;b.santos.tickets++;}
    else if(c==='ZZDELTA'){b.pile.tons+=t.tons;b.pile.tickets++;}
    else if(c==='ZZREIS'){b.vinagro.tons+=t.tons;b.vinagro.tickets++;}
    else if(c.startsWith('ZZ')){b.walkin.tons+=t.tons;b.walkin.tickets++;}
    else if(t.service!==null){
      b.reis.tons+=t.tons;b.reis.tickets++;b.reis.tipRev+=t.tipRev||0;b.reis.svcFees+=t.svcFee||0;
      if(t.service.includes('DELIVERY'))b.reis.deliveries++;
      else if(t.service.includes('DOUBLE DROP'))b.reis.doubleDrops++;
      else if(t.service.includes('EMPTY'))b.reis.empties++;
    } else {b.walkin.tons+=t.tons;b.walkin.tickets++;}
  }

  // Convert to array of DB rows
  const dbRows = [];
  for (const [dateStr,b] of Object.entries(dailyMap)) {
    const parts=dateStr.split('/');
    const isoDate=parts[2]+'-'+parts[0].padStart(2,'0')+'-'+parts[1].padStart(2,'0');
    const totalTons=b.reis.tons+b.pile.tons+b.island.tons+b.santos.tons+b.walkin.tons;
    const totalTickets=b.reis.tickets+b.pile.tickets+b.island.tickets+b.santos.tickets+b.walkin.tickets;
    dbRows.push({
      report_date:isoDate,
      reis_tons:b.reis.tons, reis_tickets:b.reis.tickets,
      reis_deliveries:b.reis.deliveries, reis_empties:b.reis.empties, reis_double_drops:b.reis.doubleDrops,
      reis_tip_revenue:b.reis.tipRev, reis_svc_revenue:b.reis.svcFees,
      pile_tons:b.pile.tons, pile_tickets:b.pile.tickets,
      island_tons:b.island.tons, island_tickets:b.island.tickets, island_revenue:0,
      santos_tons:b.santos.tons, santos_tickets:b.santos.tickets, santos_revenue:0,
      walkin_tons:b.walkin.tons, walkin_tickets:b.walkin.tickets,
      vinagro_tons:b.vinagro.tons, vinagro_loads:b.vinagro.tickets,
      total_inbound_tons:totalTons, total_inbound_tickets:totalTickets,
    });
  }
  dbRows.sort((a,b)=>a.report_date.localeCompare(b.report_date));
  return {ticketCount:Object.keys(tickets).length, days:dbRows};
}

async function irrHandleBulk(file) {
  if(!file) return;
  const status = document.getElementById('irrBulkStatus');
  status.style.display='block';
  status.textContent='Reading '+file.name+'...';

  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      status.textContent='Parsing historical data...';
      const rows = irrParseSpreadsheetML(e.target.result);
      status.textContent='Parsed '+rows.length+' rows, grouping by date...';
      const result = irrParseBulk(rows);

      // Calculate Island/East End revenue from rates
      const rates = await irrLoadRates();
      const ir = rates.island, er = rates.eastend;
      for (const d of result.days) {
        if (ir) d.island_revenue = (ir.hook_fee*(d.island_tickets||0)) + ((ir.per_ton*(1+(ir.ton_markup||0)))*(parseFloat(d.island_tons)||0));
        if (er) d.santos_revenue = (er.hook_fee*(d.santos_tickets||0)) + ((er.per_ton*(1+(er.ton_markup||0)))*(parseFloat(d.santos_tons)||0));
      }

      status.textContent=result.ticketCount+' tickets across '+result.days.length+' days. Saving...';

      // Upsert in batches
      const batchSize=100;
      let saved=0;
      for(let i=0;i<result.days.length;i+=batchSize){
        const chunk=result.days.slice(i,i+batchSize);
        const {error}=await db.from('irr_reports').upsert(chunk,{onConflict:'report_date'});
        if(error){status.textContent='Error at batch '+(i/batchSize+1)+': '+error.message;return;}
        saved+=chunk.length;
        status.textContent='Saved '+saved+' / '+result.days.length+' days...';
      }

      status.textContent='Import complete: '+result.days.length+' days, '+result.ticketCount+' tickets.';
      toast(result.days.length+' days of historical data imported',true);
      irrLoadHistoryView();
    } catch(err) {
      status.textContent='Error: '+err.message;
      console.error(err);
    }
  };
  reader.readAsText(file);
}

async function irrHandleFile(file) {
  if(!file) return;

    }
  };
  reader.readAsText(file);
}

async function irrViewHistorical(isoDate) {
  const {data,error} = await db.from('irr_reports').select('*').eq('report_date',isoDate).single();
  if(error||!data){toast('Could not load report');return;}

  // Reconstruct buckets from stored data
  const buckets = {
    reis:{label:'Reis Rolloff',tons:parseFloat(data.reis_tons),tickets:data.reis_tickets,deliveries:data.reis_deliveries,empties:data.reis_empties,doubleDrops:data.reis_double_drops,tipRevenue:parseFloat(data.reis_tip_revenue)||0,rolloffFees:parseFloat(data.reis_svc_revenue)||0},
    pile:{label:'Pile Pickups (Reis)',tons:parseFloat(data.pile_tons),tickets:data.pile_tickets},
    island:{label:'Island Rubbish',tons:parseFloat(data.island_tons),tickets:data.island_tickets,revenue:parseFloat(data.island_revenue)||0},
    santos:{label:'East End',tons:parseFloat(data.santos_tons),tickets:data.santos_tickets,revenue:parseFloat(data.santos_revenue)||0},
    vinagro:{label:'VINAGRO Output',tons:parseFloat(data.vinagro_tons),tickets:data.vinagro_loads},
    walkin:{label:'Walk-In / Drive-Through',tons:parseFloat(data.walkin_tons),tickets:data.walkin_tickets},
  };

  // Always recalculate Island/East End revenue from rates (covers historical data)
  await irrLoadRates();
  irrCalcRevenue(buckets);

  // Convert ISO date to M/D/YYYY for display
  const parts = isoDate.split('-');
  const displayDate = parseInt(parts[1])+'/'+parseInt(parts[2])+'/'+parts[0];
  const reportData = {date: displayDate, buckets, tickets:{}};
  irrCurrentData = reportData;

  const ytd = await irrLoadYTD(displayDate);

  document.getElementById('irrUploadSection').style.display='none';
  document.getElementById('irrReportView').innerHTML = irrRenderReportView(reportData, ytd);
  window._irrEmail = irrGenerateEmail(reportData, ytd);

  // Scroll to top of report
  document.getElementById('tab-irr').scrollIntoView({behavior:'smooth'});
}

function filesSwitchView(view) {

  document.getElementById('filesSubPersonal').className = view==='personal'?'active':'';

}

async function filesLoadFolders() {
  let q = db.from('helm_folders').select('*').eq('scope', filesActiveView);
  if (filesActiveView === 'personal') {
    q = q.eq('owner', currentUser.username);
  }
  const {data, error} = await q.order('name', {ascending:true});
  if (error) { toast('Folder load error: '+error.message); return; }
  filesFolders = data || [];
  filesRenderFolderList();
  // Auto-select first folder
  if (filesFolders.length > 0 && !filesActiveFolderId) {
    filesSelectFolder(filesFolders[0].id);
  } else if (filesFolders.length === 0) {
    document.getElementById('filesMainTitle').textContent = 'No folders yet';
    document.getElementById('filesMainContent').innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--gray-400);font-size:13px;">Create a folder to start uploading files.</div>';
    document.getElementById('filesUploadBtn').style.display = 'none';
  }
}

function filesRenderFolderList() {
  const container = document.getElementById('filesFolderList');
  if (!filesFolders.length) {
    container.innerHTML = '<div class="files-empty">No folders yet.</div>';
    return;
  }
  container.innerHTML = filesFolders.map(f =>
    `<div class="files-folder-item ${f.id===filesActiveFolderId?'active':''}" onclick="filesSelectFolder('${f.id}')">
      <span class="files-folder-name">${esc(f.name)}</span>
      <button class="files-folder-del" onclick="event.stopPropagation();filesDeleteFolder('${f.id}','${esc(f.name)}')" title="Delete folder">&times;</button>
    </div>`).join('');
}

async function filesCreateFolder() {
  const name = prompt('New folder name:');
  if (!name || !name.trim()) return;
  const row = {
    name: name.trim(),
    scope: filesActiveView,
    owner: filesActiveView==='personal' ? currentUser.username : null,
    created_by: currentUser.username,
  };
  const {data, error} = await db.from('helm_folders').insert(row).select().single();
  if (error) { toast('Create folder error: '+error.message); return; }
  toast('Folder created', true);
  await filesLoadFolders();
  if (data) filesSelectFolder(data.id);
}

async function filesDeleteFolder(id, name) {
  if (!confirm('Delete folder "'+name+'" and all files inside it? This cannot be undone.')) return;

  // Fetch files in folder to delete from storage
  const {data:files} = await db.from('helm_files').select('storage_path').eq('folder_id', id);
  if (files && files.length > 0) {
    const paths = files.map(f => f.storage_path);
    const {error:sErr} = await db.storage.from('helm-files').remove(paths);
    if (sErr) { toast('Storage delete error: '+sErr.message); return; }
  }

  // Delete folder (cascade will remove helm_files rows)
  const {error} = await db.from('helm_folders').delete().eq('id', id);
  if (error) { toast('Delete folder error: '+error.message); return; }
  toast('Folder deleted', true);
  if (filesActiveFolderId === id) filesActiveFolderId = null;
  filesLoadFolders();
}

async function filesSelectFolder(id) {
  filesActiveFolderId = id;
  filesRenderFolderList();
  const folder = filesFolders.find(f => f.id === id);
  if (!folder) return;
  document.getElementById('filesMainTitle').textContent = folder.name;
  document.getElementById('filesUploadBtn').style.display = '';
  await filesLoadFiles(id);
}

async function filesLoadFiles(folderId) {
  const {data, error} = await db.from('helm_files').select('*').eq('folder_id', folderId).order('uploaded_at', {ascending:false});
  if (error) { toast('File load error: '+error.message); return; }
  filesList = data || [];
  filesRenderFileList();
}

function filesFormatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  if (bytes < 1024*1024*1024) return (bytes/(1024*1024)).toFixed(1) + ' MB';
  return (bytes/(1024*1024*1024)).toFixed(2) + ' GB';
}

function filesFormatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}) + ' ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}

function filesRenderFileList() {
  const container = document.getElementById('filesMainContent');
  if (!filesList.length) {
    container.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--gray-400);font-size:13px;">No files yet. Click Upload to add one.</div>';
    return;
  }
  let rows = '';
  for (const f of filesList) {
    rows += `<tr>
      <td>
        <div class="files-name">${esc(f.filename)}</div>
        <div class="files-meta">Uploaded by ${esc(f.uploaded_by)}</div>
      </td>
      <td>${filesFormatSize(f.size_bytes)}</td>
      <td>${filesFormatDate(f.uploaded_at)}</td>
      <td>
        <button class="files-action-btn" onclick="filesDownload('${f.id}')">Download</button>
        <button class="files-action-btn danger" onclick="filesDeleteFile('${f.id}','${esc(f.filename)}')">Delete</button>
      </td>
    </tr>`;
  }
  container.innerHTML = `
    <table class="files-table">
      <thead><tr><th>Name</th><th>Size</th><th>Uploaded</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

async function filesHandleUpload(fileList) {
  if (!filesActiveFolderId) { toast('Select a folder first'); return; }
  if (!fileList || !fileList.length) return;

  const status = document.getElementById('filesStatus');
  status.className = 'files-status active';

  let uploaded = 0;
  for (const file of fileList) {
    status.textContent = 'Uploading '+file.name+' ('+(uploaded+1)+'/'+fileList.length+')...';

    // Generate storage path: folderId/timestamp-filename
    const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
    const storagePath = filesActiveFolderId + '/' + Date.now() + '-' + safeName;

    const {error:sErr} = await db.storage.from('helm-files').upload(storagePath, file, {
      contentType: file.type || 'application/octet-stream',
      upsert: false,
    });
    if (sErr) { status.textContent = 'Upload failed: '+sErr.message; toast('Upload failed'); return; }

    const row = {
      folder_id: filesActiveFolderId,
      filename: file.name,
      storage_path: storagePath,
      size_bytes: file.size,
      mime_type: file.type || null,
      uploaded_by: currentUser.username,
    };
    const {error:dErr} = await db.from('helm_files').insert(row);
    if (dErr) { status.textContent = 'DB insert failed: '+dErr.message; toast('Upload failed'); return; }
    uploaded++;
  }

  status.textContent = uploaded+' file(s) uploaded.';
  setTimeout(()=>{status.className='files-status';},3000);
  toast(uploaded+' file(s) uploaded', true);
  document.getElementById('filesUploadInput').value = '';
  await filesLoadFiles(filesActiveFolderId);
}

async function filesDownload(fileId) {
  const file = filesList.find(f => f.id === fileId);
  if (!file) return;
  const {data, error} = await db.storage.from('helm-files').createSignedUrl(file.storage_path, 300); // 5 min
  if (error) { toast('Download error: '+error.message); return; }
  // Trigger download via anchor with download attribute
  const a = document.createElement('a');
  a.href = data.signedUrl;
  a.download = file.filename;
  a.target = '_blank';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

async function filesDeleteFile(fileId, filename) {
  if (!confirm('Delete "'+filename+'"? This cannot be undone.')) return;
  const file = filesList.find(f => f.id === fileId);
  if (!file) return;

  const {error:sErr} = await db.storage.from('helm-files').remove([file.storage_path]);
  if (sErr) { toast('Storage delete error: '+sErr.message); return; }

  const {error:dErr} = await db.from('helm_files').delete().eq('id', fileId);
  if (dErr) { toast('DB delete error: '+dErr.message); return; }

  toast('File deleted', true);
  await filesLoadFiles(filesActiveFolderId);
}

let cmdState = null;
let cmdActiveSub = 'priorities';
let cmdExpanded = {}; // id -> bool for inline note expansion
let cmdSaveTimers = {}; // key -> timeoutId
let cmdPersistDisabled = false;

function cmdDeepClone(o){ return JSON.parse(JSON.stringify(o)); }

async function cmdLoad(){
  cmdState = cmdDeepClone(CMD_SEED);
  if(!cmdState.plan.startDate) cmdState.plan.startDate = getTodayISO();
  if(cmdPersistDisabled || !currentUser) return;
  try{
    const {data,error} = await db.from('helm_command_state')
      .select('key,data').eq('user_id', currentUser.username);
    if(error){
      cmdPersistDisabled = true;
      console.warn('[Command Center] Persistence disabled. Run this SQL in Supabase:\n\ncreate table if not exists helm_command_state (\n  id bigserial primary key,\n  user_id text not null,\n  key text not null,\n  data jsonb not null default \'{}\'::jsonb,\n  updated_at timestamptz default now(),\n  unique(user_id, key)\n);');
      return;
    }
    if(data && data.length){
      for(const row of data){
        if(cmdState[row.key] && row.data){
          cmdState[row.key] = Object.assign(cmdState[row.key], row.data);
        }
      }
    }
    // Ensure plan start date is set and persisted on first run
    if(!cmdState.plan.startDate){
      cmdState.plan.startDate = getTodayISO();
      cmdSaveNow('plan');
    }
  }catch(e){ cmdPersistDisabled = true; }
}

function cmdSave(key){
  if(cmdSaveTimers[key]) clearTimeout(cmdSaveTimers[key]);
  cmdMarkStatus(key,'saving');
  cmdSaveTimers[key] = setTimeout(()=>cmdSaveNow(key), 450);
}

async function cmdSaveNow(key){
  if(cmdPersistDisabled || !currentUser){ cmdMarkStatus(key,'saved'); return; }
  try{
    const {error} = await db.from('helm_command_state').upsert({
      user_id: currentUser.username,
      key,
      data: cmdState[key],
      updated_at: new Date().toISOString(),
    }, {onConflict:'user_id,key'});
    if(error){ cmdMarkStatus(key,''); return; }
    cmdMarkStatus(key,'saved');
  }catch(e){ cmdMarkStatus(key,''); }
}

function cmdMarkStatus(key,state){
  const el = document.querySelector(`[data-cmd-save="${key}"]`);
  if(!el) return;
  el.className = 'cmd-autosave '+state;
  el.textContent = state==='saving' ? 'Saving…' : state==='saved' ? 'Saved' : '';
  if(state==='saved') setTimeout(()=>{ if(el.classList.contains('saved')) el.textContent=''; }, 1600);
}

function cmdUid(prefix){ return prefix+'-'+Math.random().toString(36).slice(2,9); }

function cmdEsc(s){ return esc(s); }

        </div>

          <div class="cmd-status"><div class="cmd-status-dot"></div><span>${cmdPersistDisabled?'Local only':'Live'}</span></div>

        <button class="${cmdActiveSub==='priorities'?'active':''}" onclick="cmdSwitchSub('priorities')">Priorities</button>

function cmdSwitchSub(sub){
  cmdActiveSub = sub;
  document.querySelectorAll('.cmd-subnav button').forEach((b,i)=>{
    const subs = ['priorities','people','revenue','plan','org'];
    b.classList.toggle('active', subs[i]===sub);
  });
  cmdRenderBody();
}

function cmdRenderBody(){
  const body = document.getElementById('cmdBody');
  if(!body) return;
  if(cmdActiveSub==='priorities') body.innerHTML = cmdRenderPriorities();
  else if(cmdActiveSub==='people') body.innerHTML = cmdRenderPeople();
  else if(cmdActiveSub==='revenue') body.innerHTML = cmdRenderRevenue();
  else if(cmdActiveSub==='plan') body.innerHTML = cmdRenderPlan();
  else if(cmdActiveSub==='org')  body.innerHTML = cmdRenderOrgChart();
}

function cmdRenderPriorities(){
  const p = cmdState.priorities;
  const col = (key,label,cls)=>{
    const items = p[key]||[];
    const cards = items.map(it=>`
      <div class="cmd-card ${it.checked?'checked':''} ${cmdExpanded[it.id]?'expanded':''}" onclick="cmdExpandCard(event,'${it.id}')">
        <button class="cmd-card-del" onclick="event.stopPropagation();cmdDelPriority('${key}','${it.id}')" title="Delete">&times;</button>
        <div class="cmd-card-head">
          <div class="cmd-check ${it.checked?'on':''}" onclick="event.stopPropagation();cmdTogglePriority('${key}','${it.id}')"></div>
          <div class="cmd-card-body">
            <div class="cmd-card-title">${cmdEsc(it.title)}</div>
            ${it.sub?`<div class="cmd-card-sub">${cmdEsc(it.sub)}</div>`:''}
          </div>
        </div>
        <div class="cmd-card-notes" onclick="event.stopPropagation()">
          <div class="cmd-card-notes-lbl">Private notes</div>
          <textarea placeholder="Context, progress, next step…" oninput="cmdEditPriorityNotes('${key}','${it.id}',this.value)">${cmdEsc(it.notes||'')}</textarea>
        </div>
      </div>`).join('');
    return `
      <div class="cmd-col cmd-col-${cls}">
        <div class="cmd-col-hdr">
          <div class="cmd-col-title"><span class="cmd-col-dot"></span>${label}</div>
          <div class="cmd-col-count">${items.filter(i=>!i.checked).length} / ${items.length}</div>
        </div>
        ${cards}
        <button class="cmd-add-btn" onclick="cmdAddPriority('${key}')">+ Add item</button>
      </div>`;
  };
  return `
    <div class="cmd-section-title">Priority Board</div>
    <div class="cmd-section-desc">Action items grouped by urgency. Check to mark complete — progress persists.</div>
    <div class="cmd-grid-3">
      ${col('hot','Hot — Act Now','hot')}
      ${col('soon','Soon — Next 30 Days','soon')}
      ${col('medium','Medium — Strategic','med')}
    </div>
    ${cmdScratchBlock('priorities', p.scratch||'', 'Scratchpad — priorities')}
  `;
}

function cmdExpandCard(e, id){
  cmdExpanded[id] = !cmdExpanded[id];
  const card = e.currentTarget;
  card.classList.toggle('expanded', cmdExpanded[id]);
}
function cmdTogglePriority(group,id){
  const item = (cmdState.priorities[group]||[]).find(i=>i.id===id);
  if(!item) return;
  item.checked = !item.checked;
  cmdSave('priorities');
  cmdRenderBody();
}
function cmdEditPriorityNotes(group,id,val){
  const item = (cmdState.priorities[group]||[]).find(i=>i.id===id);
  if(!item) return;
  item.notes = val;
  cmdSave('priorities');
}
function cmdAddPriority(group){
  const title = prompt('Action item title:');
  if(!title||!title.trim()) return;
  const sub = prompt('Context / subtitle (optional):') || '';
  cmdState.priorities[group].push({id:cmdUid('p-'+group[0]), title:title.trim(), sub:sub.trim(), checked:false, notes:''});
  cmdSave('priorities');
  cmdRenderBody();
}
function cmdDelPriority(group,id){
  if(!confirm('Delete this item?')) return;
  cmdState.priorities[group] = cmdState.priorities[group].filter(i=>i.id!==id);
  cmdSave('priorities');
  cmdRenderBody();
}

// ── PEOPLE ───────────────────────────────────────────────────────────
function cmdRenderPeople(){
  const p = cmdState.people;
  const col = (key,label,cls)=>{
    const items = p[key]||[];
    const cards = items.map(it=>{
      const initials = (it.name||'').split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
      return `
        <div class="cmd-person ${cmdExpanded[it.id]?'expanded':''}" onclick="cmdExpandCard(event,'${it.id}')">
          <button class="cmd-card-del" onclick="event.stopPropagation();cmdDelPerson('${key}','${it.id}')" title="Delete">&times;</button>
          <div class="cmd-person-hdr">
            <div class="cmd-person-avatar">${cmdEsc(initials||'?')}</div>
            <div class="cmd-person-meta">
              <div class="cmd-person-name">${cmdEsc(it.name||'')}</div>
              ${it.role?`<div class="cmd-person-role">${cmdEsc(it.role)}</div>`:''}
            </div>
          </div>
          ${it.status?`<div class="cmd-person-status">${cmdEsc(it.status)}</div>`:''}
          <div class="cmd-card-notes" onclick="event.stopPropagation()">
            <div class="cmd-card-notes-lbl">Private notes</div>
            <textarea placeholder="Observations, latest conversation, next move…" oninput="cmdEditPersonNotes('${key}','${it.id}',this.value)">${cmdEsc(it.notes||'')}</textarea>
          </div>
        </div>`;
    }).join('');
    return `
      <div class="cmd-col cmd-col-${cls}">
        <div class="cmd-col-hdr">
          <div class="cmd-col-title"><span class="cmd-col-dot"></span>${label}</div>
          <div class="cmd-col-count">${items.length}</div>
        </div>
        ${cards}
        <button class="cmd-add-btn" onclick="cmdAddPerson('${key}')">+ Add entry</button>
      </div>`;
  };
  return `
    <div class="cmd-section-title">People &amp; Politics</div>
    <div class="cmd-section-desc">Coalition, friction, and rules of engagement. Click any card to expand private notes.</div>
    <div class="cmd-grid-3">
      ${col('coalition','Coalition','coalition')}
      ${col('friction','Friction','friction')}
      ${col('rules','Rules of Engagement','rules')}
    </div>
    ${cmdScratchBlock('people', p.scratch||'', 'Scratchpad — people')}
  `;
}
function cmdEditPersonNotes(group,id,val){
  const item = (cmdState.people[group]||[]).find(i=>i.id===id);
  if(!item) return;
  item.notes = val;
  cmdSave('people');
}
function cmdAddPerson(group){
  const name = prompt(group==='rules'?'Rule text:':'Name:');
  if(!name||!name.trim()) return;
  const role = prompt(group==='rules'?'Subtext (optional):':'Role / label:') || '';
  const status = group==='rules' ? '' : (prompt('Current status / context:') || '');
  cmdState.people[group].push({id:cmdUid('pe-'+group[0]), name:name.trim(), role:role.trim(), status:status.trim(), notes:''});
  cmdSave('people');
  cmdRenderBody();
}
function cmdDelPerson(group,id){
  if(!confirm('Delete this entry?')) return;
  cmdState.people[group] = cmdState.people[group].filter(i=>i.id!==id);
  cmdSave('people');
  cmdRenderBody();
}

// ── REVENUE ──────────────────────────────────────────────────────────
function cmdRenderRevenue(){
  const items = cmdState.revenue.items || [];
  const col = (key,label,cls)=>{
    const list = items.filter(i=>i.status===key);
    const cards = list.map(it=>{
      const nextStatus = key==='idea'?'progress':key==='progress'?'done':null;
      const prevStatus = key==='done'?'progress':key==='progress'?'idea':null;
      return `
        <div class="cmd-rev-card ${cmdExpanded[it.id]?'expanded':''}" onclick="cmdExpandCard(event,'${it.id}')">
          <button class="cmd-card-del" onclick="event.stopPropagation();cmdDelRevenue('${it.id}')" title="Delete">&times;</button>
          <div class="cmd-rev-title">${cmdEsc(it.title)}</div>
          ${it.desc?`<div class="cmd-rev-desc">${cmdEsc(it.desc)}</div>`:''}
          <div class="cmd-card-notes" onclick="event.stopPropagation()">
            <div class="cmd-card-notes-lbl">Private notes</div>
            <textarea placeholder="Progress, blockers, numbers…" oninput="cmdEditRevenueNotes('${it.id}',this.value)">${cmdEsc(it.notes||'')}</textarea>
          </div>
          <div class="cmd-rev-move" onclick="event.stopPropagation()">
            ${prevStatus?`<button onclick="cmdMoveRevenue('${it.id}','${prevStatus}')">← ${prevStatus==='idea'?'Idea':'In Progress'}</button>`:''}
            ${nextStatus?`<button onclick="cmdMoveRevenue('${it.id}','${nextStatus}')">${nextStatus==='progress'?'In Progress':'Done'} →</button>`:''}
          </div>
        </div>`;
    }).join('');
    return `
      <div class="cmd-col cmd-col-${cls}">
        <div class="cmd-col-hdr">
          <div class="cmd-col-title"><span class="cmd-col-dot"></span>${label}</div>
          <div class="cmd-col-count">${list.length}</div>
        </div>
        ${cards}
        ${key==='idea'?'<button class="cmd-add-btn" onclick="cmdAddRevenue()">+ Add opportunity</button>':''}
      </div>`;
  };
  return `
    <div class="cmd-section-title">Revenue Opportunities</div>
    <div class="cmd-section-desc">Open ideas moving through the pipeline. Click to expand; use arrows to advance.</div>
    <div class="cmd-kanban">
      ${col('idea','Idea','idea')}
      ${col('progress','In Progress','progress')}
      ${col('done','Done','done')}
    </div>
    ${cmdScratchBlock('revenue', cmdState.revenue.scratch||'', 'Scratchpad — revenue')}
  `;
}
function cmdMoveRevenue(id,newStatus){
  const item = cmdState.revenue.items.find(i=>i.id===id);
  if(!item) return;
  item.status = newStatus;
  cmdSave('revenue');
  cmdRenderBody();
}
function cmdEditRevenueNotes(id,val){
  const item = cmdState.revenue.items.find(i=>i.id===id);
  if(!item) return;
  item.notes = val;
  cmdSave('revenue');
}
function cmdAddRevenue(){
  const title = prompt('Opportunity title:');
  if(!title||!title.trim()) return;
  const desc = prompt('Description (optional):') || '';
  cmdState.revenue.items.push({id:cmdUid('r'), title:title.trim(), desc:desc.trim(), status:'idea', notes:''});
  cmdSave('revenue');
  cmdRenderBody();
}
function cmdDelRevenue(id){
  if(!confirm('Delete this opportunity?')) return;
  cmdState.revenue.items = cmdState.revenue.items.filter(i=>i.id!==id);
  cmdSave('revenue');
  cmdRenderBody();
}

// ── 90-DAY PLAN ──────────────────────────────────────────────────────
function cmdRenderPlan(){
  const plan = cmdState.plan;
  if(!plan.startDate) plan.startDate = getTodayISO();
  const phases = plan.phases.map((phase,idx)=>{
    const milestones = (phase.milestones||[]).map(m=>{
      const dateISO = cmdAddDays(plan.startDate, m.day-1);
      const label = fmtDate(dateISO);
      const calUrl = cmdCalendarUrl(m.title, dateISO);
      return `
        <div class="cmd-milestone ${m.checked?'checked':''}">
          <div class="cmd-check ${m.checked?'on':''}" onclick="cmdToggleMilestone('${phase.key}','${m.id}')"></div>
          <div class="cmd-milestone-body">
            <div class="cmd-milestone-title">${cmdEsc(m.title)}</div>
            <div class="cmd-milestone-date">Day ${m.day} · ${label}</div>
          </div>
          <a class="cmd-milestone-cal" href="${calUrl}" target="_blank" rel="noopener" title="Add to Google Calendar">📅</a>
        </div>`;
    }).join('');
    return `
      <div class="cmd-phase">
        <div class="cmd-phase-marker">${idx+1}</div>
        <div class="cmd-phase-body">
          <div class="cmd-phase-days">${phase.days}</div>
          <div class="cmd-phase-title">${cmdEsc(phase.title)}</div>
          <div class="cmd-phase-sub">Phase ${idx+1}</div>
          ${milestones}
        </div>
      </div>`;
  }).join('');
  return `
    <div class="cmd-section-title">90-Day Plan</div>
    <div class="cmd-section-desc">Day 1 = ${fmtDate(plan.startDate)}. Each milestone links to a pre-filled Google Calendar event.</div>
    <div class="cmd-timeline">
      <div class="cmd-timeline-track"></div>
      <div class="cmd-phases">${phases}</div>
    </div>
    ${cmdScratchBlock('plan', plan.scratch||'', 'Scratchpad — 90-day plan')}
  `;
}
function cmdToggleMilestone(phaseKey,id){
  const phase = cmdState.plan.phases.find(p=>p.key===phaseKey);
  if(!phase) return;
  const m = phase.milestones.find(x=>x.id===id);
  if(!m) return;
  m.checked = !m.checked;
  cmdSave('plan');
  cmdRenderBody();
}
function cmdAddDays(iso,days){
  const d = new Date(iso+'T00:00:00');
  d.setDate(d.getDate()+days);
  return d.toISOString().split('T')[0];
}
function cmdCalDateStr(iso){
  // Returns YYYYMMDD (all-day Google Cal format)
  return iso.replace(/-/g,'');
}
function cmdCalendarUrl(title,iso){
  const start = cmdCalDateStr(iso);
  const endDate = cmdAddDays(iso,1);
  const end = cmdCalDateStr(endDate);
  const params = new URLSearchParams({
    action:'TEMPLATE',
    text:title,
    dates:`${start}/${end}`,
    details:'HELM Command Center · 90-day plan milestone',
  });
  return 'https://calendar.google.com/calendar/render?'+params.toString();
}

// ── ORG CHART ────────────────────────────────────────────────────────
function cmdRenderOrgChart(){
  const oc = cmdState.orgChart || CMD_SEED.orgChart;
  const groups = (oc.groups||[]).map(g=>{
    const people = (g.people||[]).map(p=>`
      <div class="cmd-org-person">
        <div class="cmd-org-person-name">${cmdEsc(p.name)}</div>
        <div class="cmd-org-person-title">${cmdEsc(p.title||'')}</div>
        ${p.note?`<div class="cmd-org-person-note">${cmdEsc(p.note)}</div>`:''}
      </div>`).join('');
    return `
      <div class="cmd-org-group cmd-org-tone-${g.tone||'teal'}">
        <div class="cmd-org-group-hdr">
          <div class="cmd-org-group-dot"></div>
          <div class="cmd-org-group-label">${cmdEsc(g.label)}</div>
        </div>
        <div class="cmd-org-people">${people}</div>
      </div>`;
  }).join('');
  return `
    <div class="cmd-section-title">Org Chart — Target State</div>
    <div class="cmd-section-desc">The structure to propose at day 90. Backed by 60 days of results. Reference view — not editable here.</div>
    <div class="cmd-org-wrap">${groups}</div>
    ${cmdScratchBlock('orgChart', oc.scratch||'', 'Scratchpad — org chart')}
  `;
}

// ── SCRATCHPAD ───────────────────────────────────────────────────────
function cmdScratchBlock(key, value, label){
  return `
    <div class="cmd-scratch">
      <div class="cmd-scratch-lbl">${label}<span class="cmd-autosave" data-cmd-save="${key}"></span></div>
      <textarea placeholder="Freeform notes — autosaves as you type." oninput="cmdEditScratch('${key}',this.value)">${cmdEsc(value)}</textarea>
    </div>`;
}
function cmdEditScratch(key,val){
  if(!cmdState[key]) return;
  cmdState[key].scratch = val;
  cmdSave(key);
}

// ── TOAST ─────────────────────────────────────────────────────────────
function toast(msg,ok=false){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show'+(ok?' ok':'');
  clearTimeout(t._to);
  t._to=setTimeout(()=>t.classList.remove('show'),2600);
}

// ── BOOT ──────────────────────────────────────────────────────────────
const _saved = sessionStorage.getItem('helm_auth');
if(_saved && _saved !== '1'){
  try{
    currentUser = JSON.parse(_saved);
    hide('loginScreen'); show('appScreen');
    document.getElementById('appScreen').style.flexDirection='column';
    document.getElementById('topbarUser').textContent = currentUser.display_name;
    if(currentUser.role==='admin') document.getElementById('importTabBtn').style.display='';
    if(currentUser.username==='david'||currentUser.role==='admin') {
      document.getElementById('irrTabBtn').style.display='';
      document.getElementById('filesTabBtn').style.display='';
    }
    if(currentUser.username==='david'){
      document.getElementById('cmdTabBtn').style.display='';
    }
    startHeartbeat();
    init().catch(err=>{
      toast('Connection error — please refresh');
      console.error('Init failed:',err);
    });
  }catch(e){ sessionStorage.removeItem('helm_auth'); }
}
