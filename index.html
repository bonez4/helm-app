      Bottom 6 rows are manual. Enter # of Drivers, ST Hours, and OT Hours \u2014 Total Hours, Hrs/Drvr, and Hrs/Load auto-calculate. You can override any derived cell. Saved per week, shared across all users.
    </div>
  `;
  container.innerHTML = html;

  // Store daily loads on window for crcExport + recalc
  window._crcDaily = daily;
  window._crcTotals = {rev:totRev, loads:totLoads, tons:totTons, daysWithData};

  // Initial derived render
  crcRefreshDerived();
}

function crcOnManualInput(input){
  const field = input.dataset.field;
  const idx = parseInt(input.dataset.idx);
  const val = input.value.trim();
  if(!crcManualCache[crcWeekStart]) crcManualCache[crcWeekStart] = {};
  if(!crcManualCache[crcWeekStart][field]) crcManualCache[crcWeekStart][field] = {};
  if(val === '') delete crcManualCache[crcWeekStart][field][idx];
  else crcManualCache[crcWeekStart][field][idx] = val;
  crcRefreshDerived();
  crcDebouncedSave(crcWeekStart);
}

function crcRefreshDerived(){
  const manual = crcManualCache[crcWeekStart] || {};
  const daily = window._crcDaily || [];
  const f2 = n => (n===null||n===undefined||isNaN(n))?'':n.toFixed(2);

  const get = (field, idx) => {
    if(!manual[field]) return NaN;
    const v = parseFloat(manual[field][idx]);
    return isNaN(v) ? NaN : v;
  };

  let sumDrv=0, nDrv=0, sumST=0, sumOT=0, sumTH=0, nTH=0;
  for(let i=0;i<6;i++){
    const drv = get('drivers',i);
    const st = get('stHours',i);
    const ot = get('otHours',i);
    let th = get('totalHours',i);
    if(isNaN(th)){ const s=(isNaN(st)?0:st)+(isNaN(ot)?0:ot); th = s>0?s:NaN; }
    let hd = get('hrsDrvr',i);
    if(isNaN(hd) && !isNaN(th) && !isNaN(drv) && drv>0) hd = th/drv;
    let hl = get('hrsLoad',i);
    if(isNaN(hl) && !isNaN(th) && daily[i] && daily[i].loads>0) hl = th/daily[i].loads;

    document.getElementById('crc-th-'+i).textContent = f2(th);
    document.getElementById('crc-hd-'+i).textContent = f2(hd);
    document.getElementById('crc-hl-'+i).textContent = f2(hl);

    if(!isNaN(drv)){sumDrv+=drv; nDrv++;}
    if(!isNaN(st)) sumST+=st;
    if(!isNaN(ot)) sumOT+=ot;
    if(!isNaN(th)){sumTH+=th; nTH++;}
  }
  const totals = window._crcTotals || {loads:0};
  document.getElementById('crc-tot-drivers').textContent = nDrv>0?sumDrv.toLocaleString():'';
  document.getElementById('crc-tot-st').textContent = sumST>0?sumST.toFixed(2):'';
  document.getElementById('crc-tot-ot').textContent = sumOT>0?sumOT.toFixed(2):'';
  document.getElementById('crc-tot-th').textContent = sumTH>0?sumTH.toFixed(2):'';
  document.getElementById('crc-tot-hd').textContent = (sumDrv>0&&sumTH>0)?(sumTH/sumDrv).toFixed(2):'';
  document.getElementById('crc-tot-hl').textContent = (totals.loads>0&&sumTH>0)?(sumTH/totals.loads).toFixed(2):'';
}

function crcChangeWeek(delta){
  const d = new Date(crcWeekStart+'T00:00:00');
  d.setDate(d.getDate()+delta*7);
  crcWeekStart = d.toISOString().split('T')[0];
  crcLoadReport();
}
function crcJumpToWeek(dateStr){
  crcWeekStart = crcGetMonday(new Date(dateStr+'T00:00:00'));
  crcLoadReport();
}

function crcExport(){
  const table = document.getElementById('crcTable');
  if(!table) return;
  // Clone, replace inputs with their values, strip spacer columns
  const clone = table.cloneNode(true);
  clone.querySelectorAll('input').forEach(inp => {
    const txt = document.createTextNode(inp.value||'');
    inp.parentNode.replaceChild(txt, inp);
  });
  clone.querySelectorAll('.icr-spacer').forEach(el => el.remove());
  const html = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="UTF-8"><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet><x:Name>Consolidated Rolloff</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]--></head><body>' + clone.outerHTML + '</body></html>';
  const blob = new Blob(['\ufeff', html], {type:'application/vnd.ms-excel'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'Consolidated_Rolloff_'+crcWeekStart+'.xls';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

let icrQuarter = Math.ceil((new Date().getMonth()+1)/3); // current quarter

async function icrShowQuarterly() {
  const curYear = icrYear;
  const prevYear = curYear - 1;
  const {data:dCur}=await db.from('irr_reports').select('*').gte('report_date',curYear+'-01-01').lte('report_date',curYear+'-12-31').order('report_date');
  const {data:dPrev}=await db.from('irr_reports').select('*').gte('report_date',prevYear+'-01-01').lte('report_date',prevYear+'-12-31').order('report_date');

  await irrLoadRates();
  for(const arr of [dCur||[],dPrev||[]]){
    for(const d of arr){
      const {ir, er} = irrRatesFor(d.report_date);
      if(ir&&!(parseFloat(d.island_revenue)>0)&&(d.island_tickets||0)>0)
        d.island_revenue=(ir.hook_fee*d.island_tickets)+((ir.per_ton*(1+(ir.ton_markup||0)))*parseFloat(d.island_tons||0));
      if(er&&!(parseFloat(d.santos_revenue)>0)&&(d.santos_tickets||0)>0)
        d.santos_revenue=(er.hook_fee*d.santos_tickets)+((er.per_ton*(1+(er.ton_markup||0)))*parseFloat(d.santos_tons||0));
    }
  }

  // Store for charts (use current year for visuals)
  window._icrFullYear26 = dCur||[];
  window._icrFullYear25 = dPrev||[];

  icrRenderQuarterly(dPrev||[], dCur||[]);
}

let icrQCharts = [];
function icrDestroyQCharts(){icrQCharts.forEach(c=>c.destroy());icrQCharts=[];}

function icrRenderQuarterly(dPrev, dCur) {
  const d25=dPrev, d26=dCur; // alias for compatibility
  const q = icrQuarter;
  const qMonths = [(q-1)*3+1, (q-1)*3+2, (q-1)*3+3];
  const monthNames = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const qLabel = 'Q'+q;

  function monthlyByCompany(data, months) {
    const result = {};
    for(const m of months) result[m] = {reis:{loads:0,tons:0,rev:0},island:{loads:0,tons:0,rev:0},santos:{loads:0,tons:0,rev:0},total:{loads:0,tons:0,rev:0},vinagro:{loads:0,tons:0},walkin:{loads:0,tons:0,rev:0},days:0};
    for(const d of data) {
      const m = parseInt(d.report_date.substring(5,7));
      if(!months.includes(m)) continue;
      const r=result[m];
      r.reis.loads+=d.reis_tickets||0; r.reis.tons+=parseFloat(d.reis_tons)||0; r.reis.rev+=(parseFloat(d.reis_tip_revenue)||0)+(parseFloat(d.reis_svc_revenue)||0);
      r.island.loads+=d.island_tickets||0; r.island.tons+=parseFloat(d.island_tons)||0; r.island.rev+=parseFloat(d.island_revenue)||0;
      r.santos.loads+=d.santos_tickets||0; r.santos.tons+=parseFloat(d.santos_tons)||0; r.santos.rev+=parseFloat(d.santos_revenue)||0;
      r.total.loads+=allLoads(d); r.total.tons+=allTons(d); r.total.rev+=allRev(d);
      r.vinagro.loads+=d.vinagro_loads||0; r.vinagro.tons+=parseFloat(d.vinagro_tons)||0;
      r.walkin.loads+=d.walkin_tickets||0; r.walkin.tons+=parseFloat(d.walkin_tons)||0; r.walkin.rev+=parseFloat(d.walkin_tip_revenue)||0;
      r.days++;
    }
    return result;
  }

  const cur = monthlyByCompany(d26, qMonths);
  const prev = monthlyByCompany(d25, qMonths);

  function qTotal(data, months, company) {
    const r={loads:0,tons:0,rev:0};
    for(const m of months){const c=data[m]?.[company]; if(c){r.loads+=c.loads;r.tons+=c.tons;r.rev+=c.rev;}}

  }

  const f2=n=>n.toFixed(2);
  const fM=n=>'$'+n.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});

    }
    function yoyRow(lbl, curV, prevV, fmt) {

    }
    function fullRow(lbl, valFn, numFn) {
      let cells='';
      for(const m of qMonths) cells+=`<td>${valFn(cur[m]?.[company],m)}</td>`;
      cells+=`<td style="font-weight:700">${valFn(curQ,0)}</td><td class="icr-spacer"></td>`;
      for(const m of qMonths) cells+=`<td>${valFn(prev[m]?.[company],m)}</td>`;
      cells+=`<td style="font-weight:700">${valFn(prevQ,0)}</td><td class="icr-spacer"></td>`;
      cells+=yoyRow(lbl, numFn(curQ), numFn(prevQ));

    const hdrCls = isTotal ? 'icr-total-hdr' : 'icr-company-hdr';

    html+=fullRow('Loads', c=>c?c.loads||'--':'--', c=>c.loads);

      const curQDays=qMonths.reduce((s,m)=>(cur[m]?.days||0)+s,0);

      const curAvg=curQDays>0?(curQ.loads/curQDays):0;

      let cells='';

      for(const m of qMonths){const days=prev[m]?.days||0;const c=prev[m]?.[company];cells+='<td>'+(c&&days>0?(c.loads/days).toFixed(1):'--')+'</td>';}

      return '<tr><td>Loads/Day</td>'+cells+'</tr>';

  // Store data for re-render on quarter change

  const overlay=document.createElement('div');

          <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:#888;margin-bottom:12px;">Rolloff vs Walk-In — Tonnage</div>
          <div style="display:flex;gap:8px;justify-content:center;" id="qcRvWTonsPies"></div>

  function mkBar(id,datasets,yLabel,yCb){

    icrQCharts.push(c);
  }
  function mkArea(id,ds){
    const c=new Chart(document.getElementById(id),{type:'line',data:{labels,datasets:ds},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{position:'top',labels:{font:{size:10},usePointStyle:true}}},scales:{y:{stacked:true,ticks:{font:{size:10}},grid:{color:'rgba(0,0,0,0.04)'}},x:{ticks:{font:{size:10}},grid:{display:false}}}}});

  const lineDs=(label,color,valFn)=>({label,data:activeMonths.map(m=>fy[m]?valFn(fy[m]):null),borderColor:color,backgroundColor:color+'20',tension:0.3,pointRadius:3,borderWidth:2});
  const barDs=(label,color,valFn)=>({label,data:activeMonths.map(m=>fy[m]?valFn(fy[m]):0),backgroundColor:color+'cc',borderColor:color,borderWidth:1});

  // Rev/Load line chart
  mkLine('qcRevLoad',[
    lineDs('Reis',rC,m=>m.reis.loads>0?m.reis.rev/m.reis.loads:null),
    lineDs('Island',iC,m=>m.island.loads>0?m.island.rev/m.island.loads:null),
    lineDs('East End',sC,m=>m.santos.loads>0?m.santos.rev/m.santos.loads:null),
  ],'$/Load',v=>'$'+v);

  // Total Rev/Mo stacked bar
  mkBar('qcTotalRev',[
    barDs('Reis',rC,m=>m.reis.rev),barDs('Island',iC,m=>m.island.rev),barDs('East End',sC,m=>m.santos.rev),
  ],'Revenue',v=>'$'+(v/1000).toFixed(0)+'k');

  // Loads/Day line chart
  mkLine('qcLoadsDay',[
    lineDs('Reis',rC,m=>m.days>0?m.reis.loads/m.days:null),
    lineDs('Island',iC,m=>m.days>0?m.island.loads/m.days:null),
    lineDs('East End',sC,m=>m.days>0?m.santos.loads/m.days:null),
  ],'Loads/Day');

  // Loads/Mo stacked bar
  mkBar('qcLoadsMo',[
    barDs('Reis',rC,m=>m.reis.loads),barDs('Island',iC,m=>m.island.loads),barDs('East End',sC,m=>m.santos.loads),
  ],'Loads');

  // Tons/Load line chart — fixed y-axis centered at 1.6, step 0.5
  (()=>{
    const c=new Chart(document.getElementById('qcTonsLoad'),{type:'line',data:{labels,datasets:[
      lineDs('Reis',rC,m=>m.reis.loads>0?m.reis.tons/m.reis.loads:null),
      lineDs('Island',iC,m=>m.island.loads>0?m.island.tons/m.island.loads:null),
      lineDs('East End',sC,m=>m.santos.loads>0?m.santos.tons/m.santos.loads:null),
    ]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{position:'top',labels:{font:{size:10},usePointStyle:true}}},scales:{y:{min:0.6,max:2.6,title:{display:true,text:'Tons/Load',font:{size:10}},ticks:{font:{size:10},stepSize:0.5},grid:{color:'rgba(0,0,0,0.04)'}},x:{ticks:{font:{size:10}},grid:{display:false}}}}});
    icrQCharts.push(c);
  })();

  // Tons/Mo stacked bar
  mkBar('qcTonsMo',[
    barDs('Reis',rC,m=>m.reis.tons),barDs('Island',iC,m=>m.island.tons),barDs('East End',sC,m=>m.santos.tons),
  ],'Tons');

  // Rolloff vs Walk-in — Pie charts per month
  function mkPieRow(containerId, valFn) {
    const container = document.getElementById(containerId);
    let html = '';
    for (const m of activeMonths) {
      const d=fy[m];
      const rv=d?valFn(d,'rolloff'):0, wv=d?valFn(d,'walkin'):0;
      const total=rv+wv;
      const rPct=total>0?(rv/total*100).toFixed(0):'--';
      const wPct=total>0?(wv/total*100).toFixed(0):'--';
      const isRev=containerId.includes('Rev');
      const fv=v=>isRev?'$'+Math.round(v).toLocaleString():v.toFixed(0);
      html += `<div style="text-align:center;flex:1;max-width:160px;">
        <div style="font-size:10px;font-weight:600;color:#444;margin-bottom:4px;">${mNames[m-1]}</div>
        <canvas id="${containerId}_${m}" height="110"></canvas>
        <div style="font-size:10px;margin-top:6px;line-height:1.6;">
          <div style="color:#2e7d32;font-weight:600;">Rolloff: ${fv(rv)} (${rPct}%)</div>
          <div style="color:#1565C0;font-weight:600;">Walk-In: ${fv(wv)} (${wPct}%)</div>
        </div>
      </div>`;
    }
    container.innerHTML = html;
    for (const m of activeMonths) {
      const d = fy[m];
      if (!d) continue;
      const rv = valFn(d, 'rolloff'), wv = valFn(d, 'walkin');
      if (rv === 0 && wv === 0) continue;
      const c = new Chart(document.getElementById(containerId + '_' + m), {
        type: 'doughnut',
        data: {
          labels: ['Rolloffs', 'Walk-ins'],
          datasets: [{ data: [rv, wv], backgroundColor: ['#2e7d32cc', '#1565C0cc'], borderWidth: 1, borderColor: '#fff' }]
        },
        options: {
          responsive: true, maintainAspectRatio: true,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: function(ctx) {
                  const total = rv + wv;
                  const pct = total > 0 ? (ctx.raw / total * 100).toFixed(0) + '%' : '--';
                  return ctx.label + ': ' + (containerId.includes('Rev') ? '$' + ctx.raw.toLocaleString('en-US', { maximumFractionDigits: 0 }) : ctx.raw.toFixed(1) + ' tons') + ' (' + pct + ')';
                }
              }
            }
          }
        }
      });
      icrQCharts.push(c);
    }
  }
  mkPieRow('qcRvWTonsPies', (d, type) => type === 'rolloff' ? d.total.tons : d.walkin.tons);
  mkPieRow('qcRvWRevPies', (d, type) => type === 'rolloff' ? d.total.rev : d.walkin.rev);
}

// Projection assumptions (editable by user)
let icrProjAssumptions = null;
let icrProjData = null;

function icrDefaultAssumptions(m25, m26, total25) {
  // Derive growth rates from YoY comparison (first 3 months of data)
  function yoyGrowth(company,field25,field26){
    let s25=0,s26=0;
    for(let m=1;m<=3;m++){
      if(m25[m]) s25+=m25[m][company]||0;
      if(m26[m]) s26+=m26[m][company]||0;
    }
    return s25>0?((s26-s25)/s25):0;
  }
  const reisGr=yoyGrowth('reisLoads','reisLoads','reisLoads');
  const islandGr=yoyGrowth('islandLoads','islandLoads','islandLoads');
  const santosGr=yoyGrowth('santosLoads','santosLoads','santosLoads');

  // Seasonal indices from 2025
  const seasonIdx={};
  const totalLoads25=Object.values(m25).reduce((a,m)=>a+(m.totalLoads||0),0)||1;
  for(let m=1;m<=12;m++) seasonIdx[m]=m25[m]?(m25[m].totalLoads/totalLoads25)*12:1;

  return {
    reis:{label:'Reis',annualGrowth:Math.round(reisGr*100)||3,taperMonth:0,taperTo:0},
    island:{label:'Island Rubbish',annualGrowth:Math.round(islandGr*100)||15,taperMonth:7,taperTo:3},
    santos:{label:'East End',annualGrowth:Math.round(santosGr*100)||0,taperMonth:0,taperTo:0},
    seasonIdx,
    rateChangeDate:'2026-04-15',
    rateChangePct:0,
    operatingDaysPerMonth:[0,22,20,22,22,22,26,27,26,26,22,21,18], // index 1-12, derived from 2025
  };
}

async function icrShowProjections() {
  const {data:d26}=await db.from('irr_reports').select('*').gte('report_date','2026-01-01').lte('report_date','2026-12-31').order('report_date');
  const {data:d25}=await db.from('irr_reports').select('*').gte('report_date','2025-01-01').lte('report_date','2025-12-31').order('report_date');

  await irrLoadRates();
  for(const arr of [d25||[],d26||[]]){
    for(const d of arr){
      const {ir, er} = irrRatesFor(d.report_date);
      if(ir&&!(parseFloat(d.island_revenue)>0)&&(d.island_tickets||0)>0)
        d.island_revenue=(ir.hook_fee*d.island_tickets)+((ir.per_ton*(1+(ir.ton_markup||0)))*parseFloat(d.island_tons||0));
      if(er&&!(parseFloat(d.santos_revenue)>0)&&(d.santos_tickets||0)>0)
        d.santos_revenue=(er.hook_fee*d.santos_tickets)+((er.per_ton*(1+(er.ton_markup||0)))*parseFloat(d.santos_tons||0));
    }
  }

  // Group by month per company
  function monthlyAgg(data){
    const months={};
    for(const d of (data||[])){
      const m=parseInt(d.report_date.substring(5,7));
      if(!months[m]) months[m]={totalLoads:0,totalTons:0,totalRev:0,days:0,
        reisLoads:0,reisTons:0,reisRev:0,islandLoads:0,islandTons:0,islandRev:0,santosLoads:0,santosTons:0,santosRev:0};
      const o=months[m];
      o.reisLoads+=d.reis_tickets||0;o.reisTons+=parseFloat(d.reis_tons)||0;o.reisRev+=(parseFloat(d.reis_tip_revenue)||0)+(parseFloat(d.reis_svc_revenue)||0);
      o.islandLoads+=d.island_tickets||0;o.islandTons+=parseFloat(d.island_tons)||0;o.islandRev+=parseFloat(d.island_revenue)||0;
      o.santosLoads+=d.santos_tickets||0;o.santosTons+=parseFloat(d.santos_tons)||0;o.santosRev+=parseFloat(d.santos_revenue)||0;
      o.totalLoads+=allLoads(d);o.totalTons+=allTons(d);o.totalRev+=allRev(d);o.days++;
    }
    return months;
  }

  const m25=monthlyAgg(d25), m26=monthlyAgg(d26);
  icrProjData={m25,m26};

  // Initialize assumptions from data if not set
  let total25={loads:0,tons:0,rev:0};
  for(let m=1;m<=12;m++){if(m25[m]){total25.loads+=m25[m].totalLoads;total25.tons+=m25[m].totalTons;total25.rev+=m25[m].totalRev;}}

  if(!icrProjAssumptions) icrProjAssumptions=icrDefaultAssumptions(m25,m26,total25);
  icrRenderProjections(m25,m26,total25);
}

function icrRenderProjections(m25,m26,total25) {
  const a=icrProjAssumptions;
  const monthNames=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const today=new Date();
  const curMonth=today.getMonth()+1;
  const target={loads:Math.round(total25.loads*1.5),tons:total25.tons*1.5,rev:total25.rev*1.5};

  // Seasonal weights from 2025
  const weights={};
  for(let m=1;m<=12;m++) weights[m]=m25[m]?(m25[m].totalLoads/total25.loads):1/12;

  // Company-level growth rate for a given month (with tapering)
  function compGrowth(comp, month) {
    const c=a[comp];
    if(!c) return 0;
    const base=c.annualGrowth/100;
    if(c.taperMonth>0 && month>=c.taperMonth){
      const taperBase=c.taperTo/100;
      const fadeMonths=12-c.taperMonth;
      const progress=Math.min(1,(month-c.taperMonth)/Math.max(fadeMonths,1));
      return base+(taperBase-base)*progress;
    }
    return base;
  }

  const fM=n=>'$'+n.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
  const fT=n=>n.toLocaleString('en-US',{minimumFractionDigits:1,maximumFractionDigits:1});

  let annualProj={loads:0,tons:0,rev:0};
  let tableRows='';

  for(let m=1;m<=12;m++){
    const isActual = m26[m] && m < curMonth;
    const isPartial = m === curMonth;
    const actual = m26[m]||{totalLoads:0,totalTons:0,totalRev:0,days:0};

    let loads,tons,rev,cls;
    if(isActual){
      loads=actual.totalLoads;tons=actual.totalTons;rev=actual.totalRev;cls='actual';
    } else {
      // Project using 2025 base × (1 + weighted company growth) × seasonal
      const base25=m25[m]||{reisLoads:0,reisTons:0,reisRev:0,islandLoads:0,islandTons:0,islandRev:0,santosLoads:0,santosTons:0,santosRev:0};
      const rG=1+compGrowth('reis',m), iG=1+compGrowth('island',m), sG=1+compGrowth('santos',m);
      const pLoads=Math.round(base25.reisLoads*rG + base25.islandLoads*iG + base25.santosLoads*sG);
      const pTons=base25.reisTons*rG + base25.islandTons*iG + base25.santosTons*sG;
      const rateMult = (a.rateChangePct && m>=4) ? (1+a.rateChangePct/100) : 1;
      const pRev=(base25.reisRev*rG + base25.islandRev*iG + base25.santosRev*sG)*rateMult;

      if(isPartial){
        // Blend: actual days so far + projected remaining
        const pctComplete=actual.days>0?actual.days/(a.operatingDaysPerMonth[m]||22):0;
        loads=Math.round(actual.totalLoads + pLoads*(1-pctComplete));
        tons=actual.totalTons + pTons*(1-pctComplete);
        rev=actual.totalRev + pRev*(1-pctComplete);
        cls='projected';
      } else {
        loads=pLoads;tons=pTons;rev=pRev;cls='projected';
      }
    }
    annualProj.loads+=loads;annualProj.tons+=tons;annualProj.rev+=rev;

    const tgtLoads=Math.round(target.loads*weights[m]);
    const tgtRev=target.rev*weights[m];
    const pct=tgtLoads>0?((loads/tgtLoads)*100).toFixed(0)+'%':'--';
    const prior=m25[m]?m25[m].totalLoads:'--';

    tableRows+=`<tr class="${cls}">
      <td>${monthNames[m-1]}${isPartial?' *':''}</td>
      <td>${prior}</td>
      <td>${loads}</td><td>${fT(tons)}</td><td>${fM(rev)}</td>
      <td class="target">${tgtLoads}</td><td class="target">${fM(tgtRev)}</td>
      <td>${pct}</td>
    </tr>`;
  }

  const pctAnnual=target.loads>0?((annualProj.loads/target.loads)*100).toFixed(0)+'%':'--';
  tableRows+=`<tr class="annual-total">
    <td>Full Year</td><td>${total25.loads}</td>
    <td>${annualProj.loads}</td><td>${fT(annualProj.tons)}</td><td>${fM(annualProj.rev)}</td>
    <td class="target">${target.loads}</td><td class="target">${fM(target.rev)}</td>
    <td>${pctAnnual}</td>
  </tr>`;

  // Assumptions panel
  function inputRow(lbl, id, val, unit) {
    return `<div style="display:flex;align-items:center;gap:8px;margin:4px 0;">
      <span style="width:180px;font-size:12px;color:#444;">${lbl}</span>
      <input type="number" id="${id}" value="${val}" style="width:70px;font-size:12px;padding:4px 6px;border:1px solid #ddd;border-radius:4px;text-align:right;" step="1">
      <span style="font-size:11px;color:#888;">${unit}</span>
    </div>`;
  }

  const existingOverlay=document.getElementById('icrProjOverlay');
  if(existingOverlay) existingOverlay.remove();

  const overlay=document.createElement('div');
  overlay.className='irr-report-overlay';
  overlay.id='icrProjOverlay';
  overlay.onclick=function(e){if(e.target===overlay)overlay.remove();};
  overlay.innerHTML=`<div class="irr-report-modal" style="max-width:960px;">
    <div class="irr-report-toolbar">
      <button class="rpt-print" onclick="window.print()">Print</button>
      <button class="rpt-close" onclick="document.getElementById('icrProjOverlay').remove()">Close</button>
    </div>
    <div class="irr-report-body">
      <h1>Rolloff Growth Projection — 2026</h1>
      <div class="rpt-period">Target: 50% increase over 2025 (${total25.loads.toLocaleString()} &rarr; ${target.loads.toLocaleString()} loads)</div>
      <div class="rpt-period" style="margin-bottom:20px;">Projections use 2025 monthly actuals as base, adjusted by per-company growth rates and seasonal patterns. * = partial month.</div>

      <div class="rpt-kpi-row">
        <div class="rpt-kpi"><div class="rpt-kpi-label">Projected Full Year</div><div class="rpt-kpi-val">${annualProj.loads.toLocaleString()}</div><div style="font-size:11px;color:#888">loads</div></div>
        <div class="rpt-kpi"><div class="rpt-kpi-label">Target</div><div class="rpt-kpi-val">${target.loads.toLocaleString()}</div><div style="font-size:11px;color:#888">loads</div></div>
        <div class="rpt-kpi"><div class="rpt-kpi-label">Projected Revenue</div><div class="rpt-kpi-val">${fM(annualProj.rev)}</div></div>
        <div class="rpt-kpi"><div class="rpt-kpi-label">On Track</div><div class="rpt-kpi-val">${pctAnnual}</div></div>
      </div>

      <table class="icr-proj-table">
        <thead><tr><th>Month</th><th>2025 Actual</th><th>2026 Proj</th><th>Tons</th><th>Revenue</th><th>Target Loads</th><th>Target Rev</th><th>% of Target</th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table>

      <div style="margin-top:28px;padding:20px;border:1px solid #ddd;border-radius:8px;">
        <h2 style="font-size:14px;font-weight:700;margin:0 0 12px;">Assumptions</h2>
        <div style="font-size:11px;color:#666;margin-bottom:12px;">Adjust these values and click "Recalculate" to update the forecast. Growth rates are annual, applied to each month's 2025 base. Taper reduces growth starting at the specified month.</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div>
            <div style="font-size:11px;font-weight:700;color:#000;margin-bottom:6px;">Reis Rolloff</div>
            ${inputRow('Annual Growth Rate','projReisGr',a.reis.annualGrowth,'%')}
          </div>
          <div>
            <div style="font-size:11px;font-weight:700;color:#000;margin-bottom:6px;">Island Rubbish</div>
            ${inputRow('Annual Growth Rate','projIslandGr',a.island.annualGrowth,'%')}
            ${inputRow('Taper Starting Month','projIslandTaper',a.island.taperMonth,'(0=none)')}
            ${inputRow('Taper To Rate','projIslandTaperTo',a.island.taperTo,'%')}
          </div>
          <div>
            <div style="font-size:11px;font-weight:700;color:#000;margin-bottom:6px;">East End</div>
            ${inputRow('Annual Growth Rate','projSantosGr',a.santos.annualGrowth,'%')}
          </div>
          <div>
            <div style="font-size:11px;font-weight:700;color:#000;margin-bottom:6px;">Pricing</div>
            ${inputRow('Rate Change %','projRateChg',a.rateChangePct,'% (applies Apr+)')}
          </div>
        </div>
        <button onclick="icrRecalcProjections()" style="margin-top:14px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;padding:8px 24px;border:none;border-radius:4px;background:#0f1f3d;color:white;cursor:pointer;">Recalculate</button>
      </div>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}

function icrRecalcProjections() {
  const a=icrProjAssumptions;
  a.reis.annualGrowth=parseFloat(document.getElementById('projReisGr').value)||0;
  a.island.annualGrowth=parseFloat(document.getElementById('projIslandGr').value)||0;
  a.island.taperMonth=parseInt(document.getElementById('projIslandTaper').value)||0;
  a.island.taperTo=parseFloat(document.getElementById('projIslandTaperTo').value)||0;
  a.santos.annualGrowth=parseFloat(document.getElementById('projSantosGr').value)||0;
  a.rateChangePct=parseFloat(document.getElementById('projRateChg').value)||0;

  const m25=icrProjData.m25, m26=icrProjData.m26;
  let total25={loads:0,tons:0,rev:0};
  for(let m=1;m<=12;m++){if(m25[m]){total25.loads+=m25[m].totalLoads;total25.tons+=m25[m].totalTons;total25.rev+=m25[m].totalRev;}}
  icrRenderProjections(m25,m26,total25);
}

function promptCmdPin() {
  const tab = document.getElementById('tab-cmd');
  tab.innerHTML = `
    <div style="max-width:340px;margin:60px auto;text-align:center;">
      <div style="font-size:14px;font-weight:600;color:var(--navy);margin-bottom:16px;">Enter PIN to access Command Center</div>
      <input type="password" id="cmdPinInput" maxlength="10" placeholder="PIN"
        style="font-family:'DM Mono',monospace;font-size:18px;text-align:center;letter-spacing:8px;
        padding:10px 16px;border:1px solid var(--gray-200);border-radius:var(--radius-sm);
        width:160px;outline:none;"
        onkeydown="if(event.key==='Enter')checkCmdPin()">
      <div style="margin-top:12px;">
        <button onclick="checkCmdPin()" style="font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;
          padding:8px 24px;border:none;border-radius:var(--radius-sm);background:var(--navy);color:white;cursor:pointer;">
          Unlock</button>
      </div>
      <div id="cmdPinError" style="font-size:12px;color:var(--err-text);margin-top:10px;display:none;">Incorrect PIN</div>
    </div>`;
  setTimeout(()=>{const el=document.getElementById('cmdPinInput');if(el)el.focus();},100);
}

function checkCmdPin() {
  const val = document.getElementById('cmdPinInput').value;
  if (val === CMD_PIN) {
    cmdUnlocked = true;
    renderCmd();
  } else {
    const err = document.getElementById('cmdPinError');
    err.style.display = 'block';
    document.getElementById('cmdPinInput').value = '';
    document.getElementById('cmdPinInput').focus();
  }
}

let cmdState = null;
let cmdActiveSub = 'priorities';
let cmdExpanded = {}; // id -> bool for inline note expansion
let cmdSaveTimers = {}; // key -> timeoutId
let cmdPersistDisabled = false;

function cmdDeepClone(o){ return JSON.parse(JSON.stringify(o)); }

async function cmdLoad(){
  cmdState = cmdDeepClone(CMD_SEED);
  if(!cmdState.plan.startDate) cmdState.plan.startDate = getTodayISO();
  if(cmdPersistDisabled || !currentUser) return;
  try{
    const {data,error} = await db.from('helm_command_state')
      .select('key,data').eq('user_id', currentUser.username);
    if(error){
      cmdPersistDisabled = true;
      console.warn('[Command Center] Persistence disabled. Run this SQL in Supabase:\n\ncreate table if not exists helm_command_state (\n  id bigserial primary key,\n  user_id text not null,\n  key text not null,\n  data jsonb not null default \'{}\'::jsonb,\n  updated_at timestamptz default now(),\n  unique(user_id, key)\n);');
      return;
    }
    if(data && data.length){
      for(const row of data){
        if(cmdState[row.key] && row.data){
          cmdState[row.key] = Object.assign(cmdState[row.key], row.data);
        }
      }
    }
    // Ensure plan start date is set and persisted on first run
    if(!cmdState.plan.startDate){
      cmdState.plan.startDate = getTodayISO();
      cmdSaveNow('plan');
    }
  }catch(e){ cmdPersistDisabled = true; }
}

function cmdSave(key){
  if(cmdSaveTimers[key]) clearTimeout(cmdSaveTimers[key]);
  cmdMarkStatus(key,'saving');
  cmdSaveTimers[key] = setTimeout(()=>cmdSaveNow(key), 450);
}

async function cmdSaveNow(key){
  if(cmdPersistDisabled || !currentUser){ cmdMarkStatus(key,'saved'); return; }
  try{
    const {error} = await db.from('helm_command_state').upsert({
      user_id: currentUser.username,
      key,
      data: cmdState[key],
      updated_at: new Date().toISOString(),
    }, {onConflict:'user_id,key'});
    if(error){ cmdMarkStatus(key,''); return; }
    cmdMarkStatus(key,'saved');
  }catch(e){ cmdMarkStatus(key,''); }
}

function cmdMarkStatus(key,state){
  const el = document.querySelector(`[data-cmd-save="${key}"]`);
  if(!el) return;
  el.className = 'cmd-autosave '+state;
  el.textContent = state==='saving' ? 'Saving…' : state==='saved' ? 'Saved' : '';
  if(state==='saved') setTimeout(()=>{ if(el.classList.contains('saved')) el.textContent=''; }, 1600);
}

function cmdUid(prefix){ return prefix+'-'+Math.random().toString(36).slice(2,9); }

function cmdEsc(s){ return esc(s); }

async function renderCmd(){
  const tab = document.getElementById('tab-cmd');
  if(!cmdState){
    tab.innerHTML = '<div class="cmd-wrap"><div style="text-align:center;padding:40px;color:rgba(255,255,255,0.5);font-size:13px">Loading command center…</div></div>';
    await cmdLoad();
  }
  tab.innerHTML = `
    <div class="cmd-wrap">
      <div class="cmd-header">
        <div class="cmd-header-left">
          <h1>Command Center</h1>
          <div class="cmd-header-sub">Strategic War Room &nbsp;·&nbsp; Private</div>
        </div>
        <div class="cmd-header-right">
          <div class="cmd-status"><div class="cmd-status-dot"></div><span>${cmdPersistDisabled?'Local only':'Live'}</span></div>
        </div>
      </div>
      <div class="cmd-subnav">
        <button class="${cmdActiveSub==='priorities'?'active':''}" onclick="cmdSwitchSub('priorities')">Priorities</button>
        <button class="${cmdActiveSub==='people'?'active':''}" onclick="cmdSwitchSub('people')">People &amp; Politics</button>
        <button class="${cmdActiveSub==='revenue'?'active':''}" onclick="cmdSwitchSub('revenue')">Revenue</button>
        <button class="${cmdActiveSub==='plan'?'active':''}" onclick="cmdSwitchSub('plan')">90-Day Plan</button>
        <button class="${cmdActiveSub==='org'?'active':''}" onclick="cmdSwitchSub('org')">Org Chart</button>
      </div>
      <div id="cmdBody"></div>
    </div>`;
  cmdRenderBody();
}

function cmdSwitchSub(sub){
  cmdActiveSub = sub;
  document.querySelectorAll('.cmd-subnav button').forEach((b,i)=>{
    const subs = ['priorities','people','revenue','plan','org'];
    b.classList.toggle('active', subs[i]===sub);
  });
  cmdRenderBody();
}

function cmdRenderBody(){
  const body = document.getElementById('cmdBody');
  if(!body) return;
  if(cmdActiveSub==='priorities') body.innerHTML = cmdRenderPriorities();
  else if(cmdActiveSub==='people') body.innerHTML = cmdRenderPeople();
  else if(cmdActiveSub==='revenue') body.innerHTML = cmdRenderRevenue();
  else if(cmdActiveSub==='plan') body.innerHTML = cmdRenderPlan();
  else if(cmdActiveSub==='org')  body.innerHTML = cmdRenderOrgChart();
}

// ── PRIORITIES ───────────────────────────────────────────────────────
function cmdRenderPriorities(){
  const p = cmdState.priorities;
  const col = (key,label,cls)=>{
    const items = p[key]||[];
    const cards = items.map(it=>`
      <div class="cmd-card ${it.checked?'checked':''} ${cmdExpanded[it.id]?'expanded':''}" onclick="cmdExpandCard(event,'${it.id}')">
        <button class="cmd-card-del" onclick="event.stopPropagation();cmdDelPriority('${key}','${it.id}')" title="Delete">&times;</button>
        <div class="cmd-card-head">
          <div class="cmd-check ${it.checked?'on':''}" onclick="event.stopPropagation();cmdTogglePriority('${key}','${it.id}')"></div>
          <div class="cmd-card-body">
            <div class="cmd-card-title">${cmdEsc(it.title)}</div>
            ${it.sub?`<div class="cmd-card-sub">${cmdEsc(it.sub)}</div>`:''}
          </div>
        </div>
        <div class="cmd-card-notes" onclick="event.stopPropagation()">
          <div class="cmd-card-notes-lbl">Private notes</div>
          <textarea placeholder="Context, progress, next step…" oninput="cmdEditPriorityNotes('${key}','${it.id}',this.value)">${cmdEsc(it.notes||'')}</textarea>
        </div>
      </div>`).join('');
    return `
      <div class="cmd-col cmd-col-${cls}">
        <div class="cmd-col-hdr">
          <div class="cmd-col-title"><span class="cmd-col-dot"></span>${label}</div>
          <div class="cmd-col-count">${items.filter(i=>!i.checked).length} / ${items.length}</div>
        </div>
        ${cards}
        <button class="cmd-add-btn" onclick="cmdAddPriority('${key}')">+ Add item</button>
      </div>`;
  };
  return `
    <div class="cmd-section-title">Priority Board</div>
    <div class="cmd-section-desc">Action items grouped by urgency. Check to mark complete — progress persists.</div>
    <div class="cmd-grid-3">
      ${col('hot','Hot — Act Now','hot')}
      ${col('soon','Soon — Next 30 Days','soon')}
      ${col('medium','Medium — Strategic','med')}
    </div>
    ${cmdScratchBlock('priorities', p.scratch||'', 'Scratchpad — priorities')}
  `;
}

function cmdExpandCard(e, id){
  cmdExpanded[id] = !cmdExpanded[id];
  const card = e.currentTarget;
  card.classList.toggle('expanded', cmdExpanded[id]);
}
function cmdTogglePriority(group,id){
  const item = (cmdState.priorities[group]||[]).find(i=>i.id===id);
  if(!item) return;
  item.checked = !item.checked;
  cmdSave('priorities');
  cmdRenderBody();
}
function cmdEditPriorityNotes(group,id,val){
  const item = (cmdState.priorities[group]||[]).find(i=>i.id===id);
  if(!item) return;
  item.notes = val;
  cmdSave('priorities');
}
function cmdAddPriority(group){
  const title = prompt('Action item title:');
  if(!title||!title.trim()) return;
  const sub = prompt('Context / subtitle (optional):') || '';
  cmdState.priorities[group].push({id:cmdUid('p-'+group[0]), title:title.trim(), sub:sub.trim(), checked:false, notes:''});
  cmdSave('priorities');
  cmdRenderBody();
}
function cmdDelPriority(group,id){
  if(!confirm('Delete this item?')) return;
  cmdState.priorities[group] = cmdState.priorities[group].filter(i=>i.id!==id);
  cmdSave('priorities');
  cmdRenderBody();
}

function cmdEditPersonNotes(group,id,val){
  const item = (cmdState.people[group]||[]).find(i=>i.id===id);
  if(!item) return;
  item.notes = val;
  cmdSave('people');

function cmdAddPerson(group){
  const name = prompt(group==='rules'?'Rule text:':'Name:');
  if(!name||!name.trim()) return;
  const role = prompt(group==='rules'?'Subtext (optional):':'Role / label:') || '';
  const status = group==='rules' ? '' : (prompt('Current status / context:') || '');
  cmdState.people[group].push({id:cmdUid('pe-'+group[0]), name:name.trim(), role:role.trim(), status:status.trim(), notes:''});
  cmdSave('people');
  cmdRenderBody();
}
function cmdDelPerson(group,id){
  if(!confirm('Delete this entry?')) return;
  cmdState.people[group] = cmdState.people[group].filter(i=>i.id!==id);
  cmdSave('people');
  cmdRenderBody();
}

      return `
        <div class="cmd-rev-card ${cmdExpanded[it.id]?'expanded':''}" onclick="cmdExpandCard(event,'${it.id}')">
          <button class="cmd-card-del" onclick="event.stopPropagation();cmdDelRevenue('${it.id}')" title="Delete">&times;</button>
          <div class="cmd-rev-title">${cmdEsc(it.title)}</div>
          ${it.desc?`<div class="cmd-rev-desc">${cmdEsc(it.desc)}</div>`:''}
          <div class="cmd-card-notes" onclick="event.stopPropagation()">
            <div class="cmd-card-notes-lbl">Private notes</div>
            <textarea placeholder="Progress, blockers, numbers…" oninput="cmdEditRevenueNotes('${it.id}',this.value)">${cmdEsc(it.notes||'')}</textarea>
          </div>
          <div class="cmd-rev-move" onclick="event.stopPropagation()">
            ${prevStatus?`<button onclick="cmdMoveRevenue('${it.id}','${prevStatus}')">← ${prevStatus==='idea'?'Idea':'In Progress'}</button>`:''}
            ${nextStatus?`<button onclick="cmdMoveRevenue('${it.id}','${nextStatus}')">${nextStatus==='progress'?'In Progress':'Done'} →</button>`:''}
          </div>
        </div>`;
    }).join('');
    return `
      <div class="cmd-col cmd-col-${cls}">
        <div class="cmd-col-hdr">
          <div class="cmd-col-title"><span class="cmd-col-dot"></span>${label}</div>
          <div class="cmd-col-count">${list.length}</div>
        </div>
        ${cards}
        ${key==='idea'?'<button class="cmd-add-btn" onclick="cmdAddRevenue()">+ Add opportunity</button>':''}
      </div>`;
  };
  return `
    <div class="cmd-section-title">Revenue Opportunities</div>
    <div class="cmd-section-desc">Open ideas moving through the pipeline. Click to expand; use arrows to advance.</div>
    <div class="cmd-kanban">
      ${col('idea','Idea','idea')}
      ${col('progress','In Progress','progress')}
      ${col('done','Done','done')}
    </div>
    ${cmdScratchBlock('revenue', cmdState.revenue.scratch||'', 'Scratchpad — revenue')}
  `;
}
function cmdMoveRevenue(id,newStatus){
  const item = cmdState.revenue.items.find(i=>i.id===id);
  if(!item) return;
  item.status = newStatus;
  cmdSave('revenue');
  cmdRenderBody();
}
function cmdEditRevenueNotes(id,val){
  const item = cmdState.revenue.items.find(i=>i.id===id);
  if(!item) return;
  item.notes = val;
  cmdSave('revenue');
}
function cmdAddRevenue(){
  const title = prompt('Opportunity title:');
  if(!title||!title.trim()) return;
  const desc = prompt('Description (optional):') || '';
  cmdState.revenue.items.push({id:cmdUid('r'), title:title.trim(), desc:desc.trim(), status:'idea', notes:''});
  cmdSave('revenue');
  cmdRenderBody();
}
function cmdDelRevenue(id){
  if(!confirm('Delete this opportunity?')) return;
  cmdState.revenue.items = cmdState.revenue.items.filter(i=>i.id!==id);
  cmdSave('revenue');
  cmdRenderBody();
}

// ── 90-DAY PLAN ──────────────────────────────────────────────────────
function cmdRenderPlan(){
  const plan = cmdState.plan;
  if(!plan.startDate) plan.startDate = getTodayISO();
  const phases = plan.phases.map((phase,idx)=>{
    const milestones = (phase.milestones||[]).map(m=>{
      const dateISO = cmdAddDays(plan.startDate, m.day-1);
      const label = fmtDate(dateISO);
      const calUrl = cmdCalendarUrl(m.title, dateISO);
      return `
        <div class="cmd-milestone ${m.checked?'checked':''}">
          <div class="cmd-check ${m.checked?'on':''}" onclick="cmdToggleMilestone('${phase.key}','${m.id}')"></div>
          <div class="cmd-milestone-body">
            <div class="cmd-milestone-title">${cmdEsc(m.title)}</div>
            <div class="cmd-milestone-date">Day ${m.day} · ${label}</div>
          </div>
          <a class="cmd-milestone-cal" href="${calUrl}" target="_blank" rel="noopener" title="Add to Google Calendar">📅</a>
        </div>`;
    }).join('');
    return `
      <div class="cmd-phase">
        <div class="cmd-phase-marker">${idx+1}</div>
        <div class="cmd-phase-body">
          <div class="cmd-phase-days">${phase.days}</div>
          <div class="cmd-phase-title">${cmdEsc(phase.title)}</div>
          <div class="cmd-phase-sub">Phase ${idx+1}</div>
          ${milestones}
        </div>
      </div>`;
  }).join('');
  return `
    <div class="cmd-section-title">90-Day Plan</div>
    <div class="cmd-section-desc">Day 1 = ${fmtDate(plan.startDate)}. Each milestone links to a pre-filled Google Calendar event.</div>
    <div class="cmd-timeline">
      <div class="cmd-timeline-track"></div>
      <div class="cmd-phases">${phases}</div>
    </div>
    ${cmdScratchBlock('plan', plan.scratch||'', 'Scratchpad — 90-day plan')}
  `;
}
function cmdToggleMilestone(phaseKey,id){
  const phase = cmdState.plan.phases.find(p=>p.key===phaseKey);
  if(!phase) return;
  const m = phase.milestones.find(x=>x.id===id);
  if(!m) return;
  m.checked = !m.checked;
  cmdSave('plan');
  cmdRenderBody();
}
function cmdAddDays(iso,days){
  const d = new Date(iso+'T00:00:00');
  d.setDate(d.getDate()+days);
  return d.toISOString().split('T')[0];
}
function cmdCalDateStr(iso){
  // Returns YYYYMMDD (all-day Google Cal format)
  return iso.replace(/-/g,'');
}
function cmdCalendarUrl(title,iso){
  const start = cmdCalDateStr(iso);
  const endDate = cmdAddDays(iso,1);
  const end = cmdCalDateStr(endDate);
  const params = new URLSearchParams({
    action:'TEMPLATE',
    text:title,
    dates:`${start}/${end}`,
    details:'HELM Command Center · 90-day plan milestone',
  });
  return 'https://calendar.google.com/calendar/render?'+params.toString();
}

let actionUnlocked = false;
let actionData = {categories:[], items:[]};
let actionState = {view:'list', activeCategoryId:null, filterStatus:null, sortBy:'priority'};
const ACTION_PIN = '1144';
const ACTION_STATUS_LIST = ['Inbox','Active','InProgress','Blocked','Done'];
const ACTION_PALETTE = ['#6366f1','#ec4899','#10b981','#f59e0b','#8b5cf6','#06b6d4','#f43f5e','#84cc16','#3b82f6','#a855f7','#14b8a6','#fb923c','#ef4444','#22d3ee','#eab308'];

function actionColorFor(category){
  if(category && category.color) return category.color;
  const id = category ? category.id : 0;
  return ACTION_PALETTE[Math.abs(id) % ACTION_PALETTE.length];
}

function actionPinPrompt(){
  const tab = document.getElementById('tab-action');
  tab.innerHTML = `
    <div class="ai-pin-wrap">
      <div class="ai-pin-box">
        <div class="ai-pin-title">Enter PIN to access Action Items</div>
        <input type="password" id="aiPinInput" maxlength="10" class="ai-pin-input"
          onkeydown="if(event.key==='Enter')actionCheckPin()">
        <div style="margin-top:14px;">
          <button class="ai-btn ai-btn-primary" onclick="actionCheckPin()" style="width:100%;">Unlock</button>
        </div>
        <div id="aiPinErr" class="ai-pin-err">Incorrect PIN</div>
      </div>
    </div>`;
  setTimeout(()=>{const el=document.getElementById('aiPinInput');if(el)el.focus();},80);
}
function actionCheckPin(){
  const v = document.getElementById('aiPinInput').value;
  if(v === ACTION_PIN){
    actionUnlocked = true;
    actionInit();
  } else {
    document.getElementById('aiPinErr').style.display='block';
    document.getElementById('aiPinInput').value='';
    document.getElementById('aiPinInput').focus();

}

async function actionInit(){
  await actionLoadAll();
  actionRender();
  actionUpdateBadge();
}

async function actionLoadAll(){
  const [catsRes, itemsRes] = await Promise.all([
    db.from('helm_action_categories').select('*').eq('archived',false).order('sort_order'),
    db.from('helm_action_items').select('*').eq('archived',false).order('updated_at',{ascending:false}),
  ]);
  if(catsRes.error){console.error('AI categories load:',catsRes.error); toast('Categories: '+catsRes.error.message); actionData.categories=[];}
  else actionData.categories = catsRes.data || [];
  if(itemsRes.error){console.error('AI items load:',itemsRes.error); toast('Items: '+itemsRes.error.message); actionData.items=[];}
  else actionData.items = itemsRes.data || [];
}

function actionAgeDays(item){
  const ts = item.last_worked_at || item.updated_at || item.created_at;
  if(!ts) return 0;
  return Math.floor((Date.now() - new Date(ts).getTime()) / 86400000);
}
function actionPriorityScore(item){
  // urgency weighted slightly higher than difficulty
  const u = parseInt(item.urgency)||3;
  const d = parseInt(item.difficulty)||3;
  return Math.round(((u*1.2 + d*0.8) / 12) * 10);
}
function actionStaleClass(item){
  if(item.status === 'Done') return '';
  const age = actionAgeDays(item);
  if(age >= 21) return 'danger';
  if(age >= 10) return 'warn';
  return '';
}
function actionStaleFlag(item){ return actionAgeDays(item) >= 14 && item.status !== 'Done'; }
function actionAgeLabel(item){
  const days = actionAgeDays(item);
  if(days === 0) return 'today';
  if(days === 1) return '1d';
  if(days < 14) return days+'d';
  if(days < 60) return Math.round(days/7)+'w';
  return Math.round(days/30)+'mo';
}

function actionDigest(){
  const items = actionData.items;
  return {
    inbox: items.filter(i=>i.status==='Inbox').length,
    active: items.filter(i=>i.status==='Active').length,
    inProg: items.filter(i=>i.status==='InProgress').length,
    blocked: items.filter(i=>i.status==='Blocked' && actionAgeDays(i)>=14).length,
    stale: items.filter(i=>actionStaleFlag(i)).length,
  };
}

function actionUpdateBadge(){
  const btn = document.getElementById('actionTabBtn');
  if(!btn) return;
  const d = actionDigest();
  const count = d.active + d.inProg;
  const existing = btn.querySelector('.ai-tab-badge');
  if(existing) existing.remove();
  if(count > 0){
    const span = document.createElement('span');
    span.className = 'ai-tab-badge';
    span.textContent = count;
    btn.appendChild(span);
  }
}

function actionRender(){
  const tab = document.getElementById('tab-action');
  const d = actionDigest();
  const lastTouched = actionData.items
    .filter(i=>i.status!=='Done')
    .sort((a,b)=>new Date(b.last_worked_at||b.updated_at||b.created_at)-new Date(a.last_worked_at||a.updated_at||a.created_at))[0];

  const digestPills = [
    `<span class="ai-digest-pill">${d.inbox} inbox</span>`,
    `<span class="ai-digest-pill">${d.active} active</span>`,
    `<span class="ai-digest-pill">${d.inProg} in progress</span>`,
    d.blocked>0 ? `<span class="ai-digest-pill danger">${d.blocked} blocked &gt;14d</span>`:'',
    d.stale>0 ? `<span class="ai-digest-pill warn">${d.stale} stale</span>`:'',
    lastTouched ? `<span class="ai-digest-pill" title="Last touched">› ${esc(lastTouched.title.slice(0,40))}${lastTouched.title.length>40?'…':''}</span>`:'',
  ].filter(Boolean).join('');

  tab.innerHTML = `
    <div class="ai-root">
      <div class="ai-topbar">
        <div class="ai-title">Action Items <span class="ai-title-accent">// command surface</span></div>
        <div class="ai-digest">${digestPills}</div>
        <div class="ai-views">
          <button class="ai-view-btn ${actionState.view==='list'?'active':''}" onclick="actionSetView('list')">List</button>
          <button class="ai-view-btn" disabled title="Phase 2">Whiteboard</button>
          <button class="ai-view-btn" disabled title="Phase 3">Projects</button>
        </div>
      </div>
      <div class="ai-main">
        <div class="ai-sidebar" id="aiSidebar"></div>
        <div class="ai-content" id="aiContent"></div>
      </div>
      <button class="ai-fab" onclick="actionOpenQuickAdd()" title="Quick Add">+</button>
    </div>
  `;
  actionRenderSidebar();
  actionRenderContent();
}

function actionRenderSidebar(){
  const sb = document.getElementById('aiSidebar');
  if(!sb) return;
  const cats = actionData.categories;
  const items = actionData.items;

  function children(parentId){ return cats.filter(c=>c.parent_id===parentId).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0) || (a.name||'').localeCompare(b.name||'')); }
  function descendants(catId){
    const out=[catId]; let added=true;
    while(added){ added=false;
      for(const c of cats) if(c.parent_id!==null && out.includes(c.parent_id) && !out.includes(c.id)){out.push(c.id); added=true;}
    }
    return out;
  }
  function countItems(catId){
    const ids = new Set(descendants(catId));
    return items.filter(i=>ids.has(i.category_id) && i.status!=='Done').length;
  }
  function renderNode(c, depth){
    const color = actionColorFor(c);
    const cnt = countItems(c.id);
    const active = actionState.activeCategoryId === c.id ? 'active':'';
    let html = `
      <div class="ai-cat-row depth-${depth} ${active}" onclick="actionSetCategory(${c.id})">
        <span class="ai-cat-dot" style="background:${color}"></span>
        <span class="ai-cat-name">${esc(c.name)}</span>
        <span class="ai-cat-actions">
          ${depth<2?`<button class="ai-cat-act" onclick="event.stopPropagation();actionAddSubcategory(${c.id})" title="Add subcategory">+</button>`:''}
          <button class="ai-cat-act" onclick="event.stopPropagation();actionRenameCategory(${c.id})" title="Rename">\u270E</button>
          <button class="ai-cat-act" onclick="event.stopPropagation();actionDeleteCategory(${c.id})" title="Archive">&times;</button>
        </span>
        ${cnt>0?`<span class="ai-cat-count">${cnt}</span>`:''}
      </div>`;
    for(const child of children(c.id)) html += renderNode(child, depth+1);
    return html;
  }

  const allActive = actionState.activeCategoryId === null ? 'active':'';
  let html = `
    <div class="ai-sidebar-hdr">
      <span>Categories</span>
      <button class="ai-sb-add" onclick="actionAddCategory()" title="New top-level category">+</button>
    </div>
    <div class="ai-cat-row ${allActive}" onclick="actionSetCategory(null)">
      <span class="ai-cat-dot" style="background:#475569"></span>
      <span class="ai-cat-name">All items</span>
      <span class="ai-cat-count">${items.filter(i=>i.status!=='Done').length}</span>
    </div>
  `;
  for(const c of children(null)) html += renderNode(c, 0);
  if(cats.length === 0){
    html += `<div style="padding:18px 8px;text-align:center;color:#7c849a;font-size:11px;line-height:1.5;">No categories yet.<br>Click + to create one,<br>or use Quick Add.</div>`;
  }
  sb.innerHTML = html;
}

function actionRenderContent(){
  const c = document.getElementById('aiContent');
  if(!c) return;
  let items = actionData.items.slice();

  // Filter by category (descendants included)
  if(actionState.activeCategoryId !== null){
    const ids = new Set([actionState.activeCategoryId]);
    let added=true;
    while(added){ added=false;
      for(const cat of actionData.categories){
        if(cat.parent_id!==null && ids.has(cat.parent_id) && !ids.has(cat.id)){ ids.add(cat.id); added=true; }
      }
    }
    items = items.filter(i=>ids.has(i.category_id));
  }

  if(actionState.filterStatus){
    items = items.filter(i=>i.status === actionState.filterStatus);
  } else {
    items = items.filter(i=>i.status !== 'Done');
  }

  if(actionState.sortBy === 'priority') items.sort((a,b)=>actionPriorityScore(b)-actionPriorityScore(a));
  else if(actionState.sortBy === 'age') items.sort((a,b)=>actionAgeDays(b)-actionAgeDays(a));
  else if(actionState.sortBy === 'created') items.sort((a,b)=>(b.created_at||'').localeCompare(a.created_at||''));
  else if(actionState.sortBy === 'title') items.sort((a,b)=>(a.title||'').localeCompare(b.title||''));

  const cat = actionState.activeCategoryId ? actionData.categories.find(x=>x.id===actionState.activeCategoryId) : null;
  const title = cat ? cat.name : 'All Items';
  const filterPill = (label, val) => `<button class="ai-filter ${(actionState.filterStatus||'')===val?'active':''}" onclick="actionSetFilter('${val}')">${label}</button>`;

  let html = `
    <div class="ai-content-hdr">
      <div>
        <div class="ai-content-title">${esc(title)}</div>
        <div class="ai-content-sub">${items.length} ${items.length===1?'item':'items'}${actionState.filterStatus?' · '+actionState.filterStatus:''}</div>
      </div>
      <div class="ai-filters">
        ${filterPill('All','')}
        ${filterPill('Inbox','Inbox')}
        ${filterPill('Active','Active')}
        ${filterPill('In Progress','InProgress')}
        ${filterPill('Blocked','Blocked')}
        ${filterPill('Done','Done')}
        <select class="ai-filter" onchange="actionSetSort(this.value)">
          <option value="priority" ${actionState.sortBy==='priority'?'selected':''}>Sort: Priority</option>
          <option value="age" ${actionState.sortBy==='age'?'selected':''}>Sort: Oldest</option>
          <option value="created" ${actionState.sortBy==='created'?'selected':''}>Sort: Newest</option>
          <option value="title" ${actionState.sortBy==='title'?'selected':''}>Sort: A-Z</option>
        </select>
      </div>
    </div>
  `;

  if(items.length === 0){
    html += `<div class="ai-empty"><div class="ai-empty-icon">\u2756</div><div>Nothing here yet.<br><span style="font-size:11px;color:#5f6479;">Click + (bottom right) to capture an idea.</span></div></div>`;
  } else {
    html += '<div class="ai-list">';
    for(const it of items){
      const cat = actionData.categories.find(c=>c.id===it.category_id);
      const color = actionColorFor(cat);
      const score = actionPriorityScore(it);
      const ageCls = actionStaleClass(it);
      const stale = actionStaleFlag(it);
      const sat = Math.min(score/10, 1);
      const barColor = score>=8?'#ef4444':score>=6?'#f59e0b':score>=4?'#6366f1':'#374151';
      html += `
        <div class="ai-item ${stale?'stale':''}" style="border-left-color:${color};" onclick="actionOpenItem(${it.id})">
          <span class="ai-item-priority" style="background:${barColor};opacity:${(0.4+sat*0.6).toFixed(2)};"></span>
          <div class="ai-item-main">
            <div class="ai-item-title">${esc(it.title||'(untitled)')}</div>
            ${it.body?`<div class="ai-item-sub">${esc(it.body.replace(/\s+/g,' ').slice(0,140))}${it.body.length>140?'…':''}</div>`:''}
          </div>
          ${cat?`<span class="ai-item-cat" style="background:${color}22;color:${color};border:1px solid ${color}55;">${esc(cat.name)}</span>`:'<span></span>'}
          <span class="ai-item-status ai-status-${it.status}">${it.status==='InProgress'?'In Prog':it.status}</span>
          <span class="ai-item-score" title="Priority ${score}/10 (urgency ${it.urgency}, difficulty ${it.difficulty})">${score}</span>
          <span class="ai-item-age ${ageCls}" title="${it.last_worked_at?'Last touched':'Created'}">${actionAgeLabel(it)}</span>
        </div>`;
    }
    html += '</div>';
  }
  c.innerHTML = html;
}

function actionSetCategory(id){ actionState.activeCategoryId=id; actionRenderSidebar(); actionRenderContent(); }
function actionSetFilter(val){ actionState.filterStatus = val || null; actionRenderContent(); }
function actionSetSort(val){ actionState.sortBy = val; actionRenderContent(); }
function actionSetView(v){ actionState.view = v; actionRender(); }

// ── Quick Add Modal ──
function actionCatOptionsHTML(parentId, depth, selectedId){
  let opts = '';
  const kids = actionData.categories.filter(c=>c.parent_id===parentId).sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  for(const c of kids){
    const indent = '\u00A0\u00A0\u00A0\u00A0'.repeat(depth);
    const sel = (selectedId===c.id) ? 'selected' : '';
    opts += `<option value="${c.id}" ${sel}>${indent}${esc(c.name)}</option>`;
    opts += actionCatOptionsHTML(c.id, depth+1, selectedId);
  }
  return opts;
}

function actionOpenQuickAdd(){
  const backdrop = document.createElement('div');
  backdrop.className = 'ai-modal-backdrop';
  backdrop.id = 'aiQuickModal';
  backdrop.onclick = (e)=>{ if(e.target===backdrop) actionCloseModal(); };
  backdrop.innerHTML = `
    <div class="ai-modal">
      <h3>New Action Item</h3>
      <div class="ai-field">
        <label>Title</label>
        <input class="ai-input" id="aiqTitle" placeholder="What's the idea or task?">
      </div>
      <div class="ai-field">
        <label>Notes (optional)</label>
        <textarea class="ai-textarea" id="aiqBody" placeholder="Context, links, reasoning…"></textarea>
      </div>
      <div class="ai-field">
        <label>Category</label>
        <select class="ai-select" id="aiqCat" onchange="actionQuickCatChange(this)">
          <option value="">— Pick a category —</option>
          ${actionCatOptionsHTML(null,0,null)}
          <option value="__new__">+ Create new category</option>
        </select>
        <div id="aiqNewCat" class="ai-cat-create-inline" style="display:none;">
          <input class="ai-input" id="aiqNewCatName" placeholder="New category name…" style="margin-bottom:6px;">
          <select class="ai-select" id="aiqNewCatParent">
            <option value="">— Top-level —</option>
            ${actionCatOptionsHTML(null,0,null)}
          </select>
          <div style="font-size:10px;color:#7c849a;margin-top:4px;">Max 3 layers. Parent must be top-level or layer 2.</div>
        </div>
      </div>
      <div class="ai-row">
        <div class="ai-field">
          <label>Difficulty (1=easy, 5=hard)</label>
          <div class="ai-rating" id="aiqDiff">
            ${[1,2,3,4,5].map(n=>`<button class="ai-rating-btn ${n===3?'active':''}" data-val="${n}" onclick="actionRatingClick('aiqDiff',${n})">${n}</button>`).join('')}
          </div>
        </div>
        <div class="ai-field">
          <label>Urgency (1=low, 5=high)</label>
          <div class="ai-rating" id="aiqUrg">
            ${[1,2,3,4,5].map(n=>`<button class="ai-rating-btn ${n===3?'active':''}" data-val="${n}" onclick="actionRatingClick('aiqUrg',${n})">${n}</button>`).join('')}
          </div>
        </div>
      </div>
      <div class="ai-field">
        <label>Due date (optional)</label>
        <input type="date" class="ai-input" id="aiqDue">
      </div>
      <div class="ai-modal-actions">
        <button class="ai-btn ai-btn-ghost" onclick="actionCloseModal()">Cancel</button>
        <button class="ai-btn ai-btn-primary" onclick="actionSaveQuickAdd()">Add to Inbox</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);
  setTimeout(()=>{const el=document.getElementById('aiqTitle');if(el)el.focus();},80);
}

function actionQuickCatChange(sel){
  document.getElementById('aiqNewCat').style.display = (sel.value === '__new__') ? 'block' : 'none';
}
function actionRatingClick(groupId, val){
  const g = document.getElementById(groupId);
  g.querySelectorAll('.ai-rating-btn').forEach(b=>b.classList.toggle('active', parseInt(b.dataset.val)===val));
}
function actionGetRating(groupId){
  const active = document.getElementById(groupId).querySelector('.ai-rating-btn.active');
  return active ? parseInt(active.dataset.val) : 3;
}
function actionCloseModal(){
  const m = document.getElementById('aiQuickModal'); if(m) m.remove();
  const e = document.getElementById('aiEditModal');  if(e) e.remove();
}

function actionGetCategoryDepth(catId){
  const cat = actionData.categories.find(c=>c.id===catId);
  if(!cat) return 0;
  if(cat.parent_id === null) return 0;
  return 1 + actionGetCategoryDepth(cat.parent_id);
}

async function actionSaveQuickAdd(){
  const title = document.getElementById('aiqTitle').value.trim();
  if(!title){ toast('Title required'); return; }
  const catSel = document.getElementById('aiqCat').value;
  let categoryId = null;

  if(catSel === '__new__'){
    const nm = document.getElementById('aiqNewCatName').value.trim();
    if(!nm){ toast('New category name required'); return; }
    const parentRaw = document.getElementById('aiqNewCatParent').value;
    const parent = parentRaw ? parseInt(parentRaw) : null;
    if(parent !== null){
      const depth = actionGetCategoryDepth(parent);
      if(depth >= 2){ toast('Max 3 layers — pick a top-level or layer-2 parent'); return; }
    }
    const {data, error} = await db.from('helm_action_categories').insert({
      name: nm, parent_id: parent, sort_order: actionData.categories.length,
    }).select().single();
    if(error){ toast('Category create failed: '+error.message); return; }
    actionData.categories.push(data);
    categoryId = data.id;
  } else if(catSel){
    categoryId = parseInt(catSel);
  } else {
    toast('Pick a category'); return;
  }

  const body = document.getElementById('aiqBody').value.trim() || null;
  const difficulty = actionGetRating('aiqDiff');
  const urgency = actionGetRating('aiqUrg');
  const due = document.getElementById('aiqDue').value || null;

  const {data, error} = await db.from('helm_action_items').insert({
    title, body, category_id: categoryId, difficulty, urgency, due_date: due, status: 'Inbox',
  }).select().single();
  if(error){ toast('Save failed: '+error.message); return; }
  actionData.items.unshift(data);
  actionCloseModal();
  toast('Captured to Inbox', true);
  actionRender();
  actionUpdateBadge();
}

// ── Category management ──
async function actionAddCategory(){
  const name = prompt('New top-level category name:');
  if(!name || !name.trim()) return;
  const {data, error} = await db.from('helm_action_categories').insert({
    name: name.trim(), parent_id: null, sort_order: actionData.categories.length,
  }).select().single();
  if(error){ toast('Failed: '+error.message); return; }
  actionData.categories.push(data);
  actionRenderSidebar();
  toast('Category added', true);
}
async function actionAddSubcategory(parentId){
  const depth = actionGetCategoryDepth(parentId);
  if(depth >= 2){ toast('Max 3 layers — cannot add deeper here'); return; }
  const name = prompt('New subcategory name:');
  if(!name || !name.trim()) return;
  const {data, error} = await db.from('helm_action_categories').insert({
    name: name.trim(), parent_id: parentId, sort_order: actionData.categories.length,
  }).select().single();
  if(error){ toast('Failed: '+error.message); return; }
  actionData.categories.push(data);
  actionRenderSidebar();
  toast('Subcategory added', true);
}
async function actionRenameCategory(catId){
  const cat = actionData.categories.find(c=>c.id===catId);
  if(!cat) return;
  const name = prompt('Rename category:', cat.name);
  if(!name || !name.trim() || name.trim()===cat.name) return;
  const {error} = await db.from('helm_action_categories').update({name: name.trim()}).eq('id',catId);
  if(error){ toast('Failed: '+error.message); return; }
  cat.name = name.trim();
  actionRenderSidebar();
  actionRenderContent();
}
async function actionDeleteCategory(catId){
  const cat = actionData.categories.find(c=>c.id===catId);
  if(!cat) return;
  const all = [catId]; let added=true;
  while(added){ added=false;
    for(const c of actionData.categories){
      if(c.parent_id !== null && all.includes(c.parent_id) && !all.includes(c.id)){ all.push(c.id); added=true; }
    }
  }
  const itemCount = actionData.items.filter(i=>all.includes(i.category_id)).length;
  const subCount = all.length - 1;
  const subPart = subCount>0?` and ${subCount} subcategor${subCount===1?'y':'ies'}`:'';
  const itemPart = itemCount>0?` plus ${itemCount} item${itemCount===1?'':'s'}`:'';
  if(!confirm(`Archive "${cat.name}"${subPart}${itemPart}?\n\nThis is reversible only via SQL.`)) return;
  await db.from('helm_action_categories').update({archived:true}).in('id',all);
  if(itemCount>0) await db.from('helm_action_items').update({archived:true}).in('category_id',all);
  actionData.categories = actionData.categories.filter(c=>!all.includes(c.id));
  actionData.items = actionData.items.filter(i=>!all.includes(i.category_id));
  if(all.includes(actionState.activeCategoryId)) actionState.activeCategoryId = null;
  actionRender();
  actionUpdateBadge();
  toast('Archived', true);
}

// ── Item edit ──
function actionOpenItem(itemId){
  const it = actionData.items.find(i=>i.id===itemId);
  if(!it) return;
  const ageDays = actionAgeDays(it);
  const created = new Date(it.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

  const backdrop = document.createElement('div');
  backdrop.className = 'ai-modal-backdrop';
  backdrop.id = 'aiEditModal';
  backdrop.onclick = (e)=>{ if(e.target===backdrop) actionCloseModal(); };
  backdrop.innerHTML = `
    <div class="ai-modal" style="max-width:580px;">
      <h3 style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
        <span>Edit Item</span>
        <span style="font-size:10px;font-weight:500;color:#7c849a;letter-spacing:0.06em;">CREATED ${created.toUpperCase()} · ${ageDays}D AGO</span>
      </h3>
      <div class="ai-field">
        <label>Title</label>
        <input class="ai-input" id="aieTitle" value="${esc(it.title||'')}">
      </div>
      <div class="ai-field">
        <label>Notes</label>
        <textarea class="ai-textarea" id="aieBody">${esc(it.body||'')}</textarea>
      </div>
      <div class="ai-row">
        <div class="ai-field">
          <label>Category</label>
          <select class="ai-select" id="aieCat">${actionCatOptionsHTML(null,0,it.category_id)}</select>
        </div>
        <div class="ai-field">
          <label>Status</label>
          <select class="ai-select" id="aieStatus" onchange="document.getElementById('aieBlockedWrap').style.display=this.value==='Blocked'?'':'none';">
            ${ACTION_STATUS_LIST.map(s=>`<option value="${s}" ${it.status===s?'selected':''}>${s==='InProgress'?'In Progress':s}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="ai-row">
        <div class="ai-field">
          <label>Difficulty</label>
          <div class="ai-rating" id="aieDiff">
            ${[1,2,3,4,5].map(n=>`<button class="ai-rating-btn ${(it.difficulty||3)===n?'active':''}" data-val="${n}" onclick="actionRatingClick('aieDiff',${n})">${n}</button>`).join('')}
          </div>
        </div>
        <div class="ai-field">
          <label>Urgency</label>
          <div class="ai-rating" id="aieUrg">
            ${[1,2,3,4,5].map(n=>`<button class="ai-rating-btn ${(it.urgency||3)===n?'active':''}" data-val="${n}" onclick="actionRatingClick('aieUrg',${n})">${n}</button>`).join('')}
          </div>
        </div>
      </div>
      <div class="ai-field">
        <label>Due date (optional)</label>
        <input type="date" class="ai-input" id="aieDue" value="${it.due_date||''}">
      </div>
      <div class="ai-field" id="aieBlockedWrap" style="${it.status==='Blocked'?'':'display:none;'}">
        <label>Blocked reason</label>
        <input class="ai-input" id="aieBlocked" value="${esc(it.blocked_reason||'')}" placeholder="What's blocking this?">
      </div>
      <div class="ai-modal-actions">
        <button class="ai-btn ai-btn-danger" onclick="actionArchiveItem(${it.id})">Archive</button>
        <span style="flex:1;"></span>
        <button class="ai-btn ai-btn-ghost" onclick="actionCloseModal()">Cancel</button>
        <button class="ai-btn ai-btn-primary" onclick="actionSaveItem(${it.id})">Save</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);
}

async function actionSaveItem(itemId){
  const title = document.getElementById('aieTitle').value.trim();
  if(!title){ toast('Title required'); return; }
  const body = document.getElementById('aieBody').value.trim() || null;
  const category_id = parseInt(document.getElementById('aieCat').value) || null;
  const status = document.getElementById('aieStatus').value;
  const difficulty = actionGetRating('aieDiff');
  const urgency = actionGetRating('aieUrg');
  const due_date = document.getElementById('aieDue').value || null;
  const blocked_reason = status==='Blocked' ? (document.getElementById('aieBlocked').value.trim() || null) : null;
  const updates = {
    title, body, category_id, status, difficulty, urgency, due_date, blocked_reason,
    last_worked_at: new Date().toISOString(),
    updated_at: new Date().toISOString(),
  };
  if(status==='Done'){ updates.completed_at = new Date().toISOString(); }
  const {data, error} = await db.from('helm_action_items').update(updates).eq('id',itemId).select().single();
  if(error){ toast('Save failed: '+error.message); return; }
  const idx = actionData.items.findIndex(i=>i.id===itemId);
  if(idx>=0) actionData.items[idx] = data;
  actionCloseModal();
  toast('Saved', true);
  actionRender();
  actionUpdateBadge();
}

async function actionArchiveItem(itemId){
  if(!confirm('Archive this item? (You can restore it via SQL if needed.)')) return;
  const {error} = await db.from('helm_action_items').update({archived:true}).eq('id',itemId);
  if(error){ toast('Archive failed: '+error.message); return; }
  actionData.items = actionData.items.filter(i=>i.id!==itemId);
  actionCloseModal();
  toast('Archived', true);
  actionRender();
  actionUpdateBadge();
}
</script>
